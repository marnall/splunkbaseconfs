[flex_syslog]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
category = Operating System
description = System log (syslog) output from Veritas NetBackup Flex Appliance
pulldown_type = 1
EXTRACT-nbu-token = DESCRIPTION: Token '(?<Token_Name>[^']+)' was successfully (?<operations>\w+)
EXTRACT-WORM-shell = User '(?<Msdp_user>[^']+)' performed an action on the storage server '(?<Storage_server>[^']+)'
EXTRACT-nbaudit = DESCRIPTION: (?<Details>[^|]+) \| TIMESTAMP: (?<timestamp>\d+) \| DATETIME: (?<Time>[^|]+) \| USER: (?<User>[^|]+)@(?<Domain>[^|]+) \| CATEGORY: (?<Category>[^|]+) \| ACTION: (?<Action>[^|]+)
EXTRACT-nbaudit_hostname = nbaudit@(?<Host>[a-zA-Z0-9.-]+)
EXTRACT-mfa_status = Successfully (?P<mfa_status>[^']+) (multifactor authentication|at-login reconfiguration of multifactor authentication) for (?:the )?(?P<ssh_user>[^\s]+)(?: user)?
EXTRACT-shell_command = received request:\s*(?P<Command>.+)
EXTRACT-ssh_fail_login = Failed password for (?:invalid user )?(?P<Username>.*) from (?P<ip_add>[^ ]*)
EXTRACT-web_user = Invalid (?:user )?credentials for (?:user )?\[(?P<User>[^\]]+)
EXTRACT-removed_user = Successfully removed the following account: ID=(?P<UserId>[^,]+), name=(?P<Username>[^,]+), roles=\[(?P<Role>[^\]]+)
EXTRACT-locked_user = User \[(?P<locked_user>[^\]]+)\] is locked due to maximum fail attempts achieved.
EXTRACT-locked_userV2 = The account for \[(?P<locked_user>[^\]]+)\] is locked due to three failed sign-in attempts.
EXTRACT-roles = PutRoleCache: putting the following value in cache [^\n]*,\s+Roles-(?P<roles>[^\n]*)
EXTRACT-elevate_history_cmd = HISTORY: PID=\d+ UID=\d+ (?P<Command>.+)
EXTRACT-nbu_api_key = The API key with tag '(?P<Tag_Name>[^']+)' is (?P<Op_Name>[^\s]+(?: [^\s]+)?) for user '(?P<Key_User>[^']+)'
EXTRACT-MSDP_shell_cmd = NEWV: (?P<Command>.*?) ATTR_2:
EXTRACT-MSDP_user_shell = User '(?P<MSDP_User>[^']+)' performed an action on the storage server '(?P<MSDP_Host>[^']+)'
EXTRACT-NBU_webui_login = User '(?P<Username>[^']+)' authentication failed
EXTRACT-NBU_webui_lock = Access to '(?P<Hostname>[^']+)' was denied for user '(?P<Username>[^']+)'
EXTRACT-NBU_webui_unauthorized = User '(?P<Username>[^']+)' in domain '(?P<Hostname>[^']+)' was authenticated successfully. However, this user does not have RBAC
EXTRACT-Nbu_malware_scan_backup = Malware found on client '(?P<Client>[^']+)', backup id '(?P<Backup_Id>[^']+)', malware tool name '(?P<Tool_Name>[^']+)', number of files impacted '(?P<Infected_File_Number>[^']+)'
EXTRACT-added_user = User/group \[(?P<Username>[^\]]+)\] added successfully.
EXTRACT-LDAP_user = Error occured when making a bind call for user \[(?<User>[^\]]+)\]
EXTRACT-AD_user_not_imported = AD user \[(?P<username>[^\]]+)\] was not imported
EXTRACT-OTP_user = Invalid OTP \d{6} for user \[(?<User>[^\]]+)\]
EXTRACT-OTP_userv2 = Invalid multifactor authentication code for account \[(?P<User>[^\]]+)
EXTRACT-instance_removal = successfully started the deletion of the instance with the name \[(?P<instance_name>[^\]]+)\] and the ID \[\w(?P<instance_id>[^_]+)
EXTRACT-user_name = Invalid Credentials while authenticating with AD for username : \[(?P<username>[^\]]+)\]
