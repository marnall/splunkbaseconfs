[Update Azure Resources - KV Store]
alert.track = 0
cron_schedule = */10 * * * *
description = Update the azure_assets KV Store with Azure Resources.
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `sa_azure_resources`\
| dedup id sourcetype\
| eval ipconfig_id=coalesce('properties.ipConfiguration.id', 'properties.ipConfigurations{}.id')\
| transaction ipconfig_id vm_id\
| eval _key=md5('ipconfig_id'+'vm_id'), category=mvappend(custom_tag,vm_os,"Azure subscription : "+account_id)\
| where nt_host like "%"\
| rename properties.ipAddress as external_ip, properties.instanceView.osVersion as operatingSystemVersion, properties.instanceView.osName as operatingSystem, vm_name as nt_host\
| table _key, nt_host, dns, ip, external_ip, mac, category, location, operatingSystem, operatingSystemVersion, resource_group\
| outputlookup azure_assets append=true\
| stats count