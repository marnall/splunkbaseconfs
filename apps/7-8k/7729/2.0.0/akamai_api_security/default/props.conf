[APISec-Change]
FIELDALIAS-change = changeType ASNEW change_type host ASNEW src link ASNEW dest path ASNEW object_path detectedAt ASNEW detectedAt_raw
FIELDALIAS-audit-log = operation ASNEW action sourceIp ASNEW src table ASNEW change_type userAgent ASNEW user_agent username ASNEW user_name actionTs ASNEW actionTs_raw
EVAL-_time = case(isnotnull(detectedAt), strptime(detectedAt, "%Y-%m-%dT%H:%M:%S.%6N"), isnotnull(actionTs), strptime(actionTs, "%Y-%m-%dT%H:%M:%S.%6N"), 1==1, _time)
MAX_TIMESTAMP_LOOKAHEAD = 50


[APISec-Finding]
FIELDALIAS-finding = link ASNEW url module ASNEW category triggeredOn ASNEW dest type ASNEW signature detectionTime ASNEW detectionTime_raw
EVAL-_time = strptime(detectionTime, "%a %b %d %Y %H:%M:%S")
MAX_TIMESTAMP_LOOKAHEAD = 50


[APISec-Incident]
FIELDALIAS-incident = "data.triggeredOn" ASNEW dest "data.typeName" ASNEW signature "data.createdAt" ASNEW createdAt_raw
FIELDALIAS-attacker = "data.identifierType" ASNEW ids_type "data.lastAttack" ASNEW lastAttack_raw "data.id" ASNEW signature
FIELDALIAS-incident-attacker = module ASNEW category attacker.identifierType ASNEW ids_type detectionTime ASNEW detectionTime_raw triggeredOn ASNEW dest type ASNEW signature
EVAL-src = case(isnotnull('data.attacker.originIps{}'), 'data.attacker.originIps{}', isnotnull('data.identifier'), 'data.identifier')
EVAL-user = case(isnotnull('data.attacker.userAgents{}'), 'data.attacker.userAgents{}', isnotnull('data.userAgents{}'), 'data.userAgents{}', isnotnull(user), user)
EVAL-severity = case(isnotnull('data.severity'), 'data.severity', isnotnull('data.risk'), 'data.risk', isnotnull(severity), severity)
EVAL-_time = case(isnotnull('data.lastAttack'), strptime('data.lastAttack', "%Y-%m-%dT%H:%M:%S.%6N"), isnotnull('data.createdAt'), strptime('data.createdAt', "%Y-%m-%dT%H:%M:%S.%6N"), isnotnull(detectionTime), strptime(detectionTime, "%a %b %d %Y %H:%M:%S"), 1==1, _time)
MAX_TIMESTAMP_LOOKAHEAD = 50
