[companies:house]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
REPORT-companies_house_extraction = companies_house_transforms
EVAL-IncorporationDate_epoc = strptime(IncorporationDate,"%d/%m/%Y")
EVAL-DissolutionDate_epoc = strptime(DissolutionDate,"%d/%m/%Y")
EVAL-Accounts.NextDueDate_epoc = strptime('Accounts.NextDueDate',"%d/%m/%Y")
EVAL-Accounts.LastMadeUpDate_epoc = strptime('Accounts.LastMadeUpDate',"%d/%m/%Y")
EVAL-Returns.NextDueDate_epoc = strptime('Returns.NextDueDate',"%d/%m/%Y")
EVAL-ConfStmtNextDueDate_epoc = strptime(ConfStmtNextDueDate,"%d/%m/%Y")
EVAL-ConfStmtLastMadeUpDate_epoc = strptime('ConfStmtLastMadeUpDate',"%d/%m/%Y")
EVAL-Returns.LastMadeUpDate_epoc = strptime('Returns.LastMadeUpDate',"%d/%m/%Y")
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false


[source::...ta-companieshouse*.log*]
sourcetype = tacompanieshouse:log

