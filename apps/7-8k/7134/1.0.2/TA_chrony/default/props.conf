# TA_chrony
# Based on the log format of chrony 4.4. See https://chrony-project.org/doc/4.4/chrony.conf.html.


# The following abbreviations are used in variable names:
#   auth = authentication
#   err  = error
#   freq = frequency
#   log  = logrithm
#   recv = receive
#   ref  = reference
#   seq  = sequence
#   sync = synchronization/synchronized
#   ts   = timestamp
#   xmit = transmit


[chrony]
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 20
TZ = UTC
TIME_FORMAT = %F %T
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TRANSFORMS-chrony = chrony_drop, chrony_sourcetype


# measurements
# a log of each packet received from an NTP source; includes rejected packets when "rawmeasurements" is logged

[chrony:measurements]
# EXTRACT-chrony-measurements = ^\S+\s\S+\s+(?<src>\S+)\s+(?<leap_status>\S+)\s+(?<src_stratum>\S+)\s+(?<passed_duplicate_packet_test>\S)(?<passed_bogus_packet_test>\S)(?<passed_validity_test>\S)\s+(?<passed_auth_failure_test>\S)(?<passed_unsync_src_test>\S)(?<passed_bad_header_data_test>\S)\s+(?<passed_maxdelay_test>\S)(?<passed_maxdelayratio_test>\S)(?<passed_maxdelaydevratio_test>\S)(?<passed_sync_loop_test>\S)\s+(?<local_poll_log>\S+)\s+(?<remote_poll_log>\S+)\s+(?<score>\S+)\s+(?<local_clock_err>\S+)\s+(?<peer_delay>\S+)\s+(?<peer_dispersion>\S+)\s+(?<root_delay>\S+)\s+(?<root_dispersion>\S+)\s+(?<src_ref>\S+)\s+(?<ntp_mode>\S)(?<ntp_mode_type>\S)\s+(?<local_xmit_ts_src>\S+)\s+(?<local_recv_ts_src>\S+)
EXTRACT-chrony-measurements = ^\S+\s\S+\s+(?<src>\S+)\s+(?<leap_status>\S+)\s+(?<src_stratum>\S+)\s+(?<passed_duplicate_packet_test>\S)(?<passed_bogus_packet_test>\S)(?<passed_invalid_test>\S)\s+(?<passed_auth_failure_test>\S)(?<passed_unsynchronized_test>\S)(?<passed_bad_header_data_test>\S)\s+(?<passed_max_delay_test>\S)(?<passed_max_delay_ratio_test>\S)(?<passed_max_delay_dev_ratio_test>\S)(?<passed_sync_loop_test>\S)\s+(?<local_poll_log>\S+)\s+(?<remote_poll_log>\S+)\s+(?<score>\S+)\s+(?<local_clock_err>\S+)\s+(?<peer_delay>\S+)\s+(?<peer_dispersion>\S+)\s+(?<root_delay>\S+)\s+(?<root_dispersion>\S+)\s+(?<src_ref>\S+)\s+(?<ntp_mode>\S)(?<ntp_mode_type>\S)\s+(?<local_xmit_ts_src>\S+)\s+(?<local_recv_ts_src>\S+)

# local_recv_ts_src_text: description of local_recv_ts_src
EVAL-local_recv_ts_src_text = case(local_recv_ts_src == "D", "daemon", local_recv_ts_src == "H", "hardware", local_recv_ts_src == "K", "kernel", true(), null())
# local_xmit_ts_src_text: description of local_xmit_ts_src
EVAL-local_xmit_ts_src_text = case(local_xmit_ts_src == "D", "daemon", local_xmit_ts_src == "H", "hardware", local_xmit_ts_src == "K", "kernel", true(), null())
# month_last_minute_seconds: number of seconds in the last minute of this month (for leap seconds)
EVAL-month_last_minute_seconds = case(leap_status == "N", 60, leap_status == "+", 61, leap_status == "-", 59, true(), null())
# ntp_mode_text: description of the mode and mode type
EVAL-ntp_mode_text = case(ntp_mode == "1", "active peer", ntp_mode == "2", "passive peer", ntp_mode == "4", "server", true(), "unknown") \
                     .case(ntp_mode_type == "B", " (basic)", ntp_mode_type == "I", " (interleaved)", true(), " (invalid)")
# local_poll: local polling interval in seconds instead of the base-2 logarithm of the seconds
EVAL-local_poll = pow(2, local_poll_log)
# remote_poll: remote polling interval in seconds instead of the base-2 logarithm of the seconds
EVAL-remote_poll = pow(2, remote_poll_log)
# src_ref_ipv4: the source reference as an IPv4 address instead of the hexadecimal representation thereof
EVAL-src_ref_ipv4 = tonumber(substr(src_ref, 1, 2), 16).".".tonumber(substr(src_ref, 3, 2), 16).".".tonumber(substr(src_ref, 5, 2), 16).".".tonumber(substr(src_ref, 7, 2), 16)

# the following EVALs convert extracted values to normal notation and are purely cosmetic
EVAL-local_clock_err = sigfig(local_clock_err)
EVAL-peer_delay = sigfig(peer_delay)
EVAL-peer_dispersion = sigfig(peer_dispersion)
EVAL-root_delay = sigfig(root_delay)
EVAL-root_dispersion = sigfig(root_dispersion)
EVAL-score = sigfig(score * 1.00)


# rtc
# system real-time clock log

[chrony:rtc]
EXTRACT-chrony-rtc = ^\S+\s\S+\s+(?<rtc_offset>\S+)\s+(?<valid_regression>\S+)\s+(?<predicted_rtc_offset>\S+)\s+(?<rtc_drift_ppm>\S+)\s+(?<N>\S+)\s+(?<same_sign_runs>\S+)\s+(?<mesurement_interval>\S+)


# refclocks
# raw and filtered reference clock measurements

[chrony:refclocks]
EXTRACT-chrony-refclocks = ^\S+\s\S+\s+(?<ref_id>\S+)\s+(?<driver_poll_seq>\S+)\s+(?<leap_status>\S+)\s+(?<is_pps>\S+)\s+(?<local_clock_err>\S+)\s+(?<local_clock_err_corrected>\S+)\s+(?<dispersion_assumed>\S+)

# unset the local_clock_err if it is filtered
EVAL-local_clock_err = if(local_clock_err == "-", null(), sigfig(local_clock_err))

# the following EVALs convert extracted values to normal notation and are purely cosmetic
EVAL-local_clock_err_corrected = sigfig(local_clock_err_corrected)
EVAL-dispersion_assumed = sigfig(dispersion_assumed)


# selection
# information about source selection

[chrony:selection]
EXTRACT-chrony-selection = ^\S+\s\S+\s+(?<src>\S+)\s+(?<state>\S+)\s+(?<selection_options>\S+)\s+(?<reachability>\S+)\s+(?<score>\S+)\s+(?<last_measurement_interval>\S+)\s+(?<interval_lower_endpoint>\S+)\s+(?<interval_upper_endpoint>\S+)

# state_text: description of the selection state
EVAL-state_text = case( \
  state == "N", "is noselect", \
  state == "s", "not synchronized", \
  state == "M", "insufficient measurements", \
  state == "d", "exceeds maximum root distance", \
  state == "~", "exceeds maximum jitter", \
  state == "w", "waiting for other sources in M-state", \
  state == "S", "measurements older than other sources", \
  state == "O", "stratum meets or exceeds orphan stratum", \
  state == "T", "disagrees with trusted sources", \
  state == "x", "is falseticker", \
  state == "W", "waiting for other source selectability", \
  state == "P", "other source with prefer option is preferred", \
  state == "U", "waiting for new measurement", \
  state == "D", "exceeds combinelimit root distance", \
  state == "+", "combined with best source", \
  state == "*", "selected best source", \
  true(), null())
# option_*: selection options configured for source; set if exists
EVAL-option_noselect = if(match(selection_options, "N"), 1, null())
EVAL-option_prefer = if(match(selection_options, "P"), 1, null())
EVAL-option_trust = if(match(selection_options, "T"), 1, null())
EVAL-option_require = if(match(selection_options, "R"), 1, null())

# the following EVALs convert extracted values to normal notation and are purely cosmetic
EVAL-last_measurement_interval = sigfig(last_measurement_interval)
EVAL-interval_lower_endpoint = sigfig(interval_lower_endpoint)
EVAL-interval_upper_endpoint = sigfig(interval_upper_endpoint)


# statistics
# information about the regression processing

[chrony:statistics]
# EXTRACT-chrony-statistics = ^\S+\s\S+\s+(?<src>\S+)\s+(?<measurements_stdev>\S+)\s+(?<offset>\S+)\s+(?<offset_stdev>\S+)\s+(?<differ_freq>\S+)\s+(?<skew>\S+)\s+(?<stress>\S+)\s+(?<N>\S+)\s+(?<starting_index>\S+)\s+(?<runs>\S+)\s+(?<network_jitter_asymmetry>\S+)
EXTRACT-chrony-statistics = ^\S+\s\S+\s+(?<src>\S+)\s+(?<measurements_stdev>\S+)\s+(?<offset>\S+)\s+(?<offset_stdev>\S+)\s+(?<drift>\S+)\s+(?<drift_err>\S+)\s+(?<rate_err_ratio>\S+)\s+(?<N>\S+)\s+(?<starting_index>\S+)\s+(?<runs>\S+)\s+(?<network_jitter_asymmetry>\S+)

# deprecated field names (will be removed)
EVAL-differ_freq = sigfig(drift)
EVAL-skew = sigfig(drift_err)
EVAL-stress = sigfig(rate_err_ratio)

# the following EVALs convert extracted values to normal notation and are purely cosmetic
EVAL-drift = sigfig(drift)
EVAL-drift_err = sigfig(drift_err)
EVAL-measurements_stdev = sigfig(measurements_stdev)
EVAL-network_jitter_asymmetry = sigfig(network_jitter_asymmetry)
EVAL-offset = sigfig(offset)
EVAL-offset_stdev = sigfig(offset_stdev)
EVAL-rate_err_ratio = sigfig(rate_err_ratio)


# tempcomp
# temperate measurements and compensation

[chrony:tempcomp]
EXTRACT-chrony-tempcomp = ^\S+\s\S+\s+(?<temperature>\S+)\s+(?<compensation_ppm>\S+)

# the following EVALs convert extracted values to normal notation and are purely cosmetic
EVAL-temperature = sigfig(temperature / 1000)
EVAL-compensation_ppm = sigfig(compensation_ppm)


# tracking
# gain or loss rates, slews

[chrony:tracking]
EXTRACT-chrony-tracking = ^\S+\s\S+\s+(?<src>\S+)\s+(?<local_stratum>\S+)\s+(?<freq_ppm>\S+)\s+(?<freq_ppm_err_interval>\S+)\s+(?<offset>\S+)\s+(?<leap_status>\S+)\s+(?<combined_sources>\S+)\s+(?<offset_stdev>\S+)\s+(?<remaining_offset_correction>\S+)\s+(?<ref_clock_network_delay>\S+)\s+(?<total_dispersion>\S+)\s+(?<max_clock_err>\S+)

# month_last_minute_seconds: number of seconds in the last minute of this month (for leap seconds)
EVAL-month_last_minute_seconds = case(leap_status == "N", 60, leap_status == "+", 61, leap_status == "-", 59, true(), null())

# the following EVALs convert extracted values to normal notation and are purely cosmetic
EVAL-max_clock_err = sigfig(max_clock_err)
EVAL-ref_clock_network_delay = sigfig(ref_clock_network_delay)
EVAL-offset = sigfig(offset)
EVAL-offset_stdev = sigfig(offset_stdev)
EVAL-remaining_offset_correction = sigfig(remaining_offset_correction)
EVAL-total_dispersion = sigfig(total_dispersion)
