# TA_chrony

# if the event does not start with a timestamp, drop it
[chrony_drop]
REGEX = ^(?!\d{4}-\d{2}-\d{2}\s).*
DEST_KEY = queue
FORMAT = nullQueue

# determine the source type from the name of the log file
[chrony_sourcetype]
REGEX = (measurements|rtc|refclocks|selection|statistics|tempcomp|tracking)
SOURCE_KEY = MetaData:Source
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::chrony:$1
