[delete_tisc_kv_store]
action.email = 1
cron_schedule = 0 0 * * *
description = "Deletes records where the difference between current time and kvlookup_updated_time exceeds the number of days specified in 'kvlookup_days_till_expiry' from the KV store 'threat_intel_store_test_again'"
dispatch.earliest_time = -30m
dispatch.latest_time = now
enableSched = 1
search = inputlookup tisc_store_lookup \
         eval time_difference = now() - strptime(kvlookup_updated_time, "%Y-%m-%dT%H:%M:%S.%3NZ") \
         eval expiry_threshold = kvlookup_days_till_expiry * 86400 \
         where time_difference > expiry_threshold \
         outputlookup tisc_store_lookup