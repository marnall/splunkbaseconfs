[extrahop-rx360-detection]
SHOULD_LINEMERGE = 0
pulldown_type = 1
EVAL-src_ip = case(isnotnull('src.hostname') and ('src.hostname' != "null") and (len('src.hostname') != 0), 'src.hostname', isnotnull('src.ipaddr') and ('src.ipaddr' != "null") and (len('src.ipaddr') != 0), 'src.ipaddr', isnotnull('src.device.name') and ('src.device.name'!="null") and (len('src.device.name') != 0),'src.device.name',1 = 1, "Unknown Source")
EVAL-dest_ip = case(isnotnull('dst.hostname') and ('dst.hostname' != "null") and (len('dst.hostname') != 0), 'dst.hostname', isnotnull('dst.ipaddr') and ('dst.ipaddr' != "null") and (len('dst.ipaddr') != 0), 'dst.ipaddr', isnotnull('dst.device.name') and ('dst.device.name'!="null") and (len('dst.device.name') != 0),'dst.device.name',1 = 1, "Unknown Destination")