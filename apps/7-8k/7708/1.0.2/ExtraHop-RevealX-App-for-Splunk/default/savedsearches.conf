[ExtraHop Correlation Rule - Low Severity]
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.expires = 30d
alert.severity = 2
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = This Correlation rule generates detections for low severity based on risk score. If risk score is in between 1 to 30.
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `extrahop_index` sourcetype=extrahop-rx360-detection recommended="true" risk_score>=1 risk_score<=30

