# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 2

[launcher]
author = Karthik Raja Balasubramanian and Raghavi Manga
version = 2.0.0
description = This custom Splunk modular input add on connects to an Object Storage system’s Prometheus API authenticated through Keycloak, retrieves operational metrics, and ingests them into Splunk for monitoring, alerting, and analytics.

[ui]
is_visible = 1
label = Hitachi VSP One Object Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-hitachi-vsp-one-object-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_hitachi_vsp_one_object_add_on_for_splunk_account = simple
reload.ta_hitachi_vsp_one_object_add_on_for_splunk_settings = simple
reload.passwords = simple

