
[illumio:pce]
EVAL-action = case(match(event_type, "create"), "created", like(event_type, "%.update"), "updated", like(event_type, "%.delete"), "deleted", isnotnull('status') AND 'status'!="null" AND match('event_type', "user.auth|user.sign|user.log|user.pce_session|user.use_expired_password"),'status', (isnull('status') OR 'status'=="null") AND match('event_type', "user.auth|user.sign|user.log|user.pce_session|user.use_expired_password"),null(), 1==1, "modified")
EVAL-body = case(event_type="request.internal_server_error", 'event_type')
EVAL-change_type = case(like('event_type', "user.create_session"), "session", 'event_type'=="pairing_profile.create_pairing_key", "pairing_key", 'event_type'=="request.authorization_failed", "request", 1==1, 'change_type')
EVAL-description = case(event_type="request.internal_server_error", 'event_type')
EVAL-object = case('event_type'=="pairing_profile.create_pairing_key" OR 'event_type'=="request.authorization_failed", 'event_type', 1==1, 'object')
EVAL-object_category = case('event_type'=="pairing_profile.create_pairing_key" OR 'event_type'=="request.authorization_failed", replace('event_type', "([^\.]+)\..+", "\1"), 1==1, 'object_category')
EVAL-signature = 'event_type'
EVAL-src = 'notifications{}.info.src_ip'
EVAL-src_ip = 'notifications{}.info.src_ip'
EVAL-subject = case(event_type="request.internal_server_error", 'event_type')
EVAL-type = case(event_type="request.internal_server_error", "alert")
EVAL-vendor_product = "Illumio:PCE"

[illumio:pce:collector]
EVAL-action =  case(pd=0 OR pd="0", "allowed", pd=1 OR pd="1" OR pd=2 OR pd="2", "blocked", 1==1, "unknown")