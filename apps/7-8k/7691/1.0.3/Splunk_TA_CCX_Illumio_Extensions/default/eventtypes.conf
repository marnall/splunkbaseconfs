
[ccx_illumio_pce_alert]
search = (sourcetype="illumio:pce") event_type="request.internal_server_error"
# tags = alert

[ccx_illumio_pce_authentication]
search = (sourcetype="illumio:pce") (category="auditable" (event_type="user.authenticate" OR event_type="users.auth_token" OR event_type="user.sign*" OR event_type="user.log*" OR (event_type="user.pce_session*" AND NOT event_type="user.pce_session_terminated") OR event_type="user.use_expired_password"))
# tags = authentication

[ccx_illumio_pce_failed_authentication]
search = (sourcetype="illumio:pce") event_type="request.authentication_failed"

[ccx_illumio_pce_change]
search = (sourcetype="illumio:pce") event_type="pairing_profile.create_pairing_key" OR event_type="request.authorization_failed"
# tags = change account

[ccx_illumio_pce_create_session]
searrch = (sourcetype="illumio:pce") event_type="user.create_session"

[ccx_illumio_pce_endpoint_offline_check]
search = (sourcetype="illumio:pce") event_type="system_task.endpoint_offline_check"

[ccx_illumio_pce_session_terminated]
search = (sourcetype="illumio:pce") event_type="user.pce_session_terminated"

[ccx_illumio_pce_health]
search = (sourcetype="illumio:pce:health")

[ccx_illumio_pce_ip_lists]
search = (sourcetype="illumio:pce") illumio_type="illumio:pce:ip_lists"

[ccx_illumio_pce_labels]
search = (sourcetype="illumio:pce") illumio_type="illumio:pce:labels"

[ccx_illumio_pce_rule_sets]
search = (sourcetype="illumio:pce") illumio_type="illumio:pce:rule_sets"

[ccx_illumio_pce_services]
search = (sourcetype="illumio:pce") illumio_type="illumio:pce:services"

[ccx_illumio_pce_workloads]
search = (sourcetype="illumio:pce") illumio_type="illumio:pce:workloads"
