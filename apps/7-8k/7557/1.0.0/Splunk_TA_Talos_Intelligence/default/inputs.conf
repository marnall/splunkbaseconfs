[threatlist://talos_intelligence_ip_blacklist]
debug = 0
delim_regex = :
description = The IP Blacklist is automatically updated every 15 minutes and contains a list of known malicious network threats that are flagged on all Cisco Security Products
file_parser = auto
ignore_regex = (^#|^\s*$)
interval = 43200
is_threatintel = 1
max_age = -30d
max_size = 52428800
retries = 3
retry_interval = 60
sinkhole = 1
skip_header_lines = 0
timeout = 30
type = threatlist
url = https://www.talosintelligence.com/documents/ip-blacklist
weight = 60
parse_modifiers = {    "certificate_attribute_breakout": 1,    "idna_encode": 1,    "domain_from_url": 0}
fields = ip:$1,description:Talos_IP_Blocklist
disabled = 1