
[admin:Splunk_TA_Talos_Intelligence]
match = /
members = Splunk_TA_Talos_Intelligence_account, Splunk_TA_Talos_Intelligence_account2, Splunk_TA_Talos_Intelligence_settings

[admin_external:Splunk_TA_Talos_Intelligence_account]
handlertype = python
python.version = python3
handlerfile = Splunk_TA_Talos_Intelligence_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:Splunk_TA_Talos_Intelligence_settings]
handlertype = python
python.version = python3
handlerfile = Splunk_TA_Talos_Intelligence_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[script:Splunk_TA_Talos_Intelligence_rest_handler]
match = /query_reputation
script = Splunk_TA_Talos_Intelligence_rest_handler.py
scripttype = persist
handler = application.CustomTalosApiHandler
passSystemAuth = true
passPayload = true
capability.post = get_talos_enrichment
python.version = python3