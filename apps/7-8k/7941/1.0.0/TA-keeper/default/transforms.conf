#
# Keeper.io Add-on for Splunk
#
# File:         transforms.conf
#
#

[keeper_src_user]
REGEX = username\":\"(?<src_user>[^\"]+)

[keeper_location]
REGEX = location\":\"(?<location>[^\"]+)

[keeper_activity]
REGEX = activity\":\"(?<activity>[^\"]+)

[keeper_user]
REGEX = user '(?<user>[^\']+)

[keeper_device]
REGEX = device\":\"(?<device>[^\"]+)

[keeper_authentication_method]
REGEX = logged in\s*to .* \('(?<authentication_method>[^\']+)'\)

[keeper_record_uid]
REGEX = record UID '(?<record_uid>[^\']+)'

[keeper_src_country]
REGEX = \w+, \w+, (?<src_country>[^\"]+)