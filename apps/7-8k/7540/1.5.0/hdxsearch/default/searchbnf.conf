# There is seemingly a Splunk bug where descriptions from `-options` stanzas are omitted entirely
# from even the "Full" search assistant mode, so all descriptions live in the `-command` stanzas
[hdxsearch-command]
syntax = hdxsearch table=<field> <hdxsearch-selector-options> (<hdxsearch-options>)*
shortdesc = Queries a Hydrolix table and generates events.
description = Queries a Hydrolix cluster and generates events for Splunk to consume. \p\\
    The "table" argument is required and must be in the form "project.table". \p\\
    At least one of "fields" or "raw" must be specified. Use "fields" to select specific columns \
    (comma-delimited list, or "*" for all columns). Use "raw" to send the raw value of a single \
    field to the Event column. \p\\
    The "where" argument accepts a SQL expression to filter results. Predicates on summary alias \
    columns are automatically rewritten to a HAVING clause. \p\\
    The "time" argument specifies which field to use as the event timestamp. If omitted, the \
    primary key of the table is used. \p\\
    The "cluster" argument selects which configured Hydrolix cluster to query. If omitted, the \
    default cluster is used. \p\\
    The "limit" argument caps the number of rows returned. Set to 0 to retrieve all rows. Defaults \
    to the limit configured for the cluster. \p\\
    The "nocache" argument, when set to true, excludes query results from Hydrolix query caching.
usage = public
example1 = hdxsearch table="hydro.logs" fields="app,source_type,message"
comment1 = Query the hydro.logs table for specific fields.
example2 = hdxsearch table="hydro.logs" raw="message" where="app='query-head'"
comment2 = Query raw event messages filtered by app.
tags = hydro,hydrolix,hdx,query
related = hdxdescribe

[hdxsearch-selector-options]
syntax = fields=<field-list> | raw=<field>

[hdxsearch-options]
syntax = where=<string> | time=<field> | cluster=<field> | limit=<int> | nocache=<bool>

[hdxdescribe-command]
syntax = hdxdescribe (<hdxdescribe-table-options> | <hdxdescribe-project-options>)? (cluster=<field>)?
shortdesc = Describes the schema of Hydrolix tables or lists projects and tables.
description = Describes the schema of Hydrolix tables or lists all available projects and tables. \p\\
    With no arguments, lists all projects and their tables on the default cluster. \p\\
    With "table" specified (in the form "project.table"), returns the column names and types \
    for that table. \p\\
    With "project" specified, lists all tables within that project. \p\\
    The "table" and "project" arguments are mutually exclusive. \p\\
    The "cluster" argument selects which configured Hydrolix cluster to query. If omitted, the \
    default cluster is used.
usage = public
example1 = hdxdescribe
comment1 = List all projects and tables on the default cluster.
example2 = hdxdescribe table="hydro.logs"
comment2 = Describe the columns and types in the hydro.logs table.
example3 = hdxdescribe project="hydro"
comment3 = List all tables in the hydro project.
tags = hydro,hydrolix,hdx,describe,schema,tables,projects
related = hdxsearch

[hdxdescribe-table-options]
syntax = table=<field>

[hdxdescribe-project-options]
syntax = project=<field>

[hdxsql-command]
syntax = hdxsql query=<string> (cluster=<field>)? (params=<json>)? (maxrows=<int>)? (timeout=<int>)? (fetchsize=<int>)? (comment=<string>)?
shortdesc = Runs a user-supplied ClickHouse SELECT on a Hydrolix cluster and streams the result rows.
description = Executes a user-supplied ClickHouse query on a configured Hydrolix cluster and streams \
    the result rows into the Splunk pipeline. The "query" argument is required and must be a single \
    read-only statement: SELECT, UNION/INTERSECT/EXCEPT of SELECTs, WITH ... SELECT, or EXPLAIN of \
    any of the above. \p\\
    Result columns pass through verbatim: each column name (or alias) becomes the Splunk field \
    name. To populate Splunk-recognized fields, alias columns in your SELECT (for example \
    "toUnixTimestamp(ts) AS _time" or "hostname AS host"). The same alias pattern works for \
    "source", "sourcetype", "_raw", "_indextime", or any other Splunk-recognized field. \p\\
    hdxsql does NOT auto-inject the Splunk time window. To time-bound a query, use the standard \
    "makeresults | addinfo" subsearch pattern that builds the SQL with info_min_time and \
    info_max_time and pipes the result string into hdxsql. On Hydrolix 6.0+, "params=" is the \
    preferred shape for any scalar value. \p\\
    The "params" argument is a JSON-encoded mapping bound through to ClickHouse parameter \
    placeholders ({name:Type}) in the query. Values are bound at the request layer and never \
    interpolated into the SQL string. Requires Hydrolix 6.0+; older clusters reject params= with \
    a version-explicit error. \p\\
    The "maxrows" argument caps the total result count via the hdx_query_max_result_rows SETTING \
    and an AST-level LIMIT clamp. The "timeout" argument bounds query execution time via \
    hdx_query_max_execution_time. The "fetchsize" argument maps to ClickHouse max_block_size. The \
    "comment" argument is forwarded as hdx_query_comment for attribution in Hydrolix query \
    telemetry. The "cluster" argument selects which configured Hydrolix cluster to query and \
    defaults to the configured default. \p\\
    User-supplied SETTINGS pass through unchanged for non-reserved keys. The following keys are \
    connector-controlled and override any user-supplied value: hdx_query_admin_comment, readonly, \
    hdx_query_max_memory_usage, hdx_query_max_attempts, and the option-mapped keys \
    hdx_query_max_execution_time, hdx_query_max_result_rows, max_block_size. When both an inline \
    SETTINGS hdx_query_comment and a comment= option are supplied, the two strings are \
    concatenated as "inline; option" so neither half of user intent is dropped. \p\\
    Safety: the query is parsed and validated before any HTTP call. Multi-statement input is \
    rejected. INTO OUTFILE is rejected. The functions file, url, remote, remoteSecure, \
    clusterAllReplicas, and executeQuery are rejected anywhere in the AST.
usage = public
example1 = hdxsql query="SELECT version()"
comment1 = Run a basic ClickHouse query and stream the result.
example2 = hdxsql query="SELECT toUnixTimestamp(timestamp) AS _time, hostname AS host FROM hydro.logs"
comment2 = Alias columns to populate Splunk-recognized fields like _time and host.
example3 = | hdxsql query=[ makeresults | addinfo | eval query="SELECT app, count() AS n FROM hydro.logs WHERE timestamp >= toDateTime(".info_min_time.") AND timestamp < toDateTime(".info_max_time.") GROUP BY app" | return query ]
comment3 = Time-bound the query to the Splunk time picker via the addinfo subsearch pattern.
example4 = hdxsql query="SELECT count() FROM hydro.logs WHERE app = {app:String}" params="{\"app\":\"checkout\"}"
comment4 = Bind a value via params= to a ClickHouse parameter placeholder (Hydrolix 6.0+).
tags = hydro,hydrolix,hdx,sql,query
related = hdxsearch,hdxdescribe

[hdxsql-options]
syntax = cluster=<field> | params=<json> | maxrows=<int> | timeout=<int> | fetchsize=<int> | comment=<string>
