# Logging configuration for hdxsearch Splunk app.
# Each command logs to its own rotating file under $SPLUNK_HOME/var/log/splunk/,
# which Splunk tails and indexes into index=_internal.
# Separate log files are used per command to avoid concurrent write corruption —
# each command runs as a separate process, and RotatingFileHandler is not process-safe.

[loggers]
keys=root,HdxSearch,HdxDescribe

[handlers]
keys=rotatingFileHandler,rotatingFileHandlerDescribe

[formatters]
keys=searchCommandFormatter

# Root logger: WARNING only — catches anything not handled by a named logger
[logger_root]
level=WARNING
handlers=rotatingFileHandler

[logger_HdxSearch]
level=INFO
handlers=rotatingFileHandler
qualname=HdxSearch
propagate=0

[logger_HdxDescribe]
level=INFO
handlers=rotatingFileHandlerDescribe
qualname=HdxDescribe
propagate=0

# Rotating at 5MB, keeping 5 backups
[handler_rotatingFileHandler]
class=handlers.RotatingFileHandler
level=NOTSET
formatter=searchCommandFormatter
args=('%(SPLUNK_HOME)s/var/log/splunk/hdxsearch.log', 'a', 5000000, 5)

[handler_rotatingFileHandlerDescribe]
class=handlers.RotatingFileHandler
level=NOTSET
formatter=searchCommandFormatter
args=('%(SPLUNK_HOME)s/var/log/splunk/hdxdescribe.log', 'a', 5000000, 5)

[formatter_searchCommandFormatter]
format=%(asctime)s %(levelname)-8s %(thread)d %(name)s %(message)s
