methods = POST, GET

[expose:TA_datalake2splunk_account_specified]
pattern = TA_datalake2splunk_account/*
methods = POST, GET, DELETE

[expose:TA_datalake2splunk_settings]
pattern = TA_datalake2splunk_settings
methods = POST, GET

[expose:TA_datalake2splunk_settings_specified]
pattern = TA_datalake2splunk_settings/*
methods = POST, GET, DELETE

[expose:TA_datalake2splunk_datalake2splunk]
pattern = TA_datalake2splunk_datalake2splunk
methods = POST, GET

[expose:TA_datalake2splunk_datalake2splunk_specified]
pattern = TA_datalake2splunk_datalake2splunk/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
