[ccx_mcafee_mvisioncloud_syslog_extraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = ([^\=;|]+)\=([^\=]+)(?:\s|$|,)

[ccx_mcafee_mvisioncloud_syslog_info_extraction]
CLEAN_KEYS = 0
REGEX = (?<ip>(?:(?:\d{1,3}\.){3}\d{1,3}))\s+(?<log_date>\w+\s+\d+)\s+(?<log_time>\S+)\s+(?<host_name>\S+)\s+(?:CEF\:0)\|(?<device_vendor>[^\|]+)\|(?<device_product>[^\|]+)\|(?<device_version>[^\|]+)\|(?<log_type>[^\|]+)\|(?<event_name>[^\|]+)\|(?<log_severity>[^\|]+)\|

