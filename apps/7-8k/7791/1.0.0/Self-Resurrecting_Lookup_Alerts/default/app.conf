#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = Self-Resurrecting Lookup Alerts (SRLA)

[launcher]
author = Gregg Woodcock (Woodcock@Splunxter.com)
description = This approach to protecting important lookup data is SUPER-efficient and resilient and should work on ANY lookup/alert. It has no overhead or maintenace because it leverages the results of the previous alert run to replace the data, if it ever needs to, requiring NO OTHER knowledge objects (besides the 3 shared macros).
version = 1.0.0

[package]
id = Self-Resurrecting_Lookup_Alerts
check_for_updates = 1

[id]
name = Self-Resurrecting_Lookup_Alerts
version = 1.0.0
