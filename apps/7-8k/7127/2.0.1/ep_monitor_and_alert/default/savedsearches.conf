[EP Destination Failures]
disabled = 0
alert.track = 1
cron_schedule = 45 * * * *
dispatch.latest_time = now
dispatch.earliest_time = -1h
display.general.type = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = ep_monitor_and_alert
description = Monitors and alerts upon EP failures to send events to destination
search = | mstats sum(write_to_sink_errors_total) as export_failures_total where index=_metrics by dataset_name | where export_failures_total>0

[EP Duplicates]
disabled = 0
alert.track = 1
cron_schedule = 0 */4 * * *
dispatch.latest_time = now
dispatch.earliest_time = -1h
display.general.type = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = ep_monitor_and_alert
description = Monitors and alerts upon EP sending duplicates to any destination
search = index=* | stats count by _raw | where count>1

[EP Node Not Responding]
disabled = 0
alert.track = 1
cron_schedule = 45 * * * *
dispatch.latest_time = now
dispatch.earliest_time = -1h
display.general.type = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = ep_monitor_and_alert
description = Monitors and alerts upon EP nodes failing to report after reporting last hour
search = index=_internal sourcetype=edge-log earliest=-1h@h latest=now | bin span=1h _time | stats dc(hostname) AS nodes_active_past_hour values(hostname) AS current_nodes by _time | appendcols [ search index=_internal sourcetype=edge-log earliest=-2h@h latest=-1h@h | bin span=1h _time | stats dc(hostname) AS nodes_active_two_hours_ago values(hostname) AS nodes_from_two_hours_ago] | sort + _time | head 1 | where nodes_active_per_hour_older>nodes_active_per_hour

[EP Out of Sync Versions]
disabled = 0
alert.track = 1
cron_schedule = 45 * * * *
dispatch.latest_time = now
dispatch.earliest_time = -1h
display.general.type = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = ep_monitor_and_alert
description = Monitors and alerts upon EP nodes having different commit versions
search = index=_internal sourcetype=edge-log | stats latest(version) as Version latest(commit) as Commit by hostname | stats dc(Version) AS Version_count dc(Commit) AS Commit_count | where Version_count>1 OR Commit_count>1


[EP Queue Over 90% Full]
disabled = 0
alert.track = 1
cron_schedule = 45 * * * *
dispatch.latest_time = now
dispatch.earliest_time = -1h
display.general.type = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = ep_monitor_and_alert
description = Monitors and alerts upon EP nodes having over 90% of the queue full
search = | mstats latest(exporter_queue_size) as current_queue_size latest(exporter_queue_capacity) as current_queue_capacity where index=_metrics by exporter | eval delta_perc=current_queue_size/current_queue_capacity | where delta_perc>.9



