[dellaiopsimevent-command]
syntax = dellaiopsimevent severity=<severity>
usage = public
description = Streaming command to push search results to AIOps Incident Management

[adddellaiopsimevent-command]
syntax = adddellaiopsimevent
usage = public
description = Command to add AIOps Incident Management alert action to all the saved searches

[removedellaiopsimevent-command]
syntax = removedellaiopsimevent
usage = public
description = Command to remove AIOps Incident Management alert action from all the saved searches
