[anetac_windows_security(1)]
args = index_name
# this marcos searches for windows security events
definition = index = $index_name$ source IN ("WinEventLog:Security", "WindowsEventLog:Security", "WinEventLog:ForwardedEvents", "WindowsEventLog:ForwardedEvents") EventCode IN (4624, 4625, 4634, 4647, 4648, 6038, 8001, 8002, 4776, 4742, 4768, 4769, 4770, 4738, 4728, 4729, 4732, 4733, 4756, 4757, 4746, 4747, 4751, 4752, 4672, 4727, 4731, 4754, 4759, 4744, 4749, 4728, 4732, 4756, 4761, 4746, 4751, 4729, 4733, 4757, 4762, 4747, 4752, 4730, 4734, 4758, 4748, 4753, 4763, 4735, 4737, 4745, 4750, 4755, 4760, 4662, 5136, 5137, 5139, 5141, 4738)

[anetac_windows_auth(1)]
args = index_name
# this marcos searches for windows logon/logoff events
definition = index = $index_name$ source IN ("WinEventLog:Security", "WindowsEventLog:Security", "WinEventLog:ForwardedEvents", "WindowsEventLog:ForwardedEvents") EventCode IN (4624, 4625, 4634, 4647)