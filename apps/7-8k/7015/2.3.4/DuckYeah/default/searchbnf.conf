[drake-command]
comment1 = Performs local checks to enable Duck Yeah!
description = Generating command that performs local checks to ensure you aren't flying\
    off the edge of the Earth. These checks are usually succinct; however, they need to\
    be performed. This does not interact with the API and does not need a SESSION_ID
example1 = drake quack=localconf package=DuckYeah
shortdesc = Generating command that performs checks against the target environment.
syntax = drake (<drake-options>)
usage = public

[drake-options]
description = drake allows Duck Yeah! to perform required checks, such as determining\
    which configurations exist in local to allow you to pass an exclusion list to the\
    Duck Yeah! API. As a generating command, it cannot determine the package from\
    upstream events and must be told.
syntax = quack=<operation> | package=<package>

[harlequin-command]
comment1 = Interacts with the Duck Yeah! API.
description = Streaming command that creates, retrieves status of, and retrieves packages\
    from the Duck Yeah! API. This is a gated service; you must either have a contract or\
    pre-purchase credits to run build operations.
example1 = harlequin quack=build
shortdesc = Streaming command that retrieves or updates data from the Duck Yeah! API.
syntax = harlequin (<harlequin-options>)
usage = public

[harlequin-options]
description = harlequin allows interaction with the Duck Yeah! API using the specified\
    HTTP 'method' against the endpoint specified with 'quack'. harlequin is a streaming\
    command and should be used after the necessary fields for invoking the API call have\
    been defined.
syntax = quack=<query> | method=METHOD | session=SESSION_ID

[mallard-command]
comment1 = Performs local checks to enable Duck Yeah!
description = Streaming command that performs local checks to ensure you aren't flying\
    off the edge of the Earth. These checks are usually succinct; however, they need to\
    be performed. This does not interact with the API and does not need a SESSION_ID
example1 = mallard quack=gitcheck
shortdesc = Streaming command that performs checks against the target environment.
syntax = mallard (<mallard-options>)
usage = public

[mallard-options]
description = mallard allows Duck Yeah! to perform required checks, such as ensuring the\
    selected app resides in a git repository. Over the years we've learned not to be too\
    careful in guardrails against ducking up automated app packaging.
syntax = quack=<check>

[mandarin-command]
comment1 = Interacts with the Duck Yeah! API.
description = Generating command that retrieves status of and retrieves packages\
    from the Duck Yeah! API. This is a gated service; you must either have a contract or\
    pre-purchase credits to run build operations.
example1 = mandarin quack=build
shortdesc = Generating command that retrieves data from the Duck Yeah! API.
syntax = mandarin (<mandarin-options>)
usage = public

[mandarin-options]
description = mandarin allows interaction with the Duck Yeah! API using the GET\
    HTTP method against the endpoint specified with 'quack'. mandarin is a generating\
    command and should be used as the first command in a search.
syntax = quack=<query> | session=SESSION_ID
