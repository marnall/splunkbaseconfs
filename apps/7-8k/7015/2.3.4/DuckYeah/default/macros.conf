[format_contract_details]
definition = | eval\
    base_rate = "$" + base_rate,\
    contract_pct_used = contract_pct_used + "%",\
    do_not_exceed = if(\
        do_not_exceed > 0,\
        "$" + tostring(do_not_exceed, "commas"),\
        "N/A"\
    ),\
    effective_date = strftime(effective_date, "%B %e, %Y"),\
    end_date = strftime(end_date-1, "%B %e, %Y"),\
    overage_cost = "$" + tostring(overage_cost, "commas"),\
    overage_mode = case(\
        overage_mode == "default", "Unlimited overage",\
        overage_mode == "halt", "No overage",\
        overage_mode == "do_not_exceed", "Do not exceed " + do_not_exceed + " including subscription cost"\
    )
iseval = 0
