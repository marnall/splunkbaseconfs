[VSPOneObject]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...ta-hitachi-vsp-one-object*.log*]
sourcetype = tahitachivsponeobject:log

[source::...ta_hitachi_vsp_one_object*.log*]
sourcetype = tahitachivsponeobject:log

[prometheusmetrics]
EVAL-broken_http3_count = case( metric_name=="voo_envoy_cluster_upstream_http3_broken",mvindex(values,1))
EVAL-control_frame_flood_count = case( metric_name=="voo_envoy_cluster_http2_outbound_control_flood",mvindex(values,1))
EVAL-flood_request_count = case( metric_name=="voo_envoy_cluster_http2_outbound_flood",mvindex(values,1))
EVAL-metadata_empty_frames_count = case( metric_name=="voo_envoy_cluster_http2_metadata_empty_frames",mvindex(values,1))
EVAL-metric_value = case( metric_name=="pushgateway_http_requests_total", request_count, metric_name=="pushgateway_http_push_duration_seconds", request_duration, metric_name=="pushgateway_http_push_size_bytes", request_size, metric_name=="scrape_samples_scraped", scrape_sample_count )
EVAL-priority_frame_flood_count = case( metric_name=="voo_envoy_cluster_http2_inbound_priority_frames_flood",mvindex(values,1))
EVAL-refused_error_count = case( metric_name=="voo_envoy_cluster_http2_stream_refused_errors",mvindex(values,1))
EVAL-request_count = case( metric_name=="pushgateway_http_requests_total",mvindex(values,1))
EVAL-request_duration = case( metric_name=="pushgateway_http_push_duration_seconds",mvindex(values,1))
EVAL-request_reset_count = case( metric_name=="voo_envoy_cluster_upstream_rq_rx_reset",mvindex(values,1))
EVAL-request_size = case( metric_name=="pushgateway_http_push_size_bytes",mvindex(values,1))
EVAL-reset_count = case( metric_name=="voo_envoy_cluster_http2_rx_reset",mvindex(values,1))
EVAL-scrape_sample_count = case( metric_name=="scrape_samples_scraped",mvindex(values,1))
EVAL-time = mvindex(values, 0)
EVAL-total_http3_connections = case( metric_name=="voo_envoy_cluster_upstream_cx_http3_total",mvindex(values,1))
FIELDALIAS-aob_gen_prometheusmetrics_alias_1 = metric.__name__ AS metric_name
FIELDALIAS-aob_gen_prometheusmetrics_alias_10 = metric.job AS job_name
FIELDALIAS-aob_gen_prometheusmetrics_alias_11 = metric.instance AS server_instance
FIELDALIAS-aob_gen_prometheusmetrics_alias_12 = metric.handler AS handler
FIELDALIAS-aob_gen_prometheusmetrics_alias_2 = value{} AS values
FIELDALIAS-aob_gen_prometheusmetrics_alias_3 = metric.code AS http_status
FIELDALIAS-aob_gen_prometheusmetrics_alias_4 = metric.cluster_name AS cluster_name
FIELDALIAS-aob_gen_prometheusmetrics_alias_5 = metric.quantile AS quantile
FIELDALIAS-aob_gen_prometheusmetrics_alias_6 = metric.method AS http_method
FIELDALIAS-aob_gen_prometheusmetrics_alias_7 = metric.kubernetes_service	 AS kubernetes_service
FIELDALIAS-aob_gen_prometheusmetrics_alias_8 = metric.kubernetes_namespace AS kubernetes_namespace
FIELDALIAS-aob_gen_prometheusmetrics_alias_9 = metric.kubernetes_pod AS kubernetes_pod
INDEXED_EXTRACTIONS = json
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
category = Structured
description = JavaScript Object Notation format. For more information, visit http://json.org/
pulldown_type = 1

[source::...vsp1oalerts_modalert.log*]
sourcetype = tahitachivsponeobject:log

