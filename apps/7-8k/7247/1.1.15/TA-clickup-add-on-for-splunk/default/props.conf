[clickup:teamspace]
DATETIME_CONFIG=CURRENT
SHOULD_LINEMERGE=true
LINE_BREAKER=([\n\r]*)\{[\n\r\s]*"user"
NO_BINARY_CHECK=true

[clickup:folder_list_task]
CHARSET=AUTO
SHOULD_LINEMERGE=true
disabled=false
LINE_BREAKER=([\r\n]*)[^:]\{\s*"id":\s*"[\w\d]*",\s*"custom_id"
INDEXED_EXTRACTIONS=json
KV_MODE=none
category=Structured
DATETIME_CONFIG=CURRENT

[clickup:folderless_list_task]
CHARSET=AUTO
SHOULD_LINEMERGE=true
disabled=false
LINE_BREAKER=([\r\n]*)[^:]\{\s*"id":\s*"[\w\d]*",\s*"custom_id"
INDEXED_EXTRACTIONS=json
KV_MODE=none
category=Structured
DATETIME_CONFIG=CURRENT

[TA-clickup-add-on-for-splunk]
SEDCMD-501 = s/("|')message("|'):\s*("|')501("|')/"message" : "Activation Key mismatch or invalid characters detected."/g
SEDCMD-502 = s/("|')message("|'):\s*("|')502("|')/"message" : "Trial License Expired"/g
SEDCMD-503 = s/("|')message("|'):\s*("|')503("|')/"message" : "Annual Key is Expired"/g
SEDCMD-504= s/("|')message("|'):\s*("|')505("|')/"message" : "Activation Key validation failed. Please enter the correct key."/g