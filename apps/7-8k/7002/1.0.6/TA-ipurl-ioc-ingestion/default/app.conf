# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Donald Egbenyon
version = 1.0.6
description = The Add-on downloads IOCs for IPs, URLs and Domains from ProofPoint IP blocklist, Abuse CNC blocklist,  URLHAUS, Osint digitalside domains, Openphish URLs, malicious domains from Mitchell Krogza github and romainmarcoux github.

[ui]
is_visible = 1
label = ipurl ioc ingestion
docs_section_override = AddOns:released

[package]
id = TA-ipurl-ioc-ingestion

[triggers]
reload.addon_builder = simple
reload.ta_ipurl_ioc_ingestion_account = simple
reload.ta_ipurl_ioc_ingestion_settings = simple
reload.passwords = simple

