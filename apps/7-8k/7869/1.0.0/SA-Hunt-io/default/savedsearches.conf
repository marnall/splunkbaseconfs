[hunt_io_detect_c2_feed_match_src_ip]
search = | tstats count from datamodel=Network_Traffic by All_Traffic.action All_Traffic.bytes All_Traffic.bytes_in All_Traffic.bytes_out All_Traffic.dest All_Traffic.dest_ip All_Traffic.dest_port All_Traffic.direction All_Traffic.src All_Traffic.src_ip All_Traffic.src_port All_Traffic.transport All_Traffic.user All_Traffic.vendor_product \
| rename All_Traffic.* as * \
| eval alert_time=now() \
| convert timeformat="%Y-%m-%dT%H:%M:%S" ctime(alert_time) \
| lookup c2_feed_lookup ip as src_ip OUTPUT ip hostname country_code malware_name malware_subsystem timestamp confidence \
| eval matched = if(isnotnull(malware_name), 1, 0) \
| search matched = 1 \
| outputlookup append=true c2_alerts_ip_lookup 
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 1
cron_schedule = 0 7 * * *
enableSched = 1

