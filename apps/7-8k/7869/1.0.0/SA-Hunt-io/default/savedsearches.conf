[hunt_io_delete_c2_feed_alerts_older_than_7_days]
search = | inputlookup c2_alerts_ip_lookup \
| eval current_time=now() \
| eval alert_time_epoch=strptime(alert_time, "%Y-%m-%dT%H:%M:%S") \
| eval time_diff_seconds=current_time-alert_time_epoch \
| eval time_diff_days=time_diff_seconds/86400 \
| where time_diff_days <= 7 \
| fields - current_time alert_time_epoch time_diff_seconds time_diff_days \
| outputlookup c2_alerts_ip_lookup
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0
cron_schedule = 0 8 * * *
enableSched = 1

