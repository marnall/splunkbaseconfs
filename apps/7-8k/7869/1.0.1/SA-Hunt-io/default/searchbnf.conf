[huntioc2feedupdate-command]
syntax = huntioc2feedupdate
shortdesc = Updates the c2_feed_collection KV store with data from Hunt.io C2 feed API
description = This command retrieves C2 feed data from Hunt.io API and updates the c2_feed_collection KV store. It first deletes all existing entries and then adds the new ones.
usage = public
example1 = | huntioc2feedupdate
comment1 = Retrieves the latest C2 feed data from Hunt.io and updates the c2_feed_collection KV store
category = generating
maintainer = hunt.io
outputtext = true 

