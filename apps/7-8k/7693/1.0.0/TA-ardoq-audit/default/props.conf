[ardoq:audit:logs]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
LINE_BREAKER=([\r\n]+)
NO_BINARY_CHECK=true
TIME_PREFIX="@timestamp": "
MAX_TIMESTAMP_LOOKAHEAD=24
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%3QZ
TRUNCATE=1000

[source::...ta-ardoq-audit*.log*]
SHOULD_LINEMERGE = true
sourcetype = taardoqaudit:log

[source::...ta_ardoq_audit*.log*]
SHOULD_LINEMERGE = true
sourcetype = taardoqaudit:log
