[mdicapsrv_log_sourcetype]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1
TRANSFORMS-icap = mdicapsrv_parse_hostname_from_syslog, process_mdicapsrv_syslog, process_mdicapsrv_logfile, get_result_of_icap_message_for_mdicapsrv_logfile, get_status_of_icap_message_for_mdicapsrv_logfile
EXTRACT-status = ^[^\)\n]*\)\s+(?P<status>[^,]+)

[mdcore_log_sourcetype]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1
TRANSFORMS-icap = mdcore_parse_hostname_from_syslog, get_result_of_core_message_for_mdcore_logfile