[mdicapsrv_parse_hostname_from_syslog]
WRITE_META = true
REGEX = ^<(?P<log_level>\d+)>\s+(?P<time>[^ ]+)\s+(?P<host_name>[^ ]+)[^\]\n]*\]\s+(?P<status>[^,]+)
FORMAT = log_level::$1 time::$2 host_name::$3 status::$4

[process_mdicapsrv_syslog]
WRITE_META = true
REGEX =  ^[^\]\n]*\]\s+(?P<status>\w+\s+\w+)[^'\n]*'(?P<requestid>[a-f0-9]+)(?:[^=\n]*=){2}(?P<resultcode>'\d+')[^=\n]*='(?P<resultdesc>[^']+)[^=\n]*=(?P<verdict>[^,]+)
FORMAT = status::$1 requestid::$2 resultcode::$3 resultdesc::$4 verdict::$5

[process_mdicapsrv_logfile]
WRITE_META = true
REGEX =  ^[^\)\n]*\)\s+(?P<status>\w+\s+\w+),\s+\w+=(?P<requestid>[^,]+)(?:[^=\n]*=){5}(?P<resultcode>[^,]+),\s+\w+=(?P<resultdesc>[^,]+)[^=\n]*=(?P<verdict>'\d+')
FORMAT = status::$1 requestid::$2 resultcode::$3 resultdesc::$4 verdict::$5

[get_result_of_icap_message_for_mdicapsrv_logfile]
WRITE_META = true
REGEX = ^\[(?P<log_level>\w+\s+)[^\)\n]*\)\s+(?P<status>[^,]+)
FORMAT = log_level::$1 status::$2

[get_status_of_icap_message_for_mdicapsrv_logfile]
WRITE_META = true
REGEX = ^[^\)\n]*\)\s+(?P<status>[^,]+)
FORMAT = status::$1

[get_result_of_core_message_for_mdcore_logfile]
WRITE_META = true
REGEX = ^[^\)\n]*\)\s+(?P<status>[^,]+)(?:[^=\n]*=){7}'(?P<fileSize>\d+)
FORMAT = status::$1 fileSize::$2

[mdcore_parse_hostname_from_syslog]
WRITE_META = true
REGEX = ^<(?P<log_level>\d+)>\s+(?P<time>[^ ]+)\s+(?P<host_name>[^ ]+)[^\]\n]*\]\s+(?P<status>[^,]+)
FORMAT = log_level::$1 time::$2 host_name::$3 status::$4
