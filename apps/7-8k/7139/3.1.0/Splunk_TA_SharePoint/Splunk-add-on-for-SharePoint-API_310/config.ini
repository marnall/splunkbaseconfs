[GENERAL]

# SECTION-(a): SharePoint site with Office365
# Certificates (*.cst-public key and *.key-private key) MUST be available inside 'cert' FOLDER 
# Certificate (*.cst) MUST BE UPLOADED in Office365 SharePoint site with required permissions
# Make sure All parameters under SECTION-(b): Stand Alone Server Installation (Cloud/On-Prem) MUST BE commented out 

#SERVER- path to Office 365 SharePoint site. An example is given below.  
SERVER=https://example.sharepoint.com/
#ONPREM- Use this Default value for Office365 SharePoint site
ONPREM=No
#TENANT_ID has to be a valid ID. An example is given below.  
TENANT_ID=83393485-e0b8-9a0a-837e-8eb6a2289317 
#CLIENT_ID has to be a valid ID. An example is given below 
CLIENT_ID=hsde70c8c-884c-4787-b091-206rc6r5510e
#USER- Use this Default value for Office365 SharePoint site
USER=
#PASS- Use this Default value for Office365 SharePoint site
PASS=

# SECTION-(b): Stand Alone Server Installation (Cloud/On-Prem)
# No Certificates are required
# Make sure All parameters under SECTION-(a): SharePoint site within Office365 MUST BE commented out

#SERVER- Cloud or On Prem Server address
SERVER=http://34.204.141.101
#ONPREM- Use this Default value for Stand Alone Cloud/On-Prem Server
ONPREM=Yes
#TENANT_ID- Use this Default value for Stand Alone Cloud/On-Prem Server
TENANT_ID= 
#CLIENT_ID- Use this Default value for Stand Alone Cloud/On-Prem Server
CLIENT_ID=
#USER- Use valid user name (service account can also be used)
USER=example_user
#PASS- Use valid password (service account can also be used)
PASS=example@Pw 


# SECTION-(c): Location of source folder within source location
  
#ROOT_DIR- Valid ROOT folder name within SharePoint site that contains source files
ROOT_DIR=Shared Documents

# SECTION-(d): Location of destination folders within LINUX machine where Splunk HF installed on

#DNLOAD_DIR- Use this Default value 
DNLOAD_DIR=/var/log/SharePointAPI/downloadFiles 
#OUT_DIR- Use this Default value 
OUT_DIR=/var/log/SharePointAPI/ConvertedjsonFiles
#TIMESTAMP_FIELD- Use this Default value 
TIMESTAMP_FIELD=time

# SECTION-(e): AWS Integration (SQS/S3) -THIS SECTION IS OPTIONAL
# This section is an optional part of this Add-on, ONLY use when wish to write Data to AWS SQS OR/AND S3 Bucket 
# It also requires to use Splunk AWS-TA to Ingest this Data from AWS SQS/S3 Bucket to Splunk

#IAM parameters
#User valid REGION to write data to SQS/S3  
AWS_REGION=
ACCESS_KEY=
SECRET_KEY=
#Use 12-digit AWS account number
ACCOUNT=

# SECTION-(f): Write to SQS

#UPLOAD_TO_SQS- Use 'No' if don't wish to write AWS SQS or Yes if wish to write AWS SQS 
UPLOAD_TO_SQS=No
#SQS_QUEUE- Name of a vliad AWS SQS
SQS_QUEUE=testSQS

# SECTION-(g): Write to S3

#UPLOAD_TO_S3- Use 'No' if don't wish to write AWS S3 Bucket or Yes if wish to write AWS S3 Bucket 
UPLOAD_TO_S3=No
#S3_BUCKET- Name of valid AWS S3 Bucket
S3_BUCKET=testS3bucket
