``` Example aggregator for Incidents Caused by Human Error. You might classify an incident resolution type to be 'Human Error'  ```\
| stats count(eval(root_cause="human_error")) as human_error_incidents,\
        count                                as total_incidents\
| eval raw_value = round((human_error_incidents/total_incidents)*100,2)\
| eval target    = 15\
| eval kpi       = "human_error_incidents"\
| eval measurement_period = "monthly"\
``` Lower is better => if raw_value <=15%, score=100, etc. ```\
| eval score = case(\
    raw_value <= target, 100,\
    raw_value >= 100,    0,\
    1=1, 100 - round(((raw_value - target)/(100 - target))*100,2)\
)\
| eval _time = relative_time(now(),"@mon")\
| collect index=espm_summary sourcetype="sat_summary"

