search = index=alerts sourcetype=alert_management\
| eval meets_sla = case(\
    severity=="Critical" AND triage_time<=600,   1,  /* <10 min */\
    severity=="High"    AND triage_time<=1800,  1,  /* <30 min */\
    severity=="Medium"  AND triage_time<=7200,  1,  /* <2 hrs */\
    severity=="Low"     AND triage_time<=28800, 1,  /* <8 hrs */\
    true(), 0\
)\
