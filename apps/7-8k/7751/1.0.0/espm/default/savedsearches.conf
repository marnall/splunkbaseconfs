search = index=policy_quizzes\
``` Percentage of employees demonstrating adequate security policy knowledge through assessments ```\
index=policy_quizzes\
| stats \
    count(eval(score>=passing_score AND policy_area="Information handling")) as passes_handling,\
    count(eval(policy_area="Information handling"))                          as total_handling,\
    count(eval(score>=passing_score AND policy_area="Access control"))       as passes_access,\
    count(eval(policy_area="Access control"))                                as total_access,\
    count(eval(score>=passing_score AND policy_area="Incident reporting"))   as passes_incident,\
    count(eval(policy_area="Incident reporting"))                            as total_incident,\
    count(eval(score>=passing_score AND policy_area="Acceptable use"))       as passes_acceptable,\
    count(eval(policy_area="Acceptable use"))                                as total_acceptable,\
    count(eval(score>=passing_score AND policy_area="Data protection"))      as passes_data,\
    count(eval(policy_area="Data protection"))                               as total_data\
| eval information_handling = round((passes_handling/total_handling)*100,2)\
| eval access_control       = round((passes_access/total_access)*100,2)\
| eval incident_reporting   = round((passes_incident/total_incident)*100,2)\
| eval acceptable_use       = round((passes_acceptable/total_acceptable)*100,2)\
| eval data_protection      = round((passes_data/total_data)*100,2)\
| eval raw_value = round(\
    (information_handling + access_control + incident_reporting + acceptable_use + data_protection)/5\
,2)\
| eval target = 90\
| eval score = case(\
    raw_value >= target, 100,\
    raw_value < 0,       0,\
    1==1,                round((raw_value / target)*100,2)\
)\
| eval kpi = "policy_knowledge_by_area"\
| eval measurement_period = "quarterly"\
| eval _time = relative_time(now(),"@quarter")\
| table _time kpi measurement_period raw_value score target \
       information_handling access_control incident_reporting acceptable_use data_protection\
| collect index=espm_summary sourcetype="sat_summary"

