| eval target = case(\
    severity=="Critical", 100,\
    severity=="High",     100,\
    severity=="Medium",   95,\
    severity=="Low",      90,\
    true(),               100\
)\
\
``` Translate raw_value vs. target into a 0–100 score. ```\
| eval score = if(raw_value >= target, 100, round((raw_value / target) * 100, 1))\
\
