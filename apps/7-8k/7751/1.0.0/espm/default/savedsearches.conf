display.visualizations.custom.mitre_attck_heatmap.mitre_attck_heatmap.animate = 1
display.visualizations.custom.mitre_attck_heatmap.mitre_attck_heatmap.hideNull = 0
display.visualizations.custom.mitre_attck_heatmap.mitre_attck_heatmap.showSubTechniques = 1
search = index=espm_summary sourcetype="grc_summary" earliest=-1y\
| sort 0 kpi -_time\
| dedup kpi\
| eval strategy_context       = if(kpi=="strategy_context", score, null)\
| eval risk_framework         = if(kpi=="risk_framework", score, null)\
| eval policy_effectiveness   = if(kpi=="policy_effectiveness", score, null)\
| eval roles_coverage         = if(kpi=="roles_coverage", score, null)\
| eval risk_assessment        = if(kpi=="risk_assessment_coverage", score, null)\
| eval supply_chain           = if(kpi=="supply_chain_risk", score, null)\
| eval control_implementation = if(kpi=="control_implementation", score, null)\
| eval audit_resolution       = if(kpi=="audit_resolution", score, null)\
| stats \
    max(strategy_context)       AS strategy_context\
    max(risk_framework)         AS risk_framework\
    max(policy_effectiveness)   AS policy_effectiveness\
    max(roles_coverage)         AS roles_coverage\
    max(risk_assessment)        AS risk_assessment\
    max(supply_chain)           AS supply_chain\
    max(control_implementation) AS control_implementation\
    max(audit_resolution)       AS audit_resolution\
| eval strategy_component_score = (\
    (strategy_context*0.25) \
  + (risk_framework*0.25) \
  + (policy_effectiveness*0.25) \
  + (roles_coverage*0.25)\
 ) / 100\
| eval operational_component_score = (\
    (risk_assessment*0.25)\
  + (supply_chain*0.25)\
  + (control_implementation*0.25)\
  + (audit_resolution*0.25)\
 ) / 100\
| eval domain_score = (\
    (strategy_component_score*0.60)\
  + (operational_component_score*0.40)\
 ) * 100\
| eval raw_value = domain_score\
| eval score     = domain_score\
| eval kpi       = "grcm_domain_score"\
| eval measurement_period = "quarterly"\
| eval target    = "N/A"\
| eval _time     = now()\
| fields kpi raw_value score target measurement_period _time\
| collect index=espm_summary sourcetype="grc_summary"

