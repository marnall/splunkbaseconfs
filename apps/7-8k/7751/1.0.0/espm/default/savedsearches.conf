| eval domain_score = ((patch_time_score*0.30) + (scan_coverage_score*0.25) + (asset_coverage_score*0.20) + (patch_success_score*0.15) + (critical_vuln_score*0.10))\
| eval raw_value = domain_score\
| eval score     = domain_score\
| eval kpi       = "vm_domain_score"\
| eval measurement_period = "quarterly"\
| eval target    = "N/A"\
| eval _time     = now()\
| collect index=espm_summary sourcetype="vuln_management_summary"

