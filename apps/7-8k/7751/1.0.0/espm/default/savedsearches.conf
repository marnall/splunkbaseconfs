search = index=vuln_data sourcetype=patchmanagement severity=critical patch_status=patched\
| eval patch_time_hrs = (patch_end_time - discovered_time)/3600\
| stats avg(patch_time_hrs) as mean_time_to_patch_critical\
| eval raw_value = round(mean_time_to_patch_critical, 2)\
