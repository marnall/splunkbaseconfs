[pti-command]
syntax = pti <pti-options>* <field-list>
description=  Get the latest malware Intelligence from PolySwarm Malware Threat Intelligence
shortdesc = Get the latest malware Intelligence from PolySwarm Malware Threat Intelligence
usage = public


[pti-options]
syntax = get_hash_data=<string> | get_iocs_by_hash=<string> | get_hash_by_ip=<string> | get_hash_by_domain=<string> | get_hash_by_ttp=<string> | get_hash_by_tags=<string> | get_hash_by_malware_family=<string>

[ptiapitest-command]
description= Test your API Key retrival and PolySWarm Network Connection
shortdesc= Test your API Key retrival and PolySWarm Network Connection

[ptiaccountdetails-command]
description=  Get Your API Key Usage and Team information from the PolySwarm Malware Threat Intelligence Platform
shortdesc = Get Your Key Usage and Team information from the PolySwarm Malware Threat Intelligence Platform
usage = public


[ptilisttags-command]
description=  Get the list of all available TAGS from PolySwarm Malware Threat Intelligence Platform
shortdesc = Get the list of all available TAGS from PolySwarm Malware Threat Intelligence Platform
usage = public


[ptilistmalwarefamily-command]
description=  Get the list of all available Malware Family Names from PolySwarm Malware Threat Intelligence Platform
shortdesc = Get the list of all available Malware Family Names from PolySwarm Malware Threat Intelligence Platform
usage = public

