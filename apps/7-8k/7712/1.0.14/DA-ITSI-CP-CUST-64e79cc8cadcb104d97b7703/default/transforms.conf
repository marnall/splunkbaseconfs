[add_20700_vendor_severity]
REGEX = \"nfc_id\"\s*(:|=)\s*\"20700\"
WRITE_META = true
FORMAT = vendor_severity::warning

[add_20700_severity_id]
REGEX = \"nfc_id\"\s*(:|=)\s*\"20700\"
WRITE_META = true
FORMAT = severity_id::5

[add_20700_signature]
REGEX = \"nfc_id\"\s*(?::|=)\s*\"20700\".*\"description\"\s*(?::|=)\s*\"([^\"]*)\"
WRITE_META = true
FORMAT = signature::$1

[add_20700_mgmt_ip]
REGEX = nfc_id=20700.*src_ip=([^\s]*)
WRITE_META = true
FORMAT = mgmt_ip::$1

[add_device]
REGEX = nfo_hostname=([^\s]*)\snfc_id=\d*\sexp_ip=([\d\.]*)\smgmt_ip=([\d\.]*).*sysName=([^\s]*)\s
WRITE_META = true
FORMAT = device::$1" - "$3" / "$2" ("$4")"

[add_device_metrics]
REGEX = \"nfo_hostname\":\s?\"([^\"]*)\"\,\s\"nfc_id\"\:\s\"\d*\"\,\s\"exp_ip\":\s?\"([^\"]*)\"\,\s\"mgmt_ip\":\s?\"([^\"]*)\".*\"sysName\":\s?\"([^\"]*)
WRITE_META = true
FORMAT = device::$1" - "$3" / "$2" ("$4")"

[add_interface_name_metrics]
REGEX = \"nfo_hostname\":\s?\"([^\"]*)\"\,\s\"nfc_id\"\:\s\"\d+\"\,\s\"exp_ip\":\s?\"([^\"]*)\".*\"mgmt_ip\":\s?\"([^\"]*)\".*\"sysName\":\s?\"([^\"]*)\".*\"ifIndex\":\s?\"(?:\d*)\".*\"ifName\":\s?\"([^\"]*)\"
WRITE_META = true
FORMAT = interface_name::$1"-"$2" ("$3")/"$4" ( "$5" )"

[add_interface_name]
REGEX = nfo_hostname=([^\s]*)\snfc_id=\d*\sexp_ip=([\d\.]*)\smgmt_ip=([\d\.]*).*sysName=([^\s]*).*ifIndex=(?:\d*).*ifName=\"([^\"]*)\"\s
WRITE_META = true
FORMAT = interface_name::$1"-"$2" ("$3")/"$4" ( "$5" )"

