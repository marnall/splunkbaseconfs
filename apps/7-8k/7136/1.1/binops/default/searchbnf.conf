[dissectbitfield-command]
syntax = dissectbitfield [bitfield=infield] [result=outfield]
alias =
shortdesc = Returns the digits of the bits that are set to 1 in the input field as multi-value
description = \
	This command returns the digits of the bits thar are set to 1 in the input field. \
	The LSB is digit 0. \
        Example: 'eval bitfield=23 | dissectbitfield bitfield=bitfield' returns 0,1,2,4 because 2^0+2ˆ1+2ˆ2+2ˆ4 = 23 \
        The input can be a positive decimal or hexadecimal number (as string starting with "0x"). Input which cannot be parsed as such a number is ignored and the result is empty. \
        Usage: dissectbitfield [bitfield=bitfield] [bitfield_result=bitfield_result]
comment1 = this command returns the digits of the bits that are set to 1 in the input field as multi-value.
example1 = \
    | eval field_with_number= "0x23" \
    | dissectbitfield bitfield=field_with_number result=bitfield_result \
    | eval mapped_bitvalues = mvmap(bitfield_result, case(bitfield_result==1, "FlagBit1", bitfield_result==2, "FlagBit2", bitfield_result==6, "FlagBit6", bitfield_result==8, "Flag8") )
category = streaming
appears-in = 1.0
maintainer = daubsi
usage = public
tags = binops_app

[parsetcpflags-command]
syntax = parsetcpflags [field=infield] [result=infield_parsed]
alias =
shortdesc = Returns the textual representations (SYN, ACK, FIN, ...) for the set bits of an input representing tcp header flags.
description = \
	This command takes the field infield and returns the set bits as the textual representation of the tcp flags: 1 = FIN, 2 = SYN, etc. \
	infield can contain a positive decimal or hexadecimal (as string starting with "0x") number. If the input cannot be parsed as such a number it is ignored and the result is empty. 
comment1 = this command returns the textual representation of a tcp header flag field.
example1 = \
    eval myheaderflags=0x12 | parsetcpflags field=myheaderflags
category = streaming
appears-in = 1.0
maintainer = daubsi
usage = public
tags = binops_app

[binops-command]
syntax = binops [binop_in1=arg1] [binop_in2=arg2] [op=AND|OR|XOR] [binop_result=myresult]
alias =
shortdesc = Returns the bitwise AND, OR or XOR of the two arguments provided
description = \
	This command takes two input fields with positive decimal or hexadecimal (as string starting with "0x") numbers arg1 and arg2 and performs the bitwise logical operation on on it and returns the result in myresult. \
        If an argument cannot be parsed as such a number it is ignored and the result is empty
comment1 = this command returns the bitwise logical operation of two arguments
example1 = \
    eval arg1=42 | eval arg2=23 | binops binop_in1=arg1 binop_in2=arg2 op=XOR binop_result=myresult
category = streaming
appears-in = 1.0
maintainer = daubsi
usage = public
tags = binops_app

