[ccx_keepit_auditlogs_change]
search = (sourcetype="ccx:keepit:audit-logs") NOT dataset_name IN("security_alert","compliance_alert","authentication","data_access")
#tag = change

[ccx_keepit_auditlogs_authentication]
search = (sourcetype="ccx:keepit:audit-logs") dataset_name="authentication"
#tag = authentication

[ccx_keepit_auditlogs_data_access]
search = (sourcetype="ccx:keepit:audit-logs") dataset_name="data_access"
#tag = data access

[ccx_keepit_auditlogs_alerts]
search = (sourcetype="ccx:keepit:audit-logs") dataset_name IN("compliance_alert","security_alert")
#tag = alert

[ccx_keepit_jobmonitor_successful_operation]
search = (sourcetype="ccx:keepit:jobs-monitor") status="successful"

[ccx_keepit_jobmonitor_alerts]
search = (sourcetype="ccx:keepit:jobs-monitor") NOT eventtype IN("ccx_keepit_jobmonitor_successful_operation")
#tag = alert
