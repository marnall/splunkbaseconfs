[source::...ta-snyk*.log*]
sourcetype = tasnyk:log

[source::...ta_snyk*.log*]
sourcetype = tasnyk:log

[snyk:issue]
DATETIME_CONFIG = CURRENT
FIELDALIAS-aob_gen_snyk_issue_alias_1 = attributes.type AS category
FIELDALIAS-aob_gen_snyk_issue_alias_2 = attributes.problems{}.id AS cve
FIELDALIAS-aob_gen_snyk_issue_alias_3 = attributes.effective_severity_level AS severity
FIELDALIAS-aob_gen_snyk_issue_alias_4 = attributes.risk.score.value AS severity_id
FIELDALIAS-aob_gen_snyk_issue_alias_5 = attributes.title AS signature
FIELDALIAS-aob_gen_snyk_issue_alias_6 = relationships.scan_item.data.id AS dest
FIELDALIAS-aob_gen_snyk_issue_alias_7 = attributes.problems{}.url AS url
FIELDALIAS-aob_gen_snyk_issue_alias_8 = attributes.coordinates{}.representations{}.dependency.package_name AS vendor_product
INDEXED_EXTRACTIONS = JSON
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
category = Structured
pulldown_type = 1

[snyk:project]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
category = Structured
pulldown_type = 1

[snyk:org]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
category = Structured
pulldown_type = 1

