[ccx_netskope_x_hash]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = (sha256|md5|local_md5|local_hsa256).(:|=).(?:\s*)(?<x_hash>(\"[^\"](?:\\.|[^\"])*\"))

[ccx_netskope_severity_id_output]
filename = ccx_netskope_severity_id_output.csv

[ccx_netskope_cloud_exchange_dlp_extractions]
REGEX = .+\|DLP\|.+\|([^\|]+)\|.+appcategory=([A-Za-z\s]+)\sbrowser=.+device=([A-Za-z\s]+)\sdeviceClassification=.+dlpFile=(.+)\sdlpIncidentId=.+dlpProfile=(.+)\sdlpRule=([A-Za-z\s\-\d]+)\sdlpRuleCount=.+object=(.+)\sos=.+policy=(.+)\srequestClientApplication=(.+)\ssha256=[a-z\d]+\ssourceServiceName=(.+)\ssrc=.+
FORMAT = severity::$1 appcategory::$2 device::$3 dlpFile::$4 dlpProfile::$5 dlpRule::$6 object::$7 policy::$8 requestClientApplication::$9 sourceServiceName::$10

[ccx_netskope_cloud_exchange_policy_extractions]
REGEX = .+\|policy\|.+\|([^\|]+)\|.+appcategory=([A-Za-z\s\-]+)\sbrowser=.+device=([A-Za-z\s]+)\sdeviceClassification=.+os=([A-Za-z0-9\s]+)policy=(.+)\sreferer=.+requestClientApplication=(.+)\ssourceServiceName=(.+)\ssrc=.+
FORMAT = severity::$1 appcategory::$2 device::$3 os::$4 policy::$5 requestClientApplication::$6 sourceServiceName::$7

[ccx_netskope_cloud_exchange_application_extractions]
REGEX = .+\|application\|.+\|([^\|]+)\|.+appcategory=([A-Za-z\s\-]+)\sapplicationType=.+device=([A-Za-z\s]+)\sdst=.+os=([A-Za-z0-9\s]+)requestClientApplication=(.+)\ssourceServiceName=(.+)\ssrc=.+
FORMAT = severity::$1 appcategory::$2 device::$3 os::$4 requestClientApplication::$5 sourceServiceName::$6

[ccx_netskope_cloud_exchange_network_extractions]
REGEX = .+\|network\|.+\|.+\|action=([^\s]+).+sourceServiceName=(.+)\sspt=.+
FORMAT = action::$1 sourceServiceName::$2 

[ccx_netskope_cloud_exchange_uba_extractions]
REGEX = .+\|uba\|.+\|.+\|.+object=(.+)\sos=.+
FORMAT = object::$1

[ccx_netskope_cloud_exchange_header_extractions]
REGEX = .+\|Netskope\|([^\|]+)\|\w+\|([^\|]+)\|([^\|]+)\|([^\|]+)\|.+
FORMAT = vendor_product::$1 event_type::$2 event_signature::$3 severity::$4

[ccx_netskope_cloud_exchange_xcapture]
CLEAN_KEYS = 0
FORMAT = $1::$3
REGEX = \'([\w]+)\'(\: \'|\: )([^\"\,\}\']+)(,?\s?|\"|\')