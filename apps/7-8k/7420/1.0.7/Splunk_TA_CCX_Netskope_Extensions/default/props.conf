[netskope:alert]
REPORT-ccx_netskope_x_hash = ccx_netskope_x_hash

FIELDALIAS-dest_ip = dstip AS dest_ip
FIELDALIAS-http_referrer = referer AS http_referrer
FIELDALIAS-http_user_agent = browser AS http_user_agent
FIELDALIAS-src_ip = srcip AS src_ip
FIELDALIAS-orig_type = type AS orig_type
FIELDALIAS-orig_severity = severity AS orig_severity

EVAL-action = case(action=="allow", "allowed", action=="block", "blocked", action=="Detection", "allowed", 1==1, if('action'=="", null(), 'action'))
EVAL-app = if('app'=="" OR isnull('app'), null(), 'app')
EVAL-body = if(alert=="yes", 'alert_name',null())
EVAL-category = if(isnotnull('detection_engine') OR isnotnull('malware_type'),coalesce('malware_type','alert_type'),'other_categories{}')
EVAL-date = if(isnotnull('detection_engine') OR isnotnull('malware_type'), strftime(coalesce(created_date,creation_timestamp),"%Y-%m-%d %Z"), null())
EVAL-description = if(alert=="yes", 'alert_name',null())
EVAL-dlp_type = if('alert_name'="user_shared_credentials" OR match('alert_name',".*GDPR.*|.*DLP.*"), 'alert_name' ,null())
EVAL-file_name = if(match(url, "(?<url>\w+\.\w{2,4})$") AND alert_type=="malsite", replace(url, ".*[\\|\/](?<url>.+\.\w{2,4})", "\1"), null())
EVAL-file_path = if(alert_type=="malsite", url, null())
EVAL-http_content_type = 'file_type'
EVAL-http_referrer_domain = if(isnotnull(http_referrer) AND http_referrer!="", replace(http_referrer,"\w+:\/\/([^\/]+).*","\1"), null())
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-object_path = if(file_path="NA", object, coalesce(file_path, object))
EVAL-signature = if(isnotnull('malware_name') OR alert_type=="malsite", coalesce('malware_name','malsite_category{}'), 'signature')
EVAL-src_translated_ip = 'userip'
EVAL-url_domain = if(isnotnull(url) AND url!="", replace(url,"(\w+[^\/:]+).*","\1"), null())
EVAL-url_length = len(url)
EVAL-verdict = 'scanner_result'
#EVAL-file_hash = mvdedup(mvappend(local_sha256, local_md5,md5,sha256))
EVAL-file_hash = mvdedup(trim(x_hash,"\""))
EVAL-severity = if(malware_severity IN("informational","low","medium","high","critical"),'malware_severity',coalesce(case((isnotnull(severity_level) AND severity_level IN("informational","low","medium","high","critical")),'severity_level'),case((isnotnull(dlp_rule_severity) AND dlp_rule_severity IN("informational","low","medium","high","critical")),'dlp_rule_severity'),case((isnotnull(dlp_severity) AND dlp_severity IN("informational","low","medium","high","critical")),'dlp_severity'),case((isnotnull(mal_sev) AND mal_sev IN("informational","low","medium","high","critical")),'mal_sev'),case((isnotnull(orig_severity) AND orig_severity IN("informational","low","medium","high","critical")),'orig_severity'),case((isnotnull(ccl) AND ccl IN("informational","low","medium","high","critical")),'ccl'),case((isnotnull(orig_severity) AND orig_severity IN("unknown")),'orig_severity')))
#EVAL-severity = coalesce(severity_level, dlp_rule_severity, dlp_severity, mal_sev, malware_severity, orig_severity)
EVAL-type = "alert"
EVAL-dest_ip = if(match('dest_ip', "^((?:\d{1,3}\.){3}\d{1,3})$"), 'dest_ip', null())

LOOKUP-ccx_netskope_severity_id_output = ccx_netskope_severity_id_output severity OUTPUT severity_id

[netskope:application]
REPORT-ccx_netskope_x_hash = ccx_netskope_x_hash

FIELDALIAS-orig_severity = severity AS orig_severity

EVAL-action = case(action=="allow", "allowed", action=="block", "blocked", action=="alert", "alert")
EVAL-category = coalesce('malware_type','other_categories{}')
EVAL-signature = if(alert_type=="malsite", 'malsite_category{}', coalesce('malware_name','signature'))
#EVAL-file_hash = mvdedup(mvappend(local_sha256, local_md5,md5,sha256))
EVAL-date = if(isnotnull('detection_engine') OR isnotnull('malware_type'), strftime(coalesce(created_date,creation_timestamp),"%Y-%m-%d %Z"), null())
EVAL-severity = if(malware_severity IN("informational","low","medium","high","critical"),'malware_severity',coalesce('ccl','orig_severity'))
EVAL-file_hash = mvdedup(trim(x_hash,"\""))

[netskope:connection]

EVAL-app = if('app'=="" OR isnull('app'), null(), 'app')
EVAL-description = coalesce('policy', if('bypass_reason'=="", null(), 'bypass_reason'))
EVAL-http_referrer_domain = if(index=="idm_netskope", replace(http_referrer,"\w+:\/\/([^\/]+).*","\1"), null())
EVAL-src_translated_ip = if(type=="connection", userip, null())
EVAL-transport = if(type=="connection", protocol, null())
EVAL-url_domain = if(index=="idm_netskope", replace(url,"(\w+[^\/:]+).*","\1"), null())

EVAL-bytes_in = if(isnotnull('server_bytes') OR isnotnull('sc_bytes'),coalesce('server_bytes','sc_bytes'),null())
EVAL-bytes_out = if(isnotnull('client_bytes') OR isnotnull('cs_bytes'),coalesce('client_bytes','cs_bytes'),null())
##CyberCX performed this adjustment to align the fields with the CIM perspective

[netskope:incident]

EVAL-dlp_type = if('alert_name'="user_shared_credentials" OR match('alert_name',".*GDPR.*|.*DLP.*") OR (isnotnull('dlp_match_info{}.dlp_policy') AND 'dlp_match_info{}.dlp_policy'!=""), coalesce('alert_name','dlp_match_info{}.dlp_policy') ,null())
EVAL-severity = lower(severity)

[netskope:network]
FIELDALIAS-orig_action = action AS orig_action

EVAL-action = case(action=="allow", "allowed", action=="block", "blocked", match(action, ".*fail.*"), "blocked", match(action, ".*proceed.*"), "allowed")

EVAL-bytes_in = if(isnotnull('server_bytes') OR isnotnull('sc_bytes'),coalesce('server_bytes','sc_bytes'),null())
EVAL-bytes_out = if(isnotnull('client_bytes') OR isnotnull('cs_bytes'),coalesce('client_bytes','cs_bytes'),null())
##CyberCX performed this adjustment to align the fields with the CIM perspective

[netskope:audit]

EVAL-action = case(match(audit_log_event,"create|Create"),"created", match(audit_log_event,"granted"), "acl_modified", match(audit_log_event, "ack|Ack"), "cleared", match(audit_log_event, "delete|Delete"), "deleted", match(audit_log_event,"edit|Edit|Add"),"modified",match(audit_log_event,"Push|push|Reorder|update|Update"),"updated",match(audit_log_event,"Disable|disable"),"stopped",match(audit_log_event,".*Login.*Success.*"),"success",match(audit_log_event,".*Login.*Fail.*|.*Fail.*Login.*"), "failure",1=1,"unknown")
EVAL-app = if(match(audit_log_event,".*Login.*|.*Logout.*"),"Netskope",null())
EVAL-authentication_method = if(match(audit_log_event,".*Login.*SSO.*|.*SSO.*Login.*"),"sso",null())
EVAL-reason = if(isnotnull('reason'),'reason',if(match(audit_log_event,".*Login.*Success.*"),"success",if(match(audit_log_event,".*Login.*Fail.*|.*Fail.*Login.*"),"failure","unknown")))

[netskope:web_transaction]
EVAL-bytes_in = if(isnotnull('server_bytes') OR isnotnull('sc_bytes'),coalesce('server_bytes','sc_bytes'),null())
EVAL-bytes_out = if(isnotnull('client_bytes') OR isnotnull('cs_bytes'),coalesce('client_bytes','cs_bytes'),null())
##CyberCX performed this adjustment to align the fields with the CIM perspective

[netskope:web_transaction:nls]
EVAL-bytes_in = if(isnotnull('server_bytes') OR isnotnull('sc_bytes'),coalesce('server_bytes','sc_bytes'),null())
EVAL-bytes_out = if(isnotnull('client_bytes') OR isnotnull('cs_bytes'),coalesce('client_bytes','cs_bytes'),null())
EVAL-action = coalesce(x_cs_ssl_engine_action, x_sr_ssl_engine_action)
EVAL-url_length = len(cs_uri_scheme . "://" . cs_dns . cs_uri . if(isnull(cs_uri_query), "", "?") . coalesce(cs_uri_query,""))
EVAL-url_domain = cs_dns

[netskope:cloud_exchange]
REPORT-ccx_netskope_cloud_exchange_policy_extractions = ccx_netskope_cloud_exchange_policy_extractions
REPORT-ccx_netskope_cloud_exchange_application_extractions = ccx_netskope_cloud_exchange_application_extractions
REPORT-ccx_netskope_cloud_exchange_dlp_extractions = ccx_netskope_cloud_exchange_dlp_extractions
REPORT-ccx_netskope_cloud_exchange_network_extractions = ccx_netskope_cloud_exchange_network_extractions
REPORT-ccx_netskope_cloud_exchange_xcapture = ccx_netskope_cloud_exchange_xcapture
REPORT-ccx_netskope_cloud_exchange_header_extractions = ccx_netskope_cloud_exchange_header_extractions
REPORT-ccx_netskope_cloud_exchange_uba_extractions = ccx_netskope_cloud_exchange_uba_extractions

FIELDALIAS-dest = dst AS dest 
FIELDALIAS-user = suser AS user 
FIELDALIAS-dvc = hostname AS dvc
FIELDALIAS-file_name =  object as file_name
FIELDALIAS-bytes_out = clientBytes AS bytes_out 
FIELDALIAS-bytes_in = serverBytes AS bytes_in
FIELDALIAS-dest_port = dpt AS dest_port
FIELDALIAS-src_port = spt AS src_port
FIELDALIAS-duration = sessionDuration AS duration
FIELDALIAS-packets_out = clientPackets AS packets_out
FIELDALIAS-packets_in = serverPackets AS packets_in
FIELDALIAS-vendor_src = src AS vendor_src
FIELDALIAS-vendor_action = action AS vendor_action
FIELDALIAS-id = IncidentID AS id
FIELDALIAS-vendor_type = type AS vendor_type

EVAL-dest = if(dst="null",null(),dst)
EVAL-object_path = if(act="Upload" AND isnotnull(dlpIncidentId),url,null())
EVAL-signature = if(dlpRule="null",dlpRule,event_signature)
EVAL-signature_id = if(event_type="Malware",mwId,null())
EVAL-app = case(event_type IN ("application","policy") AND requestClientApplication!="null",requestClientApplication, act="Upload" AND isnotnull(dlpIncidentId),sourceServiceName,true(),"Netskope Cloud Exchange") 
EVAL-category = case(act="Upload" AND isnotnull(dlpIncidentId),policy,event_type IN ("application","policy") AND appcategory!="null",appcategory,event_type="Malware",mwType)
EVAL-severity = lower(severity)
EVAL-action = case(act="Upload" AND isnotnull(dlpIncidentId),act,event_type="network" AND action="block","blocked",event_type="network" AND action="allow","allowed",event_type="Malware" AND action="block","blocked",event_type="Malware" AND action="allow","allowed",event_type="Malware",null(),true(),action)
EVAL-src_user = if(dlpAccountUser="null",null(),dlpAccountUser)
EVAL-http_referrer = if(referer="null",null(),referer) 
EVAL-url_length = len(url) 
EVAL-url_domain = replace(url, "^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)(?:.+)?", "\1")
EVAL-http_referrer_domain = replace(if(referer="null",null(),referer), "^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)(?:.+)?", "\1")
EVAL-file_hash = coalesce(sha256,md5)
EVAL-file_path = if((act="Upload" AND isnotnull(dlpIncidentId)) OR event_type="Malware",url,null())
EVAL-date = if(event_type="Malware",strftime(_time, "%Y-%m-%d %H:%M:%S"),null())
EVAL-src = if(event_type="network" AND shost!="null",shost,src)
EVAL-bytes = clientBytes + serverBytes 
EVAL-dest_ip = if(dst="null",null(),dst)
EVAL-protocol = if(proto="null",null(),proto)
EVAL-packets = clientPackets + serverPackets
EVAL-src_ip = coalesce(srcip,src)
EVAL-transport = if(event_type="network" AND sourceServiceName IN ("icmp","tcp","udp"),sourceServiceName,null())
EVAL-dvc = if(event_type="network" AND sourceServiceName!="null" AND sourceServiceName!="ssl" AND sourceServiceName!="icmp" AND sourceServiceName!="ntp",sourceServiceName,null())
EVAL-session_id = if(networkSessionId="null",null(),networkSessionId)
EVAL-rule = if(event_type="network",policy,null())
EVAL-vendor_product="Netskope Cloud Exchange"
EVAL-type=if(event_type IN ("ips","malsite","Compromised Credential","uba"),"alert",null())
EVAL-subject=if(event_type IN ("ips","malsite","Compromised Credential","uba"),coalesce(object,ccMatchedUsername,url),null())
EVAL-description=if(event_type IN ("ips","malsite","Compromised Credential","uba"),event_type,null())