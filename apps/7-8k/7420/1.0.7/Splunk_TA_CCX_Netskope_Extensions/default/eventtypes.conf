[ccx_netskope_alert_network_traffic]
search = (sourcetype="netskope:alert" alert_name="*Malicious Site Protection*") OR (sourcetype="netskope:cloud_exchange" event_type="network")
# tags = communicate network

[ccx_netskope_alerts_dlp]
search = (sourcetype="netskope:alert" dlp_type="*") OR (sourcetype=netskope:cloud_exchange act="upload" dlpIncidentId="*")
# tags = dlp incident

[ccx_netskope_cim_alert_web]
search = ((eventtype=netskope_cim_alert OR eventtype=netskope_cim_application) url="*") OR (sourcetype=netskope:cloud_exchange event_type IN ("application","policy") AND url=*) NOT eventtype IN("netskope_cim_web")
# tags = proxy web

[netskope_cim_malware]
search = (eventtype = netskope_alert OR eventtype=netskope_application) type IN (malsite, malware) OR alert_type=malware OR malware_type="*" NOT appcategory="Known Malicious Sites" NOT eventtype="ccx_netskope_malware_operations"
# tags = attack malware

[ccx_netskope_malware_op_hash_tracker]
search = (sourcetype="netskope:*") file_hash="*" NOT eventtype IN("netskope_cim_malware")
# tags = operations malware

[ccx_netskope_malware_operations]
search = (eventtype = netskope_alert OR eventtype=netskope_application) type IN (malsite)
# tags = operations malware

[ccx_netskope_audit_logout]
search = (sourcetype=netskope:audit) audit_log_event="Logout*"

[ccx_netskope_audit_authentication]
search = (sourcetype=netskope:audit) audit_log_event="*Login*"
# tags = authentication

[netskope_cim_application]
search = eventtype = netskope_application NOT eventtype IN("netskope_cim_malware")

[netskope_cim_alert]
search = eventtype = netskope_alert NOT eventtype IN("netskope_cim_malware","ccx_netskope_alerts_dlp")
# tags = alert

[netskope_audit]
search = eventtype=netskope_idx sourcetype=netskope:audit NOT eventtype IN("ccx_netskope_audit_logout","ccx_netskope_audit_authentication")
# tags = audit change

[ccx_netskope_file_hashes]
search = sourcetype="netskope:cloud_exchange" act="upload" dlpIncidentId="*"

[ccx_netskope_web_transaction_nls]
search = eventtype=netskope_idx sourcetype=netskope:web_transaction:nls

[ccx_netskope_cloud_exchange_malware_attack]
search= sourcetype="netskope:cloud_exchange" event_type="Malware"

[ccx_netskope_cloud_exchange_alert]
search= sourcetype="netskope:cloud_exchange" event_type IN ("ips","malsite","Compromised Credential","uba")