[package_results_lookup]
external_type = kvstore
collection = package_results
fields_list = _key, run_id, detection_status, prevention_status, scenario_id, scenario_name

[package_status_lookup]
external_type = kvstore
collection = package_status
fields_list = _key, run_id, hostname, host_ip, package_name, package_id, run_started_at, run_ended_at, upload_time, processed_count, expired, status

[migration_status_lookup]
external_type = kvstore
collection = migration_status
fields_list = id, name, status, executed_at, prerequisite_status, is_optional, error, stats, user_action, forced, retry_count

[user_settings_lookup]
external_type = kvstore
collection = user_settings
fields_list = _key, profile, sourcetypes, enabled, is_upgrade, indexes

[scenario_unified_mitigations_lookup]
filename = scenario_unified_mitigations.csv

[unified_mitigations_lookup]
filename = unified_mitigations.csv

[sigma_translations_lookup]
filename = sigma_translations.csv

