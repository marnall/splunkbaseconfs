description = AttackIQ Flex detections
SHOULD_LINEMERGE = false
FIELD_DELIMITER = ","
KV_MODE = auto
TIME_FORMAT = %m/%d/%Y %H:%M:%S %z

[aiq:flex:results]
DATETIME_CONFIG = CURRENT
description = AttackIQ Flex Results Summary
SHOULD_LINEMERGE = false
FIELD_DELIMITER = ","
KV_MODE = auto
TIME_FORMAT = %m/%d/%Y %H:%M:%S %z

[aiq:flex:app_logs]
DATETIME_CONFIG = CURRENT
KV_MODE = json
AUTO_KV_JSON = true
description = AttackIQ Flex Application Logs
pulldown_type = true
