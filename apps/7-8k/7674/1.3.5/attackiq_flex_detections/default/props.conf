KV_MODE = json
AUTO_KV_JSON = true
description = AttackIQ Flex Package Execution
pulldown_type = true

[aiq:flex:iocs]
DATETIME_CONFIG = CURRENT
KV_MODE = json
AUTO_KV_JSON = true
description = AttackIQ Flex indicators of compromise
pulldown_type = true

[aiq:flex:preventions]
DATETIME_CONFIG = CURRENT
KV_MODE = json
AUTO_KV_JSON = true
description = AttackIQ Flex Prevention Status
pulldown_type = true
LOOKUP-scenario_mitigations = scenario_unified_mitigations_lookup scenario AS scenario_id OUTPUT unifiedmitigation

[aiq:flex:detections]
