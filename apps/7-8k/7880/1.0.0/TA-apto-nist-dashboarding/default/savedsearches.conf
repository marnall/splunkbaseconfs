[NIST_Lookup_Gen]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | rest /servicesNS/-/-/saved/searches splunk_server=local \
| fields "action.correlationsearch.annotations" title disabled\
| search disabled=0 AND  "action.correlationsearch.annotations"="*nist*[*]*"\
| rename "action.correlationsearch.annotations" as annotations\
| rex field=annotations "\"nist\":\[\s*(?P<nistControl>[^]]+)\s*\]"\
| eval Nist-Code = replace(nistControl,"\"","")\
\
| stats values(title) as searches c as third-control-searches by  Nist-Code\
| lookup nist-controls.csv Nist-Code OUTPUT Primary-Control\
| eventstats sum(third-control-searches) as Primary-Count by Primary-Control\
| outputlookup nist-searches
