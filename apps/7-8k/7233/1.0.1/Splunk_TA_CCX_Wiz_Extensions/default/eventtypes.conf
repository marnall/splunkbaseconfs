
[ccx_wiz_issues_alert]
search = (sourcetype="wiz:issues") sourceRule.name="Load balancer does not have a target"
# tag = alert

[ccx_wiz_issues_vulnerabilities]
search = (sourcetype="wiz:issues") NOT sourceRule.name="Load balancer does not have a target"
# tag = report vulnerability

[ccx_wiz_userauditlogs_authentication]
search = (sourcetype="wiz:userAuditLogs") vendor_action="Login"
# tag = authentication

[ccx_wiz_userauditlogs_change]
search = (sourcetype="wiz:userAuditLogs") NOT vendor_action="Login"
# tag = change - disabled

[ccx_wiz_vulnerabilities]
search = (sourcetype="wiz:vulnerabilities")
# tag = report vulnerability