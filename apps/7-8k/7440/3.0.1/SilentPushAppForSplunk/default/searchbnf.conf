[silentpushmatchindicators-command]
syntax =  silentpushmatchindicators indicator_type="indicator type"
description = This command performs the correlation between Silent Push indicator and provided Splunk events.
shortdesc = Correlate silent push indicators against provided Splunk events.
example1 = | silentpushmatchindicators indicator_type="domain"
comment1 = Correlate silent push indicators of type "domain" against provided Splunk events with respected to silent_push_indicators_enrichment_domain.

[silentpushenrichmentqueries-command]
syntax =  silentpushenrichmentqueries indicator="indicator value" account_name="account_name" explain=0|1 scan_data=0|1 field_flag=0|1
description = This command provides details of Indicators either providing indicator value or field.
shortdesc = This command provides details of Indicators.
example1 = | silentpushenrichmentqueries indicator=google.com account_name=silent_push_account
comment1 = This command provides details of indicator with indicator as google.com using silent_push_account
example2 = index=main | silentpushenrichmentqueries field_flag=1 indicator="ioc_field" account_name=silent_push_account.
comment2 = This command provides details of indicators respective to the values present in ioc_field using silent_push_account.

[silentpushpadnsdensitylookup-command]
syntax =  silentpushpadnsdensitylookup qtype="qtype" query="query" account_name="account_name" scope="scope"
description = This command provides details of PADNS Density Lookup.
shortdesc = This command provides details of PADNS Density Lookup.
example1 = | silentpushpadnsdensitylookup qtype=ipv4 query=1.1.1.1 account_name=silent_push_account
comment1 = This command provides details of PADNS Density Lookup with qtype as ipv4 and query as 1.1.1.1 using silent_push_account.

[silentpushpadnsforwardlookup-command]
syntax =  silentpushpadnsforwardlookup qtype="qtype" qname="qname" account_name="account_name" netmask="netmask" subdomains=0|1 with_metadata=0|1 regex="regex" match=strict|self first_seen_before="first_seen_before" first_seen_after="first_seen_after" last_seen_before="last_seen_before" last_seen_after="last_seen_after" as_of="as_of" sort="sort" limit="limit" skip="skip"
description = This command provides details of PADNS Forward Lookup.
shortdesc =This command provides details of PADNS Forward Lookup.
example1 = | silentpushpadnsforwardlookup qtype=any qname=silentpush.com account_name=silent_push_account
comment1 = This command provides details of PADNS Forward Lookup with qtype as any and qname as silentpush.com using silent_push_account.

[silentpushpadnsreverselookup-command]
syntax =  silentpushpadnsdensitylookup qtype="qtype" qname="qname" account_name="account_name" netmask="netmask" subdomains=0|1 with_metadata=0|1 regex="regex" first_seen_before="first_seen_before" first_seen_after="first_seen_after" last_seen_before="last_seen_before" last_seen_after="last_seen_after" as_of="as_of" sort="sort" limit="limit" skip="skip"
description = This command provides details of PADNS Reverse Lookup.
shortdesc = This command provides details of PADNS Reverse Lookup.
example1 = | silentpushpadnsreverselookup qtype=ptr4 qname=8.8.8.8 account_name=silent_push_account
comment1 = This command provides details of PADNS Reverse Lookup with qtype as ptr4 and qname as 8.8.8.8 using silent_push_account.

[silentpushasnsseenfordomain-command]
syntax =  silentpushasnsseenfordomain domain="domain" account_name="account_name" result_format="result_format" asnum="asnum" sort="sort" limit="limit" skip="skip"
description = This command provides details of PADNS Asn seen for domain.
shortdesc = This command provides details of PADNS Asn seen for domain.
example1 = | silentpushasnsseenfordomain domain=google.com account_name=silent_push_account
comment1 = This command provides details of PADNS Asn seen for domain with domain as google.com using silent_push_account.

[silentpushasnreputation-command]
syntax =  silentpushasnreputation explain=0|1 asn="asn_number" account_name="account_name"
description = This command provides details of ASN Reputation.
shortdesc = Fetches reputation data of provided asn
example1 = | silentpushasnreputation explain=1 asn=16418 account_name=silent_push_account
comment1 = Fetches reputation data of asn number 16418 using silent_push_account.

[silentpushasntakedownreputation-command]
syntax =  silentpushasntakedownreputation explain=0|1 asn="asn_number" account_name="account_name"
description = This command provides details of ASN Takedown Reputation.
shortdesc = Fetches reputation data of provided asn
example1 = | silentpushasntakedownreputation explain=1 asn=16418 account_name=silent_push_account
comment1 = Fetches reputation data of asn number 16418 using silent_push_account.

[silentpushipv4reputation-command]
syntax =  silentpushipv4reputation explain=0|1 ipv4="ipv4_address" account_name="account_name"
description = This command provides details of IPv4 Reputation.
shortdesc = Fetches reputation data of provided ipv4.
example1 = | silentpushipv4reputation explain=1 ipv4="1.1.1.1" account_name=silent_push_account
comment1 = Fetches ipv4 data of ip 1.1.1.1 account_name=silent_push_account

[silentpushnameserverreputation-command]
syntax =  silentpushnameserverreputation explain=0|1 nameserver="nameserver" account_name="account_name"
description = This command provides details of Name Server Reputation.
shortdesc = Fetches reputation data of provided nameserver.
example1 = | silentpushnameserverreputation explain=1 nameserver="a.dns.com" account_name=silent_push_account
comment1 = Fetches reputation data of nameserver a.dns.com using silent_push_account.

[silentpushsubnetreputation-command]
syntax =  silentpushsubnetreputation explain=0|1 subnet="subnet ip" mask="subnet mask" account_name="account_name"
description = This command provides details of Subnet Reputation.
shortdesc = Fetches reputation data of provided subnet.
example1 = | silentpushsubnetreputation explain=1 subnet="10.0.0.1" mask="10" account_name=silent_push_account
comment1 = Fetches reputation data of subnet 10.0.0.1 using silent_push_account.

[silentpushliveurlscan-command]
syntax = | silentpushliveurlscan url="url" platform="platform_name" os="os_name" browser="browser_name" region="region_name" account_name="account_name"
description = This command provides details of Live URL Scan.
shortdesc = Fetches information of provided URL.
example1 = | silentpushliveurlscan url="www.google.com" account_name=silent_push_account
comment1 = Fetches information of URL www.google.com account_name=silent_push_account

[silentpushwebscandata-command]
syntax =  | silentpushwebscandata url="url" account_name="account_name" sort="sort" limit="limit" page="page number"
description = This command provides scan details of URL.
shortdesc = Fetches information of provided URL.
example1 = | silentpushwebscandata url="www.google.com" account_name=silent_push_account sort="scan_date/desc" limit=100 page="1"
comment1 = Fetches information of URL www.google.com account_name=silent_push_account

[silentpushthreatcheck-command]
syntax = silentpushthreatcheck indicator="indicator value" account_name="account_name" data_source="data_source"
description = This command provides details of Threat Check.
shortdesc = Fetches information of provided indicator.
example1 = | silentpushthreatcheck indicator="www.google.com" account_name=silent_push_account data_source="indicators"
comment1 = Fetches information of indicator www.google.com account_name=silent_push_account
