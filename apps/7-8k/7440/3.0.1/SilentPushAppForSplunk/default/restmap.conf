
[admin:SilentPushAppForSplunk]
match = /
members = SilentPushAppForSplunk_account, SilentPushAppForSplunk_settings, SilentPushAppForSplunk_silent_push_indicator

[admin_external:SilentPushAppForSplunk_account]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = SilentPushAppForSplunk_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:SilentPushAppForSplunk_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = SilentPushAppForSplunk_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:SilentPushAppForSplunk_silent_push_indicator]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = SilentPushAppForSplunk_rh_silent_push_indicator.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[script:silent_push_get_credentials]
match = /silent_push_get_credentials
script = silent_push_get_credentials.py
scripttype = persist
output_modes  = json
python.version = python3
python.required = 3.13
handler = silent_push_get_credentials.SilentPushGetCredentials
passSession    = true
passSystemAuth = true

[script:silent_push_post_indicators]
match = /silent_push_post_indicators_service
python.version = python3
python.required = 3.13
handler = silent_push_post_indicators.SilentPushFeedConfiguration
