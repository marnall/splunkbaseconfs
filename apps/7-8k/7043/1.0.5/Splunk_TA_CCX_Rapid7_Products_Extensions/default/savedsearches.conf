[Search - Rapid7 CVE Multivalue - Lookup Gen]
description = Parses and output vulnerability definitons from "rapid7:insightvm:vulnerability_definition" logs into lookup "ccx_rapid7_vulnerability_cve_lookup"
dispatch.earliest_time = -75m
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
disabled = 1
search = `ccx_rapid7_insightvm_index` sourcetype="rapid7:insightvm:vulnerability_definition" NOT cve=""\
| makemv delim="," cve \
| mvexpand cve \
| eval category = split(category, ",") \
| fillnull cve, id, severity, category, description, title value="RAPID7_PLACEHOLDER_VALUE" \
| stats values(category) as category by cve, id, severity, description, title \
| fields - count\
| inputlookup append=t ccx_rapid7_vulnerability_cve_lookup \
| fillnull cve, id, severity, category, description, title value="RAPID7_PLACEHOLDER_VALUE" \
| stats values(category) as category by cve, id, severity, description, title \
| fields - count\
| foreach * \
    [| eval <<FIELD>>=if(<<FIELD>>="RAPID7_PLACEHOLDER_VALUE",null(),<<FIELD>>) ]\
| outputlookup output_format=splunk_mv_csv ccx_rapid7_vulnerability_cve_lookup

[Search - Rapid7 Vulnerability ID - Lookup Gen]
description = Parses and output vulnerability definitons from "rapid7:insightvm:vulnerability_definition" logs into lookup "ccx_rapid7_vulnerability_id_lookup"
dispatch.earliest_time = -75m
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
disabled = 1
search = `ccx_rapid7_insightvm_index` sourcetype="rapid7:insightvm:vulnerability_definition" cve="" \
| rename id as vulnerability_id \
| search vulnerability_id="*"\
| eval category = split(category, ",") \
| fillnull vulnerability_id, severity, category, description, title value="RAPID7_PLACEHOLDER_VALUE" \
| stats values(category) as category by vulnerability_id, severity, description, title \
| fields - count\
| inputlookup append=t ccx_rapid7_vulnerability_id_lookup \
| fillnull vulnerability_id, severity, category, description, title value="RAPID7_PLACEHOLDER_VALUE" \
| stats values(category) as category by vulnerability_id, severity, description, title \
| fields - count \
| foreach * \
    [| eval <<FIELD>>=if(<<FIELD>>="RAPID7_PLACEHOLDER_VALUE",null(),<<FIELD>>) ] \
| outputlookup output_format=splunk_mv_csv ccx_rapid7_vulnerability_id_lookup
