[ccx_rapid7_nexpose_vuln]
search = (sourcetype="rapid7:nexpose:vuln")
# tags = report vulnerability

[ccx_rapid7_insightvm_assets]
search = (sourcetype=rapid7:insightvm:asset) NOT vendor_product="Rapid7:InsightVM"
# tags = inventory network system version

[ccx_rapid7_insightvm_definitions]
search = (sourcetype=rapid7:insightvm:vulnerability_definition)

[ccx_rapid7_insightvm_vul_detections]
search = (sourcetype=rapid7:insightvm:asset:vulnerability_finding)
# tags = report vulnerability

[ccx_rapid7_insightvm_alerts]
search = (sourcetype=rapid7:insightvm:asset) AND (malware_kits="1" OR vendor_product="Rapid7:InsightVM")
# tags = alert
