[tippingpoint]
TRANSFORMS-set_sourcetype = set_tippingpoint_sourcetype

[tippingpoint:cef]
MAX_TIMESTAMP_LOOKAHEAD = 16
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %b %d %T
TIME_PREFIX = ^
TRUNCATE = 50000


REPORT-cefextractions = tippingpoint_cefheaders,tippingpoint_cefvaluekeys

FIELDALIAS-user = suser AS user
FIELDALIAS-dvc = dvchost AS dvc
FIELDALIAS-signature_id = cs3 AS signature_uuid
FIELDALIAS-protocol = proto AS protocol
FIELDALIAS-dest = dst AS dest
FIELDALIAS-src_ip = src AS src_ip
FIELDALIAS-dest_ip = dst AS dest_ip
FIELDALIAS-dest_port = dpt AS dest_port
FIELDALIAS-category = cat AS category
FIELDALIAS-vlan_id = cn1 AS vlan_id
FIELDALIAS-ssl_flag = cn2 AS ssl_flag
FIELDALIAS-http_method = requestMethod as http_method
FIELDALIAS-http_uri = dhost as http_host
FIELDALIAS-request = request as uri_path 
FIELDALIAS-client_ip = c6a1 as client_ip

EVAL-action = case(act=="Permit","allowed",act=="Block","blocked", true(),"other")
EVAL-ids_type = "network"
EVAL-vendor_product = vendor_product_simple . " Threat Protection System"

LOOKUP-tippingpoint_severity = tipping_point_trendmicro severity_id OUTPUT severity