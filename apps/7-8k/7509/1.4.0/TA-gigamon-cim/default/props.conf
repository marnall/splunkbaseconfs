[gigamon:traffic]
EVAL-bytes = dst_bytes + src_bytes
EVAL-http_content_type = replace(http_mime_type,"\\\/","/")
EVAL-http_referrer = replace(http_referer, "\\\/", "/")
EVAL-packets = dst_packets + src_packets
FIELDALIAS-additional_answer_count = dns_arcount AS additional_answer_count
FIELDALIAS-answer = dns_section_answer_raw AS answer
FIELDALIAS-app = app_name AS app
FIELDALIAS-bytes_in = src_bytes AS bytes_in
FIELDALIAS-bytes_out = dst_bytes AS bytes_out
FIELDALIAS-cookie = http_cookie AS cookie
FIELDALIAS-dest_ip = dst_ip AS dest_ip
FIELDALIAS-dest_mac = dst_mac AS dest_mac
FIELDALIAS-dest_port = dst_port AS dest_port
FIELDALIAS-dns_host_addr = dns_host_addr ASNEW dns_host_addr
FIELDALIAS-dns_message_type = dns_message_type ASNEW dns_message_type
FIELDALIAS-dns_tunneling = dns_tunneling ASNEW dns_tunneling
FIELDALIAS-http_content_encoding = http_content_encoding ASNEW http_content_encoding
FIELDALIAS-http_file_type = http_file_type ASNEW http_file_type
FIELDALIAS-http_rtt = http_rtt ASNEW http_rtt
FIELDALIAS-http_server = http_server ASNEW http_server
FIELDALIAS-http_server_agent = http_server_agent ASNEW http_server_agent
FIELDALIAS-http_uri = http_uri ASNEW http_uri
FIELDALIAS-http_version = http_version ASNEW http_version
FIELDALIAS-ip_wrong_crc = ip_wrong_crc ASNEW ip_wrong_crc
FIELDALIAS-lease_duration = dhcp_ip_lease_time AS lease_duration
FIELDALIAS-name = dns_name AS name
FIELDALIAS-packets_in = src_packets AS packets_in
FIELDALIAS-packets_out = dst_packets AS packets_out
FIELDALIAS-query = dns_query AS query
FIELDALIAS-query_type = dns_query_type AS query_type
FIELDALIAS-record_type = dns_host_type AS record_type
FIELDALIAS-reply_code_id = dns_reply_code AS reply_code_id
FIELDALIAS-response_time = dns_response_time AS response_time
FIELDALIAS-src_port = src_port AS src_port
FIELDALIAS-ssl_cipher_suite_id = ssl_cipher_suite_id ASNEW ssl_cipher_suite_id
FIELDALIAS-ssl_end_time = ssl_validity_not_after AS ssl_end_time
FIELDALIAS-ssl_ext_sig_algorithm_scheme = ssl_ext_sig_algorithm_scheme ASNEW ssl_ext_sig_algorithm_scheme
FIELDALIAS-ssl_hash = ssl_ext_sig_algorithm_hash AS ssl_hash
FIELDALIAS-ssl_issuer_common_name = ssl_certificate_issuer_cn AS ssl_issuer_common_name
FIELDALIAS-ssl_issuer_locality = ssl_certificate_issuer_c AS ssl_issuer_locality
FIELDALIAS-ssl_issuer_organization = ssl_certificate_issuer_o AS ssl_issuer_organization
FIELDALIAS-ssl_issuer_state = ssl_certificate_issuer_st AS ssl_issuer_state
FIELDALIAS-ssl_issuer_unit = ssl_certificate_issuer_ou AS ssl_issuer_unit
FIELDALIAS-ssl_name = ssl_common_name AS ssl_name
FIELDALIAS-ssl_publickey = ssl_cert_ext_authority_key_id AS ssl_publickey
FIELDALIAS-ssl_signature_algorithm = ssl_ext_sig_algorithm_sig AS ssl_signature_algorithm
FIELDALIAS-ssl_start_time = ssl_validity_not_before AS ssl_start_time
FIELDALIAS-ssl_subject = ssl_certificate_dn_subject AS ssl_subject
FIELDALIAS-ssl_subject_common_name = ssl_certificate_subject_cn AS ssl_subject_common_name
FIELDALIAS-ssl_subject_locality = ssl_certificate_subject_l AS ssl_subject_locality
FIELDALIAS-ssl_subject_organization = ssl_certificate_subject_o AS ssl_subject_organization
FIELDALIAS-ssl_subject_state = ssl_certificate_subject_st AS ssl_subject_state
FIELDALIAS-ssl_subject_unit = ssl_certificate_subject_ou AS ssl_subject_unit
FIELDALIAS-ssl_version = ssl_protocol_version AS ssl_version
FIELDALIAS-status = http_code AS status
FIELDALIAS-tcp_flag = tcp_flags AS tcp_flag
FIELDALIAS-tcp_flag_reset = tcp_flag_reset ASNEW tcp_flag_reset
FIELDALIAS-tcp_loss_count = tcp_loss_count ASNEW tcp_loss_count
FIELDALIAS-tcp_rtt = tcp_rtt ASNEW tcp_rtt
FIELDALIAS-tcp_rtt_app = tcp_rtt_app ASNEW tcp_rtt_app
FIELDALIAS-tcp_wrong_crc = tcp_wrong_crc ASNEW tcp_wrong_crc
FIELDALIAS-transaction_id = dns_transaction_id AS transaction_id
FIELDALIAS-ttl = dns_ttl AS ttl
FIELDALIAS-uri_path = http_uri_path AS uri_path
FIELDALIAS-vendor_product = vendor AS vendor_product
AUTO_KV_JSON = false
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
category = Custom
pulldown_type = 1
disabled = false
FIELDALIAS-http_user_agent = http_user_agent ASNEW http_user_agent

[Gigamon:traffic]

