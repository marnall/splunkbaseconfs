[Mandiant Indicator Lookup]
action.webhook.enable_allowlist = 0
alert.track = 0
allow_skew = 50%
cron_schedule = 45 * * * *
description = Populate the mandiant_indicator_lookup KV Store with Mandiant indicators
dispatch.earliest_time = -35m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-mandiant-threat-intelligence
request.ui_dispatch_view = search
search = index=`mandiant_indicator_index` sourcetype="mandiant:indicators" earliest=-`mandiant_indicator_time_window`d threat_rating.threat_score>=`mandiant_min_threat_score`  | dedup value | eval last_seen=round(strptime(last_seen_index, "%Y-%m-%dT%H:%M:%S.%fZ")) | eval first_seen=round(strptime(first_seen, "%Y-%m-%dT%H:%M:%S.%fZ")) | rename threat_rating.threat_score as threat_score | rename threat_rating.severity_level as severity_level | rename threat_rating.severity_reason{} as severity_reason | rename category{} as category | rename associated_threat_actors{}.name as threat_actor | rename associated_malware{}.name as malware | rename campaigns{}.title as campaigns | rename reports{}.title as reports  | table  value id type first_seen last_seen threat_actor malware category threat_score severity_level severity_reason campaigns reports mandiant_link | outputlookup mandiant_indicator_lookup

