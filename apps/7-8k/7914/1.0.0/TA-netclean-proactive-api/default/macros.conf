[netclean_link_host]
definition = "http://127.0.0.1:8000"
iseval = 0

[netclean_number_format(1)]
args = arg1
definition = | eval $arg1$=case(\
	$arg1$ >= 1000000, round($arg1$ / 1000000, 1) . "M",\
	$arg1$ >= 1000, round($arg1$ / 1000, 1) . "K",\
	true(), tostring($arg1$))
iseval = 0

[netclean_single_value_zero(1)]
args = arg1
definition = | append [| makeresults | eval $arg1$=0 | fields - _time]\
	| head 1
iseval = 0

[netclean_proactive_link_filter]
definition = | lookup netclean_hash_hits_lookup _key as hash OUTPUT hit, hash_expiry
iseval = 0

[netclean_proactive_index]
definition = netclean_proactive
iseval = 0

