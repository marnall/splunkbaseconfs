#Reassign host values

[assign_bmserver]
REGEX = bmserver:
FORMAT = sourcetype::symantec:mg:bmserver
DEST_KEY = MetaData:Sourcetype

[assign_ecelerity]
REGEX = ecelerity
FORMAT = sourcetype::symantec:mg:ecelerity
DEST_KEY = MetaData:Sourcetype

[assign_snmpd]
REGEX = snmpd
FORMAT = sourcetype::symantec:mg:snmpd
DEST_KEY = MetaData:Sourcetype

[assign_rsyslog]
REGEX = rsyslogd-pstats
FORMAT = sourcetype::symantec:mg:rsyslog
DEST_KEY = MetaData:Sourcetype

[assign_crond]
REGEX = CROND
FORMAT = sourcetype::symantec:mg:crond
DEST_KEY = MetaData:Sourcetype

[assign_brightmail]
REGEX = Brightmail
FORMAT = sourcetype::symantec:mg:brightmail
DEST_KEY = MetaData:Sourcetype

[assign_auth]
REGEX = sudo: pam_unix\(sudo:session\)
FORMAT = sourcetype::symantec:mg:auth
DEST_KEY = MetaData:Sourcetype

[assign_quarantine]
REGEX = AuditEventLogManager: (Released|Deleted).*spam quarantine
FORMAT = sourcetype::symantec:mg:quarantine
DEST_KEY = MetaData:Sourcetype

[assign_audit]
REGEX = AuditLogHelper:
FORMAT = sourcetype::symantec:mg:audit
DEST_KEY = MetaData:Sourcetype

[assign_system]
REGEX = run-parts\(\/etc\/cron.hourly\)|CROND|rsyslogd-pstats|resource-usage
FORMAT = sourcetype::symantec:mg:system
DEST_KEY = MetaData:Sourcetype

[assign_dns]
REGEX = named\[.*\]: clients-per-query
FORMAT = sourcetype::symantec:mg:dns
DEST_KEY = MetaData:Sourcetype

[assign_mail]
REGEX = AuditEventLogManager: .*message.*viewed by
FORMAT = sourcetype::symantec:mg:mail
DEST_KEY = MetaData:Sourcetype

#sourcetype=symantec:mg:ecelerity---------------------------------------------------------------------------------

## --TLS_RECEIVED Event--
[extract_tls_received]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>TLS_RECEIVED)\|(?P<tls_cipher_suite>.+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 tls_cipher_suite::$4
WRITE_META = true


## --TLS_DELIVERY Event--
[extract_tls_delivery]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>TLS_DELIVERY)\|(?P<tls_cipher_suite>.+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 tls_cipher_suite::$4
WRITE_META = true


## --SPF Event--
[extract_spf]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>SPF)\|(?P<spf_result>\w+)\|spf=.*?smtp\.mailfrom=(?P<mail_from>[^\s]+)\s+smtp\.helo=(?P<helo>[^\s]+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 spf_result::$4 mail_from::$5 helo::$6
WRITE_META = true


## --DMARC Event--
[extract_dmarc]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>DMARC)\|(?P<dmarc_result>\w+)\|dmarc=.*?header\.from=(?P<header_from>[^\s]+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 dmarc_result::$4 header_from::$5
WRITE_META = true

## --SENDERID Event--
[extract_senderid]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>SENDERID)\|(?P<senderid_result>\w+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 senderid_result::$4
WRITE_META = true

## --DKIM Event--
[extract_dkim]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>DKIM)\|(?P<dkim_result>\w+)\|(?P<dkim_domain>[^\s]+)\|(?P<dkim_selector>[^\s]+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 dkim_result::$4 dkim_domain::$5 dkim_selector::$6
WRITE_META = true


## --ACCEPT Event--
[extract_accept]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>ACCEPT)\|(?P<ip_address>[0-9.]+):(?P<port>\d+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 ip_address::$4 port::$5
WRITE_META = true

## --RECEIVED Event--
[extract_received]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>RECEIVED)
FORMAT = timestamp::$1 message_id::$2 event_type::$3
WRITE_META = true

## --IRCPTACTION_MTA Event--
[extract_ircptaction_mta]
REGEX = ecelerity\[\d+\]:\s+(?P<timestamp>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>IRCPTACTION_MTA)\|(?P<action_status>[^\|]+)\|(?P<action_type>[^\s]+)
FORMAT = timestamp::$1 message_id::$2 event_type::$3 action_status::$4 action_type::$5
WRITE_META = true

## --SENDER Event--
[ecelerity_sender_extraction]
REGEX = ^(?<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?<hostname>[\w\.\-]+)\s+ecelerity\[\d+\]:\s+(?<epoch_time>\d+)\|(?<message_id>[a-f0-9\-]+)\|SENDER\|(?<sender_email>[^\s]+)
FORMAT = timestamp::$1 hostname::$2 event_type::email_sender message_id::$4 sender_email::$5
WRITE_META = true

## --TRANS_FAILURE Event--
[ecelerity_trans_failure_extraction]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)[^:\n]*:\s+\d+\|(?P<message_id>[^\|]+)\|TRANS_FAILURE\|(?P<route>[^\|]+)\|(?P<status_code>\d+\.\d+\.\d+)\s+\[(?P<error_message>[^\]]+)\]\|(?P<recipient_email>[^\|]+)\|(?P<retry_timestamp>\d+)
FORMAT = timestamp::$1 hostname::$2 event_type::email_transmission_failure message_id::$3 route::$4 status_code::$5 error_message::$6 recipient_email::$7 retry_timestamp::$8
WRITE_META = true

## --DELIVERY_FAILURE Event--
[ecelerity_email_delivery_failure_extraction]
REGEX = (?=.*\|DELIVERY_FAILURE\|)^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+\w+\[\d+\]:\s+\d+\|(?P<message_id>[^\|]+)\|\w+_\w+\|(?P<route>[^\|]+)\|(?P<error_message>[^\|]+)\|(?P<recipient_email>.+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 route::$4 error_message::$5 recipient_email::$6 event_type::email_delivery_failure
WRITE_META = true

## --TRANS_FAILURE Event (email_transmission_failure)--
[email_recipient_action_extraction]
REGEX = (?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+\w+\[\d+\]:\s+\d+\|(?P<message_id>[^\|]+)\|IRCPTACTION\|(?P<recipient_email>[^\|]+)\|(?P<action>[^\|]+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 recipient_email::$4 action::$5 event_type::email_recipient_action
WRITE_META = true

## --orcpts Event--
[extract-ecelerity-orcpts]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>\S+)\s+\w+\[\d+\]:\s+\d+\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>ORCPTS)\|(?P<recipient_email>\S+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 event_type::$4 recipient_email::$5
WRITE_META = true


## --DELIVER Event--
[ecelerity_email_deliver_extraction]
REGEX = \|DELIVER\|(?P<route>[^|]+)\|(?P<recipient_email>[^|]+).*$
FORMAT = route::$1 recipient_email::$2 event_type::email_delivery_success
WRITE_META = true

## --RDNS Events--
[ecelerity_email_rdns_extraction]
REGEX = RDNS lookup for connecting IP (?P<rdns_ip>\d+\.\d+\.\d+\.\d+) returned (?P<rdns_status>\S+)
FORMAT = rdns_ip::$1 rdns_status::$2 event_type::rdns_lookup_failure
WRITE_META = true

## -- TRACKERID Events--
[ecelerity_email_trackerid_extraction]
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+(?P<hostname>\S+)\s+ecelerity\[\d+\]:\s+\d+\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>TRACKERID)\|(?P<recipient_email>[^|]+)\|(?P<tracker_data>.+)
FORMAT = hostname::$1 message_id::$2 event_type::$3 recipient_email::$4 tracker_data::$5
WRITE_META = true

####----------bmserver logs-----------------###--------------------------------------------------------------------------------------------------------------------------

##--SOURCE Event--
[extract-bmserver-source]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>SOURCE)\|(?P<source_category>\S+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 source_category::$4
WRITE_META = true

##--VERDICT Events--
[extract-bmserver-verdict]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>VERDICT)\|(?P<verdict_result>\S+)\|(?P<classification>\S+)\|(?P<classification_type>\S+)\|(?P<classification_status>.+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 verdict_result::$4 classification::$5 classification_type::$6 classification_status::$7
WRITE_META = true

[extract_verdict-spam-header]
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+(?P<hostname>\S+)\s+bmserver:\s+\d+\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>VERDICT)\|(?P<recipient_email>[^|]+)\|(?P<classification>[^|]+)\|(?P<classification_type>[^|]+)\|(?P<classification_status>(?:fastpass|bulk|spam header|static spam attack|none|default|content_\d+|custom_urls))(\|(?P<classification_subtype>[^|]+))?(\|(?P<rule>[^|]+))?(\|(?P<spam_source>.+))?
FORMAT = hostname::$1 message_id::$2 event_type::$3 recipient_email::$4 classification::$5 classification_type::$6 classification_status::$7 classification_subtype::$8 rule::$9 spam_source::$10
WRITE_META = true

[extract-verdict-bulk-mail]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+).*?\|(?P<message_id>[a-f0-9\-]+)\|VERDICT\|(?P<recipient_email>[^|]+)\|(?P<classification>bulk)\|(?P<classification_type>\S+)\|(?P<classification_status>marketing mail: .+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 recipient_email::$4 classification::$5 classification_type::$6 classification_status::$7
WRITE_META = true

[extract-verdict-spam-url]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+).*?\|(?P<message_id>[a-f0-9\-]+)\|VERDICT\|(?P<recipient_email>[^|]+)\|(?P<classification>custom_urls)\|(?P<classification_type>\S+)\|(?P<classification_status>[^|]+)\|(?P<classification_subtype>url)\|(?P<spam_source>[^|]+)\|(?P<url>https?:\/\/[^\|]+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 recipient_email::$4 classification::$5 classification_type::$6 classification_status::$7 classification_subtype::$8 spam_source::$9 url::$10
WRITE_META = true


## -- EHLO Event--

[extract-bmserver-ehlo]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>EHLO)\|(?P<ehlo_domain>.+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 ehlo_domain::$4
WRITE_META = true

## --LOGICAL_IP Event--

[extract-bmserver-logical-ip]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>LOGICAL_IP)\|(?P<logical_ip>\S+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 logical_ip::$4
WRITE_META = true


## -- UNTESTED Event--
[extract-bmserver-untested]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>UNTESTED)\|(?P<recipient_email>[^|]+)\|(?P<spam_category>[^|]+)\|(?P<email_classification>[^|]+)\|(?P<submission_status>[^|]+)\|(?P<threat_flags>.+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 sender_email::$4 spam_category::$5 email_classification::$6 submission_status::$7 threat_flags::$8
WRITE_META = true

## --MSG_SIZE Event--

[extract-bmserver-msgsize]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>MSG_SIZE)\|(?P<message_size>\d+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 message_size::$4
WRITE_META = true

## --MSGID Event--

[extract-bmserver-msgid]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>MSGID)\|\s*(?P<msg_id>.+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 msg_id::$4
WRITE_META = true

## --SUBJECT Event--
[extract-bmserver-subject]
REGEX = bmserver:\s+(?P<epoch_time>\d+)\|(?P<message_id>[a-f0-9\-]+)\|(?P<event_type>SUBJECT)\|\s*(?P<email_subject>.+)
FORMAT = epoch_time::$1 message_id::$2 event_type::$3 email_subject::$4
WRITE_META = true

## --ATTACH Event--
[extract_bmserver_email_attachment]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+\w+:\s+\d+\|(?P<message_id>[^\|]+)\|ATTACH\|(?P<attachments>.+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 attachments::$4 event_type::email_attachment

## -- FIRED Event --
[extract_bmserver_policy_violation]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+\w+:\s+\d+\|(?P<message_id>[^\|]+)\|FIRED\|(?P<recipient>[^\|]+)\|(?P<fire_reason>[^\|]+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 recipient::$4 fire_reason::$5 event_type::POLICY_VIOLATION

##--PMC Events (Policy Match Classification)--
[extract_bmserver_policy_match]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+\w+:\s+\d+\|(?P<message_id>[^\|]+)\|PMC\|(?P<document>.+)\|(?P<classification>\S+)
FORMAT = timestamp::$1 hostname::$2 message_id::$3 document::$4 classification::$5 event_type::policy_match


###-----snmpd logs-----####-------------------------------------------------------------------------------------------------------------------------------------------

[snmpd_field_extractions]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+snmpd\[(?P<process_id>\d+)\]:\s+Connection\s+from\s+(?P<protocol>\S+):\s+\[(?P<src_ip>\d+\.\d+\.\d+\.\d+)\]:(?P<src_port>\d+)-\>\[(?P<dest_ip>\d+\.\d+\.\d+\.\d+)\]:(?P<dest_port>\d+)
FORMAT = timestamp::$1 hostname::$2 process_id::$3 protocol::$4 src_ip::$5 src_port::$6 dest_ip::$7 dest_port::$8
WRITE_META = true

[snmpd_hostname_extraction]
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+(?P<hostname>\S+)
FORMAT = hostname::$1
WRITE_META = true

###-----symantec:mg:auth---##-------------------------------------------------------------------------------------------------------------------------------------------------

##--SUDO LOGS--
[extract_sudo_auth]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+sudo: pam_unix\(sudo:session\):\s+(?P<action>session \w+)\s+for user (?P<user>\S+)(?: by \(uid=(?P<uid>\d+)\))?
FORMAT = timestamp::$1 hostname::$2 action::$3 user::$4 uid::$5 event_type::sudo_authentication


##symantec:mg:system----------------------------------------------------------------------------------------------------------------------------

##--System Resource Usage (resource-usage)--
[extract_system_resource_usage]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+rsyslogd-pstats:\s+resource-usage:\s+origin=(?P<origin>\w+)\s+utime=(?P<utime>\d+)\s+stime=(?P<stime>\d+)\s+maxrss=(?P<maxrss>\d+)\s+minflt=(?P<minflt>\d+)\s+majflt=(?P<majflt>\d+)\s+inblock=(?P<inblock>\d+)\s+oublock=(?P<oublock>\d+)\s+nvcsw=(?P<nvcsw>\d+)\s+nivcsw=(?P<nivcsw>\d+)
FORMAT = timestamp::$1 hostname::$2 origin::$3 utime::$4 stime::$5 maxrss::$6 minflt::$7 majflt::$8 inblock::$9 oublock::$10 nvcsw::$11 nivcsw::$12

##--Mail Forward Queue Stats (mailFwd queue)--
[extract_rsyslog_pstats]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+rsyslogd-pstats:\s+(?P<event_type>[\w\(\)]+):\s+origin=(?P<origin>\S+)\s+(?P<dynamic_fields>.*)
FORMAT = timestamp::$1 hostname::$2 event_type::$3 origin::$4 dynamic_fields::$5
WRITE_META = true

[extract_rsyslog_pstats_dynamic]
REGEX = (?<=\s)(?P<key>\S+?)=(?P<value>\S+)
FORMAT = $1::$2

##--Global System Stats Events--
[extract_global_system_stats]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+rsyslogd-pstats:\s+global:\s+origin=(?P<origin>\w+)
FORMAT = timestamp::$1 hostname::$2 origin::$3


##sourcetype="symantec:mg:brightmail"--------------------------------------

[extract_brightmail_cron]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+CROND\[(?P<cron_id>\d+)\]:\s+\((?P<cron_user>\S+)\)\s+CMD\s+\((?P<cron_command>.+)\)
FORMAT = timestamp::$1 hostname::$2 cron_id::$3 cron_user::$4 cron_command::$5 event_type::cron_command_execution
WRITE_META = true

[extract_brightmail_url_error]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+bmserver:\s+\[Brightmail\]\s+\((?P<log_level>\S+):(?P<pid>\d+\.\d+)\):\s+\[(?P<error_code>\d+)\]\s+\[\s*<?(?P<sender_email>[^>\]]+)>?\]\s+UrlAnalyzer:\s+Error\s+'(?P<error_message>[^']+)'\s+processing\s+URL\s+'(?P<url>[^']+)'\s+in\s+file\s+'(?P<file_info>[^']+)
FORMAT = timestamp::$1 hostname::$2 log_level::$3 pid::$4 error_code::$5 sender_email::$6 error_message::$7 url::$8 file_info::$9 event_type::brightmail_url_error
WRITE_META = true

##--symantec:mg:audit--------------------------------------------------------------------------

[symantec_audit_extract]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+\S+:\s+(?P<event_id>\d+)\|(?P<message_id>[^|]+)\|(?P<user>[^|]*)\|(?P<event_type>[^|]+)\|(?P<action_taken_by>[^|]*)
FORMAT = timestamp::$1 hostname::$2 event_id::$3 message_id::$4 user::$5 event_type::$6 action_taken_by::$7
WRITE_META = true


##-- sourcetype=symantec:mg:dns------------------------

[symantec_dns_extract]
REGEX = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+named\[(?P<process_id>\d+)\]:\s+clients-per-query\s+(?P<query_change>\w+)\s+to\s+(?P<query_value>\d+)
FORMAT = timestamp::$1 hostname::$2 process_id::$3 event_type::clients-per-query-change query_change::$4 query_value::$5
WRITE_META = true


##sourcetype=symantec:mg:mail----------------------
##Mar 14 11:57:20 rhdmgwavp02 AuditEventLogManager: The message 'New from Google! Learn Agile project management' was viewed by mona.albalawi@xyz.com
[symantec_mail_extract]
REGEX = (?i)^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<component>AuditEventLogManager):\s+The\s+message\s+'(?P<email_subject>[^']+)'\s+was\s+viewed\s+by\s+(?P<recipient>\S+).
FORMAT = timestamp::$1 hostname::$2 component::$3 event_type::email_message_viewed email_subject::$4 recipient::$5
WRITE_META = true


##sourcetype=symantec:mg:syslog---------------------------------

[symantec_syslog_extract]
REGEX = (?i)^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<component>[\w\-/\(\)\[\]]+):\s+(?P<message>.+)
FORMAT = timestamp::$1 hostname::$2 component::$3 message::$4
WRITE_META = true

##sourcetype=symantec:mg:quarantine-------------------------------
[symantec_quarantine_extract]
REGEX = (?i)(?<action>Deleted|Released) (?<message_count>\d+) messages in spam quarantine\. User:(?<user>[\w\.\@]+)
FORMAT = action::$1 message_count::$2 user::$3

##Configuring host values-------------------------------------------
[set_host_from_hostname]
REGEX = hostname=(\S+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

