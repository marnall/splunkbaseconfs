EXTRACT-TRANS_FAILURE = ^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)[^:\n]*:\s+\d+\|(?P<message_id>[^\|]+)\|TRANS_FAILURE\|(?P<route>[^\|]+)\|(?P<status_code>\d+\.\d+\.\d+)\s+\[(?P<error_message>[^\]]+)\]\|(?P<recipient_email>[^\|]+)\|(?P<retry_timestamp>\d+)
