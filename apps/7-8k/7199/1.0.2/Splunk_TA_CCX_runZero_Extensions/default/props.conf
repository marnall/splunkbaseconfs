[assets]
TRANSFORMS-ccx_runzero_assets = set_runzero_assets

[ccx:runzero:assets]
KV_MODE = json
TIME_FORMAT = %%s
TIME_PREFIX = \"updated_at\":\s*\"
TZ = UTC
pulldown_type = 1

EVAL-description = "runZero Scan Results"
EVAL-dest = if('agent_name'=="null" OR 'agent_name'=="" OR isnull('agent_name'), null(), 'agent_name')
EVAL-enabled = 'alive'
EVAL-serial = 'foreign_attributes.@crowdstrike.dev{}.serialNumber'
EVAL-src = coalesce('attributes._sources.1.addrs', 'attributes._sources.4.addrs')
EVAL-src_ip = coalesce('attributes._sources.1.addrs', 'attributes._sources.4.addrs')
EVAL-user = 'foreign_attributes.@crowdstrike.dev{}.lastInteractiveUser'
EVAL-vendor_product = "runZero"
