[alphasoc-command]
syntax = alphasoc (help | ((<alphasoc_class_name>)? (<alphasoc_log_source>)? (<alphasoc_filter_tokens>)?))
shortdesc = Query raw OCSF telemetry from AlphaSOC's data lake.
description = Use the alphasoc command to query raw OCSF telemetry stored in AlphaSOC's data lake. \
    When called without parameters, fetches all events from the selected time range. \
    Supports field-based filtering with AND/OR operators and parentheses. \
    Results are returned as OCSF events that can be included in SPL searches, reporting, and dashboards.

example1 = | alphasoc class_name="DNS Activity, Network Activity" device.ip=10.0.0.5 AND (query.hostname=evil.com OR dst_endpoint.port=443)
comment1 = Query DNS and network events matching complex filter conditions.
example2 = | alphasoc
comment2 = Fetch all events from the selected time range.
example3 = | alphasoc device.ip=10.0.0.5
comment3 = Query all events from source IP 10.0.0.5.
example4 = | alphasoc device.ip=10.0.0.5 dst_endpoint.port=443
comment4 = Query events from source IP 10.0.0.5 destined for port 443.
example5 = | alphasoc class_name="DNS Activity" log_source="azure-vnet-flow"
comment5 = Query DNS events from Azure VNet flow logs.
usage = public

[alphasoc_filter_tokens]
syntax = <string>
shortdesc = Optional positional field-based filter expression to narrow down query results.
description = Optional positional filter expression using field=value syntax with AND/OR operators and parentheses. \
    Field names are case-insensitive. Use single quotes for values with spaces. \
    Supported fields (OCSF v1.5.0 paths): \
    Device: device.ip, device.hostname, device.uid, device.mac. \
    User: actor.user.name. \
    DNS: query.hostname, query.type. \
    Network: dst_endpoint.ip, dst_endpoint.port, connection_info.protocol_name. \
    HTTP: http_request.http_method, http_request.user_agent. \
    TLS: tls.certificate.fingerprint (alias of tls.certificate.fingerprints.0.value), tls.certificate.subject, tls.certificate.issuer. \
    Audit: src_endpoint.ip, metadata.product.uid.

[alphasoc_class_name]
syntax = class_name=<string>
shortdesc = Reserved positional assignment for OCSF class names.
description = Reserved positional assignment with a comma-separated list of OCSF class names. \
    Must appear before or after the filter expression, not within it. \
    Examples: "DNS Activity", "Network Activity", "DNS Activity, Network Activity", \
    Accepts: Title Case, snake_case, dash-separated.

[alphasoc_log_source]
syntax = log_source=<string>
shortdesc = Reserved positional assignment for data origins.
description = Reserved positional assignment with a comma-separated list of data origins. \
    Must appear before or after the filter expression, not within it. \
    Examples: "aws-route53", "aws-vpc-flow, azure-vnet-flow". \
    See https://docs.alphasoc.com/data_origins/overview/ for available data origins.

[alphasoc_subcommand]
syntax = (help)
shortdesc = Positional subcommand to display usage information and available query fields.
description = Positional subcommand. Use "help" by itself to display usage information and available query fields.
