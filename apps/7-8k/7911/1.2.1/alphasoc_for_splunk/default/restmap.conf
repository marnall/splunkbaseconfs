[script:alphasoc_account_status]
python.version = python3
python.required = 3.9, 3.13
match=/account/status
script=a4s_rest_api.py
scripttype=persist
handler=a4s_rest_api.AccountStatusHandler
output_modes=json

[admin:config]
match=/config
members=alphasoc_config
capability.post=admin_all_objects

[admin_external:alphasoc_config]
handlertype=python
python.version = python3
python.required = 3.9, 3.13
handlerfile=a4s_config_handler.py
handleractions=list, edit
handlerpersistentmode=true
