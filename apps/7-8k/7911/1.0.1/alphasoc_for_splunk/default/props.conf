[alphasoc:finding:ocsf]
category = Network & Security
description = AlphaSOC findings in OCSF format
pulldown_type = true

# OCSF finding data is in JSON format so set the appropriate settings.
INDEXED_EXTRACTIONS = json
KV_MODE = none
SHOULD_LINEMERGE = false

# Use a finding creation timestamp as an event timestamp.
TIMESTAMP_FIELDS = time
TIME_FORMAT = %s

# Translate general fields from OCSF findings to CIM-compliant fields.
FIELDALIAS-app = metadata.product.vendor_name AS app
EVAL-type = "alert"

# Map finding information fields to CIM-compliant fields.
FIELDALIAS-id = finding_info.uid AS id
FIELDALIAS-signature_id = finding_info.types{} AS signature_id
FIELDALIAS-signature = finding_info.title AS signature
FIELDALIAS-description = finding_info.title AS description
FIELDALIAS-mitre_technique_id = finding_info.attacks{}.technique.uid AS mitre_technique_id

# Map device fields to CIM-compliant fields as source fields.
EVAL-src = coalesce('device.hostname', 'device.ip', 'device.mac', 'device.uid')
FIELDALIAS-src_id = device.uid AS src_id
FIELDALIAS-src_host = device.hostname AS src_host
FIELDALIAS-src_ip = device.ip AS src_ip
FIELDALIAS-src_mac = device.mac AS src_mac

# Map actor fields to CIM-compliant fields as user fields.
EVAL-user = coalesce('actor.user.full_name', 'actor.user.display_name', 'actor.user.name', 'actor.user.email_addr', 'actor.user.uid')
EVAL-user_name = coalesce('actor.user.full_name', 'actor.user.display_name', 'actor.user.name')
FIELDALIAS-user_id = actor.user.uid AS user_id

# Join device and actor user fields to create a unique entity ID and name.
EVAL-entity_id = coalesce('actor.user.uid', 'actor.user.email_addr', 'actor.user.name', 'actor.user.display_name', 'actor.user.full_name', 'device.uid', 'device.mac', 'device.ip', 'device.hostname', "Unknown")
EVAL-entity = coalesce('actor.user.full_name', 'actor.user.display_name', 'actor.user.name', 'actor.user.email_addr', 'actor.user.uid', 'device.hostname', 'device.ip', 'device.mac', 'device.uid', "Unknown")

# Map some fields to vendor specific CIM-compliant fields.
FIELDALIAS-vendor_account = cloud.account.uid AS vendor_account
FIELDALIAS-vendor_region = cloud.region AS vendor_region
