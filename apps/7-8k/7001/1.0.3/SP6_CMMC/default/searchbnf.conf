[mergexml-command]
syntax = mergexml  (<mergexml-options>)*
description = Merges the input file in dname (that has no header) with the header_template.xml present in default directory.If header already present , updates it to latest version as present in header_template.xml
usage = public
example1 = |mergexml dname=si_l2-3_8_11.xml take_backup=true

[mergexml-options]
syntax = dname=<string> take_backup=<string>
description = Merges the input file in dname (that has no header) with the header_template.xml present in default directory.If header already present , updates it to latest version as present in header_template.xml


[mergeallxmls-command]
syntax = mergeallxmls (<mergeallxmls-options>)*
description = Merges all the xmls with pattern like ab_1_001.xml , with the header_template.xml present in default directory.If header already present , updates it to latest version as present in header_template.xml
usage = public
example1 = |mergeallxmls take_backup=true

[mergeallxmls-options]
syntax = take_backup=<string>
description = Merges all the xmls with pattern like ab_1_001.xml , with the header_template.xml present in default directory.If header already present , updates it to latest version as present in header_template.xml

[prereqs-command]
syntax=prereqs (<prereqs-options>)*
shortdesc=Display prereqs-checks.json as an event.
description=Display prereqs-checks.json as an event.
usage=public
example1=| prereqs domain=value control=value

[prereqs-options]
syntax=domain=<string> | control=<string>
description=Use the domain and control parameters as filters when displaying prereqs-checks.json. Both params are optional.

[controlinfo-command]
syntax=controlinfo (<controlinfo-options>)*
shortdesc=Display domains.json as an event.
description=Display domains.json as an event.
usage=public
example1=| controlinfo domain=value control=value

[controlinfo-options]
syntax=domain=<string> | control=<string>
description=Use the domain and control parameters as filters when displaying domains.json. Both params are optional.
