[ASCERA CMMC Earliest Event from Hosts and Sources]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
description = This builds a lookup to list the earliest event by host and source. This report needs to be enabled on first run and when new hosts are added.
dispatch.earliest_time = 0
dispatchAs = user
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
display.visualizations.type = singlevalue
request.ui_dispatch_app = SP6_CMMC
request.ui_dispatch_view = search
search = | tstats earliest(_time) AS Earliest_Time where `sp6_cmmc_windows_index` OR `sp6_cmmc_linux_index` OR index=_audit by sourcetype host | sort _time | outputlookup sp6_cmmc_earliest_source

[ASCERA CMMC - Missing Sourcetypes]
action.email.show_password = 1
alert.suppress = 0
alert.track = 1
alert.severity = 1
counttype = number of events
cron_schedule = */3 * * * *
disabled = 1
enableSched = 1
quantity = 0
relation = greater than
search = | tstats latest(_time) as last_event_time where index=* by sourcetype  | eval time_diff =  now() - last_event_time| where time_diff > 86400 | convert ctime(last_event_time) | fields - time_diff|stats count

[ASCERA CMMC - Windows Audit Log Suspicious Activity]
action.email.show_password = 1
alert.suppress = 0
alert.track = 1
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
counttype = number of events
cron_schedule = */5 * * * *
disabled = 1
enableSched = 1
quantity = 0
relation = greater than
search = eventtype=windows_audit_log_cleared OR eventtype=windows_audit_log_stopped \
| fields _time dest Account_Name TaskCategory action event_id severity EventCode \
| stats latest(_time) as _time values(*) as * by dest Account_Name \
| eval count_event_ids=mvcount(event_id) \
| rename dest as Device,_time as TimeStamp, Account_Name as User \
| fields Device User TimeStamp TaskCategory action EventCode count_event_ids severity \
| eval TimeStamp = strftime(TimeStamp,"%DT%T")

