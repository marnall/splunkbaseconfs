search = index=summary source="splunk-storage-detail"\
| where eventCount>0\
| stats latest(retentionDays) AS retention_days latest(startEpoch) AS earliest_event latest(endEpoch) AS latest_event latest(rawSizeGBCustomer) AS current_size_gb latest(rawSizeGBInternal) AS max_size_gb latest(eventCount) AS event_count by idxName\
| append [ | rest /services/data/indexes\
| where currentDBSizeMB>1 AND disabled=0\
| table title frozenTimePeriodInSecs minTime maxTime currentDBSizeMB  maxTotalDataSizeMB totalEventCount\
| eval retention_days=round(frozenTimePeriodInSecs/86400,0), earliest_event=strptime(minTime,"%Y-%m-%dT%H:%M:%S"), latest_event=strptime(maxTime,"%Y-%m-%dT%H:%M:%S"), current_size_gb=round(currentDBSizeMB/1024,2), max_size_gb=round(maxTotalDataSizeMB/1024,0)\
| fields - frozenTimePeriodInSecs, currentDBSizeMB, maxTotalDataSizeMB, minTime, maxTime\
| rename title AS idxName, totalEventCount AS event_count ]\
| search NOT idxName=_* NOT idxName=cim_modactions NOT idxName=history NOT idxName=splunklogger NOT idxName=summary\
| append [ | inputlookup sp6_control_status | stats count by cui_system_splunk_id | fields cui_system_splunk_id ]\
| eventstats values(cui_system_splunk_id) AS cui_system_splunk_id\
| where isnotnull(idxName)\
| mvexpand cui_system_splunk_id\
| lookup ascera_index_system_map index AS idxName cui_system_splunk_id OUTPUT cui_system_splunk_id AS cui_system_splunk_id_match\
| where isnotnull(cui_system_splunk_id_match)\
| eval current_days=round((now()-earliest_event)/86400,0)\
| eval retention_policy=`sp6_log_retention_period`\
| eval gb_per_day=(current_size_gb/current_days), gb_remaining=if(max_size_gb=0,9999,max_size_gb-current_size_gb), days_until_max=if(gb_per_day=0,"9999",round(gb_remaining/gb_per_day,0)), est_days_at_max=round((current_days+days_until_max),0)\
| eval control_at_risk=if(est_days_at_max<retention_policy,"true","false")\
| table cui_system_splunk_id idxName control_at_risk retention_days retention_policy current_days est_days_at_max earliest_event latest_event current_size_gb max_size_gb event_count\
| rename idxName AS index\
| convert timeformat="%Y-%m-%d" ctime(earliest_event) ctime(latest_event)\
| sort - control_at_risk\
| eval index_details=index + ": " + " Configured Retention (days): " + retention_days + " Retention Policy (days): " + retention_policy

