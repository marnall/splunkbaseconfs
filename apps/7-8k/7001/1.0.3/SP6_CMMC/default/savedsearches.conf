display.general.timeRangePicker.show = 0
search = | rest /servicesNS/-/-/saved/searches \
| search eai:acl.app=SP6_CMMC\
| search title="ASCERA Status Check*"\
| rex field=description max_match=0 "(?P<control>\d+\.\d+\.\d+)\[(?P<assessment_objective>[^\]]+)\]"\
| table title, control, assessment_objective, description
