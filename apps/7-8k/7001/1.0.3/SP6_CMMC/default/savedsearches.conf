dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = | tstats `sp6_dm_summariesonly` count values(All_Sessions.tag) AS tag from datamodel=Network_Sessions where (All_Sessions.tag=start OR All_Sessions.tag=end) by _time All_Sessions.dest_ip,All_Sessions.src_ip All_Sessions.tag sourcetype \
| rename All_Sessions.* as * \
| `filter_system_tags` \
| mvexpand cui_system_splunk_id \
| fields - count \
| eval session_end_time = if(tag == "end", _time,NULL) \
| eval session_start_time = if(tag == "start", _time,NULL) \
| stats count values(session_start_time) as session_start_time values(session_end_time) as session_end_time values(sourcetype) as sourcetype by dest_ip,src_ip \
| eval duration=session_end_time - session_start_time \
| eval duration_threshold1=tonumber(`sp6_user_duration_maximum`)\
| eval duration_threshold2='duration_threshold1'*3600\
| where duration < duration_threshold2\
| convert ctime(session_end_time) ctime(session_start_time) \
| append \
    [| inputlookup sp6_control_status \
    | stats count by cui_system_splunk_id \
    | fields - count \
    | eval count=0, rows_count=0, durations=0,num_of_durations=0,sourcetypes=0,num_of_sourcetypes=0,sources=0,num_of_sources=0,destinations=0,num_of_destinations=0] \
| stats count as rows_count values(duration) as durations dc(duration) as num_of_durations values(sourcetype) as sourcetypes dc(sourcetype) as num_of_sourcetypes values(src_ip) as sources dc(src_ip) as num_of_sources values(dest_ip) as destinations dc(dest_ip) as num_of_destinations by cui_system_splunk_id \
| eval control="SC.L2-3.13.9", assessment_objective_letter="b" \
| lookup sp6_control_status control cui_system_splunk_id assessment_objective_letter OUTPUTNEW control_owner control_supercedes_until control_status AS control_status_current \
| eval control_status=if(num_of_durations>0,"Not Met","Met") \
| eval control_status=if(control_status_current=="N/A",control_status_current,if(now()<control_supercedes_until,control_status_current,control_status)) \
| eval description_data_1= `sp6_description_data("sources","Sources")` ,description_data_2=`sp6_description_data("destinations","Destinations")` ,description_data_3= `sp6_description_data("sourcetypes","Sourcetypes")`

