search = | inputlookup sp6_assets_by_str \
| join type=left nt_host\
    [| tstats summariesonly=t values(Malware_Attacks.tag) as tag count from datamodel=Malware where earliest=-7d@d by Malware_Attacks.dest Malware_Attacks.date Malware_Attacks.signature sourcetype \
    | rename Malware_Attacks.* as * \
    | eval scan_date = strptime(date, "%m-%d-%Y") \
    | stats values(tag) as tag sum(count) as malware_events min(scan_date) as earliest_scan max(scan_date) as latest_scan by dest sourcetype\
    | eval dest=lower(dest)\
    | rename dest as nt_host] \
| fillnull value="0" malware_events\
| fillnull value="unknown" asset ip tag earliest_scan latest_scan sourcetype\
| stats values(sourcetype) as datasource sum(malware_events) as malware_events by cui_system_splunk_id nt_host\
| appendcols \
    [| inputlookup sp6_assets_by_str \
    | stats count as host_count]\
| filldown host_count\
| eval malware_machines=if(malware_events>0, "1", "0")\
| stats sum(malware_machines) as total_machines_with_malware by host_count cui_system_splunk_id\
| eval perc_machines_malware=round(total_machines_with_malware/host_count,2)*100\
| eval control="SI.L1-3.14.5", assessment_objective_letter="b"\
| lookup sp6_control_status control cui_system_splunk_id assessment_objective_letter OUTPUTNEW control_owner control_supercedes_until control_status AS control_status_current\
| eval control_status=if(perc_machines_malware>50,"Met","Not Met")\
| eval control_status=if(control_status_current=="N/A",control_status_current,if(now()<control_supercedes_until,control_status_current,control_status))\
| eval description_data= `sp6_description_data("sourcetypes","Sourcetypes")`\
| eval last_scan=strftime(last_scan,"%Y-%m-%d %H:%M:%S")

