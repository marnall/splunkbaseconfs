[TrellixEDRThreats]
TRUNCATE = 300000

[TrellixDataSource]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 3000000

[source::...ta-trellix-epo-saas-connector*.log*]
sourcetype = tatrellixeposaasconnector:log

[source::...ta_trellix_epo_saas_connector*.log*]
sourcetype = tatrellixeposaasconnector:log

[mcafee:mvepo:events]
EVAL-severity = if(match(threatseverity,"2"),"high",if(match(threatseverity, "3"), "medium", if(match(threatseverity, "5"),"low","informational")))
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_1 = analyzerdatversion AS signature_version
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_10 = targetprocessname AS process_path
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_11 = targetfilename AS file_name
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_12 = targethash AS file_hash
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_13 = targetipv4 AS src_ip
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_14 = targetmac AS mac
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_15 = targetusername AS user_name
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_16 = targetport AS src_port
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_17 = targethostname AS name
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_18 = threatactiontaken AS action
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_5 = analyzerversion AS product_version
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_6 = analyzername AS vendor_product
FIELDALIAS-aob_gen_mcafee_mvepo_events_alias_9 = sourceprocesshash AS process_hash
MAX_TIMESTAMP_LOOKAHEAD = 15
TIME_PREFIX = "detectedutc"
TRUNCATE = 0
SHOULD_LINEMERGE = false

