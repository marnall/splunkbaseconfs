
[admin:TA_trellix_epo_saas_connector]
match = /
members = TA_trellix_epo_saas_connector_settings, TA_trellix_epo_saas_connector_trellix_data_source, TA_trellix-saas-api-invoker

[admin_external:TA_trellix_epo_saas_connector_settings]
handlertype = python
python.version = python3
handlerfile = TA_trellix_epo_saas_connector_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_trellix_epo_saas_connector_trellix_data_source]
handlertype = python
python.version = python3
handlerfile = TA_trellix_epo_saas_connector_rh_trellix_data_source.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_trellix-saas-api-invoker]
handlertype           = python
python.version        = python3
handlerfile           = trellix_saas_api_invoker.py
handleractions        = edit, list, remove, create
handlerpersistentmode = true

[validation:TA_trellix-saas-api-invoker]
name = validate()
ip = validate()

[script:trellix_rest_api_invoker_script]
match                 = /trellix
script                = trellix_rest_api_invoker_script.py
scripttype            = persist
python.version        = python3
handler               = trellix_rest_api_invoker_script.TrellixRESTInvokerScript

[script:trellix_tag_manager]
match                 = /trellix_saas
script                = trellix_saas_load_tag.py
scripttype            = persist
handler               = trellix_saas_load_tag.TrellixSaaSLoadTag
python.version        = python3
# Add these to ensure all info is passed to the script
passPayload           = true
passHttpHeaders      = true
passRestArgs          = true

[script:trellix_campaign_manager]
match                 = /trellix_campaign
script                = trellix_saas_campaign_details.py
scripttype            = persist
handler               = trellix_saas_campaign_details.TrellixSaaSCampaignDetails
python.version        = python3
# Add these to ensure all info is passed to the script
passPayload           = true
passHttpHeaders      = true
passRestArgs          = true