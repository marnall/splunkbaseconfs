[moveit_automation_run_a_task]
python.version = python3
param.account_name = <string> Account Name. It's a required parameter.
param.task_id = <string> Task ID.  It's default value is $result.ID$.
description = Send a trigger to a specified MOVEit Automation server to run a task using task id
label = MOVEit Automation : Run a Task
is_custom = 1
payload_format = json
icon_path = alert_moveit_automation_run_a_task.png
