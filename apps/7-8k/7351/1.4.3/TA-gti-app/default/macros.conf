[gti_index_list]
definition = ()

[gti_command_list(1)]
args = list_str
definition = eval list_cache = "$list_str$" | makemv delim="," list_cache | mvexpand list_cache

[gti_file_list]
definition = `gti_command_list("md5,sha1,sha256,MD5,SHA1,SHA256")`

[gti_url_list]
definition = `gti_command_list("target_url,url")`

[gti_domain_list]
definition = `gti_command_list("cert_cn,domain")`

[gti_ip_list]
definition = `gti_command_list("src_ip,src_address,ip_address,ip")`

[gti_ttl]
definition = 30

# macro `check_time` that takes 3 arguments and checks if time is correct
[check_time(3)]
args = time, earliest, latest
definition = where ("$earliest$" = "0" OR $time$ >= relative_time(now(), "$earliest$")) AND ("$latest$" = "" OR "$latest$" = "now" OR relative_time(now(), "$latest$") >= $time$)

[mitre(2)]
args = earliest, latest
definition = inputlookup gti_file_cache | `check_time(_first_seen_in_events, $earliest$, $latest$)` | join type=inner gti_id [| inputlookup gti_mitre_cache | fields - _first_seen_in_events _last_seen_in_events ] | join type=left gti_id [| inputlookup gti_ignore_cache | search gti_type=hash] | where isnull(gti_type) | fields gti_id gti_mitre_tree | appendpipe [ stats count | where count=0 ]

[gti_info_min_time]
description  = Add earliest info to the query from specified timerange
definition = [| makeresults | addinfo | return $info_min_time]
iseval = 0

[gti_info_max_time]
description = Add latest info to the query from specified timerange
definition = [| makeresults | addinfo | eval info_max_time=if(info_max_time="+Infinity", 2999999999, info_max_time) | return $info_max_time]
iseval = 0

[gti_cve_index]
definition = (index="gti_cve_internal")