[admin:TA_gti_app]
match = /
members = TA_gti_app_settings, TA_gti_app_threat_lists, TA_gti_app_ioc_stream, TA_gti_app_cve

[admin_external:TA_gti_app_settings]
handlertype = python
python.version = python3
handlerfile = TA_gti_app_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[script:gti]
match=/tagtiapp
script = vt_rest_endpoints.py
scripttype = persist
handler = vt_rest_endpoints.VtHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth	      = true
python.version        = python3

[admin_external:TA_gti_app_threat_lists]
handlertype = python
python.version = python3
handlerfile = TA_gti_app_rh_threat_lists.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_gti_app_ioc_stream]
handlertype = python
python.version = python3
handlerfile = TA_gti_app_rh_ioc_stream.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_gti_app_cve]
handlertype = python
python.version = python3
handlerfile = TA_gti_app_rh_cve.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
