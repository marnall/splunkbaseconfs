[gti-command]
syntax = gti <gti-options>*
description= Enrichs a record using Google Threat Intelligence, caching the results for subsequent searches.
shortdesc = Enrichs a record using Google Threat Intelligence
usage = public

[gti-options]
syntax = hash=<string> | ip=<string> | domain=<string> | url=<string> | nocache=(true)

[gtideleteiocs-command]
syntax = gtideleteiocs (<gtideleteiocs-options>)*
description = Delete IoCs from GTI lookup table using the given options.
shortdesc = Delete IoCs from GTI lookup table
usage = public

[gtideleteiocs-options]
syntax = lookups=<list> | ttl=<int>

[gtiadversaryupdate-command]
syntax = gtiadversaryupdate
description = Keep up-to date campaigns, malware toolkits and threat actors.
shortdesc = Keep up-to date campaigns, malware toolkits and threat actors
usage = public

[gtimitreupdate-command]
syntax = gtimitreupdate
description = Keep up-to date MITRE ATT&CS.
shortdesc = Keep up-to date MITRE ATT&CS
usage = public
