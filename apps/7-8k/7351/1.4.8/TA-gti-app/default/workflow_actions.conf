[GTIFileReport]
display_location = both
fields = md5, MD5, sha1, SHA1, sha256, SHA256, file_hash
label = Open www.virustotal.com report for $@field_value$
link.method = get
link.target = blank
link.uri = https://www.virustotal.com/gui/file/$@field_value$
type = link

[GTIDomainReport]
display_location = both
fields = domain, src_host, dest_host
label = Open www.virustotal.com report for $@field_value$
link.method = get
link.target = blank
link.uri = https://www.virustotal.com/gui/domain/$@field_value$
type = link

[GTIUrlReport]
display_location = both
fields = url, referrer, link
label = Open www.virustotal.com report for $@field_value$
link.method = get
link.target = blank
link.uri = /app/TA-gti-app/redirect?url_token=$@field_value$
type = link

[GTIIpReport]
display_location = both
fields = ip, src_ip, dest_ip, src, dest
label = Open www.virustotal.com report for $@field_value$
link.method = get
link.target = blank
link.uri = https://www.virustotal.com/gui/ip-address/$@field_value$
type = link
