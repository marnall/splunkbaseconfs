[openwrt]
EXTRACT-dhcp-discover = <\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\[1]:\s(?<action>\w+)\((?<subnet>\S+)\)\s(?<mac_address>\w+:\w+:\w+:\w+:\w+:\w+)
EXTRACT-dhcp-pack = <\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\[1]:\s(?<action>\w+)\((?<subnet>\S+)\)\s(?<src_ip>\d+.\d+.\d+.\d+)\s(?<mac_address>\w+:\w+:\w+:\w+:\w+:\w+)\s(?<hostname>\S+)
EXTRACT-dhcp-prerequest = <\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\[1]:\s(?<action>\w+)\((?<subnet>\S+)\)\s(?<src_ip>\d+.\d+.\d+.\d+)\s(?<mac_address>\w+:\w+:\w+:\w+:\w+:\w+)
EXTRACT-dns-query-from = <.*>\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\[1]:\s\d+\s(?<src_ip>\d+.\d+.\d+.\d+)\/(?<id_request>\d+)\s(?<action>\S+)\s(?<dst_hostname>\S+)\s\S+\s(?<dst_ip>\d+.\d+.\d+.\d+)
EXTRACT-dns-query-is = <.*>\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\[1]:\s\d+\s(?<src_ip>\d+.\d+.\d+.\d+)\/(?<id_request>\d+)\s(?<action>\S+)\s(?<dst_hostname>\S+)\sis\s(?<dst_ip>\d+.\d+.\d+.\d+)
EXTRACT-openvpn-connections = <\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\(\S+\s(?<user>\S+)\/(?<source>\d+.\d+.\d+.\d+):(?<src_port>\d+)\s(?<method>\S+):\s\S+\s(?<ip>\d+.\d+.\d+.\d)
EXTRACT-openvpn-disconnect = <\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+)\(\S+\s(?<user>\S+)\/(?<src_ip>\d+.\d+.\d+.\d+):(?<src_port>\d+)\s(?<act>\D+),\s\S+\s\S+
EXTRACT-wifi-connections = <\S+\s\S+\s\S+\s(?<router_name>\S+)\s(?<subsystem_name>\S+):\s(?<radio_id>\S+):\s\S+\s(?<mac_address>\w+:\w+:\w+:\w+:\w+:\w+)\s(?<standard_name>\S+\s\S+):\s(?<reason>\.*.*)
FIELDALIAS-aob_gen_openwrt_alias_1 = hostname AS dest_nt_host
FIELDALIAS-aob_gen_openwrt_alias_10 = reason AS action
FIELDALIAS-aob_gen_openwrt_alias_11 = subsystem_name AS name
FIELDALIAS-aob_gen_openwrt_alias_12 = ip AS dest_ip
FIELDALIAS-aob_gen_openwrt_alias_13 = act AS action
FIELDALIAS-aob_gen_openwrt_alias_2 = mac_address AS dest_mac
FIELDALIAS-aob_gen_openwrt_alias_3 = router_name AS vendor_product
FIELDALIAS-aob_gen_openwrt_alias_4 = action AS query_type
FIELDALIAS-aob_gen_openwrt_alias_5 = dst_hostname AS dest
FIELDALIAS-aob_gen_openwrt_alias_6 = dst_ip AS dest
FIELDALIAS-aob_gen_openwrt_alias_7 = id_request AS transaction_id
FIELDALIAS-aob_gen_openwrt_alias_8 = src_ip AS src
FIELDALIAS-aob_gen_openwrt_alias_9 = standard_name AS wifi
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
