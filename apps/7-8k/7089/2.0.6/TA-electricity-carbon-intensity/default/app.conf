# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Sebastian Schimper, Marc Thomas
version = 2.0.6
description = This add-on is a ground-up re-write of "National Grid Carbon Intensity Add-On for Splunk", helping you calculate your carbon food print by querying data from the National Grid Carbon Intensity API, as well as from Electricity Maps.

[ui]
is_visible = 1
label = Splunk Add-on for Electricity Carbon Intensity
docs_section_override = AddOns:released

[package]
id = TA-electricity-carbon-intensity

[triggers]
reload.addon_builder = simple
reload.ta_electricity_carbon_intensity_add_on_for_splunk_account = simple
reload.ta_electricity_carbon_intensity_add_on_for_splunk_settings = simple
reload.passwords = simple

