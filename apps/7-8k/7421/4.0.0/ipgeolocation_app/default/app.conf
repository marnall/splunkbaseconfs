#
# Splunk app configuration file
#

[default]


[id]
name = ipgeolocation_app
version = 4.0.0

[install]
is_configured = 0
build = 0
state = enabled

[ui]
label = ipgeolocation.io
is_visible = 1
setup_view = configure_app

[launcher]
author = ipgeolocation.io Support
description = IPGeolocation App for IP information from ipgeolocation.io
version = 4.0.0

[package]
id = ipgeolocation_app
check_for_updates = true

[triggers]
reload.ipgeolocation_setup = simple
reload.eventgen = simple
