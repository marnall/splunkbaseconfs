# -----------------------------------------------------------------------------
# STANDARD (STD) DATABASES
# -----------------------------------------------------------------------------

[script://$SPLUNK_HOME/etc/apps/ipgeolocation_app/bin/db_std_ip_country_mmdb.py]
index          = _internal
sourcetype     = ipgeolocation_app_std_ip_country_mmdb
interval       = 604800
disabled       = 1
passAuth       = splunk-system-user
run_only_one   = false
python.version = python3
python.required = 3.13

