[script:ipgeolocation_app]
match = /refresh_mmdb
script = refresh_mmdb_endpoint.py
scripttype = persist
handler = refresh_mmdb_endpoint.IPGeolocationRefreshMMDB
python.required = 3.13
python.version = python3

[script:endpoint_download]
#matches https://$SERVER:$PORT/services/send
match = /download
#splunk automatically looks for the script in the app's bin folder
#handler = <script_name>.<className>
handler = custom_endpoint.Download
scripttype = persist
python.required = 3.13
python.version = python3