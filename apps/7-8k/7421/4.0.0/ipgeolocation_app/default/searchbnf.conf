##################
# ipgeolocationbatch
##################
[ipgeolocationbatch-command]
syntax = | ipgeolocationbatch <ipgeolocationbatch-options>
shortdesc = Polling data from ipgeolocation.io API using secure HTTPS protocol or from MMDB databases.
description = Generating command to poll data from ipgeolocation.io API. Please store API key and subscription plan using setup option before using `ipsecuritybatch` command and pass IPs.
usage = public
example1 = | ipgeolocationbatch ips="1.0.0.1, 1.0.0.2, 1.0.0.3, 1.0.0.4"
comment1 = Returns hostname (supported on lookup from API), location, country, network, security and timezone from ipgeolocation.io for the provided IP addresses
example2 = ipgeolocation ip language=fr
comment2 = Returns the IP geolocation response in the set language from ipgeolocation.io API or database. Supported languages are 'en', 'de', 'ru', 'ja', 'fr', 'cn', 'es', 'cs', 'it', 'ko', 'fa' and 'pt'.
tags = ipgeolocation
maintainer = Muhammad Usman

[ipgeolocationbatch-options]
syntax = (ips=<comma-separated-ip-addresses>) | liveHostname=<bool> | hostnameFallbackLive=<bool> | abuseContact=<bool> | dma=<bool> | geoAccuracy=<bool> | security=<bool> | allinfo=<bool> | language=en|de|ru|ja|fr|cn|es|cs|it|ko|fa|pt

##################
# ipgeolocation
##################
[ipgeolocation-command]
syntax = ipgeolocation <ipgeolocation-options>
shortdesc = Lookup Data from ipgeolocation.io API or MMDB database.
description = Lookup command to lookup data from ipgeolocation.io API. At least one IP field is required. Please store your subscription API key using setup option before using app and pass IPs.
usage = public
example1 = ipgeolocation ip
comment1 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' field.
example2 = ipgeolocation ip security=true
comment2 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' field along with security information.
example3 = ipgeolocation ip dma=true
comment3 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' field along with DMA (Designated Market Area) code.
example4 = ipgeolocation ip abuseContact=true
comment4 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' field along with abuse contact details
example5 = ipgeolocation ip liveHostname=true
comment5 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' field along with live hostname lookup.
example6 = ipgeolocation ip hostnameFallbackLive=true
comment6 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' field along with hostname lookup from the database and fallbacks to live hostname lookup if not in the database.
example7 = ipgeolocation ip prefix=true
comment7 = Returns the IP geolocation from ipgeolocation.io API or database and joins results with itself on 'ip' adds prefix 'ip_' or the IP field name to all field names.
example8 = ipgeolocation ip allinfo=true
comment8 = Returns the IP hostname (supported on lookup from API), location, country, network, security and timezone from ipgeolocation.io API or database and joins results with itself on 'ip' field.
example9 = ipgeolocation ip language=fr
comment9 = Returns the IP geolocation response in the set language from ipgeolocation.io API or database. Supported languages are 'en', 'de', 'ru', 'ja', 'fr', 'cn', 'es', 'cs', 'it', 'ko', 'fa' and 'pt'.
tags = ipgeolocation
maintainer = Muhammad Usman

[ipgeolocation-options]
syntax = allinfo=<bool> | liveHostname=<bool> | hostnameFallbackLive=<bool> | abuseContact=<bool> | dma=<bool> | geoAccuracy=<bool> | security=<bool> | prefix=true | language=en|de|ru|ja|fr|cn|es|cs|it|ko|fa|pt
description = Lookup command to search IP to location from ipgeolocation.io. Please store your subscription API key and set API plan to `FREE` or `PAID` using setup option before using this command and pass IPs.

##################
# ipsecuritybatch
##################
[ipsecuritybatch-command]
syntax = | ipsecuritybatch <ipsecuritybatch-options>
shortdesc = Polling data from ipgeolocation.io API using secure HTTPS protocol or from MMDB databases.
description = Generating command to poll data from ipgeolocation.io API. Please store API key and subscription plan using setup option before using `ipsecuritybatch` command and pass IPs.
usage = public
example1 = | ipsecuritybatch ips="1.0.0.1, 1.0.0.2, 1.0.0.3, 1.0.0.4"
comment1 = Returns security information (vpn, proxy, tor, cloud_provider) from ipgeolocation.io API for the provided IP addresses
tags = ipsecurity
maintainer = Muhammad Usman

[ipsecuritybatch-options]
syntax = (ips=<comma-separated-ip-addresses>)

##################
# ipsecurity
##################
[ipsecurity-command]
syntax = ipsecurity <ipsecurity-options>
shortdesc = Lookup IP to security information from ipgeolocation.io API or MMDB database.
description = Lookup command to search security details for any IP address from ipgeolocation.io API. At least one IP is required. Please store your subscription API key using setup option before using app and pass IPs.
usage = public
example1 = ipsecurity ip
comment1 = Returns the IP security information from ipgeolocation.io API or database and joins results with itself on 'ip' field.

tags = ipsecurity
maintainer = Muhammad Usman

[ipsecurity-options]
syntax = 
description = Lookup command to search IP to security information from ipgeolocation.io. Please store your subscription API key and set API plan to `Paid` using setup option before using this command and pass IPs.