methods = POST, GET

[expose:TA_cirrus_identity_bridge_account_specified]
pattern = TA_cirrus_identity_bridge_account/*
methods = POST, GET, DELETE

[expose:TA_cirrus_identity_bridge_settings]
pattern = TA_cirrus_identity_bridge_settings
methods = POST, GET

[expose:TA_cirrus_identity_bridge_settings_specified]
pattern = TA_cirrus_identity_bridge_settings/*
methods = POST, GET, DELETE

[expose:TA_cirrus_identity_bridge_cirrusidentitybridge]
pattern = TA_cirrus_identity_bridge_cirrusidentitybridge
methods = POST, GET

[expose:TA_cirrus_identity_bridge_cirrusidentitybridge_specified]
pattern = TA_cirrus_identity_bridge_cirrusidentitybridge/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
