#Tanium uses transforms.conf to define the sourcetype via regex expression for each data source from Tanium Connect or Tanium Stream.

[tanium_audit]
REGEX = \"object_id\"
FORMAT = sourcetype::tanium:audit
DEST_KEY = MetaData:Sourcetype

[tanium_inventory]
REGEX = Question=\"?Splunk.Basic.Asset\"?
FORMAT = sourcetype::tanium:inventory
DEST_KEY = MetaData:Sourcetype

[tanium_discover_lost]
REGEX = \"Event\"\:\"Discover Notifications\/Lost Interface\"
FORMAT = sourcetype::tanium:discover:lost
DEST_KEY = MetaData:Sourcetype

[tanium_discover_managed]
REGEX = \"Event\"\:\"Discover Notifications\/New Managed Interface\"
FORMAT = sourcetype::tanium:discover:managed
DEST_KEY = MetaData:Sourcetype

[tanium_discover_unmanaged]
REGEX = \"Event\"\:\"Discover Notifications\/New Unmanaged Interface\"
FORMAT = sourcetype::tanium:discover:unmanaged
DEST_KEY = MetaData:Sourcetype

[tanium_discover_report]
REGEX = Question=\"?Tanium.Discover\"?
FORMAT = sourcetype::tanium:discover:report
DEST_KEY = MetaData:Sourcetype

[discover_vendor_lookup]
filename = tanium_discover_vendor_lookup.csv
max_matches = 1

[tanium_hardware_cpu]
REGEX = Question=\"?Splunk.Hardware.CPU\"?
FORMAT = sourcetype::tanium:hardware:cpu
DEST_KEY = MetaData:Sourcetype

[tanium_endpoint_processes]
