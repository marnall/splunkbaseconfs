# scm_data

# NOTE: This configuration is provided as an example and should be adjusted to your specific environment.
# Replace the placeholder path with the actual path to your Tripwire data on your platform.
# Below is a basic example of a batch input. Update the path to match where your Tripwire data resides.
[batch://$SPLUNK_HOME/etc/apps/tripwire_enterprise_app/data/batch/scm_data.*]

# If your universal forwarder is installed on a Linux Tripwire Enterprise (TE) server,
# uncomment the line below and comment out the line above.
# Ensure the path accurately reflects the location of the scm_data files.
# [batch:///usr/local/tripwire/te/server/data/export/batch/scm_data.*]

# If your universal forwarder is installed on a Windows Tripwire Enterprise (TE) server,
# uncomment the line below and comment out the line(s) above.
# Ensure the path accurately reflects the location of the scm_data files.
# Note: Use back slashes (\) in the path and ensure $TW_HOME is correctly set to your Tripwire installation directory.
# [batch://$TW_HOME\data\export\batch\scm_data.*]

disabled = false
crcSalt = <SOURCE>
index = te_scm
sourcetype = te_scm
move_policy = sinkhole
source = scm_data.log

