request.ui_dispatch_view = search
search = index="te_config" sourcetype=te_policypathitems \
[| tstats latest(ConfigurationId) as ConfigurationId where index=te_config sourcetype=te_policypathitems by host] \
| rex field=_raw "\"SourceIdentifier\":\"(?<SourceIdentifier>[^\"]+)\""\
| rex field=_raw "\"MessageSubType\":\"(?<MessageSubType>[^\"]+)\""\
| rex field=_raw "\"ConfigurationId\":\"(?<ConfigurationId>[^\"]+)\""\
    | spath path=Entities{}.id output=PolicyID \
    | spath path=Entities{}.name output=PolicyName \
    | spath path=Entities{}.type output=PolicyType \
    | spath path=Entities{}.description output=PolicyDescription\
| rename host as SourceName _time as timestamp\
| dedup PolicyID SourceName\
| table timestamp SourceName SourceIdentifier PolicyID PolicyName PolicyType PolicyDescription\
| outputlookup te_policypathitems_lookup

[Snapshot Builder]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 05 0 * * *
description = Builds a snapshot of the current policy test results and adds it to te_scm_condensed summary index.
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = |multisearch\
  [ search index=te_scm \
         [ search index=te_watermarks | stats latest(LatestResult) as earliest by SourceName | rename SourceName as host | union [| metadata type=hosts index=te_scm | stats first(firstTime) as earliest by host ] | dedup host sortby - earliest]\
    host="*" (SummaryState="PASSED" OR SummaryState="FAILED")\
    | eval SourceName = host]\
  [search index=te_deletion_events \
         [ search index=te_watermarks | stats latest(DeletedObjectWatermark) as earliest by SourceName | union [| metadata type=hosts index=te_scm | stats first(firstTime) as earliest by host | rename host as SourceName ] | dedup SourceName sortby - earliest]\
         ]\
  [search index=te_scm_condensed \
          [search index=te_watermarks JobType = "CurrentElements" |stats latest(SnapshotDate) as SnapshotDate by SourceName]\
          ]\
| eval deletion = if(isNull(PolicyTestID), 1, 0)\
| eventstats sum(deletion) as IsDeleted by ElementId\
| search IsDeleted = 0\
| stats\
  latest(ElementVersionId) as ElementVersionId \
  latest(ResultState) as ResultState \
  latest(ResultTime) as ResultTime\
  latest(SummaryState) as SummaryState\
  latest(_time) as _time\
  latest(Expected) as Expected\
  latest(Actual) as Actual latest(TestName) as TestName \
  latest(ElementName) as ElementName\
  latest(id) as id by ElementId PolicyTestID SourceName AssetID\
| eval SnapshotDate = now()\
| fields - IsDeleted\
| collect index=te_scm_condensed\
| stats\
  count as SnapshotCount\
  max(_time) as LatestResult\
  min(_time) as EarliestResult\
  latest(SnapshotDate) as SnapshotDate\
  by SourceName\
| eval JobType = "CurrentElements"\
| join type=left SourceName\
  [search index=te_watermarks latest=now() |stats latest(LastProcessedLandedEpoch) as DeletedObjectWatermark by SourceName]\
  |fields SourceName SnapshotCount LatestResult EarliestResult SnapshotDate DeletedObjectWatermark JobType\
| collect index=te_watermarks

[Event Builder]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 45 * * * *
description = Creates deleted object events from configuration records.
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = index="te_deleted_objects" sourcetype="te_deleted_elements" \
[|search index=te_watermarks JobType = "DeletedElements" |stats latest(LastProcessedLandedEpoch) as earliest by SourceName |eval earliest=earliest + 1 | rename SourceName as host |union [| metadata type=hosts index=te_scm | stats first(firstTime) as earliest by host ] | dedup host sortby - earliest]\
| spath "Entities{}" \
|eval IsDeleted = 1\
|rename Entities{} as DeletedElement\
|eval SourceName = host\
|fields ConfigurationId MessageSubType SourceIdentifier Timestamp DeletedElement LandedEpoch IsDeleted _time SourceName SourceType\
|fields - _raw\
|mvexpand DeletedElement\
|rename DeletedElement as ElementId\
|collect index=te_deletion_events\
|stats max(_time) as LastProcessedLandedEpoch by SourceName\
|eval _time = now()\
|eval JobType = "DeletedElements"\
|collect index=te_watermarks


