| mvexpand AllPolicyArrays\
| rex field=AllPolicyArrays "\"(?<PolicyID>[^\"]+)\""\
| streamstats count as ParentGroup by TestID ParentGroupList \
| eventstats max(ParentGroup) as max_ParentGroup by TestID ParentGroupList \
| eval RootParentGroup=if(ParentGroup="1",1,0), FirstParentGroup=if(max_ParentGroup==ParentGroup,1,0)\
| rename host as SourceName _time as timestamp\
| table timestamp SourceName SourceIdentifier TestID, PolicyID ParentGroup ParentGroupList FirstParentGroup RootParentGroup\
| outputlookup te_policytesttoparentgroups_lookup

