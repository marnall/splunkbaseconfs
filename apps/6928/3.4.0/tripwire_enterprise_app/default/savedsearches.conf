action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
action.summary_index = 1
action.summary_index._type = event
action.summary_index._name = te_compliance_summary
cron_schedule = 55 0 * * *
durable.lag_time = 60
durable.track_time_type = _time
enableSched = 1
realtime_schedule = 0
schedule_priority = highest
schedule_window = auto
alert.track = 0
description = The TE Compliance Snapshot Report offers a timely and accurate portrayal of each asset's adherence to set policies and test results. Aimed at streamlining the compliance review process, this report is a pivotal resource for understanding the compliance status of assets at any given moment. Regularly scheduled, it populates summary index data to provide a state of test results as they stand at the snapshot time, offering an interpolated view that captures compliance in its current state.
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = tripwire_enterprise_app
request.ui_dispatch_view = search
search = index=te_scm_condensed\
[search index=te_watermarks |stats latest(SnapshotDate) as SnapshotDate by SourceName]\
|lookup te_policytest_lookup TestID as PolicyTestID SourceName excludedNodes as AssetID OUTPUT excludedNodes\
| where isnull(excludedNodes)\
| lookup te_policytest_lookup TestID as PolicyTestID SourceName OUTPUT Severity\
| lookup te_asset_inventory AssetID SourceName OUTPUT AssetID DNSName AssetIP as IP AssetType\
| lookup te_test_and_policies_short TestID as PolicyTestID SourceName OUTPUT PolicyID\
| lookup te_policy_lookup AssetID PolicyID SourceName OUTPUT PolicyID\
| lookup te_waiver_lookup TestID as PolicyTestID SourceName AssetID PolicyID OUTPUT WaiverID \
| rename PolicyTestID as TestID\
| stats \
latest(SnapshotDate) as _time \
latest(DNSName) as DNSName\
latest(IP) as IP\
latest(AssetType) as AssetType\
latest(TestName) as TestName\
values(ElementName) as ElementName\
values(ElementId) as ElementId\
values(ElementVersionId) as ElementVersionId\
latest(ResultState) as ResultState\
latest(SummaryState) as SummaryState\
latest(ISWaived) as ISWaived\
latest(Severity) as Severity\
latest(ResultTime) as ResultTime\
latest(Expected) as Expected\
latest(Actual) as Actual\
last(WaiverID) as WaiverID\
by AssetID TestID PolicyID SourceName\
| lookup te_policypathitems_lookup PolicyID SourceName OUTPUT PolicyName PolicyType PolicyDescription\
| eval FirstParentGroup="1"\
| lookup te_test_and_policies TestID SourceName FirstParentGroup OUTPUT PolicyName as ParentTestGroup\
| lookup te_waiver_lookup TestID SourceName AssetID PolicyID WaiverID OUTPUT WaiverName startTime expiration\
| eval startTimeEpoch = strptime(startTime, "%Y-%m-%dT%H:%M:%S.%3NZ")\
| eval expirationTimeEpoch = strptime(expiration, "%Y-%m-%dT%H:%M:%S.%3NZ")\
| eval ResultTimeEpoch = strptime(ResultTime, "%Y-%m-%dT%H:%M:%S.%3NZ")\
| eval ISWaived = if(isnotnull(WaiverName),if(isnull(expirationTimeEpoch) OR (ResultTimeEpoch <= expirationTimeEpoch),"Yes","No"),"No")\
| table _time SourceName DNSName AssetType IP AssetID ParentTestGroup PolicyName PolicyType PolicyDescription PolicyID TestName TestID ElementName ElementId ElementVersionId ResultState SummaryState ISWaived Severity ResultTime Expected Actual\
\
```Uncomment below to get test results summary per each asset for testing option to filter by policy ```\
\
```| where PolicyName="RHEL 7 - PCI v4.0"```\
```| stats\
values(PolicyName) as PolicyName\
values(PolicyID) as PolicyID\
max(ResultTime) as ResultTime\
dc(eval(if(SummaryState="PASSED",TestID,null()))) as PASSED\
dc(eval(if(SummaryState="FAILED",TestID,null()))) as FAILED\
dc(eval(if(ISWaived="Yes" AND SummaryState="FAILED" OR (SummaryState="PASSED"),TestID,null()))) as WPASSED\
dc(eval(if(ISWaived="No" AND SummaryState="FAILED",TestID,null()))) as WFAILED\
dc(eval(if(ISWaived="Yes",TestID,null()))) as Waived\
by AssetID SourceName AssetType DNSName\
| eval Compliance=round((PASSED/(PASSED+FAILED))*100,0)\
| eval ComplianceW=round((WPASSED/(WPASSED+WFAILED))*100,0) \
| eval "Without Waivers"=Compliance."% (estimate)"\
| eval Compliance=ComplianceW."% (estimate)"\
| eval DNSNameOrder = lower(DNSName)\
| sort SourceName DNSNameOrder\
| eval DNSName= DNSName." (".AssetType.")"\
| table SourceName AssetID DNSName PASSED FAILED WFAILED Waived Compliance "Without Waivers" ResultTime\
| eval ResultTime = strftime(strptime(ResultTime, "%Y-%m-%dT%H:%M:%S.%3NZ"), "%m/%d/%y %I:%M %p")\
| addcoltotals PASSED FAILED WFAILED Waived\
```


[TE Current Assets]
cron_schedule = 10 * * * *
enableSched = 1
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = Search returns a holistic view of all assets in TE, providing a detailed inventory that encompasses asset properties, configurations, tags, and tagsets. It is meticulously designed to produce a lookup that presents an up-to-date perspective on all current assets, facilitating asset management and compliance tracking.
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = tripwire_enterprise_app
request.ui_dispatch_view = search
search = index=te_config sourcetype=te_asset earliest=1 \
[|tstats latest(ConfigurationId) as  ConfigurationId where index=te_config sourcetype=te_asset by host]\
| eval MacAddresses = json_extract(_raw,"MacAddresses{}") \
| eval IPAddresses = json_extract(_raw,"IPAddresses{}") \
| eval TagSetValues = json_extract(_raw,"Tags") \
| eval CommonAgentCapabilities = json_extract(_raw,"CommonAgentCapabilities{}") \
| eval Licenses = json_extract(_raw,"Licenses{}") \
| eval is_licensed = if(isnull(len(Licenses)),"false", "true") \
| spath path=OS.Make output=Make \
| spath path=OS.Model output=Model \
| spath path=OS.Name output=Name \
| stats \
    latest(Make) as Make,\
    latest(Model) as Model,\
    values(Version) as Version\
    values(Name) as Name\
    values(Licenses) as Licenses \
    values(CommonAgentCapabilities) as CommonAgentCapabilities \
    latest(IP) as AssetIP\
    values(IPAddresses) as IPAddresses, \
    latest(Disabled) as Disabled,\
    latest(TagSetValues) as TagSetValues,\
    latest(AssetType) as AssetType,\
    latest(DNSName) as DNSName\
    latest(is_licensed) as IsLicensed \
    latest(Description) as Description\
    latest(CommonAgentVersion) as CommonAgentVersion\
    latest(CommonAgentOsName) as CommonAgentOsName\
    latest(CommonAgentOsVersion) as CommonAgentOsVersion\
    latest(CommonAgentUuid) as CommonAgentUuid\
    values(MacAddresses) as MacAddresses\
    latest(host) as SourceName\
    by AssetID SourceIdentifier \
| makemv delim="]," TagSetValues\
| rex field=TagSetValues mode=sed "s/[\[\]\{\}\"]//g"\
| mvexpand TagSetValues\
| eval TagSetValues=split(TagSetValues, ":")\
| eval TagSet=mvindex(TagSetValues, 0),Tag=mvindex(TagSetValues,1)\
| eval Tag=split(Tag, ",")\
| mvexpand Tag\
| eval TagSetValues = TagSet + "," + Tag \
| stats values(*) as * by AssetID \
| rex field=Licenses mode=sed "s/[\[\]\"]//g" \
| rex field=IPAddresses mode=sed "s/[\[\]\"]//g" \
| rex field=CommonAgentCapabilities mode=sed "s/[\[\]\"]//g"\
|outputlookup te_asset_inventory


