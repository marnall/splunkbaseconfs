[xmcyber:riskscore]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT

[xmcyber:riskscore:scenario]
TRUNCATE = 0
SHOULD_LINEMERGE = False
KV_MODE = json
