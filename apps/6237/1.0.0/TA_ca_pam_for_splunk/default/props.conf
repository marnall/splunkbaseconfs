[ca:pam:syslog]
# Splunk magic 8 props
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
#TIME_PREFIX = ^
# Sep  2 14:39:34
# MAX_TIMESTAMP_LOOKAHEAD = 15
# TIME_FORMAT = %b %e %H:%M:%S
# Sep 02 14:39:34
# MAX_TIMESTAMP_LOOKAHEAD = 15
# TIME_FORMAT = %b %d %H:%M:%S
# 2021-12-03T14:07:08-05:00
# MAX_TIMESTAMP_LOOKAHEAD = 15
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
TRUNCATE = 4096
# For_Load_Balancing_On_UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
# TRANSFORMS-index_ca_pam = set_index_ca_pam2 set_index_ca_pam3
AUTO_KV_JSON=false
KV_MODE = xml
EXTRACT-Metric = <Metric><type>(?<Metric_type>.*?)<\/type><level>(?<Metric_level>.*?)<\/level><description><hashmap>(?<hashmap>.*>)<\/hashmap><\/description><errorCode>(?<Metric_errorCode>.*?)<\/errorCode><userID>(?<PAM_src_user>.*?)<\/userID><success>(?<Metric_success>.*?)<\/success><originatingIPAddress>(?<Metric_originatingIPAddress>.*?)<\/originatingIPAddress><originatingHostName>(?<Metric_originatingHostName>.*?)<\/originatingHostName><extensionType>(?<Metric_extensionType>.*?)<\/extensionType><\/Metric>
EXTRACT-gkpsyslog = created = (?<created>.*?) Private IP: (?<PrivateIP>.*?), Public IP: (?<PublicIP>.*?), Nat\/Proxy IP: (?<Nat_ProxyIP>.*?), User: (?<PAM_src_user>.*?), Transaction: (?<Transaction>.*?), Address: (?<dest>.*?), Device Name: (?<DeviceName>.*?), User Group: (?<UserGroup>.*?), Port: (?<Port>.*?), Access\/Protocol: (?<Access_Protocol>.*?), Service\/App: (?<Service_App>.*?), Target Account: (?<TargetAccount>.*?), Details: (?<PAM_Details>.*?): (?<PAM_detail_message>.*)
REPORT-dest_ip_from_dest = ca_pam_dest_ip_from_dest
REPORT-dest_ip_from_targetserver_hostname = ca_pam_dest_ip_from_targetserver_hostname
REPORT-ca_pam_syslog_hashmap_kv = ca_pam_syslog_hashmap_kv_extraction
REPORT-ca_pam_login = ca_pam_login_auth_action_success,ca_pam_login_auth_action_failure,ca_pam_auto_login_initiated,ca_pam_autologin_session_id
EXTRACT-bmid = <bm\.id>(?<bm_id>\d+)<\/bm\.id>
EXTRACT-Actual_Approved_StartTS = <sd>(?<Actual_Approved_StartTS>\d{10})\d{3}<\/sd>
EXTRACT-Actual_Approved_EndTS = <ed>(?<Actual_Approved_EndTS>\d{10})\d{3}<\/ed>
EXTRACT-reason = <re>(?<reason>.*?)<\/re>
EXTRACT-PAM_src_user = <bm.cu>(?<PAM_src_user>.*?)<\/bm.cu>
EXTRACT-referenceCode = <rc>(?<referenceCode>.*?)<\/rc>
EXTRACT-reasonDetails = <de>(?<reasonDetails>.*?)<\/de>
EXTRACT-TargetAccount_ID = <ai>(?<TargetAccount_ID>.*?)<\/ai>
EVAL-ca_pam_id = coalesce(bm_id, PasswordViewRequest_ID, PasswordViewRequest.ID, pvr_id)
EVAL-Actual_Approved_StartTime = strftime(Actual_Approved_StartTS, "%d/%m/%Y %I:%M:%S %p")
EVAL-Actual_Approved_EndTime = strftime(Actual_Approved_EndTS, "%d/%m/%Y %I:%M:%S %p")
EVAL-PasswordViewRequest_requestPeriodStart_TS = strptime(PasswordViewRequest_requestPeriodStart+" UTC", "%Y-%m-%d %H:%M %Z")
EVAL-PasswordViewRequest_requestPeriodEnd_TS = strptime(PasswordViewRequest_requestPeriodEnd+" UTC", "%Y-%m-%d %H:%M %Z")
EVAL-action = vendor_action
EVAL-src_user = PAM_src_user
EVAL-dest_user = TargetAccount_userName
#EVAL-user = case(PAM_src_user=="unknown", null(), isnotnull(TargetAccount_userName), lower(TargetAccount_userName), isnotnull(PAM_src_user), lower(PAM_src_user), true(), null())
EVAL-user = case(PAM_src_user=="unknown", null(), isnotnull(TargetAccount_userName), lower(TargetAccount_userName), true(), null())
EVAL-Actual_Authenticaion_Server = TargetServer_hostName
EVAL-AutoLogin_StartTS = if(like(PAM_detail_message, "%Auto-login initiated%"), _time, null())
EVAL-AutoLogin_EndTS = if(like(PAM_detail_message, "%Connection terminated%"), _time, null())
EVAL-PAM_Action = if((Metric_type=="viewAccountPassword" AND selectedComponent==0 AND isnull(PasswordViewRequest_requestPeriodEnd)), "Retrieve password", PAM_Action)
EVAL-Access_Protocol = if(Access_Protocol=="- -", null(), Access_Protocol)
EVAL-Port = if(Port=="- -", null(), Port)
EVAL-Service_App = if(Service_App=="- -", null(), Service_App)
EVAL-TargetAccount = if(TargetAccount=="--", null(), TargetAccount)
EVAL-UserGroup = if(UserGroup=="--", null(), UserGroup)
EVAL-DeviceName = if(DeviceName=="- -", null(), DeviceName)
EVAL-dest = case(dest=="temp", null(), dest=="- -", null(), isnotnull(dest), dest, isnotnull(TargetServer_hostName), TargetServer_hostName)
EVAL-reasonDetails = if(reasonDetails=="Not required", null(), reasonDetails)
EVAL-PAM_error_message = case(PAM_Details=="PAM-CMN-1420", null(), PAM_Details=="PAM-SPFD-0012", null(), PAM_Details=="PAM-SPFD-0027", null(), PAM_Details=="PAM-SPFD-0028", null(), PAM_Details=="PAM-SPFD-0015", null(), PAM_Details=="PAM-SRM-0051", null(), true(), PAM_detail_message)
EVAL-src=coalesce(src, Nat_ProxyIP)
EVAL-is_default = if(lower(src_user) IN ("super","config"),"true", null())
EXTRACT-PamMessageCode = (?i)(?<PamMessageCode>pam-\w*-\d*)
EVAL-PAM_dest_ip = dest_ip

[xsuite]
# Splunk magic 8 props
TZ = UTC
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
#TIME_PREFIX = ^
# Sep  2 14:39:34
# MAX_TIMESTAMP_LOOKAHEAD = 15
# TIME_FORMAT = %b %e %H:%M:%S
# Sep 02 14:39:34
# MAX_TIMESTAMP_LOOKAHEAD = 15
# TIME_FORMAT = %b %d %H:%M:%S
# 2021-12-03T14:07:08-05:00
# MAX_TIMESTAMP_LOOKAHEAD = 15
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
TRUNCATE = 10000
TIME_PREFIX = (, createdate = |, created = |, startdate = )
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 1500
# For_Load_Balancing_On_UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
#TRANSFORMS-ca_pam_xsuite_sourcetype= set_ca_pam_xsuite_sourcetype set_ca_pam_xsuite_index
AUTO_KV_JSON=false
KV_MODE = xml
REPORT-ca_pam_kv = ca_pam_kv_extraction
REPORT-description_ca_pam_kv = description_ca_pam_kv_extraction
EXTRACT-bmid = <bm\.id>(?<bm_id>\d+)<\/bm\.id>
EXTRACT-Actual_Approved_StartTS = <sd>(?<Actual_Approved_StartTS>\d{10})\d{3}<\/sd>
EXTRACT-Actual_Approved_EndTS = <ed>(?<Actual_Approved_EndTS>\d{10})\d{3}<\/ed>
#EXTRACT-startdate_milliseconds = , startdate_milliseconds \= (?<Actual_Approved_StartTS>\d{10})\d{3}, 
#EXTRACT-enddate_milliseconds = , enddate_milliseconds \= (?<Actual_Approved_EndTS>\d{10})\d{3},
EXTRACT-reason = <re>(?<reason>.*?)<\/re>
EXTRACT-referenceCode = <rc>(?<referenceCode>.*?)<\/rc>
EXTRACT-reasonDetails = <de>(?<reasonDetails>.*?)<\/de>
EXTRACT-TargetAccount_ID = <ai>(?<TargetAccount_ID>.*?)<\/ai>
EVAL-ca_pam_id = coalesce(bm_id, PasswordViewRequest_ID, PasswordViewRequest.ID, pvr_id)
EVAL-Actual_Approved_StartTime = strftime(Actual_Approved_StartTS, "%d/%m/%Y %I:%M:%S %p")
EVAL-Actual_Approved_EndTime = strftime(Actual_Approved_EndTS, "%d/%m/%Y %I:%M:%S %p")