############################################################
# Index Macro                                              #
#  - Change this if you define your own indexes for inputs #
############################################################

[cisco_advisory_indexes]
definition = index::main

############################################################
# Cisco PSIRT openVuln API Advisory Macros                 #
############################################################

[cisco_advisory_sources]
definition = source::ti-cisco-vuln://*

[cisco_advisory_sourcetypes]
definition = sourcetype::cisco:vuln:advisories

[cisco_advisory_all]
definition = `cisco_advisory_indexes` `cisco_advisory_sources` `cisco_advisory_sourcetypes`

[cisco_advisory_table]
definition = `cisco_advisory_all` \
    | stats values(*) as *, latest(_time) as _time by hash, ingesttime \
    | eventstats latest(hash) as l_hash, latest(ingesttime) as l_ingesttime by advisoryId \
    | where (hash == l_hash) AND (ingesttime == l_ingesttime) \
    | table ingesttime, _time, lastUpdated, firstPublished, advisoryId, advisoryTitle, severity, cvss, ingesttime_nice \
    | sort 0 - _time, ingesttime \
    | fields - _time, ingesttime

[cisco_advisory_latest(1)]
args = id
definition = `cisco_advisory_all` advisoryId::$id$ \
    | sort - _time, ingesttime \
    | head 1
iseval = 0

############################################################
# Cisco CVRF XML Data Macros                               #
############################################################

[cisco_cvrf_indexes]
definition = `cisco_advisory_indexes`

[cisco_cvrf_sources]
definition = source::ti-cisco-vuln://*

[cisco_cvrf_sourcetypes]
definition = sourcetype::cisco:vuln:advisories:cvrf:*

[cisco_cvrf_sourcetype_summary]
definition = sourcetype::cisco:vuln:advisories:cvrf:summary

[cisco_cvrf_sourcetype_note]
definition = sourcetype::cisco:vuln:advisories:cvrf:note

[cisco_cvrf_sourcetype_vuln]
definition = sourcetype::cisco:vuln:advisories:cvrf:vuln

[cisco_cvrf_sourcetype_product]
definition = sourcetype::cisco:vuln:advisories:cvrf:product

[cisco_cvrf_all]
definition = `cisco_cvrf_indexes` `cisco_cvrf_sources` `cisco_cvrf_sourcetypes`