[source::ti-cisco-vuln://...]

TRANSFORMS-00-ingesttime = source:ti-cisco-vuln:00:ingesttime
TRANSFORMS-00-advisoryid = sourcetype:cisco-vuln:00:advisoryid

EVAL-ingesttime_nice = strftime(inputIngestTime,"%c %z")
EVAL-indextime_nice = strftime(_indextime,"%c %z")
EVAL-vendor = "Cisco"

##############################
#        Sourcetypes         #
##############################

[cisco:vuln:advisories]
# TIME_PREFIX = "lastUpdated":"
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S
# MAX_TIMESTAMP_LOOKAHEAD = 19
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = false
LINE_BREAKER = (*COMMIT)(?!)
MAX_EVENTS = 100000
TRUNCATE = 0
KV_MODE = JSON
ANNOTATE_PUNCT = false

FIELDALIAS-bugId = bugIDs{} AS bugId
FIELDALIAS-title = advisoryTitle AS title
FIELDALIAS-cve = cves{} AS cve
FIELDALIAS-cvss = cvssBaseScore AS cvss
FIELDALIAS-cwe = cwe{} AS cwe
FIELDALIAS-product = productNames{} AS product
FIELDALIAS-url = publicationUrl AS url
FIELDALIAS-signature = advisoryTitle AS signature

EVAL-severity = lower(sir)
EVAL-vendor_product = mvmap('productNames{}',"Cisco "+'productNames{}')
EVAL-product_count = mvcount(product)
EVAL-cve_count = mvcount('cves{}')
EVAL-product_is_asa = if(isnotnull(mvfind('productNames{}',"(?i)\basa\b|\(asa\)")),1,null())
EVAL-product_is_ios = if(isnotnull(mvfind('productNames{}',"(?i)\bios\b|\(ios\)")),1,null())
EVAL-product_is_nxos = if(isnotnull(mvfind('productNames{}',"(?i)\bnx-os\b")),1,null())
EVAL-product_is_sdwan = if(isnotnull(mvfind('productNames{}',"(?i)\bsd-wan\b")),1,null())
EVAL-product_is_firepower = if(isnotnull(mvfind('productNames{}',"(?i)\bfirepower\b|\(fxos\)")),1,null())
EVAL-product_is_webex = if(isnotnull(mvfind('productNames{}',"(?i)\webex\b")),1,null())


