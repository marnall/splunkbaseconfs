MAX_EVENTS = 100000
TRUNCATE = 0
KV_MODE = JSON
ANNOTATE_PUNCT = false

FIELDALIAS-title = DocumentTitle AS title
FIELDALIAS-status = DocumentTracking.Status AS status
FIELDALIAS-url = cvrfUrl AS url
FIELDALIAS-version = DocumentTracking.Version AS version


[cisco:vuln:advisories:cvrf:note]
# TIME_PREFIX = "CurrentReleaseDate":"
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S
# MAX_TIMESTAMP_LOOKAHEAD = 19
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = false
LINE_BREAKER = (*COMMIT)(?!)
MAX_EVENTS = 100000
TRUNCATE = 0
KV_MODE = JSON
ANNOTATE_PUNCT = false

FIELDALIAS-title = Title AS title
FIELDALIAS-type = Type AS type
FIELDALIAS-url = cvrfUrl AS url
FIELDALIAS-version = Version AS version


[cisco:vuln:advisories:cvrf:vuln]
# TIME_PREFIX = "CurrentReleaseDate":"
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S
# MAX_TIMESTAMP_LOOKAHEAD = 19
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = false
LINE_BREAKER = (*COMMIT)(?!)
MAX_EVENTS = 100000
TRUNCATE = 0
KV_MODE = JSON
ANNOTATE_PUNCT = false

FIELDALIAS-cve = CVE AS cve
FIELDALIAS-cvss = CVSSScoreSets.ScoreSetV3.BaseScoreV3 as cvss
FIELDALIAS-productId = ProductStatuses.Status{}.ProductID{}
FIELDALIAS-url = cvrfUrl AS url

EVAL-product_zip = mvmap('ProductStatuses.Status{}.ProductID{}','ProductStatuses.Status{}.Type'+"|"+'ProductStatuses.Status{}.ProductID{}')
EVAL-remediation_zip = mvmap('Remediations.Remediation{}.Type','Remediations.Remediation{}.Type'+"|"+'Remediations.Remediation{}.Description')
EVAL-workaround = mvindex('Remediations.Remediation{}.Description',mvfind('Remediations.Remediation{}.Type',"(?i)Workaround"))


[cisco:vuln:advisories:cvrf:product]
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = false
LINE_BREAKER = (*COMMIT)(?!)
MAX_EVENTS = 100000
TRUNCATE = 0
KV_MODE = JSON
ANNOTATE_PUNCT = false



