# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 17

[launcher]
author = CloudKnox, Inc.
version = 1.3.0
description = Collects data for permissions analytics report, CloudKnox alerts and CloudKnox platform audit logs in Splunk from CloudKnox platform

[ui]
is_visible = 1
label = CloudKnox Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-CloudKnox

[triggers]
reload.addon_builder = simple
reload.ta_cloudknox_settings = simple
reload.passwords = simple
