[expose:Splongo_interval_query]
methods = POST, GET
pattern = Splongo_interval_query

[expose:Splongo_interval_query_specified]
methods = POST, GET, DELETE
pattern = Splongo_interval_query/*

[expose:Splongo_settings]
methods = POST, GET
pattern = Splongo_settings

[expose:Splongo_settings_specified]
methods = POST, GET, DELETE
pattern = Splongo_settings/*

[expose:_splunkd_data]
methods = GET
pattern = data/*
