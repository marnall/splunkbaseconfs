#######################
# Risk Module Eventtypes
#
# Field Values:
# Risk Position,Risk Ref,Description,Primary Threat,Risk Owner,Business Impact Score,Probility Score,Total Risk Score,ISO:27000 Control Requirement,Actions,Owner,Due Date,Remediation Impact Score,Remediation Probability Score,Overall Status,Forecast for Next 6 Months

[register-risk-global]
search = source="/home/chuck/splunk-inputs/riskregister*" NOT (Description OR 27082010)

[register-risk-7day]
search = source="/home/chuck/splunk-inputs/riskregister/*" NOT (Description OR 27082010)
dispatch.earliest_time = -7d

[register-risk-30day]
search = source="/home/chuck/splunk-inputs/riskregister/*" NOT (Description OR 27082010)
dispatch.earliest_time = -30d

