###################################
## Utility event types
###################################
[unix-all-logs]
search = source="*log*" OR source="*var*" OR sourcetype="syslog*" NOT source=usersWithLoginPrivs NOT sourcetype=lastlog 
dispatch.earliest_time = -15m

[unix-all-configs]
search = source="/etc/*" OR source="*.conf" OR source="*.cfg" 

[unix-errors-or-critical]
search = index="os" eventtype="unix-all-logs" error OR critical


