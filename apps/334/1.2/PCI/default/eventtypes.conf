[register-data-destruction-global]
search = source="/home/chuck/splunk-inputs/destructionregister.csv" NOT Date

#######################################
# Firewall Module Eventtypes
#
# Field Values:
#  [2639000.888340] RULE 10 -- DENY IN= OUT=eth0 SRC=83.244.253.190 DST=216.227.214.96 LEN=60 TOS=0x00 PREC=0x00 TTL=64 ID=24433 DF PROTO=TCP SPT=38963 DPT=25 WINDOW=5840 RES=0x00 SYN URGP=0
 
[firewall_cisco]
search = %ASA OR %PIX OR %FWSM
tags = firewall cisco

[firewall_iptables]
search = source="/var/log/iptables.log" "BLOCK" OR "dropped" OR "DENY" OR "PASS" OR "PERMIT"
tags = firewall iptables

[firewall_toplayer]
search = source="/var/log/syslog" "IP5500"

[firewall_accept]
disabled = false
search = eventtype="firewall_cisco" OR eventtype="firewall_iptables" OR eventtype="firewall_toplayer" "Built connection" OR (PASS OR PERMIT)
tags = host communicate firewall success

[firewall_deny]
disabled = false
search = eventtype="firewall_cisco" OR eventtype="firewall_iptables" OR eventtype="firewall_toplayer" "deny" OR "request discarded" OR "denied" OR "BLOCK" OR "dropped" OR "DENY"
tags = host communicate firewall failure

[firewall_teardown]
disabled = false
search = eventtype=firewall_cisco Teardown connection
tags = host communicate firewall success

[firewall_botnet-filter]
search = Dynamic Filter blacklisted OR (black listed)
tags = cisco firewall bot_net

#######################################
# VPN - OpenVPNAS Module Eventtypes
