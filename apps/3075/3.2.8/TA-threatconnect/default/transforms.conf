fields_list = _key, attribute, confidence, dateAdded, description, id, indicator, lastModified, ownerName, rating, tag, type, webLink, threatAssessConfidence, threatAssessRating, threatAssessScore, observationCount, falsePositiveCount, falsePositiveLastReported, privateFlag, active, activeLocked, field1, field2, field3

[tci_cdliortw]
