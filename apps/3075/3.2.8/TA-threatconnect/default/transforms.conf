#
# Threatconnect Playbooks
#

[tcp]
external_type = kvstore
collection = tc_playbooks
# fields_list = _key, active, basicAuthEnabled, comment, description, endpoint, groupWebLink, id, labels, logLevel, name, priority, triggerTypes, updated, username, version, webLink
fields_list = _key, active, basicAuthEnabled, description, endpoint, id, labels, name, priority, updated, username, version, webLink
