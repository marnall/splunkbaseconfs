
#
# custom search jobs
#

[tccsj]
external_type = kvstore
collection = tc_custom_search_settings
fields_list = _key, confidenceReset, earliest, filterConfidence, filterOwners, filterRating, filterTags, filterThreatAssessScore, filterVictimWhitelist, iocField, iocTypes, jobName, latest, observations, search, victimField, addLabels

#
# datamodel data
#

[tcdmd]
external_type = kvstore
collection = tc_dm_data
fields_list = _key, fieldName, modelName, objectName, objectSearch


#
# Work Flow Playbook Actions Data
#

[tcwfpba]
external_type = kvstore
collection = tc_workflow_playbook_actions
fields_list = _key, description, method, params, playbook_key

#
# datamodel search jobs
#

[tcdsj]
external_type = kvstore
collection = tc_dm_search_settings
fields_list = _key, confidenceReset, earliest, filterConfidence, filterOwners, filterRating, filterTags, filterThreatAssessScore, filterVictimWhitelist, iocField, iocTypes, jobName, latest, modelName, objectName, observations, victimField, addLabels, objectSearch

#
# db stats
#

[tcs]
external_type = kvstore
collection = tc_db_stats
fields_list = _key, timestamp, indicatorCount, indicatorType, ownerName

#
# download stats
#

[tcds]
external_type = kvstore
collection = tc_download_stats
fields_list = _key, timestamp, owner, added, deleted, filtered, unaltered, updated, total

#
# event_summaries
#

[tces]
collection = tc_event_summaries
external_type = kvstore
fields_list = _key, timestamp, diamondType, diamondVictim, eventCd, eventIndexTime, eventRaw, eventSourcetype, eventTime, indicator, indicatorType, lastUpdated, note, searchMethod, searchName, searchString, state, uuid, labels
time_field = timestamp
time_format = %s.%6N

#
# groups
#

[tcg]
external_type = kvstore
collection = tc_groups
fields_list = _key, id, name, ownerName, type, tag

[tcg_inot]
external_type = kvstore
collection = tc_groups
fields_list = _key, id, name, ownerName, type

[tcg_full]
external_type = kvstore
collection = tc_groups
fields_list = _key, id, name, dateAdded, ownerName, type, webLink, associations, attribute, tag

#
