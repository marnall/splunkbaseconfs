#
# LEGACY - events
#

[tce]
external_type = kvstore
collection = tc_events
fields_list = _key, _time, state, diamond_ioc, diamond_victim, diamond_type, indicator, indicator_type, search_name, search_string, search_method, search_event, search_sourcetype, last_updated, uuid
time_field = timestamp, last_updated
time_format = %s.%Q

#
# LEGACY - events data
#

[tced]
external_type = kvstore
collection = tc_events_data
