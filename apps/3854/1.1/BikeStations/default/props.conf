[cycle_station_xml]
LINE_BREAKER = (\<station\>)
SHOULD_LINEMERGE = FALSE
DATETIME_CONFIG = CURRENT
NO_BINARY_CHECK = true
category = Custom
pulldown_type = true
KV_MODE = xml
EXTRACT-installDate = \<installDate\>(?P<installDateEpoch>\d{1,10})\d+\<
EXTRACT-name = \<name\>(?P<location>.*),\s*(?P<area>.*)\<\/name\>
EVAL-faulty_bikes = nbDocks - (nbBikes+nbEmptyDocks)

[yahooWeather]
BREAK_ONLY_BEFORE=</query>\n
CHARSET=UTF-8
NO_BINARY_CHECK=true
SHOULD_LINEMERGE=true
TIME_FORMAT=%Y-%m-%dT%H:%M:%SZ
TIME_PREFIX=created="
category=Custom
disabled=false
pulldown_type=true
LOOKUP-weatherBool = weatherBool description AS text output boolValue AS goodOrBadWeather
