[MSAD:NT6:DNS]
SHOULD_LINEMERGE = false
CHECK_FOR_HEADER = false
EXTRACT-threadid = (?<threadid>[0-9A-Fa-f]+)\s+(?<context>PACKET)
EXTRACT-query = ^[^\)\n]*\)(?P<query>[^\n]+)
EVAL-query = rtrim(replace(query,"\(\d+\)","."),".")
EXTRACT-protocol = (?<packetid>[0-9A-Fa-f]*) (?<transport>UDP|TCP) (?<direction>\w+) (?<src_ip>[0-9A-Fa-f\.\:]+)\s+
EXTRACT-message_type_code = ^[^\]\n]*\]\s+(?P<message_type_code>\w+)
EXTRACT-opcode = (?<operation>[ R]) (?<opcode>.) \[(?<hexflags>[0-9A-Fa-f]+) (?<flags>....) (?<reply_code>[^\]]+)\]
LOOKUP-message_type = win_dns_message_type Type AS message_type_code OUTPUTNEW Meaning AS message_type
LOOKUP-reply_code = win_dns_reply_code name AS reply_code OUTPUTNEW description AS reply_code_descrition rcode AS reply_code_id
LOOKUP-answer_dns = dnslookup clienthost AS query OUTPUTNEW clientip AS answer
LOOKUP-query_type = win_dns_query_type query_type_code AS opcode OUTPUTNEW query_name AS query_type
