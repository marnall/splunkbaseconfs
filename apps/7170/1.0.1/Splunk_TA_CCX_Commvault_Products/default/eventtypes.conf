[ccx_commvault_backup_started]
search = (sourcetype="ccx:commvault:backup") logType="Events" "*CommServeDR: Full backup started*"

[ccx_commvault_backup_events]
search = (sourcetype="ccx:commvault:backup") logType="Events" description IN("Could not find [Tag] [Commvault NO BACKUP] to filter virtual machines*","Mount path*","Network Configuration successfully pushed for client*","Phase [Download], for job*","*Console idle time has been exceeded*","The following databases will be backed up*","Job Completed Successfully","*warnings while backing up*","Uninstall Software Job Started")

[ccx_commvault_backup_job_resumed]
search = (sourcetype="ccx:commvault:backup") logType="Events" description="*has been automatically resumed*"

[ccx_commvault_backup_events_integrity_check_alert]
search = (sourcetype="ccx:commvault:backup") logType="Events" description="*integrity check*" severity!="informational"
#tags = alert

[ccx_commvault_backup_events_access_nodes]
search = (sourcetype="ccx:commvault:backup") logType="Events" "*Access nodes used*"

[ccx_commvault_backup_events_integrity_check]
search = (sourcetype="ccx:commvault:backup") logType="Events" description="*integrity check*" severity="informational"

[ccx_commvault_backup_events_deduplication_engine]
search = (sourcetype="ccx:commvault:backup") logType="Events" description="*Deduplication Engine*"

[ccx_commvault_backup_events_restore_completed]
search = (sourcetype="ccx:commvault:backup") logType="Events" description="Restore job*completed*"

[ccx_commvault_backup_events_change]
search = (sourcetype="ccx:commvault:backup") logType="Events" description="Backup job*has been killed by*"
#tags = change

[ccx_commvault_backup_audittrail_logout]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype="User Logged out"

[ccx_commvault_backup_audittrail_authentication]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Login Failed","User Logged in") action="*"
#tags = authentication

[ccx_commvault_backup_audittrail_change]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Change Subclient Content")
#tags = change

[ccx_commvault_backup_audittrail_job_submitted]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Immediate Job Submitted")

[ccx_commvault_backup_audittrail_license]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Consume License","Release License","Release licenses for client")

[ccx_commvault_backup_alerts_aux_copy_succeeded]
search = (sourcetype="ccx:commvault:backup") logType="Alerts" action="success"

[ccx_commvault_backup_alerts_aux_copy_failed]
search = (sourcetype="ccx:commvault:backup") logType="Alerts" action!="success"
#tags = alert

[ccx_commvault_backup_alert_events]
search = (sourcetype="ccx:commvault:backup") logType IN("Events","Alerts","AuditTrail") severity IN("medium","low","informational") type="event"
#tags = alert

[ccx_commvault_backup_alert_events_critical]
search = (sourcetype="ccx:commvault:backup") logType IN("Events","Alerts") severity="critical"
#tags = alert

[ccx_commvault_backup_alert_events_flagged]
search = (sourcetype="ccx:commvault:backup") logType IN("Events","Alerts","AuditTrail") severity IN("medium","low","informational")  type="*" NOT type IN("event")
#tags = alert

[ccx_commvault_backup_alert_activity_anomaly]
search = (sourcetype="ccx:commvault:backup") signature="File Activity Anomaly"
#tags = alert

[ccx_commvault_backup_alert_events_high]
search = (sourcetype="ccx:commvault:backup") logType IN("Events","Alerts") severity="high"
#tags = alert

[ccx_commvault_backup_audittrail_user_logged_in]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Login Failed","User Logged in") NOT action="*"

[ccx_commvault_backup_audittrail_events_flagged]
search = (sourcetype="ccx:commvault:backup") logType IN("AuditTrail") severity IN("high","critical")  type="*" NOT type IN("event")
#tags = alert

[ccx_commvault_backup_audittrail_operation_update]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Update Subclient properties")

[ccx_commvault_backup_audittrail_reconfigure_client]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype="Reconfigure client"

[ccx_commvault_backup_audittrail_restore]
search = (sourcetype="ccx:commvault:backup") logType="AuditTrail" log_subtype IN("Restore Contents")
