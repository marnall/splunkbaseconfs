

[ct_cim_port]
search = (sourcetype=cybertriage type=listeningport)

[ct_cim_web]
search = (sourcetype=cybertriage ctType="web artifact")

[ct_cim_authentication]
search = (sourcetype=cybertriage (type="user Login" OR type=rdpEvent))

[ct_cim_account_creation]
search = (sourcetype=cybertriage ctType="User Account")

[ct_cim_network_traffic]
search = (sourcetype=cybertriage type=activeNetworkConnection)

[ct_cim_malware]
search = (sourcetype=cybertriage (malwareAttacksScore=Bad_High OR malwareAttacksScore="Notable_Normal"))

[triage_endpoint_modaction_result]
search = sourcetype="cybertriage:alert:response"

[ct_cim_process]
search = (sourcetype=cybertriage ctType=process (isService=false OR isService=0))

[ct_cim_service]
search = (sourcetype=cybertriage ctType=process (isService=true OR isService=1))

