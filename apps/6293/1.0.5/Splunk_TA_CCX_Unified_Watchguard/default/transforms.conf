[ccx_watchguard_extraction_key_value]
FORMAT = $1::$2
REGEX = (\w+)=(?:"([^"]*)"|(\S+))

[ccx_watchguard_extract_position_https_proxy]
CLEAN_KEYS = 0
REGEX = .+http(s|)\-proxy\S+\s(?:msg\_id\=\"([^\"]+)\")?\s?(?<Disposition>Allow|Deny).*(?<protocol>(udp|icmp|tcp|SSL\sVPN))\s?(?:\d+\s)?(?<src>(?:\d{1,3}\.){1,3}\d{1,3})?\s?(?<dest>(?:\d{1,3}\.){1,3}\d{1,3})?\s?(?<src_port>\d+)?\s?(?<dest_port>\d+)\s+.*\s+\s+\((?<direction>Inbound|Outbound)\s+\-\s+(?<interface>.*)\)

