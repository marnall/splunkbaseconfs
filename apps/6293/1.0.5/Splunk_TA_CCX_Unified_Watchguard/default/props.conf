[watchguard:firebox:syslog]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 20
NO_BINARY_CHECK = true
TIME_FORMAT = %b  %d %H:%M:%S
SHOULD_LINEMERGE = false
BREAK_ONLY_BEFORE_DATE = true
disabled = false
pulldown_type = true

##IMPORTANT - adjust time capturing based on syslog format##
##########Option################
##TIME_PREFIX = ^(?:[^\s]*\s){3}
##TIME_PREFIX = ^(?:[^\(]*)
##TZ = UTC
##MAX_TIMESTAMP_LOOKAHEAD = 130
##TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z



REPORT-ccx_watchguard_extraction_admd = ccx_watchguard_extraction_admd
REPORT-ccx_watchguard_extraction_firewall = ccx_watchguard_extraction_firewall
REPORT-ccx_watchguard_extraction_http_proxy = ccx_watchguard_extraction_http_proxy
REPORT-ccx_watchguard_extraction_iked = ccx_watchguard_extraction_iked
REPORT-ccx_watchguard_extraction_pxy = ccx_watchguard_extraction_pxy
REPORT-ccx_watchguard_extraction_sessiond = ccx_watchguard_extraction_sessiond
REPORT-ccx_watchguard_extraction_sshd = ccx_watchguard_extraction_sshd
REPORT-ccx_watchguard_extraction_key_value = ccx_watchguard_extraction_key_value
REPORT-ccx_watchguard_extract_position_https_proxy = ccx_watchguard_extract_position_https_proxy
REPORT-ccx_watchguard_support_proxy_capture = ccx_watchguard_support_proxy_capture
REPORT-ccx_watchguard_support_traffic_capture1 = ccx_watchguard_support_traffic_capture1
REPORT-ccx_watchguard_support_traffic_capture2 = ccx_watchguard_support_traffic_capture2
REPORT-ccx_watchguard_support_traffic_capture3 = ccx_watchguard_support_traffic_capture3

FIELDALIAS-body = Reason AS body
FIELDALIAS-bytes_in = rcvd_bytes AS bytes_in
FIELDALIAS-bytes_out = sent_bytes AS bytes_out
FIELDALIAS-description = Reason AS description
FIELDALIAS-dest_dns = vpn AS dest_dns
FIELDALIAS-signature = Reason AS signature
FIELDALIAS-src_ip = src AS src_ip

EVAL-action = case(Disposition=="Allow" OR vendor_action=="Allow", "allowed", Disposition=="Deny" OR vendor_action=="Deny", "blocked", match(_raw, "fail*"), "failed", match(_raw, "block*"), "blocked")
EVAL-app = if(isnotnull(protocol) AND (isnull(dst) OR isnull(dstname)),'protocol', "unknown")
EVAL-bytes = 'rcvd_bytes' + 'sent_bytes'
EVAL-category = case(isnotnull(dst) OR isnotnull(dstname), 'msg', isnotnull(severity), 'signature_cat')
EVAL-dest = coalesce('srv_ip', 'dest', 'vpn')
EVAL-dest_ip = coalesce('srv_ip', 'dest', 'vpn')
EVAL-dest_port = coalesce('srv_port', 'port', 'dest_port')
EVAL-http_method = 'op'
EVAL-ids_type = if(isnotnull(severity_id), "network", null())
EVAL-severity = case(severity_id=="5", "informational", severity_id=="4", "low", severity_id=="3", "medium", severity_id=="2", "high", severity_id=="1", "critical")
EVAL-signature = if(isnotnull(vpn) OR isnotnull(Reason), 'Reason', coalesce('signature_name', null()))
EVAL-transport = split('protocol', " ")
EVAL-url = if(isnotnull(dst) OR isnotnull(dstname), coalesce(dst,dstname), null())
EVAL-url_domain = if(isnotnull(dst) OR isnotnull(dstname), coalesce(replace(dst,"\S+((?:\\|\/)[^\\\/]+)$", "\1" ),replace(dstname,"\S+((?:\\|\/)[^\\\/]+)$", "\1" )), null())
EVAL-url_length = if(isnotnull(dst) OR isnotnull(dstname), len(coalesce(dst,dstname)), null())
EVAL-user = 'dst_user'
EVAL-vendor_product = "Watchguard:Firebox:Firewall"
