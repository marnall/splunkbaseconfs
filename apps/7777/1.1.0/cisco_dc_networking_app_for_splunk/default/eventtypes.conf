[cisco_dc_aci_class_authentication]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:class" unixUserId=*

[cisco_dc_aci_health]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:health" severity=*

[cisco_dc_aci_stats]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:stats"

[cisco_dc_nd_mso]
