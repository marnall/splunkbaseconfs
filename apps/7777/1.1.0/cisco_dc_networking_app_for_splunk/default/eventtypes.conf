[cisco_dc_aci_syslog_change]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:syslog" "change set:"

[cisco_dc_aci_syslog_authentication]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:syslog" "Authentication failed" OR "Authentication failure"

