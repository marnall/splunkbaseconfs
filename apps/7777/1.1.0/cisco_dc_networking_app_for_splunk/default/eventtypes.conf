[cisco_dc_aci_authentication_auth]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:authentication" trig="login,session" OR "refresh,session"

[cisco_dc_aci_class]
search = `cisco_dc_aci_index` sourcetype="cisco:dc:aci:class"

[cisco_dc_aci_class_all_inventory]
