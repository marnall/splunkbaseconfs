[cisco_dc_nexus9k_syslog]
search = `cisco_dc_n9k_index` sourcetype="cisco:dc:nexus9k:syslog"

[cisco_dc_nexus9k_cpu_inventory]
search = `cisco_dc_n9k_index` sourcetype="cisco:dc:nexus9k" "cpu"

[cisco_dc_nexus9k_all_inventory]
search = `cisco_dc_n9k_index` sourcetype="cisco:dc:nexus9k" component IN ("nxinterface", "nxinventory", "nxneighbor", "nxtransceiver")

[cisco_dc_aci_authentication]
