EVAL-app = "Cisco DC Networking"
FIELDALIAS-vendor_severity = severity AS vendor_severity
EVAL-severity = case(IN(lower(vendor_severity), "critical", "emergency", "alert", "major"), "critical",IN(lower(vendor_severity), "minor", "error"), "high",lower(vendor_severity) == "warning", "medium",IN(lower(vendor_severity), "notification", "indeterminate", "cleared"), "low",IN(lower(vendor_severity), "informational", "debugging", "info"), "informational",true(), "unknown")
FIELDALIAS-vendor_type = type AS vendor_type
EVAL-type = "event"
EVAL-status=coalesce(operSt,adminSt)
EVAL-serial=coalesce(ser,mbSn)
EVAL-mac=coalesce(macAddr,macB)
EVAL-object_id=coalesce(id,hwResourceId)
FIELDALIAS-description = descr AS description
FIELDALIAS-dest = actual_host AS dest
FIELDALIAS-version = hwVer AS version
FIELDALIAS-signature = descr AS signature
FIELDALIAS-object_category = type AS object_category
FIELDALIAS-vlan = operVlans AS vlan
FIELDALIAS-dest_port = dToPort AS dest_port
FIELDALIAS-protocol = prot AS protocol
FIELDALIAS-src_port = sFromPort AS src_port

[cisco:dc:aci:stats]
TRUNCATE = 9999999
KV_MODE = auto
SHOULD_LINEMERGE = false
EVAL-app = "Cisco DC Networking"
EVAL-ip = coalesce(ip,addr)
REPORT-cisco_dc_aci_stats_extractions = cisco_dc_aci_stats_extractions

[cisco:dc:nd:mso]
KV_MODE = auto
SHOULD_LINEMERGE = false
EVAL-app = "Cisco DC Networking"
TRUNCATE = 9999999
REPORT-cisco_dc_mso_extraction = cisco_dc_mso_extraction
TIME_PREFIX= current_time=
TIME_FORMAT= %Y-%m-%dT%H:%M:%S%z
EXTRACT-apic_host = https:\/\/(?<apic_host>[^\/\s]+)(?:\s|$)

[cisco:dc:nd:congestion]
KV_MODE = json
SHOULD_LINEMERGE = false
EVAL-app = "Cisco DC Networking"
TRUNCATE = 9999999

[cisco:dc:nd:anomalies]
KV_MODE = json
SHOULD_LINEMERGE = false
pulldown_type = 1
TRUNCATE = 9999999
TIME_PREFIX = "endTs":
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-app                        = "Cisco DC Networking"
FIELDALIAS-node_names           = nodeNames{} AS node_names
FIELDALIAS-vendor_severity = severity AS vendor_severity
EVAL-calculated_severity        = case(IN(lower(vendor_severity), "critical", "emergency", "alert", "major"), "critical",IN(lower(vendor_severity), "minor", "error"), "high",lower(vendor_severity) == "warning", "medium",IN(lower(vendor_severity), "notification", "indeterminate", "cleared"), "low",IN(lower(vendor_severity), "informational", "debugging", "info"), "informational",true(), "unknown")
EVAL-severity = case(IN(lower(vendor_severity), "critical", "emergency", "alert", "major"), "critical",IN(lower(vendor_severity), "minor", "error"), "high",lower(vendor_severity) == "warning", "medium",IN(lower(vendor_severity), "notification", "indeterminate", "cleared"), "low",IN(lower(vendor_severity), "informational", "debugging", "info"), "informational",true(), "unknown")
FIELDALIAS-signature_id         = mnemonicNum AS signature_id
FIELDALIAS-description          = anomalyStr AS description
FIELDALIAS-dest                 = nd_host AS dest
FIELDALIAS-id                   = anomalyId AS id
FIELDALIAS-signature            = mnemonicTitle AS signature
EVAL-vendor_product       = case(vendor=="CISCO_NX-OS", "Cisco NX-OS", vendor=="CISCO_ACI", "Cisco ACI", true(),"Cisco Nexus Dashboard")
EVAL-type                       = "event"

[cisco:dc:nd:advisories]
KV_MODE = json
EVAL-app = "Cisco DC Networking"
SHOULD_LINEMERGE = false
TRUNCATE = 9999999
TIME_PREFIX = "endTs":
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
FIELDALIAS-node_names = nodeNames{} AS node_names
FIELDALIAS-vendor_severity = severity AS vendor_severity
EVAL-calculated_severity = case(IN(lower(vendor_severity), "critical", "emergency", "alert", "major"), "critical",IN(lower(vendor_severity), "minor", "error"), "high",lower(vendor_severity) == "warning", "medium",IN(lower(vendor_severity), "notification", "indeterminate", "cleared"), "low",IN(lower(vendor_severity), "informational", "debugging", "info"), "informational",true(), "unknown")
EVAL-severity = case(IN(lower(vendor_severity), "critical", "emergency", "alert", "major"), "critical",IN(lower(vendor_severity), "minor", "error"), "high",lower(vendor_severity) == "warning", "medium",IN(lower(vendor_severity), "notification", "indeterminate", "cleared"), "low",IN(lower(vendor_severity), "informational", "debugging", "info"), "informational",true(), "unknown")
FIELDALIAS-description = advisoryStr AS description
FIELDALIAS-dest                 = nd_host AS dest
FIELDALIAS-id                   = advisoryId AS id
FIELDALIAS-signature            = title AS signature
EVAL-vendor_product       = case(vendor=="CISCO_NX-OS", "Cisco NX-OS", vendor=="CISCO_ACI", "Cisco ACI", true(),"Cisco Nexus Dashboard")
EVAL-type = "event"

[cisco:dc:nd:flows]
TRUNCATE = 9999999
KV_MODE = json
SHOULD_LINEMERGE = false
EVAL-app                  = "Cisco DC Networking"
FIELDALIAS-bytes_in     = stats{}.ingressByteCount AS bytes_in
FIELDALIAS-bytes_out    = stats{}.egressByteCount AS bytes_out
FIELDALIAS-packets_in   = stats{}.ingressPktCount AS packets_in
FIELDALIAS-packets_out  = stats{}.egressPktCount AS packets_out
FIELDALIAS-dvc                = nd_host AS dvc
FIELDALIAS-dvc_ip             = nd_host AS dvc_ip
FIELDALIAS-dest               = dstIp AS dest
FIELDALIAS-dest_ip            = dstIp AS dest_ip
FIELDALIAS-dest_port          = dstPort AS dest_port
FIELDALIAS-dest_interface     = stats{}.egressVif{} AS dest_interface
FIELDALIAS-src                = srcIp AS src
FIELDALIAS-src_ip             = srcIp AS src_ip
FIELDALIAS-src_port           = srcPort AS src_port
FIELDALIAS-src_interface      = stats{}.ingressVif{} AS src_interface
FIELDALIAS-protocol           = flowType AS protocol
FIELDALIAS-transport          = protocolName AS transport
FIELDALIAS-flow_id            = flowId AS flow_id
EVAL-bytes        = bytes_in + bytes_out
EVAL-packets      = packets_in + packets_out
EVAL-action       = case(isnotnull(flowType), "success")
EVAL-vendor_product = "Cisco Nexus Dashboard"

[cisco:dc:nd:endpoints]
TRUNCATE = 9999999
KV_MODE = json
SHOULD_LINEMERGE = false
EVAL-app                  = "Cisco DC Networking"
FIELDALIAS-dvc            = nd_host AS dvc
FIELDALIAS-src            = nd_host AS src
FIELDALIAS-dest           = nodeName AS dest
FIELDALIAS-object         = vmName AS object
FIELDALIAS-command        = modType AS command
FIELDALIAS-object_id      = endpointId AS object_id
EVAL-object_attrs = tostring(json_object("vmName", vmName, "encap",encap, "nodeName", nodeName))
EVAL-action      = case(modType=="deletion", "deleted", modType=="creation", "created")
EVAL-status = "success"
EVAL-vendor_product = "Cisco Nexus Dashboard"

[cisco:dc:nd:protocols]
TRUNCATE = 9999999
KV_MODE = json
SHOULD_LINEMERGE = false
FIELDALIAS-dest            = nd_host AS dest
FIELDALIAS-description     = interfaceDescription AS description
FIELDALIAS-hypervisor_id   = interfaceUniqueId AS hypervisor_id
EVAL-status  = case(adminStatus=="up", "enabled", adminStatus=="down", "disabled")
EVAL-enabled = case(adminStatus=="up", "true", adminStatus=="down", "false")
EVAL-vendor_product = "Cisco Nexus Dashboard"

