[cisco:dc:nexus9k:syslog]
TIME_FORMAT = %b %e %H:%M:%S
TIME_PREFIX = ^\w+\s*\d+\s*\d+(?:\:\d+){2}\s*\d+(?:\.\d+){3}\s+:?(?:\s*\d*\s*)?
KV_MODE = none
SHOULD_LINEMERGE = false
DATETIME_CONFIG = NONE
TRUNCATE = 9999999

EXTRACT-fields = %(?P<category>\w+)-(?P<severity_id>\d)-(?P<mnemonics>[\w_]+):\s*(?P<syslog_msg>.*)
EXTRACT-login_user = \s%\w+\-\d\-(?<login_msg>[\w\_]+?)\:\s*(?<type>\S+)\:(?<id>\S+)\:(?<authenticated_user>.*?)\:(?<message>.*?)?(?:\",\"(?:[\d\.]*)\")
EXTRACT-aaa_user = (?:stop|update|start):[^:]+:(?P<aaa_user>[^:]+):

REPORT-extract_user_src_from_syslog_msg = extract_user_src_from_syslog_msg
REPORT-extract_update_fields = extract_update_fields
REPORT-extract_vty_fields = extract_vty_fields
REPORT-extract_config_fields_9k = extract_config_fields_9k
REPORT-extract_ethport_fields_9k = extract_ethport_fields_9k
REPORT-extract_system_fields_9k = extract_system_fields_9k
REPORT-extract_bfd_fields_9k = extract_bfd_fields_9k
REPORT-extract_ospf_fields_9k = extract_ospf_fields_9k
REPORT-extract_eth_port_fields_9k = extract_eth_port_fields_9k
REPORT-extract_pim_fields_9k = extract_pim_fields_9k

FIELDALIAS-dest_from_host = host AS dest

EVAL-action = case(like(syslog_msg, "%failure%") or like(syslog_msg, "%failed%"), "failure", true(), "success")
EVAL-app = "Cisco DC Networking"
EVAL-authentication_method = if(like(syslog_msg, "%pam_aaa%") or like(syslog_msg, "%PAM%"), "PAM", null())
EVAL-user = coalesce(user, user1, vty_user, authenticated_user, aaa_user)
EVAL-src_user = coalesce(user, user1)
EVAL-failed_user = coalesce(user, user1)
EVAL-vendor_product = "Cisco Nexus9k"

LOOKUP-severity = cisco_dc_nexus_severity_lookup severity_id OUTPUT severity

[cisco:dc:mso:syslog]
KV_MODE = none
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %e %H:%M:%S
TIME_PREFIX = ^\w+\s*\d+\s*\d+(?:\:\d+){2}\s*\d+(?:\.\d+){3}\s+:?(?:\s*\d*\s*)?
DATETIME_CONFIG = NONE
TRUNCATE = 9999999

EXTRACT-fields = \s%(?<category>\w+)\-(?<severity_id>\d)\-(?<mnemonics>[\w\_]+)\:?\s?(?<syslog_msg>.*)

