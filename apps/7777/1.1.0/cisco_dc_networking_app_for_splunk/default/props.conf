EVAL-type = "event"
EVAL-vendor_product = "Cisco ACI"
EVAL-object_id=coalesce(id,recordId)
EVAL-ip = coalesce(ip,addr)
FIELDALIAS-dest = actual_host AS dest
FIELDALIAS-description = descr AS description
FIELDALIAS-signature = descr AS signature
FIELDALIAS-dvc = actual_host AS dvc
FIELDALIAS-object_category = component AS object_category
FIELDALIAS-object_path = dn AS object_path
FIELDALIAS-user_agent = unixUserId AS user_agent
FIELDALIAS-src_user_id = unixUserId AS src_user_id
EVAL-status = "success"
FIELDALIAS-hypervisor_id = id AS hypervisor_id
FIELDALIAS-src_user = name AS src_user
FIELDALIAS-result = descr AS result
FIELDALIAS-object_attrs = changeSet AS object_attrs
