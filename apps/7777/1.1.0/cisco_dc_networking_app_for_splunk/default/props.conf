REPORT-cisco_syslog_extractions = cisco_mso_syslog_field_extraction
REPORT-syslog_warning_extractions_mso = syslog_warning_extractions

LOOKUP-severity = cisco_dc_nexus_severity_lookup severity_id OUTPUT severity

[cisco:dc:aci:syslog]
KV_MODE = none
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %e %H:%M:%S
TIME_PREFIX = ^\w+\s*\d+\s*\d+(?:\:\d+){2}\s*\d+(?:\.\d+){3}\s+:?(?:\s*\d*\s*)?
DATETIME_CONFIG = NONE
TRUNCATE = 9999999

EXTRACT-fields = \s%(?<category>\w+)\-(?<severity_id>\d)\-(?<mnemonics>[\w\_]+)\:?\s?(?<syslog_msg>.*)

REPORT-extract_change_fields = extract_change_fields
REPORT-extract_enhanced_fields = extract_enhanced_fields
REPORT-extract_fields_for_detached_ip = extract_fields_for_detached_ip
REPORT-extract_threshold_values = extract_cpu_thresholds, extract_memory_thresholds
REPORT-extract_aci = aci_syslog_extractions
REPORT-syslog_warning_extractions_aci = syslog_warning_extractions
REPORT-syslog_fault_fields = aci_syslog_fault_fields
REPORT-syslog_informational_fields = aci_syslog_informational_fields

FIELDALIAS-dest_from_host = host AS dest
FIELDALIAS-dvc_from_host = host AS dvc
FIELDALIAS-signature_from_syslog_message = syslog_msg AS signature
FIELDALIAS-description_from_syslog_message = syslog_msg AS description
FIELDALIAS-src_from_vendor_src = vendor_src AS src

EVAL-app = "Cisco DC Networking"
EVAL-authentication_method = if(like(syslog_msg, "%pam_aaa%") or like(syslog_msg, "%PAM%"), "PAM", null())
EVAL-action = case(vendor_action=="modified", "modified", like(syslog_msg, "%failure%") or like(syslog_msg, "%failed%"), "failure")
EVAL-change_type = case(vendor_action=="modified" and object_category=="tenant", "filesystem")
EVAL-command = case(vendor_action=="modified", "Modify")
EVAL-result = case(vendor_action=="modified", "Modified")
EVAL-status = case(vendor_action=="modified", "success")
EVAL-src = case(isnull(vendor_src), host)
EVAL-vendor_product = "Cisco ACI"
EVAL-type = "event"

LOOKUP-severity = cisco_dc_nexus_severity_lookup severity_id OUTPUT severity

[cisco:dc:nd:syslog]
KV_MODE = auto
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %e %H:%M:%S
TIME_PREFIX = ^\w+\s*\d+\s*\d+(?:\:\d+){2}\s*\d+(?:\.\d+){3}\s+:?(?:\s*\d*\s*)?
DATETIME_CONFIG = NONE
TRUNCATE = 9999999

EXTRACT-fields = \s%(?<category>\w+)\-(?<severity_id>\d)\-(?<mnemonics>[\w\_]+)\:?\s?(?<syslog_msg>.*)
EXTRACT-json_fields = \w+\[\d+\]\s*:\s*(?<json_data>.*)$

REPORT-extract_fields_for_max_auth_attempts_exceeded = extract_fields_for_max_auth_attempts_exceeded
REPORT-extract_vendor_src = extract_vendor_src
REPORT-cisco_nd_syslog_fields_syslog_config = cisco_nd_syslog_fields_syslog_config
REPORT-cisco_nd_login_fields = cisco_nd_login_fields
REPORT-cisco_nd_system_msg_fields = cisco_nd_system_msg_fields
REPORT-extract_ethport_fields = extract_ethport_fields
REPORT-extract_nodednsstate_fields = extract_nodednsstate_fields
REPORT-device_connection_desc_fields = extract_deviceconnector_connected_desc_fields
REPORT-device_disconnection_desc_fields = extract_deviceconnector_disconnected_desc_fields
REPORT-device_connection_fields = extract_device_connection_fields
REPORT-device_disconnection_fields = extract_device_disconnection_fields
REPORT-guestshell_extractions = nd_syslog_guestshell_extractions

FIELDALIAS-dest_from_host = host AS dest
FIELDALIAS-dvc_from_host = host AS dvc
FIELDALIAS-description_from_syslog_message = syslog_msg AS description

EVAL-app = "Cisco DC Networking"
EVAL-authentication_method = if(like(syslog_msg, "%pam_aaa%") or like(syslog_msg, "%PAM%"), "PAM", null())
EVAL-action = case(like(syslog_msg, "%failure%") or like(syslog_msg, "%failed%"), "failure", like(spath(json_data, "description"), "login from%"), "success", spath(json_data, "configObject.action")=="Created", "created", spath(json_data, "configObject.action")=="Modified", "modified")
EVAL-command = case(spath(json_data, "configObject.action")=="Created", "Create", spath(json_data, "configObject.action")=="Modified", "Modify")
EVAL-object = case(isnotnull(spath(json_data, "eventObject.eventType")) AND spath(json_data, "eventObject.eventType")!="", spath(json_data, "eventObject.eventType"), isnotnull(spath(json_data, "configObject.affectedDn")) AND spath(json_data, "configObject.affectedDn")!="", spath(json_data, "configObject.affectedDn"))
EVAL-object_attrs = case(isnotnull(spath(json_data, "configObject.newObject")) AND spath(json_data, "configObject.newObject")!="", spath(json_data, "configObject.newObject"), isnotnull(spath(json_data, "eventObject.action")) AND spath(json_data, "eventObject.action")!="", spath(json_data, "eventObject.action"))
EVAL-object_category = case(like(spath(json_data, "description"), "DeviceConnector%"), "DeviceConnector", like(spath(json_data, "description"), "Creation of%") or like(spath(json_data, "description"), "Modification of %"), "user")
EVAL-result = coalesce(spath(json_data, "configObject.action"), result)
EVAL-change_type = case(spath(json_data, "configObject.action") IN ("Created", "Modified"), "AAA")
EVAL-signature = coalesce(syslog_msg, spath(json_data, "server-nodednsstate"))
EVAL-src = coalesce(vendor_src, spath(json_data, "clientIP"), host)
EVAL-user = coalesce(vendor_user, user, spath(json_data, "user"))
EVAL-src_user = coalesce(user, spath(json_data, "user"))
EVAL-status = case(isnotnull(spath(json_data, "configObject.action")), "success")
EVAL-user_name = coalesce(vendor_user, spath(json_data, "user"), user_name)
EVAL-type = "event"
EVAL-vendor_product = "Cisco Nexus Dashboard"

LOOKUP-severity = cisco_dc_nexus_severity_lookup severity_id OUTPUT severity

[cisco:dc:aci:authentication]
TRUNCATE = 9999999
KV_MODE = auto
SHOULD_LINEMERGE = false
EVAL-app = "Cisco DC Networking"
EVAL-command = case(match(trig, "login.*"), "Login", match(trig, "logout.*"), "Logout", match(trig, "refresh.*"), "Refresh")
EVAL-vendor_product = "Cisco ACI"
FIELDALIAS-dest_ip = dest AS dest_ip
FIELDALIAS-dvc = dest AS dvc
FIELDALIAS-object_id = id AS object_id
FIELDALIAS-object_category = component AS object_category
FIELDALIAS-object_path = affected AS object_path
FIELDALIAS-src_user = user AS src_user
FIELDALIAS-src_user_name = user AS src_user_name
FIELDALIAS-user_name = user AS user_name
REPORT-cisco_dc_aci_auth_extractions = cisco_dc_aci_auth_extractions
FIELDALIAS-vendor_status = status AS vendor_status
EVAL-status = case(vendor_status=="Success", "success", vendor_status=="Failure", "failure")
EVAL-action = case(vendor_status=="Success", "success", vendor_status=="Failure", "failure")
EXTRACT-object = dn.*subj-\[.*?user-(?<object>[^]]+)
EVAL-change_type = if(like(component, "%aaa%") or like(component, "%AAA%"), "AAA", "filesystem")

[cisco:dc:aci:class]
