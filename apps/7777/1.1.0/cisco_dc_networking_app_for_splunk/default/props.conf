FIELDALIAS-dest_mac = dstMacAddr AS dest_mac
FIELDALIAS-dest_ip = dstIp AS dest_ip
FIELDALIAS-dest_port = dstPort AS dest_port
FIELDALIAS-src_ip = srcIp AS src_ip
FIELDALIAS-src_port = srcPort AS src_port
FIELDALIAS-src_interface = srcIntf AS src_interface
FIELDALIAS-packets_out = txPkt AS packets_out
FIELDALIAS-packets_in = rxPkt AS packets_in
EXTRACT-role-domain = ciscoAvPair=(?<actualCiscoAvPair>.+?\w+:domains=.*?\s)
EVAL-action = case(ind=="modification", "modified", ind=="creation", "created",ind=="deletion", "deleted")
EVAL-change_type = if(like(component, "%aaa%") or like(component, "%AAA%"), "AAA", "filesystem")
EVAL-command = case(ind=="modification", "modify", ind=="creation", "create",ind=="deletion", "delete")
EXTRACT-object = dn=([^\s]+\/)?(?P<object>\w+-[\w\d]+)
EXTRACT-mac_addr = dn.*(cep-(?<mac_addr>[A-F a-f 0-9 : ]+))
EXTRACT-vlanid = dn.*(conn-\[vlan-(?<VlanID>[^\]]+))
EXTRACT-mac = dn.*(epdefref-(?<mac>[^\/]+))
EXTRACT-ctr_controller = dn.*(ctrlr-\[(?<ctr_controller>[^\]]+))
EXTRACT-vlAnpool = dn.*(vlanns-\[(?<VLANPool>[^\]]+))
EXTRACT-fr = dn.*(from-\[vlan-(?<FR>[^\]]+))
EXTRACT-to = dn.*(to-\[vlan-(?<TO>[^\]]+))
EXTRACT-vmm = dn.*(uni\/vmmp-(?<VMM>[^\/]+))
EXTRACT-dom_controller = dn.*(\/dom-(?<dom_controller>[^\]"]+))
EVAL-Controller = coalesce(dom_controller, ctr_controller)

