search = | tstats `summariesonly` latest(classInfo.End_Point.EPG) AS EPG latest(classInfo.encap) AS VLAN latest(classInfo.dn) AS dn from datamodel=Cisco_DCN_Systems where classInfo.component=fvCEp groupby    classInfo.mac,classInfo.apic_host | dedup classInfo.mac | rename classInfo.mac AS mac_addr, classInfo.apic_host AS apic_host |  join type=inner max=0 mac_addr [  search eventtype=cisco_dc_aci_class component=fvRsVm  | dedup tDn |stats latest(tDn) AS tDn by mac_addr ] | table mac_addr,tDn,VLAN,EPG,dn,apic_host | join type=inner max=0 tDn [|tstats `summariesonly` latest(classInfo.dn) AS "tDn" latest(classInfo.VM.vmID) AS vmID latest(classInfo.state) AS state from datamodel=Cisco_DCN_Systems WHERE classInfo.component=compVm groupby classInfo.name,classInfo.apic_host | rename classInfo.name AS name, classInfo.apic_host AS apic_host | table name,state,tDn,vmID,apic_host ] | join type=inner max=0 mac_addr [ | tstats `summariesonly` latest(classInfo.tDn) AS tDn from datamodel=Cisco_DCN_Systems WHERE classInfo.component=fvRsHyper groupby classInfo.HV_Relation.mac_addr,classInfo.apic_host | rename classInfo.HV_Relation.mac_addr AS mac_addr, classInfo.apic_host AS apic_host]| table dn,name,state,mac_addr,tDn,VLAN,EPG,vmID,apic_host | join type=inner max=0 tDn [ |tstats `summariesonly` latest(classInfo.HV.controller) AS controller latest(classInfo.HV.domainController) AS "domain-controller"  latest(classInfo.name) AS "ESX-Host" latest(classInfo.oid) AS "hostID" from datamodel=Cisco_DCN_Systems WHERE classInfo.component=compHV groupby classInfo.dn, classInfo.apic_host | rename classInfo.dn AS tDn, classInfo.apic_host AS apic_host | table dn,name,state,mac,VLAN,ESX-Host,tDn,controller,EPG,vmID,hostID,domain-controller,apic_host] | join type=inner max=0 controller [ | tstats `summariesonly` latest(classInfo.hostOrIp) AS vCenter from datamodel=Cisco_DCN_Systems WHERE classInfo.component=vmmCtrlrP groupby classInfo.name,classInfo.apic_host | rename classInfo.name AS controller, classInfo.apic_host AS apic_host | table controller,vCenter,apic_host]  |  join type=inner max=0 EPG  [ | tstats `summariesonly` latest(apic.twScore) AS "EPG-Health" from datamodel=Cisco_DCN_Health WHERE apic.component=fvEPg groupby apic.name, apic.apic_host | rename apic.name AS EPG, apic.apic_host AS apic_host | table "EPG-Health",EPG,apic_host ] | table dn,EPG,EPG-Health,name,vmID,state,mac_addr,ESX-Host,hostID,VLAN,vCenter,domain-controller,apic_host | join type=inner max=0 mac_addr [ | tstats `summariesonly` latest(classInfo.CEP_Paths.path) AS path latest(classInfo.CEP_Paths.node) AS node latest(classInfo.CEP_Paths.mac_addr) AS mac_addr from datamodel=Cisco_DCN_Systems WHERE classInfo.component=fvRsCEpToPathEp groupby classInfo.dn, classInfo.apic_host | rename classInfo.apic_host AS apic_host | strcat "Node-" node "/" path Interface | table mac_addr,Interface, apic_host] | dedup dn | table dn,EPG,EPG-Health,name,vmID,state,mac_addr,ESX-Host,hostID,VLAN,vCenter,domain-controller,Interface,apic_host | rename  name AS "VirtualMachine" mac_addr AS "Network_Adapter" | inputlookup append=T cisco_dc_APICCEPLookup | dedup dn | outputlookup cisco_dc_APICVMLookup.csv
