[rswaf]
MAX_TIMESTAMP_LOOKAHEAD = 20
NO_BINARY_CHECK = 1
REPORT-syslog = syslog-extractions
SHOULD_LINEMERGE = False
TIME_FORMAT = %b %d %H:%M:%S
TIME_PREFIX = ^.+\] :
TRANSFORMS = syslog-host
maxDist = 3
pulldown_type = 1
EXTRACT-monitoring_metric = (?i) metric '(?P<monitoring_metric>[^']+)
EXTRACT-bw_eventlogs_class = (?i)^(?:[^:]*:){6,8}\d+\s+\-\s+(?P<bw_eventlogs_class>[^ ]+)
EXTRACT-bw_ibox_name-bw_ibox_ip = (?i)^(?:[^:]*:){3,5}\d+\s+(?P<bw_ibox_name>[^ ]+)\s+(?P<bw_ibox_ip>[^ ]+)
EXTRACT-bw_log_class-bw_log_source = (?i)^.*\[(?P<bw_log_class>(IAM|ALERT|BLOCKED|BLOCKED\ INTERNAL))\]+\s+[^ ]+\/+\[(?P<bw_log_source>[^\]]+)
EXTRACT-bw_tunnel_name = [^+\[\]](\[.*\].*\+|\[IAM\].*\/\[)(?P<bw_tunnel_name>[^/[\]]+)
EXTRACT-icx_iam_fullstr = [^-]- (?P<icx_iam_fullstr>.* from .* on .*)
EXTRACT-icx_src_ip = (?i) from (?P<icx_src_ip>[^ ]+)
EXTRACT-icx_target_url = (?i) on (?P<icx_target_url>.+)
EXTRACT-icx_target_www-icx_target_page-icx_target_query = (?i) on (?:http(?:s)?\:\/\/)?(?P<icx_target_www>[^/]+)(?P<icx_target_page>[^?&]+)(?P<icx_target_query>[^ ]+)
EXTRACT-icx_trap = [^-]\[.*\].*- (?P<icx_trap>.+) from.*
EXTRACT-monitoring_object = (?i).* metric '(?P<monitoring_object>[^'-]+-[^'-]+).*
EXTRACT-monitoring_state = (?i)changed to (?:\[\d+\] )?\w*(?P<monitoring_state>[^:]+)
EXTRACT-users_authresult = (?i) USERS \- (?P<users_authresult>.+?)\s+:
EXTRACT-users_username = (?i) User (?P<users_username>[^ ]+)
EXTRACT-users_src_ip = (?i) with ip (?P<users_src_ip>[^ ]+)
EXTRACT-bw_eventlogs_message = (?i)^(?:[^:]*:){6,8}\d+\s+\-\s+\w+\s+\-\s+(?P<bw_eventlogs_message>.+)
EXTRACT-iam_result-iam_username = (?i)^(?:[^:]*:){6,8}\d+\s+\-\s+(?P<iam_result>[^ ]+)\s(?P<iam_username>[^ ]*)
EXTRACT-iam_target = (?i) on (?:http(?:s)?\:\/\/)?(?P<iam_target>[^/]+)
EXTRACT-bw_alog = \]\s\"(?P<bw_alog_method>[^\s]+)\s(?P<bw_alog_target>[^\s]+)\s(?P<bw_alog_protocol>[^\"]+)\"\s(?P<bw_alog_returncode>[^\s]+)\s(?P<bw_alog_returnsize>[^\s]+)\s\"(?P<bw_alog_referer>[^\"]+)\"\s\"(?P<bw_alog_useragent>[^\"]+)\"
EXTRACT-bw_alog_ipsrc = (?i)(?P<bw_alog_ipsrc>[^ ]+)\s[^\s]+\s[^\s]\s\[\d+/\w+/\d+:\d+:\d+:\d+\s+\+

