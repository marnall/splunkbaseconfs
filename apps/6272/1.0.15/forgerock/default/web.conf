
[expose:forgerock_settings]
pattern = forgerock_settings
methods = POST, GET

[expose:forgerock_settings_specified]
pattern = forgerock_settings/*
methods = POST, GET, DELETE

[expose:forgerock_forgerock]
pattern = forgerock_forgerock
methods = POST, GET

[expose:forgerock_forgerock_specified]
pattern = forgerock_forgerock/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
