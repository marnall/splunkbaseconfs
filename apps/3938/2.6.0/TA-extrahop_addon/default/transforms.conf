[extrahop_deviceoid_lookup]
external_type = kvstore
collection = TA_extrahop_oiddev
fields_list = _key,oid,discovery_id,display_name,macaddr,ipaddr4,ipaddr6,otype,hostname

[extrahop_appuuid_lookup]
external_type = kvstore
collection = TA_extrahop_appuuid
fields_list = _key,uuid

[LEEF_KVP]
REGEX = ([a-z_]+)=(.*?)(?:\xa6|$)
FORMAT = $1::$2
MV_ADD = true