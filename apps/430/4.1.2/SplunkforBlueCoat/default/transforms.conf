
[nullPound]
REGEX = ^\#
DEST_KEY=queue
FORMAT=nullQueue

[accessExtractions]
DELIMS=" "
FIELDS="date","time","cs_bytes","sc_bytes","sr_bytes","rs_bytes","dest_host","src_ip","sc_status","category","x_exception_category","cs_content_type","cs_uri_extension"


[delimExtractions]
DELIMS=" "
FIELDS="date","time","time_taken","dvc_ip","user","user_group","x_exception_id","filter_result","category","http_referrer","holder","http_response","action","http_method","cs_content_type","uri_scheme","dest_host","dest_port","uri_path","uri_query","uri_extension","http_user_agent","src_ip","sc_bytes","cs_bytes","x_virus_id"


[cifsExtractions]
DELIMS=" "
FORMAT="date","time","src_ip","c-port","r-ip","r-port","s-action","s-ip","cs-auth-group","cs-username","x-client-connection-bytes","x-server-connection-bytes","x-server-adn-connection-bytes","x-cifs-method","x-cifs-client-read-operations","x-cifs-client-write-operations","x-cifs-client-other-operations","x-cifs-server-operations","x-cifs-error-code","x-cifs-server","x-cifs-share","x-cifs-path","x-cifs-orig-path","x-cifs-client-bytes-read","x-cifs-server-bytes-read","x-cifs-bytes-written","x-cifs-uid","x-cifs-tid","x-cifs-fid","x-cifs-file-size","x-cifs-file-type"

[mapiExtractions]
DELIMS=" "
FORMAT="date","time","src_ip","c-port","r-ip","r-port","x-mapi-user","x-mapi-method","cs-bytes","sr-bytes","rs-bytes","sc-bytes","x-mapi-cs-rpc-count","x-mapi-sr-rpc-count","x-mapi-rs-rpc-count","x-mapi-sc-rpc-count","s-action","cs-username","cs-auth-group","s-ip"




[class_id]
REGEX = (1)
SOURC_KEY = ClassID
FORMAT = class_id_desc::Inbound 

[class_id]
REGEX = (2)
SOURC_KEY = ClassID
FORMAT = class_id_desc::outbound
	
[class_id]
REGEX = (0)
SOURC_KEY = ClassID
FORMAT = class_id_desc::not_available
