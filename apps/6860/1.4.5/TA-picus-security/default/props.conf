[source::...ta-picus-security*.log*]
sourcetype = tapicussecurity:log

[source::...ta_picus_security*.log*]
sourcetype = tapicussecurity:log

[picus:api]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TRANSFORMS-agentsourcetype = set_agent_source_type
TRANSFORMS-integrationssourcetype = set_integrations_source_type
TRANSFORMS-integrationagentssourcetype = set_integration_agents_source_type
TRANSFORMS-simulationlistsourcetype = set_simulation_list_source_type
TRANSFORMS-mitigationdevicessourcetype = set_mitigation_devices_source_type
TRANSFORMS-simulationlatestresultsourcetype = set_latest_results_source_type
category = Splunk App Add-on Builder
pulldown_type = 1

[picus:api:agent]
FIELDALIAS-extract_detailip = detail.ip AS src_ip
FIELDALIAS-extract_moduleenabled = attack_modules{}.enabled AS module.enabled
FIELDALIAS-extract_moduleid = attack_modules{}.id AS module.id
FIELDALIAS-extract_modulename = attack_modules{}.name AS module.name

