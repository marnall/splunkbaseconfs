# This is to force sourcetype on the syslog input
[syslog]
TRANSFORMS-force_sourcetype_barracuda = force_sourcetype_barracuda

[barracuda:web_filter]
LOOKUP-bwf_spy_type_msg = bwf_spy_type_msg spy_type OUTPUT spy_type_description
LOOKUP-bwf_src_type_msg = bwf_src_type_msg src_type OUTPUT src_type_description
LOOKUP-bwf_action_type_msg = bwf_action_type_msg action_type OUTPUT action_type_description as action
LOOKUP-bwf_dest_type_msg = bwf_dest_type_msg dest_type OUTPUT dest_type_description
REPORT-bwf-fields = bwf_proc_and_pid, bwf_dvc_time, bwf_src_and_dest, bwf_http_content_type, bwf_url, bwf_bytes, bwf_action, bwf_reason, bwf_flags, bwf_src_detail, bwf_dest_detail_spy_detail, bwf_match_category_user
FIELDALIAS-bwf_action = action as action_type_description
FIELDALIAS-src_ip-src = src_ip as src
FIELDALIAS-dest_ip-dest = dest_ip as dest


