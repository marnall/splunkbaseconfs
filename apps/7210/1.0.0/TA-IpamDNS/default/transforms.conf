[ipam_program_name]
REGEX = appliance\: (.*)\[
FORMAT = program_name::$1

[ipam_user_login_success]
REGEX = user\:User (.*) logged in
FORMAT = user::$1 action::"success" user_action::"login"

[ipam_user_logout_success]
REGEX = user\:User (.*) logged out
FORMAT = user::$1 user_action::"logout"

[ipam_user_fail]
REGEX = user\:Login.*for (.*)
FORMAT = user::$1 action::"failure" user_action::"login"
