[admin:ITM6]
match=/ITM6
members=tems

[admin_external:tems]
handlertype = python
handlerfile = rest_handler_tems.py
handleractions = create,edit,list,remove,_reload

[script:tems_creds]
match = /ITM6/tems_creds
scripttype = python
handler = rest_handler_tems_creds.main
passSystemAuth = true
requireAuthentication = true
capability.get = itm6_user


[eai:conf-tems]
showInDirSvc = true
capability.read = itm6_user
capability.write = itm6_admin
