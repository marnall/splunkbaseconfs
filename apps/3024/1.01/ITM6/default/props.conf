[itm6_eif]
LINE_BREAKER = (<START>>.+\\x\S\S)
SHOULD_LINEMERGE = false
EXTRACT-itm6_eif_class = ^(?P<event_class>[^;]+)

# The date/time is set in the XML response to Splunk, so does not need to be parsed from the output
[source::itm6_sql_input://...]
DATETIME_CONFIG = NONE

[source::itm6_obj_input://...]
DATETIME_CONFIG = NONE

[source::itm6_dash_input://...]
DATETIME_CONFIG = NONE

[source::itm6_daily_health_check://...]
DATETIME_CONFIG = NONE
