[breachalert_match]
TZ = GMT
EVAL-action = "GenerateIncidentReport"
EVAL-app = "BreachAlert"
FIELDALIAS-category = matchType AS category
EVAL-dlp_type = "breach-detection"
EVAL-dvc = folderName."/".alertName
FIELDALIAS-object = matchedValue AS object
FIELDALIAS-object_category = matchType AS object_category
FIELDALIAS-object_path = matchedValue AS object_path
FIELDALIAS-severity = sensitivityScore AS severity
FIELDALIAS-signature = resultId AS signature
FIELDALIAS-src = postSourceUrl AS src
FIELDALIAS-src_user = author AS src_user
EVAL-vendor_product = "Skurio:BreachAlert"
