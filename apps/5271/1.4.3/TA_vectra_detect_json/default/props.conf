[vectra:cognito:detect:json]
pulldown_type = true
KV_MODE = json
LINE_BREAKER = ([\n\r]+)
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_FORMAT = %s%3N
TIME_PREFIX = "vectra_timestamp": "
MAX_TIMESTAMP_LOOKAHEAD = 13
SEDCMD-strip_prefix = s/^[^{]+//g
TZ = UTC
TRUNCATE=30000
TRANSFORMS-vectra_sourcetypes = vectra_cognito_campaigns_json, vectra_cognito_health_json, vectra_cognito_audit_json, vectra_cognito_detect_json, vectra_cognito_hostscoring_json, vectra_cognito_accountdetect_json, vectra_cognito_accountscoring_json, vectra_cognito_accountlockdown_json, vectra_cognito_hostlockdown_json, vectra_cognito_match_json
description = Vectra Detect JSON Events


[vectra:cognito:hostdetect:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(host_name, host_ip)
EVAL-dest = coalesce(dd_dst_dns, dd_dst_ip)
EVAL-action = "allowed"
EVAL-ids_type = "network"
FIELDALIAS-severity_id = severity as severity_id
EVAL-severity = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical",1==1,severity_id)
EVAL-vendor_product = "Vectra AI Detect"
FIELDALIAS-alias = d_type ASNEW signature_name d_type_vname ASNEW signature_id d_type_vname ASNEW signature dd_proto ASNEW transport href ASNEW vectra_url dd_bytes_rcvd ASNEW bytes_in dd_bytes_sent ASNEW bytes_out dd_dst_dns ASNEW dest_host dd_dst_ip ASNEW dest_ip dd_dst_port ASNEW dest_port host_ip ASNEW src_ip host_name ASNEW src_host detection_id ASNEW external_id


[vectra:cognito:accountdetect:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(host_name, host_ip)
EVAL-action = "allowed"
FIELDALIAS-severity_id = severity as severity_id
EVAL-severity = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical",1==1,severity_id)
EVAL-ids_type = "network"
FIELDALIAS-alias = d_type ASNEW signature_name d_type_vname ASNEW signature_id d_type_vname ASNEW signature href ASNEW vectra_url dd_bytes_rcvd ASNEW bytes_in dd_bytes_sent ASNEW bytes_out dd_dst_dns ASNEW dest_host dd_dst_ip ASNEW desp_ip dd_dst_port ASNEW dest_port account_uid ASNEW account detection_id ASNEW external_id account_uid ASNEW user
EVAL-vendor_product = "Vectra AI Detect"

[vectra:cognito:hostscoring:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(src_host, src_ip)
EVAL-signature = "hsc"
EVAL-severity = case(threat>=50 AND certainty>=50, "critical", threat>=50 AND certainty<50, "high", threat<50 AND certainty>=50, "medium", threat<50 AND certainty<50, "low", true(), "unknown")
FIELDALIAS-alias = href ASNEW vectra_url host_ip ASNEW src_ip host_name ASNEW src_host host_id ASNEW external_id dst_key_asset ASNEW dest_key_asset href ASNEW vectra_url

[vectra:cognito:accountscoring:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-signature = "asc"
EVAL-severity = case(threat>=50 AND certainty>=50, "critical", threat>=50 AND certainty<50, "high", threat<50 AND certainty>=50, "medium", threat<50 AND certainty<50, "low", true(), "unknown")
FIELDALIAS-alias = href ASNEW vectra_url account_uid ASNEW account headend_addr ASNEW dvchost

[vectra:cognito:accountlockdown:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
FIELDALIAS-alias = href ASNEW vectra_url 

[vectra:cognito:hostlockdown:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
FIELDALIAS-alias = href ASNEW vectra_url 

[vectra:cognito:campaigns:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-dest = coalesce(dest_name, dest_ip)
EVAL-src = coalesce(src_name, src_ip)
FIELDALIAS-alias = src_hid ASNEW suid det_id ASNEW vectra_detection_id dest_id ASNEW duid dest_name ASNEW dhost dest_ip ASNEW dst src_name ASNEW src_host src_ip ASNEW src campaign_id ASNEW external_id campaign_name ASNEW signature vectra_timestamp ASNEW rt campaign_link ASNEW vectra_url

[vectra:cognito:audit:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(src_host, src_ip)
EVAL-signature = "audit"
FIELDALIAS-alias = role ASNEW privilege

[vectra:cognito:health:json]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-signature = "health"

[vectra:cognito:match:json]
FIELDALIAS-suricata_global = proto AS transport src_ip AS src dest_ip AS dest
##Suricata Fields
FIELDALIAS-suricata_vendor_id = alert.signature_id AS vendor_sid alert.gid AS vendor_gid alert.rev AS vendor_rev
EVAL-suricata_signature_id = vendor_gid.":".vendor_sid.":".vendor_rev

##FIELD ALIAS FOR IDS 
FIELDALIAS-suricata_ids = alert.action AS action alert.gid AS alert_gid alert.rev AS alert_rev alert.severity AS severity_id alert.category AS category alert.signature AS signature host AS dvc alert.signature_id AS signature_id

##FIELD ALIAS FOR HTTP
FIELDALIAS-suricata_web = http.hostname AS dest_host http.url AS url http.http_user_agent AS http_user_agent http.http_content_type AS http_content_type http.cookie AS cookie http.length AS bytes http.protocol AS http_protocol http.status AS status http.http_method AS http_method http.http_refer AS http_referrer

##FIELD ALIAS FOR DNS
FIELDALIAS-suricata_dns = dns.id AS transaction_id dns.rcode AS reply_code dns.rdata AS answer dns.rdata AS dest dns.rrname AS query dns.ttl AS ttl dns.tx_id AS tx_id dns.type AS message_type

##FIELD ALIAS FOR SSL
FIELDALIAS-suricata_ssl = tls.fingerprint AS ssl_hash tls.issuerdn AS ssl_issuer tls.sni AS ssl_server_name_indication tls.subject AS ssl_subject tls.version AS ssl_version tls.serial AS ssl_serial

##FIELD ALIAS FOR SSH
FIELDALIAS-suricata_ssh = ssh.client.proto_version AS ssh_client_version ssh.client.software_version AS ssh_client_software ssh.server.proto_version AS ssh_server_version ssh.server.software_version AS ssh_server_software

##FIELD ALIAS FOR FLOW
FIELDALIAS-suricata_flow = app_proto AS app flow.bytes_toclient AS bytes_in flow.bytes_toserver AS bytes_out flow.pkts_toclient AS packets_in flow.pkts_toserver AS packets_out flow.reason AS reason flow.start AS starttime flow.end AS endtime flow.state as state tcp.ack AS tcp_ack tcp.cwr AS tcp_cwr tcp.ecn AS tcp_ecn tcp.fin AS tcp_fin tcp.psh AS tcp_psh tcp.rst AS tcp_rst tcp.state AS tcp_state tcp.syn AS tcp_syn tcp.tcp_flags AS tcp_flag_hex tcp.tcp_flags_tc AS tcp_flag_hex_to_client tcp.tcp_flags_ts AS tcp_flag_hex_to_server


