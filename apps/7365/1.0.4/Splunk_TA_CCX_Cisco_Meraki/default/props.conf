EVAL-dest_ip = case(meraki_event_type="dhcp_lease", 'eventData.ip', isnotnull('url'), replace('eventData.server', "([^\:]+)\:\d+$", "\1"), 'meraki_event_type'=="nbar_block", 'eventData.Destination IP')
