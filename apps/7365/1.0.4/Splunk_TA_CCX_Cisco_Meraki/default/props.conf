EVAL-file_name = case('data_type'=="security_event" AND 'disposition'=="malicious", if(match('url', "(?:https?\:\/\/).+\/(.+\.\w{2,4})$"), replace('url', "(?:https?\:\/\/).+\/(.+\.\w{2,4})$", "\1"), null()))
