
### DEFAULT MERAKI SOURCETYPES ###

[meraki:accesspoints]

SHOULD_LINEMERGE = false
KV_MODE = JSON
TIME_PREFIX = \"occurredAt\"\s*:\s*
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ

FIELDALIAS-duration = "eventData.duration" AS duration
FIELDALIAS-signature = description AS signature

EVAL-action = case('meraki_event_type'=="nbar_block", if('eventData.Layer 7 firewall rule'=="Deny", "blocked", "allowed"))
EVAL-app = case(meraki_event_type IN("bcast_deauth_attack", "mac_spoofing_attack", "8021x_eap_success", "8021x_eap_failure", "8021x_auth", "wpa_auth", "dhcp_problem", "dhcp_blocked", "martian_vlan", "cf_block", "events_dropped2", "splash_auth", "failover_event", "ip_conflict", "cellular_up", "cellular_down", "carrier_event", "cli_set_rad_pmksa_parms", "cli_set_rad_parms", "channel_scan"), "Cisco Meraki", 'meraki_event_type'=="nbar_block", 'eventData.Classification')
EVAL-body = case(meraki_event_type IN("bcast_deauth_attack", "mac_spoofing_attack"), description, 1==1, 'description')
EVAL-description = case(meraki_event_type IN("bcast_deauth_attack", "mac_spoofing_attack"), description, 1==1, 'description')
EVAL-dest = case(meraki_event_type IN("auto_rf_channel_change", "auto_tx_power_change", "dfs_event", "wpa_deauth", "bcast_deauth_attack", "mac_spoofing_attack"), if(deviceName="", deviceSerial, deviceName), 'meraki_event_type'=="nbar_block", 'eventData.Destination IP')
EVAL-dest_ip = case('meraki_event_type'=="nbar_block", 'eventData.Destination IP')
EVAL-dest_port = case('meraki_event_type'=="nbar_block", 'eventData.Destination Port')
EVAL-dvc = case(meraki_event_type IN("auto_rf_channel_change", "auto_tx_power_change", "dfs_event", "wpa_deauth"), if(deviceName="", deviceSerial, deviceName), 'meraki_event_type'=="nbar_block", if(deviceName="", deviceSerial, replace(deviceName, "(\w+).+", "\1")))
EVAL-reason = case(meraki_event_type IN("wpa_auth", "splash_auth", "8021x_auth", "8021x_eap_success"), "success", meraki_event_type IN("8021x_eap_failure"), "failure", (meraki_event_type IN("wpa_deauth", "auto_rf_channel_change", "auto_tx_power_change", "dfs_event") OR (meraki_event_type IN("ids_start", "ids_update", "web_cache_started", "web_cache_stopped", "vpn_registry_change")) OR (meraki_event_type IN("port_status", "stp_port_role_change", "port_bounce", "poe_budget_change", "psu_insert")) OR (sourcetype="meraki:audit")) AND (like(_raw, "%fail%") OR like(_raw, "%block%")), "failure", (meraki_event_type IN("wpa_deauth", "auto_rf_channel_change", "auto_tx_power_change", "dfs_event") OR (meraki_event_type IN("ids_start", "ids_update", "web_cache_started", "web_cache_stopped", "vpn_registry_change")) OR (meraki_event_type IN("port_status", "stp_port_role_change", "port_bounce", "poe_budget_change", "psu_insert")) OR (sourcetype="meraki:audit")) AND (NOT like(_raw, "%fail%") OR NOT like(_raw, "%block%")), "success")
EVAL-src = case(meraki_event_type IN("bcast_deauth_attack", "mac_spoofing_attack"), lower('eventData.src'), meraki_event_type IN("auto_rf_channel_change", "auto_tx_power_change", "dfs_event", "wpa_deauth", "events_dropped2", "cli_set_rad_pmksa_parms", "cli_set_rad_parms", "channel_scan", "carrier_event"), if(deviceName="", deviceSerial, deviceName), meraki_event_type IN("wpa_auth", "splash_auth", "8021x_auth", "8021x_eap_success", "8021x_eap_failure"), clientDescription, 'meraki_event_type'=="nbar_block", 'eventData.Source IP')
EVAL-src_ip = case(meraki_event_type="8021x_auth", 'eventData.last_known_client_ip', meraki_event_type IN("8021x_eap_success", "8021x_eap_failure"), 'eventData.client_ip', 'meraki_event_type'=="nbar_block", 'eventData.Source IP')
EVAL-src_mac = case(meraki_event_type IN("8021x_auth", "8021x_eap_success", "8021x_eap_failure"), lower('eventData.client_mac'), 'meraki_event_type'=="nbar_block", lower('clientMac'))
EVAL-src_port = case('meraki_event_type'=="nbar_block", 'eventData.Source Port')
EVAL-transport = case('meraki_event_type'=="nbar_block", lower('eventData.Protocol'))
EVAL-type = case(meraki_event_type IN("bcast_deauth_attack", "mac_spoofing_attack"), "warning", like(meraki_event_type, "cli_set_rad%") OR like(meraki_event_type, "events_dropped2%"), "alarm", meraki_event_type IN ("channel_scan", "carrier_event"), "event", meraki_event_type=="cf_block", "alert", 1==1, 'type')
EVAL-vendor_product = "Cisco Meraki"

[meraki:audit]

SHOULD_LINEMERGE = false
KV_MODE = JSON
TIME_PREFIX = \"ts\"\s*:\s*
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ

EVAL-action = case(match('label', "^Clear.*|clear.*"), "cleared", match('label', "^Create.*|create.*"), "created", match('label', "^Delete.*|delete.*"), "deleted", match('label', "^Modif.*|modif.*|Move.*|move.*"), "modified", match('label', "^Stop.*|stop.*"), "stopped", match('label', "^Lockout.*|lockout.*"), "lockout", match('label', "^Read.*|read.*"), "read", match('label', "^Logoff.*|logoff.*|Logout.*|logout.*"), "logoff", match('label', "^Update.*|update.*|Add.*|add.*|Remove.*|remove.*"), "updated", match('label', "^Start.*|start.*"), "started", match('label', "^Restart.*|restart.*"), "restarted", match('label', "^Unlock.*|unlock.*"), "unlocked", 1==1, "unknown")
EVAL-src_user = if(coalesce('adminEmail', 'adminName')=="null", null(), coalesce('adminEmail', 'adminName'))
EVAL-status = if(like(_raw, "%failover%"), "failover", null())
EVAL-user = if('adminEmail'=="null", null(), mvindex(split(adminEmail, "@"), 0))
EVAL-vendor_account = if('adminEmail'=="null", null(), mvindex(split(adminEmail, "@"), 0))

[meraki:cameras]

SHOULD_LINEMERGE = false
KV_MODE = JSON
TIME_PREFIX = \"occurredAt\"\s*:\s*
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ

EVAL-action = case(meraki_event_type IN("wpa_auth", "splash_auth", "8021x_auth", "8021x_eap_success"), "success", meraki_event_type IN("8021x_eap_failure"), "failure", (meraki_event_type IN("wpa_deauth", "auto_rf_channel_change", "auto_tx_power_change", "dfs_event") OR (meraki_event_type IN("ids_start", "ids_update", "web_cache_started", "web_cache_stopped", "vpn_registry_change")) OR (meraki_event_type IN("port_status", "stp_port_role_change", "port_bounce", "poe_budget_change", "psu_insert")) OR (sourcetype="meraki:audit")) AND (like(_raw, "%fail%") OR like(_raw, "%block%")), "failure", (meraki_event_type IN("wpa_deauth", "auto_rf_channel_change", "auto_tx_power_change", "dfs_event") OR (meraki_event_type IN("ids_start", "ids_update", "web_cache_started", "web_cache_stopped", "vpn_registry_change")) OR (meraki_event_type IN("port_status", "stp_port_role_change", "port_bounce", "poe_budget_change", "psu_insert")) OR (sourcetype="meraki:audit")) AND (NOT like(_raw, "%fail%") OR NOT like(_raw, "%block%")), "success")
EVAL-vendor_product = "Cisco Meraki"

[meraki:organizationsecurity]

SHOULD_LINEMERGE = false
KV_MODE = JSON
TIME_PREFIX = \"ts\"\s*:\s*
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ

FIELDALIAS-ccx_meraki_security_x_signature_id = signature AS x_signature


EVAL-action = case(eventType="IDS Alert" AND blocked="true", "blocked", eventType="IDS Alert" AND blocked="false", "allowed", eventType="File Scanned" OR NOT eventType="IDS Alert", lower('action'))
EVAL-category = case(eventType="IDS Alert", replace(message, "\s+(?:[^\s].*)", ""), eventType="File Scanned" OR NOT eventType="IDS Alert", coalesce('disposition', if('fileType'=="null", null(), 'fileType')))
EVAL-dest = case(eventType="IDS Alert", mvindex(split(destIp, ":"), 0), eventType="File Scanned" OR NOT eventType="IDS Alert", if('destIp'=="", null(), 'destIp'))
EVAL-dest_ip = case(eventType="IDS Alert", mvindex(split(destIp, ":"), 0), eventType="File Scanned" OR NOT eventType="IDS Alert", if('destIp'=="", null(), 'destIp'))
EVAL-dest_port = case(eventType="IDS Alert",replace(destIp, ".*\:", ""), eventType="File Scanned" OR NOT eventType="IDS Alert", if('destinationPort'=="" OR 'destinationPort'=="null", null(), 'destinationPort'))
EVAL-file_hash = if(eventType="File Scanned" OR NOT eventType="IDS Alert", fileHash, NULL)
EVAL-file_name = if(eventType="File Scanned" OR NOT eventType="IDS Alert", mvindex(split(mvindex(split(uri, "/"), -1), "?"), 0), NULL)
EVAL-file_path = if(eventType="File Scanned" OR NOT eventType="IDS Alert", if('uri'=="", null(), 'uri'), NULL)
EVAL-ids_type = case(eventType="IDS Alert", "network")
EVAL-signature = if(eventType="IDS Alert", replace(message, "^.*?[\s+]", "") , if('canonicalName'=="", null(), 'canonicalName'))
EVAL-signature_id = case(eventType="IDS Alert" OR NOT eventType="IDS Alert", 'x_signature')
EVAL-src = case(eventType="IDS Alert" OR NOT eventType="IDS Alert", mvindex(split(srcIp, ":"), 0))
EVAL-src_ip = case(eventType="IDS Alert" OR NOT eventType="IDS Alert", mvindex(split(srcIp, ":"), 0))
EVAL-src_port = replace(srcIp, ".*\:", "")
EVAL-transport = 'protocol'
EVAL-url = if('uri'=="", null(), 'uri')
EVAL-user = case(eventType="File Scanned" OR NOT eventType="IDS Alert", if('clientName'=="", null(), 'clientName'))

