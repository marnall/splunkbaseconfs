EVAL-vendor_product = "Cisco Meraki"

### MERAKI SC4S###

###MAIN SOURCETYPE###
[ccx:meraki:sc4s]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER =([\r\n]+)
disabled=false
TRUNCATE=150000
pulldown_type = 1
TRANSFORMS-sourcetype = ccx:meraki:sc4s:events,ccx:meraki:sc4s:firewall,ccx:meraki:sc4s:flows,ccx:meraki:sc4s:urls

#####################

