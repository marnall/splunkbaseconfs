### KV STORE LOOKUPS ####
[apl_sas_content_searches]
external_type = kvstore
collection = apl_sas_content_searches
fields_list = _key, title, spl, created, updated, guid, is_latest, version

[apl_sas_content_news]
external_type = kvstore
collection = apl_sas_content_news
fields_list = _key, title, body, created, updated, guid, is_latest, version

[apl_sas_announcements]
external_type = kvstore
collection = apl_sas_announcements
fields_list = _key, title, body, updated, created

[apl_sas_checkpoints]
external_type = kvstore
collection = apl_sas_checkpoints
fields_list = _key, object, last_time

[apl_sas_content_lookups]
external_type = kvstore
collection = apl_sas_content_lookups
fields_list = _key, filename, title, description

[apl_sas_banner_announcements]
external_type = kvstore
collection = apl_sas_banner_announcements
fields_list = _key, guid, hidden

