# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 4

[launcher]
author = Christopher Owen
version = 1.0.1
description = This add-on allows you to send alerts from Splunk to a Facebook Page via the GraphAPI.  It looks for a "message" field in the event to send to the page.

[ui]
is_visible = 0
label = Splunk Alert to Facebook
docs_section_override = AddOns:released

[package]
id = TA-splunk-alert-to-facebook

[triggers]
reload.addon_builder = simple
reload.ta_splunk_alert_to_facebook_account = simple
reload.ta_splunk_alert_to_facebook_settings = simple
reload.passwords = simple

