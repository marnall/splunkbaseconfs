[vmray:analysis]
LINE_BREAKER = \}([\r\n]+)
pulldown_type = 1
EVAL-action = "allowed"
FIELDALIAS-date = analysis_created as date
FIELDALIAS-file_hash = analysis_sample_md5 as file_hash
FIELDALIAS-file_name = submission.submission_filename as file_name
FIELDALIAS-vendor_product = "VMRay Analyzer" as vendor_product
FIELDALIAS-url = analysis_webif_url as url
TRUNCATE = 0
KV_MODE = json
TZ = Etc/UTC

[vmray:glog]
LINE_BREAKER = (^)<\?xml version="1.0" encoding="UTF-8"\?>
MUST_BREAK_AFTER = \</ganalysis\>
SHOULD_LINEMERGE = true
SEDCMD-remove_ginformation = s/(?m)^\s*<GInformation.*>$//g
TRUNCATE = 500000000
KV_MODE = xml
pulldown_type = 1
TZ = Etc/UTC

[vmray:stix]
LINE_BREAKER = (^)<stix:STIX_Package
MUST_BREAK_AFTER = \</stix:STIX_Package\>
SHOULD_LINEMERGE = true
TRUNCATE = 100000000
KV_MODE = xml
pulldown_type = 1
TZ = Etc/UTC

