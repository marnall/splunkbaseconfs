

[violation predictor]
dispatch.earliest_time = @d-12h
dispatch.latest_time = +1d@d
alert.track = 1
alert.digest_mode = True
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 6h
alert_condition = where kb>quotaKB
action.email.subject = Alert: Splunk License Violation predicted for today
action.email.subject.alert = Alert: Splunk License Violation predicted for today
auto_summarize.dispatch.earliest_time = -1d@h
counttype = custom
cron_schedule = */30 * * * *
enableSched = 1
schedule_window = 10
search = index=_internal sourcetype=splunkd component=Metrics group=per_sourcetype_thruput series!="splunkd*" series!="scheduler" series!="kvstore" series!="audittrail" series!="splunk_web_*" series!="splunk_resource_usage" series!="splunk_disk_objects" series!="mongod" | timechart span=15min sum(kb) by series | addtotals fieldname="kb" | fillnull kb value=0 | streamstats window=6 current=f avg(kb) as approx_rate | eval FORECASTED=if(_time>now(),approx_rate,FORECASTED) | fields - kb approx_rate | streamstats max(FORECASTED) as FORECASTED | where _time<relative_time(now(),"+1d@d") AND _time>=relative_time(now(),"@d") | addtotals fieldname="total" | stats sum(total) as kb | appendcols [| rest splunk_server=local /services/licenser/pools | rename title AS Pool | search [rest splunk_server=local /services/licenser/groups | search is_active=1 | eval stack_id=stack_ids | fields stack_id] | join type=outer stack_id [rest splunk_server=local /services/licenser/stacks | eval stack_id=title | eval stack_quota=quota | fields stack_id stack_quota] | stats max(stack_quota) as quotaB | eval quotaKB=quotaB/1024 | table quotaKB]

