FIELDALIAS-aob_gen_violations_all_alias_1 = violation{}.violationQuarantineFlag AS action
FIELDALIAS-aob_gen_violations_all_alias_10 = messageCreateDate AS date
FIELDALIAS-aob_gen_violations_all_alias_11 = messageAuthor.emailAddress AS user
FIELDALIAS-aob_gen_violations_all_alias_2 = messageAuthor.photoUrl AS url
FIELDALIAS-aob_gen_violations_all_alias_3 = channel.name AS vendor_product
FIELDALIAS-aob_gen_violations_all_alias_4 = violation{}.priority AS severity
FIELDALIAS-aob_gen_violations_all_alias_5 = violation{}.policyName AS app
FIELDALIAS-aob_gen_violations_all_alias_6 = violation{}.score AS severity_id
FIELDALIAS-aob_gen_violations_all_alias_7 = violation{}.type AS category
FIELDALIAS-aob_gen_violations_all_alias_8 = violation{}.id AS signature_id
FIELDALIAS-aob_gen_violations_all_alias_9 = violation{}.reason AS signature
INDEXED_EXTRACTIONS = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
