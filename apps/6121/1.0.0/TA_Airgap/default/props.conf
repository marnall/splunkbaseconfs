[airgap:access]
INDEXED_EXTRACTIONS = json
MAX_TIMESTAMP_LOOKAHEAD = 24
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3Q
TIME_PREFIX = \@timestamp\":\s\"
TZ = UTC
category = Airgap
pulldown_type = 1
FIELDALIAS-airgap_access = source.source.ip AS src

[airgap:error]
INDEXED_EXTRACTIONS = json
MAX_TIMESTAMP_LOOKAHEAD = 24
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3Q
TIME_PREFIX = \@timestamp\":\s\"
TZ = UTC
category = Airgap
pulldown_type = 1

[airgap:alarm]
INDEXED_EXTRACTIONS = json
MAX_TIMESTAMP_LOOKAHEAD = 19
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TIME_PREFIX = \"createdAt\":\s\"
TZ = UTC
category = Airgap
pulldown_type = 1
EXTRACT-rks_level = Ransomware\sKill\sSwitch\sLevel\sOn\s(?<rks_gateway>.*?)\sChanged\sfrom\s(?<from_level>\S+)\sto\s(?<to_level>\S+)\sat in description
TRANSFORMS-gwhostname = gateway_hostname

[airgap:dhcp]
INDEXED_EXTRACTIONS = json
MAX_TIMESTAMP_LOOKAHEAD = 19
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TIME_PREFIX = \"created_at\":\s\"
TZ = UTC
category = Airgap
pulldown_type = 1
TRANSFORMS-hostname = dhcp_hostname
FIELDALIAS-airgap_dhcp = command AS action

