[qax_tde_lookup]
external_type = kvstore
collection = qax_ti_tde_data_collection
fields_list = _key, value

[qax_malicious_family_lookup]
external_type = kvstore
collection = qax_ti_malicious_family_info_collection
fields_list = _key,risk,reference,malicious_type,malicious_family,platform,description

[qax_malicious_family_en_lookup]
external_type = kvstore
collection = qax_ti_malicious_family_info_en_collection
fields_list = _key,risk,reference,malicious_type,malicious_family,platform,description

[qax_log_detection_source_lookup]
external_type = kvstore
collection = qax_ti_log_detection_sources_collection
fields_list = id,name,string_mapping
