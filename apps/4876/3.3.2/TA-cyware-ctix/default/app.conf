# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 35

[launcher]
author = Cyware Labs
version = 3.3.2
description = The Cyware Threat Intel eXchange (CTIX) Add-on for Splunk is used to assist the user in the integration of CTIX with Splunk Enterprise. This application allows the user to perform the following tasks:1. Seamlessly extract threat intelligence data from CTIX to Splunk.2. Index and categorize threat intelligence data within Splunk.3. Deploy an intuitive dashboard for streamlined data visualization, providing key insights into holistic IOC metrics and subcategories.4. Augment Splunk index indicators with CTIX data, facilitating a layered analysis and deeper understanding of threat intelligence.

[ui]
is_visible = 1
label = Cyware Threat Intelligence eXchange (CTIX)
docs_section_override = AddOns:released

[package]
id = TA-cyware-ctix

[triggers]
reload.addon_builder = simple
reload.ta_cyware_ctix_account = simple
reload.ta_cyware_ctix_settings = simple
reload.passwords = simple

