#https://docs.imperva.com/bundle/cloud-application-security/page/more/log-file-structure.htm

[ccx_imperva_cef_format_field_ext]
REGEX = (CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|[^|]*\|[^|]*\|[^|]*\|)
FORMAT = cef_header_extended::$1

[ccx_imperva_cef_extract_field_header_ext]
REGEX = CEF:\d+\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|
SOURCE_KEY = cef_header_extended
FORMAT = product::$1 logstream::$2 product_version::$3 future_use::$4 event_name::$5 event_code::$6

[ccx_imperva_cef_fieldlabel_parse]
REGEX = c[ns](?!1\=)\d+\=(.*?)\sc[ns]\d+Label\=(.*?)(?=\s+\S+\=|$)
FORMAT = $2::$1

[ccx_imperva_cef_kv_parse]
REGEX = (?:_+)?([\w.:\[\]]+)=(.*?(?=(?:\s[\w.:\[\]]+=|$)))
FORMAT = $1::$2

[cef_format_extract_field_6]
REGEX = ((?:\w{3,8}|\d{1,2})\s+(?:\w{3,8}|\d{1,2})\s+\d{4})\s+
SOURCE_KEY = rt
FORMAT = date::$1

[cef_format_extract_field_7]
REGEX = CEF:\d+(?:\|[^|]+){3}\|Worm\|.*=Access to:\s+(.*)[\\/](\S+)
FORMAT = file_path::$1 file_name::$2

[ccx_imperva_uri_capture]
CLEAN_KEYS = 0
REGEX = request\=(?:\w+\:\/\/)?(?:\w+[^\/\s]+)?(?P<uri_path>(?:\.|\/|%|(?:\* |.*? \S*)|.)?[^\?\s]*)?(?P<uri_query>\?[^\s]*)?
