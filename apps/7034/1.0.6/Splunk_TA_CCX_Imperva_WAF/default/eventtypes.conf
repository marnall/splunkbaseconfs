[ccx_imperva_waf]
search = (sourcetype="imperva:waf" OR sourcetype="incapsula:cef") 

[ccx_imperva_waf_alerts]
search = (sourcetype="imperva:waf" OR sourcetype="incapsula:cef") event_code IN("11","12") NOT event_name="Normal"
# tags = alert

[ccx_imperva_waf_web]
search = (sourcetype="imperva:waf" OR sourcetype="incapsula:cef") url="*"
# tags = web

[ccx_imperva_waf_firewall]
search = (sourcetype="imperva:waf" OR sourcetype="incapsula:cef") category="Firewall*"
# tags = communicate network

[ccx_imperva_waf_ids]
search = (sourcetype="imperva:waf" OR sourcetype="incapsula:cef") signature="*" NOT (event_name="Normal" OR event_code IN("11","12"))
# tags - attack ids
