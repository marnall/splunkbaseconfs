[Malware - Activity Report]
action.email.show_password = 1
display.visualizations.show = 0
search = eventtype=bd_av | table date, computer_ip, file_path, malware_name, action

[Malware - Detections by Threats]
action.email.show_password = 1
search = eventtype=bd_av |stats count as Detections by malware_name | rename malware_name as "Threat Name" | sort - Detections

[Malware - Still Infected Hosts]
action.email.show_password = 1
search = eventtype=bd_av action=allowed OR action="still present" | stats count(file_path) as "Infections Still Present", latest(date) as "Latest Uncleaned Infection" by dest | sort - dest

[Malware - Top 10 Threats]
action.email.show_password = 1
search = eventtype=bd_av | stats count by malware_name | sort - count limit=10 | rename malware_name as "Threat Name", count as Detections

[Endpoints - Outdated Signatures]
action.email.show_password = 1
search = eventtype=bd_av|stats latest(date) as last_updated by dest | eval last_updated = strptime(last_updated, "%FT%T.%3QZ") | eval deadline=relative_time(now(),"-1m") | eval x=strftime(last_updated, "%c") | eval y = strftime(deadline, "%c") | where last_updated < deadline | sort - last_updated | rename dest as Host, x as "Last Updated" | table Host "Last Updated"

[Firewall Events - Activity Report]
action.email.show_password = 1
action.email.useNSSubject = 1
display.visualizations.show = 0
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_fw | table last_blocked, computer_ip

[Incidents - High Severity]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_new-incident severity="high"| eval Incidents=incident_id |  stats count as "Events Count" values(detection_name) as detection_name by Incidents

[Incident - Activity Report]
action.email.show_password = 1
action.email.useNSSubject = 1
display.visualizations.show = 0
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_new-incident | table computer_ip, incident_id, detection_name, severity

[HyperDetect - Still Infected Hosts]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_hd final_status= "still present" OR final_status="allowed" | stats count(file_path) as "Infections Still Present", latest(date) as "Latest Uncleaned Infection" by dest | sort - dest

[HyperDetect - Top 10 Threats]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_hd | stats count by malware_name| sort - count limit=10 | rename malware_name as "Threat Name", count as Detections

[Firewall Events - Top 10 Source Ips]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_fw  | rename computer_ip as "Host" |stats count as "Detections" by "Host" |sort - Detections | head 10

[Blocked Apps - Activity Report]
action.email.show_password = 1
action.email.useNSSubject = 1
display.visualizations.show = 0
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_uc uc_type=application | table last_blocked, computer_ip, application_path

[Blocked Apps - Affected Objects]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_uc uc_type=application | eval "IP/FQDN/USER" = computer_ip+"   "+computer_fqdn+"   "+user | stats count latest(last_blocked) as last_blocked values("IP/FQDN/USER") as "IP/FQDN/USER" by  application_path

[Blocked Websites - Activity Report]
action.email.show_password = 1
action.email.useNSSubject = 1
display.visualizations.show = 0
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_uc uc_type=http | table last_blocked, computer_ip, computer_name

[Blocked Websites - Per Category]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_uc uc_type=http |eval categories = split(categories, ",")| mvexpand categories| eval  type= if(isnotnull(block_type) AND categories!="", block_type+"+"+ categories, block_type+categories) | stats count latest(last_blocked) as last_blocked  values(url) as url values(computer_ip) as computer_ip by type | sort - count

[Firewall Events - Blocking Actions]
action.email.show_password = 1
action.email.useNSSubject = 1
display.visualizations.show = 0
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_fw status="*blocked*"  | table computer_ip, source_ip, local_port,  protocol_id, application_path

[HyperDetect - Activity Report]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_hd | table date, computer_ip, file_path, malware_name, final_status

[HyperDetect - Detections By Threats]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_hd | stats count as Detections by "malware_name" | rename malware_name as "Threat Name"

[Incidents - Detection By Attack Types]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
search = eventtype=bd_new-incident | stats count as Detections by attack_types{}| rename attack_types{} as "Attack Types" | sort - Detections
