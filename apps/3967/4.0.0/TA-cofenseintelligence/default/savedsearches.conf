##########
# Blocklist URLs, split by Impact Rating | for Splunk Enterprise Security App
##########
[Cofense Intelligence - blocklist URLs w/Impact Rating of Major]
disabled = true
cron_schedule = */15 * * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 1
is_visible = true
search = sourcetype=cofense:intelligence cofense_event_type=blockset blockType=URL impact=Major | rename data_1.url AS url, threatDetailURL AS description | table url, description | outputlookup cofense_intel_url_major.csv

