pulldown_type = true
category = Network & Security
FIELDALIAS-cr_aliases = application AS app device_name AS dvc dst_ip AS dest dst_port AS dest_port dstzone AS dest_zone fw_rule_id AS rule_id in_interface AS src_interface out_interface AS dest_interface protocol AS transport recv_bytes AS bytes_in recv_pkts AS packets_in sent_bytes AS bytes_out sent_pkts AS packets_out src_ip AS src srczone AS src_zone
LOOKUP-status = cr_status status OUTPUT action
LOOKUP-product = cr_product sourcetype OUTPUT vendor_product
