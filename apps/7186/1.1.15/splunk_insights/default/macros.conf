########## SSEF Framework Start ##########

[ssef_splunk_deployment]
definition = rest /services/server/info splunk_server=local \
| fields instance_type \
| eval splunk_deployment=if(isnull(instance_type) OR instance_type="","Enterprise","Cloud") \
| fields splunk_deployment \
| append \
    [ search `ssef_cloud_summary` source=splunk-entitlements earliest=-16h \
    | eval license_type=if(svc_license==0,"Ingest","Workload") \
    | stats latest(license_type) AS license_type, latest(eval(if(license_type=="Workload","true",null()))) AS is_workload, latest(eval(if(license_type=="Ingest","true",null()))) AS is_ingest max(svc_license) as svc_license max(ingest_license) as ingest_license \
    | fillnull value="false" is_ingest is_workload ] \
| filldown splunk_deployment \
| stats latest(license_type) AS license_type latest(is_workload) AS is_workload latest(is_ingest) AS is_ingest latest(svc_license) AS svc_license latest(ingest_license) AS ingest_license by splunk_deployment \
| fields splunk_deployment license_type is_workload is_ingest svc_license ingest_license

[ssef_discover_roles]
definition = search (index=_internal) earliest=-7d sourcetype=splunkd NOT(CASE(MetricSchemaProcessor)) Metrics TERM(group=instance) TERM(name=instance) (deployment_client OR cluster_search_head OR search_head OR indexer OR cluster_slave OR search_peer OR license_master) NOT(universal_forwarder) \
| eval mv_roles=split(instance_roles, ", ") \
| stats count values(instance_roles) as roles values(mv_roles) as mv_roles values(index_cluster_label) as index_cluster_label values(sh_cluster_label) as sh_cluster_label by instance_guid server_name \
| eval index_cluster_label=if(index_cluster_label="none", "", index_cluster_label) , sh_cluster_label=if(sh_cluster_label="none", "", sh_cluster_label) \
| stats count(eval(mv_roles="indexer")) as indexer count(eval(mv_roles="search_peer")) as search_peer count(eval(mv_roles="cluster_search_head")) as cluster_search_head count(eval(mv_roles="search_head")) as search_head count(eval(mv_roles="cluster_slave")) as cluster_peer count(eval(mv_roles="kv_store")) as kv_store_role count(eval(mv_roles="cluster_master")) as cluster_manager count(eval(mv_roles="license_master")) as license_manager count(eval(mv_roles="deployment_server")) as deployment_server count(eval(mv_roles="deployment_client")) as deployment_client count(eval(mv_roles="shc_captain")) as shc_captain count(eval(mv_roles="shc_member")) as shc_member values(sh_cluster_label) as sh_cluster_label by instance_guid server_name roles index_cluster_label \
| eval roles=split(roles, ", ") \
| rename instance_guid as guid \
| rename server_name as host \
| eval host=lower(host)

[ssef_discover_guid]
definition = append maxtime=60 maxout=50000 timeout=60 \
    [| search (index=_internal) Metrics sourcetype=splunkd TERM(group=tcpin_connections) earliest=-25min latest=now TERM(fwdType=full) \
    | stats values(connectionType) as tcp_connectionType values(arch) as tcp_arch values(version) as tcp_version values(fwdType) as tcp_fwdType values(os) as tcp_os sum(kb) as tcp_sum_kb dc(host) as tcp_targets_touched by hostname guid \
    | table * \
    | eval hostname = lower(host) , isForwarding=1 ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| search index=_introspection component=hostwide earliest=-24h \
    | eval host = lower(host) \
    | stats values(data.cpu_count) as cpu_count values(data.virtual_cpu_count) as vcpu_count values(data.splunk_version) as introspection_splunk_version values(data.os_version) as introspection_os_version by host data.instance_guid \
    | rename data.instance_guid as guid] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest /servicesNS/-/-/server/info splunk_server=* \
    | eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", null()) , is_indexer = if(server_roles="indexer" OR isForwarding = 0, "yes", null()), host_resolved = lower(host_resolved), host_fqdn = lower(host_fqdn), lower_splunk_server = lower(splunk_server), host = lower(host) , server_roles = mvjoin(server_roles, ",") \
    | fields lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_connected is_search_head is_indexer guid server_roles isForwarding ] \
| stats values(*) as * by guid

[ssef_discover_finalize]
definition = append maxtime=60 maxout=50000 timeout=60 \
    [| tstats dc(data.search_props.sid) as num_searches Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search earliest=-7d by data.search_props.search_head \
    | rename data.search_props.search_head as host \
    | eval is_search_head = "yes" , host = lower(host) \
    | fields host is_search_head num_searches ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [ search (index=_internal sourcetype=splunkd_access method=POST CASE(/services/shcluster/member)) OR (index=_internal sourcetype=splunkd_access uri_path IN ("*/itsi*", "*/SplunkEnterpriseSecuritySuite*")) OR (index=_internal sourcetype=splunk_web_access) earliest=-90m \
    | eval host = lower(host) \
    | stats values(uri_path) as uri_path by host \
    | eval is_es = if( uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", "yes", null()) , is_itsi = if( uri_path LIKE "%/itsi/%", "yes", null()) \
    | where isnotnull(is_es) OR isnotnull(is_itsi) \
    | fields host is_es is_itsi ] \
| stats values(*) as * by host \
| eval primary_role=case(indexer=1,"indexer", cluster_manager=1,"cluster_manager", shc_member=1 OR shc_captain=1,"search_head_cluster", cluster_search_head=1,"cluster_search_head", search_head=1,"search_head", license_manager=1,"license_manager", deployment_server=1,"deployment_server", tcp_fwdType="full","heavy_forwarder", tcp_fwdType="uf","universal_forwarder") \
| eval index_cluster_label = if(isnull(index_cluster_label) OR index_cluster_label="", null(), index_cluster_label), search_head_cluster = if(isnull(search_head_cluster) OR search_head_cluster="", null(), search_head_cluster) \
| eval roles = case(isnull(roles) AND primary_role="heavy_forwarder", "heavy_forwarder", true(), roles) \
| eval version=coalesce(tcp_version, introspection_splunk_version) \
| eval label = case ( primary_role="cluster_manager", host, primary_role="search_head_cluster", sh_cluster_label, isnotnull(index_cluster_label), index_cluster_label, true(), host) \
| eval name = case ( primary_role = "search_head_cluster" AND is_itsi = "yes", "itsi-shc", primary_role = "search_head_cluster" AND is_es = "yes", "es-shc", primary_role = "search_head_cluster", "shc", primary_role = "indexer" AND isnull(index_cluster_label), "idx", primary_role = "indexer" AND isnotnull(index_cluster_label), "idxc", (primary_role = "search_head" OR primary_role = "cluster_search_head") AND is_itsi = "yes", "itsi", (primary_role = "search_head" OR primary_role = "cluster_search_head") AND is_es = "yes", "es", primary_role = "search_head" OR primary_role = "cluster_search_head" OR is_search_head="yes", "sh", primary_role = "cluster_manager", "cm", primary_role = "heavy_forwarder", "hf", true(), "adhoc") \
| eval is_search_head = case(primary_role="search_head", "yes", primary_role="indexer" OR primary_role = "heavy_forwarder", "no", true(), is_search_head) \
| streamstats dc(label) as count by name \
| eval name = name . "-" . printf("%02d", count) \
| eval server_roles=split(server_roles, ",") \
| eval roles = if(isnull(roles) AND is_search_head="yes", "search_head", roles) , roles = mvdedup(mvappend(roles,server_roles)) \
| eval role=mvjoin(roles,",") , splunk_server = if(isnull(splunk_server) OR splunk_server="", host, splunk_server) \
| foreach host host_fqdn host_resolved serverName lower_splunk_server \
    [| eval <<FIELD>> = if(isnull(<<FIELD>>) OR <<FIELD>>="", splunk_server, <<FIELD>>), <<FIELD>> = lower(<<FIELD>>) ] \
| eval _time = now() \
| fillnull value="no" is_connected \
| fillnull value=0 num_searches \
| rename host as host_name, splunk_server as splunk_server_name

[ssef_convert_runtime(1)]
description = Converts time in seconds to human-readable format
args = runtime
definition = eval $runtime$=case(round($runtime$ / (3600*24) - 0.5) > 0, round($runtime$ / (3600*24)- 0.5)."d ".round(($runtime$ % (3600*24)) / 3600 - 0.5)."h ".round(($runtime$ % 3600) / 60 - 0.5)."min ".round($runtime$ % 60, 2)."s",round(($runtime$ % (3600*24)) / 3600 - 0.5) > 0,round(($runtime$ % (3600*24)) / 3600 - 0.5)."h ".round(($runtime$ % 3600) / 60 - 0.5)."min ".round($runtime$ % 60, 2)."s",round(($runtime$ % 3600) / 60 - 0.5) > 0, round(($runtime$ % 3600) / 60 - 0.5)."min ".round($runtime$ % 60, 2)."s", 1 = 1, round($runtime$ % 60, 2)."s")

[ssef_app_info(1)]
description = Get Splunk App Types
args = app
definition = eval app_type = case ( \
    match($app$, "_base$|_outputs$|_props$|_inputs$|_indexes$|_server$|TA-\w+_splunk|_limits$|_splunkcloud$|_deploymentclient$|_tuning$"), "Splunk Base Config Apps (Core)", \
    core=1 OR match($app$, "_cluster|SplunkForwarder|^search|splunk_metrics_workspace|SplunkLightForwarder|introspection_generator_addon|splunk_archiver|splunk_monitoring_console|launcher|splunk_gdi|user-prefs|alert_logevent|learned|splunk_httpinput|alert_webhook|legacy|splunk_instrumentation|appsbrowser|sample_app|splunk_internal_metrics|$app$work"), "Splunk Core Apps (Core)", \
    match($app$, "SplunkEnterpriseSecuritySuite|Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch"), "Splunk Enterprise Security Apps", \
    match($app$, "DA-ITSI|itsi|SA-IndexCreation|SA-ITOA|SA-ITSI|SA-UserAccess|vmware_ta_itsi"), "Splunk IT Service Intelligence Apps", \
    match($app$, "SA-Hydra|SA-VMWIndex|Splunk_TA_esxilogs|Splunk_TA_vcenter|Splunk_TA_vmware|TA-VMW-FieldExtractions|SA-Threshold|^SA-VM|splunk_for_vmware"), "Splunk App for VMware (Core)", \
    match($app$, "SA-ExchangeIndex|^TA-Exchange|TA-SMTP-Reputation|TA-Windows-Exchange-IIS|splunk_app_microsoft_exchange"), "Splunk App for Microsoft Exchange (Core)", \
    match($app$, "splunk_app_aws|Splunk_TA_aws"), "Splunk App for AWS (Core)", \
    match($app$, "splunk_app_for_nix|Splunk_TA_nix|SA-nix"), "Splunk App for Unix (Core)", \
    match($app$, "splunk_app_infrastructure|Splunk_TA_Infrastructure"), "Splunk App for Infrastructure (Core)", \
    match($app$, "splunk_app_windows_infrastructure|Splunk_TA_windows"), "Splunk App for Windows Infrastructure (Core)", \
    match($app$, "splunk_app_servicenow|Splunk_TA_snow"), "Splunk App for ServiceNow (Core)", \
    match($app$, "skynet-rest|cloud_administration"), "Splunk Cloud Monitoring (Core)", \
    match($app$, "Splunk_Essentials"), "Splunk Essentials Apps (Core)", \
    match($app$, "^Splunk_ML|^Splunk_SA_Scientific"), "Splunk Machine Learning Apps (Core)", \
    match($app$, "searchbase"), "SSEF (Core)", \
    match($app$, "Splunk_SA_CIM"), "Splunk Common Information Model (CIM) (Core)", \
    match($app$, "^Splunk_TA_"), "Splunk Technology Add-ons (Core)", \
    match($app$, "^Splunk_SA_"), "Splunk Solution Add-ons (Core)", \
    match($app$, "^splunk_|rwi_executive_dashboard|simple_xml_examples|^Splunk_Security|essential\d+-app|^splunk-dashboard"), "Splunk Apps (Core)", \
    match(details, "apps.splunk.com") AND match($app$, "_app$"), "Splunk Visualizations (Core)", \
    match($app$, "viz|semicircle_donut") AND match(details, "apps.splunk.com"), "Splunkbase Visualizations (Core)", \
    match($app$, "^TA_|^TA-") AND match(details, "apps.splunk.com"), "Splunkbase Technology Add-ons (Core)", \
    match($app$, "^SA_|^SA-") AND match(details, "apps.splunk.com"), "Splunkbase Solution Add-ons (Core)", \
    match(details, "apps.splunk.com"), "Splunkbase Apps & Add-ons (Core)", \
    match($app$, "^TA_|^TA-"), "Custom Technology Add-ons (Core)", \
    match($app$, "^SA_|^SA-"), "Custom Solution Add-ons (Core)", \
    true(), "Custom Apps & Add-ons (Core)")

