    $field$ >= 1000000000000000000, round(($field$ / 1000000000000000000), $round$)."Q", \
    $field$ >= 1000000000000000, round(($field$ / 1000000000000000), $round$)."q", \
    $field$ >= 1000000000000, round(($field$ / 1000000000000), $round$)."T", \
    $field$ >= 1000000000, round(($field$ / 1000000000), $round$)."B", \
    $field$ >= 1000000, round(($field$ / 1000000), $round$)."M", \
    $field$ >= 1000, round(($field$ / 1000), $round$)."K",\
    true(), $field$) \
| eval $field$_norm = case ( \
    $field$ >= 1000000000000000000, round(($field$ / 1000000000000000000), $round$)." Quintillion",\
    $field$ >= 1000000000000000, round(($field$ / 1000000000000000), $round$)." Quadrillion", \
    $field$ >= 1000000000000, round(($field$ / 1000000000000), $round$)." Trillion", \
    $field$ >= 1000000000, round(($field$ / 1000000000), $round$)." Billion",\
    $field$ >= 1000000, round(($field$ / 1000000), $round$)." Million",\
