[ssef_collection_info(1)]
args = group_checks
definition = join $group_checks$ type=left \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-ssef \
    | where isnotnull(groups) \
    | makemv delim="," groups \
    | eval collection_display_name=collection_name\
    | rex field=title "ssef_collection://(?<collection_name>.*)" \
    | rename platform as collection_platform groups as group_name \
    | stats values(collection_display_name) as collection_display_name by collection_name collection_platform group_name \
    | fields collection_name collection_display_name collection_platform group_name \
    | join group_name type=left \
        [| rest splunk_server=local /servicesNS/-/-/configs/conf-ssef \
        | where isnotnull(checks) \
        | eval group_display_name=group_name\
        | rename title as group_name \
        | stats values(group_display_name) as group_display_name values(checks) as $group_checks$ values(cron) as group_cron values(platform) as group_platform by group_name \
        | fields group_name group_display_name $group_checks$ group_platform group_cron ] \
    | makemv delim="," $group_checks$ \
    | stats values(collection_name) as collection_name values(group_name) as group_name values(collection_display_name) as collection_display_name values(group_display_name) as group_display_name values(collection_platform) as collection_platform values(group_cron) as group_cron values(group_platform) as group_platform by $group_checks$ \
    | foreach collection_name collection_display_name collection_platform group_name group_display_name group_platform group_cron \
        [| eval <<FIELD>> = mvjoin(<<FIELD>>, "|")] \
    | fields collection_name collection_display_name collection_platform group_name group_display_name group_platform group_cron $group_checks$ ]

[ssef_fields]
definition = tstats summariesonly=t count as num_events latest(_time) as source_time where earliest=-7d `ssef_summary_index` AND \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-ssef \
    | search title != "default_is4s_ssef_*" searches=* \
    | makemv delim="," searches \
    | rename searches as source \
    | stats count by source \
    | fields source ] by source \
| lookup ssef_fields ssef_source as source output fields_list \
| where isnotnull(fields_list) \
| join source \
    [| rest /servicesNS/-/-/configs/conf-searchbase splunk_server=local \
    | rename eai:acl.app as app \
    | search app IN (splunk_insights) \
    | stats count values(*) as * by title \
    | rename title as source \
    | fields source search_name description tags category sub_category search_type ssef_cron target_component dispatch_earliest_time dispatch_latest_time ] \
| makemv delim="," fields_list \
| makemv delim="," tags \
| stats values(*) as * dc(fields_list) as num_fields by source \
| table source fields_list num_fields tags sub_category search_type ssef_cron target_component description

[ssef_regularly_seen_users(1)]
args = user
definition = appendcols \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` date_wday IN (monday, tuesday, wednesday, thursday, friday) NOT user IN (`ssef_default_users`, splunk-system-user) search_type="*adhoc*" \
    | fields _time date_* user app label \
    | bin _time span=1h \
    | stats count by _time, label, app, user \
    | bin _time span=1d \
    | eval date=strftime(_time, "%Y-%m-%d") \
    | eventstats dc(date) as num_days \
    | stats dc(_time) as num_active_days max(num_days) as num_days by user \
    | eval perc_active = round((num_active_days / num_days) * 100, 2) \
    | rename user as $user$\
    | where perc_active >= `ssef_perc_active_threshold`\
    | fields $user$ num_days num_active_days perc_active ]

[ssef_perc_active_threshold]
definition = 10

[ssef_license_data]
definition = `ssef_splunk_deployment` \
| append \
    [ search `ssef_summary(ssef_internal_index_license_usage)` \
    | fields _time, label, name, Lic_Pool, Lic_Pool_Size, type, Index_Name, Lic_Sourcetype, Lic_Source, Lic_Host, License_Usage, Indexer_GUID \
    | bin _time span=1h \
    | stats max(License_Usage) AS License_Usage latest(Lic_Pool_Size) as Lic_Pool_Size BY _time label Lic_Pool Index_Name Lic_Sourcetype \
    | bin _time span=1d \
    | stats sum(License_Usage) as License_Usage values(Index_Name) as Index_Name latest(Lic_Pool_Size) as Lic_Pool_Size by _time Lic_Sourcetype \
    | eval License_Usage_GB = round(License_Usage/1024/1024/1024, 2) , stacksz_gb = round(Lic_Pool_Size/1024/1024/1024) \
    | rename Lic_Sourcetype as Sourcetype \
    | eval env="Enterprise" \
    | fields _time env Sourcetype Index_Name License_Usage License_Usage_GB stacksz_gb ] \
| append \
    [ search `ssef_cloud_summary` source=splunk-ingestion \
    | fields _time idx st ingestion_gb indexer_count ingest_license \
    | bin _time span=1h \
    | stats Latest(ingestion_gb) As License_Usage_GB Latest(ingest_license) as stacksz_gb By _time, idx, st \
    | bin _time span=1d \
    | stats sum(License_Usage_GB) As License_Usage_GB Latest(stacksz_gb) as stacksz_gb values(idx) as Index_Name By _time, st \
    | rename st as Sourcetype \
    | eval env="Cloud" , License_Usage=License_Usage_GB*1024 \
    | fields _time env Sourcetype Index_Name License_Usage License_Usage_GB stacksz_gb ] \
| filldown splunk_deployment \
| where env=splunk_deployment \
| eval perc_usage = (License_Usage_GB / stacksz_gb) * 100 \
| fields _time splunk_deployment Sourcetype Index_Name License_Usage_GB License_Usage stacksz_gb perc_usage

[ssef_license_search_data]
definition = `ssef_license_data` \
| append \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` \
| fields _time label name app user session num_searches latest_logon latest_search total_search_time search_type role index_reference sourcetype_reference datamodel_reference lookup_reference severity_level \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| foreach search_type session index_reference datamodel_reference lookup_reference sourcetype_reference\
    [| eval <<FIELD>>=split(lower(<<FIELD>>),"|") ] \
| where match(sourcetype_reference, "^[^<>?&#]+$") AND NOT match(sourcetype_reference, "\"|'|`|\*") AND sourcetype_reference!="" \
| rex field=sourcetype_reference mode=sed "s/\*{2,}/*/g" \
| stats values(search_type) as search_type dc(session) as num_sessions values(*_reference) as *_reference sum(num_searches) as num_searches sum(total_search_time) as total_search_time latest(latest_search) as latest_search earliest(latest_search) as earliest_search dc(sourcetype_reference) as num_sourcetype_references by _time, app, user \
| eval avg_searches_per_sourcetype_reference = if(num_sourcetype_references > 0, ceiling(num_searches / num_sourcetype_references), 0) \
| eval avg_total_search_time = if(num_sourcetype_references > 0, ceiling(total_search_time / num_sourcetype_references), 0) \
| bin _time span=1d \
| stats sum(num_sessions) as num_sessions values(search_type) as search_type avg(avg_searches_per_sourcetype_reference) as num_searches avg(avg_total_search_time) as total_search_time values(*_reference) as *_reference latest(latest_search) as latest_search earliest(latest_search) as earliest_search by _time, sourcetype_reference \
| foreach search_type index_reference datamodel_reference lookup_reference \
    [| eval <<FIELD>>=mvjoin(mvsort(mvdedup(<<FIELD>>)),"|") ] \
| rename sourcetype_reference as Sourcetype \
| fields _time Sourcetype num_searches num_sessions earliest_search latest_search total_search_time index_reference datamodel_reference lookup_reference search_type ] \
| bin _time span=1d \
| stats \
    Values(Index_Name) as Index_Name\
    Latest(stacksz_gb) as stacksz_gb\
    Max(License_Usage_GB) as License_Usage_GB\
    Max(License_Usage) as License_Usage\
    Latest(perc_usage) as perc_usage \
    Latest(num_searches) as num_searches\
    Latest(num_sessions) as num_sessions\
    Latest(earliest_search) as earliest_search\
    Latest(latest_search) as latest_search\
    Latest(total_search_time) as total_search_time\
    Latest(index_reference) as index_reference\
    Latest(datamodel_reference) as datamodel_reference\
    Latest(lookup_reference) as lookup_reference\
    Latest(search_type) as search_type\
    by _time Sourcetype \
| fillnull value=0 stacksz_gb License_Usage License_Usage_GB num_searches num_sessions total_search_time \
| fields _time Sourcetype Index_Name License_Usage License_Usage_GB stacksz_gb perc_usage num_searches num_sessions earliest_search latest_search total_search_time index_reference datamodel_reference lookup_reference search_type

[ssef_license_data_by_index]
definition = `ssef_splunk_deployment` \
| append \
    [ search `ssef_summary(ssef_internal_index_license_usage)` Lic_Pool!="auto_generated_pool_fixed-sourcetype*" \
    | fields _time, label, name, Lic_Pool, Lic_Pool_Size, type, Index_Name, Lic_Sourcetype, Lic_Source, Lic_Host, License_Usage, Indexer_GUID \
    | bin _time span=1h \
    | stats max(License_Usage) AS License_Usage latest(Lic_Pool_Size) as Lic_Pool_Size BY _time label Lic_Pool Index_Name Lic_Sourcetype \
    | bin _time span=1d \
    | stats sum(License_Usage) as License_Usage values(Lic_Sourcetype) as Lic_Sourcetype latest(Lic_Pool_Size) as Lic_Pool_Size by _time Index_Name \
    | eval License_Usage_GB = round(License_Usage/1024/1024/1024, 2) , stacksz_gb = round(Lic_Pool_Size/1024/1024/1024) \
    | rename Lic_Sourcetype as Sourcetype \
    | eval env="Enterprise" \
    | fields _time env Index_Name Sourcetype License_Usage License_Usage_GB stacksz_gb ] \
| append \
    [ search `ssef_cloud_summary` source=splunk-ingestion \
    | fields _time idx st ingestion_gb indexer_count ingest_license \
    | bin _time span=1h \
    | stats Latest(ingestion_gb) As License_Usage_GB Latest(ingest_license) as stacksz_gb By _time, idx, st \
    | bin _time span=1d \
    | stats sum(License_Usage_GB) As License_Usage_GB Latest(stacksz_gb) as stacksz_gb values(st) as st By _time, idx \
    | rename st as Sourcetype , idx as Index_Name \
    | eval env="Cloud" , License_Usage=License_Usage_GB*1024 \
    | fields _time env Index_Name Sourcetype License_Usage License_Usage_GB stacksz_gb ] \
| filldown splunk_deployment \
| where env=splunk_deployment \
| eval perc_usage = (License_Usage_GB / stacksz_gb) * 100 \
| append \
    [ search `ssef_summary(ssef_data_indexes)` isInternal=0 \
    | fields _time label name title frozenTimePeriodInSecs maxDataSize maxGlobalDataSizeMB maxTotalDataSizeMB currentDBSizeMB totalEventCount datatype total_bucket_count total_event_count \
    | bin _time span=1d \
    | stats latest() as * BY _time, label, name, title \
    | stats max(frozenTimePeriodInSecs) as frozenTimePeriodInSecs sum(currentDBSizeMB) as currentDBSizeMB by _time, title \
    | eval retentionDays = frozenTimePeriodInSecs / 86400 \
    | rename title as Index_Name \
    | fields _time Index_Name currentDBSizeMB retentionDays ] \
| filldown splunk_deployment \
| fields _time splunk_deployment Index_Name Sourcetype License_Usage_GB License_Usage stacksz_gb perc_usage currentDBSizeMB retentionDays \
| bin _time span=1d \
| stats latest(splunk_deployment) as splunk_deployment values(Sourcetype) as Sourcetype max(*) as * by _time Index_Name \
| fillnull value=0 License_Usage_GB License_Usage stacksz_gb perc_usage currentDBSizeMB \
| eval currentDBSizeGB=currentDBSizeMB/1024 \
| fields _time splunk_deployment Index_Name Sourcetype License_Usage_GB License_Usage stacksz_gb perc_usage currentDBSizeGB currentDBSizeMB retentionDays

[ssef_regularly_seen(1)]
