| `ssef_sourcetype_reference($search_string$)`

[ssef_field_reference(2)]
description = Extracts references provided in the first argument in any string provided in the second argument.
args = field,type
definition = rex field=$field$ max_match=10 "\"?$type$\"?\s*=\s*\"?(?<$type$_reference_1>[\wa-zA-Z-_*]+)" \
| rex field=$field$ max_match=10 "$type$\s+(?-i:IN)\s*\((?<$type$_reference_2>.*?)\)" \
| eval $type$_reference_2 = split($type$_reference_2, ",")\
| eval $type$_reference = mvdedup(trim(mvappend($type$_reference_1,$type$_reference_2)))\
| rex field=$type$_reference mode=sed "s/\"|\\\|,//g"\
| eval $type$_reference = mvjoin($type$_reference, ",")\
| eval $type$_reference = if(isnotnull($type$_reference) AND $type$_reference!="" AND $type$_reference!="N/A" AND ! match($type$_reference, "mvindex"), "$type$:" . $type$_reference, null()) \
| fields - $type$_reference_*

[ssef_report_reference(1)]
description = Extracts Any Reference to Report(s)
args = field
definition = rex field=data max_match=100 "<search ref=\"(?<report_reference1>.*)\"></search>" \
| rex field=search max_match=900 "loadjob\s+savedsearch[=]\s*\"?(?<report_reference2>.*?)\"" \
| rex field=search max_match=900 "from\s+savedsearch:\s*\"?(?<report_reference3>.*?)\"?" \
| eval report_reference=mvdedup(mvappend(report_reference1,report_reference2,report_reference3)) \
| eval report_reference=if(((report_reference == "") OR isnull(report_reference)),"no-report-reference",report_reference) \
| fillnull value="no-report-reference" report_reference \
| fields - report_reference1,report_reference2,report_reference3

[ssef_dashboard_reference(1)]
description = Extracts Any Reference to Dashboard(s)
args = field
definition = rex field=$field$ max_match=100 "href=\"(?<dashboard_reference>\w+)\">"\
| eval dashboard_reference=mvdedup(mvsort(dashboard_reference)), dashboard_reference=if(((dashboard_reference == "") OR isnull(dashboard_reference)),"no-dashboard-reference",mvdedup(mvsort(dashboard_reference)))\
| fillnull value="no-dashboard-reference" dashboard_reference

[ssef_tracker_fields_cleanup]
description = SSEF field cleanup
definition = fields _time, host, search_id, info, app, user, savedsearch_name, total_run_time, provenance, workload_pool, search_type, mode, fully_completed_search, file_acl, workload_pool, is_realtime, roles, scan_count, event_count, searched_buckets, decompressed_slices, total_slices, eliminated_buckets, acceleration_id \
| rex field=roles mode=sed "s/^'|'$//g" \
```| rex field=_raw "(?msi)(?:',\s+search=(?:'search\s+|'))(?<search_string>.*?)(?:',\s+is_federated_search=|'\]$)" ```\
| rex field=_raw ",\s+search='(?<search_string>\p{Any}+)" \
| eval search_string_orig = search_string \
| rex field=search_string ",\sis_federated_search=(?<is_federated_search>\d)" \
| rex field=search_string "federated_server_name=(?<federated_server_name>.*?),\sfederated_user=(?<federated_user>.*?),\sfederated_version=(?<federated_version>.*?)," \
| rex field=search_string mode=sed "s/',\s+is_federated_search=\d+.*\]$//g" \
| rex field=search_string mode=sed "s/[\n\r]+/ /g" \
| rex field=search_string mode=sed "s/\s{2,}/ /g" \
| eval search_string=trim(search_string) \
| rex field=federated_server_name mode=sed "s/\"//g" \
| rex field=federated_user mode=sed "s/\"//g" \
| rex field=federated_version mode=sed "s/\"//g" \
| eval roles = split(roles, "+") \
| eval total_run_time = if (is_realtime=1 AND savedsearch_name="itsi_event_grouping", 0, total_run_time) \
| eval search_id = if((isnull(search_id) OR (search_id == "")), null(), trim(search_id, "'")) \
| eval search_type = case ( match(search_id,"^md\_"), "metadata", match(search_id, "^subsearch_"), "subsearch", match(search_id, "^rt_") OR is_realtime=1, "realtime", match(search_id, "^alertsmanager_"), "alertsmanager", match(search_id, "^ta_\\d+") OR match(search_string, "^typeahead\s+"), "typeahead", (match(search_id, "^SummaryDirector") OR match(search_id, "^summarize_SummaryDirector") OR match(savedsearch_name, "^_ACCELERATE_")) AND ! match(_raw, "_DM_"), "report_acceleration", match(search_id, "^DM_|^SummaryDirector_") OR match(savedsearch_name, "^_ACCELERATE_DM_") OR match(search_string,"id=DM_|_DM_") AND ( match(search_string,"summarize\s+tstats=") AND provenance = "summary_director"), "datamodel_acceleration", match(search_id, "^scheduler_"), "scheduled", ( in(app,"splunk_archiver","splunk_instrumentation") OR match(search_string,"\|\s*savedsearch\s+|\|\s*copybuckets\s+|sourcetype=splunk_telemetry")) AND user="splunk-system-user", "scheduled", provenance = "N/A" AND user="splunk-system-user", "scheduled", ( match(provenance, "^UI:") OR ( match(search_string, "^search") AND provenance="N/A") OR match(search_id,"^\d{10}\.\d+")) AND user!="splunk-system-user", "adhoc", true(), "adhoc") \
| where search_type!="typeahead" \
| rex field=_raw "exec_time=(?<exec_time>\d+)" \
| rex field=_raw "search_startup_time=\"(?<search_startup_time>\d+)" \
| rex field=_raw "search_et=(?<search_et>N/A|\d+)" \
| rex field=_raw "search_lt=(?<search_lt>N/A|\d+)" \
| rex field=_raw "api_lt=(?<api_lt>N/A|\d+)" \
| rex field=search_string "^\|\s*savedsearch\s+(?<savedsearch_command>.*)" \
| eval savedsearch_name = if(isnull(savedsearch_command) AND isnotnull(savedsearch_command), savedsearch_command, savedsearch_name)\
| eval search_et = case( isnotnull(search_et) AND isnum(search_et), search_et, search_et="N/A" AND isnotnull(exec_time), exec_time + search_startup_time , true(), search_et) \
| eval search_lt = case( isnum(api_lt), api_lt, isnotnull(search_lt) AND isnum(search_lt), search_lt, search_lt="N/A", ceiling(exec_time + search_startup_time + total_run_time), true(), search_lt) \
| eval search_lt = if(match(savedsearch_name, "^_ScheduledView__") AND search_lt < search_et, _time, search_lt) \
| eval search_lt = if((search_lt < search_et) OR (search_et == search_lt), ceiling(exec_time + search_startup_time + total_run_time), search_lt) \
| rex field=acceleration_id "(?<acceleration_id_clean>^.*?)_" \
| rex field=search_string "id=DM_(?<data_model_clean1>.*?)\s" \
| rex field=search_string "DM_(?<data_model_clean2>.*?)," \
| eval data_model_clean = coalesce(data_model_clean1,data_model_clean2) \
| eval provenance = Case( search_type = "subsearch", "subsearch", search_type="datamodel_acceleration", "datamodel_acceleration", search_type="report_acceleration", "report_acceleration", search_type="scheduled", "scheduled", search_type="realtime", "realtime", True(), provenance) \
| eval savedsearch_name = Case( search_type="report_acceleration", acceleration_id, search_type="datamodel_acceleration" AND (IsNull(savedsearch_name) OR savedsearch_name=""), data_model_clean, search_type="adhoc" AND match(provenance, "^UI:"), provenance, IsNull(savedsearch_name) OR savedsearch_name = "", null(), true(), savedsearch_name) \
| rex field=savedsearch_name mode=sed "s/^_ACCELERATE_|_ACCELERATE_$//g" \
| rex field=savedsearch_name "(Splunk_SA_CIM_|^DM_)(?<dm_name>\w+)" \
| eval savedsearch_name =if(isnotnull(dm_name) AND app="Splunk_SA_CIM", dm_name, savedsearch_name) \
| rex field=savedsearch_name mode=sed "s/DM_Splunk_SA_CIM_|Splunk_SA_CIM_|^DM_//g" \
| fields - data_model_clean1, data_model_clean2, data_model_clean, api_lt, search_startup_time, acceleration_id, acceleration_id_clean, file_acl, exec_time, dm_name, savedsearch_command

[ssef_large_string_abbr(2)]
