[ssef_delta_predict(1)]
args = kpi
definition = predict "$kpi$" As Predicted algorithm=LLP5 future_timespan=1 lower00="Lower Confidence Int Curve" upper75="Upper Confidence Int Curve" \
| eval Predicted = round(Predicted, 0), "Lower Confidence Int Curve(Predicted)" = round('Lower Confidence Int Curve(Predicted)', 0), "Upper Confidence Int Curve(Predicted)" = round('Upper Confidence Int Curve(Predicted)', 0) \
| eval Predicted = if(Predicted < 0 , 0, Predicted) \
| eval "Upper Confidence Int Curve(Predicted)" = if('Upper Confidence Int Curve(Predicted)' < 0, 0, 'Upper Confidence Int Curve(Predicted)') \
| eval "Lower Confidence Int Curve(Predicted)" = if('Lower Confidence Int Curve(Predicted)' < 0, 0, 'Lower Confidence Int Curve(Predicted)') \
| delta "$kpi$" As Delta p=1

[ssef_quartify(1)]
args = arg1
definition = eval date_month_num=tonumber(strftime($arg1$, "%m")), date_year=strftime($arg1$, "%Y") \
| eval quarter = case (\
    date_month_num >= 1 AND date_month_num <= 3, "Q1",\
    date_month_num >= 4 AND date_month_num <= 6, "Q2",\
    date_month_num >= 7 AND date_month_num <= 9, "Q3",\
    date_month_num >= 10 AND date_month_num <= 12, "Q4",\
    true(), "Error: Invalid or Missing Date" ) \
| eval quarter_year = if(isnotnull(date_year), date_year . " " . quarter, quarter) \
| fields quarter_year date_year quarter date_month_num

