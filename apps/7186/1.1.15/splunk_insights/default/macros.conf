[ssef_identity_info(1)]
description = Retrieves information about Identities from the ssef_identities_lookup KV Store Table (Username Only)
args = identity
definition = lookup ssef_identities_lookup identity As $identity$ OUTPUTNEW

[ssef_identity_info(2)]
description = Retrieves information about Identities from the ssef_identities_lookup KV Store Table (Username and Search Head)
args = label,identity
definition = lookup ssef_identities_lookup label As $label$ identity As $identity$ OUTPUTNEW

[ssef_user_role_info(2)]
description = Retrieves Splunk Role Information for users
args = label, identity
definition = lookup ssef_identities_lookup label AS $label$ identity As $identity$ OUTPUTNEW

[ssef_provenance_fields(1)]
description = Extracts Introspection Provenance Fields for Audit Search Activity Dashboard
args = provenance
definition = rex field=$provenance$ "(?<Provenance_Type>.*?):(?<Provenance_KO_Type>.*?):(?<Provenance_KO>.*?)$"\
| eval provenance_tmp=if(isnull(Provenance_Type), provenance, null())\
| rex field=provenance_tmp "(?<Provenance_Type>.*?):(?<Provenance_KO_Type>.*?)$"\
| eval provenance_tmp=if(isnull(Provenance_Type), provenance, null())\
| rex field=provenance_tmp "(?<Provenance_Type>.*?)$"\
| eval Dashboard_Name = if(Provenance_KO_Type="Dashboard", Provenance_KO, null())\
| rex field=acceleration_id "_DM_(?<datamodel>.*)" \
| eval acceleration_id_report=if(type="report_acceleration", acceleration_id, null()) \
| eval datamodel_acceleration=if(provenance="summary_director", acceleration_id, null()) \
| rex field=acceleration_id_report "_(?<accelerated_report>\w+$)"\
| fields - acceleration_id_report datamodel_acceleration provenance_tmp

[ssef_instance_info(1)]
description = Retrieves information about Splunk Instances from the ssef_assets_lookup KV Store Table
args = instance
definition = eval $instance$ = lower($instance$) \
| lookup ssef_splunk_instance_info_lookup host_name AS $instance$ OUTPUT host_name AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup ssef_splunk_instance_info_lookup host_name AS $instance$ OUTPUTNEW host_name AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup ssef_splunk_instance_info_lookup host_fqdn AS $instance$ OUTPUTNEW host_name AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup ssef_splunk_instance_info_lookup serverName AS $instance$ OUTPUTNEW host_name AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup ssef_splunk_instance_info_lookup host_resolved AS $instance$ OUTPUTNEW host_name AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup ssef_splunk_instance_info_lookup splunk_server_name AS $instance$ OUTPUTNEW host_name AS host_name host_fqdn host_resolved serverName guid name label role \
| makemv delim="," role \
| eval label = if(isnull(label) OR label="", coalesce(host_name,splunk_server_name), label), name = if(isnull(name) OR name="", "adhoc", name)

[ssef_macro_definition(2)]
description = Retrieve Macro definition
args = label,title
definition = lookup ssef_data_macros_lookup label As $label$ title As $title$ OUTPUT definition As Macro_Definition \
| lookup ssef_data_macros_lookup title As $title$ OUTPUTNEW definition As Macro_Definition

