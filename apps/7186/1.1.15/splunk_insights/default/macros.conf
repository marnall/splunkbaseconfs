[ssef_tracker_search_type]
definition = rex field=_raw ",\s+search='(?<search_string>\p{Any}+)" \
| rex field=search_string mode=sed "s/[\n\r]+/ /g" \
| rex field=search_string mode=sed "s/\s{2,}/ /g" \
| eval search_string=trim(search_string) \
| eval search_id = if((isnull(search_id) OR (search_id == "")), null(), trim(search_id, "'")) \
| eval search_type = case ( match(search_id,"^md\_"), "metadata", match(search_id, "^subsearch_"), "subsearch", match(search_id, "^rt_") OR is_realtime=1, "realtime", match(search_id, "^alertsmanager_"), "alertsmanager", match(search_id, "^ta_\\d+") OR match(search_string, "^typeahead\s+"), "typeahead", (match(search_id, "^SummaryDirector") OR match(search_id, "^summarize_SummaryDirector") OR match(savedsearch_name, "^_ACCELERATE_")) AND ! match(_raw, "_DM_"), "report_acceleration", match(search_id, "^DM_|^SummaryDirector_") OR match(savedsearch_name, "^_ACCELERATE_DM_") OR match(search_string,"id=DM_|_DM_") AND ( match(search_string,"summarize\s+tstats=") AND provenance = "summary_director"), "datamodel_acceleration", match(search_id, "^scheduler_"), "scheduled", ( in(app,"splunk_archiver","splunk_instrumentation") OR match(search_string,"\|\s*savedsearch\s+|\|\s*copybuckets\s+|sourcetype=splunk_telemetry") ), "scheduled", provenance = "N/A" AND user="splunk-system-user", "scheduled", ( match(provenance, "^UI:") OR ( match(search_string, "^search") AND provenance="N/A" ) OR match(search_id,"^\d{10}\.\d+") ) AND user!="splunk-system-user", "adhoc", true(), "adhoc") \
| eval search_type = if((user="splunk-system-user" AND search_type="adhoc") OR (provenance="N/A" AND app="search" AND savedsearch_name="" AND isnull(acceleration_id) ), "api", search_type) \
| eval provenance = Case( search_type = "subsearch", "subsearch", search_type="datamodel_acceleration", "datamodel_acceleration", search_type="report_acceleration", "report_acceleration", search_type="scheduled", "scheduled", search_type="realtime", "realtime", True(), provenance) \
| eval search_provenance = case ( match(provenance,"(?i:ui:dashboard:)"), "dashboards", match(provenance,"(?i:ui:search)") OR search_type IN ("adhoc","api","metadata","alertsmanager"), "adhoc", match(provenance,"(?i:scheduler)"), "Scheduled", true(), provenance ) \
| where search_type!="typeahead"

[ssef_lookup_reference(1)]
description = Extracts Any Reference to Lookups
args = field
definition = rex field=$field$ max_match=999 "\|\s*(?<lookup_reference>(outputlookup|from\s+lookup\s*:?\s*|from\s+inputlookup\s*:?\s*|lookup\s+|inputlookup\s+)([A-Za-z0-9_.-]+))\b" \
| eval lookup_reference=mvdedup(lookup_reference)

[ssef_macro_reference(1)]
description = Extracts Any Reference to Macros
args = field
definition = rex field=$field$ max_match=10 "`(?<macro_reference>[a-zA-Z0-9-_]+)(`|\()"\
| eval macro_reference = mvdedup(macro_reference)\
| eval macro_reference= mvjoin(macro_reference, ",")\
| eval macro_reference= if(isnotnull(macro_reference) AND macro_reference!="", "macro:" . trim(macro_reference), null())\
| rex field=lookup_reference mode=sed "s/^from\s+(lookup:|inputlookup:)\s*|(inputlookup|lookup)\s+//g"

[ssef_datamodel_reference(1)]
description = Extracts Any Reference to Data Models
args = field
definition = rex field=$field$ max_match=10 "(?i:from)\s+(?i:datamodel)=\"?(?<datamodel_reference1>.*?)(\s|\"|$)"\
| rex field=$field$ max_match=10 "(?-i:from)\s+(?-i:datamodel)[\s:]+(?<datamodel_reference2>.*?)(\s|$)"\
| eval datamodel_reference = mvdedup(mvappend(datamodel_reference1,datamodel_reference2))\
| rex field=datamodel_reference mode=sed "s/\"|\\\|'|\s|,|\*//g" \
| eval datamodel_reference = if(isnull(datamodel_reference) OR datamodel_reference="", null(), datamodel_reference)\
| eval datamodel_reference = mvjoin(datamodel_reference, ",")\
| eval datamodel_reference = if(isnotnull(datamodel_reference) AND datamodel_reference !="", trim(datamodel_reference), null() ) \
| rex field=datamodel_reference mode=sed "s/\./_/g"\
| fields - datamodel_reference1 datamodel_reference2

[ssef_index_reference(1)]
description = Extracts Any Reference to Index(es)
args = field
definition = rex field=$field$ max_match=10 "\"?(?-i:index)\"?\s*=\s*\"?(?<index_reference_1>[\wa-zA-Z-_*]+)" \
```| eval index_reference_1 = mvfilter(! match(index_reference_1, "federated|^if$"))``` \
``` | eval index_reference_1 = mvfilter(! len(index_reference_1) < 2) ```\
```| eval index_reference_1 = mvfilter(! match($field$, "^\|\s*metadata\s+")) ```\
\
| rex field=$field$ max_match=10 "(?-i:index)\s+IN\s*\((?<index_reference_2>.*?)\)" \
| rex field=index_reference_2 mode=sed "s/\s+/,/g" \
| rex field=index_reference_2 mode=sed "s/,{1,}/,/g" \
| rex field=index_reference_2 mode=sed "s/\"//g" \
| eval index_reference_2 = split(index_reference_2, ",") \
\
\
| rex field=$field$ "^(\(|\||\s)+?`(?<index_reference_3>[a-zA-Z0-9-_]+)(`|\()"\
| rex field=$field$ max_match=10 "^\"?(?-i:eventtype)\"?\s*=\s*\"?(?<index_reference_4>[\wa-zA-Z-_*]+)" \
\
| rex field=$field$ "`(?<index_reference_5>[a-zA-Z0-9-_]+)(`|\()"\
| eval index_reference_5 = if(match(index_reference_5, "(?i:index)"), index_reference_5, null()) \
\
| rex field=$field$ max_match=10 "\"?(?-i:index)\"?\s*=\s*\"?(?<index_reference_6>(?-i:federated):[\wa-zA-Z-_*]+)"\
\
| eval index_reference = mvdedup(trim(mvappend(lower(index_reference_1),lower(index_reference_2),lower(index_reference_3),lower(index_reference_4),lower(index_reference_5),lower(index_reference_6)))) \
| rex field=index_reference mode=sed "s/\"|'|\\\//g" \
| eval index_reference = mvsort(mvdedup(trim(index_reference))) \
| rex field=index_reference mode=sed "s/[^[:ascii:]]//g" \
| rex field=index_reference mode=sed "s/[^\da-zA-Z-:_*]//g"\
| fields - index_reference_*

[ssef_sourcetype_reference(1)]
description = Extracts Any Reference to Source Type(s)
args = field
definition = rex field=$field$ mode=sed "s/\"//g" \
| rex field=$field$ mode=sed "s/sourcetype\s+=\s+/sourcetype=/g" \
| rex field=$field$ max_match=10 "\"?sourcetype\"?=\"?(?<sourcetype_reference_1>[\wa-zA-Z-_*:]+)" \
| rex field=$field$ max_match=10 "sourcetype\s+IN\s*\((?<sourcetype_reference_2>.*?)\)" \
| rex field=sourcetype_reference_2 mode=sed "s/\s+/,/g" \
| rex field=sourcetype_reference_2 mode=sed "s/,+/,/g" \
| eval sourcetype_reference_2=split(trim(sourcetype_reference_2, ","), ",") \
| rex max_match=0 "sourcetype_count__(?<sourcetype_reference_3>[.\w:-]+)=(?<sourcetype_count>\d+)" \
| eval sourcetype_reference = mvsort(mvdedup(mvappend(lower(sourcetype_reference_1),lower(sourcetype_reference_2),lower(sourcetype_reference_3)))) \
| rex field=sourcetype_reference mode=sed "s/[^[:ascii:]]|\(|\"|\)//g" \
| rex field=sourcetype_reference mode=sed "s/\*{2,}/*/g" \
| fields - sourcetype_reference_1,sourcetype_reference_2,sourcetype_reference_3,sourcetype_count

