| fillnull value=0 accel_data_model_count avg_count_per_day avg_daily_cluster_issues avg_daily_clustering_issues avg_daily_shc_issues avg_daily_skipped_searches_invocations avg_daily_tcp_input_errors avg_daily_tcp_output_errors avg_fwd_httpIssue completed_saved_searches_referencing_datamodels components_with_issues daily_average_distinct_searches_ran daily_average_ingestion daily_average_searches daily_average_searches_with_no_results daily_average_total_searches_ran daily_average_users_exceeding_disk_quota_limit daily_avg_searches_with_high_memory_usage dashboards_with_over_20_panels distinct_sourcetypes forwarder_count high_disk_usage_count high_load_instance_count high_resource_dashboards hosts_with_large_bundle_sizes indexers indexers_throttling_forwarders indexers_with_high_data_distribution indexes_for_acceleration instances_with_blocked_queues num_failed_alert_actions number_of_dashboards search_concurrency searches_over_10_minutes sourcetypes_impacted_with_quality_issues total_search_heads users_hitting_queue_limits \
| fields - source search_name \
| stats max(*) as * \
| transpose \
| lookup ssef_efs_scoring Output_Fields as column output \
| rename "row 1" as Current column as Output_Fields \
| sort ID \
| table ID Category Subcategory Quotient_Type Name Title Output_Fields Feasibility Impact Weighting Current Baseline \
| appendcols \
    [ search `ssef_summary_index` earliest=-37d@w6 latest=-7d@w6 source IN (summary_accelerated_data_models summary_alerts_failing_to_trigger summary_average_daily_scheduled_searches summary_average_daily_searches summary_average_daily_searches_distinct summary_average_ingest summary_blocked_queues_on_indexers summary_bucket_replication_issues summary_components_throwing_issues_in_the_logs summary_dashboards_with_high_memory_and_runtime summary_data_balance_across_splunk_servers summary_data_model_constrained_by_indexes summary_deployment_server_errors summary_distinct_data_sources summary_high_cpu_usage_across_splunk_ecosystem summary_hosts_with_large_bundles summary_incoming_networking_errors summary_index_clustering_issues summary_indexers_reaching_disk_capacity summary_indexers_throttling_forwarders summary_inefficient_dashboard_panels summary_issue_reading_events_that_originated_via_hec summary_long_running_searches summary_number_of_forwarders summary_number_of_indexers summary_number_of_search_heads summary_outgoing_networking_errors summary_search_head_cluster_warnings_and_errors summary_searches_returning_no_results_improperly summary_searches_that_used_tstats summary_searches_with_high_memory_use summary_skipped_searches summary_sourcetypes_with_onboarding_issues summary_total_number_of_dashboards summary_total_search_concurrency summary_user_hitting_limits_on_search summary_users_exceeding_the_disk_quota_or_concurrency_quota) \
    | fields _time source accel_data_model_count avg_count_per_day avg_daily_cluster_issues avg_daily_clustering_issues avg_daily_shc_issues avg_daily_skipped_searches_invocations avg_daily_tcp_input_errors avg_daily_tcp_output_errors avg_fwd_httpIssue completed_saved_searches_referencing_datamodels components_with_issues daily_average_distinct_searches_ran daily_average_ingestion daily_average_searches daily_average_searches_with_no_results daily_average_total_searches_ran daily_average_users_exceeding_disk_quota_limit daily_avg_searches_with_high_memory_usage dashboards_with_over_20_panels distinct_sourcetypes forwarder_count high_disk_usage_count high_load_instance_count high_resource_dashboards hosts_with_large_bundle_sizes indexers indexers_throttling_forwarders indexers_with_high_data_distribution indexes_for_acceleration instances_with_blocked_queues num_failed_alert_actions number_of_dashboards search_concurrency searches_over_10_minutes sourcetypes_impacted_with_quality_issues total_search_heads users_hitting_queue_limits \
    | fillnull value=0 accel_data_model_count avg_count_per_day avg_daily_cluster_issues avg_daily_clustering_issues avg_daily_shc_issues avg_daily_skipped_searches_invocations avg_daily_tcp_input_errors avg_daily_tcp_output_errors avg_fwd_httpIssue completed_saved_searches_referencing_datamodels components_with_issues daily_average_distinct_searches_ran daily_average_ingestion daily_average_searches daily_average_searches_with_no_results daily_average_total_searches_ran daily_average_users_exceeding_disk_quota_limit daily_avg_searches_with_high_memory_usage dashboards_with_over_20_panels distinct_sourcetypes forwarder_count high_disk_usage_count high_load_instance_count high_resource_dashboards hosts_with_large_bundle_sizes indexers indexers_throttling_forwarders indexers_with_high_data_distribution indexes_for_acceleration instances_with_blocked_queues num_failed_alert_actions number_of_dashboards search_concurrency searches_over_10_minutes sourcetypes_impacted_with_quality_issues total_search_heads users_hitting_queue_limits \
    | fields - source search_name \
    | stats max(*) as * \
    | transpose \
    | lookup ssef_efs_scoring Output_Fields as column output \
    | rename "row 1" as Baseline column as Output_Fields \
    | sort ID \
    | table ID Category Subcategory Quotient_Type Name Title Output_Fields Feasibility Impact Weighting Current Baseline] \
| table ID Category Subcategory Quotient_Type Name Title Output_Fields Feasibility Impact Weighting Baseline Current \
| eval CPQ_Base = ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, 1),4) \
| eval CPQ_Current = ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, (((Current - Baseline)/Baseline) + 1)),4) \
| eval CPQ_Perc = ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, (CPQ_Current - 1) * 100),4) \
| eval Weighted_Score_Base=ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, Weighting),2)\
| eval Weighted_Score_Current=if(ROUND(Weighting*CPQ_Current,2) <= 3*Weighting, ROUND(Weighting*CPQ_Current,2), 3*Weighting)\
| fields - Subcategory Title Output_Fields Feasibility Impact CPQ_Base CPQ_Current \
| sort ID \
| fields - CPQ_Perc Weighting ID \
| eval skipped_metrics_count=if(Weighted_Score_Current=0, 1, 0), assessed_metrics_count=if(Weighted_Score_Current=0, 0, 1), Category=if(match(Category, "^Search.*"), "Search", Category) \
| stats sum(Weighted_Score_Base) as Weighted_Score_Base sum(Weighted_Score_Current) as Weighted_Score_Current sum(skipped_metrics_count) as skipped_metrics_count sum(assessed_metrics_count) as assessed_metrics_count by Quotient_Type \
| eval Holistic_Quotient_Percentage=((Weighted_Score_Current-Weighted_Score_Base)/Weighted_Score_Base) * 100\
\
| fields - skipped_metrics_count assessed_metrics_count Holistic_Quotient_Percentage \
| eval Adoption_Base=if(Quotient_Type="Adoption", Weighted_Score_Base, null()) \
| eval Resource_Utilization_Base=if(Quotient_Type="Resource Utilization", Weighted_Score_Base, null()) \
| eval Adoption_Current=if(Quotient_Type="Adoption", Weighted_Score_Current, null()) \
| eval Resource_Utilization_Current=if(Quotient_Type="Resource Utilization", Weighted_Score_Current, null()) \
| stats \
    max(Adoption_Base) as Adoption_Base, \
    max(Resource_Utilization_Base) as Resource_Utilization_Base, \
    max(Adoption_Current) as Adoption_Current, \
    max(Resource_Utilization_Current) as Resource_Utilization_Current \
| eval Base_Ratio=round(Adoption_Base / Resource_Utilization_Base, 4) \
| eval Current_Ratio=round(Adoption_Current / Resource_Utilization_Current, 4)\
| eval Assessment_EfS_Score_Percentage = ((1 - (Base_Ratio-Current_Ratio)/Base_Ratio) - 1) * 100\
| fields Assessment_EfS_Score_Percentage | rename Assessment_EfS_Score_Percentage as "EfS Score Change"

