[uce_usecase_bookmark_init]
description = UCE Bookmarks Initialization Search
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = | makeresults count=1 \
| inputlookup usecase_bookmark_factory append=t \
| inputlookup usecase_bookmark append=t \
| stats last(bookmark) as bookmark last(completed) as completed by use_case \
| table "use_case","bookmark","completed" \
```| outputlookup uce_usecase_bookmark```

[uce_usecase_interactions_init]
description = UCE Interactions Initialization Search
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = | makeresults count=1 \
| eval interaction_time=now() \
| inputlookup usecase_interactions append=t \
| table "interaction_time","use_case","bookmark","completed","Data_Match_Discovered","distinct_UCE_Data_Category","distinct_Discovered_Sourcetypes","distinct_use_case_name" \
```| outputlookup usecase_interactions```

[debug tokens]
description = Show tokens for debugging
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = | makeresults\
| eval debug="$debug$"\
| eval drilldown_use_case="$drilldown_use_case$"\
| eval children_count="$children_count$"\
| eval clicked_on="$clicked_on$"\
| eval show_panel="$show_panel$"\
| eval capability_clicked_on="$capability_clicked_on$"\
| eval capability_drilldown_use_case="$capability_drilldown_use_case$"\
| eval capability_match_percent="$capability_match_percent$"\
| eval match_percent="$match_percent$"\
| eval parent_use_case_filter=$parent_use_case_filter$\
| fields - _time\
| transpose 0\
| rename column AS token "row 1" AS value\
| sort token

[ssef_uce_full_base]
action.webhook.enable_allowlist = 0
alert.track = 0
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = `ssef_cloud_summary` source=ssef_scma_indexing_data_source_inventory  \
| rename orig_sourcetype AS sourcetype \
| lookup uce_sourcetype_mapping sourcetype_name AS sourcetype OUTPUT data_type  \
| stats count BY sourcetype data_type \
| lookup uce_usecase_mapping data_type OUTPUT use_case \
| stats count BY sourcetype data_type use_case \
| lookup uce_usecase_mapping use_case OUTPUT use_case_type parent_use_case \
| eval use_case_type=mvdedup(use_case_type), \
       parent_use_case=mvdedup(parent_use_case) \
| eval data_match_discovered=1 \
| eval discovered_sourcetypes = sourcetype \
| append   \
    [| inputlookup uce_usecase_mapping \
     | fields data_type use_case use_case_type \
     | eval data_match_discovered=0] \
| eventstats max(data_match_discovered) AS max_data_match_discovered BY use_case data_type \
| where data_match_discovered>0 OR (data_match_discovered==0 AND max_data_match_discovered==0) \
| streamstats count(eval(data_match_discovered==1)) AS sourcetype_match_count BY use_case data_type \
| eventstats count(eval(sourcetype_match_count==1)) AS data_type_matches dc(data_type) AS uc_data_type_count BY use_case \
| fillnull data_type_matches uc_data_type_count \
| eval use_case_match_percent=min(100,max(0, round(100*data_type_matches/uc_data_type_count))) \
| eventstats max(sourcetype_match_count) AS sourcetype_match_count BY use_case data_type \
| eval sourcetype_match=if(data_match_discovered==1, sourcetype, null()) \
| eventstats values(sourcetype_match) AS sourcetype_matches BY use_case \
| eval sourcetype_matches=mvdedup(sourcetype_matches) \
| fillnull value="Not Defined" sourcetype \
| stats values(*) AS * BY sourcetype data_type use_case \
| lookup uce_usecase_mapping data_type use_case OUTPUT  \
    classification\
    sub_classification\
    category\
    sub_category \
    domain\
| fillnull value="Not defined" classification sub_classification category sub_category domain\
| sort - matched_percent_of_use_case  \
| eval combined=""  \
| foreach sourcetype data_type use_case classification sub_classification category sub_category domain\
    [ eval combined=trim(if(combined=="", "", combined . ",") . mvjoin(<<FIELD>>, ","), ",") ]  \
| replace 0 WITH "false" 1 WITH "true" IN data_match_discovered  \
| fields - count max_data_match_discovered data_type_matches sourcetype_count sourcetype_match uc_data_type_count

[ssef_datamatch_button_test]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = | gentimes start=0 end=1\
| eval button_test=if("$data_match$"=="$button_test$", 1, 0)\
| search button_test=0

