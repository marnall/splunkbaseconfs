
[is4s_custom_sourcetype_mapping]
description = Sourcetype Mapping Wizard dashboard search
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = | tstats summariesonly=t count as num_events where [ | `ssef_all_indexes` ] AND index!=_* NOT sourcetype IN (*-too_small, stash, error*) by sourcetype \
| rename sourcetype as sourcetype_name \
| `ssef_sourcetype_mapping(sourcetype_name)` \
| fillnull value="Unclassified" domain category data_type \
| stats values(*) as * max(num_events) as num_events by sourcetype_name domain category data_type \
| foreach domain category data_type \
    [| eval <<FIELD>>=split(<<FIELD>>,"|") ] \
| stats values(*) as * max(num_events) as num_events by sourcetype_name \
| foreach domain category data_type \
    [| eval <<FIELD>>=if(<<FIELD>>="Unclassified", null(), <<FIELD>>) ] \
| foreach domain category data_type docs description \
    [| eval <<FIELD>>=mvjoin(<<FIELD>>,"|") ] \
| rename sourcetype_name as Sourcetype, data_type as Data_Type, description as Description, product as Product, vendor as Vendor, domain as Domain, category as Category, docs as Docs \
| sort - num_events \
| table Sourcetype Domain Category Data_Type Vendor Product Description Docs num_events \
| rename num_events as "# of Events"

