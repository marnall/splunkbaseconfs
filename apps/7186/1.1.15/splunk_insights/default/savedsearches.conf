[IS4S Data Export v3]
description = IS4S KPI Export
dispatch.earliest_time = -2d
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-ssef \
| search title = "*export*" searches=* \
| makemv delim="," searches \
| rename searches as source , collection_name as collection_display_name, title as collection_name , description as collection_description , platform as collection_platform \
| rex field=collection_name mode=sed "s/^ssef_collection:\/\///g" \
| stats last(*) as * by collection_name source \
| fields source collection_name collection_display_name collection_description collection_platform \
| join source type=left \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-searchbase \
    | search search_type=summary \
    | rename title as source , description as job_description \
    | rex field=search_name mode=sed "s/\s+Export$//g" \
    | fields source search_name search_post job_description category sub_category tags ssef_cron target_component search] \
| rename search_name as kpi \
| fields kpi \
| append \
    [ search `ssef_summary(ssef_data_export)` \
    | fields _time export_time timechart_time kpi_name kpi_value severity_level category domain collection_name collection_display_name collection_platform is_scheduled \
    | eval export_time=coalesce(export_time, now()) \
    | eventstats latest(export_time) AS export_time by kpi_name \
    | eval diff= abs(export_time - _time) \
    ```| where diff < 1```\
    | eval status=case(severity_level = -2, "N/A", severity_level = -1, "None", severity_level = 0, "Info", severity_level = 1, "Normal", severity_level = 2, "Low", severity_level = 3, "Medium", severity_level = 4,"High", severity_level = 5, "Critical", true(), "Normal") \
    | where isnotnull(kpi_name) AND isnotnull(kpi_value) \
    | fillnull value="" export_time timechart_time kpi_name kpi_value severity_level category domain status \
    | eval customer_name = `ssef_customer_name` \
    | eval export_time=if(isnull(export_time) OR export_time="", _time, export_time) \
    | fields kpi_name kpi_value severity_level customer_name export_time timechart_time status category domain collection_name collection_display_name collection_platform is_scheduled \
    | foreach kpi_name kpi_value severity_level customer_name export_time timechart_time status category domain collection_name collection_display_name collection_platform is_scheduled \
        [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
    | tojson output_field=data fill_null=f \
    | stats dc(data) as check_result_count max(severity_level) AS severity_level values(data) AS data values(customer_name) AS customer_name sum(eval(if(severity_level=2 OR severity_level=3, mvcount(data), 0))) AS check_result_review by kpi_name \
    | rename kpi_name as kpi ] \
| append \
    [| rest splunk_server=local /servicesNS/-/-/apps/local f=title f=version f=build f=disabled \
    | where title IN("splunk_insights","searchbase") \
    | rename title as app \
    | eval severity_level=1 , kpi_name = "App Version Info" , customer_name = `ssef_customer_name` , kpi_value="app:" . app . " version:" . version . " build:" . build , status="Normal" \
    | eval export_time=now() \
    | fields app disabled version build severity_level kpi_name customer_name kpi_value status export_time \
    | foreach app disabled version build severity_level kpi_name customer_name kpi_value status export_time \
        [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
    | tojson output_field=data fill_null=f \
    | stats dc(data) as check_result_count max(severity_level) AS severity_level values(data) AS data values(customer_name) AS customer_name sum(eval(if(severity_level=2 OR severity_level=3, mvcount(data), 0))) AS check_result_review by kpi_name \
    | rename kpi_name as kpi ] \
| stats values(*) as * by kpi \
| fillnull value=0 check_result_count check_result_review \
| fillnull value=2 severity_level \
| eval customer_name = `ssef_customer_name` \
| eval export_time=if(isnull(export_time), now(), export_time) \
| eval no_data = "{\"export_time\": \"" . export_time . "\", " .\
    "\"kpi_name\": \"" . kpi . "\", " .\
    "\"kpi_value\": \"" . "no data" . "\", " .\
    "\"severity_level\": \"" . severity_level . "\", " .\
    "\"customer_name\": \"" . customer_name . "\", " .\
    "\"status\": \"" . "no data" . "\"}" \
| eval data = if(isnull(data), no_data, data) \
| table customer_name kpi check_result_count check_result_review severity_level data

[IS4S Data Export v3 Preview]
description = IS4S KPI Preview
dispatch.earliest_time = -2d
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-ssef \
| search title = "*export*" searches=* \
| makemv delim="," searches \
| rename searches as source , collection_name as collection_display_name, title as collection_name , description as collection_description , platform as collection_platform \
| rex field=collection_name mode=sed "s/^ssef_collection:\/\///g" \
| stats last(*) as * by collection_name source \
| fields source collection_name collection_display_name collection_description collection_platform \
| join source type=left \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-searchbase \
    | search search_type=summary \
    | rename title as source , description as job_description \
    | rex field=search_name mode=sed "s/\s+Export$//g" \
    | fields source search_name search_post job_description category sub_category tags ssef_cron target_component search] \
| rename search_name as kpi_name \
| fields kpi_name \
| join kpi_name type=left \
    [ search `ssef_summary(ssef_data_export)` \
    | eval customer_name = `ssef_customer_name` \
    | fields customer_name kpi_name kpi_value timechart_time \
    | stats values(*) as * by kpi_name \
    | eval kpi_value = mvindex(mvsort(kpi_value), 0, 4) , severity_level = if(isnotnull(kpi_value), 1, 2) \
    | eval timechart_time = mvindex(mvsort(mvdedup(timechart_time)), 0, 4) , kpi_value = mvjoin(kpi_value, ",") \
    | convert ctime(timechart_time) ] \
| fillnull value=2 severity_level \
| fillnull value="No Data Found!" customer_name kpi_value timechart_time \
| search kpi_name != "IS4S Search Collection Inventory" \
| sort - severity_level

[Scheduled Data Export]
description = Scheduled export of IS4S KPI data to a remote REST endpoint via the DataExport custom command.
search = | savedsearch "IS4S Data Export v3" \
| dataexport

