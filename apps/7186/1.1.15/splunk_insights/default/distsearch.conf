
[replicationBlacklist]
# Splunk < 9.0
sb_lookup_01 = ...splunk_insights/lookups/ssef_*_apps*
sb_lookup_02 = ...splunk_insights/lookups/ssef_scma_indexing_data_source_inventory*
# sb_lookup_03 = ...splunk_insights/lookups/uce_*
sb_lookup_04 = ...splunk_insights/lookups/ssef_supported_*
sb_default_lookups = ...splunk_insights/lookups/*.csv.default
sb_server_conf = ...splunk_insights/default/server.conf
sb_bin = ...splunk_insights/bin...
sb_lib = ...splunk_insights/lib...
sb_pycache = ...splunk_insights/.../__pycache__/*
sb_js = ...splunk_insights/appserver/...

[replicationDenylist]
# Splunk 9.0+
sb_lookup_01 = ...splunk_insights/lookups/ssef_*_apps*
sb_lookup_02 = ...splunk_insights/lookups/ssef_scma_indexing_data_source_inventory*
# sb_lookup_03 = ...splunk_insights/lookups/uce_*
sb_lookup_04 = ...splunk_insights/lookups/ssef_supported_*
sb_default_lookups = ...splunk_insights/lookups/*.csv.default
sb_server_conf = ...splunk_insights/default/server.conf
sb_bin = ...splunk_insights/bin...
sb_lib = ...splunk_insights/lib...
sb_pycache = ...splunk_insights/.../__pycache__/*
sb_js = ...splunk_insights/appserver/...
