#############               C y b e r C X       ###########################
#            Splunk_TA_CCX_Unified_Citrix - SH / HF                       #
#                                                                         #
# - Netscaler (Citrix Netscaler)                                          #
#                                                                         #
###########################################################################

[citrix_netscaler_ipfix_web]
search = sourcetype = citrix:netscaler:ipfix netscalerHttpContentType = *
#tags = web

[citrix_netscaler_syslog_network_traffic]
search = (sourcetype=citrix:netscaler:syslog OR sourcetype=citrix:netscaler:ipfix:syslog) (citrix_netscaler_event_name="*CONNSTAT" OR event_name="*CONNSTAT")
#tags = communicate network

[citrix_netscaler_syslog_authentication]
search = (sourcetype=citrix:netscaler:syslog OR sourcetype=citrix:netscaler:ipfix:syslog) (citrix_netscaler_event_name="LOGIN*" OR ((app!=SSLVPN AND event_name=LOGIN*) OR (event_name="CMD_EXECUTED" AND Command="login*")))
#tags = authentication

[citrix_netscaler_nitro_config_nsversion]
search = sourcetype=citrix:netscaler:nitro source="config:nsversion"

[citrix_netscaler_nitro_config_nshardware]
search = sourcetype=citrix:netscaler:nitro source="config:nshardware"

[citrix_netscaler_nitro_config_service]
search = sourcetype=citrix:netscaler:nitro source="config:service"

[citrix_netscaler_nitro_config_servicegroup]
search = sourcetype=citrix:netscaler:nitro source="config:servicegroup"

[citrix_netscaler_nitro_stat_ns]
search = sourcetype=citrix:netscaler:nitro source="stat:ns"

[citrix_netscaler_nitro_stat_lb]
search = sourcetype=citrix:netscaler:nitro source="stat:*" citrix_netscaler_avl_status=*

[citrix_netscaler_nitro_stat_protocolip]
search = sourcetype="citrix:netscaler:nitro" source="stat:protocolip"

[citrix_netscaler_nitro_stat_protocolhttp]
search = sourcetype="citrix:netscaler:nitro" source="stat:protocolhttp"

[citrix_netscaler_nitro_stat_ssl]
search = sourcetype="citrix:netscaler:nitro" source="stat:ssl"

[citrix_netscaler_nitro_stat_hanode]
search = sourcetype="citrix:netscaler:nitro" source="stat:hanode"

[citrix_netscaler_nitro_stat_service]
search = sourcetype=citrix:netscaler:nitro source="stat:service"

[citrix_netscaler_nitro_stat_servicegroup]
search = sourcetype=citrix:netscaler:nitro source="stat:servicegroup"

[citrix_netscaler_ipfix_lb]
search = sourcetype = citrix:netscaler:ipfix ipVersion=*

# ITSI LoadBalancer Module "loadbalancer_web"
[citrix_netscaler_ipfix_lb_web]
search = sourcetype=citrix:netscaler:ipfix (netscalerHttpReqUserAgent=* OR netscalerHttpRspStatus=*)

[citrix_netscaler_sylog_lb]
search = (sourcetype=citrix:netscaler:syslog OR sourcetype=citrix:netscaler:ipfix:syslog) (citrix_netscaler_event_name=DEVICE* OR citrix_netscaler_event_name=MONITOR*  OR citrix_netscaler_event_name=SESSION_* OR citrix_netscaler_event_name=APPLICATION_* OR citrix_netscaler_event_name=NETWORK_*)

[citrix_netscaler_syslog_web]
search = sourcetype="citrix:netscaler:syslog" url="*"
#tags = web

[citrix_netscaler_syslog_network_session_end]
search = sourcetype="citrix:netscaler:syslog" ((end_time="*") AND (event_name=ICAEND_CONNSTAT OR event_name="TCPCONNSTAT" OR event_name="UDPFLOWSTAT"))
#tags = end network session

[citrix_netscaler_syslog_network_session_start]
search = sourcetype="citrix:netscaler:syslog" ((start_time="*") AND (event_name=ICASTART OR event_name="TCPCONNSTAT" OR event_name="UDPFLOWSTAT"))
#tags = network session start

[citrix_netscaler_syslog_network_session_timedout]
search = sourcetype="citrix:netscaler:syslog" event_source="SSLVPN" event_name="TCPCONN_TIMEDOUT"
#tags = 

[citrix_netscaler_syslog_changes]
search = sourcetype="citrix:netscaler:syslog" event_source="EVENT" (event_name="STARTSYS" OR event_name="STOPSYS")
#tags = change endpoint network

[citrix_netscaler_syslog_executed_changes]
search = sourcetype="citrix:netscaler:syslog" event_name="CMD_EXECUTED" change_type="*"
#tags = change audit

[citrix_netscaler_syslog_alert]
search = sourcetype=citrix:netscaler:syslog  event_source=SECURE event_name=ACCESS_PROTECTION
#tags = alert

[citrix_netscaler_syslog_inventory]
search = sourcetype=citrix:netscaler:syslog (event_source=SECURE OR event_source=EVENT)
#tags = inventory network virtual

[citrix_netscaler_syslog_ids]
search = sourcetype=citrix:netscaler:syslog event_source="SECURE" NOT (threat_type="none" OR EventType="SecurityIncident")
#tags = attack ids

[citrix_netscaler_syslog_malware]
search = sourcetype=citrix:netscaler:syslog event_source="SECURE" EventType="SecurityIncident"
#tags = attack malware

[citrix_netscaler_syslog_delink_events]
search = sourcetype="citrix:netscaler:syslog" event_name="*_DELINK"

[citrix_netscaler_syslog_ssl_handshake]
search = sourcetype="citrix:netscaler:syslog" event_name IN("SSL_HANDSHAKE_SUBJECTNAME","SSL_HANDSHAKE_ISSUERNAME")

[citrix_netscaler_syslog_logout_events]
search = sourcetype="citrix:netscaler:syslog" event_name=LOGOUT

[citrix_netscaler_syslog_remove_session_events]
search = sourcetype="citrix:netscaler:syslog" event_name IN("REMOVE_SESSION_DEBUG") signature="*"
#tags = alert

[citrix_netscaler_syslog_client_security_check_alerts]
search = sourcetype="citrix:netscaler:syslog" event_name IN("CLISEC_EXP_EVAL","CLISEC_CHECK")
#tags = alert

[citrix_netscaler_syslog_network_comm_terminate]
search = sourcetype="citrix:netscaler:syslog" event_name IN("CONN_TERMINATE")
#tags = network communicate

[citrix_netscaler_syslog_ssl_handshake_success]
search = sourcetype="citrix:netscaler:syslog" event_name IN("SSL_HANDSHAKE_SUCCESS")

[citrix_netscaler_syslog_ssl_handshake_failure]
search = sourcetype="citrix:netscaler:syslog" event_name IN("SSL_HANDSHAKE_FAILURE")
#tags = alert

[citrix_netscaler_syslog_sslvpn_httprequest]
search = sourcetype="citrix:netscaler:syslog" event_name IN("HTTPREQUEST")
#tags = web

[citrix_netscaler_appfw]
search = sourcetype=citrix:netscaler:appfw event_name!=APPFW_POLICY_HIT AND event_name!=Message
#tags = ids attack

[citrix_netscaler_appfw_cef]
search = sourcetype=citrix:netscaler:appfw:cef
#tags = ids attack
