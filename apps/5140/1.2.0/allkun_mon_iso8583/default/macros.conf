[drop_dm_object_name(1)]
args = arg
definition = rename $arg$.* as *
iseval = 0

[set_amount]
definition = tonumber((substr(amount, 1, len(amount)-2)).".".substr(amount, -2))
iseval = 0

[set_transactionid]
definition = trace.date_local.time_local.amount
iseval = 0

[abbreviate(1)]
args = number
definition = case($number$>=1000000000,round($number$/1000000000,1)." MM", $number$>=1000000,round($number$/1000000,1)." M", $number$>=1000,round($number$/1000,1)." K", 1==1,$number$)
iseval = 0
