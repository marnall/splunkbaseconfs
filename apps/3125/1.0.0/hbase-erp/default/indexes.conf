[provider-family:hbase_family]
vix.mode = stream
vix.command =  java
vix.command.arg.1 = -Xmx512m
vix.command.arg.2 = -classpath
vix.command.arg.3 = $SPLUNK_HOME/bin/jars/SplunkMR-h1.jar:$SPLUNK_HOME/etc/apps/hbase-erp/bin/hbase-erp-1.0.0.jar:$SPLUNK_HOME/etc/apps/hbase-erp/bin/lib/*
vix.command.arg.4 = com.splunk.erp.hbase.HBaseERP

[provider:hbase]
vix.family = hbase_family
vix.splunk.search.debug = 0
vix.hbase.zookeeper.quorum = localhost
vix.zookeeper.znode.parent = /hbase-unsecure
vix.loglevel = WARN

[mytable]
vix.input.1.path = /tmp
vix.provider = hbase
vix.hbase.table = mytable
vix.hbase.family = cf
vix.hbase.column.col1 = bigdecimal
vix.hbase.column.col2 = string
vix.hbase.column.col3 = long
vix.hbase.datetime.column = col2
vix.hbase.datetime.format = %Y%m%d%H%M%S
vix.hbase.max.days.hence = 1000
