[Trustar_Match_Indicators_For_Type_MD5]
dispatch.earliest_time = -24h@m
dispatch.latest_time = -1m@s
cron_schedule = 4-59/15 * * * *
description = Match the indicators of type MD5 with the events and store the result count in trustar_indicators_match_result_lookup lookup
enableSched = 1
request.ui_dispatch_app = Trustar
request.ui_dispatch_view = search
search = `trustar_get_index_and_sourcetype` sourcetype!="trustar:*" [| inputlookup trustar_matching_indicators_cumulative_lookup where type="MD5" | rename value as search | eval value = replace(search, "\x5C\x5C","\\") | eval search=if(search!=value,search+"|"+value,search) | eval search=split(search,"|") | stats count by search | table search | format] | eval value= [| inputlookup trustar_matching_indicators_cumulative_lookup  where type="MD5" | rename value as search | eval value = replace(search, "\x5C\x5C","\\") | eval search=if(search!=value,search+"|"+value,search) | eval search=split(search,"|") | stats count by search | stats values(search) as query count | eval query=mvjoin(query,",") | eval query=if(isnull(query),"''",query) | table query ] | eval value=split(value,",") | stats latest(_time) as _time count by _raw value index | eval valueSearch=lower(value) | eval rawText=lower(_raw) | where like(rawText,"%"+valueSearch+"%") | eval replaceValue = replace(value, "\x5C","\\\\\\") | lookup trustar_matching_indicators_cumulative_lookup value OUTPUT type as Match, Enclaves as Enclaves, _time as _time | eval value=if(isnull(Match),replaceValue,value) | dedup value,rawText,_time,index,Enclaves | stats count(rawText) as result, values(_time) as _time by value index Enclaves | inputlookup trustar_indicators_match_result_lookup append=true | stats latest(_time) as _time, latest(result) as result, values(Enclaves) as Enclaves by value index | eval Enclaves = mvjoin(Enclaves,",") | eval indicator=value+"_"+index | table _time,value,result,indicator,index,Enclaves | outputlookup key_field=indicator trustar_indicators_match_result_lookup

