[get_enclaves]
description = Get all unique enclaves in last 2 days
dispatch.earliest_time = -2d@m
dispatch.latest_time = now
request.ui_dispatch_app = Trustar
request.ui_dispatch_view = search
search = `trustar_get_index` sourcetype="trustar:enclaves" | dedup id | table id, name, create | append [| makeresults | eval id="*", name="All", create="true" | table id, name, create]

[Trustar_All_Indicators_Cumulative]
run_on_startup = true
cron_schedule = 0,30 */1 * * *
description = Get all indicators list (cumulative)
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = Trustar
request.ui_dispatch_view = search
search = `trustar_get_index` sourcetype="trustar:indicators" | rename indicatorType as type, enclaves{}.id as Enclaves | fillnull value=0 weight | fillnull value="NA" Enclaves | eval Enclaves = mvjoin(Enclaves,",") | dedup value | eval value = replace(value, "\x5C","\\\\\\") | eval indicator=value | table _time type value indicator Enclaves weight | outputlookup append=true key_field=indicator trustar_all_indicators_cumulative_lookup

[TruStar_Mark_False_Positive]
request.ui_dispatch_app = Trustar
request.ui_dispatch_view = search
description = Add the indicator in false positive lookup
search = | makeresults count=1 | eval type="$type$" | eval value="$indicator_value$" | eval value = replace(value, "\x5C","\\\\\\") | eval _time=now() | eval indicator=value | table type, value, indicator, _time | outputlookup append=true key_field=indicator trustar_false_positive_indicators_cumulative_lookup

[Trustar_All_Matching_Indicators_Cumulative_For_Type_MD5]
cron_schedule = 0-59/15 * * * *
description = Get all matching indicators list for type MD5 (cumulative)
dispatch.earliest_time = -20m
dispatch.latest_time = -1m@s
enableSched = 1
request.ui_dispatch_app = Trustar
request.ui_dispatch_view = search
search = `trustar_get_index_and_sourcetype` sourcetype!="trustar:*" [| inputlookup trustar_all_indicators_cumulative_lookup where type="MD5" | table value | rename value as search | stats count by search | table search | format] | fields _raw, _time | match type="MD5" | inputlookup trustar_matching_indicators_cumulative_lookup append=true | stats count, latest(_time) as _time by type value | lookup trustar_all_indicators_cumulative_lookup value OUTPUT Enclaves as Enclaves | eval indicator=value | table _time type value indicator Enclaves | outputlookup key_field=indicator trustar_matching_indicators_cumulative_lookup

