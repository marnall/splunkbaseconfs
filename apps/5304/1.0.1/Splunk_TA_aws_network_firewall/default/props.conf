[aws:cloudwatchlogs:network_firewall]
FIELDALIAS-firewall_account_region = "availability_zone" AS vendor_region
FIELDALIAS-firewall_flow_id = "event.flow_id" AS flow_id
FIELDALIAS-firewall_dest_ip = "event.dest_ip" AS dest_ip
FIELDALIAS-firewall_src_ip = "event.src_ip" AS src_ip
FIELDALIAS-firewall_protocol = "event.proto" AS protocol
FIELDALIAS-firewall_dest_port = "event.dest_port" AS dest_port
FIELDALIAS-firewall_src_port = "event.src_port" AS src_port
FIELDALIAS-firewall_bytes = "event.netflow.bytes" AS bytes
FIELDALIAS-firewall_flow_bytes = "event.flow.bytes_toclient" AS bytes_out "event.flow.bytes_toserver" AS bytes_in
FIELDALIAS-firewall_pkts = "event.netflow.pkts" AS packets
FIELDALIAS-firewall_pkts_in_out = "event.flow.pkts_toclient" AS packets_out "event.flow.pkts_toserver" AS packets_in
FIELDALIAS-firewall_alert_action = "event.alert.action" AS action
FIELDALIAS-firewall_alert_severity = "event.alert.severity" AS severity
FIELDALIAS-firewall_alert_signature = "event.alert.signature" AS signature
FIELDALIAS-firewall_alert_signature_id = "event.alert.signature_id" AS signature_id
