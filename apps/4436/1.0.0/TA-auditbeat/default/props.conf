# props.conf

[auditbeat-fim]
  TRANSFORMS-routeauditbeat = st_fim
  
  EVAL-app = "auditbeat"
  FIELDALIAS-action = "event.action{}" AS action
  EVAL-change_type = "filesystem"
  EVAL-command = "auditbeat"
  FIELDALIAS-dest = host AS dest
  FIELDALIAS-dvc = host AS dvc
  FIELDALIAS-object = file.path AS object
  FIELDALIAS-file_mode = file.mode AS object_attrs
  FIELDALIAS-object_category = file.type AS object_category
  FIELDLIAS-object_path = file.path AS object_path
  FIELDALIAS-result = event.action{} as result
  FIELDALIAS-src = host as src
  EVAL-status = "success"
  EVAL-vendor = "Elastic Search"
  FIELDALIAS-product = "@metadata.beat" AS product
  EVAL-vendor_product = "Elasic Search Auditbeat"
  FIELDALIAS-filemtime = file.mtime AS file_access_time
  FIELDALIAS-fileact = file.mode AS file_acl
  FIELDALIAS-file_create_time = file.ctime AS file_create_time

  # If your hash isn't working look here
  FIELDALIAS-file_hash = hash.md5 as file_hash
  FIELDALIAS-file_modify_time = file.mtime AS file_modity_time
  FIELDALIAS-file_name = file.path AS file_name
  FIELDALIAS-file_path = file.path AS file_path
  FIELDALIAS-filesize = file.size AS file_size

  # IDS Model
  EVAL-category = "FIM"
  EVAL-ids_type = "host"