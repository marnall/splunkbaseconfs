[expose:TA_GigamonARForSplunk_settings]
pattern = TA_GigamonARForSplunk_settings
methods = POST, GET

[expose:TA_GigamonARForSplunk_settings_specified]
pattern = TA_GigamonARForSplunk_settings/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET

[expose:giga_persistent]
methods = GET, POST
pattern = giga_persistent

