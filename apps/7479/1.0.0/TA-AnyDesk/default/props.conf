[anydesk:svc:trace]
EVAL-vendor_product = AnyDesk
EXTRACT-log_level,app_name,thread_name,pid,thread_id,fiber_id,function_name,message = (?P<log_level>[^\s]+)\s(?:[\d-]+\s[\d:\.]+)\s+(?P<app_name>\w+)\s+(?P<thread_name>[a-z][^\s]+)?\s+(?P<pid>\d+)\s+(?P<thread_id>\d+)\s+(?P<fiber_id>\d+)?\s+(?P<function_name>[^\s]+)\s-\s+(?P<message>.+)
EXTRACT-profile_name = Profile\swas\sused\:\s(?P<profilename>.+)
EXTRACT-src_ip,src_port,relay_id = Logged\sin\sfrom\s(?P<src_ip>[^:]+):(?<src_port>\d+) on relay (?<relay_id>[^.]+)
EXTRACT-user_id = Client\-ID\:\s(?P<user_id>\d+)
EXTRACT-user_id,connection_method = Accept\srequest\sfrom\s(?P<user_id>\d+)\s\(via\s(?P<connection_method>[^\)]+)\)\.
SHOULD_LINEMERGE = 0
TZ = UTC
category = Application
description = Service trace logs produced by the AnyDesk application
pulldown_type = 1

FIELDALIAS-src_ip = src_ip as src_ip
FIELDALIAS-src_port = src_port as src_port
FIELDALIAS-user = user_id as user

[anydesk:trace]
EVAL-vendor_product = AnyDesk
EXTRACT-dest_ip,dest_port = External\saddress\:\s(?P<dest_ip>[^:]+)\:(?<dest_port>\d+)\.
EXTRACT-device_name,user_id = Incoming\ssession\srequest\:\s(?P<device_name>.+)\s\((?P<user_id>\d+)\)
EXTRACT-log_level,app_name,thread_name,pid,thread_id,fiber_id,function_name,message = (?P<log_level>[^\s]+)\s(?:[\d-]+\s[\d:\.]+)\s+(?P<app_name>\w+)\s+(?P<thread_name>[a-z][^\s]+)?\s+(?P<pid>\d+)\s+(?P<thread_id>\d+)\s+(?P<fiber_id>\d+)?\s+(?P<function_name>[^\s]+)\s-\s+(?P<message>.+)
EXTRACT-profile_name,has_pw = Selecting\sProfile\:\s(?P<profile_name>.+)\,\shasPw\:\s(?P<has_pw>.+)
EXTRACT-remote_os,connection_flags = Remote\sOS\:\s(?P<remote_os>[^\,]+)\,\sConnection\sflags\:\s(?P<connection_flags>.+)
EXTRACT-version = Remote\sversion\:\s(?P<version>.+)
SHOULD_LINEMERGE = 0
TZ = UTC
category = Application
description = Trace logs produced by the AnyDesk application
pulldown_type = 1

FIELDALIAS-dest_ip = dest_ip as dest_ip
FIELDALIAS-dest_port = dest_port as dest_port
FIELDALIAS-user = user_id as user