[RiskSense Hosts RS3 Alert]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 45-59/5 * * * *
description = This alert triggers when RS3 increases or decreases for a particular host.
dispatch.earliest_time = -2d
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = sourcetype="risksense:hosts" \
| dedup id \
| rename id as asset_id, rs3 as RS3 \
| table clientId, asset_id hostName, RS3 \
| join type=left asset_id \
    [| inputlookup risksense_hosts_severity_details \
    | rename RS3 as old_RS3] \
| join clientId \
    [| search sourcetype="risksense:clients" \
    | rename client_id as clientId \
    | table clientId, client_name ] \
| eval rs3_delta=RS3-old_RS3, _key=asset_id \
| table _key, client_name, asset_id, hostName, critical, high, medium, RS3, rs3_delta, old_RS3 \
| outputlookup append=T risksense_hosts_severity_details\
| where rs3_delta!=0 \
| rename client_name as "Client Name", hostName as Hostname, RS3 as "Latest RS3", asset_id as "Asset ID", old_RS3 as "Previous RS3" \
| table "Client Name", "Asset ID", Hostname, "Latest RS3", "Previous RS3"

