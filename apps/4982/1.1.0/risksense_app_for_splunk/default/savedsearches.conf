[RiskSense Hosts Critical Severity Alert]
alert.digest_mode = 0
alert.severity = 5
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0-14/5 * * * *
description = This alert triggers when number of critical vulnerabilities will increase for a particular host.
dispatch.earliest_time = -2d
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = sourcetype="risksense:hosts" \
| dedup id \
| rename id as asset_id, findingsDistribution.critical.value as severity \
| table clientId, asset_id hostName, severity \
| join type=left asset_id \
    [| inputlookup risksense_hosts_severity_details \
    | rename critical as old_severity] \
| join clientId \
    [| search sourcetype="risksense:clients" \
    | rename client_id as clientId \
    | table clientId, client_name ] \
| eval severity_delta=severity-old_severity, _key=asset_id \
| rename severity as critical\
| table _key, client_name, asset_id, hostName, critical, high, medium, RS3 severity_delta, old_severity\
| outputlookup append=T risksense_hosts_severity_details\
| where severity_delta>0 \
| rename client_name as "Client Name", hostName as Hostname, critical as "Critical Severity count", asset_id as "Asset ID", old_severity as "Previous Critical Severity count"\
| table "Client Name", "Asset ID", Hostname, "Critical Severity count", "Previous Critical Severity count"

