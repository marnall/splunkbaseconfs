[generate_bug_type_lookup]
action.email.useNSSubject = 1
alert.track = 0
description = Run this to get all latest bug type and write to lookup.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
search = index=jenkins `filter_events`  | `extract_metadata` | `extract_testcase_fields`  | `filter_tag` | table tag| where isnotnull(tag)|eval bug_id=mvfilter(match(tag, "^([A-Z]){1,7}-([0-9]+)$")) | stats count by bug_id| where isnotnull(bug_id)| jirabugstatus idfield=bug_id fields="issuetype"|fields bug_id, issue_type|eval _time=Time()| outputlookup bug_type.csv

[dedup_bug_type_lookup]
action.email.useNSSubject = 1
alert.track = 0
description = Run this to update the lookup if some info is updated, such as issue_type.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
search = |inputlookup bug_type.csv| stats last(_time) as _time, last(issue_type) as issue_type by bug_id| outputlookup bug_type.csv