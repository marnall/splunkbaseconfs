[WinEventLog:Security]
FIELDALIAS-body = name AS body

[WinEventLog:Application]
EVAL-action = if(EventCode=11707,"modified",if(EventCode=11724,"modified","unknown"))
EVAL-change_type = if(EventCode=11707 OR EventCode=11724,"modified","unknown")
FIELDALIAS-command = SourceName AS command
EVAL-object_category = if(EventCode=11707,"Software Installation",if(EventCode=11724,"Software Removal",NULL))
FIELDALIAS-Result = TaskCategory AS result
FIELDALIAS-host to src = host AS src
EVAL-status = if(match(TaskCategory,"successfully"),"success","failure")
REPORT-object_attrs = object_attrs

[sophos:firewall]
EVAL-vendor_product = vendor . " " . product

[sophos:tamperprotection]
EVAL-vendor_product = vendor . " " . product

[sophos:threats]
EVAL-vendor_product = vendor . " " . product

[sophos:webdata]
EVAL-vendor_product = vendor . " " . product

[sophos:AppControl]
EVAL-vendor_product = vendor . " " . product

[barracuda:vpn]
EVAL-action = if(barracuda_log_level="OK","success","failure")

[opsec:vpn]
FIELDALIAS-vpn_user = vpn_user AS user


# FOR NNDC ONLY

[JOBDETST]
TRANSFORMS-removeheader = removeheaderrow
REPORT-JobDET = REPORT-JobDET

[JOBTOTST]
TRANSFORMS-removeheader = removeheaderrow
REPORT-JobSizes = REPORT-JobSizes

[BKPRPST]
REPORT-vbrsize = REPORT-vbrsize
TRANSFORMS-removeheader = removeheaderrow

[JOBTSKST]
TRANSFORMS-removeheader = removeheaderrow
REPORT-JobTsk = REPORT-JobTsk

[BKPSVRST]
TRANSFORMS-removeheader = removeheaderrow
REPORT-BkpSvr = REPORT-BkpSvr

[BKPPXYST]
TRANSFORMS-removeheader = removeheaderrow
REPORT-BkpPxy = REPORT-BkpPxy


