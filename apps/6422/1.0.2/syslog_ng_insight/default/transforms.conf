[0_delete_syslog_prefix]
REGEX = ^<\d+>\w+\s+\d+\s+\d\d:\d\d:\d\d\s+[^:]+:\s+(.*)$
FORMAT = $1
DEST_KEY = _raw

# drop anyhting else: https://community.splunk.com/t5/Splunk-Search/All-events-except-one-to-Null/m-p/194429

[setnull]
REGEX = .
DEST_KEY = queue
FORMAT = nullQueue

[doTryResume]
REGEX=doTryResume .* iRet -?[^0]\d*$
DEST_KEY = queue
FORMAT = indexQueue

[syslog_ng_parse_stats]
# SourceName;SourceId;SourceInstance;State;Type;Number
# global;payload_reallocs;;a;processed;6
#REGEX = ^([^;]+);([^;]*);([^;]*);([^;]*);([^;]+);(\d+)
#REGEX = ([^;]+);([^;]*);([^;]*);([^;]*);([^;]*);(\d+)[\r\n]
#FORMAT = source_name::$1 source_id::$2 source_instance::$3 state::$4 type::$5 number::$6
#FORMAT = $1$2$3$4$5::$6
#REGEX = [^;]+;[^;]*;[^;]*;[^;]+;[^;]+;(\d+)
#REGEX=(\S+);(\d+)
#REGEX=((destination|source)\S+);(\d+)
#FORMAT = $1::$3
REGEX = (\w\S+;\d+)
FORMAT = stats::$1
MV_ADD = true
