[sonicwall]
pulldown_type = false
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 100
TRANSFORMS-sourcetype = set_sourcetype_traffic, set_sourcetype_dhcp, set_sourcetype_security, set_sourcetype_vpn, set_sourcetype_ntp



[sonicwall:traffic]
# field m=1233,1253,1254,1431,1430,537,97,98,427
ADD_EXTRA_TIME_FIELDS = True
ANNOTATE_PUNCT = True
AUTO_KV_JSON = true
BREAK_ONLY_BEFORE =
BREAK_ONLY_BEFORE_DATE = True
CHARSET = UTF-8
DATETIME_CONFIG = /etc/datetime.xml
DEPTH_LIMIT = 1000
EXTRACT-msgsum = ^(?:[^"\n]*"){3}(?P<msgsum>\w+\s+\w+\s+\w+\s+\w+\s+\w+\s+\w+)
HEADER_MODE =
LEARN_MODEL = true
LEARN_SOURCETYPE = true
LINE_BREAKER_LOOKBEHIND = 100
MATCH_LIMIT = 100000
MAX_DAYS_AGO = 2000
MAX_DAYS_HENCE = 2
MAX_DIFF_SECS_AGO = 3600
MAX_DIFF_SECS_HENCE = 604800
MAX_EVENTS = 256
MAX_TIMESTAMP_LOOKAHEAD = 32
MUST_BREAK_AFTER =
MUST_NOT_BREAK_AFTER =
MUST_NOT_BREAK_BEFORE =
SEGMENTATION = indexing
SEGMENTATION-all = full
SEGMENTATION-inner = inner
SEGMENTATION-outer = outer
SEGMENTATION-raw = none
SEGMENTATION-standard = standard
SHOULD_LINEMERGE = False
TIME_FORMAT = %b %d %H:%M:%S
TRUNCATE = 100000
category = Network
description = Sonicwall syslog event logging
detect_trailing_nulls = false
maxDist = 3
priority =
pulldown_type = true
#CIM Mapping
EXTRACT-src_ip,dst_ip = src=(?P<src_ip>[^:]+)[^=\n]*dst=(?P<dst_ip>[^:]+)
EXTRACT-src_port,dest_port = src=[^:]+:(?P<src_port>[^:]+)[^=\n]*dst=[^:]+:(?P<dest_port>[^:]+)
EXTRACT-src_interface,dest_interface = src=[^:]+:[^:]+:(?P<src_interface>[\w]+)\s*dst=[^:]+:[^:]+:(?P<dest_interface>[\w]+)\s
EXTRACT-src_zone,dest_zone = \((?P<src_zone>[\w]+)\-\>(?P<dest_zone>[\w]+)\)
FIELDALIAS-bytes_in = rcvd as bytes_in
FIELDALIAS-bytes_out = sent as bytes_out
EVAL-bytes = rcvd + sent
EVAL-action = case(fw_action == "drop", "blocked", fw_action != "drop", "allowed")
EVAL-app = proto
FIELDALIAS-dest = dst_ip AS dest
FIELDALIAS-dest_ip = dst_ip AS dest_ip
FIELDALIAS-dest_mac = dstMac AS dest_mac
EVAL-direction = case(dest_zone == "WAN", "outbound", dest_zone != "WAN", "inbound")
FIELDALIAS-src = src_ip AS src
FIELDALIAS-src_mac = srcMac AS src_mac



