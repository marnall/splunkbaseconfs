# for collectd data sent via UDP
[em_metrics_udp]
TRANSFORMS-hostoverride = udp-metrics-hostoverride
TRANSFORMS-run-dims-extraction = extract_dims
SHOULD_LINEMERGE = false
LINE_BREAKER = (\}\})

# For k8s metatdata
[kube:objects:pods]
INDEXED_EXTRACTIONS = JSON
KV_MODE = none

[kube:objects:nodes]
INDEXED_EXTRACTIONS = JSON
KV_MODE = none
