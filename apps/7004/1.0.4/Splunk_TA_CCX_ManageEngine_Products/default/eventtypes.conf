[ccx_adaudit_adaptechnicianaudit_report]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") Category="ADAPTechnicianAudit" ACTION_CATEGORY="Reports"

[ccx_adaudit_win_changes]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") change_type="*"

[ccx_adaudit_win_authentication]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") log_subtype="Logon"

[ccx_adaudit_adaptechnicianaudit_authentication]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") Category="ADAPTechnicianAudit" ACTION_CATEGORY="Logon"

[ccx_adaudit_adaptechnicianaudit_event_alerts]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") Category="ADAPTechnicianAudit" ACTION_CATEGORY="Admin"

[ccx_adaudit_win_event_alerts]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") EventCode="2887"

[ccx_adaudit_win_event_match]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") NOT eventtype IN("ccx_adaudit_adaptechnicianaudit_report","ccx_adaudit_adaptechnicianaudit_event_alerts","ccx_adaudit_adaptechnicianaudit_authentication")

[ccx_adaudit_win_event_signatures]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") EventCode="*"

[ccx_adaudit_win_changes_filesystem]
search = (sourcetype="adaudit:syslog" OR sourcetype="ccx:adaudit:syslog") EventCode IN("4656","4658","4660","4663","4664","4985","5051","4670","4703","4700","1108","7045","4688")
