[sophos_central_git_actions]
filename = sophos_central_git_actions.csv

[sophos_central_git_severity]
filename = sophos_central_git_severity.csv

[set_sophos_event_cef]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:central:events
SOURCE_KEY = _raw
REGEX = datastream=event

[set_sophos_alert_cef]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:central:alerts
SOURCE_KEY = _raw
REGEX = datastream=alert


[set_sophos_event_keyvalue]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:central:events
SOURCE_KEY = _raw
REGEX = datastream="event"

[set_sophos_alert_keyvalue]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:central:alerts
SOURCE_KEY = _raw
REGEX = datastream="alert"

[set_sophos_event_json]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:central:events
SOURCE_KEY = _raw
REGEX = datastream":\s+"event"

[set_sophos_alert_json]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:central:alerts
SOURCE_KEY = _raw
REGEX = datastream":\s+"alert"
