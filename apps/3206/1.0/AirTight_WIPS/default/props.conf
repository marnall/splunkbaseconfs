[syslog]
EXTRACT-AirTight_Severity = .*AirTight\s+Management\s+Console.*Impact\s+severity\=\"(?<Airtight_Severity>|[^\"]+)\".*
LOOKUP-AirTight_Host_Details = AirTight_Hosts host AS host OUTPUTNEW HC_Dev_Host AS HC_Dev_Host HC_Dev_Owner AS HC_Dev_Owner HC_Dev_Type AS HC_Dev_Type
EXTRACT-AirTight_WIPS_Vendor = .*AirTight\s+Management\s+Console.*vendor\s+\[(?<Airtight_WIPS_Vendor>|[^\]]+)\].*
EXTRACT-AirT-ght_Audit = .*AirTight\s+Management\s+Console[^:]+\:\s+(?<Type>[^:]+)\s+\:.*\:\s+Devices[^:]+\:\s+[^:]+\:\s+[^:]+\:\s+(?<Source_User>[^:]+)\s+\:\s+(?<User_Group>[^:]+)\s+\:\s+(?<Source_IP>[^:]+)\s+\:\s+(?<After_Change_Detail>.*)
EXTRACT-AirTight_Audit_2 = .*AirTight\s+Management\s+Console\sv7.1U4HF2.05\s\:(?<Action>[^:]+):\s(?<WIPS_IP>[^:]+):\s(?<Location>[^:]+):\s(?<Date_Time>[^\s]+)\s:(?<Severity>[^:]+)\s:(?<Unknown1>[^:]+)\s:(?<Type>[^:]+)\s:(?<Unknown2>[^:]+)\s:(?<Sequence_Number>[^:]+)\s:(?<User_ID>[^:]+)\s:(?<User_Role>[^:]+)\s:(?<ScriptServerIP>[^:]+)\s:(?<Message>[^*]+).*
EXTRACT-AirTight_Audit_3 = .*AirTight\s+Management\s+Console[^:]+\:\s+(?<Type>[^:]+)\s+\:.*\:\s+Access[^:]+\:\s+[^:]+\:\s+[^:]+\:\s+(?<Source_User>[^:]+)\s+\:\s+(?<User_Group>[^:]+)\s+\:\s+(?<Source_IP>[^:]+)\s+\:\s+.*
EXTRACT-AirTight_Client_MAC = .*AirTight\s+Management\s+Console.*The\s+Client\'s\s+details\s+are\:\s+MAC\s+address\s+\[(?<Airtight_WIPS_Client_Mac>|[^\]]+)\].*
EXTRACT-AirTight_Event_Desc = .*AirTight\s+Management\s+Console.*text\=\"(?<Airtight_Event_Description>|[^\"]+)\".*
EXTRACT-AirTight_Event_Name = .*AirTight\s+Management\s+Console.*\meaning\=\"EventShortName\"\>(?<Airtight_Event_Name>|[^\<]+)\<.*
EXTRACT-AirTight_WIPS_Channel = .*AirTight\s+Management\s+Console.*channel\s+\[(?<Airtight_WIPS_Channel>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_SSID = .*AirTight\s+Management\s+Console.*SSID\s+\[(?<Airtight_WIPS_SSID>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_Protocol = .*AirTight\s+Management\s+Console.*protocol\s+\[(?<Airtight_WIPS_Protocol>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_Security_Setting = .*AirTight\s+Management\s+Console.*security\s+setting\s+\[(?<Airtight_WIPS_Security_Setting>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_User = .*AirTight\s+Management\s+Console.*user\s+name\s+\[(?<Airtight_WIPS_User>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_Sensor = .*AirTight\s+Management\s+Console.*Sensor\s+\[(?<Airtight_WIPS_Sensor>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_Client = .*AirTight\s+Management\s+Console.*Client\s+\[(?<Airtight_WIPS_Client>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_2 = .*AirTight\s+Management\s+Console.*The\s+AP\'s\s+details\s+are\:\s+MAC\s+address\s+\[(?<Airtight_WIPS_AP_Mac>|[^\]]+)\].*
EXTRACT-AirTight_WIPS_1 = .*AirTight\s+Management\s+Console.*AP\s+\[(?<Airtight_WIPS_AP>|[^\]]+)\].*
EXTRACT-AirTight_Location = .*AirTight\s+Management\s+Console.*\<location\>.*\:\/\/(?<Airtight_Location>|[^\<]+)\<.*
