#This Conf File Contains Check Point Custom Source Type

[cp_log]
EVAL-app = coalesce(service_id,host_type,app)
EVAL-src_user = coalesce(user,src_user_name,from,src_user)
EVAL-internal_message_id = coalesce(email_message_id,email_session_id,email_queue_id,internal_message_id)
EVAL-message_info = coalesce(email_headers,spam_category,message_info)
EVAL-protocol = coalesce(service,protocol,proto)
EVAL-url = coalesce(resource,destination_dns_hostname,url,threat_wiki)
EVAL-signature = coalesce(attack_info,malware_family,malware_action,dlp_data_type_name,signature)
EVAL-src = coalesce(src_phone_number,email_address,ssid,src)
EVAL-category = coalesce(protection_name,app_category,attack,dlp_categories,category)
EVAL-file_hash = coalesce(file_md5,file_sha256,file_hash)
EVAL-user = coalesce(to,src_user_name,phone_number,user)
EVAL-dest = if(product IN ("Forensics","Zero Phishing","Anti-Ransomware","Anti-Exploit"),src_machine_name,coalesce(dst,phone_number,dest))
EVAL-dest_zone = if(isnull(outzone),dest_zone,outzone)
EVAL-direction = if(isnull(conn_direction),direction,conn_direction)
EVAL-session_id = if(isnull(hll_key),session_id,hll_key)
EVAL-src_ip = if(isnull(src),src_ip,src)
EVAL-src_port = if(isnull(s_port),src_port,s_port)
EVAL-src_translated_ip = if(isnull(xlatesrc),src_translated_ip,xlatesrc)
EVAL-src_translated_port = if(isnull(xlatesport),src_translated_port,xlatesport)
EVAL-src_zone = if(isnull(inzone),src_zone,inzone)
EVAL-bytes_in = if(isnull(client_inbound_bytes),bytes_in,client_inbound_bytes)
EVAL-transport = if(isnull(proto),transport,proto)
EVAL-packets_in = if(isnull(client_inbound_packets),packets_in,client_inbound_packets)
EVAL-packets_out = if(isnull(client_outbound_packets),packets_out,client_outbound_packets)
EVAL-action = if(isnull(email_status),action,email_status)
EVAL-delay = if(isnull(email_delay),delay,email_delay)
EVAL-orig_recipient = if(isnull(to),orig_recipient,to)
EVAL-recipient = if(isnull(to),recipient,to)
EVAL-bytes_out = if(isnull(client_outbound_bytes),bytes_out,client_outbound_bytes)
EVAL-return_addr = if(isnull(from),return_addr,from)
EVAL-size = if(isnull(message_size),size,message_size)
EVAL-vendor_product = if(isnull(product),vendor_product,product)
EVAL-orig_src = if(isnull(orig),orig_src,orig)
EVAL-recipient_count = if(isnull(recipients_number),recipient_count,recipients_number)
EVAL-filter_action = if(isnull(email_status),filter_action,email_status)
EVAL-body = if(isnull(status),body,status)
EVAL-id = if(isnull(log_id),id,log_id)
EVAL-type = if(isnull(alert),type,alert)
EVAL-date = if(isnull(time),date,time)
EVAL-dest_interface = if(isnull(client_outbound_interface),dest_interface,client_outbound_interface)
EVAL-object = if(isnull(dlp_file_name),object,dlp_file_name)
EVAL-file_path = if(isnull(resource),file_path,resource)
EVAL-sender = if(isnull(from),sender,from)
EVAL-dest_ip = if(isnull(dst),dest_ip,dst)
EVAL-file_name = if(isnull(app_package),file_name,app_package)
EVAL-http_method = if(isnull(method),http_method,method)
EVAL-http_referrer = if(isnull(referrer),http_referrer,referrer)
EVAL-http_user_agent = if(isnull(user_agent),http_user_agent,user_agent)
EVAL-dvc = if(isnull(origin),dvc,origin)
EVAL-dest_port = if(isnull(service),dest_port,service)
EVAL-ids_type = if(isnull(protection_type),ids_type,protection_type)
EVAL-dest_translated_ip = if(isnull(xlatedst),dest_translated_ip,xlatedst)
EVAL-dest_translated_port = if(isnull(xlatedport),dest_translated_port,xlatedport)
EVAL-subject = if(isnull(email_subject),subject,email_subject)
REPORT-cp_log_format = cp_log_format
KV_MODE = multi
SHOULD_LINEMERGE = 0
TIME_FORMAT = %s
TIME_PREFIX = time=
category = Network & Security
pulldown_type = 1
