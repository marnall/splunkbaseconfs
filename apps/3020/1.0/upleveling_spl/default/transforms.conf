[Extract_Keys_From_ISAs]
REGEX = GS\*[^\*]*\*([^\*]*)\*([^\*]*)\*(\d\d\d\d)(\d\d)(\d\d)\*(\d\d)(\d\d)\d*\*([^\*]*)
FORMAT = KeyOne::$1 KeyTwo::$2 KeyThree::$8 Year::$3 Mon::$4 Day::$5 Hour::$6 Min::$7

[dtl_analysis_start_time]
REGEX = (\d\d\/\d\d\/\d\d\s*\d\d:\d\d:\d\d)Analysis requested on file
FORMAT = ForescoutAnalysisStart::$1

[dtl_analysis_stop_time]
REGEX = (\d\d\/\d\d\/\d\d\s*\d\d:\d\d:\d\d)Analysis of file
FORMAT = ForescoutAnalysisEnd::$1



# CFF_592715634_076011108LNWP_387100496_141027192409036000.cff
[cff_filename]
SOURCE_KEY = source
REGEX = CFF_([^_]*?)_([^_]*)_0+([^_]*?)_(\d{16})\d\d.cff
FORMAT = KeyOne::$1 KeyTwo::$2 KeyThree::$3 FilenameTime::$4 status::cff


#CLMMD        XX66143501  
[cff_claimid]
REGEX = ^CLM.{10}(\S*)
FORMAT = ClaimID::$1
MV_ADD = TRUE

[edi_filename]
SOURCE_KEY = source
REGEX = [^/\\]([^\\/\.]*?)(?:_File\d*){0,1}\.(bad|txt|good|edi|dtl)$
FORMAT = srcfile::$1 status::$2

[edi_patient_info]
REGEX = NM1\*IL*\*1\*(?<PatFirstName>[A-Z]*)\*(?<PatLastName>[A-Z]*)\*.*?\*

[edi_record_info]
REGEX = ST\*(?<RecordCode>\d*)\*(?<FileRecordID>\d*)\*(?<UnknownFileID>[\dA-Z]*?)

[edi_patient_name]
REGEX = NM1\*(?:IL|03|QA|QC)\*[^\*]*\*(?<patient_lastname>[A-Za-z]+?)\*(?<patient_firstname>[A-Za-z]+?)(?:\*|~).*
MV_ADD = TRUE

[edi_claim_payment]
REGEX = HDR\~\d*\~.*?\~(?<patient_control_num>\d*)\~\d*\~(?<claim_charge_amount>[\d\.]*)\~(?<claim_payment_amount>[\d\.]*)
MV_ADD = TRUE

[edi_check_amount]
REGEX = TRN\*\d*\*(?<check_number>\d*)\*
MV_ADD = TRUE

[edi_claim_info]
REGEX = CLM\*(?<ClaimID>[^\*]*)
MV_ADD = TRUE

[forescout_claim]
REGEX = ClaimNumber: (?<ClaimID>[\dA-Z]*)
MV_ADD = TRUE

[forescout_total]
REGEX = TotalAmt: \$(?<TotalAmt>[\d\.]*)

[forescout_error]
REGEX = [^\n](?<ErrNum>\d*)\s{2,}.*(?<ErrSegment>[\w\d]{2,})\s{2,}(?<ErrPosition>[\w\d]{1,})\s{2,}(?<ErrorData>[\w\d]{2,})\s*[$\n]

[forescout_code]
REGEX = (ZZT[A-Z\d]{2}).{10}(\S*)
FORMAT = $1::$2
MV_ADD = TRUE

[forescout_emessage]
REGEX = EMSG.{11}([^\r\n]*)
FORMAT = DTLError::$1
MV_ADD = TRUE

[forescout_dtl_claim]
REGEX = SVALU\s*\d*\|[A-Z\d]*\|\d*\|CLM\*(?<ClaimID>[A-Z\d]*)
MV_ADD = TRUE

