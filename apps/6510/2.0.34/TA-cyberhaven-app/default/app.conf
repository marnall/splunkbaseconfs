# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Mishchenko Dmytro
version = 2.0.34
description = This is Cyberhaven splunk application, after running you should specify host and credentialsThen you'll get list of incidents in your splunk instance and will be able to search and analyze dataGet auth token:https://{{HOST}}/api-tokens

[ui]
is_visible = 1
label = Cyberhaven Splunk application
docs_section_override = AddOns:released

[package]
id = TA-cyberhaven-app

[triggers]
reload.addon_builder = simple
reload.ta_cyberhaven_app_account = simple
reload.ta_cyberhaven_app_settings = simple
reload.passwords = simple

