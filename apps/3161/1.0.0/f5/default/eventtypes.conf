[f5_kpi_generator_events]
search = index=_internal source=*splunkd.log component=ExecProcessor f5_kpi_summary_generator

[f5_kpi_generator_excess_time]
search = eventtype=f5_kpi_generator_events Adjusting

[f5_kpi_generator_jobs]
search = eventtype=f5_kpi_generator_events Complete

[f5_kpi_generator_sleeping]
search = eventtype=f5_kpi_generator_events *sleeping*

[f5_kpi_generator_errors]
search = eventtype=f5_kpi_generator_events ERROR NOT ("No data" OR "Too few data points")
