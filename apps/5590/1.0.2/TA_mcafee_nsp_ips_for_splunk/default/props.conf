EXTRACT-mcafee_nsp_ips_audit_action = (?:(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+\d{1,2}\s+\d{1,2}:\d{1,2}:\d{1,2}\s+[^\s]*\s)?(?<process>(SyslogAuditLogForwarder)):\s(?<audit_object>.*?)\s(?<vendor_action>(succeeded|failed|is ongoing))\sat \d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\s[A-Z]{3}

