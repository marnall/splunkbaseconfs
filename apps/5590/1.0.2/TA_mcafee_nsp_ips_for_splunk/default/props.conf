EVAL-product = "Network Security Platform"
EVAL-vendor_product="Mcafee Network Security Platform"
pulldown_type = 1
EXTRACT-mcafee_nsp_ips_process = (?:(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+\d{1,2}\s+\d{1,2}:\d{1,2}:\d{1,2}\s+[^\s]*\s)?(?<process>(SyslogFaultForwarder)):\s+