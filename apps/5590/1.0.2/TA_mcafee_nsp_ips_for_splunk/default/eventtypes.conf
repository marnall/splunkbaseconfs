[mcafee_nsp_ips]
search = (sourcetype=mcafee:nsp_ips OR sourcetype=mcafee:nsp_ips:SyslogAlertForwarder)

[mcafee_nsp_ips_authentication]
search = (sourcetype=mcafee:nsp_ips OR sourcetype=mcafee:nsp_ips:SyslogAuditLogForwarder) (Login OR Logoff)

[mcafee_nsp_ips_attack]
search = (sourcetype=mcafee:nsp_ips OR sourcetype=mcafee:nsp_ips:SyslogAlertForwarder) signature="*"
#tags = network ids attack

[mcafee_nsp_ips_change]
search = (sourcetype=mcafee:nsp_ips OR sourcetype=mcafee:nsp_ips:SyslogAuditLogForwarder) NOT (audit_object="Schedule Report Generation" OR audit_object="Alert & Packetlog Purge" OR audit_object="Scheduled check of Update Server for new signature sets" OR audit_object="Sensor reports link status change" OR audit_object="Backup Scheduler")