[nessus:json]

# Field Aliases

FIELDALIAS-category = info.plugindescription.pluginattributes.plugin_information.plugin_family AS category
FIELDALIAS-cve = info.plugindescription.pluginattributes.cvss_score_source AS cve
FIELDALIAS-dest = hostname AS dest
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-severity = info.plugindescription.pluginattributes.risk_information.risk_factor AS severity
FIELDALIAS-signature = info.plugindescription.pluginattributes.plugin_name AS signature
FIELDALIAS-vendor_product = cpe AS vendor_product


# EVAL-fields
EVAL-cvss = coalesce('info.plugindescription.pluginattributes.risk_information.cvss3_base_score', 'info.plugindescription.pluginattributes.risk_information.cvss_base_score')
EVAL-url = "https://" . hostname
EVAL-severity = lower(severity) #convert to lowercase to match CIM