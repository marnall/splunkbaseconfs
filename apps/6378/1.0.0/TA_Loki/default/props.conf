# This is for data that we don't want ingested to Splunk

[loki_exec]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TRANSFORMS-null= setnull




#This entry parses the loki.exe "CSV" output

[loki_scan]
TIME_PREFIX = ^
TIME_FORMAT = %Y%m%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 18
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT  = false
EVENT_BREAKER = ([\r\n]+)
EVENT_BREAKER_ENABLE = TRUE



#############Parsing
EXTRACT-Basic_Extract = ^.{18},(?<dvc_name>[^,]*),(?<log_type>[^,]*),(?<operation>[^,]*),(?<msg>.*)
EXTRACT-Notice_Extract = NOTICE,Results,Results:\s(?<alert_count>\d*)\salerts,\s(?<warning_count>\d*)\swarnings,\s(?<notice_count>\d*)\snotices
EXTRACT-Result_Extract = RESULT,Results,(?<final_result>.*)
EXTRACT-Warning_Extract = ^([^,]*,){3}FileScan,FILE:\s(?<file_name>.*)\sSCORE:\s(?<score>\d*)\sTYPE:\s(?<file_type>.*)\sSIZE:\s(?<file_size>\d*)\sFIRST_BYTES:\s(?<first_bytes_hexa>\w*)\s\/\s(?<first_bytes_text>.*)\sMD5:\s(?<MD5>\w*)\sSHA1:\s(?<SHA1>\w*)\sSHA256:\s(?<SHA256>\w*)\sCREATED:\s(?<file_creation_time>.*)\sMODIFIED:\s(?<file_modify_time>.*)\sACCESSED:\s(?<file_access_time>.*)REASON_1
EXTRACT-Reason_1_Extact = REASON_1:\s(?<matching_criteria_1>.*?)\sMATCH:\s(?<matched_rule_1>\S+)\sSUBSCORE:\s(?<match_subscore_1>\d*)\sDESCRIPTION:\s(?<match_description_1>.*?)\sMATCHES:\s(?<match_strings_1>.*?)($|REASON_\d)
EXTRACT-Reason_2_Extact = REASON_2:\s(?<matching_criteria_2>.*?)\sMATCH:\s(?<matched_rule_2>\S+)\sSUBSCORE:\s(?<match_subscore_2>\d*)\sDESCRIPTION:\s(?<match_description_2>.*?)\sMATCHES:\s(?<match_strings_2>.*?)($|REASON_\d)
EXTRACT-Reason_3_Extact = REASON_3:\s(?<matching_criteria_3>.*?)\sMATCH:\s(?<matched_rule_3>\S+)\sSUBSCORE:\s(?<match_subscore_3>\d*)\sDESCRIPTION:\s(?<match_description_3>.*?)\sMATCHES:\s(?<match_strings_3>.*?)($|REASON_\d)
EXTRACT-Reason_4_Extact = REASON_4:\s(?<matching_criteria_4>.*?)\sMATCH:\s(?<matched_rule_4>\S+)\sSUBSCORE:\s(?<match_subscore_4>\d*)\sDESCRIPTION:\s(?<match_description_4>.*?)\sMATCHES:\s(?<match_strings_4>.*?)($|REASON_\d)
EXTRACT-Reason_5_Extact = REASON_5:\s(?<matching_criteria_5>.*?)\sMATCH:\s(?<matched_rule_5>\S+)\sSUBSCORE:\s(?<match_subscore_5>\d*)\sDESCRIPTION:\s(?<match_description_5>.*?)\sMATCHES:\s(?<match_strings_5>.*?)($|REASON_\d)