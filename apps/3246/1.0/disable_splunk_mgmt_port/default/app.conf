[install]
build = 1
is_configured = 1

[package]
check_for_updates = 1
id = disable_splunk_mgmt_port

[ui]
is_visible = false
label = Disable Splunk Management Port

[launcher]
author = Luke Netto
description = This add-on disables the Splunk Management Port on any host. This is useful for universal forwarders failing vulnerability scans. Extra care should be taken to ensure that the management port is not needed. A Splunk restart is required for the change to take effect.
version = 1.0

