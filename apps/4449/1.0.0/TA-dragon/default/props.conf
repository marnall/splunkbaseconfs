[ourdragon]
EXTRACT-attack = ^(?:(?P<attack>[^|]*)\|){4}
EXTRACT-destip = ^(?:(?P<destip>[^|]*)\|){6}
EXTRACT-destport = ^(?:(?P<destport>[^|]*)\|){8}
EXTRACT-hostname = ^.*?\|.*?\|(?P<hostname>\w+)
EXTRACT-otherinfo = ^(?:(?P<attack>[^|]*)\|){12}
EXTRACT-protocol = ^(?:(?P<protocol>[^|]*)\|){11}
EXTRACT-srcip = ^(?:(?P<srcip>[^|]*)\|){5}
EXTRACT-srcport = ^(?:(?P<srcport>[^|]*)\|){7}
EXTRACT-unused = ^(?:(?P<unused>[^|]*)\|){9}
FIELDALIAS-aob_gen_ourdragon_alias_1 = destport AS dest_port
FIELDALIAS-aob_gen_ourdragon_alias_2 = srcip AS src
FIELDALIAS-aob_gen_ourdragon_alias_3 = attack AS action
FIELDALIAS-aob_gen_ourdragon_alias_4 = protocol AS transport
FIELDALIAS-aob_gen_ourdragon_alias_5 = hostname AS dvc
FIELDALIAS-aob_gen_ourdragon_alias_6 = unused AS category
FIELDALIAS-aob_gen_ourdragon_alias_7 = attack AS signature
FIELDALIAS-aob_gen_ourdragon_alias_8 = destip AS dest
FIELDALIAS-aob_gen_ourdragon_alias_9 = host AS vendor_product
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d|%H:%M:%S
TIME_PREFIX = ^
TZ = Asia/Muscat
category = Splunk App Add-on Builder
pulldown_type = 1
