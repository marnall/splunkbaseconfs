[snapattack_job_item]
collection = snapattack_job_item
external_type = kvstore
fields_list = snapattack_job_guid,guid,name,search,status,status_detail,hits,duration,started_timestamp,completed_timestamp,status_timestamp,last_updated,item_ids

[snapattack_job]
collection = snapattack_job
external_type = kvstore
fields_list = guid,created_timestamp,status_timestamp,type,status,status_detail,parameters.max_concurrent_searches,parameters.max_search_windows_seconds,parameters.max_results_per_query,parameters.search_timeout_seconds,parameters.max_search_job_size_mb,parameters.base_query_filter,parameters.raw_logs,parameters.raw_logs_include_fields,parameters.raw_logs_exclude_fields