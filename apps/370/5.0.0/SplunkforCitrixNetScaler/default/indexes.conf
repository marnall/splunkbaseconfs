[netscaler]
homePath   = $SPLUNK_DB/netscaler/db
coldPath   = $SPLUNK_DB/netscaler/colddb
thawedPath = $SPLUNK_DB/netscaler/thaweddb
maxMemMB = 20
maxConcurrentOptimizes = 6
maxHotIdleSecs = 86400
maxHotBuckets = 10
maxDataSize = auto_high_volume

[netscaler_alerts]
coldPath = $SPLUNK_DB/netscaler_alerts/colddb
homePath = $SPLUNK_DB/netscaler_alerts/db
thawedPath = $SPLUNK_DB/netscaler_alerts/thaweddb

