[Citrix NetScaler - APPFW - DataCube]
search = eventtype="netscaler" log_type=APPFW | stats count by violation src_ip url host profile msg msg_description log_type msg_format action _time
is_visible = false

[Citrix NetScaler - APPFW - DataCube - Summary Index]
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = +0s
enableSched = 1
action.summary_index = 1
action.summary_index.marker = ns_appfw
realtime_schedule = 0
search = `ns_appfw`|  bin _time span=15m | sistats count by violation src_ip url host profile msg msg_description log_type msg_format action _time
is_visible = false

[Citrix NetScaler - VPN - DataCube]
search = eventtype="netscaler" log_type=SSLVPN | stats count by host src_ip log_type msg_description msg_type total_bytes_send total_bytes_recv user vserver destination _time
is_visible = false

[Citrix NetScaler - VPN - DataCube - Summary Index]
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = +0s
enableSched = 1
action.summary_index = 1
action.summary_index.marker = ns_vpn
realtime_schedule = 0
search = `ns_sslvpn` | bin _time span=15m |  sistats count by host src_ip log_type msg_description msg_type total_bytes_send total_bytes_recv user vserver destination _time
is_visible = false

[Citrix NetScaler - System - DataCube]
search = eventtype="netscaler" | stats count by command src_ip host msg_description log_type msg_format user status _time 
is_visible = false

#[Citrix NetScaler - VPN - DataCube - Summary Index]   # This is probably a wrong name, should be "System"
[Citrix NetScaler - System - DataCube - Summary Index]
