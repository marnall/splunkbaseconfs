###############################################
#             AppFlow Security                #
###############################################

[Zero Byte Connections over Time]
disabled = 1
enableSched = 1
cron_schedule = */10 * * * *
dispatch.earliest_time = -6h
dispatch.latest_time = +0s
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.suppress.period = h
alert.track = 0
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = eventtype="netscaler_appflow" NOT syslogMessage | timechart count by destinationIPv4Address

[connection count by src ip]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.suppress.period = h
alert.track = 1
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = eventtype="netscaler_appflow" NOT syslogMessage | timechart limit=10 count by sourceIPv4Address usenull=f | fields - OTHER

[connection count by dest server]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.suppress.period = h
alert.track = 0
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = eventtype="netscaler_appflow" NOT syslogMessage | timechart limit=10 count by destinationIPv4Address usenull=f | fields - OTHER

[slow post]
action.email.reportServerEnabled = 0
alert.track = 1
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = eventtype="netscaler_appflow" httpRequestMethod=POST NOT syslogMessage octetDeltaCount | timechart sum(octetDeltaCount) by sourceIPv4Address usenull=f where sum < 600 | fields - OTHER

[slow post 2]
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.track = 0
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = eventtype="netscaler_appflow" httpRequestMethod=POST NOT syslogMessage octetDeltaCount | timechart sum(octetDeltaCount) by sourceIPv4Address usenull=f where sum < 600 | fields - OTHER

###############################################
#                AppFlow                      #
###############################################

[AppFlow DataCube]
is_visible = false
search = eventtype=netscaler_appflow | bin _time span=5m | fillnull httpUserAgent httpRequestURL httpRequestUrlPath | stats count by sourceIPv4Address destinationIPv4Address tcpSourcePort tcpDestinationPort transactionId flowId observationPointId httpUserAgent httpRequestURL flowStartMicroSeconds flowEndMicroSeconds httpRequestUrlPath

[AppFlow Traffic Analysis DataCube]
is_visible = false
search = eventtype="netscaler_appflow" httpRequestURL | bin _time span=5m | stats count by flowEndMicroSeconds flowStartMicroSeconds connectionId octetDeltaCount packetDeltaCount httpRequestHost appID 

[AppFlow HTTP Request DataCube]
is_visible = false
search = eventtype="netscaler_appflow" httpRequestURL | bin _time span=5m | stats count by observationPointId exportingProcessId flowId transactionId connectionId ipVersion protocolIdentifier sourceIPv4Address destinationIPv4Address tcpSourcePort tcpDestinationPort packetDeltaCount octetDeltaCount tcpControlBits flowFlags flowStartMicroSeconds flowEndMicroSeconds ingressInterface egressInterface appID httpRequestURL httpRequestCookie httpRequestReferer httpRequestMethod httpRequestHost httpUserAgent

[AppFlow HTTP Response DataCube]
is_visible = false
search = eventtype="netscaler_appflow" httpResponseStatus | bin _time span=5m | stats count by observationPointId exportingProcessId flowId transactionId connectionId ipVersion protocolIdentifier sourceIPv4Address destinationIPv4Address tcpSourcePort tcpDestinationPort packetDeltaCount octetDeltaCount tcpControlBits flowFlags flowStartMicroSeconds flowEndMicroSeconds ingressInterface egressInterface httpResponseStatus httpResponseLen httpResponseTimeToFirstByte httpResponseTimeToLastByte appID

[AppFlow Outputlookup AppID]
enableSched = 1
cron_schedule = */10 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = +0s
action.populate_lookup = 1
action.populate_lookup.dest = appid_lookup
run_on_startup = true
search = eventtype="netscaler_appflow" appName | stats values(appName) AS "appName" by appID | outputlookup appid_lookup.csv

[Transaction and Flow per Observation ID]
search = eventtype="netscaler_appflow" | stats distinct_count(transactionId) AS "No. of Transactions" distinct_count(flowId) AS "No. of Flows" by observationPointId

[Citrix NetScaler - AppFlow - Avg Round Trip Time]
search = eventtype="netscaler_appflow" | timechart avg(tcpRTT) by destinationIPv4Address

[AppFlow Utilization per Server]
search = eventtype="netscaler_appflow" NOT incarnationNumber NOT roundTripTime | stats distinct_count(connectionId) AS "Connections" sum(octetDeltaCount) AS "Traffic Inbound" sum(packetDeltaCount) AS "Packets Inbound" by appID | appendcols [search eventtype="netscaler_appflow" roundTripTime | stats distinct_count(connectionId) AS "Connections2" sum(octetDeltaCount) AS "Traffic Outbound" sum(packetDeltaCount) AS "Packets Outbound" by appID] | eval Connections=Connections+Connections2 | eventstats sum(Connections) AS total_con | eval perc_con = round(Connections * 100 / total_con, 2) | rename perc_con AS "Percent of Connections" | lookup appid_lookup appID OUTPUT appName | eval appName = if(isnull(appName), appID, appName) | fields appName, "Traffic Inbound", "Traffic Outbound", "Packets Inbound", "Packets Outbound", "Connections", "Percent of Connections" | rename appName AS "Server"
