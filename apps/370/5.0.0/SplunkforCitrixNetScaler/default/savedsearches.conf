[Citrix NetScaler - App Firewall - Top Violations by Device]
search = `ns_appfw`  | top limit=100 host msg_description

[Citrix NetScaler - App Firewall - Top Violations by Profile]
search = `ns_appfw`  | top limit=100 profile

[Citrix NetScaler - App Firewall - Top Violations by Type]
search = `ns_appfw` startmonthsago=3 | top msg_description

[Citrix NetScaler - App Firewall - Top Violations by URL]
search = `ns_appfw`  | top limit=100 msg_description url

[Citrix NetScaler - App Firewall - Top Violations by field]
search = `ns_appfw`  | top msg


[Citrix NetScaler - VPN - VPN Events]
search = eventtype="netscaler" log_type="SSLVPN"

[Citrix NetScaler - VPN - Comprimised VPN Accounts]
search =  SSLVPN [ search log_type="APPFW" | fields + log_type ] | top user showperc=f

[Citrix NetScaler - App Firewall - Comprimised VPN Accounts]
search =  SSLVPN [ search log_type="APPFW" | fields + log_type ] | top user showperc=f

[Citrix NetScaler - VPN - Bytes Transfered]
search = `ns_sslvpn` | stats 

[Citrix NetScaler - VPN - Bytes Recieved]
search = `ns_sslvpn`

[Citrix NetScaler - VPN - Connections by Vserer]
search = `ns_sslvpn`

[Citrix NetScaler - VPN - Connections by User]
