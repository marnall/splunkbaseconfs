[Citrix NetScaler - Events]
search = eventtype="netscaler"

[Citrix NetScaler - Events - DataCube]
search = eventtype="netscaler" | fillnull | eval destination=dst_ip.":".dst_port | stats count by destination user msg_id msg_type dst_ip dst_port src_ip src_port total_bytes_recv total_bytes_send

