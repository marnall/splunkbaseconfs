[citrix_ns]
search = `ns_log` or `appflow`

[ns_app_firewall]
search = eventtype=citrix_ns APPFW

[ns_audit]
search = eventtype=citrix_ns UI CMD_EXECUTED

[netscaler]
search = index=netscaler 

[netscaler_appflow]
search = eventtype=netscaler sourcetype=appflow

[netscaler_syslog]
search = eventtype=netscaler sourcetype=ns_log

[netscaler_app_fw]
search = eventtype=netscaler_syslog log_type=APPFW