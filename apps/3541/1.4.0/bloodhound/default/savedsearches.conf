[bloodhound_inventory_kvstore_gen]
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 14 2 * * 7
description = This search builds the kv store inventory of dashboards and searches, and should be scheduled on a regular basis (weekly, bi-weekly) to ensure the inventories are kept up-to-date. The arguments are required in the following order: hostname mgmtport. Clone this search and ensure it is owned by a user with permission to access the Splunk REST API and does not have a search time restriction, as this search can take several hours to complete.
enableSched = 1
search = | script bloodhound_inventory_gen host=localhost port=8089


[bloodhound_inventory_kvstore_job]
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */8 * * * *
description = Search to update the job lookup
enableSched = 1
search = | script bloodhound_inventory_job host=localhost port=8089


[bloodhound_inventory_kvstore_job_cleanup]
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 12 * * *
description = Daily search that runs job lookup cleanup script to keep lookup size low
enableSched = 1
search = | script bloodhound_inventory_job_cleanup host=localhost port=8089 time=30