[azure_stack_cefLabelFirst]
SOURCE_KEY = cef_message
REGEX = \b(c(?>6a|fp|n|s)\d+)Label=(?<_KEY_1>[^=]+)(?=\s+\w+=).*?\1=(?<_VAL_1>[^=]+)(?=\s+\w+=|$)
KEEP_EMPTY_VALS = True
MV_ADD = True

[azure_stack_cefLabelSecond]
SOURCE_KEY = cef_message
REGEX = \b(c(?>6a|fp|n|s)\d+)=(?<_VAL_1>[^=]+)(?=\s+\w+=).*?\1Label=(?<_KEY_1>[^=]+)(?=\s+\w+=|$)
KEEP_EMPTY_VALS = True
MV_ADD = True

[azure_stack_builtInCefFields]
SOURCE_KEY = cef_message
# REGEX = \b(?<_KEY_1>(?!c[sn])\w+)=(?<_VAL_1>[^=]+)(?=(?:\s+\w+=|$))
REGEX = \b(?<_KEY_1>(?!c(?>6a|fp|n|s)\d+)\w+)=(?<_VAL_1>[^=]+)(?=(?:\s+\w+=|$))
KEEP_EMPTY_VALS = True
MV_ADD = true

[setnull]
REGEX = CEF:\d(?:[^\|]*\|){6}0
DEST_KEY = queue
FORMAT = nullQueue

[azure_stack_pep_event_id]
SOURCE_KEY = signature_id
REGEX = Microsoft-AzureStack-PrivilegedEndpoint\:\s*(?<pep_event_id>[^\|]+)

[extract_kv_eq]
REGEX = (\w+)=(.+?)(?=\sMas|$)
FORMAT = $1::$2
