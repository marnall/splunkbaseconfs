[Rollback]
action.webhook = 1
action.webhook.param.url = https://[YOUR-GATE-HOSTNAME}/api/v1/webhooks/webhook/[YOUR-SPINNAKER-APP]
alert.expires = 1d
alert.suppress = 1
alert.suppress.period = 60s
alert.track = 0
counttype = number of events
cron_schedule = * * * * *
description = This Alert Action will automatically rollback a Spinnaker deployment if there are issues with the current deployment.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = index=main error OR exception
