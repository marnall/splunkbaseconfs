cron_schedule = 0 0 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = | from datamodel:Network_Sessions.VPN   | iplocation src_ip |table Country |dedup Country |search NOT [|inputlookup vpn_countries.csv]

