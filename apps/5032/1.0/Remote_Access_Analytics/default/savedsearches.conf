[Vpn User Tracking Report]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.lookup = 1
action.lookup.filename = vpn_user_tracking.csv
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
cron_schedule = */10 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = | tstats count from datamodel=Network_Traffic.All_Traffic WHERE \
    [| tstats count from datamodel=Network_Sessions.All_Sessions WHERE nodename=All_Sessions.VPN by All_Sessions.VPN.tunnelip \
    | rename All_Sessions.VPN.tunnelip as All_Traffic.src \
    | fields - count] by  All_Traffic.src  All_Traffic.dest All_Traffic.user All_Traffic.app\
| sort - count \
| `drop_dm_object_name("All_Traffic")` |sort - count |search src="*" user="*" dest="*" app="*"

