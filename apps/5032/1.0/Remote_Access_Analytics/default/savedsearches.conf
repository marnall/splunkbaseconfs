[Search for all user activities]
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.statistics.wrap = 0
search = | from datamodel:Network_Sessions.VPN \
| search (vendor_product="Cisco ASA") OR (user!=N/A msg="SSL tunnel shutdown" ) \
| eval assigned_ip=coalesce(assigned_ip,tunnelip) \
| eval Session_Duration = tostring(duration, "duration") \
| rex field=Session_Duration "((?P<day>\d+)\+){0,1}(?P<hour>\d{2}):(?P<min>\d{2}):(?P<sec>\d{2})" \
| eval hour=if(day>0,((day*24))+hour,hour) \
| eval Session_Duration = hour." hours ".min." minutes ".sec." seconds" \
| iplocation src_ip \
| stats count by _time user src_ip assigned_ip Session_Duration\
| fields - lat lon Region duration count

