search = earliest=-14d `scma_source_internal_index` sourcetype=scheduler result_count \
| extract pairdelim=",", kvdelim="=", auto=f \
| `scma_instance_info(host)` \
| stats max(result_count) AS max_result_count avg(run_time) AS avg_run_time_sec sum(run_time) AS sum_run_time_sec dc(host) AS dc_instance count AS execution_count last(name) as name by label savedsearch_name, app \
| where max_result_count = 0 \
| join name label savedsearch_name type=outer \
    [| rest `scma_rest_timeout` /servicesNS/-/-/saved/searches splunk_server=* \
    | `scma_instance_info(splunk_server)` \
    | fields title eai:acl.owner cron_schedule dispatch.earliest_time dispatch.latest_time name label \
    | rename title AS savedsearch_name eai:acl.* AS * dispatch.earliest_time AS dispatch_earliest_time dispatch.latest_time AS dispatch_latest_time] \
| rex field=savedsearch_name mode=sed "s/=/<equals>/g" \
| eval avg_run_time_sec=round(avg_run_time_sec, 2), sum_run_time_sec=round(sum_run_time_sec, 2) \
| eval severity_level = 2 \
| eventstats dc(savedsearch_name) AS loe_value \
| eval loe_name = "search_searches_returning_no_results__total" \
| search NOT app IN (splunk_monitoring_console,splunk_archiver) \
| table name app savedsearch_name avg_run_time_sec cron_schedule dc_instance dispatch_earliest_time dispatch_latest_time execution_count max_result_count severity_level sum_run_time_sec loe_name loe_value \
| foreach * [| rex field=<<FIELD>> mode=sed "s/[^[:ascii:]]|\"//g" ] \
`scma_comment("#REDACT| foreach app,savedsearch_name [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("search_searches_returning_no_results")`

