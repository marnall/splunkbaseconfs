date_created = Sep 14, 2022
date_updated = Feb 6, 2023
ranking = 5
enableSched = false
cron_schedule = 5 1 * * *
search_author = Tools Engineering
search = `scma_source_internal_index` source=*scheduler.log sourcetype=scheduler SavedSplunker status=skipped earliest=-6d@w1 latest=-1d@w3 \
| rex "\,\s+app\=\"(?<app_context>\S+)\"" \
| stats count by host app_context savedsearch_name search_type reason \
| `scma_instance_info(host)` \
| stats sum(count) as count values(name) as name by app_context savedsearch_name search_type reason \
| rename reason AS message \
| eval message=replace(message, "[:=]", " ") \
| eval severity_level=case(count>0 AND count<=25, 2,count>25 AND count<=50,3, count>50,4, true(),1) \
| eventstats count(eval(count>20)) AS loe_value \
| eval name = mvjoin(name,":") \
| eval loe_name = "search_skipped_searches_detail__total" \
| table name app_context search_type savedsearch_name count message severity_level loe_name loe_value \
| foreach * [| rex field=<<FIELD>> mode=sed "s/[^[:ascii:]]|\"//g" ] \
  `scma_comment("#REDACT| foreach app_context,savedsearch_name [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("search_skipped_searches_detail")`

