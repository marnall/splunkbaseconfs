search = | rest `scma_rest_timeout` splunk_server=* /servicesNS/-/-/saved/searches search="eai:acl.app!=splunk_monitoring_console" search="eai:acl.app!=splunk_instrumentation" search="is_scheduled=1" search="disabled=0" \
| search search IN ("*|*sendalert *" , "*|*script *" , "*|*sendemail *", "*|*collect *", "*|*mcollect *", "*|*outputlookup *", "*|*outputcsv *" ) OR (actions=* NOT actions IN ("*outputtelemetry*","")) \
| rename eai:acl.* AS * dispatch.earliest_time AS dispatch_earliest_time dispatch.latest_time AS dispatch_latest_time \
| `scma_instance_info(splunk_server)` \
| makemv delim="," actions \
| eval actions=trim(actions) \
| stats values(search) values(cron_schedule) dc(actions) values(actions) dc(splunk_server) values(sharing) values(action.email.to) AS email_destinations last(name) as name by label, title, app, owner \
| rename values(*) AS * dc(*) AS dc_* title AS savedsearch_name owner AS user , dc_splunk_server as dc_instance \
| rex field=savedsearch_name mode=sed "s/=/<equals>/g" \
| makemv delim="," email_destinations \
| eval email_destinations_count = mvcount(email_destinations) \
| eval is_enabled="true", is_scheduled="true" \
| eval severity_level = case(match(actions,"notable|risk"), 3, search IN ("*|*sendalert *" , "*|*script *" , "*|*sendemail *", "*|*collect *", "*|*mcollect *", "*|*outputlookup *", "*|*outputcsv *" ) OR actions IN ("*lookup*", "*mail*", "summary_index"), 3, true(), 1) \
| eval spl_command = case(match(search, "\|\s?outputlookup\s+"), mvappend(spl_command,"spl_command_outputlookup"), match(search, "\|\s?sendalert\s+"), mvappend(spl_command,"spl_command_sendalert"), match(search, "\|\s?script\s+"), mvappend(spl_command,"spl_command_script"), match(search, "\|\s?sendemail\s+"), mvappend(spl_command,"spl_command_sendemail"), match(search, "\|\s?outputcsv\s+"), mvappend(spl_command,"spl_command_outputcsv"), match(search, "\|\s?collect\s+"), mvappend(spl_command,"spl_command_collect"), match(search, "\|\s?mcollect\s+"), mvappend(spl_command,"spl_command_mcollect"), true(), null() ) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "search_scheduled_search_actions__total" \
| eval actions=mvjoin(actions, ", ") \
| table name app savedsearch_name sharing cron_schedule dc_actions actions spl_command dc_instance is_enabled is_scheduled email_destinations_count severity_level loe_name loe_value\
| foreach * [| rex field=<<FIELD>> mode=sed "s/[^[:ascii:]]|\"//g" ] \
`scma_comment("#REDACT| foreach app,savedsearch_name [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("search_scheduled_search_actions")`

