| eval search_et = case(isnum(search_et),search_et, (((search_et == "N/A") OR (apiStartTime == "N/A")) OR match(apiStartTime,"_TIME")),0,((isnull(search_et) OR (search_et == "")) AND isnotnull(apiStartTime)),strptime(apiStartTime,"%a %b %d %H:%M:%S %Y"),true(),null()), search_lt = case(isnum(search_lt),search_lt,(((search_lt == "N/A") OR (apiEndTime == "N/A")) OR match(apiEndTime,"_TIME")),0,((isnull(search_lt) OR (search_lt == "")) AND isnotnull(apiEndTime)),strptime(apiEndTime,"%a %b %d %H:%M:%S %Y"),true(),null()) \
