[SCMA Data Export]
search_order = 502
dispatch.earliest_time = -30w@w
dispatch.latest_time = now
search = earliest=-30d@d `scma_source_introspection_index` sourcetype=scma:check check_name!=vv_customer_details customer_name=* \
| eval check_time=coalesce(check_time, now()) \
| eventstats latest(check_time) AS check_time by check_name \
| eval diff= abs(check_time - _time) \
| where diff < 1 \
| eval export_time="export_time=".now() \
| rex field=export_time mode=sed "s/,\s+\d+//g" \
| eval data=substr(_raw,timeendpos+3), data=replace(data, "\n", " "), data=export_time . ", " . data \
| rex field=data mode=sed "s/(?<=[A-Za-z])=/\": \"/g"  \
| rex field=data mode=sed "s/,\s(?=\S+\":)/\", \"/g" \
| rex field=data mode=sed "s/^/{\"/" \
| rex field=data mode=sed "s/$/\"}/" \
| eval data=replace(data, "\"\"", "\"") \
| rex field=data "\"user\":\s\"(?<user>[^\"]+)" \
| eval name = if(match(name, "^adhoc-\d+|^cm-\d+|^idxc-\d+|^es-\d+|^es-shc-\d+|itsi-\d+|itsi-shc-\d+|^shc-\d+"), name, "redacted_" . md5(name)) \
| eval data=if(match(data, "\"user\":"), replace(data, "\"user\":\s\"[^\"]+", "\"user\": \"redacted_".md5(user)), data) \
| rex field=data "\"instance\":\s\"(?<instance>[^\"]+)" \
| eval data=if(match(data, "\"instance\":"), replace(data, "\"instance\":\s\"[^\"]+", "\"instance\": \"redacted_".md5(instance)), data) \
| eval status=case(severity_level = -2,"N/A", severity_level = -1,"None", severity_level = 0,"Info", severity_level = 1,"Normal", severity_level = 2,"Low", severity_level = 3,"Medium", severity_level = 4,"High", severity_level = 5,"Critical", true(), 1), data=replace(data, "}$", ", \"status\": \"".status."\"}") \
| sort 0 - severity_level \
| stats count AS check_result_count max(severity_level) AS severity_level values(data) AS data values(customer_name) AS customer_name sum(eval(if(severity_level = 2 OR severity_level = 3, 1, 0))) AS check_result_review by check_name \
| join type=outer check_name \
    [| rest splunk_server=local `scma_rest_timeout` /servicesNS/-/scma/saved/searches search="eai:acl.app=scma disabled=0" \
    | rename title AS check_title \
    | search sub_category IN ("1*","2*") \
    | rename * AS check_* check_title AS check_name \
    | table check_name, check_category, check_tags, check_description, check_failure_text, check_suggested_action, check_doc_link] \
| eval status=case(severity_level = -2,"N/A", severity_level = -1,"None", severity_level = 0,"Info", severity_level = 1,"Normal", severity_level = 2,"Low", severity_level = 3,"Medium", severity_level = 4,"High", severity_level = 5,"Critical", true(), 1), check_results=if(severity_level =-1 OR severity_level = 0,"Passed / Complete",coalesce(check_failure_text, ""))." (Items to review: ".check_result_review.". Total items: ".check_result_count.")" \
| sort 0 - severity_level \
| filldown customer_name \
| append \
    [| inputlookup scma_customer_details \
    | rename _key AS metric value AS info \
    | where match(metric, "^\D") AND NOT match(metric, "(?:sva_topology_image|sva_indexing_category_code|sva_search_category_code)") \
    | transpose 0 header_field=metric include_empty=false column_name=zzz \
    | fields - zzz \
    | eval export_time=now() \
    | foreach * \
        [ eval data = mvappend(data,"\"<<MATCHSTR>>\":\"" + <<FIELD>> + "\"")] \
    | eval check_name="vv_customer_details", data="{" + mvjoin(data,",") + "}" \
    | table check_name, data] \
| append \
    [| rest `scma_rest_timeout` splunk_server=local /services/search/jobs search="eai:acl.app=scma" \
    | rex field=id "/jobs/(?<sid>.*)" \
    | search sid="*__scma__*" AND label="manager_*" \
    | eval progress=round(doneProgress*100, 0) \
    | rex field=search "scma_summarize_data\(\"(?<check_name>[^\"]+)" \
    | fillnull value="unknown" check_name \
    | foreach messages.* \
        [ eval messages=mvdedup(mvappend(messages, '<<FIELD>>'))] \
    | rename published AS _time \
    | appendcols \
        [| inputlookup scma_customer_details \
        | rename _key AS metric value AS info \
        | where match(metric, "^\D") AND NOT match(metric, "(?:sva_topology_image|sva_indexing_category_code|sva_search_category_code)") \
        | transpose 0 header_field=metric include_empty=false column_name=zzz \
        | fields + customer_name] \
    | filldown customer_name \
    | rename check_name AS orig_check_name \
    | search orig_check_name!=unknown \
    | eval check_name="scma_job_manager_detail" \
    | table check_name, orig_check_name, progress, runDuration, dispatchState, messages, customer_name \
    | eval export_time=now() \
    | foreach * \
        [ eval data = mvappend(data,"\"<<MATCHSTR>>\":\"" + <<FIELD>> + "\"")] \
    | eval data="{" + mvjoin(data,",") + "}" \
    | stats values(data) AS data by check_name orig_check_name \
    | table check_name data \
    | mvcombine data ]

