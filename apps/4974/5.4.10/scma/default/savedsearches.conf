<div class="diag-severity-icon"> <i class="icn-info icon-color-info"></i><div class="diag-severity-desc">INFORMATIONAL</div></div>\
<div class="diag-content"> These search results can be used to determine the appropriate amount of indexing cache storage that is needed to satisfy the customers search profile.  Data that is searched outside of the indexing cache will be located in SmartStore, which takes longer to retrieve.  It is OK to search data in SmartStore, but must understand that it will not be as responsive as data in the indexing cache.\
Avoid performing repeated searches, such as Data Model Acceleration, with data that is in SmartStore.\
