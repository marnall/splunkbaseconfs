search = | rest `scma_rest_timeout` /servicesNS/-/-/data/ui/views splunk_server=* \
| rename eai:acl.app As app, eai:acl.perms.read As acl_perms_read, eai:acl.perms.write As acl_perms_write, eai:acl.removable As acl_removable, eai:acl.sharing As sharing, eai:data As data, eai:type As type \
| search NOT app IN (system,trackme,config_explorer) \
| rex field=data max_match=0 "<module name=\"(?<advanced_xml_module>.*?)\"" \
| `scma_instance_info(splunk_server)` \
| eval is_advanced_xml_dashboard = if(isnotnull(advanced_xml_module) AND app!="system", "yes", "no") \
| eval is_htlm_dashboard = if(type="html", "yes", "no") , type = if(is_advanced_xml_dashboard="yes", "advanced_xml", type) \
| where is_htlm_dashboard="yes" OR is_advanced_xml_dashboard="yes" \
| stats count(eval(type=="html")) AS num_htlm_dashboards count(eval(type=="advanced_xml")) AS num_advanced_xml_dashboards values(name) as name values(type) as type by label, app \
| eval severity_level = case(num_htlm_dashboards > 0 OR num_advanced_xml_dashboards > 0, 3, true(), 1) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "environment_dashboard_migration__total" \
| table name app num_advanced_xml_dashboards num_htlm_dashboards type severity_level loe_name loe_value \
`scma_comment("#REDACT| foreach app [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("environment_dashboard_migration")`


