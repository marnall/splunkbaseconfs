ranking = 5
enableSched = false
cron_schedule = 5 1 * * *
search_author = Tools Engineering
search = | tstats summariesonly=t Sum(data.normalized_pct_cpu) As normalized_pct_cpu Where `scma_source_introspection_index` sourcetype=splunk_resource_usage data.process_type=search data.normalized_pct_cpu > 0 earliest=-14d@d latest=-0d@d By _time Span=1d host data.search_props.sid data.search_props.type data.search_props.app data.search_props.user \
| rename "data.search_props.*" As * , "data.*" As * \
| rename sid As search_id \
| eval normalized_pct_cpu=if(normalized_pct_cpu="0.00", null(), normalized_pct_cpu) \
| eval normalized_pct_cpu = if(isnull(normalized_pct_cpu) OR normalized_pct_cpu="", 0, normalized_pct_cpu) \
| eval Workload_Class = case ( match(app, "SplunkEnterpriseSecuritySuite|Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch|Splunk_SA_CIM|Splunk_Security_Essentials|splunk_app_eshealthcheck|^SecKit_|SA-ldapsearch"), "ES_base_apps", match(app, "^DA-ITSI|itsi|SA-IndexCreation|^SA-ITOA|^SA-ITSI|SA-UserAccess|vmware_ta_itsi|it_essentials_learn|splunk_app_infrastructure"), "ITSI_base_apps", match(app, "splunk_instrumentation|splunk_rapid_diag|splunk_instance_monitoring|splunk_archiver|system|splunk_monitoring_console|python_upgrade_readiness_app|^scma"), "Splunk_default_apps", match(app,"^search$|^launcher$"), "Search_app", true(), "Core_apps" ) \
| fields _time search_id host type Workload_Class app user normalized_pct_cpu \
| stats Sum(normalized_pct_cpu) As normalized_pct_cpu by _time, Workload_Class \
| eventstats Sum(normalized_pct_cpu) As total_normalized_pct_cpu by _time \
| eval Workload_Class_pct_cpu = normalized_pct_cpu / total_normalized_pct_cpu * 100 \
| fields _time Workload_Class Workload_Class_pct_cpu total_normalized_pct_cpu normalized_pct_cpu \
| join _time \
    [| tstats summariesonly=t P99(data.cpu_system_pct) As cpu_system_pct P99(data.cpu_user_pct) As cpu_user_pct Max(data.virtual_cpu_count) As virtual_cpu_count Where `scma_source_introspection_index` sourcetype=splunk_resource_usage component=Hostwide earliest=-14d@d latest=-0d@d By _time, host Span=5m \
    | rename "data.*" As * \
    | eval host=lower(host) \
    | stats P99(eval((cpu_user_pct + cpu_system_pct) * virtual_cpu_count / 100)) As PctUsed By _time, host \
    | stats Sum(PctUsed) As PctUsed By _time \
    | timechart Span=1d P99(PctUsed) As Env_Utilization] \
| eval vCPU_Usage = Workload_Class_pct_cpu * Env_Utilization / 100 , Perc_vCPU_Usage = vCPU_Usage / Env_Utilization * 100 \
| eval timechart_time = _time \
| eval _time=now() \
| eval severity_level = case ( Perc_vCPU_Usage > 95, 4, Perc_vCPU_Usage > 90, 3, Perc_vCPU_Usage > 80, 2, true(), 1) \
| table timechart_time Workload_Class Env_Utilization Perc_vCPU_Usage Workload_Class_pct_cpu normalized_pct_cpu total_normalized_pct_cpu vCPU_Usage severity_level \
| `scma_summarize_data("scma_workload_classification")`

