severity_info_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-info icon-color-info"></i><div class="diag-severity-desc">INFORMATIONAL</div></div>\
<div class="diag-content header-h3-replace"><i class="icn-account-team icon-modal-large icon-color-info margin-r v-top"></i> Please reach out to your Splunk Account team.</div>\
<div class="diag-content">This particular search is used to compare results to limits in the "Splunk Cloud Service Description" which decides if a customer is eligible to move to Splunk Cloud.  Based on the search results the Splunk Account team needs more information from the customer to provide better recommendations for a migration.</div>\
