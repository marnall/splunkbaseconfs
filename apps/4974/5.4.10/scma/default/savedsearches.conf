<div class="diag-content">Note that more than 10% of users are in the admin role.  In Splunk Cloud, we do not give customers “admin” access, they get “sc_admin” access. There are some differences in the roles to protect their Splunk Cloud environment from unwanted configurations and actions.  It is best to set the customers expectations around this. </div>\
</div>
severity_critical_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-low icon-color-low"></i><div class="diag-severity-desc">LOW</div></div>\
<div class="diag-content">The number of users that have the admin role is not compatible with the limit set in the "Splunk Cloud Service Description" and therefore not a candidate for migration.</div>\
<div class="diag-content">Click on the "Users" tab in the tab menu and look for the panel "Users with Admin Role" to see the results. </div>\
