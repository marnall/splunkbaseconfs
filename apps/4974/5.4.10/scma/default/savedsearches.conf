    | eval search="| rest `scma_rest_timeout` splunk_server=* /servicesNS/-/-/data/indexes search=\"isInternal=1\"| fields splunk_server title enableTsidxReduction | search title IN (_audit,_internal,_introspection) | stats last(enableTsidxReduction) AS enableTsidxReduction by title"] \
| append \
    [| rest `scma_rest_timeout` splunk_server=local /services/kvstore/status \
    | rename current.status AS kvstore_status \
    | stats dc(splunk_server) AS hosts by kvstore_status \
    | eval message=if(kvstore_status!="ready","KVStore not active! Check for KVStore related messages in `scma_source_internal_index` source=*mongod.log","KVStore is Active and Ready.") \
    | eval index="N/A", type="KVStore Service" \
    | eval severity_level = if(kvstore_status!="ready", 3, 0) \
    | eval search="| rest `scma_rest_timeout` splunk_server=local /services/kvstore/status" ] \
| append \
    [ search `scma_source_internal_index` source=*license_usage.log sourcetype=splunkd component=LicenseUsage TERM(type=RolloverSummary) earliest=-72h@h \
    | stats dc(host) AS hosts by index \
    | appendpipe \
        [| makeresults \
        | eval fill=0] \
    | eval type="license_usage.log", message=if(hosts>0,"Data Found.  Verify that this is the expected number of License  Servers.","No License Server(s) Found!  Click this row to run the check in a new search window to troubleshoot.") \
    | fillnull index value=_internal \
    | stats first(index) AS index, first(hosts) AS hosts, first(message) AS message, first(type) AS type \
    | eval severity_level = if(hosts > 0, 0, 3) \
    | eval search="`scma_source_internal_index` source=*license_usage.log sourcetype=splunkd component=LicenseUsage TERM(type=RolloverSummary) earliest=-72h@h | stats dc(host) AS hosts by index"] \
| append \
    [| tstats dc(host) AS hosts where `scma_source_internal_index` sourcetype=splunkd earliest=-4h@h by index \
    | appendpipe \
        [| makeresults \
        | eval fill=0] \
    | eval type="splunkd", message=if(hosts>0,"Data Found.  Verify that the \"Total Number of Instances\" is the SUM of the Indexers and Search Heads in the environment.","Data NOT Found!  Click this row to run the check in a new search window to troubleshoot.") \
    | stats first(index) AS index, first(hosts) AS hosts, first(message) AS message, first(type) AS type \
    | eval severity_level = if(hosts > 0, 0, 3) \
    | eval search="| tstats dc(host) AS hosts where `scma_source_internal_index` sourcetype=splunkd earliest=-4h@h by index"] \
| append \
    [| tstats dc(host) AS hosts where `scma_source_introspection_index` sourcetype=splunk_resource_usage earliest=-4h@h by index \
    | appendpipe \
        [| makeresults \
        | eval fill=0] \
    | eval hosts=coalesce(hosts,fill) \
    | eval type="splunk_resource_usage", message=if(hosts>0,"Data Found.  Verify that the \"Total Number of Instances\" is the SUM of the Indexers and Search Heads in the environment.","Data NOT Found!  Click this row to run the check in a new search window to troubleshoot.") \
    | fillnull index value=_introspection \
    | stats first(index) AS index, first(hosts) AS hosts, first(message) AS message, first(type) AS type \
    | eval severity_level = if(hosts > 0, 0, 3) \
    | eval search="| tstats dc(host) AS hosts where `scma_source_introspection_index` sourcetype=splunk_resource_usage earliest=-4h@h by index"] \
| append \
    [| tstats dc(host) AS hosts where `scma_source_audit_index` sourcetype=audittrail earliest=-4h@h by index \
    | appendpipe \
        [| makeresults \
        | eval fill=0] \
    | eval type="audittrail", message=if(hosts>0,"Data Found.  Verify that the \"Total Number of Instances\" is the SUM of the Indexers and Search Heads in the environment.","Data NOT Found!  Click this row to run the check in a new search window to troubleshoot.") \
    | stats first(index) AS index, first(hosts) AS hosts, first(message) AS message, first(type) AS type \
    | eval severity_level = if(hosts > 0, 0, 3) \
    | fillnull index value=_audit \
    | eval search="`scma_source_audit_index` sourcetype=audittrail earliest=-4h@h | stats dc(host) AS hosts by index"] \
| append \
    [| rest `scma_rest_timeout` splunk_server=local /services/apps/local/scma \
    | fields title, version, update.version \
    | rename version AS current_version update.version AS new_version \
    | fillnull title value="N/A" \
    | eval index="N/A", type="SCMA Version Check", hosts=1, message=case(isnotnull(current_version) AND title="N/A", "No Results!  Ensure you are using the latest version of the SCMA App.", isnull(new_version), "Using latest version of the SCMA app.", true(), "New version of the SCMA app is avaliable, please upgrade to the latest version prior to running the checks.") \
    | eval severity_level = case(isnotnull(current_version) AND title="N/A", 3, isnull(new_version), 0, true(), 1) \
    | eval search="| rest `scma_rest_timeout` splunk_server=local /services/apps/local/scma | fields title, version, update.version | rename version AS current_version update.version AS new_version | eval new_version=coalesce(new_version,current_version)"] \
| append \
    [| rest `scma_rest_timeout` splunk_server=local /servicesNS/-/-/server/info \
    | eval cpu_core_count = if(isnotnull(numberOfVirtualCores), numberOfVirtualCores, numberOfCores) \
    | eval physical_memory_gb = round(physicalMemoryMB / 1024, 0) \
    | eval index="N/A", type="SCMA App Machine Specs", min_cores=12, min_ram=16 \
    | eval hosts="Minimum Server Requirements - " . min_cores . " cores, " . min_ram . " GB RAM" \
    | eval message=if(cpu_core_count < min_cores OR physical_memory_gb < min_ram, "This server DOES NOT meet minimum requirements (" . cpu_core_count. " cores, " . physical_memory_gb. " GB RAM).", "This server meets minimum requirements (" . cpu_core_count. " cores, " . physical_memory_gb. " GB RAM).") \
    | eval severity_level = if(cpu_core_count < min_cores OR physical_memory_gb < min_ram, 3, 0) \
    | eval search="| rest `scma_rest_timeout` splunk_server=local /servicesNS/-/-/server/info | eval cpu_core_count = if(isnotnull(numberOfVirtualCores), numberOfVirtualCores, numberOfCores) | eval physical_memory_gb = round(physicalMemoryMB / 1024, 0) | eval index=\"N/A\", type=\"SCMA App Machine Specs\", min_cores=12, min_ram=16 | fields min_cores min_ram physical_memory_gb cpu_core_count" \
    | fields splunk_server index type hosts message severity_level search ] \
| append \
    [| rest /services/server/info splunk_server=local \
    | fields splunk_server, isForwarding \
    | rename splunk_server as host \
    | join host type=left \
        [| search `scma_source_audit_index` earliest=-4h `scma_local_host` \
        | stats count as event_count by host \
        | fields host event_count ] \
    | fillnull value=0 event_count \
    | eval message=case(isForwarding = 0, "SCMA Server NOT Forwarding data! Ignore if this is a single instance. See this guide: https://docs.splunk.com/Documentation/Forwarder/latest/Forwarder/Configureforwardingwithoutputs.conf)", event_count < 1, "SCMA Server is unable to search it's own logs! check if indexer clustering is enabled.", true(), "SCMA Server is Forwarding data, Event Count: " . event_count) \
    | eval severity_level = if(event_count < 1 OR isForwarding = 0, 3, 0) , index="N/A", type="SCMA Server data Forwarding" \
    | eval search="| rest /services/server/info splunk_server=local | fields splunk_server, isForwarding | rename splunk_server as host | join host type=left [| search `scma_source_audit_index` earliest=-4h `scma_local_host` | stats count as event_count by host | fields host event_count ] | fillnull value=0 event_count| eval message=if(event_count < 1 OR isForwarding = 0, \"SCMA Server NOT Forwarding data\", \"SCMA Server is Forwarding data, Event Count: \" . event_count)" \
    | rename host as hosts \
    | fields hosts index type severity_level message search] \
| append \
    [| rest "/servicesNS/-/-/properties/distsearch" splunk_server=local \
    | eval mc_groups=if(match(title,"dmc_group"), title, null()) \
    | eval num_mc_groups=if(match(title,"dmc_group"), 1, 0) \
    | rex field=mc_groups mode=sed "s/^distributedSearch:dmc_group_//g" \
    | stats sum(num_mc_groups) as num_mc_groups values(mc_groups) as mc_groups by splunk_server \
    | eval mc_groups=mvjoin(mc_groups,",") \
    | eval severity_level=if(num_mc_groups > 0, 0, 3) , type="Monitoring Console Configuration" \
    | eval message=if(num_mc_groups > 0, "The Monitoring Console is configured", "ERROR: The Monitoring Console is not configured on this instance!") , index="N/A" \
    | eval search="| rest \"/servicesNS/-/-/properties/distsearch\" splunk_server=local | eval mc_groups=if(match(title,\"dmc_group\"), title, null()) | eval num_mc_groups=if(match(title,\"dmc_group\"), 1, 0) | rex field=mc_groups mode=sed \"s/^distributedSearch:dmc_group_//g\" | stats sum(num_mc_groups) as num_mc_groups values(mc_groups) as mc_groups by splunk_server | eval mc_groups=mvjoin(mc_groups,\",\") | eval severity_level=if(num_mc_groups > 0, 0, 3) | eval message=if(num_mc_groups > 0, \"The Monitoring Console is configured\", \"ERROR: The Monitoring Console is not configured on this instance!\")" \
    | rename splunk_server as hosts \
    | fields hosts index num_mc_groups mc_groups message severity_level type search] \
| append \
    [| rest /servicesNS/-/-/cluster/config splunk_server=local \
    | fields splunk_server mode manager_uri multisite site \
    | eval message=case(mode="disabled", "Indexer Clustering is not configured on this server! (ignore if this is a single instance) see this guide : https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Enablethesearchhead", mode="searchhead", "Indexer Clustering is configured on this server with mode searchhead", mode="master" OR mode="manager", "Indexer Clustering is configured on this server with mode manager") \
    | eval severity_level = if( mode="disabled", 3, 0) , index="N/A", type="Indexer Clustering Configuration" \
    | eval search="| rest /servicesNS/-/-/cluster/config splunk_server=local | fields splunk_server mode manager_uri multisite site | eval message=case(mode=\"disabled\", \"Indexer Clustering is not configured on this server\", mode=\"searchhead\", \"Indexer Clustering is configured on this server with mode searchhead\", mode=\"master\" OR mode=\"manager\", \"Indexer Clustering is configured on this server with mode manager\")" \
    | rename splunk_server as hosts \
    | fields hosts index type severity_level message search ] \
| append \
    [| rest `scma_rest_timeout` splunk_server=local /services/configs/conf-limits \
    | fields splunk_server enable_memory_tracker search_process_memory_usage_percentage_threshold search_process_memory_usage_threshold \
    | stats values(*) as * by splunk_server enable_memory_tracker \
    | eval message=case(enable_memory_tracker=1,"WARNING! Memory Tracker is enabled on this instance. This may impact the App from running certain checks successfully. search_process_memory_usage_threshold=" . search_process_memory_usage_threshold . "MB and search_process_memory_usage_percentage_threshold=" . search_process_memory_usage_percentage_threshold . "%", true(), "Memory Tracker is disabled on this instance.") \
    | eval severity_level = if(enable_memory_tracker=1, 3, 0) , index="N/A", type="Memory Tracker" \
    | eval search="| rest `scma_rest_timeout` splunk_server=local /services/configs/conf-limits \
    | fields splunk_server enable_memory_tracker search_process_memory_usage_percentage_threshold search_process_memory_usage_threshold \
    | stats values(*) as * by splunk_server enable_memory_tracker" \
    | rename splunk_server as hosts \
    | fields hosts index type severity_level message search ] \
| search type=* \
| rename index AS Index \
| table Index type hosts message severity_level customer_name search \
| rex field=message mode=sed "s/\"//g" \
| `scma_instance_info(hosts)` \
| eval name=if(name="adhoc", "N/A", name) \
| rename name as hosts \
| table Index type hosts message severity_level \
| foreach * [| rex field=<<FIELD>> mode=sed "s/[^[:ascii:]]|\"//g" ] \
