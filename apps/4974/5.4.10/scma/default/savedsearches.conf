[scma_splunk_instance_info_dmc]
search_order = 512
request.ui_dispatch_app = splunk_monitoring_console
request.ui_dispatch_view = splunk_monitoring_console
search = | inputlookup dmc_assets \
| eval splunk_server=lower(serverName) , search_group=lower(search_group) \
| stats values(search_group) as role last(host) as host_fqdn by splunk_server \
| fields splunk_server host_fqdn role \
| join splunk_server type=left \
    [| rest /servicesNS/-/-/server/info splunk_server=* \
    | eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", null()) , is_indexer = if(server_roles="indexer" OR isForwarding = 0, "yes", null()), lower_splunk_server = lower(splunk_server), server_roles = mvjoin(server_roles, ",") \
    | fields lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_connected is_search_head is_indexer guid server_roles isForwarding ] \
| join splunk_server type=left \
    [| rest /servicesNS/-/-/cluster/config splunk_server=* \
    | eval splunk_server=lower(splunk_server) \
    | fields splunk_server cluster_label ] \
| join splunk_server type=left \
    [| rest /servicesNS/-/-/shcluster/config splunk_server=* \
    | eval splunk_server=lower(splunk_server) \
    | fields splunk_server shcluster_label] \
| eval cluster_label = if(isnotnull(cluster_label) AND cluster_label!="" AND role="dmc_group_indexer" , cluster_label, null()) \
| eval shcluster_label = if(isnotnull(shcluster_label) AND shcluster_label!="" AND match(role,"dmc_searchheadcluster") , shcluster_label, null()) \
| eval label = case ( isnotnull(cluster_label), cluster_label, isnotnull(shcluster_label), shcluster_label, true(), splunk_server) \
| eval name = case(isnotnull(cluster_label), "idxc", isnotnull(shcluster_label), "shc", match(role,"cluster_master|cluster_manager"), "cm", match(role,"dmc_group_indexer"), "idx", match(role,"dmc_group_search_head"), "sh", true(), "adhoc") \
| rex field=role mode=sed "s/dmc_indexerclustergroup_.*|dmc_searchheadclustergroup_.*|dmc_group_//g" \
| eval role = mvjoin(mvsort(role), ",") \
| rex field=role mode=sed "s/,,/,/g" \
| eval role=trim(role,":") \
| streamstats dc(label) as count by name \
| eval name = name . "-" . printf("%02d", count) \
| table splunk_server lower_splunk_server name label host host_fqdn host_resolved serverName guid role is_search_head is_connected isForwarding num_searches \
| outputlookup scma_splunk_instance_info_lookup CreateInApp=true Create_Empty=true \
| eval severity_level = case ( isnull(label) OR isnull(role), 2, is_connected="no", 3, true(), 1) \
| fields - splunk_server lower_splunk_server label host host_fqdn host_resolved serverName guid \
| `scma_summarize_data("scma_splunk_instance_info")`

