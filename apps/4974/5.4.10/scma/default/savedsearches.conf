search = | tstats summariesonly=t count AS event_count dc(source) AS source_count dc(host) AS host_count latest(_time) AS latest_event_time latest(source) AS latest_source where index=* AND (earliest=+5m latest=+1y) by index, sourcetype \
| rename index AS orig_index sourcetype AS orig_sourcetype \
| eval message="Event is in future by ".tostring(latest_event_time-now(), "duration") \
| convert ctime(latest_event_time) \
| eventstats count(orig_sourcetype) AS loe_value \
| eval loe_name = "data_hygiene_events_future__total" \
| eval message=replace(message, "[:=]", " ") \
| eval severity_level = 3 \
| table orig_index orig_sourcetype event_count host_count latest_event_time latest_source severity_level message source_count loe_name loe_value \
| foreach * [| rex field=<<FIELD>> mode=sed "s/[^[:ascii:]]|\"//g" ] \
`scma_comment("#REDACT| foreach orig_index,orig_sourcetype [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("data_hygiene_events_future")`

