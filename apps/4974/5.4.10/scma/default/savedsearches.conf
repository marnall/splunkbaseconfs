| `scma_instance_info(splunk_server)` \
| eval checkpoint_path_size_gb=round(checkpoint_path_size_bytes/1024/1024/1024,3) \
| stats max(checkpoint_path_count) as file_count last(name) as name max(checkpoint_path_size_gb) as file_size_gb by label modinput \
| stats sum(file_count) as instance_file_count sum(file_size_gb) as instance_file_size_gb last(name) as name by label \
