
############################################################################################################
# SCMA Supporting Searches
############################################################################################################
#############
# In order to REDACT certain check output:
# 1. Search and remove this text: `scma_comment("#REDACT
# 2. Search and remove this text: #REDACT")`
#############
# Severity Level Logic:
# * - (-2) (N/A) means: "Not Applicable": GRAY. Example: if ES does not exist in the env, means we are checkign for
# * - (-1) (None) means: "No results found": GRAY --> N/A
# * - 0    (Info) means: "not statefull, informational only": BLUE = #AED3E5 --> Info
# * - 1    (Normal) means: "all good" : GREEN = #99D18B --> OK
# * - 2    (Low) means: "borderline problematic..." : YELLOW = #FFE98C
# * - 3    (Medium) means: "well, you'd better take a look" : ORANGE = #FCB64E --> Warning
# * - 4    (High) means: "almost fire!" : dark orange = #F26A35 --> Error
# * - 5    (Critical) means: "FIRE!" : RED = #B50101 --> Fatal
#############



