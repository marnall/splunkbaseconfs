search_author = Tools Engineering
search = | rest `scma_rest_timeout` splunk_server=* /servicesNS/-/-/apps/local/ search="core!=1" \
| stats count AS install_instance_count dc(version) values(version) AS installed_version values(label) values(author) values(disabled) values(configured) values(details) by title \
| rename values(*) AS * dc(*) AS dc_* title AS appid \
| lookup splunkbase_apps appid app_version AS installed_version \
| lookup splunkbase_apps appid OUTPUTNEW version_compatibility AS latest_version_compatibility app_version AS all_app_versions categories product_compatibility \
| rex field=categories mode=sed "s/^\[|\]$|'|\s+//g" \
| eval uid=mvdedup(uid), eos_eol_regex_pattern="(?i)\seol|end of life|\seos|end of support", latest_app_version=mvindex(all_app_versions, 0), latest_version_compatibility=mvjoin(mvdedup(split(latest_version_compatibility, ",")), ",") \
| eval app_type=case(\
    match(author,"^Splunk") AND isnull(uid) AND match(appid,"Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch|DA-ITSI|SA-IndexCreation|SA-ITOA|SA-ITSI|SA-UserAccess"), "premium", \
    match(appid,"SplunkEnterpriseSecuritySuite|itsi"), "premium", \
    match(details, "apps.splunk.com"), "splunkbase", \
    isnotnull(latest_app_version), "splunkbase", \
    true(), "private") \
| eval message = case ( \
    match(description, eos_eol_regex_pattern) OR match(documentation, eos_eol_regex_pattern) OR match(is_archived, "(?i)true"), "ISSUE-1: The app has been marked as End of Life, End of Sale, or has been archived; further review is required",\
    match(disabled, "1"), "ISSUE-2: At least one installation of this app is in disabled state; further review is required", \
    dc_version > 1, "ISSUE-3: Multiple versions of the app found; further review is required", \
    NOT match(version_compatibility, "9\.\d") AND match(latest_version_compatibility, "9\.\d"), "WARNING-1: App needs to be upgraded to gain Splunk 9.x support",\
    isnull(passed_validation), "WARNING-2: No record of app passing AppInspect; further review is required", \
    ( match(details, "apps.splunk.com") AND split(product_compatibility,"|") != "Splunk Cloud") OR (NOT match(version_compatibility, "9\.\d")), "WARNING-3: App is not Splunk 9.x OR Splunk Cloud certified; further review is required", \
    true(), "GOOD-1: App meets migration criteria; note, local customization will require additional review" ) \
| eval app_class = case (\
    match(appid, "_base$|_outputs$|_props$|_inputs$|_indexes$|_server$|TA-\w+_splunk|_limits$|_splunkcloud$|_deploymentclient$|_tuning$"), "Splunk Base Config Apps (Core)", \
    core=1 OR match(appid, "_cluster|SplunkForwarder|^search$|splunk_metrics_workspace|SplunkLightForwarder|introspection_generator_addon|splunk_archiver|splunk_monitoring_console|launcher|splunk_gdi|user-prefs|alert_logevent|learned|splunk_httpinput|alert_webhook|legacy|splunk_instrumentation|appsbrowser|sample_app|splunk_internal_metrics"), "Splunk Core Apps (Core)", \
    match(appid, "SplunkEnterpriseSecuritySuite|Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch"), "Splunk Enterprise Security Premium App", \
    match(appid, "DA-ITSI|itsi|SA-IndexCreation|SA-ITOA|SA-ITSI|SA-UserAccess|vmware_ta_itsi"), "Splunk IT Service Intelligence Premium App", \
    match(appid, "^Splunk_TA_") OR (match(appid, "^TA_|^TA-") AND match(details, "apps.splunk.com")), "Splunkbase Technology Add-ons (Core)", \
    match(appid, "^Splunk_SA_") OR (match(appid, "^SA_|^SA-") AND match(details, "apps.splunk.com")), "Splunkbase Solution Add-ons (Core)", \
    (match(appid, "viz|semicircle_donut") AND match(details, "apps.splunk.com")) OR (match(details, "apps.splunk.com") AND match(appid, "_app$")), "Splunkbase Visualizations (Core)",\
    match(details, "apps.splunk.com"), "Splunkbase Apps & Add-ons (Core)", \
    match(appid, "^TA_|^TA-"), "Custom Technology Add-ons (Core)",\
    match(appid, "^SA_|^SA-"), "Custom Solution Add-ons (Core)", \
    true(), "Custom Apps & Add-ons (Core)") \
| eval severity_level = case(match(message, "^ISSUE"), 4, match(message, "^WARNING"), 3, match(message, "^GOOD"), 1, true(), 1) \
| rex field=label mode=sed "s/=/<equals>/g" \
| appendpipe \
    [| stats count(eval(if(match(message, "ISSUE-1:"), appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__eol" ] \
| appendpipe \
    [| stats count(eval(if(match(message, "ISSUE-2:"), appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__disabled" ] \
| appendpipe \
    [| stats count(eval(if(match(message, "ISSUE-3:"), appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__multiple_versions" ] \
| appendpipe \
    [| stats count(eval(if(match(message, "WARNING-1:") , appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__upgrade_for_latest_support" ] \
| appendpipe \
    [| stats count(eval(if(match(message, "WARNING-2:"), appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__no_appinspect_record" ] \
| appendpipe \
    [| stats count(eval(if(match(message, "WARNING-3:"), appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__not_latest_certified" ] \
| appendpipe \
    [| stats count(eval(if(match(message, "GOOD-1:"), appid, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__good" ] \
| appendpipe \
    [| stats first(eval(if(appid="SplunkEnterpriseSecuritySuite", installed_version, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__es_version" ] \
| appendpipe \
    [| stats first(eval(if(lower(appid)=="itsi", installed_version, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__itsi_version" ] \
| appendpipe \
    [| stats first(eval(if(lower(appid)=="pci", installed_version, null() ))) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__pci_version" ] \
| appendpipe \
    [| stats dc(appid) AS loe_value \
    | eval loe_name="apps_splunk_apps_vet_status__total" ] \
| table uid appid label categories app_type app_class product_compatibility installed_version latest_app_version message severity_level loe_name loe_value \
    `scma_comment("#REDACT| foreach appid,label [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("apps_splunk_apps_vet_status")` 

