search = `scma_source_internal_index` sourcetype=splunk_web_access NOT uri_path IN ("*/custom/*-ITSI-*") NOT method IN ("HEAD") earliest=-14d@d latest=-0h@h \
| fields _time host useragent status method referer referer_domain bytes spent uri_path \
| regex useragent!="Mozilla/\S+ \([^\)]+\) (?:\S+ \([^\)]+\)|Gecko/\d+) \S+" \
| rex field=useragent "(?<Browser_and_Version>(MSIE|Trident|(?!Gecko.+)Firefox|(?!AppleWebKit.+Chrome.+)Safari(?!.+Edge)|(?!AppleWebKit.+)Chrome(?!.+Edge)|(?!AppleWebKit.+Chrome.+Safari.+)Edge|AppleWebKit(?!.+Chrome|.+Safari)|Gecko(?!.+Firefox))(?: |\/)([\d\.apre]+)|Splunk.*?\s|^Chrome.*|^Go-http.*|^Prometheus.*|^REST.*|^Ruby|^curl.*|^[pP]ython.*|^splunk.*|^AdvancedInstaller|^Microsoft.*|^Postman.*|^Vault.*|^go-resty.*)" \
| rex field=Browser_and_Version "(?<browser_name1>^.*?)/" \
| rex field=Browser_and_Version "(?<browser_name2>.*)" \
| rex field=Browser_and_Version "/(?<browser_version1>.*?)$" \
| rex field=Browser_and_Version "\s+(?<browser_version2>.*?)$" \
| rex field=useragent "Edg\/(?<browser_version3>.*?)$" \
| rex field=useragent "(Version/|iPhone\sOS\s)(?<Safari_Version>.*?)\s" \
| rex field=useragent "(?<os_arch>(Win64|x86_64))" \
| rex field=useragent "(?<os_name>(Linux|Macintosh|Windows\s*\w+|iPhone|iPad))" \
| rex field=useragent "(Linux\s|Macintosh;\s|i\w+;\s|Windows\sNT\s)(?<os_version>.*?)[;)]" \
| eval browser_name = coalesce(browser_name1,browser_name2), browser_name = if(match(useragent, "Edg\/\d+"), "Microsoft Edge", browser_name), browser_name = if(match(browser_name, "Trident|MSIE"), "Internet Explorer", browser_name), browser_version = coalesce(browser_version1,browser_version2), browser_version = if(isnotnull(Safari_Version), Safari_Version, browser_version), browser_version = if(browser_name = "Microsoft Edge", browser_version3, browser_version), os_name = case ( match(useragent,"Windows NT 6.1"), "Windows 7", match(useragent,"Windows NT 6.2"), "Windows 8", match(useragent,"Windows NT 6.3"), "Windows 8.1", match(useragent,"Windows NT 10.0"), "Windows 10", match(useragent,"Pixel"), "Google Pixel", match(useragent,"Android"), "Android", true(), os_name ) \
| fields - browser_name1 browser_name2 browser_version1 browser_version2 browser_version3 Browser_and_Version \
| `scma_instance_info(host)` \
| fillnull value=0 bytes spent \
| fillnull value="other" browser_name browser_version \
| stats count as num_events sum(bytes) as data_transfer_bytes sum(spent) as spent_seconds values(os_version) as os_version values(name) as name dc(referer_domain) as num_referer_domains values(browser_version) as browser_version values(method) as method by os_name browser_name status \
| rename status as export_status \
| eval os_version=mvjoin(os_version, ":") , browser_version=mvjoin(browser_version, ":") , method=mvjoin(method, ":") , name=mvjoin(name, ":") \
| eval severity_level = if(num_events > 0, 2, 1) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "indexing_api_exports__total" \
| table name os_name browser_name export_status num_events data_transfer_bytes spent_seconds os_version num_referer_domains browser_version method severity_level loe_name loe_value \
| `scma_summarize_data("indexing_api_exports")`

