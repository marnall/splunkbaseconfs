search = | tstats summariesonly=t Max(data.size) as size WHERE (`scma_source_introspection_index` component=KVStoreCollectionStats "data.size">0 earliest=-14d) BY host, "data.ns" \
| rename "data.*" as "*" \
| rex field=ns "(?<app>.*)\.(?<kvstore>.*)" \
| `scma_instance_info(host)` \
| stats Max(size) As collection_size_bytes latest(name) as name By label app kvstore \
| eventstats sum(collection_size_bytes) as total_collection_size_bytes_instance by label \
| eventstats sum(collection_size_bytes) as total_collection_size_bytes_global \
| eval collection_size_mb = collection_size_bytes / 1024 / 1024 , collection_size_gb = collection_size_mb / 1024 , total_collection_size_gb_instance = total_collection_size_bytes_instance / 1024 / 1024 / 1024, total_collection_size_gb_global = total_collection_size_bytes_global / 1024 / 1024 / 1024 \
| eval total = total_collection_size_gb_instance \
| eval severity_level = if(collection_size_gb > 25 OR total_collection_size_gb_instance > 100, 4, 1) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "kv_store_size__total" \
| table name app kvstore collection_size_mb collection_size_gb total_collection_size_gb_instance total_collection_size_gb_global severity_level loe_name loe_value \
`scma_comment("#REDACT| foreach app,kvstore [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("kv_store_size")`

