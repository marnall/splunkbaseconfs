| fieldformat collection_size_gb = printf("%'.6f GB",collection_size_gb) | fieldformat total_collection_size = printf("%'.3f GB",total_collection_size) | fieldformat limit_collection = printf("%'.0f GB",limit_collection) | fieldformat limit_all = printf("%'.0f GB",limit_all) \
`scma_severity_level_set_properties`

