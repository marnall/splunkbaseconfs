</div>
severity_medium_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-medium icon-color-medium"></i><div class="diag-severity-desc">MEDIUM</div></div>\
<div class="diag-content">TBD</div>\
</div>
severity_high_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-high icon-color-high"></i><div class="diag-severity-desc">HIGH</div></div>\
<div class="diag-content"> A problem has been detected with the size of the KV Store(s).  Please ensure that they are below 25 GB each, and that the total sum is lower than 100 GB. </div>\
</div>
severity_critical_text = <div class="diag-content-box">\
