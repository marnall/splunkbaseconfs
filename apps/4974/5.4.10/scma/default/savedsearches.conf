    | rename _key AS metric value AS info \
    | where match(metric, "^\D") AND NOT match(metric, "(?:sva_topology_image|sva_indexing_category_code|sva_search_category_code)") \
    | transpose 0 header_field=metric include_empty=false column_name=zzz \
    | fields - zzz \
