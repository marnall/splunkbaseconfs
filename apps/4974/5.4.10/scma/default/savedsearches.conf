| eval severity_level = case(svc_recommendation=="Does not qualify at this data volume",0,svc_recommendation=="Seek Deal Desk for approval for this volume",0,svc_recommendation=="Approved",0) \
| rename search_count_daily_avg as search_count_daily_avg_premium, workload_factor as workload_factor_premium, search_count_daily_avg_entire_env as search_count_daily_avg, workload_factor_entire_env as workload_factor \
| table label search_count_daily_avg workload_factor search_count_daily_avg_premium workload_factor_premium svc_recommendation is_premium license_core license_es license_itsi license_model license_pci severity_level \
