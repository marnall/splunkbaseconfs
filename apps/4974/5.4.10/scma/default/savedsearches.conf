</div>
severity_medium_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-medium icon-color-medium"></i><div class="diag-severity-desc">MEDIUM</div></div>\
<div class="diag-content">TBD</div>\
</div>
severity_high_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-high icon-color-high"></i><div class="diag-severity-desc"> A high number of search throughput has been identified in your environment or no searches were found. </div></div>\
<div class="diag-content">TBD</div>\
</div>
severity_critical_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-critical icon-color-critical"></i><div class="diag-severity-desc">CRITICAL</div></div>\
<div class="diag-content"> The total search throughput in this environment is not compatible with the limit set in the "Splunk Cloud Service Description" and therefore not a candidate for migration.</div>\
<div class="diag-content">Please address the issues indicated and run the assessment again. This will need to be resolved before you can migrate. </div>\
</div>
date_created = Sep 14, 2022
date_updated = Apr 16, 2024
ranking = 5
enableSched = false
cron_schedule = 5 1 * * *
search_author = Tools Engineering
search = index=_audit sourcetype=audittrail savedsearch_name=* info=completed earliest=-7d@d latest=-0d@d \
| `scma_instance_info(host)` | where role="search_head"\
| eval label = case(match(name, "^es"), "es", match(name, "^itsi"), "itsi", true(), "core") \
| bin span=1d _time \
| stats avg(total_run_time) AS avg_srch_runtime, dc(search_id) AS srch_count by _time \
| eval srch_arrival_rate=srch_count/86400 \
| eval concurrency=ceiling(srch_arrival_rate*avg_srch_runtime) \
| stats avg(concurrency) AS sum_total_concurrency_avg p95(concurrency) AS sum_total_concurrency_perc95 max(concurrency) AS sum_total_concurrency_max \
| eval sum_total_concurrency_avg=round(sum_total_concurrency_avg,0), sum_total_concurrency_perc95=round(sum_total_concurrency_perc95,0), sum_total_concurrency_max=round(sum_total_concurrency_max,0) \
| appendcols \
    [| inputlookup scma_customer_details where _key=license_* \
    | transpose 0 header_field=_key \
    | fields - column \
    | eval is_premium=if(license_es>0 OR license_pci>0 OR license_itsi>0,"premium_app_stack","core_only") ] \
| appendcols \
    [| inputlookup cloud_limits.csv where check_name=search_*_concurrency_limit \
    | eval label=replace(check_name,"search_([^_]+)_.*","\1") \
    | eval {label}_limit=limit_classic \
    | eval es_limit_victoria=if(label=="es",limit_victoria,null()) \
    | fields core_* es_* itsi* \
    | stats values(*) AS *]\
| eval limit_classic = core_limit + if(license_es>0,es_limit,0) + if(license_itsi>0,itsi_limit,0), limit = limit_classic\
| eval limit_victoria = core_limit + if(license_es>0,es_limit_victoria,0) + if(license_itsi>0,itsi_limit,0) \
| eval value = sum_total_concurrency_avg \
| eval severity_level = case(value > limit,3, true(), 1) \
| eval severity_level_classic = case(value > limit_classic,3, true(), 1) \
| eval severity_level_victoria = case(value > limit_victoria,3, true(), 1) \
| fillnull value="Missing Search Data" sum_total_concurrency_avg severity_level value limit \
| rename core_limit AS concurrency_limit_core, es_limit AS concurrency_limit_es, es_limit_victoria AS concurrency_limit_victoria_es, itsi_limit AS concurrency_limit_itsi, \
| table license_model concurrency_limit_core concurrency_limit_es concurrency_limit_victoria_es concurrency_limit_itsi  is_premium license_core license_es license_itsi license_pci limit limit_classic limit_victoria severity_level severity_level_classic severity_level_victoria sum_total_concurrency_avg sum_total_concurrency_max sum_total_concurrency_perc95 value \
| `scma_summarize_data("search_search_concurrency")`

