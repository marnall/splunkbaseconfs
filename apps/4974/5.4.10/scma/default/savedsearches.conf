    | stats values(kpi) AS kpi, values(host) AS host \
    | mvexpand kpi \
    | rex field=kpi "^(?<kpi_name>[^:]+):(?<kpi_value>\S+)" \
    | stats values(host) AS host, values(kpi_value) AS kpi_value by kpi_name | eval search="39" ] \
| append \
    [ search (`scma_check_base("apps_splunk_apps_vet_status")`) OR (`scma_check_base_raw("apps_splunk_apps_vet_status")`) customer_name="$customer_name$" (appid=SplunkEnterpriseSecuritySuite OR appid=ITSI OR appid=pci) \
