<div class="diag-content"> One or more of your events in your Splunk indexes appear to have future timestamps. Please look the information presented in the results panel to identify the indexes, sources, and event counts that contain the events in question. Splunk uses the timestamps in the logs generated on an endpoint in order to log an accurate time when an event actually happened. This is why having all of the systems reporting into Splunk leverage an authoritative time source, like NTP, is so important. Attackers may realize that your correlation rules are based on time boundaries, e.g. "search the last five minutes of data" but if a system is logging time in the future then your correlation rules may not trip when suspicious behavior is logged. It is important to find the systems with inaccurate system times and fix them. Please see the troubleshooting documentation link to help address these issues. </div>\
</div>
