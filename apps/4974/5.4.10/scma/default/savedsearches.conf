severity_critical_text = <div class="diag-content-box">\
<div class="diag-severity-icon"><i class="icn-critical icon-color-critical"></i><div class="diag-severity-desc">CRITICAL</div></div>\
<div class="diag-content">Your Search Concurrency totals are high enough that we need to consider optimization of your search load and potential upgrades to compute for optimal performance for the Splunk Cloud environment.</div>\
</div>
date_created = Sep 14, 2022
date_updated = Feb 6, 2023
ranking = 5
enableSched = false
cron_schedule = 5 1 * * *
search_author = Tools Engineering
search = `scma_source_internal_index` sourcetype=splunkd component=Metrics host=* source=*metrics.log group=search_concurrency "system total" active_hist_searches>0 earliest=-7d@d latest=@d \
| fields _time host active_hist_searches \
| bin _time span=1d \
| `scma_instance_info(host)` \
| stats perc95(active_hist_searches) AS active_hist_searches_p95 max(active_hist_searches) AS active_hist_searches_max last(name) as name by _time label \
| eval active_hist_searches_p95=ceiling(active_hist_searches_p95), active_hist_searches_max=ceiling(active_hist_searches_max) \
| join \
    [| inputlookup scma_customer_details where _key=license_* \
    | transpose 0 header_field=_key \
    | fields - column \
    | eval is_premium=if( license_es>0 OR license_pci>0 OR license_itsi>0,"premium_app_stack", "core_only" ) ] \
| join license_core \
    [| inputlookup override_lic.csv \
    | fields license_core, concurrency_limit_core ] \
| join license_es \
    [| inputlookup override_lic.csv \
    | rename license_premium_es AS license_es \
    | fields license_es concurrency_limit_es ] \
| join license_itsi \
    [| inputlookup override_lic.csv \
    | rename license_premium_itsi AS license_itsi \
    | fields license_itsi concurrency_limit_itsi] \
| eval is_premium = if( match(name,"^itsi|^es"), "premium_app_stack", "core_only" ) \
| eventstats values(is_premium) as is_premium_check \
| eval is_premium = if(match(is_premium_check, "premium_app_stack"), "premium_app_stack", is_premium ) \
| eval name = if(name==label, "other", name) \
| `get_cloud_limits(search_search_concurrency_stats)` \
| eval limit_classic = concurrency_limit_core + concurrency_limit_es + concurrency_limit_itsi , limit = limit_classic \
| eval limit_victoria_premium = if(is_premium = "premium_app_stack", limit_victoria_premium, 0) \
| eval limit_victoria = limit_victoria_core + limit_victoria_premium \
| eval severity_level = case(active_hist_searches_max >= limit, 3, true(), 1) \
| eval severity_level_classic = case(active_hist_searches_max >= limit_classic, 3, true(), 1) \
| eval severity_level_victoria = case(active_hist_searches_max >= limit_victoria, 3, true(), 1) \
| eval timechart_time = _time \
| fillnull value="Missing Search Data" active_hist_searches_p95 active_hist_searches_max severity_level severity_level_classic severity_level_victoria limit_classic limit_victoria \
| table name timechart_time active_hist_searches_p95 active_hist_searches_max severity_level severity_level_classic severity_level_victoria limit_classic limit_victoria \
| `scma_summarize_data("search_search_concurrency_stats")`

