    | eval kpi_value=case(kpi_name=="users" AND isnotnull(total_users),total_users,kpi_name=="roles" AND isnotnull(dc_roles),dc_roles,true(),1) \
    | eval kpi_name="users_authentication_mechanism__".lower(type)."_".kpi_name \
