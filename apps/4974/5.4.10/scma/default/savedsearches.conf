    | fields splunk_server title enableTsidxReduction \
    | search title IN (_audit,_internal,_introspection) \
    | stats last(enableTsidxReduction) AS enableTsidxReduction by title \
    | eval message=if(enableTsidxReduction=1 ,"TSIDX reduction is enabled, the checks are going to run extremly slowly. Consider restoring reduced buckets to their original state. See https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Reducetsidxdiskusage", "TSIDX reduction is not enabled") \
    | eval severity_level = if(enableTsidxReduction=1, 3, 0) \
