search = `scma_source_internal_index` sourcetype=splunkd component=LicenseUsage type=RolloverSummary stack=enterprise earliest=-48h \
| fields _time stack stacksz \
| stats latest(*) as * BY stack \
| eval license_core=round(stacksz/1024/1024/1024) \
| fields license_core \
| appendcols \
    [| inputlookup scma_customer_details where _key=license_* _key!=license_core \
    | transpose 0 header_field=_key \
    | fields - column ] \
| eval balanced_license_es = case ( license_es = 0, "N/A:" . license_es, license_es / license_core * 100 < 20, "No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity:" . license_core, license_es > license_core, "Premium license larger than Core license:" . license_es / license_core * 100, true(), "OK:" . license_es / license_core * 100) \
| eval balanced_license_pci = case ( license_pci = 0, "N/A:" . license_pci, license_pci / license_core * 100 < 20, "No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity:" . license_core, license_pci > license_core, "Premium license larger than Core license:" . license_pci / license_core * 100, true(), "OK:" . license_pci / license_core *100) \
| eval balanced_license_itsi = case ( license_itsi = 0, "N/A:" . license_itsi, license_itsi / license_core * 100 < 20, "No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity:" . license_core, license_itsi > license_core, "Premium license larger than Core license:" . license_itsi / license_core * 100, true(), "OK:" . license_itsi / license_core *100) \
| fields - license_* \
| transpose \
| join column \
    [| inputlookup scma_customer_details where _key=license_* _key!=license_core \
    | eval column="balanced_"._key ] \
| rename column as balanced_check "row 1" as message \
| rex field=message mode=sed "s/:\d+//g" \
| `get_cloud_limits(licensing_premium_app_balanced)` \
| eval limit=limit_classic \
| eval severity_level = case(message=="N/A",0,message=="No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity", 3, message=="OK", 1,message=="Premium license larger than Core license",4, true(),1) \
| eval severity_level_classic=case(message=="N/A",0,message=="No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity", 3, message=="OK", 1,message=="Premium license larger than Core license",4, true(),1) \
| eval severity_level_victoria=case(message=="N/A",0,message=="No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity", 3, message=="OK", 1,message=="Premium license larger than Core license",4, true(),1) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "licensing_premium_app_balanced__total" \
| table balanced_check value limit limit_classic limit_victoria severity_level severity_level_classic severity_level_victoria message loe_name loe_value \
| `scma_summarize_data("licensing_premium_app_balanced")`

