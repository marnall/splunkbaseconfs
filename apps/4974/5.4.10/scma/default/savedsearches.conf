    | stats sum(dc_workflows) AS kpi_value, values(customer_name) AS customer_name \
    | eval kpi_name="environment_ko_inventory__workflows" | eval search="36"] \
| append \
    [ search (`scma_check_base("environment_ko_inventory")`) OR (`scma_check_base_raw("environment_ko_inventory")`) customer_name="$customer_name$" \
    | stats sum(dc_datamodels) AS kpi_value, values(customer_name) AS customer_name \
    | eval kpi_name="environment_ko_inventory__data_models" | eval search="37"] \
| append \
    [ search (`scma_check_base("environment_ko_inventory")`) OR (`scma_check_base_raw("environment_ko_inventory")`) customer_name="$customer_name$" \
