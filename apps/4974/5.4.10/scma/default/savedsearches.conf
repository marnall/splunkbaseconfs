description = <div class="diag-content-box">\
<div class="diag-content">These are the search concurrency numbers used in the sweet spot calculation.</div> \
<div class="diag-content">This is one of the most important checks, because it is the most accurate measurement to understand the search profile. Review all of the search checks for potential areas of optimization to reduce the number of concurrent searches.  Alternatively, ensure that you have access to the data sources indicated in the search. Note that there are differences between victoria_limit and the legacy limit.</div> \
<div class="diag-content">When SCMA output shows you have more than this number, we work with the PS team as part of the migration process to review and optimize search load or encourage using some of the Splunk scheduler tricks to spread the load out to maximize the compute power your stack is provisioned for SVCs.</div> \
<div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/8.2.2112/Report/PrioritizescheduledreportsinSplunkWeb" target="_blank">Prioritized Reports </a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div> \
<div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Report/Skewscheduledreportstarttimes" target="_blank">Skewed Schedule Report Times </a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div> \
<div class="diag-content">After doing all we can to optimize, then you would be able to work with the account team to look at whether purchasing even more compute power is necessary to achieve higher numbers, as stated in the service description.</div>\
</div>
