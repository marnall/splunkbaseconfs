[SCMA Update KV Store v1]
search_order = 510
dispatch.earliest_time = -30w@w
dispatch.latest_time = now
search = | makeresults | eval kpi_name=mvappend("apps_local_settings", "apps_local_user_content", "apps_splunk_apps_vet_status", "apps_splunk_apps_vet_status__by_customer_name", "apps_splunk_apps_vet_status__end_of_life", "apps_splunk_apps_vet_status__good", "apps_splunk_apps_vet_status__issue_disabled", "apps_splunk_apps_vet_status__issue_multiple_versions", "apps_splunk_apps_vet_status__warning_no_appinspect_record", "apps_splunk_apps_vet_status__warning_not_8x_certified", "apps_splunk_apps_vet_status__warning_upgrade_for_8x_support", "data_hygiene_event_indexing", "data_hygiene_events_future", "environment_instance_inventory", "environment_ko_inventory__apps", "environment_ko_inventory__collections", "environment_ko_inventory__data_models", "environment_ko_inventory__scheduled_searches", "environment_ko_inventory__views", "environment_ko_inventory__workflows", "forwarder_output_connection_issues", "forwarders_count_and_inventory", "import_status", "indexing_blocked_queue_status", "indexing_data_source_inventory", "indexing_index_counts", "indexing_index_inventory", "indexing_index_storage_size", "indexing_smart_store_check", "installed_version_SplunkEnterpriseSecuritySuite", "installed_version_core", "installed_version_itsi", "license_core", "license_es", "license_itsi", "license_pci", "licensing_current_volumes_gb", "ps_app_phantom", "ps_app_uba", "retention_in_days_p95", "scma_app_version", "scma_meta_account_id", "scma_meta_account_name", "scma_meta_upload_method", "search_es_correlation_rules", "search_es_dma", "search_itsi_aggregation_limits", "search_itsi_correlation_search_limits", "search_itsi_service_limits", "search_long_running_searches", "search_real_time_searches", "search_scheduled_search_actions", "search_searches_returning_no_results", "search_skipped_searches_detail", "unconfigured_mc_instances", "unconfigured_rogue_search_instances", "users_authentication_mechanism__ldap_roles", "users_authentication_mechanism__ldap_users", "users_authentication_mechanism__saml_roles", "users_authentication_mechanism__saml_users", "users_authentication_mechanism__splunk_roles", "users_authentication_mechanism__splunk_users", "environment_instance_indexer_os") \
| mvexpand kpi_name \
