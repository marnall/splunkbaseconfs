search = `scma_source_audit_index` search_id!="'rsa_*" search_id!="'RemoteStorageRetrieveBuckets_*" search_id!="'searchparsetmp_*" search_id!="'remote_*" search_id=* (info=completed OR info=cancelled) NOT mcatalog earliest=-7d@d latest=@d \
| fields search,search_et,search_lt \
| rex field=search_et "'?(?<start_time>[^']+)'?" \
| rex field=search_lt "'?(?<end_time>[^']+)'?" \
| eval range=if(start_time=="N/A","All Time", (end_time-start_time)/86400) \
| eval search_range_in_days=case(range=="All Time","ALL TIME", range<1,"0-1", range>=1 AND range<=7,"1-7", range>7 AND range<=14,"7-14", range>14 AND range<21,"14-21", range>=21 AND range<90,"21-90", range>90,"90+") \
| eval search_range_in_days=if(match(search, "^[\s\']*\|") AND ! match(search, "^[\s\']*\|\s*(inputlookup|mstats|rest)"), "ALL TIME W/LEADING PIPE", 'search_range_in_days') \
| stats count by search_range_in_days \
| eventstats sum(count) as perc \
| eval perc=round(count*100/perc,2) \
| eval message=if((search_range_in_days="90+" OR search_range_in_days="ALL TIME") AND perc>20,"High Search Periodicity Over 90 Days","OK") \
| eval severity_level = if(message!="OK",3,1) \
| table search_range_in_days count perc message severity_level \
| `scma_summarize_data("search_search_periodicity")`

