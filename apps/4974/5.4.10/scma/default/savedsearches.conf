| where name LIKE "idx%" \
| eval retentionInDays=round(frozenTimePeriodInSecs/86400,0) \
| stats dc(splunk_server) AS dc_instance max(retentionInDays) AS max_retentionInDays avg(retentionInDays) AS avg_retentionInDays min(retentionInDays) AS min_retentionInDays values(enableDataIntegrityControl) AS enableDataIntegrityControl values(enableTsidxReduction) as enableTsidxReduction values(timePeriodInSecBeforeTsidxReduction) as timePeriodInSecBeforeTsidxReduction values(tsidxReductionCheckPeriodInSec) as tsidxReductionCheckPeriodInSec values(coldToFrozenScript) as coldToFrozenScript values(warmToColdScript) as warmToColdScript values(coldToFrozenDir) as coldToFrozenDir last(name) as name by label, title \
| eval severity_level = case (max_retentionInDays!=avg_retentionInDays OR enableDataIntegrityControl!=0 OR enableTsidxReduction!=0, 4, (isnotnull(coldToFrozenScript) AND coldToFrozenScript!="") OR (isnotnull(warmToColdScript) AND warmToColdScript!="") OR (isnotnull(coldToFrozenDir) AND coldToFrozenDir!=""), 4, true(), 1) \
| eval message = case ( \
    max_retentionInDays!=avg_retentionInDays, "The max_retentionInDays does not match the avg_retentionInDays, there is a mismatch in the index retention configuration.", \
    enableDataIntegrityControl!=0,"The enableDataIntegrityControl feature has been enabled on an index, this is not supported in Splunk Cloud.", \
    enableTsidxReduction!=0,"The enableTsidxReduction feature has been enabled on an index, this is not supported in Splunk Cloud.", \
    (isnotnull(coldToFrozenScript) AND coldToFrozenScript!="") OR (isnotnull(warmToColdScript) AND warmToColdScript!="") OR (isnotnull(coldToFrozenDir) AND coldToFrozenDir!=""), "Archival may be enabled for this index!", \
    true(), "OK") \
| rename title AS orig_index \
| eventstats avg(avg_retentionInDays) AS loe_value \
| eval loe_value=round(loe_value) \
| eval loe_name = "indexing_index_inventory__avg_retentionInDays" \
| appendpipe \
    [| stats count(eval(enableDataIntegrityControl!=0)) AS loe_value \
    | eval loe_name="indexing_index_inventory__DataIntegrityControl" ] \
| appendpipe \
    [| stats count(eval(enableTsidxReduction!=0)) AS loe_value \
    | eval loe_name="indexing_index_inventory__TsidxReduction" ] \
| table name orig_index avg_retentionInDays dc_instance enableDataIntegrityControl enableTsidxReduction max_retentionInDays min_retentionInDays timePeriodInSecBeforeTsidxReduction tsidxReductionCheckPeriodInSec coldToFrozenDir coldToFrozenScript warmToColdScript severity_level message loe_name loe_value \
| foreach * [| rex field=<<FIELD>> mode=sed "s/[^[:ascii:]]|\"//g" ] \
`scma_comment("#REDACT| foreach orig_index [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("indexing_index_inventory")`

