search = | rest `scma_rest_timeout` splunk_server=local /servicesNS/-/scma/saved/searches search="eai:acl.app=scma disabled=0" \
| rename title AS check_title \
| search sub_category IN ("1*","2*") AND check_title!="scma_troubleshooting" \
| fields check_title \
| eval check_stats=1 \
| append \
    [ search `scma_source_audit_index` sourcetype=audittrail action=search earliest=-24h@h latest=now \
    | rex field=_raw "_summarize_data\(\"(?<check_title>[^\"]+)" \
    | stats latest(_time) AS check_completed_time max(total_run_time) as total_run_time max(event_count) as event_count max(result_count) as result_count values(info) as info by check_title \
    | eval info=if(info="completed", "completed", "incomplete") \
    | rename info AS check_status \
    | fields check_completed_time check_title check_status total_run_time result_count event_count ] \
| append \
    [ search `scma_source_introspection_index` sourcetype=scma:check earliest=-24h@h latest=now \
    | stats latest(_time) as introspection_time latest(customer_name) as customer_name by check_name \
    | rename check_name AS check_title \
    | fields introspection_time check_title customer_name ] \
| eval _time = now() \
| stats latest(_time) As _time latest(check_completed_time) As check_completed_time latest(introspection_time) As introspection_time latest(total_run_time) As total_run_time latest(result_count) As result_count latest(event_count) As event_count latest(check_status) As check_status latest(customer_name) As customer_name latest(check_stats) as check_stats by check_title \
| where check_stats=1 \
| fillnull value="incomplete" check_status customer_name \
| eval severity_level = if(check_status="incomplete", 4, 1) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "scma_troubleshooting__total" \
| table check_title check_status check_completed_time introspection_time total_run_time result_count event_count severity_level loe_name loe_value \
