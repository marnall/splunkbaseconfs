date_created = Sep 14, 2022
date_updated = Feb 6, 2023
ranking = 5
enableSched = false
cron_schedule = 5 1 * * *
search_author = Tools Engineering
search = | rest `scma_rest_timeout` /servicesNS/-/-/authentication/users splunk_server=* \
| `scma_instance_info(splunk_server)` \
| stats last(name) as name by label title roles \
| eval admin_count = if(match(roles, "^admin"), 1, 0) \
| eventstats dc(eval(if(match(roles, "^admin"), title, null() ))) AS num_unique_admin_users \
| stats dc(title) as users values(roles) as roles sum(admin_count) as admin_count last(name) as name last(num_unique_admin_users) as num_unique_admin_users by label \
| eval percent = ceiling(admin_count / users * 100) \
| `get_cloud_limits(users_admin_users)` \
| eval roles=mvjoin(roles,":") \
| eval value=users, limit = limit_classic \
| eval severity_level = if( percent > limit, 3, 1) \
| eval severity_level_classic = if( percent > limit_classic, 3, 1) \
| eval severity_level_victoria = if( percent > limit_victoria, 3, 1) \
| eventstats count(eval(severity_level > 1)) AS loe_value \
| eval loe_name = "users_admin_users__total" \
| appendpipe [| stats max(num_unique_admin_users) AS loe_value | eval loe_name="users_admin_users__total_unique" ] \
| table name value users admin_count num_unique_admin_users limit limit_classic limit_victoria percent roles severity_level severity_level_classic severity_level_victoria loe_name loe_value \
    `scma_comment("#REDACT| foreach roles [| eval <<FIELD>> = MD5(<<FIELD>>) ] #REDACT")` \
| `scma_summarize_data("users_admin_users")`

