| append maxtime=60 maxout=50000 timeout=60 [| rest `scma_rest_timeout` splunk_server=* /servicesNS/-/-/storage/collections/config | `scma_instance_info(splunk_server)` | stats dc(title) as dc_title by label title | eventstats dc(title) as count | stats dc(title) as ko max(count) as loe_value by label | eval ko_type = "dc_collections" ] \
