search = earliest=-7d@d latest=-0d@d index=_internal source="/opt/splunk/var/log/splunk/search_messages.log*" \
| fields host log_level message \
| `scma_instance_info(host)` | where role="search_head"\
| eval log_level=if(match(message,"'SearchOperator:loadjob': Cannot find artifacts"),"FATAL",log_level) \
| bucket span=1d _time \
| stats dc(message) AS message_count by _time name log_level \
| chart avg(message_count) AS count over name by log_level \
| rename WARN AS num_warn_messages, ERROR AS num_error_messages, FATAL AS num_fatal_messages \
| foreach num_* \
    [ eval <<FIELD>>=round(<<FIELD>>)] \
| fillnull value=0 num_warn_messages, num_error_messages, num_fatal_messages\
| eval severity_level = case(num_fatal_messages > 10,4, num_error_messages > 10,3, num_warn_messages > 10,4, true(), 1)\
| eval total_messages = num_warn_messages + num_error_messages + num_fatal_messages \
| eventstats sum(total_messages) AS loe_value \
| eval loe_name = "search_result_accuracy__total" \
| table name num_warn_messages num_error_messages num_fatal_messages severity_level loe_name loe_value\
| `scma_summarize_data("search_result_accuracy")`

