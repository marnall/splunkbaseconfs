| eval user="$user$", _time=now() \
| table _time, kpi_name, kpi_value, customer_name, user \
| stats values(*) AS * by kpi_name | fillnull value="-1" kpi_value | eval customer_name=if(isnull(customer_name),"$customer_name$",customer_name)\
| lookup scma_kpis old_loe_name as kpi_name OUTPUTNEW loe_name as new_kpi_name \
| eval kpi_name = if(isnotnull(new_kpi_name) OR new_kpi_name="", new_kpi_name, kpi_name) \
| outputlookup CreateInApp=true Create_Empty=true scma_kpi

[SCMA Update KV Store v2]
search_order = 513
dispatch.earliest_time = -30w@w
dispatch.latest_time = now
search = `scma_source_introspection_index` sourcetype=scma:check customer_name="$customer_name$" \
| append \
    [| inputlookup scma_customer_details append=true where (_key=license_core OR _key=license_es OR _key=license_itsi OR _key=license_pci OR _key=ps_app_phantom OR _key=ps_app_uba OR _key=scma_app_version) \
    | eval loe_name=if(isnotnull(_key), _key, loe_name) , loe_value = value, _time = now() ] \
| eval user="$user$" , customer_name="$customer_name$" \
| stats latest(loe_value) as loe_value by customer_name user loe_name \
| rename loe_name as kpi_name, loe_value as kpi_value \
| fillnull value="-1" kpi_value \
| table customer_name user kpi_name kpi_value \
| outputlookup CreateInApp=true Create_Empty=true scma_kpi

[SCMA forwarder reporting frequency]
