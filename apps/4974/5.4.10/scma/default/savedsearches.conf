    | eval kpi_name=case(\
        signature="ISSUE: The app has been marked as End of Life, End of Sale, or has been archived; further review is required", "apps_splunk_apps_vet_status__end_of_life",signature="GOOD: App meets migration criteria; note, local customization will require additional review", "apps_splunk_apps_vet_status__good",\
        signature="ISSUE: At least one installation of this app is in disabled state; further review is required","apps_splunk_apps_vet_status__issue_disabled",signature="ISSUE: Multiple versions of the app found; further review is required", "apps_splunk_apps_vet_status__issue_multiple_versions",\
        signature="WARNING: App is not Splunk 9.x certified; further review is required", "apps_splunk_apps_vet_status__warning_not_latest_certified",\
        signature="WARNING: App needs to be upgraded to gain Splunk 9.x support", "apps_splunk_apps_vet_status__warning_upgrade_for_latest_support",\
        signature="WARNING: No record of app passing AppInspect; further review is required", "apps_splunk_apps_vet_status__warning_no_appinspect_record",\
        isnull(signature), "apps_splunk_apps_vet_status", true(), "oops") \
    | fields - signature \
    | filldown customer_name | eval search="7"] \
| append \
