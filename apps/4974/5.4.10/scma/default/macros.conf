
[scma_comment(1)]
description = Comments out sections in search
args = text
definition = ""
iseval = 1

[exclude_splunk_apps(1)]
args = app_name
definition = | eval app_title = lower($app_name$) \
| eval is_premium_app = if(app_title=="itsi" OR app_title like "%a-itsi%" OR app_title=="sa-indexcreation" OR app_title=="sa-itoa" OR app_title=="sa-useraccess" OR app_title=="splunk_app_infrastructure" OR app_title=="splunk_sa_cim",1,0) \
| eval is_default_app = if(app_title=="system" OR app_title=="launcher" OR app_title=="splunk_instrumentation" OR app_title=="splunk_archiver" OR app_title=="splunk_metrics_workspace" OR app_title=="splunk_secure_gateway" OR app_title=="splunk-dashboard-studio" OR app_title=="splunk_monitoring_console" OR app_title=="splunk_rapid_diag"  OR app_title=="python_upgrade_readiness_app" OR app_title like "splunk_essentials_%", 1,0) \
| where is_premium_app == 0 AND is_default_app == 0

[ko_migrate_action(1)]
args = app_usage_perc
definition = case($app_usage_perc$>60,"Migrate",$app_usage_perc$>15,"Review/Prune",$app_usage_perc$>5,"Consilidate/Merge",1=1,"Decommision")

[ko_single_instance]
definition = | appendcols\
    [| rest `scma_rest_timeout` splunk_server_group=dmc_group_search_head /services/search/distributed/peers \
    | stats count \
    |  where count==0 \
    | eval single_instance = if(isnull(splunk_server),1,0)]

[kom_init_setup]
definition = | eval created=strftime(now(),"%Y-%m-%dT%H:%M:%S.%Q") \
    | outputlookup scma_ko_apps_installed.csv append=false \
    | outputlookup scma_ko_searchhead_list.csv append=false \
    | outputlookup scma_ko_dashboard_assets.csv append=false \
    | outputlookup scma_ko_dashboards_viewed.csv append=false \
    | outputlookup scma_ko_report_assets.csv append=false \
    | outputlookup scma_ko_report_refs.csv append=false \
    | outputlookup scma_ko_reports_unused.csv append=false \
    | outputlookup scma_ko_reports_viewed.csv append=false \
    | outputlookup scma_ko_lookup_assets.csv append=false \
    | outputlookup scma_ko_lookups_used.csv append=false \
    | outputlookup scma_ko_macro_all_used.csv append=false \
    | outputlookup scma_ko_macro_assets.csv append=false \
    | outputlookup scma_ko_macro_directly_used.csv append=false

[scma_check_info(1)]
args = check_name
definition = savedsearch "SCMA Check Info - Main" check_name="$check_name$"

[scma_drop_fields]
definition = fields - _timediff _tc _key punct

[scma_instance_info(1)]
args = instance
definition = eval $instance$ = lower($instance$) \
| lookup scma_splunk_instance_info_lookup host AS $instance$ OUTPUT host AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup scma_splunk_instance_info_lookup host AS $instance$ OUTPUTNEW host AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup scma_splunk_instance_info_lookup host_fqdn AS $instance$ OUTPUTNEW host AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup scma_splunk_instance_info_lookup serverName AS $instance$ OUTPUTNEW host AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup scma_splunk_instance_info_lookup host_resolved AS $instance$ OUTPUTNEW host AS $instance$_name host_fqdn host_resolved serverName guid name label role \
| lookup scma_splunk_instance_info_lookup splunk_server AS $instance$ OUTPUTNEW host AS host_name host_fqdn host_resolved serverName guid name label role \
| makemv delim="," role \
| eval label = if(isnull(label) OR label="", coalesce(host,splunk_server), label), name = if(isnull(name) OR name="", "adhoc", name)

[scma_ko_all_dashboards]
definition = rest `scma_rest_timeout` /servicesNS/-/-/data/ui/views splunk_server_group=dmc_group_search_head \
| rename eai:acl.app AS app_name eai:type AS view_type eai:acl.owner AS owner eai:acl.sharing AS permissions \
| lookup scma_ko_searchhead_list host as splunk_server OUTPUT shc_name \
| where isnotnull(shc_name) \
| eval xmlDataLen = length('eai:data') \
| eval eai:data = if(xmlDataLen > 150000, substr('eai:data',0,150000), 'eai:data') \
| eval eai:data = if(xmlDataLen > 150000,'eai:data'."...truncated!", 'eai:data') \
| where view_type!="html" \
| fields - id isDashboard isVisible published disabled updated rootNode \
`scma_ko_dashboard_parse_limits` \
| xpath field=eai:data outfield=dashboard_refresh "//dashboard/@refresh" \
| xpath field=eai:data outfield=form_refresh "//form/@refresh" \
| xpath field=eai:data outfield=all_the_things "//search" \
| xpath field=eai:data outfield=all_the_refs "//search/@ref"\
| eval all_the_things = mvappend(all_the_things,all_the_refs) \
| eval all_the_things=mvfilter(NOT match(all_the_things, "^\s$")) \
| spath input=eai:data output=inputs path=form.fieldset.input \
| eval inputs=mvfilter(match(inputs, "<search")) \
| fields - all_the_refs, eai:data eai:acl.perms eai:acl.perms.* eai:acl.removable eai:acl.can_write eai:acl.modifiable eai:acl.can_share_* eai:acl.can_list eai:acl.can_change_perms eai:type eai:userName \
| eval app_name=if(match(app_name, "[-\s_]"), rtrim(app_name, "="), app_name) \
| eval app_clear=if(match(app_name, "[-\s_]"), app_name, null()) \
| eval user=owner, "eai:acl.owner"=owner, "eai:acl.app"=app_name \
| eval owner=if(match(user, "[-\s_]"), rtrim(owner, "="), user) \
| eval user_clear=if(match(user, "[-\s_]"), user, null()) \
| spath input=inputs output=input_searches path=search.query \
| fields - inputs \
| makemv tokenizer="(((?ms)<search.*?<\/search>)|((?ms)^(?!Null$|^$|\s+)(.*?(\n|$))))" all_the_things\
| eval all_the_things = if(isnull(all_the_things),"",all_the_things) \
| mvexpand all_the_things \
| eval all_the_things = if(match(all_the_things, "<search(>|\s)"),all_the_things,"<search ref=\"".all_the_things."\"></search>")\
| spath input=all_the_things output=main_search path=search.query \
| spath input=all_the_things output=earliest_time path=search.earliest \
| spath input=all_the_things output=base_name_unhashed path=search{@id} \
| spath input=all_the_things output=ref_base_name path=search{@base}\
| spath input=all_the_things output=ref_report_name path=search{@ref}\
| fields - all_the_things \
| eval realtime = if(match(earliest_time,"rt"),1,0) \
| eval alltime = if(earliest_time==0,1,0) \
| eval input_flag=if(in(input_searches, main_search), "input", "body") \
| eval len=length(md5(base_name_unhashed)), search_cksum=md5(main_search) \
| eval search_rmd="RMD5" . substr(md5(base_name_unhashed), len-15), is_base_search=if(isnotnull(search_rmd),1,0)\
| streamstats count(eval(if(isnotnull(base_name_unhashed), search_string, 0))) AS search_num by splunk_server, app_name, title \
| eventstats count(eval(if(isnotnull(base_name_unhashed), search_string, null()))) AS named_searches by splunk_server, app_name, title \
| eval base_name=case(match(base_name_unhashed, "[-\s_]"), search_rmd, isnotnull(base_name_unhashed), base_name_unhashed, search_num - named_searches < 1, null(), 1=1, "search" . tostring(search_num - named_searches)) \
| rex field=description mode=sed "s/^\s+//g" \
| eval description_short = if(isnotnull(trim(description," ")),substr(description,0,127),"") \
| eval description_short = if(len(description_short)>126,description_short."...",description_short) \
| fillnull value=0 dashboard_refresh form_refresh \
| eval refresh_interval = dashboard_refresh+form_refresh \
| eval refresh_interval = if(refresh_interval>0,refresh_interval,null()) \
| fields shc_name splunk_server app_name title description_short description user owner author permissions label app_clear user_clear base_name base_name_unhashed is_base_search input_flag input_searches main_search named_searches search_cksum search_num ref_base_name ref_report_name search_rmd refresh_interval realtime alltime\
| outputlookup append=false scma_assets_xml_dashboards

[scma_ko_all_html_dashboards]
definition = rest `scma_rest_timeout` /servicesNS/-/-/data/ui/views splunk_server_group=dmc_group_search_head \
| rename eai:acl.app AS app_name eai:type AS view_type eai:acl.owner AS owner eai:acl.sharing AS permissions \
| lookup scma_ko_searchhead_list host as splunk_server OUTPUT shc_name \
| where isnotnull(shc_name) \
| eval xmlDataLen = length('eai:data') \
| eval eai:data = if(xmlDataLen > 150000, substr('eai:data',0,150000), 'eai:data') \
| eval eai:data = if(xmlDataLen > 150000,'eai:data'."...truncated!", 'eai:data') \
| where view_type=="html" \
| eval app_name=if(match(app_name, "[-\s_]"), rtrim(app_name, "="), app_name) \
| eval app_clear=if(match(app_name, "[-\s_]"), app_name, null()) \
| eval user=owner, "eai:acl.owner"=owner, "eai:acl.app"=app_name \
| eval owner=if(match(user, "[-\s_]"), rtrim(owner, "="), user) \
| eval user_clear=if(match(user, "[-\s_]"), user, null()) \
| fields shc_name splunk_server app_name title user owner author permissions label app_clear user_clear main_search_html \
| outputlookup append=false scma_assets_html_dashboards

[scma_ko_all_lookups]
definition = inputlookup scma_ko_searchhead_list \
    | map maxsearches=100 search="| rest `scma_rest_timeout` /servicesNS/-/-/data/transforms/lookups splunk_server=$host$ \
      | rename eai:acl.app AS app_name, title AS transform, eai:acl.owner AS owner \
      | eval shc_name = \"$shc_name$\"" \
  | fillnull filename value="" \
  | fields shc_name splunk_server app_name transform filename type owner \
  | join type=outer splunk_server app_name transform [ \
    | inputlookup scma_ko_searchhead_list \
    | map maxsearches=100 search="| rest `scma_rest_timeout` /servicesNS/-/-/data/props/lookups splunk_server=$host$ \
      | rename eai:acl.app AS app_name eai:acl.owner AS owner \
      | fields splunk_server app_name transform stanza owner type \
      | eval shc_name = \"$shc_name$\"" \
    | stats values(stanza) AS stanza by shc_name splunk_server app_name transform type owner] \
  | append [ \
    | inputlookup scma_ko_searchhead_list \
    | map maxsearches=100 search="| rest `scma_rest_timeout` /servicesNS/-/-/data/lookup-table-files splunk_server=$host$ \
      | rename eai:acl.app AS app_name, title AS filename, eai:acl.owner AS owner \
      | fields splunk_server app_name filename owner \
      | eval shc_name = \"$shc_name$\""] \
  | fillnull transform value="" \
  | fillnull type value="default" \
  | stats values(stanza) AS stanzas by shc_name splunk_server app_name filename transform type owner \
  | eval dc_inuse_type = 0 \
  | fields shc_name splunk_server app_name filename transform stanzas dc_inuse_type type owner \
  | outputlookup append=false scma_assets_lookups

[scma_ko_all_macros]
definition = inputlookup scma_ko_searchhead_list \
  | map maxsearches=100 search="| rest `scma_rest_timeout` /servicesNS/-/-/admin/macros splunk_server=$host$ \
    | rename eai:acl.app AS app_name, title AS macro_name, eai:acl.owner AS owner eai:acl.sharing AS sharing \
    | eval shc_name = \"$shc_name$\"" \
  | rex field=macro_name "(?<simple_macro_name>[\w,-]+)(\(|$)" \
  | eval type = "all" \
  | eval dc_inuse_type = 0 \
  | rex field=definition max_match=0 "`(?<sub_macro_names>[\w,-]+)(\(|`)" \
  | fields shc_name splunk_server app_name macro_name simple_macro_name definition dc_inuse_type type owner sharing sub_macro_names \
  | mvexpand sub_macro_names\
  | outputlookup append=false scma_assets_macros

[scma_ko_all_reports_alerts]
definition = inputlookup scma_ko_searchhead_list \
| map maxsearches=100 search=" \
  | rest `scma_rest_timeout` /servicesNS/-/-/saved/searches splunk_server=$host$ \
    | fields splunk_server, disabled, search, title, eai:acl.owner, eai:acl.app, eai:acl.sharing, description, alert_comparator, alert_threshold, alert_type, actions is_scheduled, cron_schedule, max_concurrent, dispatchAs, dispatch.earliest_time, dispatch.latest_time actions, action.summary_index._name, action.lookup.filename \
    | eval shc_name = \"$shc_name$\"" \
| where disabled=0 \
| eval search_cksum=md5(search), length=len(md5(title)), search_title=if(match(title,"[-\\s_]"),("RMD5" . substr(md5(title),(length - 15))),title), \
    user='eai:acl.owner', "eai:acl.owner"=if(match(user,"[-\\s_]"),rtrim('eai:acl.owner',"="),user), user_clear=if(match(user,"[-\\s_]"),user,null()), \
    app_name='eai:acl.app', "eai:acl.app"=if(match(app_name,"[-\\s_]"),rtrim('eai:acl.app',"="),app_name), app_clear=if(match(app_name,"[-\\s_]"),app_name,null()), \
    commands=split(search,"|"), ol_cmd=mvindex(commands,mvfind(commands,"outputlookup")), si_cmd=mvindex(commands,mvfind(commands,"collect")) \
| rex field=ol_cmd "outputlookup (?<ol_tgt_filename>.+)" \
| rex field=si_cmd "index\\s?=\\s?(?<si_tgt_index>[-_\\w]+)" \
| eval si_tgt_index=coalesce(si_tgt_index,'action.summary_index._name'), ol_tgt_filename=coalesce(ol_tgt_filename,'action.lookup.filename') \
| rex field=description mode=sed "s/^\\s+//g" \
| eval description_short=if(isnotnull(trim(description," ")),substr(description,0,127),""), description_short=if((len(description_short) > 126), \
    (description_short . "..."),description_short), is_alert=if((((alert_comparator != "") AND (alert_threshold != "")) AND (alert_type != "always")),1,0), \
    has_report_action=if((actions != ""),1,0) \
| rename eai:acl.owner AS owner, eai:acl.sharing AS permissions, dispatch.earliest_time AS dispatch_earliest_time, dispatch.latest_time AS dispatch_latest_time \
| fields + splunk_server, app_name, description_short, description, user, shc_name, title, search_title, app_clear, owner, permissions, is_scheduled, cron_schedule, max_concurrent, dispatchAs, dispatch_earliest_time, dispatch_latest_time, actions, search, search_cksum, si_tgt_index, ol_tgt_filename, is_alert, has_report_action \
| eval object_type=case((has_report_action == 1),"report_action",(is_alert == 1),"alert",true(),"savedsearch") \
| outputlookup append=false scma_assets_reports_alerts

[scma_ko_dashboard_parse_limits]
definition = | eval xmlDataLen = length('eai:data') \
    | eval eai:data = if(xmlDataLen > 150000, substr('eai:data',0,150000), 'eai:data') \
    | eval eai:data = if(xmlDataLen > 150000,'eai:data'."...truncated!", 'eai:data')

[scma_ko_lookups_in_spl(1)]
args = field_name
definition = | rex field=$field_name$ max_match=0 "(inputlookup|(\\\|\s+|\\\|)lookup|inputlookup\s+(\w+=(\w+|\w+\s+)){0,5})\s+(?<lookupfilename>[\w-]+)(\s|\.csv|$)"

[scma_ko_summarize_data(1)]
args = check_name
definition = appendpipe [stats count | where count=0 | fields - count | eval severity_level=-1, signature="This check did not produce results"] \
| eval _time=if(isnull(_time), now(), _time), check_name="$check_name$", _key="customer_name"\
| lookup scma_customer_details _key OUTPUT value AS customer_name\
| eval customer_name=coalesce(customer_name,"unknown"),check_time=now()\
| table *\
| `scma_drop_fields` | `scma_ko_summary_index`

[scma_ko_summary_index]
args = check_name
definition = collect `scma_source_introspection_index` sourcetype=scma:check:ko

[scma_local_host]
definition = [ | rest /services/server/info f=host splunk_server=local | return host ]

[scma_rest_filter_name(1)]
args = name
definition = [ |inputlookup scma_splunk_instance_info_lookup where name="$name$*" | return splunk_server ]

[scma_rest_filter_role(1)]
args = role
definition = [ |inputlookup scma_splunk_instance_info_lookup | makemv delim="," role | search role="$role$*" | return splunk_server ]

[scma_rest_timeout]
definition = timeout=300

[scma_set_index]
definition = index=scma
# definition = `scma_source_introspection_index`

[scma_source_audit_index]
definition = index=_audit

[scma_source_internal_index]
definition = index=_internal

[scma_source_introspection_index]
definition = index=_introspection

[scma_summarize_data(1)]
args = check_name
definition = appendpipe [stats count \
| where count=0 | fields - count | eval severity_level=-1, signature="This check did not produce results"] \
| eval _time=if(isnull(_time), now(), _time), check_name="$check_name$", _key="customer_name"\
| eval check_time=_time\
| lookup scma_customer_details _key OUTPUT value AS customer_name\
| eval customer_name=coalesce(customer_name,"unknown")\
| table *\
| `scma_drop_fields` \
| `scma_summary_index`

[scma_summary_index]
definition = collect `scma_source_introspection_index` sourcetype=scma:check

[get_normalized_search_id(1)]
description = Normalize Splunk Search ID
args = search_id
definition = rex field=$search_id$ mode=sed "s/^'|'$//g" \
| rex field=$search_id$ "_(?<search_id_normalized1>\d+[._]\d+)_" \
| rex field=$search_id$ "(?<search_id_normalized2>\d+[._]\d+$)" \
| rex field=$search_id$ "(?<search_id_normalized3>^\d+[._]\d+)" \
| eval search_id_normalized=if(isnull(search_id_normalized1),search_id_normalized2,search_id_normalized1) \
| eval search_id_normalized=if(isnull(search_id_normalized),search_id_normalized3,search_id_normalized) \
| eval search_id_normalized=if(isnull(search_id_normalized),search_id,search_id_normalized)\
| rex field=search_id_normalized mode=sed "s/\./_/g"\
| rex field=search_id_normalized mode=sed "s/^\w+;.*;|^_ACCELERATE_DM_|^_ACCELERATE_|_ACCELERATE_$//g"\
| fields - search_id_normalized1,search_id_normalized2,search_id_normalized3

[get_fields_list]
definition = rename "eai:acl.*" as "*" , "eai:*" AS "*"\
| fields - "perms.*", "can_*", id, published, removable, modifiable, updated, label \
| fieldsummary \
| rename field AS Fields_List \
| fields Fields_List \
| where Fields_List!="Fields_List" \
| mvcombine Fields_List \
| eval Fields_List=mvjoin(Fields_List," ")

### Adding from SCMA Internal ###
[scma_check_base(1)]
args = check_name
definition = `scma_set_index` sourcetype IN ("scma_json","scma:import:lambda") check_name="$check_name$"

[scma_severity_level_filter]
definition = | eval severity_text = case(severity_level==5,severity_critical_text,severity_level==4, severity_high_text,severity_level==3,severity_medium_text,severity_level==2,severity_low_text,severity_level==1,severity_normal_text,severity_level==0,severity_info_text,severity_level==-1,"No results were returned.",severity_level==-2,"This check is not applicable to this environment",1==1,-1)

[scma_severity_level_normalize]
definition = | eval severity_level=case(severity_level==("-2"),"-2",severity_level==("-1"),"-1",severity_level==("0"),"1",severity_level==("1"),"0",severity_level==("2"),"2",severity_level==("3"),"3",severity_level==("4"),"4",severity_level==("5"),"5",1==1,"-1")

[scma_severity_level_set_properties]
definition = | rangemap field=severity_level NA=-2--2 None=-1--1 Info=0-0 Normal=1-1 Low=2-2 Medium=3-3 High=4-4 Critical=5-5\
| rename severity_level AS severity name as host_role_id \
| sort - severity + host_role_id\
| eval severity=range

[scma_severity_level_set_properties_pre51]
definition = `scma_severity_level_normalize` `scma_severity_level_set_properties`

[splunk_server_setup]
definition = splunk_server = *

[get_index_reference(1)]
description = Extracts Any Reference to Index(es) (Quick)
args = field
definition = rex field=$field$ max_match=100 "index\s*=[\s\"]?(?<Index_Reference1>[a-z0-9-_*]+)[\s\"]" \
| rex field=$field$ max_match=100 "index\s*=\s*\"?(?<Index_Reference2>_[a-z]+)[\s\"]" \
| rex field=$field$ max_match=100 "index=(?<Index_Reference3>[a-z0-9-_*]+)" \
| rex field=$field$ max_match=100 "index=(?<Index_Reference4>[`a-z0-9-_*]+)" \
| rex field=$field$ max_match=100 "index=(?<Index_Reference5>\w+)"\
| rex field=$field$ max_match=100 "\|\s*collect\s+(?<Index_Reference6>`\S+`)" \
| eval Index_Reference = mvdedup(trim(mvappend(Index_Reference1,Index_Reference2,Index_Reference3,Index_Reference4,Index_Reference5,Index_Reference6))) \
| eval Index_Reference = if(match($field$, "index\s*=\s*_\*"), "all-internal-indexes", Index_Reference) \
| eval Index_Reference = if(match($field$, "index\s*=\s*\*|index=\"\*\""), "all-indexes", Index_Reference) \
| eval Index_Reference = mvfilter((!match(Index_Reference,"^1$"))) \
| eval Index_Reference = if(isnull(Index_Reference) OR Index_Reference="", "no-index-reference", Index_Reference) \
| fields - Index_Reference1 Index_Reference2 Index_Reference3 Index_Reference4 Index_Reference5 Index_Reference6

## Discovery Macros
[discover_instances]
definition = rest /servicesNS/-/-/server/info splunk_server=* \
| eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", null()) , is_indexer = if(server_roles="indexer" OR isForwarding = 0, "yes", null()), lower_splunk_server = lower(splunk_server), server_roles = mvjoin(server_roles, ",") \
| fields lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_connected is_search_head is_indexer guid server_roles isForwarding 

[discover_idxc]
definition = append \
    [| rest /servicesNS/-/-/cluster/config splunk_server=* \
    | eval lower_splunk_server = lower(splunk_server) , manager_uri = coalesce(manager_uri,master_uri), manager_uri = if(manager_uri="?" OR manager_uri="", null(), manager_uri) \
    | where isnotnull(manager_uri) \
    | eval is_cm = if(mode="master" OR mode="manager", "yes", null()) , is_idxc = if(mode="slave" OR mode="peer", "yes", null()) \
    | fields lower_splunk_server splunk_server cluster_label is_cm is_idxc ]

[discover_shc]
definition = append \
    [| rest /servicesNS/-/-/shcluster/config splunk_server=* \
    | eval lower_splunk_server = lower(splunk_server) , shcluster_label = if(isnull(shcluster_label) OR shcluster_label="", null(), shcluster_label) \
    | where isnotnull(shcluster_label) \
    | eval is_shc = "yes" \
    | fields lower_splunk_server splunk_server shcluster_label is_shc ]

[discover_sh]
definition = append \
    [| tstats dc(data.search_props.sid) as num_searches Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search earliest=-7d by data.search_props.search_head \
    | rename data.search_props.search_head as splunk_server \
    | eval is_search_head = "yes" , lower_splunk_server = lower(splunk_server) \
    | fields lower_splunk_server splunk_server is_search_head num_searches ]

[discover_hf]
definition = append \
    [ search index=_internal sourcetype=splunkd source="*/splunk/*/metrics.log" group=per_index_thruput NOT series IN (_*,*summary*,os*,risk,notable,anomaly_detection,itsi_grouped_alerts,itsi_notable_audit,itsi_tracked_alerts,security_getting_started,cim_modactions,missioncontrol) earliest=-1h \
    | eval lower_splunk_server = lower(host) \
    | stats count latest(host) as splunk_server by lower_splunk_server \
    | fields lower_splunk_server splunk_server \
    | join type=left lower_splunk_server \
        [| rest /servicesNS/-/-/server/info splunk_server=* \
        | eval lower_splunk_server = lower(splunk_server) \
        | stats values(server_roles) as server_roles last(splunk_server) as splunk_server by lower_splunk_server \
        | eval server_roles = mvjoin(server_roles, ",") \
        | fields lower_splunk_server splunk_server server_roles ] \
    | makemv delim="," server_roles \
    | where ! server_roles in("search_head","indexer") \
    | eval is_heavy_forwarder = "yes" \
    | fields lower_splunk_server splunk_server is_heavy_forwarder ]

[discover_premium]
definition = append \
    [ search (index=_internal sourcetype=splunkd_access method=POST CASE(/services/shcluster/member) ) OR (index=_internal sourcetype=splunkd_access uri_path IN ("*/itsi*", "*/SplunkEnterpriseSecuritySuite*") ) OR (index=_internal sourcetype=splunk_web_access) earliest=-24h \
    | eval lower_splunk_server = lower(host) \
    | stats values(uri_path) as uri_path latest(host) as splunk_server by lower_splunk_server \
    | eval is_es = if( uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", "yes", null() ) , is_itsi = if( uri_path LIKE "%/itsi/%", "yes", null() ) \
    | where isnotnull(is_es) OR isnotnull(is_itsi) \
    | fields lower_splunk_server splunk_server is_es is_itsi ]

[discover_label]
definition = stats values(isForwarding) as isForwarding values(guid) as guid values(serverName) as serverName values(host_resolved ) as host_resolved values(host_fqdn) as host_fqdn values(host) as host values(cluster_label) as cluster_label values(shcluster_label) as shcluster_label values(is_cm) as is_cm values(is_connected) as is_connected values(is_es) as is_es values(is_heavy_forwarder) as is_heavy_forwarder values(is_idxc) as is_idxc values(is_indexer) as is_indexer values(is_itsi) as is_itsi values(is_search_head) as is_search_head values(is_shc) as is_shc values(server_roles) as server_roles max(num_searches ) as num_searches last(splunk_server) as splunk_server by lower_splunk_server \
| eval host = if(isnull(host) OR host="", lower_splunk_server, host) \
| eval label = case ( isnotnull(cluster_label) AND is_idxc = "yes", cluster_label, isnotnull(shcluster_label) AND is_shc = "yes", shcluster_label, true(), host ) \
| eval name = case ( isnotnull(cluster_label) AND is_idxc = "yes", "idxc", isnotnull(shcluster_label) AND is_shc = "yes" AND is_itsi = "yes", "itsi-shc", isnotnull(shcluster_label) AND is_shc = "yes" AND is_es = "yes", "es-shc", isnotnull(shcluster_label) AND is_shc = "yes", "shc", is_cm = "yes", "cm", is_indexer = "yes" AND match(server_roles,"indexer"), "idx", is_itsi = "yes" AND match(server_roles,"search_head"), "itsi", is_es = "yes" AND match(server_roles,"search_head"), "es", is_search_head = "yes" OR match(server_roles,"search_head"), "sh", is_heavy_forwarder = "yes" AND isnull(name), "hf", true(), "adhoc" ) \
| eval role = case ( isnull(server_roles) AND is_indexer = "yes", "indexer", isnull(server_roles) AND is_search_head = "yes", "search_head", isnull(server_roles) AND is_heavy_forwarder = "yes", "heavy_forwarder ", true(), server_roles ) \
| foreach host host_fqdn host_resolved serverName \
    [| eval <<FIELD>> = if(isnull(<<FIELD>>) OR <<FIELD>>="", splunk_server, <<FIELD>>), <<FIELD>> = lower(<<FIELD>>) ] \
| fillnull value="no" is_connected,is_search_head \
| streamstats dc(label) as count by name \
| eval name = name . "-" . printf("%02d", count), name = if(match(name, "idx-\d+"), "idx-01", name)

## NEW Discovery Macros Start
[discover_roles]
definition = search (index=_internal) earliest=-7d sourcetype=splunkd NOT(CASE(MetricSchemaProcessor)) Metrics TERM(group=instance) TERM(name=instance) (deployment_client OR cluster_search_head OR search_head OR indexer OR cluster_slave OR search_peer OR license_master) NOT(universal_forwarder) \
| eval mv_roles=split(instance_roles, ", ") \
| stats count values(instance_roles) as roles values(mv_roles) as mv_roles values(index_cluster_label) as index_cluster_label values(sh_cluster_label) as sh_cluster_label by instance_guid server_name \
| eval index_cluster_label=if(index_cluster_label="none", "", index_cluster_label) , sh_cluster_label=if(sh_cluster_label="none", "", sh_cluster_label) \
| stats count(eval(mv_roles="indexer")) as indexer count(eval(mv_roles="search_peer")) as search_peer count(eval(mv_roles="cluster_search_head")) as cluster_search_head count(eval(mv_roles="search_head")) as search_head count(eval(mv_roles="cluster_slave")) as cluster_peer count(eval(mv_roles="kv_store")) as kv_store_role count(eval(mv_roles="cluster_master")) as cluster_manager count(eval(mv_roles="license_master")) as license_manager count(eval(mv_roles="deployment_server")) as deployment_server count(eval(mv_roles="deployment_client")) as deployment_client count(eval(mv_roles="shc_captain")) as shc_captain count(eval(mv_roles="shc_member")) as shc_member values(sh_cluster_label) as sh_cluster_label by instance_guid server_name roles index_cluster_label \
| eval roles=split(roles, ", ") \
| rename instance_guid as guid \
| rename server_name as host \
| eval host=lower(host)

[discover_guid]
definition = append maxtime=60 maxout=50000 timeout=60 \
    [| search (index=_internal) Metrics sourcetype=splunkd TERM(group=tcpin_connections) earliest=-25min latest=now TERM(fwdType=full) \
    | stats values(connectionType) as tcp_connectionType values(arch) as tcp_arch values(version) as tcp_version values(fwdType) as tcp_fwdType values(os) as tcp_os sum(kb) as tcp_sum_kb dc(host) as tcp_targets_touched by hostname guid \
    | table * \
    | eval hostname = lower(host) , isForwarding=1 ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| search index=_introspection component=hostwide earliest=-24h \
    | eval host = lower(host) \
    | stats values(data.cpu_count) as cpu_count values(data.virtual_cpu_count) as vcpu_count values(data.splunk_version) as introspection_splunk_version values(data.os_version) as introspection_os_version by host data.instance_guid \
    | rename data.instance_guid as guid] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest /servicesNS/-/-/server/info splunk_server=* \
    | eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", null()) , is_indexer = if(server_roles="indexer" OR isForwarding = 0, "yes", null()), host_resolved = lower(host_resolved), host_fqdn = lower(host_fqdn), lower_splunk_server = lower(splunk_server), host = lower(host) , server_roles = mvjoin(server_roles, ",") \
    | fields lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_connected is_search_head is_indexer guid server_roles isForwarding ] \
| stats values(*) as * by guid

[discover_finalize]
definition = append maxtime=60 maxout=50000 timeout=60 \
    [| tstats dc(data.search_props.sid) as num_searches Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search earliest=-7d by data.search_props.search_head \
    | rename data.search_props.search_head as host \
    | eval is_search_head = "yes" , host = lower(host) \
    | fields host is_search_head num_searches ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [ search (index=_internal sourcetype=splunkd_access method=POST CASE(/services/shcluster/member) ) OR (index=_internal sourcetype=splunkd_access uri_path IN ("*/itsi*", "*/SplunkEnterpriseSecuritySuite*") ) OR (index=_internal sourcetype=splunk_web_access) earliest=-90m \
    | eval host = lower(host) \
    | stats values(uri_path) as uri_path by host \
    | eval is_es = if( uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", "yes", null() ) , is_itsi = if( uri_path LIKE "%/itsi/%", "yes", null() ) \
    | where isnotnull(is_es) OR isnotnull(is_itsi) \
    | fields host is_es is_itsi ] \
| stats values(*) as * by host \
| eval primary_role=case(indexer=1,"indexer", cluster_manager=1,"cluster_manager", shc_member=1 OR shc_captain=1,"search_head_cluster", cluster_search_head=1,"cluster_search_head", search_head=1,"search_head", license_manager=1,"license_manager", deployment_server=1,"deployment_server", tcp_fwdType="full","heavy_forwarder", tcp_fwdType="uf","universal_forwarder" ) \
| eval index_cluster_label = if(isnull(index_cluster_label) OR index_cluster_label="", null(), index_cluster_label), search_head_cluster = if(isnull(search_head_cluster) OR search_head_cluster="", null(), search_head_cluster) \
| eval roles = case(isnull(roles) AND primary_role="heavy_forwarder", "heavy_forwarder", true(), roles) \
| eval version=coalesce(tcp_version, introspection_splunk_version) \
| eval label = case ( primary_role="cluster_manager", host, primary_role="search_head_cluster", sh_cluster_label, isnotnull(index_cluster_label), index_cluster_label, true(), host ) \
| eval name = case ( primary_role = "search_head_cluster" AND is_itsi = "yes", "itsi-shc", primary_role = "search_head_cluster" AND is_es = "yes", "es-shc", primary_role = "search_head_cluster", "shc", primary_role = "indexer" AND isnull(index_cluster_label), "idx", primary_role = "indexer" AND isnotnull(index_cluster_label), "idxc", (primary_role = "search_head" OR primary_role = "cluster_search_head") AND is_itsi = "yes", "itsi", (primary_role = "search_head" OR primary_role = "cluster_search_head") AND is_es = "yes", "es", primary_role = "search_head" OR primary_role = "cluster_search_head" OR is_search_head="yes", "sh", primary_role = "cluster_manager", "cm", primary_role = "heavy_forwarder", "hf", true(), "adhoc" ) \
| eval is_search_head = case(primary_role="search_head", "yes", primary_role="indexer" OR primary_role = "heavy_forwarder", "no", true(), is_search_head ) \
| streamstats dc(label) as count by name \
| eval name = name . "-" . printf("%02d", count) \
| eval roles = if(isnull(roles) AND is_search_head="yes", "search_head", roles) \
| eval role=mvjoin(roles,",") , splunk_server = if(isnull(splunk_server) OR splunk_server="", host, splunk_server) \
| foreach host host_fqdn host_resolved serverName lower_splunk_server \
    [| eval <<FIELD>> = if(isnull(<<FIELD>>) OR <<FIELD>>="", splunk_server, <<FIELD>>), <<FIELD>> = lower(<<FIELD>>) ] \
| eval _time = now() \
| fillnull value="no" is_connected \
| fillnull value=0 num_searches 
## NEW Discovery Macros End

[scma_debug_tee(1)]
args = scma_debug_tee_name
definition = appendpipe \
    [ head 5 \
    | rename * AS SCMA_DEBUG_* \
    | foreach SCMA_DEBUG_*\
        [ eval <<MATCHSTR>>=<<FIELD>> ] \
    | fields - SCMA_DEBUG_*\
    | eval Scma_debug_tee_name="$scma_debug_tee_name$"\
    | outputlookup scma_debug_tee.csv append=true \
    | where 1==2\
]

[scma_debug_tee(2)]
args = scma_debug_tee_name, count
definition = appendpipe \
    [ head $count$\
    | rename * AS SCMA_DEBUG_* \
    | foreach SCMA_DEBUG_*\
        [ eval <<MATCHSTR>>=<<FIELD>> ] \
    | fields - SCMA_DEBUG_*\
    | eval Scma_debug_tee_name="$scma_debug_tee_name$"\
    | outputlookup scma_debug_tee.csv append=true\
    | where 1==2\
]

[scma_debug_tee_init]
definition = appendpipe \
  [ head 1\
  | where 1==2\
  | outputlookup scma_debug_tee.csv\
  | where 1==2]
