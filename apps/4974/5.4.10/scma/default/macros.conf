[scma_check_base_raw(1)]
args = check_name
definition = `scma_source_introspection_index` sourcetype=scma:check check_name="$check_name$"

[get_latest_results]
definition = eventstats latest(check_time) AS customer_check_time by customer_name check_name \
| where check_time == customer_check_time

[scma_redact(1)]
args = fields
definition = foreach $fields$ [| eval <<FIELD>> = MD5(<<FIELD>>) ]

# This Macro handles checks with no results
[scma_no_results(1)]
args = message
definition = appendpipe \
    [| stats count \
    | where count = 0 \
    | eval Search_Message = "$message$" \
    | fields - count ]


# This Macro retrieves Splunk Cloud Limits
[get_cloud_limits(1)]
args = check_name
definition = eval check_name="$check_name$" \
| lookup cloud_limits check_name OUTPUTNEW limit_classic limit_victoria limit_victoria_core limit_victoria_premium | fields - check_name

[get_cloud_limits_direct(1)]
args = check_name
definition = lookup cloud_limits check_name as $check_name$ OUTPUTNEW limit_classic limit_victoria limit_victoria_core limit_victoria_premium

