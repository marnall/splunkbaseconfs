[script://$SPLUNK_HOME/etc/apps/Titan_Wrapper_Splunk-splunk/bin/titan_wrapper.py]
# index = threatlist
# if no specified index above, the script log will end up in default index (usualy main)
source = Get_Titan_Threatlists_script
interval = 3600
sourcetype = threatlist:titan:downloadinfo
#passauth  enables Splunk to authenticate to the API in the script
passAuth = admin
python.version = python3
