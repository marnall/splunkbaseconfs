[ml_intel]
collection = ml_intel
external_type = kvstore
fields_list = _key,_time,domain,class,description,threat_key,weight,disabled,updated,user,confidence

[bot_intel]
collection = bot_intel
external_type = kvstore
fields_list = _key,_time,src,pcr_info,class,description,threat_key,weight,disabled,updated,user,confidence

[base_dga_comparison]
filename = base_dga_comparison.csv

[cdn_list]
filename = cdn_list.csv
min_matches = 1
default_match = false

# Sourcetype routing for indexed fields
[Z^2_training]
DEST_KEY = MetaData:Sourcetype
REGEX = ^\S+\ \|\ Z^2:Training
FORMAT = sourcetype::Z^2_training

[Z^2_alerting]
DEST_KEY = MetaData:Sourcetype
REGEX = ^\S+\ \|\ Z^2:Alerting
FORMAT = sourcetype::Z^2_alerting

[Z^2_download]
DEST_KEY = MetaData:Sourcetype
REGEX = ^\S+\ \|\ Z^2:Download
FORMAT = sourcetype::Z^2_download

[Z^2_threatintel]
DEST_KEY = MetaData:Sourcetype
REGEX = ^\S+\ \|\ Z^2:ThreatIntel
FORMAT = sourcetype::Z^2_threatintel

[REPORT-Z^2]
DELIMS = "|"
FIELDS = "time","service","log_level","operation","action_taken"
