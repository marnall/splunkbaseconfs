# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 2

[launcher]
author = Bright Consulting
version = 1.0.0
description = The Technical Add-on for the CyberArk extracts CyberArk helping to indexing  data from 3 CyberArk API REST endpoints into Splunk:- .../pimservices.svc/safes/ (Data about Safe Members)- .../api/Accounts                   (Data about accounts)- .../api/recordings                 (Data about recorded user sessions)Once the data is indexed in Splunk you are be able to analyze it in details.

[ui]
is_visible = 1
label = Cyberark_Api
docs_section_override = AddOns:released

[package]
id = TA-cyberark_api

[triggers]
reload.addon_builder = simple
reload.ta_cyberark_api_account = simple
reload.ta_cyberark_api_settings = simple
reload.passwords = simple

