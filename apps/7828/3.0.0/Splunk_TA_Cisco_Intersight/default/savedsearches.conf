[splunk_ta_cisco_intersight_delete_older_alarms_from_lookup]
disabled = 0
enableSched = 1
request.ui_dispatch_app = Splunk_TA_Cisco_Intersight
request.ui_dispatch_view = search
description = Alarms older than specified time will be deleted from `Cisco_Intersight_cond_alarms` lookup. (Note: Do not modify or manually execute this search.)
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 0 0 * * *
search = | inputlookup Cisco_Intersight_cond_alarms \
| eval epoch_mod_time=strptime(ModTime, "%Y-%m-%dT%H:%M:%S.%3N%Z") \
| fields _key, Moid, ModTime, Code, sha, CreateTime, Severity, InputName, epoch_mod_time \
| addinfo \
| where epoch_mod_time > info_min_time \
| table _key, Moid, ModTime, Code, sha, CreateTime, Severity, InputName \
| outputlookup Cisco_Intersight_cond_alarms

