[Cisco Intersight: Chassis Slot Utilization]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = 0
display.events.fields = ["source","sourcetype"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = Splunk_TA_Cisco_Intersight
request.ui_dispatch_view = search
search = | inputlookup cisco_intersight_equipment_chasses\
| rename RegisteredDevice.Moid as DeviceMoId\
| search DeviceMoId="*" \
| rename Moid as Chassis_Moid, \
         Name as "Chassis Name",\
         ChassisId as ChassisId\
| dedup Chassis_Moid\
| join type=left ChassisId\
    [ | inputlookup cisco_intersight_compute_bladeidentities\
      | eval used_slots = if(isnotnull(CurrentSlotId), CurrentSlotId, "null")\
      | stats list(used_slots) as used_slots by CurrentChassisId, RegisteredDevice.Moid, RegisteredDevice.DeviceHostname\
      | eval used_slots_count = mvcount(used_slots)\
      | eval empty_slot_count = 8 - used_slots_count\
      | eval Slots_in_Use = mvjoin(used_slots, ", ")\
      | rename CurrentChassisId as ChassisId\
      | table ChassisId, empty_slot_count, used_slots_count, Slots_in_Use\
    ]\
| join type=left DeviceMoId\
    [ | inputlookup cisco_intersight_compute_bladeidentities\
      | dedup RegisteredDevice.Moid\
      | rename RegisteredDevice.Moid as DeviceMoId \
      | rename RegisteredDevice.DeviceHostname as DeviceHostname \
      | where isnotnull(DeviceHostname) \
      | table DeviceMoId, DeviceHostname \
    ]\
| sort 0 -empty_slot_count\
| rename DeviceMoId as "Device Id", \
         DeviceHostname as "Intersight Domain", \
         Chassis_Moid as "Chassis Id", \
         empty_slot_count as "Total Unused Server Slots", \
         used_slots_count as "Slots with Servers", \
         Slots_in_Use as "IDs of Slots Connected to Server"\
| table "Intersight Domain", "Chassis Name", "Total Unused Server Slots", "Slots with Servers", "IDs of Slots Connected to Server"

[Cisco Intersight: Advisory Instances in Last 30 days]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = 0
display.events.fields = ["source","sourcetype"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = Splunk_TA_Cisco_Intersight
request.ui_dispatch_view = search
search = | inputlookup cisco_intersight_tam_advisoryinstances | eval epoch_time = strptime(CreateTime, "%Y-%m-%dT%H:%M:%S.%3NZ") \
| where epoch_time >= relative_time(now(), "-30d@d") \
| table AccountMoid, account_name, Moid, AffectedObject.ObjectType, AffectedObject.Name, AffectedObject.PlatformType, Advisory.Moid \
| rename Moid as InstanceMoid, AffectedObject.ObjectType as "Affected Object Type", AffectedObject.Name as "Affected Object", AffectedObject.PlatformType as "Affected Object Platform Type", Advisory.Moid as Advisory_Moid, AffectedObject.Moid as AffectedObject_Moid\
\
| join type=left AffectedObject_Moid [ \
    | inputlookup cisco_intersight_compute_physicalsummaries | rename Moid as AffectedObject_Moid, Name as "Affected Object" | table  "Affected Object", AffectedObject_Moid\
    | append [ | inputlookup cisco_intersight_equipment_chasses | rename Moid as AffectedObject_Moid, Name as  "Affected Object" | table  "Affected Object", AffectedObject_Moid ]\
    | append [ | inputlookup cisco_intersight_network_elements | rename Moid as AffectedObject_Moid, SwitchProfileName as  "Affected Object" | table  "Affected Object", AffectedObject_Moid ]\
]\
\
| join type=left Advisory_Moid [ | inputlookup cisco_intersight_tam_advisoryinfos | table State, Advisory.Moid | rename Advisory.Moid as Advisory_Moid ] \
| join type=left Advisory_Moid [ | inputlookup cisco_intersight_tam_advisorydefinitions | table Moid, Name, Description, Recommendation, Severity.Level, ModTime | rename Moid as Advisory_Moid, ModTime as "Last Updated At", Severity.Level as Severity | eval "Advisory Type" = "Advisory Definition" \
| append [| inputlookup cisco_intersight_tam_securityadvisories | table Moid, Name, Description, Recommendation, Severity.Level, ModTime | rename Moid as Advisory_Moid, ModTime as "Last Updated At", Severity.Level as Severity | eval "Advisory Type" = "Security Advisory"]] \
| rename Advisory_Moid as _Advisory_Moid, AccountMoid as _AccountMoid, InstanceMoid as _InstanceMoid, account_name as "Account Name" \
| table Name, Description, "Affected Object", "Affected Object Type", "Affected Object Platform Type", Severity, State, "Recommendation", "Account Name", "Last Updated At", "Advisory Type"

