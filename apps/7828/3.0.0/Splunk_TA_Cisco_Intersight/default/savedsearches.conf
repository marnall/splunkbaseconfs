search = | inputlookup cisco_intersight_compute_physicalsummaries | dedup Moid | rename OperPowerState as "Power State" | rename Moid as server_moid | join type=outer server_moid [ | inputlookup cisco_intersight_cond_hclstatuses | dedup Moid | rename ManagedObject.Moid as server_moid | table server_moid, Status, Reason, HardwareStatus, SoftwareStatus, ComponentStatus ] | mvexpand Owners.Owners | rename Owners.Owners as Owners_id | join type=inner Owners_id [ | inputlookup cisco_intersight_asset_targets | rename RegisteredDevice.Moid as Owners_id | rename Name as "Target" | table "Target", Owners_id] | rename Name as "Server Name" | table account_name, "Target", "Server Name", "Power State", Model, Serial, Status, Reason, HardwareStatus, SoftwareStatus, ComponentStatus
