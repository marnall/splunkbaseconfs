request.ui_dispatch_app = Splunk_TA_Cisco_Intersight
request.ui_dispatch_view = search
search = | inputlookup cisco_intersight_compute_physicalsummaries | where ObjectType="compute.PhysicalSummary" | append [| inputlookup cisco_intersight_network_elements] | eval version=coalesce(Version,Firmware) | rex field=SourceObjectType "compute\.(?<ComputeType>.*)"  | eval Type=coalesce(ComputeType,SwitchType) | rename AlarmSummary.Critical as Criticals, AlarmSummary.Warning as Warnings  | eval Health=case(Criticals >= 1,"Critical", Warnings >= 1,"Warning", 1=1, "Healthy")  | rename RegisteredDevice.ConnectionStatus as Status  | table  account_name, ManagementMode, Status, Health, Type, Name, Model, Serial, version, Owners.Owners | mvexpand Owners.Owners | rename Owners.Owners as Owners_id\
| join type=inner Owners_id [ | inputlookup cisco_intersight_asset_targets | rename RegisteredDevice.Moid as Owners_id | rename Name as Owners_name | table Owners_name, Owners_id] | fields account_name, Owners_name, Name, Type, Status, Health, Model, Serial, version, ManagementMode | rename account_name as Account, Owners_name as Target, Name as "Inventory Name", Type as "Inventory Type"

