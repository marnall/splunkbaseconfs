[dmc_assets]
filename = ../../splunk_monitoring_console/lookups/assets.csv

[mesh_settings]
collection = mesh_settings_kv
external_type = kvstore
fields_list = _key, value

[mesh_settings_default]
fields_list = id, label, value, default, desired, description
filename = mesh_settings_default.csv

[watchdog_alert_freq]
collection = watchdog_alert_freq_kv
external_type = kvstore
fields_list = _key, alert, index, sourcetype, updated

[watchdog_ignore]
collection = watchdog_ignore_kv
external_type = kvstore
fields_list = _key, ignored
