[script:custom_endpoint_decyfir_ioc]
match                 =/decyfir_ioc
handler               =decyfir_ioc.Send
script                =decyfir_ioc.py
scripttype            = persist
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3