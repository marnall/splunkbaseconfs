[netskope_idx]
search = index=main

[netskope_connection]
search = eventtype=netskope_idx sourcetype=netskope:connection

[netskope_network]
search = eventtype=netskope_idx sourcetype=netskope:network

[netskope_web]
search = eventtype=netskope_idx sourcetype=netskope:connection

[netskope_audit]
search = eventtype=netskope_idx sourcetype=netskope:audit

[netskope_application]
search = eventtype=netskope_idx sourcetype=netskope:application NOT ( (type="nspolicy" NOT app=*) OR ( type IN (malsite, malware, anomaly) ) )

[netskope_incident]
search = eventtype=netskope_idx sourcetype=netskope:incident

[netskope_alert]
search = eventtype=netskope_idx sourcetype=netskope:alert

[netskope_error]
search = index=_internal sourcetype=tanetskopeappforsplunk:log ERROR

[netskope_clients]
search = eventtype=netskope_idx sourcetype=netskope:clients

[netskope_infrastructure]
search = eventtype=netskope_idx sourcetype=netskope:infrastructure

[netskope_web_transaction]
search = eventtype=netskope_idx sourcetype=netskope:web_transaction

[netskope_api]
search = index=_internal sourcetype="tanetskopeappforsplunk:log"

[netskope_cim_alert]
search = eventtype = netskope_alert

[netskope_cim_malware]
search = eventtype = netskope_idx AND ((sourcetype=netskope:application AND type="malsite") OR (sourcetype=netskope:alert AND alert_type IN ("malsite", "Malware")))

[netskope_anomaly]
search = eventtype=netskope_alert type = "anomaly"

[netskope_cim_connection]
search = eventtype = netskope_connection

[netskope_cim_network]
search = eventtype = netskope_network

[netskope_cim_application]
search = eventtype = netskope_application

[netskope_cim_web]
search = eventtype=netskope_web OR (eventtype=netskope_application type="nspolicy" NOT app=*) OR (eventtype=netskope_connection type=page) OR (eventtype=netskope_alert type=page OR ( type="nspolicy" NOT app=*) )

[netskope_invalid_token]
search = eventtype=netskope_error "UNAUTHORIZED" OR "Invalid REST API Token*"

[netskope_invalid_host]
search = eventtype=netskope_error "Name or service not known"

[netskope_no_host_connection]
search = eventtype=netskope_error HTTPSConnectionPool

[netskope_action_modresult]
search = index IN (cim_modactions) sourcetype=netskope:alertaction:*
