
[cucm_cdr]
SHOULD_LINEMERGE = False
INDEXED_EXTRACTIONS = csv

# SEE "custom_timestamp_extraction" in transforms.conf for how _time is calculated.
#TIME_FORMAT = %s
#TIMESTAMP_FIELDS = dateTimeOrigination
BREAK_ONLY_BEFORE_DATE = False
MAX_TIMESTAMP_LOOKAHEAD = 60

#TIME_FORMAT = %s
#TIMESTAMP_FIELDS = dateTimeOrigination
BREAK_ONLY_BEFORE_DATE = False
MAX_TIMESTAMP_LOOKAHEAD = 60

# timestamp recognition is very solid in this sourcetype.
# and it's not uncommon for customers setting up a new instance
# to want to ingest the past few months of historical data.
# therefore we are setting this sourcetype to allow timestamps
# of up to one year in the past.
MAX_DAYS_AGO=365

# with default initCrcLength of 256,  all get deleted,
# MANY fail crc checks and dont get indexed.
initCrcLength = 1500
ANNOTATE_PUNCT = false
pulldown_type = true

TRANSFORMS = custom_timestamp_extraction, no_column_headers, multivalue_device_name, cucm_server_name, make_called_party_number_index_time, make_hpdn_index_time, make_cucm_call_id_index_time, make_src_ip_addr_index_time, make_dest_ip_addr_index_time


[cucm_cmr]
SHOULD_LINEMERGE = False
INDEXED_EXTRACTIONS = csv
TIME_FORMAT = %s
TIMESTAMP_FIELDS = dateTimeStamp
BREAK_ONLY_BEFORE_DATE = False
MAX_TIMESTAMP_LOOKAHEAD = 13

# with default initCrcLength of 256,  all get deleted,
# MANY fail crc checks and dont get indexed.
initCrcLength = 1000
ANNOTATE_PUNCT = false
pulldown_type = true

TRANSFORMS = no_column_headers, cucm_server_name


