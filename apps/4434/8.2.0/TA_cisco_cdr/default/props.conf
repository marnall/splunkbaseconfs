# Experimental sourcetype for Cisco Meeting Server.
# Contact Sideview at support@sideviewapps.com before
# attempting to use this.
[cms_cdr]
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = time="
KV_MODE = xml
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
TRUNCATE = 0
pulldown_type = true
ANNOTATE_PUNCT = false
LINE_BREAKER = (\<\?xml version="1.0"\?\>)
MAX_TIMESTAMP_LOOKAHEAD = 185


# NOTE: If you're interested in ingesting your Audit data from CUCM please
# contact Sideview. Not only are we terribly interested in what you want to
# do, we are likely to be helpful in achieving it.
#
# Adds parsing to SYSLOG version of CUCM audit trails.
# Note TIME_PREFIX works for Kiwi SYSLOG server, may need to adapt or remove for others.
[cucm_audit]
KV_MODE = none
MAX_TIMESTAMP_LOOKAHEAD = 32
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %d %Y %l:%M:%S %p.%3N %Z
TIME_PREFIX = ^[^:]*:[^:]*:[^:]*:\s+
pulldown_type = true
