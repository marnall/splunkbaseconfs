#### SEARCH EXTRACTIONS ###
[cyphort_error]
REGEX = (.+)
FORMAT = message::$1

### KV STORE LOOKUPS ####
[cyphort_proxy_configuration]
external_type = kvstore
fields_list = _key, realm, proxy_host, proxy_port, proxy_user, proxy_protocol

### CSV LOOKUPS ###
[eventtypelookup]
filename = event_type_lookup.csv