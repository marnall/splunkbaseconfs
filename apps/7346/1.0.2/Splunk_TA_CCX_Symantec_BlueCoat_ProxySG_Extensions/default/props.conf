[bluecoat:proxysg:access:kv]

FIELDALIAS-src_ip = c_ip AS src_ip	
FIELDALIAS-app_id = appid AS app_id	
FIELDALIAS-reason = x_exception_reason AS reason		

EVAL-app = if(Application!="", Application, null())
EVAL-dest = coalesce(s_supplier_ip, r_ip)
EVAL-dest_ip = coalesce(s_supplier_ip, r_ip)
EVAL-url_domain = replace(c_url,"\w+:\/\/([^\/:]+).*","\1")
EVAL-category = split(cs_categories,";")
EVAL-http_referrer_domain = replace(http_referrer,"\w+:\/\/([^\/]+).*","\1")	
EVAL-vendor_product = "Broadcom Symantec:Blue Coat:ProxySG"

REPORT-ccx_user_agent_extractions = ccx_user_agent_extractions
REPORT-ccx_capture_file_name = ccx_capture_file_name
