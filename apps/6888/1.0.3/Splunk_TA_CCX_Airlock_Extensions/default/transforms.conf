[airlock_activity_login_src]
CLEAN_KEYS = 0
REGEX = .*(logged\sin\ssuccessfully\sfrom|login\sattempt.*\sfrom)\s+(?<src>.*)\s+using\s(?<user_agent>.*)
SOURCE_KEY = description

[airlock_activity_capture_description_content]
CLEAN_KEYS = 0
FORMAT = description_content::$1
REGEX = ([^\s]+\.[^\s]+)
SOURCE_KEY = description

[airlock_x_auth_method_capture]
CLEAN_KEYS = 0
REGEX = ^(?<x_auth_method>(\w+\sUser|User|))\:.*(logged|login)
SOURCE_KEY = description
