#################################
# macros.conf for the windows app
#################################

# the data source is abstracted into macros so that it will be easy to change searches in the future to point to a different index

[dash_wmidata(1)]
args = type
definition = source=WMI:$type$

[raw_wmidata(1)]
args = type
definition = source=WMI:$type$

[top_process_by_cpu]
definition = `dash_wmidata(localprocesses)` Name!=Total | `combine_names` | eval CPULoad = PercentProcessorTime | stats avg(CPULoad) by Name

[top_process_by_mem]
definition = `dash_wmidata(localprocesses)` Name!=Total | `combine_names` | eval mem = PrivateBytes/(1024*1024) | stats sum(mem) as "Total Memory in MB" dc(host) as "# of Hosts" by Name | sort 100 -"Total Memory in MB" | eval "Total Memory in MB" = tostring('Total Memory in MB', "commas")

[combine_names]
definition = rex field=Name "(?<Name>[^#]+)#\d+$"

[get_user_name]
definition = eval User_Name=if(isnotnull(Account_Name), Account_Name, User_Name)

[get_workstation_name]
definition = eval Workstation_Name=if(isnotnull(ComputerName), ComputerName, Workstation_Name)