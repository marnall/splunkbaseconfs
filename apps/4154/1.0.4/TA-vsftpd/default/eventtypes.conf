[vsftpd_change_file]
search = (sourcetype="vsftpd:log") ("UPLOAD:" OR "DOWNLOAD:" OR "RENAME:" OR "DELETE:" OR "MKDIR:" OR "RMDIR:")

[vsftpd_change_command]
search = (sourcetype=vsftpd:log) ("FTP command:" OR "FTP response:")

[vsftpd_authentication_user]
search = (sourcetype=vsftpd:log) " LOGIN:"

[vsftpd_change_xfer_file]
search = (sourcetype=vsftpd:xfer)
