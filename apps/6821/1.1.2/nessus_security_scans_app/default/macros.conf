[nessus_indexes]
definition = index=*
iseval = 0

[nessus_bunit_lookup]
definition = asset_bunit.csv
iseval = 0

[nessus_set_host_environment(1)]
args = host
definition = eval env = case(match($host$, "^(p-|prod)"), "production", match($host$, "^(t-|test)"), "test", match($host$, "^(d-|dev)"), "development", true(), "unknown")\
| lookup `nessus_bunit_lookup` asset as $host$ OUTPUT production_level\
| eval env = case(match(production_level, "production"), "production", match(production_level, "test"), "test", match(production_level, "development"), "development", true(), env)
iseval = 0

[nessus_sort_by_top_severity(1)]
args = top
definition = eval total = case(critical>0 AND high>0, critical+high, critical>0, critical, high>0, high, true(), 0)\
| eval subTotal = case(medium>0 AND low>0, medium+low, medium>0, medium, low>0, low, true(), 0)\
| eval subSubTotal = case(informational>0 AND unknown>0, informational+unknown, informational>0, informational, unknown>0, unknown, true(), 0)\
| sort limit=$top$ - total subTotal subSubTotal\
| fields - total subTotal subSubTotal
iseval = 0

[nessus_whitelist_dest_signature(2)]
args = signature,dest
definition = lookup whitelisted_vulnerabilities $signature$ $dest$ OUTPUT severity AS severity_custom\
| eval severity=coalesce(severity_custom, severity)
iseval = 0

[nessus_stats2chart(1)]
args = str_field
definition = eval temp="" | chart useother=false first(count) over temp by $str_field$ | rename temp as count
iseval = 0
