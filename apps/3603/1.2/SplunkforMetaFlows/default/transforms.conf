#REGEX= ^([^\{\n]*\{(?P<mss1>\d+,\d+)})|((?P<mss2>MetaFlows\|MSS\|[0-9\.]+))
#FORMAT = mss::$1

#EXTRACT-priority = ^([^,\n]*{\d+,(?P<Priority1>\d+)})|(CEF:(?P<Priority2>\d+))
#EXTRACT-source = ^((?:[^\}\n]*\}){2}\s+(?P<source1>[^ :]+))|(src=(?P<source2>[^ ]+))
#EXTRACT-Destination = ^([^<>\n]*>\s+(?P<Destination1>\d+\.\d+\.\d+\.\d+))|(dst=(?P<Destination2>\d+\.\d+\.\d+\.\d+))
#EXTRACT-srcp = ^((?:[^\}\n]*\}){2}\s+\d+\.\d+\.\d+\.\d+:(?P<srcp1>\d+))|(spt=(?P<srcp2>\d+))
#EXTRACT-dstp = ^([^<\n]*<\-\s+\d+\.\d+\.\d+\.\d+:(?P<dstp1>\d+))|(dpt=(?P<dstp2>\d+))
#EXTRACT-message = [^\n]*(\{\d+,\d+\}\s+\[[^\]]+\]\s+(?P<message1>.*)\s{[^}]+})|(1\.4\.3\|[^|]+\|(?P<message2>[^|]+)\|)
#
[syslog-header-stripper-pri-ts-host-proc]
REGEX         = ^[\\x0]{0,4}<\d+>[A-Z][a-z]+\s+\d+\s\d+:\d+:\d+\s(.*)$
FORMAT        = $1
DEST_KEY      = _raw

[setnull]
REGEX = ^\\x00$
DEST_KEY = queue
FORMAT = nullQueue

