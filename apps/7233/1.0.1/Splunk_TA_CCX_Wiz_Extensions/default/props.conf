
[wiz:issues]

KV_MODE = json
LINE_BREAKER = [\r\n]+
SHOULD_LINEMERGE = 0
TRUNCATE = 99999999
TIME_PREFIX = statusChangedAt
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%NZ
MAX_TIMESTAMP_LOOKAHEAD = 30

EVAL-app = case('sourceRule.name'=="Load balancer does not have a target", "Wiz")
EVAL-body = case('sourceRule.name'=="Load balancer does not have a target", 'sourceRule.controlDescription')
EVAL-category = coalesce('sourceRule.securitySubCategories{}.category.name', 'sourceRule.__typename')
EVAL-description = case('sourceRule.name'=="Load balancer does not have a target", 'sourceRule.controlDescription')
EVAL-severity = lower('severity')
EVAL-signature = coalesce('sourceRule.securitySubCategories{}.category.name', 'sourceRule.__typename')
EVAL-type = case('sourceRule.name'=="Load balancer does not have a target", "event")
EVAL-url = 'sourceURL'
EVAL-user = 'entitySnapshot.tags.User'
EVAL-vendor = "Wiz"
EVAL-vendor_product = "Wiz"

[wiz:userAuditLogs]

KV_MODE = json
LINE_BREAKER = [\r\n]+
SHOULD_LINEMERGE = 0
TIME_PREFIX = timestamp
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%NZ
MAX_TIMESTAMP_LOOKAHEAD = 30

EVAL-action = case('vendor_action'=="Login", if('status'=="SUCCESS", "success", "failure"), NOT 'vendor_action'=="Login", case(like('vendor_action', "Create%"), "created", like('vendor_action', "Delete%"), "deleted", like('vendor_action', "Update%"), "updated", 'vendor_action' IN ("ConfigurationFindings", "RerunReport", "GraphSearch", "ReassessIssue", "Report"), "read"))
EVAL-app = case('vendor_action'=="Login", "Wiz Cloud Security Platform")
EVAL-change_type = case(NOT 'vendor_action'=="Login", case(like('vendor_action', "%User%"), "AAA", NOT like('vendor_action', "%User%"), "filesystem"))
EVAL-product = "Cloud Security Platform"
EVAL-reason = case('vendor_action'=="Login", if('status'=="SUCCESS", "success", "failure"))
EVAL-result = case(NOT 'vendor_action'=="Login", 'status')
EVAL-signature = case('vendor_action'=="Login", 'vendor_action')
EVAL-src = if('sourceIP'=="null" OR isnull('sourceIP'), null(), 'sourceIP')
EVAL-src_ip = if('sourceIP'=="null" OR isnull('sourceIP'), null(), 'sourceIP')
EVAL-status = case(NOT 'vendor_action'=="Login", if('status'=="SUCCESS", "success", "failure"))
EVAL-user = if('user.name'=="null" OR isnull('user.name'), null(), 'user.name')
EVAL-user_agent = if('userAgent'=="null" OR isnull('userAgent'), null(), 'userAgent')
EVAL-user_name = if('user.name'=="null" OR isnull('user.name'), null(), 'user.name')
EVAL-vendor = "Wiz"
EVAL-vendor_product = "Wiz"
REPORT-ccx_wiz_userauditlogs_vendor_action = ccx_wiz_userauditlogs_vendor_action

[wiz:vulnerabilities]

KV_MODE = json
LINE_BREAKER = [\r\n]+
SHOULD_LINEMERGE = 0

EVAL-category = 'detailedName'
EVAL-cve = if(like('name', "CVE%"), 'name', null())
EVAL-dest = 'vulnerableAsset.ipAddresses{}'
EVAL-dest_ip = 'vulnerableAsset.ipAddresses{}'
EVAL-severity = case('CVSSSeverity'=="" OR 'CVSSSeverity'=="null" OR 'CVSSSeverity'=="NONE", "informational", 1==1, lower('CVSSSeverity'))
EVAL-signature = 'name'
EVAL-url = 'portalUrl'
EVAL-vendor = "Wiz"
EVAL-vendor_product = "Wiz"
