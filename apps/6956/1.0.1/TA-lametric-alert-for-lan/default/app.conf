# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 2

[launcher]
author = Maciej Duda
version = 1.0.1
description = Sends API call directly to the LaMetric device to trigger instant notification. Works only on the same local network as the LaMetric device.

[ui]
is_visible = 1
label = LaMetric alert for LAN
docs_section_override = AddOns:released

[package]
id = TA-lametric-alert-for-lan

[triggers]
reload.addon_builder = simple
reload.ta_lametric_alert_for_lan_account = simple
reload.ta_lametric_alert_for_lan_settings = simple
reload.passwords = simple

