[Nextcloud app updates available]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 9 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.type = mapping
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = nextcloud_test
request.ui_dispatch_view = search
search = sourcetype=nextcloud-serverinfo ocs.meta.status=ok\
| head 1\
| where 'ocs.data.nextcloud.system.apps.num_updates_available'>0\
| rename ocs.data.nextcloud.system.apps.num_updates_available as "No. of apps on Nextcloud server waiting to be updated" \
| table "No. of apps on Nextcloud server waiting to be updated"
