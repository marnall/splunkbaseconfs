[ncAuthentication]
priority = 5
search = sourcetype=nextcloud-log ncAction="Login successful" OR ncAction="Login failed"

[ncAccountOperations]
priority = 5
search = sourcetype=TERM(nextcloud-log) ncApp=TERM(admin_audit) message="* added to group *" OR message="* removed from group *" OR ncAction="User *" OR ncAction="Group *"
