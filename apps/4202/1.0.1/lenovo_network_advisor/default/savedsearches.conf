[CNOS_SYSTEMALERT]
action.logevent = 1
action.logevent.param.event = Device=$result.SWITCH_IP$ Category=$result.cat$ p1=$result.PARAM1$ p2=$result.PARAM2$ Time=$result._time$
action.logevent.param.source = cnosalert
action.logevent.param.sourcetype = eventalerts
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = lenovo_network_advisor
request.ui_dispatch_view = search
search = SUB_TYPE=FANS_STATUS | eval INACTIVE = FAN_NUM - FAN_ACTIVE  |  where ((INACTIVE > 0) OR (FAN_AVG_PERCENT >80)) | rename INACTIVE as PARAM1, FAN_AVG_PERCENT as PARAM2 |eval cat="FAN" | append [search SUB_TYPE=TEMPERATURE_STATUS | where ((CPU_LOCAL_TEMP > 50) OR (AMBIENT_TEMP > 50) OR (HOT_SPOT_TEMP > 50)) | rename AMBIENT_TEMP as PARAM1, CPU_LOCAL_TEMP as PARAM2, HOT_SPOT_TEMP as PARAM3 |eval cat="TEMP" ] | append [search SUB_TYPE=RESOURCES_STATUS | where ((CPU_USAGE > 70) OR (MEMORY_USAGE > 70)) | rename CPU_USAGE as PARAM1, MEMORY_USAGE as PARAM2 | eval cat="CPUMEM"] | table SWITCH_IP cat PARAM1 PARAM2 _time

[CNOS_TRAFFICALERT]
action.logevent = 1
action.logevent.param.event = Device=$result.SWITCH_IP$ Category=$result.cat$ p1=$result.PARAM1$ p2=$result.PARAM2$ p3=$result.PARAM3$ Time=$result._time$
action.logevent.param.source = cnosalert
action.logevent.param.sourcetype = eventalerts
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = lenovo_network_advisor
request.ui_dispatch_view = search
search = DOMAIN=TRAFFIC_UTILIZATION SUB_TYPE=INTERFACE_TRAFFIC | stats  earliest(RX_ERRORS) as ERX_ERRORS, latest(RX_ERRORS) as LRX_ERRORS, earliest(RX_DISCARDS) as ERX_DISCARDS, latest(RX_DISCARDS) as LRX_DISCARDS, latest(_time) as Time by SWITCH_IP, interface, SUB_TYPE | eval RX_DISCARDS_N = abs(LRX_DISCARDS - ERX_DISCARDS), RX_ERRORS_N = abs(LRX_ERRORS - ERX_ERRORS) | table SWITCH_IP, SUB_TYPE, interface, RX_DISCARDS_N, RX_ERRORS_N, Time | where ((RX_DISCARDS_N > 0) OR (RX_ERRORS_N > 0)) | rename RX_DISCARDS_N as PARAM1, RX_ERRORS_N as PARAM2, interface as PARAM3, Time as _time| eval cat="traffic" | append [ search DOMAIN=TRAFFIC_DROPS | stats earliest(ctr) as ectr, latest(ctr) as lctr latest(_time) as Time by SWITCH_IP, interface, queue_type, queue_id, SUB_TYPE | eval pktdrop = abs(lctr - ectr) | where pktdrop > 0 | rename queue_type as PARAM1, queue_id as PARAM2, interface as PARAM3, Time as _time | eval cat="congestion"] | table SWITCH_IP cat PARAM1 PARAM2 PARAM3 _time


