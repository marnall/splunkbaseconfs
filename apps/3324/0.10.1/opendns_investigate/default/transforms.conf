[investigate_domains]
external_type = kvstore
collection = investigate_domains
fields_list = _key, _user, dest, asn_score, attack, content_categories, cooccurrences, dga_score, entropy, fastflux, geodiversity, geodiversity_normalized, geoscore, ks_test, last_queried, pagerank, perplexity, popularity, prefix_score, related_domains, rip_score, rr_history, securerank2, security_categories, status, status_label, threat_type, tld_geodiversity, whois, max_malware_sample_threat_score

[investigate_ips]
external_type = kvstore
collection = investigate_ips
fields_list = _key, _user, dest, last_queried, rr_history, max_malware_sample_threat_score

[investigate_hashes]
external_type = kvstore
collection = investigate_hashes
fields_list = _key, _user, dest, last_queried, threat_score, urls, security_categories, first_seen, av_result, magic_type, network_connections
