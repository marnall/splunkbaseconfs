#############            C y b e r C X       #####################################
#              Splunk_TA_CCX_Cisco_Secure_Endpoint                               #
#                                                                                #
# Configuration available for ingestion:                                         #
#                                                                                #
# - Cisco Secure Endpoint  (HEC | UF/HF)                                         #
#                                                                                #
##################################################################################

##################################################################################
##########CCX Add-On for Cisco Secure Endpoint - ingestion: Syslog/JSON###########
##################################################################################

[cisco:secureendpoint]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = "timestamp"
disabled = false
pulldown_type = true
TRUNCATE = 250000

TRANSFORMS-set_sourcetypes_secureendpoint = cisco_secure_endpoint_threat,cisco_secure_endpoint_audit,cisco_secure_endpoint_alerts,cisco_secure_endpoint_vuln


[cisco:secureendpoint:alerts]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = "timestamp"
disabled = false
pulldown_type = true
TRUNCATE = 250000

LOOKUP-ccx_cisco_secure_endpoint_event_types_v2 = ccx_cisco_secure_endpoint_event_types_v2 event_type event_type_id OUTPUTNEW action change_type dataset_name description type
FIELDALIAS-dest = "computer.network_addresses{}.ip" AS dest
FIELDALIAS-dest_ip = "computer.network_addresses{}.ip" AS dest_ip
FIELDALIAS-dest_mac = "computer.network_addresses{}.mac" AS dest_mac
FIELDALIAS-src = "computer.external_ip" AS src
FIELDALIAS-src_ip = "computer.external_ip" AS src_ip
EVAL-app = "Cisco Secure Endpoint"
EVAL-user = if(isnotnull(coalesce('computer.user', replace('computer.hostname', "([^\.]+).*", "\1"))), coalesce('computer.user', replace('computer.hostname', "([^\.]+).*", "\1")), null())
EVAL-vendor_product = "Cisco:Secure Endpoint"
FIELDALIAS-signature = event_type AS signature


[cisco:secureendpoint:audit]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = "timestamp"
disabled = false
pulldown_type = true
TRUNCATE = 250000

LOOKUP-ccx_cisco_secure_endpoint_event_types_v2 = ccx_cisco_secure_endpoint_event_types_v2 event_type event_type_id OUTPUTNEW action change_type dataset_name description AS signature type
FIELDALIAS-dest = "computer.network_addresses{}.ip" AS dest
FIELDALIAS-dest_ip = "computer.network_addresses{}.ip" AS dest_ip
FIELDALIAS-dest_mac = "computer.network_addresses{}.mac" AS dest_mac
FIELDALIAS-src = "computer.external_ip" AS src
FIELDALIAS-src_ip = "computer.external_ip" AS src_ip
EVAL-user = if(isnotnull(coalesce('computer.user', replace('computer.hostname', "([^\.]+).*", "\1"))), coalesce('computer.user', replace('computer.hostname', "([^\.]+).*", "\1")), null())
EVAL-vendor_product = "Cisco:Secure Endpoint"


[cisco:secureendpoint:threat]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = "timestamp"
disabled = false
pulldown_type = true
TRUNCATE = 250000

LOOKUP-ccx_cisco_secure_endpoint_event_types_v2 = ccx_cisco_secure_endpoint_event_types_v2 event_type event_type_id OUTPUTNEW action change_type dataset_name description AS signature type
FIELDALIAS-category = event_type AS category
FIELDALIAS-dest = "computer.network_addresses{}.ip" AS dest
FIELDALIAS-dest_ip = "computer.network_addresses{}.ip" AS dest_ip
FIELDALIAS-dest_mac = "computer.network_addresses{}.mac" AS dest_mac
FIELDALIAS-signature_version = "vulnerabilities{}.version" AS signature_version
FIELDALIAS-src = "computer.external_ip" AS src
FIELDALIAS-src_ip = "computer.external_ip" AS src_ip
FIELDALIAS-url = "vulnerabilities{}.url" AS url
FIELDALIAS-xref = "vulnerabilities{}.name" AS xref
EVAL-cve = lower('vulnerabilities{}.cve')
EVAL-file_hash = mvappend('file.identity.md5', 'file.identity.sha1', 'file.identity.sha256', 'bp_data.details.actions{}.sha256')
EVAL-file_name = case(isnotnull('file.file_name'), 'file.file_name', isnotnull('bp_data.details.actions{}.name'), 'bp_data.details.actions{}.name')
EVAL-file_path = case(isnotnull('file.file_path'), urldecode(replace('file.file_path', "^(?:\\\\)*\??\\\\?(?:file\:\/\/\/)?(.*[\\\|\/]).+(\.\w{2,4})?", "\1")), isnotnull('bp_data.details.actions{}.path'), 'bp_data.details.actions{}.path')
EVAL-severity = lower(severity)
EVAL-signature = if(isnotnull(coalesce('cloud_ioc.short_description', 'detection')), coalesce('cloud_ioc.short_description', 'detection'), null())
EVAL-user = if(isnotnull(coalesce('computer.user', replace('computer.hostname', "([^\.]+).*", "\1"))), coalesce('computer.user', replace('computer.hostname', "([^\.]+).*", "\1")), null())
EVAL-vendor_product = "Cisco:Secure Endpoint"


[cisco:secureendpoint:vuln]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = "timestamp"
disabled = false
pulldown_type = true
TRUNCATE = 250000
