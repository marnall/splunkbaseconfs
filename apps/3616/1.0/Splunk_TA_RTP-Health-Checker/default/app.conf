[package]
id = Splunk_TA_RTP-Health-Checker

[install]
state_change_requires_restart = false
is_configured = 0

[triggers]
reload.rtpHealthChecker = simple

[ui]
is_visible = 1
label = RTP Health Check Application

[launcher]
author = Ari Donio, Michael Bentley
description = This app checks the health of your splunk environment. If selected, it reports the results to Splunk Professional Service Experts @ RTP Technology for a free review & consultation.  
version = 1.0

