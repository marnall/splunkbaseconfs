[sepio:system:events]
SEDCMD-fix = s/\\//g
SEDCMD-start = s/\"\{/{/g
SEDCMD-end = s/\}\"/}/g
AUTO_KV_JSON = 0
INDEXED_EXTRACTIONS = JSON
SHOULD_LINEMERGE = 0
TIME_FORMAT = %s%3Q
TIME_PREFIX = creationTimeEpoch\"\:\s+
REPORT-force_sourcetype_sepio = force_sourcetype_sepio_system, force_sourcetype_sepio_host, force_sourcetype_sepio_general, force_sourcetype_sepio_network
category = Splunk App Add-on Builder
pulldown_type = 1
REPORT-extractions5 = extract_model, extract_approved, extract_vendor, extract_serialnumber, extract_productinfo, extract_macaddress, extract_type, extract_policy, extract_manufacturer, extract_vid, extract_pid, extract_status, extract_ipaddress ,extract_risklevel, extract_hostname

