[cisco:ni:anomalies]
SHOULD_LINEMERGE = 0
pulldown_type = 1
TRUNCATE = 3000000
MATCH_LIMIT = 300000
KV_MODE = json
TIME_PREFIX = "endTs":
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = Etc/GMT
FIELDALIAS-node_names = nodeNames{} AS node_names
EVAL-calculated_severity = case(severity == "critical", "critical", severity == "major", "major", severity == "minor", "minor", 1==1, "Other")
FIELDALIAS-signature_id = anomalyId AS signature_id
FIELDALIAS-vendor_product = vendor AS vendor_product

[cisco:ni:advisories]
SHOULD_LINEMERGE = 0
pulldown_type = 1
TRUNCATE = 3000000
MATCH_LIMIT = 300000
KV_MODE = json
TIME_PREFIX = "endTs":
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = Etc/GMT
FIELDALIAS-node_names = nodeNames{} AS node_names
EVAL-calculated_severity = case(severity == "critical", "critical", severity == "major", "major", severity == "minor", "minor", 1==1, "Other")
FIELDALIAS-signature_id	= advisoryId AS signature_id
FIELDALIAS-description = advisoryStr AS description
FIELDALIAS-type	= alertType AS type
FIELDALIAS-signature = title AS signature

[source::...ta_cisco_ni_cisco_ni*.log*]
SHOULD_LINEMERGE = true
sourcetype = tacisconi:log

[source::...ta_cisco_ni_account_validation*.log*]
SHOULD_LINEMERGE = true
sourcetype = tacisconi:log

[(?::){0}ta_cisco_ni*]
# Rename old logs sourcetype with the newer one
EVAL-sourcetype = "tacisconi:log"
