[squid:clamav]
disabled = false

SHOULD_LINEMERGE = false
TIME_PREFIX= generate_response_page: 
#TIME_FORMAT = # Let splunk find it by itself
KV_MODE = none

REPORT-virus-redirection = virus-redirection
