[datalake_parser]
definition = makemv delim=", " threat_types\
	| makemv delim=", " tags\
	| makemv delim=", " sources\
	| makemv delim=", " threat_scores\
	| eval  malware_score = mvindex(threat_scores,mvfind(threat_types,"malware"))\
	| eval  spam_score = mvindex(threat_scores,mvfind(threat_types,"spam"))\
	| eval  scan_score = mvindex(threat_scores,mvfind(threat_types,"scan"))\
	| eval  scam_score = mvindex(threat_scores,mvfind(threat_types,"scam"))\
	| eval  hack_score = mvindex(threat_scores,mvfind(threat_types,"hack"))\
	| eval  phishing_score = mvindex(threat_scores,mvfind(threat_types,"phishing"))\
	| eval  fraud_score = mvindex(threat_scores,mvfind(threat_types,"fraud"))\
	| eval  ddos_score = mvindex(threat_scores,mvfind(threat_types,"ddos"))
iseval = 0

[inputlookup_all_datalake]
definition = inputlookup datalake_ip | eval type="ip"\
|inputlookup append=true datalake_apk | eval type=if(isnull(type),"apk",type)\
|inputlookup  append=true datalake_as | eval type=if(isnull(type),"asn",type)\
|inputlookup append=true datalake_cc | eval type=if(isnull(type),"credit_card",type)\
|inputlookup append=true datalake_cve | eval type=if(isnull(type),"cve",type)\
|inputlookup append=true datalake_crypto | eval type=if(isnull(type),"crypto",type)\
|inputlookup append=true datalake_iban | eval type=if(isnull(type),"iban",type)\
|inputlookup append=true datalake_paste | eval type=if(isnull(type),"paste",type)\
|inputlookup append=true datalake_phone | eval type=if(isnull(type),"phone",type)\
|inputlookup append=true datalake_regkey | eval type=if(isnull(type),"RegKey",type)\
|inputlookup append=true datalake_ssl | eval type=if(isnull(type),"ssl",type)\
| inputlookup append=true datalake_file | eval type=if(isnull(type),"file",type)\
| inputlookup append=true datalake_fqdn | eval type=if(isnull(type),"fqdn",type)\
| inputlookup append=true datalake_url | eval type=if(isnull(type),"url",type)\
| inputlookup append=true datalake_domain | eval type=if(isnull(type),"domain",type)\
| inputlookup append=true datalake_email | eval type=if(isnull(type),"email",type)\
| inputlookup append=true datalake_ip_range | eval type=if(isnull(type),"range",type)
iseval = 0

[datalake_parser(1)]
args = description
definition = rex field=$description$ "\[(?<threat_types>[^\]]*)\]\[(?<threat_scores>[^\]]*)\]\[(?<sources>[^\]]*)\]\[(?<tags>[^\]]*)\]$" \
|makemv delim=", " threat_types | makemv delim=", " tags | makemv delim=", " sources | makemv delim=", " threat_scores\
| eval malware_score = mvindex(threat_scores,mvfind(threat_types,"malware"))\
| eval spam_score = mvindex(threat_scores,mvfind(threat_types,"spam"))\
| eval scan_score = mvindex(threat_scores,mvfind(threat_types,"scan"))\
| eval scam_score = mvindex(threat_scores,mvfind(threat_types,"scam"))\
| eval hack_score = mvindex(threat_scores,mvfind(threat_types,"hack"))\
| eval phishing_score = mvindex(threat_scores,mvfind(threat_types,"phishing"))\
| eval fraud_score = mvindex(threat_scores,mvfind(threat_types,"fraud"))\
| eval ddos_score = mvindex(threat_scores,mvfind(threat_types,"ddos"))\
|fields - threat_types, threat_scores, $description$
iseval = 0

[datalake-index]
definition = datalake_connect
iseval = 0

