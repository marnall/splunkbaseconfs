[dt_base_search]
definition = tstats summariesonly=true count(Web.url) FROM datamodel=Web BY Web.url | rename Web.url AS domain | fields domain
#definition = search tag=web | rename url AS domain | table domain
[domains_observed_data]
definition = tstats summariesonly=true sum from datamodel=Web groupby Web.dest | tldextract domain_field=Web.dest | rename Web.dest as dest | fields dest
# the below domains_observed and total events searches could be consolidated, however, when breaking them up and putting the subsearch outside of the marco, it
# causes the data columns in the UI to switch data in the middle of the results, so dest and _time would show and as you scroll through the results, the _time data jumps into the dest field and vice versa
[critical_domains_observed]
definition = tstats summariesonly=true sum from datamodel=Web groupby Web.dest | tldextract domain_field=Web.dest | rename Web.dest as "value" | search [| inputlookup critical_phisheye_iocs | fields value] |stats count by value| eval domain=value |lookup iris_lookup_history domain

[total_critical_events]
definition = tstats summariesonly=true sum, values(Web.dest) AS value, values(Web.src) as src from datamodel=Web groupby Web.dest _time | tldextract domain_field=value | search [| inputlookup critical_phisheye_iocs | fields value] | rename Web.dest AS dest | fields dest src _time

[phisheye_domains_observed]
definition = tstats summariesonly=true sum from datamodel=Web groupby Web.dest | tldextract domain_field=Web.dest | rename Web.dest as "domain" | search [| inputlookup phisheye_results | fields domain] | stats count by domain | lookup iris_lookup_history domain

[total_phisheye_events]
definition = tstats summariesonly=true sum, values(Web.dest) AS value, values(Web.src) as src from datamodel=Web groupby Web.dest _time | tldextract domain_field=Web.dest | rename Web.dest as domain | search [| inputlookup phisheye_results | fields domain] | rename domain as dest | fields dest src _time

[monitoring_timecharts_data]
definition = tstats summariesonly=true sum from datamodel=Web groupby Web.dest _time | tldextract domain_field=Web.dest | rename Web.dest as "domain" | fields domain

[monitoring_timechart_events]
definition = from datamodel:"Web"."Web" | eval domain=lower(dest) | tldextract domain_field=domain | eval domain=lower(domain) | eval _key=domain | fields domain

[young_domain_age]
definition = 7

[young_domain_age_drilldown]
definition = eval cd=strptime(create_date, "%Y-%m-%d")|eval age=ceil((now()-coalesce(cd,created,create_date))/86400)|search age&lt;=`young_domain_age`

[young_domains]
definition = from inputlookup:`dt_lookup_history`|eval domain_created=if(match(coalesce(created,create_date),"^\\d{4}-\\d{2}-\\d{2}"),strptime(coalesce(created,create_date),"%Y-%m-%d"),coalesce(created,create_date)) | eval age=ceil((now()-domain_created)/86400)|where age<=`young_domain_age`|dedup domain

# Minimum Proximity risk score
[min_prox_risk]
definition = 70

# Minimum Threat profile risk score
[min_tp_risk]
definition = 90

[dt_api_enrich_cmd]
definition = domaintools domain mode=iris_enrich field=domain silent=t

[data_cache_length]
definition = 2592000

[data_queue_length]
definition = 86400

[per_minute_limit]
definition = 60

[populating_search_run_interval]
definition = 5

[summary_search_run_interval]
definition = 15

[max_age_queue_item_minutes]
definition = 60

[max_age_queue_item_retry_minutes]
definition = 1440

[cron_limit]
definition = 270

[score_type]
definition = iris_enrich

[summary_index]
definition = summary

[dt_lookup_queue]
definition = iris_lookup_queue

[dt_lookup_history]
definition = iris_lookup_history

[dt_notable_events]
definition = `es_notable_events` | where rule_name IN("High Risk Score Correlation Search", "DomainTools Critical Monitored Domain", "DomainTools Critical Tags", "DomainTools High Aggregate Risk Assets", "DomainTools High Aggregate Risk Assets", "DomainTools High Aggregate Risk Domains")
