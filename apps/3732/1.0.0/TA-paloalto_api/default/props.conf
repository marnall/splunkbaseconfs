pulldown_type = 1

[pan:api:system:resources]
DATETIME_CONFIG = CURRENT
EVAL-resource_type = "system"
EXTRACT-pan_cpu = Cpu\(s\):\s+(?<cpu_user_percent>[^\s]+)%us,\s+(?<cpu_system_percent>[^\s]+)%sy,\s+(?<cpu_nice_percent>[^\s]+)%ni,\s+(?<cpu_idle_percent>[^\s]+)%id,\s+(?<cpu_waiting_percent>[^\s]+)%wa,\s+(?<cpu_hardware_interupts_percent>[^\s]+)%hi,\s+(?<cpu_software_interupts_percent>[^\s]+)%si,\s+(?<cpu_steal_time_percent>[^\s]+)%st
EXTRACT-pan_mem = Mem:\s*(?<mem>[^\s]+)k\s*total,\s*(?<mem_used>[^\s]+)k\s*used,\s*(?<mem_free>[^\s]+)k\s*free,\s*(?<mem_buffers>[^\s]+)k\s*buffers
EXTRACT-pan_processes = Tasks:\s*(?<processes>[^\s]+)\s*total,\s*(?<processes_running>[^\s]+)\s*running,\s*(?<processes_sleeping>[^\s]+)\s*sleeping,\s*(?<processes_stopped>[^\s]+)\s*stopped,\s*(?<processes_zombie>[^\s]+)\s*zombie
EXTRACT-pan_swap = Swap:\s*(?<swap>[^\s]+)k\s*total,\s*(?<swap_used>[^\s]+)k\s*used,\s*(?<swap_free>[^\s]+)k\s*free,\s*(?<swap_cached>[^\s]+)k\s*cached
EXTRACT-pan_uptime_load = top - (?<time>[^\s]+)\s+up\s+(?<uptime>.*),\s+(?<user_sessions>\d+)\s+users,\s+load average:\s+(?<cpu_load_percent_1min>[^,]+),\s+(?<cpu_load_percent_5min>[^,]+),\s+(?<cpu_load_percent_15min>[^,]+)
FIELDALIAS-cpu_load_percent = cpu_load_percent_1min AS cpu_load_percent
FIELDALIAS-host_as_dest = host AS dest
LINE_BREAKER = ()Tasks:|()Cpu\(s\):|()Mem:|()Swap:|cached(\s*PID.*)
NO_BINARY_CHECK = 1
SEDCMD-PAN09_clean_message_text = s/\<!\[CDATA\[//g
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Custom
description = Palo Alto Networks - API - System Resources
pulldown_type = 1

