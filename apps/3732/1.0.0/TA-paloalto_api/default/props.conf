[pan:api:system:storage]
DATETIME_CONFIG = CURRENT
EVAL-resource_type = "system"
EVAL-storage = case(match(Size, "P[i]*$"), tonumber(rtrim(Size, "Pi"),10)*pow(1024,3), match(Size, "T[i]*$"), tonumber(rtrim(Size, "Ti"),10)*pow(1024,2), match(Size, "G[i]*$"), tonumber(rtrim(Size,"Gi"),10)*pow(1024,1), match(Size, "M[i]*$"), tonumber(rtrim(Size,"Mi"), 10), match(Size, "K[i]*$"), tonumber(rtrim(Size,"Ki"), 10)/1024, match(Size, "B[i]*$"), tonumber(rtrim(Size,"Bi"), 10)/pow(1024,2), 1==1, "unknown")
EVAL-storage_free = case(match(Avail, "P[i]*$"), tonumber(rtrim(Avail, "Pi"),10)*pow(1024,3), match(Avail, "T[i]*$"), tonumber(rtrim(Avail,"Ti"),10)*pow(1024,2), match(Avail, "G[i]*$"), tonumber(rtrim(Avail,"Gi"),10)*pow(1024,1), match(Avail, "M[i]*$"), tonumber(rtrim(Avail,"Mi"), 10), match(Avail, "K[i]*$"), tonumber(rtrim(Avail,"Ki"), 10)/1024, match(Avail, "B[i]*$"), tonumber(rtrim(Avail,"Bi"), 10)/pow(1024,2), 1==1, "unknown")
EVAL-storage_free_percent = 100.0-tonumber(rtrim(Use_,"%%"),10)
EVAL-storage_used = case(match(Used, "P[i]*$"), tonumber(rtrim(Used, "Pi"),10)*pow(1024,3), match(Used, "T[i]*$"), tonumber(rtrim(Used,"Ti"),10)*pow(1024,2), match(Used, "G[i]*$"), tonumber(rtrim(Used,"Gi"),10)*pow(1024,1), match(Used, "M[i]*$"), tonumber(rtrim(Used,"Mi"), 10), match(Used, "K[i]*$"), tonumber(rtrim(Used,"Ki"), 10)/1024, match(Used, "B[i]*$"), tonumber(rtrim(Used,"Bi"), 10)/pow(1024,2), 1==1, "unknown")
EVAL-storage_used_percent = tonumber(rtrim(Use_,"%%"),10)
FIELDALIAS-Filesystem_as_description = Filesystem AS description
FIELDALIAS-Filesystem_as_filesystem = Filesystem AS filesystem
FIELDALIAS-Mounted_as_mount = Mounted AS mount
FIELDALIAS-host_as_dest = host AS dest
KV_MODE = multi
LINE_BREAKER = (\s*)Filesystem
NO_BINARY_CHECK = 1
SEDCMD-PAN05_clean_message_text = s/\<!\[CDATA\[//g
SEDCMD-PAN06_clean_message_text = s/\]\]\>//g
TRUNCATE = 1000
category = Custom
description = Palo Alto Networks - API - System Storage
pulldown_type = 1

[pan:api:system:processes]
DATETIME_CONFIG = CURRENT
EVAL-cpu_time = replace(TIME_, "^[0]{1,2}:[0]{0,1}", "")
EVAL-mem_used = case(match(RES, "m[i]*$"), tonumber(rtrim(RES, "m"),10), match(RES, "g[i]*$"), tonumber(rtrim(RES, "g"),10)*1024, 1==1, RES/1024)
FIELDALIAS-COMMAND_as_process_name = COMMAND AS process_name
FIELDALIAS-CPU_as_cpu_load_percent = CPU AS cpu_load_percent
FIELDALIAS-COMMAND_as_process = COMMAND AS process
FIELDALIAS-PID_as_process_id = PID AS process_id
FIELDALIAS-USER_as_user = USER AS user
FIELDALIAS-host_as_dest = host AS dest
KV_MODE = multi
LINE_BREAKER = (Tasks:.*\n)|(Cpu\(s\):.*\n)|(Mem:.*\n)|(Swap:.*\n\s*)
MAX_EVENTS = 1000
NO_BINARY_CHECK = 1
SEDCMD-PAN02_clean_message_text = s/(\<!\[CDATA\[top.*)//g
SEDCMD-PAN03_clean_message_text = s/\s*\]\]\>//g
SEDCMD-PAN09_clean_message_text = s/(\d+)(\s{7,8})([\w\d]+)/\1 - \3/g
SEDCMD-PAN10_clean_message_text = s/(\s+\<defunct\>)/_<defunct>/g
SHOULD_LINEMERGE = 0
TRUNCATE = 100000
category = Custom
description = Palo Alto Networks - API - System Processes
pulldown_type = 1

[pan:api:system:ntp]
DATETIME_CONFIG = CURRENT
EVAL-action = if(isnotnull(synched),"success","failure")
