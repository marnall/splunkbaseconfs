[radware:defensepro]
TIME_PREFIX = :\s
TIME_FORMAT = %d-%m-%Y %H:%M:%S
pulldown_type = 1
EVAL-vendor = "Radware"
EVAL-product = "DefensePro"
EVAL-vendor_product = "Radware DefensePro"
EVAL-ids_type = "network"
EXTRACT-radware_defensepro_dest_ip = (?i)^(?:[^\.]*\.){6}\d+\s+\d+\s+(?P<dest_ip>[^ ]+)
EXTRACT-radware_defensepro_src_ip = (?i)^(?:[^"]*"){2}\s+\w+\s+(?P<src_ip>[^ ]+)
EXTRACT-vendor_action = (?i)^(?:[^\/]*\/){2}\w+\s+(?:0\s+)?\w+\s+(?P<vendor_action>[^\s]+)
EXTRACT-radware_defensepro_dest_port = (?i)^(?:[^\.]*\.){9}\d+\s+(?P<dest_port>[^ ]+)
EXTRACT-radware_defensepro_signature = \sWARNING\s.*?[^"]*"(?P<signature>[^"]+)
EXTRACT-radware_defensepro_src_port = (?i)^(?:[^\.]*\.){6}\d+\s+(?P<src_port>[^ ]+)
EXTRACT-radware_defensepro_status = (?i)^(?:[^"]*"){4}\s+(?P<attack_status>[^ ]+)
EXTRACT-context = (?i)^(?:[^\.]*\.){9}\d+\s+\d+\s+\d+\s+(?P<context>[^ ]+)
EXTRACT-phys_pt = (?i)^(?:[^\.]*\.){9}\d+\s+\d+\s+(?P<phys_pt>[^ ]+)
EXTRACT-policy_name = (?i) Regular "(?P<policy_name>[^"]+)
EXTRACT-protocol = (?i) .*?" (?P<protocol>\w+)(?= )
EXTRACT-radware_id = (?i) WARNING (?P<signature_id>[^ ]+)
EXTRACT-unique_id = (?i) drop (?P<unique_id>.+)
EXTRACT-bandwidth = (?i)^(?:[^"]*"){4}\s+\w+\s+\d+\s+(?P<bandwidth>[^ ]+)
EXTRACT-category = (?i) WARNING \d+\s(?P<category>[a-zA-Z_-]+)
EXTRACT-packet_count = (?i) ongoing (?P<packet_count>[^ ]+)
SEDCMD-radware_dp_risk = s/info/informational/g
EXTRACT-severity = \s(?<severity>high|medium|informational|low|INFO|WARNING)\s
REPORT-radware-dp = radware_dp_ips_auth_action_success,radware_dp_ips_auth_action_failure
EVAL-is_default = if(src_user="radware","true",null())
EVAL-action = case(vendor_action=="success" OR vendor_action=="failure", vendor_action, vendor_action=="dest-reset" OR vendor_action=="drop", "blocked", vendor_action=="forward" OR vendor_action=="challenge", "allowed", true(), "allowed")
EVAL-src = src_ip
EVAL-dest = dest_ip
EVAL-user = src_user