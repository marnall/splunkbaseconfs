[Start lookup]
action.email = 0
alert.suppress = 0
alert.track = 1
cron_schedule = */5 * * * *
description = Detects new package uploads and launches the appropriate script.
disabled = 0
enableSched = 1
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
is_visible = 1
search = index=aiq_flex sourcetype="aiq:flex:package_runs" | spath input=_raw path="run_id" output=run_id | search NOT [ | inputlookup package_status_lookup | fields run_id | format ] \
 | search NOT [ search index=aiq_flex sourcetype="aiq:flex:results" | stats values(run_id) as run_id | format ] \
 | table _time, run_id, hostname, host_ip, package_name, package_id, run_started_at, run_ended_at | newpackageadded

[Next lookup]
action.email = 0
alert.suppress = 0
alert.track = 1
cron_schedule = */5 * * * *
description = Performs any subsequent correlation on packages
disabled = 0
enableSched = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
is_visible = 1
search = | inputlookup package_status_lookup | where run_id!="" AND expired=0 AND NOT (processed_count>3 AND upload_time<relative_time(now(), "-4h@h")) \
 | sort processed_count +upload_time | head 1 | nextpackagecorrelation

[Expire lookups]
action.email = 0
alert.suppress = 0
alert.track = 1
cron_schedule = */5 * * * *
description = Save results of lookups that have been processed more than 3 times and were uploaded 4 hours ago
disabled = 0
enableSched = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
is_visible = 1
search = | inputlookup package_status_lookup | where status="IDLE" AND processed_count>3 AND expired=0 AND upload_time<relative_time(now(), "-4h@h") | saveresults
