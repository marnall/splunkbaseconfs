[expose:alert_info]
pattern = skylight_security_for_splunk/alert_info
methods = GET, POST

[expose:skylight_mode]
pattern = skylight_security_for_splunk/skylight_mode
methods = GET, POST

[expose:network_chain]
pattern = skylight_security_for_splunk/network_chain
methods = GET, POST

[expose:skylight_security_for_splunk_settings]
pattern = skylight_security_for_splunk_settings
methods = POST, GET

[expose:skylight_security_for_splunk_settings_specified]
pattern = skylight_security_for_splunk_settings/*
methods = POST, GET, DELETE

[expose:skylight_security_for_splunk_skylight_assets]
pattern = skylight_security_for_splunk_skylight_assets
methods = POST, GET

[expose:skylight_security_for_splunk_skylight_assets_specified]
pattern = skylight_security_for_splunk_skylight_assets/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
