[openldap:access]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %b %e %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 15

REPORT-openldap_vendor_action = openldap_vendor_action
REPORT-openldap_src_ip = openldap_src_ip
REPORT-openldap_connection_closed = openldap_connection_closed
REPORT-openldap_request_type = openldap_request_type
REPORT-openldap_response_type = openldap_response_type
REPORT-openldap_attr_mv = openldap_attr_mv
REPORT-openldap_attr_mv_extract = openldap_attr_mv_extract
REPORT-openldap_operation = openldap_operation

FIELDALIAS-openldap_dest = host AS dest
FIELDALIAS-openldap_erro_number = err AS error_number

EVAL-app = "ldap"
EVAL-attr_mv = null

LOOKUP-openldap_action_lookup = openldap_action_lookup vendor_tag OUTPUT vendor_action
LOOKUP-openldap_method_lookup = openldap_method_lookup method OUTPUT method_type
LOOKUP-openldap_error_lookup = openldap_error_lookup error_number OUTPUT error_description,action
LOOKUP-openldap_scope_lookup = openldap_scope_lookup scope OUTPUT scope_description
LOOKUP-openldap_user_lookup = openldap_user_lookup conn,op OUTPUT user
LOOKUP-openldap_src_lookup = openldap_src_lookup conn OUTPUT src
