[packets]
definition = eval Packets=cli_pkt+srv_pkt
iseval = 0
validation = 

[bytes]
definition = eval Bytes= cli_length+ srv_length
iseval = 0

[minmal_info]
definition = `bytes`|`packets`|`src_ip`|`dst_ip`
iseval = 0

[src_ip]
definition = rename cli_adr as "Client_IP"
iseval = 0

[dst_ip]
definition = rename srv_adr as "Serveur_IP"
iseval = 0

[base_http(5)]
args = SRC_IP,DEST_IP,IDPDM,CODE,TYPE
definition = `optimis_index` source="network" sourcetype="transaction" typeconnection IN (TCP,UDP,Tcp,Udp,tcp,udp) typeprotocol="HTTP" |eval IDPDM=case(idpdm="" ,"UNKNOWN",idpdm="null" ,"UNKNOWN",isnotnull(idpdm),idpdm)|search cli_adr=$SRC_IP$ srv_adr=$DEST_IP$ IDPDM=$IDPDM$ HTTP_RET_DESCRIPTION="$CODE$" HTTP_RET_TYPE="$TYPE$" |`minmal_info`
errormsg = Macro: error base_http
iseval = 0

[base_wifi(1)]
args = IDPDM
definition = `optimis_index` source="network" sourcetype="wifi" typeconnection IN (wifi,Wifi,WIFI) typeprotocol IN (wifi,Wifi,WIFI) |eval IDPDM=case(idpdm="" ,"UNKNOWN",idpdm="null" ,"UNKNOWN",isnotnull(idpdm),idpdm)|search IDPDM="$IDPDM$"
errormsg = Macro: error base_wifi
iseval = 0

[base_tcpudp(1)]
args = IDPDM
definition = `optimis_index` source="network" sourcetype="transaction" typeconnection IN (TCP,UDP,Tcp,Udp,tcp,udp) |eval IDPDM=case(idpdm="" ,"UNKNOWN",idpdm="null" ,"UNKNOWN",isnotnull(idpdm),idpdm)|search IDPDM=$IDPDM$
errormsg = Macro: error base_tcpudp
iseval = 0

[optimis_index]
definition = index=optimis
iseval = 0
description = "This macro is used to specify an index for searches in the optimis for Splunk app."
