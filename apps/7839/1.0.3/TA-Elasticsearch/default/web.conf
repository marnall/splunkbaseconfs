
[expose:TA_Elasticsearch_account]
pattern = TA_Elasticsearch_account
methods = POST, GET

[expose:TA_Elasticsearch_account_specified]
pattern = TA_Elasticsearch_account/*
methods = POST, GET, DELETE

[expose:TA_Elasticsearch_settings]
pattern = TA_Elasticsearch_settings
methods = POST, GET

[expose:TA_Elasticsearch_settings_specified]
pattern = TA_Elasticsearch_settings/*
methods = POST, GET, DELETE

[expose:TA_Elasticsearch_elasticsearch]
pattern = TA_Elasticsearch_elasticsearch
methods = POST, GET

[expose:TA_Elasticsearch_elasticsearch_specified]
pattern = TA_Elasticsearch_elasticsearch/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
