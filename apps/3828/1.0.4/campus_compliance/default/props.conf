[bluecoat]
DATETIME_CONFIG =
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Custom
disabled = false
KV_MODE = none
pulldown_type = true
EXTRACT-getmessage = ^\S+\s+[\d:]{8}\s+(?<message>.*)

[tenable:sc:vuln]
EVAL-is_mitigated = if(hasBeenMitigated=0,"false","true")
FIELDALIAS-first_seen = firstSeen AS first_seen
FIELDALIAS-last_seen = lastSeen as last_seen