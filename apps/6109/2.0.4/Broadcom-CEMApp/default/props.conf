# Define your custom source types here
# The custom source-type CEM_Event_Data is defined here, which is the source type for all events posted to Splunk via TCP/IP (as defined in inputs.conf).

[CEM_Event_Data]
DATETIME_CONFIG = datetime.xml
NO_BINARY_CHECK = true
category = Custom
description = CEM Event Data
disabled = false
pulldown_type = true


# Applies the following lookups on all data with sourcetype=CEM_Event_Data. You can also configure the same based on "source", if needed.
# For more details on configuring automatic lookups, please refer to https://docs.splunk.com/Documentation/Splunk/6.5.1/Knowledge/Makeyourlookupautomatic

# For the static lookup below (host_location_lookup), the corresponding CSV file contains lookups
# that maps Hex IP address to host location. Please refer to the corresponding stanza in transforms.conf
# to know the details of the lookup CSV file.

# Note that the lookup CSV just contains sample data - and you will need to add entries based on
# your requirement to make it work in your environment.

LOOKUP-hostlocation = host_location_lookup SOURCE OUTPUTNEW HOSTLOCATION
LOOKUP-hostname = hexip clientip AS SOURCE OUTPUTNEW clienthost
LOOKUP-geolocation = geolocation clientip AS SOURCE OUTPUTNEW country
LOOKUP-ipaddr = ipaddr clientip AS SOURCE OUTPUTNEW ipaddress