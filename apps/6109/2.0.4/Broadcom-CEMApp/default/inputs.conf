# All the events posted to Splunk via TCP/IP to port 7000 will be indexed as cem_index with source type as CEM_Event_Data. 
# You can change the port value below accorrding to your site configuration.
# Optionally, you can also specify other rules to segregate your incoming data further into other indexes and/or sourcetypes. 

[tcp-ssl://:7000]
index = cem_index
sourcetype = CEM_Event_Data