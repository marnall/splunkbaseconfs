[mscs:azure:eventhub:truefashion]
KV_MODE = json
SHOULD_LINEMERGE = 0
# never truncate JSON
TRUNCATE = 0
pulldown_type = 1
# TIME_PREFIX always applied before SEDCMD see: https://www.aplura.com/assets/pdf/props_conf_order.pdf
# set _time from body.properties.Timestamp (MS365 Defender logs) rather ingestion time from Event hub. Note: body.time (when using Azure platform logs) should be alternatively used.
TIME_PREFIX =  "Timestamp": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3Q
TZ = UTC
# MSCS 4.3.3: remove {"body":
SEDCMD-eventhub_begin = s/^\{"body":\s?//g
# MSCS 4.3.3 and 4.4.0: remove "properties": {
SEDCMD-eventhub_embed = s/\"properties": \{\s?//g
# MSCS 4.4.0: replace last }} with } required because of cutting properties.* array
SEDCMD-eventhub_end_new = s/}}([^}}]*)$/}/g
# MSCS 4.3.3: remove },"x-opt-sequence-number":0,"x-opt-offset":"0","x-opt-enqueued-time":0} required because of cutting properties.* array
SEDCMD-eventhub_end_old = s/\},"x-opt-.+$//g
# MSCS 4.3.3+: you may enable this to further normalize data and remove "AdvancedHunting-*" prefix from category field value
#SEDCMD-event_hub_mdecategory = s/"category": "AdvancedHunting-\s?/"category": "/g
# Microsoft Raw Data Change, Multiply Tenants replace }, "Tenant": "XYZ"} to Tenant": "XYZ"} and parse it into main body
SEDCMD-eventhub_end_tenant = s/\}, "Tenant": /, "Tenant": /g
