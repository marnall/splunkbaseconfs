| rex field=data max_match=900 "submitButton=\"(?<submitButton>(true|false))" \
| rex field=data max_match=900 "autoRun=\"(?<autoRun>(true|false))" \
| rex field=data max_match=900 "(?<panel_tag><panel.*>)" \
| rex field=data max_match=900 "<input\s+type=\"time\"(?<time_selector>.*?)>" \
| rex field=data max_match=900 "(?<search_tag><search.*>)" \
| rex field=search_tag max_match=900 "(base|id)=\"(?<base3>\w+)" \
| rex field=data max_match=900 "\"query\":\"(?<query_v2>.*?)\"," \
| rex field=query_v2 mode=sed "s/\\\n//g" \
| rex field=data max_match=900 "\"query\":\"(?<dataSources>.*?)(\",\"queryParameters\"|\"},)" \
| rex field=dataSources mode=sed "s/\\\n//g" \
| rex field=dataSources mode=sed "s/\\\\\"/\"/g" \
| rex field=dataSources mode=sed "s/\",\"extend\":\"ds_.*$//g" \
| rex field=dataSources mode=sed "s/\s+/ /g" \
| eval query_v2=mvdedup(query_v2) , dataSources=mvdedup(dataSources) \
| eval is_time_selector = if(isnotnull(time_selector), "true", "false") \
| eval author = if(author="nobody", "system", author) , \
    dashboard_size = len(data) , \
    location = if(match(id, "^apps"), id, "users/" . id) ,\
    base = base3 ,\
    BaseSearch = if(isnull(base) OR base="", "Base_Search_May_Not_Be_Used!", base) ,\
    search = if(version=2,trim(mvsort(mvdedup(dataSources))), trim(mvsort(mvdedup(mvappend(query, query_v2, param, searchString)))) ) \
| rex field=search mode=sed "s/\s{2,}/ /g" \
| rex field=search mode=sed "s/\&lt;=/<=/g" \
| rex field=search mode=sed "s/\&gt;=/>=/g" \
| rex field=search mode=sed "s/\&lt;/</g" \
| rex field=search mode=sed "s/\&gt;/>/g" \
| rex field=search mode=sed "s/^\s*<!\[CDATA\[\s*|\s*\]\]>$//g" \
| eval search = if( match(search, "^\s+$") OR search="", null(), search ) \
| rex field=search mode=sed "s/^\s*[\r\n]+//g"
