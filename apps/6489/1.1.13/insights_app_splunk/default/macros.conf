| rex field=data max_match=900 "<searchString>(?<searchString>\p{Any}+?)<\/searchString>" \
| rex field=data max_match=900 "[<]search\s(base|id)=\"(?<base1>\w+)" \
| rex field=data max_match=900 "[<]search\sdepends=.*id=\"(?<base2>\w+)" \
