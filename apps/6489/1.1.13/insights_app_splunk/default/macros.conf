[normalize_earliest_time(1)]
description = Normalize Scheduler Jobs Earliest Time to Humanly Readable (Quick)
args = earliest_time
definition = eval dispatch_earliest_time_normalized = case ( \
    match($earliest_time$, "All-Time"), "All_Time",\
    match($earliest_time$, "^rt") OR match(savedsearch_search, "earliest=rt"), "Real_Time", \
    match($earliest_time$, "mon") OR match(savedsearch_search, "earliest=-\d+?mon"), "Month_Interval", \
    match($earliest_time$, "w") OR match(savedsearch_search, "earliest=-\d+?w"), "Week_Interval", \
    match($earliest_time$, "-1d@d|-1d|-24h|24h@h|-1day") OR $earliest_time$="@d" , "1_Day_Interval", \
    match($earliest_time$, "d") OR match(savedsearch_search, "earliest=-\d+?d"), "N_Day_Interval", \
    match($earliest_time$, "h") OR match(savedsearch_search, "earliest=-\d+?h"), "Hour_Interval", \
    match($earliest_time$, "m") OR match(savedsearch_search, "earliest=-\d+?m"), "Minute_Interval", \
    (match($earliest_time$, "s") OR match(savedsearch_search, "earliest=-\d+?s")) AND ! match(savedsearch_search, "earliest=-\d+?[mhdy]"), "Second_Interval", \
    $earliest_time$ = "0" OR $earliest_time$ = "1" OR match(savedsearch_search, "earliest=-?0|earliest=-?1"), "All-Time", \
    match($earliest_time$,"^\d+") AND len($earliest_time$) = 10, strftime($earliest_time$,"%m/%d/%Y %I:%M:%S"), \
    match($earliest_time$, "y") OR match(savedsearch_search, "earliest=-\d+?y"), "Year_Interval", \
    true(), "Other")

