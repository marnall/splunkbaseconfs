[get_useragent(1)]
description = Retrieves Browser name and version from the useragent field (Quick)
args = useragent
definition = rex field=$useragent$ "(?<Browser_and_Version>(MSIE|Trident|(?!Gecko.+)Firefox|(?!AppleWebKit.+Chrome.+)Safari(?!.+Edge)|(?!AppleWebKit.+)Chrome(?!.+Edge)|(?!AppleWebKit.+Chrome.+Safari.+)Edge|AppleWebKit(?!.+Chrome|.+Safari)|Gecko(?!.+Firefox))(?: |\/)([\d\.apre]+)|Splunk.*?\s|^Chrome.*|^Go-http.*|^Prometheus.*|^REST.*|^Ruby|^curl.*|^[pP]ython.*|^splunk.*|^AdvancedInstaller|^Microsoft.*|^Postman.*|^Vault.*|^go-resty.*)" \
| rex field=Browser_and_Version "(?<browser_name1>^.*?)/" \
| rex field=Browser_and_Version "(?<browser_name2>.*)" \
| rex field=Browser_and_Version "/(?<browser_version1>.*?)$" \
| rex field=Browser_and_Version "\s+(?<browser_version2>.*?)$" \
| rex field=$useragent$ "Edg\/(?<browser_version3>.*?)$" \
| rex field=$useragent$ "(Version/|iPhone\sOS\s)(?<Safari_Version>.*?)\s" \
| rex field=$useragent$ "(?<os_arch>(Win64|x86_64))" \
| rex field=$useragent$ "(?<os_name>(Linux|Macintosh|Windows\s*\w+|iPhone|iPad))" \
| rex field=$useragent$ "(Linux\s|Macintosh;\s|i\w+;\s|Windows\sNT\s)(?<os_version>.*?)[;)]" \
| eval \
    browser_name = coalesce(browser_name1,browser_name2),\
    browser_name = if(match($useragent$, "Edg\/\d+"), "Microsoft Edge", browser_name), \
    browser_name = if(match(browser_name, "Trident|MSIE"), "Internet Explorer", browser_name), \
    browser_version = coalesce(browser_version1,browser_version2),\
    browser_version = if(isnotnull(Safari_Version), Safari_Version, browser_version), \
    browser_version = if(browser_name = "Microsoft Edge", browser_version3, browser_version), \
    os_name = case ( \
    match($useragent$,"Windows NT 6.1"), "Windows 7", \
    match($useragent$,"Windows NT 6.2"), "Windows 8", \
    match($useragent$,"Windows NT 6.3"), "Windows 8.1", \
    match($useragent$,"Windows NT 10.0"), "Windows 10", \
    match($useragent$,"Pixel"), "Google Pixel",\
    match($useragent$,"Android"), "Android", \
    true(), os_name ) \
| fields - browser_name1, browser_name2, browser_version1, browser_version2, Browser_and_Version

[get_training_info(1)]
description = Retrieve Splunk EDU Training Information by Employee Email (Quick)
args = emp_email
definition = lookup splunk_rest_training_api_kv_store_lookup email As $emp_email$ OUTPUTNEW registrationID firstName lastName domainName classType courseName attended registrationStatus registrationEnteredDate registrationTimeStamp elearningStartDate elearningCompletionDate eLearningLastAccessedDate scheduleID scheduleStartDate scheduleEndDate passed SCORMLessonStatus \
| rename registrationEnteredDate As create_date elearningStartDate As start_date registrationID As id firstName As emp_first lastName As emp_last email As emp_email courseName As class_name elearningCompletionDate As completion_date eLearningLastAccessedDate As login_date SCORMLessonStatus As status classType As class_type \
| eval create_date = strftime(create_date, "%a %b %d %Y") , start_date = strftime(start_date, "%a %b %d %Y"), completion_date = strftime(completion_date, "%a %b %d %Y"), login_date = strftime(login_date, "%a %b %d %Y"), registrationTimeStamp = strftime(registrationTimeStamp, "%a %b %d %Y")

