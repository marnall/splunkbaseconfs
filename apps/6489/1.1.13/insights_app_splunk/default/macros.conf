[setup_get_dmc_assets_info]
description = Retrieves All Custom Search Groups from the Monitoring Console dmc_assets Lookup Table, for Splunk Enterprise replace with: `onprem_dmc_assets_info`
definition = noop

[onprem_dmc_assets_info]
description = Retrieves All Custom Search Groups from the Monitoring Console dmc_assets Lookup Table, in Cloud replace with noop
definition = join Splunk_Instance type=left [| inputlookup dmc_assets | fields host peerURI \
    | eval Splunk_Instance=lower(host) \
    | stats Last(peerURI) As host_ip by Splunk_Instance \
    | rex field=host_ip mode=sed "s/:8089//g" \
    | fields Splunk_Instance host_ip] \
| `get_dmc_assets_info(Splunk_Instance)`\
| rex field=search_group max_match=100 "dmc_customgroup_(?<Custom_Groups>.*?)$"

