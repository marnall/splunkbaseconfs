description = Get a list of all Summary Indexing Sources.  Example: | `ia4s` (Quick)
definition = inputlookup splunk_rest_saved_searches_sh_kv_store_lookup where app=insights_app_splunk | search savedsearch_name IN (*_summary_tracker*,*_summary_data_gen*) NOT savedsearch_name IN (splunk_assets_summary_data,splunk_assets_summary_data_genr,splunk_assets_complete_summary_data,splunk_assets_complete_summary_data_genr) | rex field=savedsearch_name mode=sed "s/_genr|_geno|_gend|_gen_local//g" | rex field=savedsearch_name mode=sed "s/_trackerr|_trackero|_trackerd/_tracker/g" | rename savedsearch_name as source | append [| makeresults |  eval source="splunkapps", description="Splunkbase Apps KV Store Gen Job From Summary Index"] | stats last(description) as Description by source

[gap]
description = Perform Data sources gap analysis (Quick)
definition = `ia4s` | join source type=left [ search `setup_summary_index_list` source=splunk_* OR source=splunkapps earliest=-72h  | rex field=source mode=sed "s/_genr|_geno|_gend|_gen_local//g" | stats count as found values(shcluster_label) as sh_label by source | fields source found sh_label ] | eval Message = if(isnull(found), "NO DATA", "DATA FOUND") | sort - Message | table source Description Message sh_label

