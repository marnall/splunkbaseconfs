[get_field_desc(1)]
description = Retrieves Data Model Field Description (Quick)
args = Field_Name
definition = lookup splunk_fields_all_csv_lookup Field_Name AS $Field_Name$ OUTPUTNEW Field_Description

[time_format(1)]
description = StrfTime Formatter (Quick)
args = time
definition = $time$ = strftime($time$, "%A %B %d, %Y %I:%M:%S %p %Z")

[drop_dm_object_name(1)]
description = Renames Data Model Dataset Fields
args = object
definition = rename "$object$.*" As *

[from_audit]
description = Retrieves Audit Dataset Data using the | from datamodel command (Quick)
definition = from datamodel:IA4S.Audit_Search \
| `get_instance_info(host)` \
| fields _time Splunk_Roles host available_count considered_events datamodel decompressed_slices event_count dispatch_time exec_time info result_count roles savedsearch_name scan_count search search_et search_id search_lt search_startup_time search_type searched_buckets total_run_time total_slices user

[from_internal]
description = Retrieves Internal Dataset Data using the | from datamodel command (Quick)
definition = from datamodel:IA4S.Internal_Scheduler \
| `get_instance_info(host)` \
| fields _time Splunk_Roles host app search_id_normalized concurrency_category concurrency_context concurrency_limit dispatch_time priority reason result_count total_run_time savedsearch_id savedsearch_name scheduled_time search_id search_type skipped_count info user window_time alert_actions Total_Executions Skipped_Executions

[identities]
description = Identities.  Example: `| identities` (Quick)
definition = search `setup_summary_index_list` source IN (splunk_rest_authorization_roles_sh_summary_data, splunk_rest_identities_summary_data) earliest=-48h | `clean`

[identitiesk]
description = Identities.  Example: `| identitiesk` (Quick)
definition = from lookup:splunk_rest_identities_kv_store_lookup \
| `get_splunk_roles_info(shcluster_label,splunk_role_map)` \
| eval srchJobsQuota_Final = if(imported_srchJobsQuota > srchJobsQuota, imported_srchJobsQuota ,srchJobsQuota) \
| table identity shcluster_label emp_first emp_last emp_name emp_email auth_type emp_city emp_region1 emp_country emp_title emp_lob emp_dep emp_type emp_status emp_cc emp_location emp_floor emp_manager emp_startDate emp_endDate Contractor_Expiration locked-out phone\
    `ia4s_comment("capabilities,imported_capabilities")` \
| `rename_identity_fields` \
| `rename_splunk_roles_fields`

[customk]
description = Retrieves Custom Identities (Quick)
definition = from lookup:splunk_identities_custom_kv_store_lookup \
| table identity,key,emp_name,emp_first,emp_last,emp_type,emp_status,emp_title,emp_email,emp_function,emp_manager,emp_company,emp_startDate,emp_endDate,emp_city,emp_region1,emp_region2,emp_country,emp_lat,emp_lon,emp_location,emp_office,emp_site,emp_floor,emp_phone1,emp_phone2,emp_tz,emp_bunit,emp_cc,emp_dep,emp_lob1,emp_lob2,emp_lob3,emp_lob4,emp_lob5,emp_lob6,emp_vendor \
| `rename_identity_fields`

[get_fields_list]
description = Gather field list using | fieldsummary (Quick)
definition = rename "eai:acl.*" as "*" , "eai:*" AS "*"\
| fields - "perms.*", "can_*", id, published, removable, modifiable, updated \
| fieldsummary \
| rename field AS Fields_List \
| fields Fields_List \
| where Fields_List!="Fields_List" \
| mvcombine Fields_List \
| eval Fields_List=mvjoin(Fields_List," ")

[rename_search_concurrency_fields]
description = Renames SH Search Concurrency REST Fields to human-readable format
definition = rename \
    base_max_searches AS "Base Max Searches" \
    max_auto_summary_searches AS "Max Auto Summary Searches" \
    max_hist_scheduled_searches AS "Max Historical Scheduled Searches"\
    max_hist_searches AS "Max Historical Searches" \
    max_searches_per_cpu AS "Max Searches Per CPU"\
    max_searches_perc AS "Max Searches %" \
    auto_summary_perc AS "Auto Summary %" \
    max_rt_search_multiplier AS "Max Real-Time Search Multiplier" \
    max_rt_scheduled_searches AS "Max Real-Time Scheduled Searches" \
    max_rt_searches AS "Max Real-Time Searches"

[strptime_format(1)]
description = StrpTime Formatting (Quick)
args = time
definition = rex field=$time$ mode=sed "s/^19.*//g"\
| eval $time$ = strptime($time$, "%Y-%m-%dT%H:%M:%S%z")

[strftime_format(1)]
description = StrfTime Formatting (Quick)
args = time
definition = eval $time$ = strftime($time$, "%A %B %d, %Y %I:%M:%S %p %Z")

[ustime_format(1)]
description = US Time Formatting (Quick)
args = time
definition = eval $time$ = strftime($time$, "%a %b %d %Y %H:%M:%S (%Z)")

[fix_identities_info]
description = Fixes Identity information
definition = eval \
    emp_city = case ( match(emp_city, "Ciudad Autonoma Buenos Aires"), "Buenos Aires", \
    match(emp_city, "Frankfurt Am Main"), "Frankfurt",\
    true(), emp_city ) , \
    emp_region1 = case ( match(emp_region1, "mic"), "MI",\
    true(), emp_region1 ) , \
    emp_country = case( match(emp_country, "(?i)usa"), "United States", \
    emp_country="IND", "India", emp_country="ARG", "Argentina",\
    true(), emp_country ),\
    emp_loc = case ( isnull(emp_loc), `setup_emp_loc`,\
    true(), emp_loc ), \
    emp_type = case ( isnull(emp_type), `setup_emp_type`,\
    true(), emp_type ), \
    emp_status = case ( isnull(emp_status), `setup_emp_status`,\
    true(), emp_status )

[get_country_name(1)]
description = Retrieves Identity Geographical Country Information using country_iso2 (Quick)
args = emp_country
definition = lookup local=true splunk_cities_geo_sh_csv_lookup country_iso2 AS $emp_country$ OUTPUTNEW country as country \
| eval emp_country=mvdedup(country) | fields - country

[get_geo_info(2)]
description = Retrieves Identity Geographical Information using City & Country (Quick)
args = emp_city,emp_country
