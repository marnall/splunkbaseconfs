[get_search_jobs_info(2)]
description = Retrieves information about all jobs running on every search head.  The Macro is powered by splunk_rest_search_jobs_sh_summary_tracker.  Example: | `get_search_jobs_info(shcluster_label,search_id_normalized)` (Quick)
args = shcluster_label,search_id_normalized
definition = join $shcluster_label$ $search_id_normalized$ type=left \
    [| search `setup_summary_index_list` source="splunk_rest_search_jobs_sh_summary_tracker" \
    | stats \
        Latest(*) As * \
        by $shcluster_label$ $search_id_normalized$ \
    | eval status_org = "get_search_jobs_info" , status_search_jobs = status\
    | fields $shcluster_label$ $search_id_normalized$ status_search_jobs status_org search_et search_lt ttl priority delegate diskUsage doneProgress available_count eventCount isEventsPreviewEnabled isPreviewEnabled isRemoteTimeline meanPreviewPeriod numPreviews result_count resultIsStreaming resultPreviewCount total_run_time sampleRatio sampleSeed scan_count searchCanBeEventType runtime_auto_cancel runtime_auto_pause error_messages ] \
    | `byte2mb(diskUsage)`

[get_search_jobs_info(3)]
description = Retrieves information about all jobs running on every search head.  The Macro is powered by splunk_rest_search_jobs_sh_summary_tracker.  Example: | `get_search_jobs_info(shcluster_label,search_id_normalized,pid)` (Quick)
args = shcluster_label,search_id_normalized,pid
definition = join $shcluster_label$ $search_id_normalized$ $pid$ type=left \
    [| search `setup_summary_index_list` source="splunk_rest_search_jobs_sh_summary_tracker" \
    | stats \
        Latest(*) As * \
        by $shcluster_label$ $search_id_normalized$ $pid$ \
    | eval status_org = "get_search_jobs_info" , status_search_jobs = status\
    | fields $shcluster_label$ $search_id_normalized$ $pid$ status_search_jobs status_org search_et search_lt ttl priority delegate diskUsage doneProgress available_count eventCount isEventsPreviewEnabled isPreviewEnabled isRemoteTimeline meanPreviewPeriod numPreviews result_count resultIsStreaming resultPreviewCount total_run_time sampleRatio sampleSeed scan_count searchCanBeEventType runtime_auto_cancel runtime_auto_pause error_messages ] \
    | `byte2mb(diskUsage)`

[get_audit_search_info(2)]
description = Retrieves Search Information from the Audit Dataset.  Example: | `get_audit_search_info(shcluster_label,search_id_normalized)` (Quick)
args = shcluster_label,search_id_normalized
definition = join $shcluster_label$ $search_id_normalized$ type=left \
    [| tstats SummariesOnly=TRUE Allow_OLD_Summaries=FALSE \
        Latest(_time) As _time \
        Latest(Search_Activity.Audit_Search.info1) As info \
        From DataModel=IA4S \
        Where nodename=Search_Activity.Audit_Search \
        NOT Search_Activity.Audit_Search.info1 = "granted" \
        By host Search_Activity.Audit_Search.search_id1 \
    | `drop_dm_object_name(Search_Activity.Audit_Search)` \
    | rename search_id1 As search_id \
    | `get_normalized_search_id(search_id)` \
    | `get_shcluster_label(host)` \
    | eval info = case ( \
        info="completed", "Completed", \
        match(info,"^cancel"), "Canceled", \
        info="failed", "Failed", \
        true(), info) \
    | eval status_org = "get_audit_search_info" , status_audit = info\
    | fields shcluster_label search_id_normalized status_audit status_org]

[get_internal_search_info(2)]
description = Retrieves Search Information from the Internal Dataset.  Example: | `| `get_internal_search_info(shcluster_label,search_id_normalized)` (Quick)
args = shcluster_label,search_id_normalized
definition = join $shcluster_label$ $search_id_normalized$ type=left \
     [| tstats SummariesOnly=TRUE Allow_OLD_Summaries=FALSE \
        Latest(_time) As _time \
        Latest(Search_Activity.Internal_Scheduler.info2) As info \
        From DataModel=IA4S \
        Where nodename=Search_Activity.Internal_Scheduler \
        index=_internal \
        By host Search_Activity.Internal_Scheduler.search_id2 \
    | `drop_dm_object_name(Search_Activity.Internal_Scheduler)` \
    | rename search_id2 As search_id \
    | `get_normalized_search_id(search_id)` \
    | `get_shcluster_label(host)` \
    | eval info = case ( \
        info="completed", "Completed", \
        match(info,"^cancel"), "Canceled", \
        info="deferred", "Deferred", \
        info="delegated_remote", "Delegated Remote", \
        info="delegated_remote_completion", "Delegated Remote Completion", \
        info="delegated_remote_error", "Delegated Remote Error", \
        info="skipped", "Skipped", \
        info="terminated", "Terminated", \
        info="queued", "Queued", \
        true(), info) \
    | eval status_org = "get_internal_search_info" , status_internal = info\
    | fields shcluster_label search_id_normalized status_internal status_org]

[get_saved_searches_info(1)]
