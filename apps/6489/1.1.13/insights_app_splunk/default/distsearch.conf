
# lookup files generated within the context of this app should not be pushed down to 
# indexers as part of the bundle

# use this stanza in older versions and comment out the replicationDenylist stanza
# [replicationBlacklist]
# no-insights_app_splunk-lookups = ...insights_app_splunk/lookups...
# no-insights_app_splunk-bin = ...insights_app_splunk/bin...

[replicationDenylist]
no-insights_app_splunk-lookups = ...insights_app_splunk/lookups...
no-insights_app_splunk-bin = ...insights_app_splunk/bin...

# in a situation you are blacklisting all KV Stores use this regex to allow insights_app_splunk's KV Stores to be replicated in the knowledge bundle
# This regex ignores the insights_app_splunk and insights_app_splunk apps from the blacklisting exclusion incase there is one in place.
# nokvstore = kvstore_(?!s_insigh)\N+


