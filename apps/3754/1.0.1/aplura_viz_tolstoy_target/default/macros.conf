## Helper Functions
[tolstoy_prep(1)]
args = byc
definition = foreach val_* [ eval val_<<MATCHSEG1>> = "\"upper\":\"". if(isnotnull(upper_<<MATCHSEG1>>),upper_<<MATCHSEG1>>,"")."\",\"lower\":\"".if(isnotnull(lower_<<MATCHSEG1>>),lower_<<MATCHSEG1>>,"")."\",\"min\":\"".if(isnotnull(min_<<MATCHSEG1>>),min_<<MATCHSEG1>>,"")."\",\"value\":\"".val_<<MATCHSEG1>>."\",\"max\":\"".if(isnotnull(max_<<MATCHSEG1>>),max_<<MATCHSEG1>>,"")."\"" ] | fields $byc$ val* |rename val_* as * | untable $byc$ splatter_label splatter_size | rename $byc$ as target  | eval splatter_scale_direction = "descending", splatter_scale_range = "0,100", splatter_dynamic_range = "false"

[tolstoy_label(2)]
args = f, v
definition = eval splatter_label = case(splatter_label=="val_$f$","$v$",isnotnull(splatter_label),splatter_label)

[tolstoy_direction(1)]
args = f
definition = eval splatter_scale_direction = case(splatter_label=="$f$",if(splatter_scale_direction=="descending","ascending","descending"),1==1,splatter_scale_direction)

[tolstoy_range(2)]
args = f, d
definition = eval splatter_scale_range = if(splatter_label=="$f$", "$d$", splatter_scale_range)

[tolstoy_range(3)]
args = f, d, h
definition = eval splatter_scale_range = if(splatter_label=="$f$" AND target=="$h$", "$d$", splatter_scale_range)

[tolstoy_ignore(1)]
args = f
definition = where splatter_label!=split("$f$",",")

[tolstoy_keep(1)]
args = f
definition = where splatter_label=split("$f$",",")

[tolstoy_optimal(2)]
args = f, v
definition = eval splatter_optimal = case(splatter_label=="$f$","$v$",isnotnull(splatter_optimal),splatter_optimal)

[tolstoy_optimal(3)]
args = f, v, h
definition = eval splatter_optimal = case(splatter_label=="$f$" AND target=="$h$,"$v$",isnotnull(splatter_optimal),splatter_optimal)

[tolstoy_dynamic_range(1)]
args = f
definition = eval splatter_dynamic_range = case(splatter_dynamic_range=="true" AND splatter_label=="$f$","false",splatter_label=="$f$","true",isnotnull(splatter_dynamic_range),splatter_dynamic_range)

[tolstoy_single_target(1)]
args = t
definition = where target=="$t$"

[tolstoy_sample]
definition = index="_introspection" hostwide| stats avg(data.*) as val_* min(data.*) as min_* max(data.*) as max_* max(data.mem) as upper_mem_used max(data.pg_swapped_out) as upper_pg_swapped_out by host | `tolstoy_prep("host")`  |`tolstoy_keep("cpu_system_pct,cpu_user_pct,mem_used,normalized_load_avg_1min,swap_used,cpu_idle_pct")`| `tolstoy_direction("cpu_idle_pct")` | `tolstoy_optimal("mem_used","750")` | `tolstoy_range("mem_used","0,2000")`|`tolstoy_range("swap_used","0,500")` | `tolstoy_dynamic_range("mem_used")`|`tolstoy_dynamic_range("pg_swapped_out")`

[tolstoy_sample_random]
definition = index="_introspection" hostwide| stats avg(data.*) as val_* min(data.*) as min_* max(data.*) as max_* by host | `tolstoy_prep("host")` | head 10 | eval splatter_size = random() % 100

[tolstoy_sample_multiple]
definition = union [search `tolstoy_sample_random` ] [search `tolstoy_sample_random` | eval target = "someother"][search `tolstoy_sample_random` | eval target = "yet_another"]