[0_delete_syslog_prefix]
REGEX = ^<\d+>\w+\s+\d+\s+\d\d:\d\d:\d\d\s+[^:]+:\s+(.*)$
FORMAT = $1
DEST_KEY = _raw

# drop anyhting else: https://community.splunk.com/t5/Splunk-Search/All-events-except-one-to-Null/m-p/194429

[setnull]
REGEX = .
DEST_KEY = queue
FORMAT = nullQueue

[doTryResume]
REGEX=doTryResume .* iRet -?[^0]\d*$
DEST_KEY = queue
FORMAT = indexQueue

[queue_params]
REGEX=queue.c: params:
DEST_KEY = queue
FORMAT = indexQueue

[suspended_next_retry]
REGEX=suspended, next retry
DEST_KEY = queue
FORMAT = indexQueue

[iNbrResRtry]
REGEX=iNbrResRtry
DEST_KEY = queue
FORMAT = indexQueue

[TCPSendInit]
REGEX=TCPSendInit
DEST_KEY = queue
FORMAT = indexQueue

[tryResume_returned]
REGEX=tryResume returned
DEST_KEY = queue
FORMAT = indexQueue

[transitioned_to_state_susp]
REGEX=transitioned to state: susp
DEST_KEY = queue
FORMAT = indexQueue

[ResumeInRow]
REGEX=ResumeInRow
DEST_KEY = queue
FORMAT = indexQueue

[resumed]
REGEX=\sresumed\s
DEST_KEY = queue
FORMAT = indexQueue

[cannot connect]
REGEX=cannot connect
DEST_KEY = queue
FORMAT = indexQueue

[timed_out]
REGEX=timed out
DEST_KEY = queue
FORMAT = indexQueue

[hat_success_RDY_again]
REGEX=hat success RDY again
DEST_KEY = queue
FORMAT = indexQueue

[iRet_code]
filename = iRet_code.csv
