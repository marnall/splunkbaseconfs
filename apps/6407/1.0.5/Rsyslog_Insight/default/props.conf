[rsyslog:debug]
# 9453.733012115:main thread    : rsyslogd.c: rsyslogd 8.2102.0-8.el8 startup, module path '', cwd:/rsyslog_tests
# let the 4digits timestamp in raw data, and modify it at search time
 
MAX_TIMESTAMP_LOOKAHEAD=10
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TIME_FORMAT=%s
TIME_PREFIX=^

TRANSFORMS-filter_rsyslog_debug = setnull,doTryResume,queue_params,suspended_next_retry,iNbrResRtry,TCPSendInit,tryResume_returned,transitioned_to_state_susp,ResumeInRow,resumed,cannot connect,timed_out,hat_success_RDY_again

# 4207.619843915:main Q:Reg/w0  : omfwd.c: omfwd: doTryResume 192.168.555.34 iRet -2027
# runtime/rsyslog.h
EXTRACT-doTryResume = doTryResume (?<omfwd_dest>[^ ]+)\s+iRet\s+(?<iRet_code>[\-\d]+)
# 4207.619875230:main Q:Reg/w0  : ../action.c: action[action-7-builtin:omfwd] transitioned to state: susp
EXTRACT-set_suspended_state = \saction\[(?<rsyslog_action>[^\]]+)\] transitioned to state: (?<rsyslog_action_state>susp)
# 4677.153148990:main Q:Reg/w0  : omfwd.c: TCPSendInit CREATE
EXTRACT-tcpSendInit_create = TCPSendInit (?<tcpSendInit_operation>CREATE)
# 4207.619772082:main Q:Reg/w0  : omfwd.c: TCPSendInit FAILED with -2027.
EXTRACT-tcpSendInit_failed = TCPSendInit (?<tcpSendInit_operation>FAILED) with\s+(?<iRet_code>[\-\d]+)
# 2177.626571347:main Q:Reg/w1  : ../action.c: action action-0-builtin:omfwd: commit failed, no error file set, silently discarding 256 messages
EXTRACT-discarding_messages = action (?<rsyslog_action>[^ ]+).*silently discarding\s+(?<number_of_discarded_messages>\d+)\s+messages
# 4218.540897367:main Q:Reg/w0  : omfile.c: omfile: write to stream, pData->pStrm 0x7fb364005e50, lenBuf 153, strt data Apr 26 16:43:27 sender rsyslogd[37152]: cannot connect to 192.168.555.34:514: Connection timed out [v8.2102.0-8.el8 try https://
# 4218.530591123:main Q:Reg/w0  : ruleset.c: processBATCH: next msg 244: cannot connect to 192.168.555.34:514: Connection timed out [v8.2102.0-8.el8 try https://www.rsyslog.com/e/2027 ]
EXTRACT-cannot_connect = (?<rsyslog_actoin>cannot connect) to\s+([^ ]+): (?<cannot_connect_reason>.*)
# 3095.104582567:main Q:Reg/w1  : ../action.c: actionDoRetry: action-0-builtin:omfwd had success RDY again (iRet=0)
EXTRACT-rdy_again = actionDoRetry: (?<rsyslog_action>[^ ]+) had success (?<rsyslog_action_state>RDY) again
[rsyslog:impstats]
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 20
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %e %H:%M:%S %Y
TIME_PREFIX = ^\w\w\w\s
category = Custom
disabled = false
pulldown_type = true

EXTRACT-object = : (?<object>.+): origin
EVAL-object_origin = object."_".origin


