# ---------------------------------------------------------------------
# Common Properties (inherited by or can be overidden by child stanzas)
# ---------------------------------------------------------------------

[elevate_rest]

# if you want to change the default index, ensure you also change the gobal index used for searches in default/macros.conf in the 'elevate_index' stanza
index = main

# default required headers
http_header_propertys = Content-Type=application/json

# custom response handler defiend in bin/responsehandlers.py for processing response JSON Arrays
response_handler = ElevateJSONResultsArrayHandler

# default polling interval for all rest endpoints, daily
polling_interval = 86400

python.version = python3


# ---------------------------------
# Properties for each REST endpoint
# ---------------------------------

[elevate_rest://reputation_risks]
disabled = 1
sourcetype = elevate_rest_reputation_risks
endpoint = /reputations/analysis/risks
url_args = page_size=100