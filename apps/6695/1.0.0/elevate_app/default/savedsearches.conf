[elevate_populate_lookup_reputation_risks]
disabled = 1
run_on_startup = true
alert.track = 0
cron_schedule = 0 1 * * *
description = Populates the lookup elevate_reputation_risks_lookup
enableSched = 1
schedule_priority = highest
search = `elevate_reputation_risks` | table actions_score,actual_phishing,attack_factor,department,email,employment_type,es_manager_id,es_person_id,human_risk_score,individual,location,malware,manager_name,organizational_role,password_manager,secure_browsing,sensitive_data_handling,simulated_phishing,tenure_duration,training | outputlookup create_empty=True override_if_empty=false elevate_reputation_risks_lookup
dispatch.earliest_time = -1d
dispatch.latest_time = now