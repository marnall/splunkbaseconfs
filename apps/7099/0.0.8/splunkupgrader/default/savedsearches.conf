[Upgrader App Target Servers]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = splunkupgrader
request.ui_dispatch_view = search
search = (index=_internal) earliest=-24h sourcetype=splunkd NOT(CASE(MetricSchemaProcessor)) Metrics TERM(group=instance) TERM(name=instance) (deployment_client OR cluster_search_head OR search_head OR indexer OR cluster_slave OR search_peer OR license_master) NOT(universal_forwarder) \
| eval mv_roles=split(instance_roles, ", ") \
| stats count values(instance_roles) as roles values(mv_roles) as mv_roles values(index_cluster_label) as index_cluster_label values(sh_cluster_label) as sh_cluster_label by instance_guid server_name \
| eval index_cluster_label=if(index_cluster_label="none", "", index_cluster_label) , sh_cluster_label=if(sh_cluster_label="none", "", sh_cluster_label) \
| stats count(eval(mv_roles="indexer")) as indexer count(eval(mv_roles="search_peer")) as search_peer count(eval(mv_roles="cluster_search_head")) as cluster_search_head count(eval(mv_roles="search_head")) as search_head count(eval(mv_roles="cluster_slave")) as cluster_peer count(eval(mv_roles="kv_store")) as kv_store_role count(eval(mv_roles="cluster_master")) as cluster_manager count(eval(mv_roles="license_master")) as license_manager count(eval(mv_roles="deployment_server")) as deployment_server count(eval(mv_roles="deployment_client")) as deployment_client count(eval(mv_roles="shc_captain")) as shc_captain count(eval(mv_roles="shc_member")) as shc_member values(sh_cluster_label) as sh_cluster_label by instance_guid server_name roles index_cluster_label \
| eval roles=split(roles, ", ") \
| rename instance_guid as guid \
| rename server_name as host \
| eval host=lower(host) \
| append maxtime=120 maxout=5000 timeout=120 \
    [| search (index=_internal) Metrics sourcetype=splunkd TERM(group=tcpin_connections) earliest=-25min latest=now TERM(fwdType=full) \
    | stats values(connectionType) as tcp_connectionType values(arch) as tcp_arch values(version) as tcp_version values(fwdType) as tcp_fwdType values(os) as tcp_os sum(kb) as tcp_sum_kb dc(host) as tcp_targets_touched by hostname guid \
    | table * \
    | eval hostname = lower(host) , isForwarding=1 ] \
| append maxtime=120 maxout=5000 timeout=120 \
    [| search index=_introspection component=hostwide earliest=-24h \
    | eval host = lower(host) \
    | stats values(data.cpu_count) as cpu_count values(data.os_name) as os_name values(data.os_build) as os_build values(data.virtual_cpu_count) as vcpu_count values(data.splunk_version) as splunk_version values(data.os_version) as os_version by host data.instance_guid \
    | rename data.instance_guid as guid] \
| append maxtime=120 maxout=5000 timeout=120 \
    [| rest /servicesNS/-/-/server/info splunk_server=* timeout=120 \
    | eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", null()) , is_indexer = if(server_roles="indexer" OR isForwarding = 0, "yes", null()), host_resolved = lower(host_resolved), host_fqdn = lower(host_fqdn), lower_splunk_server = lower(splunk_server), host = lower(host) , server_roles = mvjoin(server_roles, ",") \
    | eval install_file_version = "$installversion$" \
    | fields lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_connected is_search_head is_indexer guid server_roles isForwarding install_file_version ] \
| stats values(*) as * by guid \
| append maxtime=120 maxout=5000 timeout=120 \
    [| rest /servicesNS/-/-/server/settings splunk_server=* timeout=120 \
    | eval host_resolved = lower(host_resolved), host_fqdn = lower(host_fqdn), lower_splunk_server = lower(splunk_server), host = lower(host) \
    | fields lower_splunk_server splunk_server serverName, host, host_resolved, SPLUNK_DB, SPLUNK_HOME, appServerPorts, dfsDisabled, dfsMasterPort, enableSplunkWebSSL, httpport, kvStoreDisabled, kvStorePort, mgmtHostPort, minFreeSpace, sessionTimeout, startwebserver, trustedIP ] \
| append maxtime=120 maxout=5000 timeout=120 \
    [ search index=_internal sourcetype=splunkd earliest=-15m \
        [| rest /services/server/info f=host splunk_server=local \
        | fields host \
        | return host ] \
    | stats count by host \
    | eval is_local = "True" \
    | fields host is_local ] \
| stats values(*) as * by host \
| eval primary_role=case(indexer=1,"indexer", cluster_manager=1,"cluster_manager", shc_member=1 OR shc_captain=1,"search_head_cluster", cluster_search_head=1,"cluster_search_head", search_head=1,"search_head", license_manager=1,"license_manager", deployment_server=1,"deployment_server", tcp_fwdType="full","heavy_forwarder", tcp_fwdType="uf","universal_forwarder" ) \
| eval index_cluster_label = if(isnull(index_cluster_label) OR index_cluster_label="", null(), index_cluster_label), search_head_cluster = if(isnull(search_head_cluster) OR search_head_cluster="", null(), search_head_cluster) \
| eval roles = case(isnull(roles) AND primary_role="heavy_forwarder", "heavy_forwarder", true(), roles) \
| eval version=coalesce(tcp_version, splunk_version) \
| eval label = case ( primary_role="cluster_manager", host, primary_role="search_head_cluster", sh_cluster_label, isnotnull(index_cluster_label), index_cluster_label, true(), host ) \
| eval name = case ( primary_role = "search_head_cluster" AND is_itsi = "yes", "itsi-shc", primary_role = "search_head_cluster" AND is_es = "yes", "es-shc", primary_role = "search_head_cluster", "shc", primary_role = "indexer" AND isnull(index_cluster_label), "idx", primary_role = "indexer" AND isnotnull(index_cluster_label), "idxc", (primary_role = "search_head" OR primary_role = "cluster_search_head") AND is_itsi = "yes", "itsi", (primary_role = "search_head" OR primary_role = "cluster_search_head") AND is_es = "yes", "es", primary_role = "search_head" OR primary_role = "cluster_search_head" OR is_search_head="yes", "sh", primary_role = "cluster_manager", "cm", primary_role = "heavy_forwarder", "hf", true(), "adhoc" ) \
| eval is_search_head = case(primary_role="search_head", "yes", primary_role="indexer" OR primary_role = "heavy_forwarder", "no", true(), is_search_head ) \
| streamstats dc(label) as count by name \
| eval name = name . "-" . printf("%02d", count) \
| eval roles = if(isnull(roles) AND is_search_head="yes", "search_head", roles) \
| eval role=mvjoin(roles,",") , splunk_server = if(isnull(splunk_server) OR splunk_server="", host, splunk_server) \
| foreach host host_fqdn host_resolved serverName lower_splunk_server \
    [| eval <<FIELD>> = if(isnull(<<FIELD>>) OR <<FIELD>>="", splunk_server, <<FIELD>>), <<FIELD>> = lower(<<FIELD>>) ] \
| eval _time = now() \
| fillnull value="no" is_connected \
| fillnull value="False" is_local \
| table splunk_server is_local splunk_version mgmtHostPort lower_splunk_server name label host host_fqdn host_resolved serverName guid role is_search_head is_indexer is_connected isForwarding os_name os_version os_build install_file_version \
| eval role=split(role,",") \
| search NOT role IN (shc_*,cluster_slave,cluster_peer) is_connected = yes NOT os_name = Windows\
| eval role=mvjoin(role,",")
workload_pool = standard_perf

[Upgrader App Target Servers Rest]
action.email.useNSSubject = 1
alert.track = 0
description = This is a rest only search
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = splunkupgrader
request.ui_dispatch_view = search
search = | rest /servicesNS/-/-/server/info splunk_server=* \
| eval install_file_version = "$installVersion$" \
| append \
    [| rest /servicesNS/-/-/server/info splunk_server=local \
    | eval is_local = "True" \
    ] \
| stats values(*) AS * by splunk_server \
| fillnull value="False" is_local \
| eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", null()) , is_shc = if(server_roles="cluster_search_head", "yes", null()), is_indexer = if(server_roles="indexer" OR isForwarding = 0, "yes", null()), is_idxc = if(server_roles="cluster_slave", "yes", null()), host_resolved = lower(host_resolved), host_fqdn = lower(host_fqdn), lower_splunk_server = lower(splunk_server), host = lower(host) , server_roles = mvjoin(server_roles, ",") \
| where not (is_idxc="yes" OR is_shc="yes" OR os_name="Windows") \
| fields id os_version lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_local is_connected is_search_head is_shc is_indexer is_idxc guid server_roles isForwarding version install_file_version \
| stats values(*) as * values(install_file_version) as install_file_version last(id) as id by guid \
| rex field=id "https:\/\/[^\:]+:(?<mgmt_port>\d+)"
workload_pool = standard_perf

[Upgrader App Target Servers Active]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = This is the Active Search
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = splunkupgrader
request.ui_dispatch_view = search
search = | rest /servicesNS/-/-/server/info splunk_server=* \
| eval install_file_version = "$installVersion$" \
| append \
    [| rest /servicesNS/-/-/server/info splunk_server=local \
    | eval is_local = "True" \
        ] \
| append \
    [| rest splunk_server=* /servicesNS/-/-/apps/local search="core=0" \
    | where title="splunkupgrader" \
    | eval is_installed = if(title="splunkupgrader", "True", "False") \
    | fields splunk_server title is_installed ] \
| stats values(*) AS * by splunk_server \
| fillnull value="False" is_local, is_installed\
| fields id os_version lower_splunk_server splunk_server host_fqdn host_resolved serverName host is_local is_connected is_search_head is_shc is_indexer is_idxc guid server_roles isForwarding version install_file_version is_installed\
| stats values(*) as * values(install_file_version) as install_file_version last(id) as id by guid \
| rex field=id "https:\/\/[^\:]+:(?<mgmt_port>\d+)" \
| eval server_roles = mvjoin(server_roles, " ") \
| where ! match(server_roles, "^shc_|cluster_manager|cluster_master|cluster_slave|cluster_peer")
workload_pool = standard_perf

