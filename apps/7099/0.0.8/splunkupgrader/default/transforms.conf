[extract-loglevel]
REGEX = \d+-\d+-\d+\s+\d+:\d+:\d+.\d+\s+([A-Z]+)\s+(\S+)\s+(.*)
FORMAT = log_level::$1
WRITE_META = True

[extract-component]
REGEX = \d+-\d+-\d+\s+\d+:\d+:\d+.\d+\s+([A-Z]+)\s+(\S+)\s+(.*)
FORMAT = component::$2
WRITE_META = True

[extract-message]
REGEX = \d+-\d+-\d+\s+\d+:\d+:\d+.\d+\s+([A-Z]+)\s+(\S+)\s+(.*)
FORMAT = message::$3
WRITE_META = True

