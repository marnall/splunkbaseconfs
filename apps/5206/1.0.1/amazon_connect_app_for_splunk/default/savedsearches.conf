[sum_evt_aws_connect_contact_lense]
action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index._name = aws_sum
action.summary_index._type = event
action.summary_index.sum_type = contact_lens
alert.track = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m@m
dispatch.latest_time = -0m@m
display.visualizations.custom.wordcloud_app.wordcloud.alignmentMode = horizontal
display.visualizations.custom.wordcloud_app.wordcloud.backgroundColor = #fff
display.visualizations.custom.wordcloud_app.wordcloud.colorBy = colorMode
display.visualizations.custom.wordcloud_app.wordcloud.colorMode = categorical
display.visualizations.custom.wordcloud_app.wordcloud.maxColor = #d93f3c
display.visualizations.custom.wordcloud_app.wordcloud.minColor = #f7bc38
display.visualizations.custom.wordcloud_app.wordcloud.numOfBins = 3
display.visualizations.custom.wordcloud_app.wordcloud.splunkTastic = 0
display.visualizations.custom.wordcloud_app.wordcloud.useColors = 1
enableSched = 1
realtime_schedule = 0
search = sourcetype="aws:contactlens:s3" \
| rename "ConversationCharacteristics.Sentiment.OverallSentiment.CUSTOMER" as sentiment_score_customer, "ConversationCharacteristics.Sentiment.OverallSentiment.AGENT" as sentiment_score_agent, "ConversationCharacteristics.TalkSpeed.DetailsByParticipant.AGENT.AverageWordsPerMinute" as conv_speed_wpm_agent, "ConversationCharacteristics.TalkTime.DetailsByParticipant.CUSTOMER.TotalTimeMillis" as conv_speed_wpm_customer, ConversationCharacteristics.Interruptions.TotalCount as conv_interruptions_cnt\
| spath path="Transcript{}" output=transcript_rec \
| eval transcript_cnt=mvcount(transcript_rec) \
| mvexpand transcript_rec \
| rex field=transcript_rec "LoudnessScore\"\:\[(?<loudness_score_raw>[^\]]+)"\
| rex field=loudness_score_raw max_match=100 "(?<loudnedd_score>[\d\.]+)"\
| eval _raw=transcript_rec \
| extract pairdelim=",\;\{\}", kvdelim=":", auto=f\
| eval sentiment_score_customer=mvdedup(sentiment_score_customer)\
| eval sentiment_score_agent=mvdedup(sentiment_score_agent)\
| eval conv_speed_wpm_customer=mvdedup(conv_speed_wpm_customer)\
| eval conv_speed_wpm_agent=mvdedup(conv_speed_wpm_agent)\
| table _time Id ParticipantId Sentiment sentiment_score_customer sentiment_score_agent conv_speed_wpm_customer conv_speed_wpm_agent BeginOffsetMillis EndOffsetMillis Content conv_interruptions_cnt\
| lookup aws_connect_lookup_agent_id agent_id as Id OUTPUT\
| cleantext textfield=Content  remove_stopwords=1 base_word=1 keep_orig=1 term_min_len=3  base_type=lemma_pos  \
| eval Content=mvdedup(Content)\
| eval pos_tuple=mvdedup(pos_tuple)\
| eval conv_interruptions_cnt=mvdedup(conv_interruptions_cnt)

[sum_evt_aws_connect_perf_metrics_whole]
action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index._name = aws_sum
action.summary_index._type = event
action.summary_index.sum_type = aws_connect_perf_metrics_whole
alert.track = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m@m
dispatch.latest_time = -0m@m
display.visualizations.custom.wordcloud_app.wordcloud.alignmentMode = horizontal
display.visualizations.custom.wordcloud_app.wordcloud.backgroundColor = #fff
display.visualizations.custom.wordcloud_app.wordcloud.colorBy = colorMode
display.visualizations.custom.wordcloud_app.wordcloud.colorMode = categorical
display.visualizations.custom.wordcloud_app.wordcloud.maxColor = #d93f3c
display.visualizations.custom.wordcloud_app.wordcloud.minColor = #f7bc38
display.visualizations.custom.wordcloud_app.wordcloud.numOfBins = 3
display.visualizations.custom.wordcloud_app.wordcloud.splunkTastic = 0
display.visualizations.custom.wordcloud_app.wordcloud.useColors = 1
enableSched = 1
realtime_schedule = 0
search = sourcetype="aws:connect:firehose" Collections Metric Value\
| spath path="Collections{}" output=metrics_rec\
| table _time sourcetype metrics_rec\
| mvexpand metrics_rec\
| eval _raw=metrics_rec\
| extract pairdelim=",\;\{\}", kvdelim=":", auto=f\
| fields - metrics_rec _raw Threshold Metric
