[ccx_tenable_ot_authentication_events]
search = (sourcetype="tenable:ot:alerts") EventClass IN("SYSTEM_LOG") msg="Login*"
#tags = authentication

[ccx_tenable_ot_ids_events]
search = (sourcetype="tenable:ot:alerts") EventClass IN("Intrusion Detection") OR EventClass_ID IN("98","99","109","113","118","119","120","121","122","125")
#tags = ids attack

[ccx_tenable_ot_succeed_sync_events]
search = (sourcetype="tenable:ot:alerts") EventClass IN("SYSTEM_LOG") msg="Sync*succeed"

[ccx_tenable_ot_asset_hidden]
search = (sourcetype="tenable:ot:alerts") EventClass IN("SYSTEM_LOG") msg="Asset*hidden"

[ccx_tenable_ot_assets]
search = (sourcetype="tenable:ot:alerts") EventClass IN("SYSTEM_LOG") msg="Asset edited. Asset name:*"

[ccx_tenable_ot_system_changes]
search = (sourcetype="tenable:ot:alerts") (EventClass IN("SYSTEM_LOG") OR EventClass_ID IN("8","9","110","111","112","114","167","168","169")) NOT eventtype IN(ccx_tenable_ot_asset_hidden,ccx_tenable_ot_assets,ccx_tenable_ot_authentication_events,ccx_tenable_ot_succeed_sync_events)
#tags = change

[ccx_tenable_ot_alert_events]
search = (sourcetype="tenable:ot:alerts") (EventClass_ID IN("0","95","96","97","115","116","117","123","124") OR (EventClass_ID >=100 AND EventClass_ID <=108) OR (EventClass_ID >=144 AND EventClass_ID <=166))
#tags = alert

[ccx_tenable_ot_new_asset_discovered]
search = (sourcetype="tenable:ot:alerts") EventClass_ID IN("95")

[ccx_tenable_ot_new_module_discovered]
search = (sourcetype="tenable:ot:alerts") EventClass_ID IN("96")

[ccx_tenable_ot_controller_activity]
search = (sourcetype="tenable:ot:alerts") ((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) NOT EventClass_ID IN("8","9")
#tags = data access

[ccx_tenable_ot_network_traffic]
search = (sourcetype="tenable:ot:alerts") (EventClass_ID >=170 AND EventClass_ID <=174)
#tags = network communicate

[ccx_tenableio_vuln_was_vulnerability]
search = (sourcetype="tenable:io:vuln:was") "finding.family" IN("Component Vulnerability","SSL/TLS","HTTP Security Header","Injection","Cross Site Scripting","Cross Site Request Forgery")
#tags = vulnerability report

[ccx_tenableio_vuln_was_malware]
search = (sourcetype="tenable:io:vuln:was") "finding.family" IN("Code Execution","File Inclusion")
#tags = malware attack

[ccx_tenableio_vuln_was_alert]
search = (sourcetype="tenable:io:vuln:was") NOT eventtype IN("ccx_tenableio_vuln_was_vulnerability")
#tags = alert
