[dell:syslog:audit]
SHOULD_LINEMERGE = 0
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TZ = GMT
category = Custom
disabled = false
pulldown_type = true
EXTRACT-auditlog = (?<time>(\w+  ?\d+ \d+:\d+:\d+)) (?<nodeId>[^ ]*) (?<serviceType>[^ ]*) (?<eventType>[^ ]*) (?<namespace>[^ ]*) (?<userId>[^ ]*) (?<description>.*)

[dell:accesslog]
SHOULD_LINEMERGE = 0
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TZ = GMT
category = Custom
disabled = false
pulldown_type = true
EXTRACT-accesslog = (?<ingestdate>\w+  ?\d+) (?<ingesttime>\d+:\d+:\d+) (?<machinename>[^ ]*) (?<systemname>[^ ]*) (?<date>[0-9-]+) (?<time>[0-9:-]+),\d+ (?<xrequestid>[^ ]*) (?<sip>[0-9\.-]+):\d+ (?<cip>[0-9\.-]+):\d+ (?<xusername>[^ ]*) (?<csUserAgent>[^ ]*) (?<csmethod>[A-Z-]+) (?<xnamespace>[^ ]*) (?<xbucket>[^ ]*) (?<xobject>[^ ]*) (?<csuriquery>[^ ]*) (?<csprotocolversion>[^ ]*) (?<scstatus>[0-9-]+) (?<timetaken>[-0-9]+) (?<csbytes>[0-9-]+) (?<scbytes>[0-9-]+) (?<xstorageprocessingtime>-?[0-9]+)( 'X-Forwarded-For: (?<xforwardedfor>[^ ]*)')?
TIME_PREFIX = \w+ \d+ \d+:\d+:\d+ (?!\d+\.\d+\.\d+\.\d+)[^ ]+ [^ ]+
MAX_TIMESTAMP_LOOKAHEAD = 21
EVAL-cip = if(isnull(xforwardedfor) OR xforwardedfor="-",cip,xforwardedfor)

[dell:caslog]
SHOULD_LINEMERGE = 0
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TZ = GMT
category = Custom
disabled = false
pulldown_type = true
EXTRACT-blobid = (?<ingestdate>\w+  ?\d+)\s+(?<ingesttime>\d+:\d+:\d+) (?<machinename>[^ ]+) (?<systemname>[^ ]+) (?<date>[0-9-]+)T(?<time>[0-9:-]+),\d+ \[[^,]+,[^,]+,(?<client_name>[^\/]+)\/[^\/]+\/(?<transaction_type>\w+BLOB)[^ ]*\]\s+(?<log_level>\w+)[^)]*\)\s+(?<method>\w+) (?<bucket>[^ ]+) (?<blob_id>[^ ]+) (?<response_code>-?\d+) (?<transaction_time>\d+) (?<bytes>\d+)
EXTRACT-clipid = (?<ingestdate>\w+  ?\d+)\s+(?<ingesttime>\d+:\d+:\d+) (?<machinename>[^ ]+) (?<systemname>[^ ]+) (?<date>[0-9-]+)T(?<time>[0-9:-]+),\d+ \[[^,]+,[^,]+,(?<client_name>[^\/]+)\/[^\/]+\/(?<transaction_type>\w+CLIP)[^ ]*\]\s+(?<log_level>\w+)[^)]*\)\s+(?<method>\w+) (?<bucket>[^ ]+) (?<clip_id>[^ ]+) (?<response_code>-?\d+) (?<transaction_time>\d+) (?<bytes>\d+)
TIME_PREFIX = \w+  ?\d+ \d+:\d+:\d+ [\w-]+ [^ ]+
MAX_TIMESTAMP_LOOKAHEAD = 21

