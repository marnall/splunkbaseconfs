[intsights_info_min_time]
description  = Add earliest info to the query from specified timerange
definition = [| makeresults | addinfo | return $info_min_time]
iseval = 0

[intsights_info_max_time]
description = Add latest info to the query from specified timerange
definition = [| makeresults | addinfo | eval info_max_time=if(info_max_time="+Infinity", 2999999999, info_max_time) | return $info_max_time]
iseval = 0

[intsights_epoch_to_str(1)]
args = epoch_time
description = Covert epoch time to human readable format
definition = if(isnull($epoch_time$), $epoch_time$, strftime($epoch_time$, "%Y-%m-%d %H:%M:%S %Z"))
iseval = 0

[intsights_relative_time(1)]
args = filter
description = Covert epoch time to human readable format
definition = [| makeresults | eval search=relative_time(now(), "$filter$") | table search]
iseval = 0

[intsights_lastseen_filter(1)]
args = filter_input
definition = if("$filter_input$"=="0",0,(relative_time(now(), "-" . "$filter_input$")))
iseval = 0

[intsights_retire_ioc_filter(2)]
args = ioc_type, retiring_days_macro_name
description  = Utility macro for creating filter for where condition
definition = (type="$ioc_type$" AND iocLastSeen < strftime(relative_time(now(), "-" . `$retiring_days_macro_name$` . "d@d"), "%Y-%m-%dT%H:%M:%S.%NZ"))
iseval = 0

[intsights_enable_tags_comments_api_calls]
description  = Macro whose definition determines if outgoing calls to tags and comments API will be enabled or disabled.
definition = True
iseval = 0

