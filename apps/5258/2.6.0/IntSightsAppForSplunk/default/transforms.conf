[intsights_master_lookup]
collection = intsights_master_lookup
external_type = kvstore
fields_list = type, value, severity, status, lastUpdateDate, reportedFeedsName, tags, relatedMalware, relatedThreatActors, indexTime, iocFirstSeen, iocLastSeen, reportedFeedsName_confidenceLevel, _key

[intsights_matched_iocs]
collection = intsights_matched_iocs
external_type = kvstore
fields_list = value, matchCount, firstSeen, lastSeen, lastMatchTime, correlationIndices, actions, _key

[intsights_lock_lookup]
collection = intsights_lock_lookup
external_type = kvstore
fields_list = lockTime

[intsights_matched_iocs_metadata]
collection = intsights_matched_iocs_metadata
external_type = kvstore
fields_list = lastScanTime

[intsights_whitelist_checkpointer]
collection = intsights_whitelist_checkpointer
external_type = kvstore
fields_list = lastRunTime, _key

[intsights_alert_master_lookup]
collection = intsights_alert_master_lookup
external_type = kvstore
fields_list = id, title, description, alertType, subType, severity, assignees, foundDate, updateDate, sourceType, sourceDate, sourceURL, tagsName, assetsType, assetsValue, relatedIOCS, takeDownStatus, isFlagged, isClosed, indexTime, images, _key

[intsights_vuln_master_lookup]
collection = intsights_vuln_master_lookup
external_type = kvstore
fields_list = cveId, publishedDate, firstMentionDate, lastMentionDate, severity, mentionsAmount, exploitAvailability, intsightsScore, cvssScore, vendorProduct, updateDate, indexTime, _key

[intsights_matched_vulnerabilities]
collection = intsights_matched_vulnerabilities
external_type = kvstore
fields_list = cveId, matchCount, firstSeen, lastSeen, lastMatchTime, correlationIndices, _key

[intsights_matched_vuln_metadata]
collection = intsights_matched_vuln_metadata
external_type = kvstore
fields_list = lastScanTime

[intsights_master_lookup_backup]
collection = intsights_master_lookup_backup
external_type = kvstore
fields_list = type, value, severity, status, lastUpdateDate, reportedFeedsName, systemTags, relatedMalware, relatedThreatActors, indexTime, iocFirstSeen, iocLastSeen, reportedFeedsName_confidenceLevel, _key

[intsights_matched_event_details]
collection = intsights_matched_event_details
external_type = kvstore
fields_list = value, count, actions, correlationIndices, time
