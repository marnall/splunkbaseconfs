
[extrahop:detection]

FIELDALIAS-vendor_type = type AS vendor_type

EVAL-action = case('categories{}' IN ("sec.action", "sec.botnet", "sec.exfil", "sec.exploit", "sec.lateral", "sec.recon", "sec.command", "sec.ransomware"), "allowed")
EVAL-app = case('categories{}' IN ("perf.auth", "perf.network", "perf.web", "sec.caution", "sec.hardening"), "ExtraHop")
EVAL-body = case('categories{}' IN ("perf.auth", "perf.network", "perf.web", "sec.caution", "sec.hardening"), 'description')
EVAL-category = case('categories{}' IN ("sec.action", "sec.botnet", "sec.exfil", "sec.exploit", "sec.lateral", "sec.recon", "sec.command", "sec.ransomware"), 'type')
EVAL-date = case(('categories{}' IN ("sec.command", "sec.ransomware") AND isnotnull('mitre_tactics{}.url')), strftime(tonumber('start_time'/1000),"%d/%m/%Y"))
EVAL-dest = 'victim_ip'
EVAL-dest_ip = 'victim_ip'
EVAL-duration = case(('categories{}' IN ("sec.command", "sec.ransomware") AND isnotnull('mitre_tactics{}.url')), ('end_time' - 'start_time')/1000)
EVAL-ids_type = case('categories{}' IN ("sec.action", "sec.botnet", "sec.exfil", "sec.exploit", "sec.lateral", "sec.recon") OR ('categories{}' IN ("sec.command", "sec.ransomware") AND isnull('mitre_tactics{}.url')), "network")
EVAL-mitre_technique_id = 'mitre_techniques{}.id'
EVAL-severity = case('risk_score' >= 90 AND 'risk_score' <= 100, "critical", 'risk_score' >= 70 AND 'risk_score' <= 89, "high", 'risk_score' >= 40 AND 'risk_score' <= 69, "medium", 'risk_score' >= 1 AND 'risk_score' <= 39, "low")
EVAL-severity_id = 'risk_score'
EVAL-signature = 'title'
EVAL-src = case('categories{}' IN ("perf.auth", "perf.network", "perf.web", "sec.caution", "sec.hardening", "sec.action", "sec.botnet", "sec.exfil", "sec.exploit", "sec.lateral", "sec.recon", "sec.command", "sec.ransomware"), if(isnotnull('offender_ip'), 'offender_ip', if(match('description', "^\[?((?<=\[)[^\]]+(?=\])|(?<=(?:))[^ ]+(?= ))(?:.+\n*)*"), if(like('description', "%\%"), lower(replace(replace('description', "^\[?((?<=\[)[^\]]+(?=\])|(?<=(?:))[^ ]+(?= ))(?:.+\n*)*", "\1"), "\\\\", "")), replace('description', "^\[?((?<=\[)[^\]]+(?=\])|(?<=(?:))[^ ]+(?= ))(?:.+\n*)*", "\1")), null())))
EVAL-src_ip = 'offender_ip'
EVAL-subject = 'title'
EVAL-type = case('categories{}' IN ("perf.auth", "perf.network", "perf.web", "sec.caution", "sec.hardening", "sec.cryptomining"), "warning")
EVAL-user = 'properties.username{}'
EVAL-vendor = "ExtraHop"
EVAL-vendor_product = "ExtraHop Reveal(x)"

REPORT-ccx_extrahop_detection_victim_ip = ccx_extrahop_detection_victim_ip
REPORT-ccx_extrahop_detection_offender_ip = ccx_extrahop_detection_offender_ip
