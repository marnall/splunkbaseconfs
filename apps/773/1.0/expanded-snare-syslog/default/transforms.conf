[snare_colon_1] 
#REGEX = \s\s\s(.*?):\s(.*?)\s\s 
REGEX = \s*(.*?):\s{1,2}?(.*?)\s\s+?
FORMAT = $1::$2 
CLEAN_KEYS = 1 
MV_ADD = 1
REPEAT_MATCH = true

[snare_colon_2] 
#REGEX = \s\s\s(.*?):\s(.*?)\s\s 
#REGEX = \s*(.*?):\s+?(.*?)\t
REGEX = .*\s\s\s*(.*?):\s+?(.*?)\t
FORMAT = $1::$2 
CLEAN_KEYS = 1 
MV_ADD = 1
REPEAT_MATCH = true

