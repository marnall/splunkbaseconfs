[iboss_ids_severity]
DELIMS = ","
filename = iboss_ids_severity.csv
min_matches = 1

[iboss_ids_direction]
DELIMS = ","
filename = iboss_ids_direction.csv
min_matches = 1


[iboss_auth_methods]
DELIMS = ","
filename = iboss_auth_methods.csv
min_matches = 1

[iboss_agentReg_events]
REGEX = (?:((\\)?\"LOG_TYPE(\\)?\":(\\)?(\")?AGENT_REGISTRATION(\\)?(\")?))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:agentReg

[iboss_audit_events]
REGEX = (?:((\\)?\"LOG_TYPE(\\)?\":(\\)?(\")?AUDIT(\\)?(\")?))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:audit

[iboss_dlp_events]
REGEX = (?:((\\)?\"LOG_TYPE(\\)?\":(\\)?(\")?DLP(\\)?(\")?))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:dlp

[iboss_web_log_events]
REGEX = (?:((\\)?\"LOG_TYPE(\\)?\":(\\)?(\")?WEB_LOG(\\)?(\")?))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:web

[iboss_agent_registration]
REGEX = (?:((\\)?\"LOG_TYPE(\\)?\":(\\)?(\")?AGENT_REGISTRATION(\\)?(\")?))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:agentReg

[iboss_authentication_events]
REGEX = (?:((\\)?\"(ACTION|AUTH_STEP_UP)(\\)?\":(\\)?(\")?(true|login)(\\)?(\")?))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:audit

[iboss_malware_events]
REGEX = (\"(MALWARE|CNC_FLAG|CNC_METADATA\.ASSET_CNC_DETECTED)\":(\")?1(\")?)
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:malware

[iboss_phishing_events]
REGEX = ((\\)?\"LOG_SUB_TYPE\":\"PHISHING\")
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:phishing

[iboss_ids_events]
REGEX = (?:((\\)?\"SWG_HOSTNAME(\\)?\":(\\)?\"ibfirewall(\\)?\"|IPS_LOG_ID\"\=))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:ids

[iboss_web_events]
REGEX = (?:(\\)?\"URL(\\)?\":(\\)?\"http(s)?:(\\)?\/(\\)?\/)
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:web

[iboss_dns_events]
REGEX = (?:((\\)?\"LOG_TYPE(\\)?\":(\\)?\"DNS(\\)?\"))
DEST_KEY = MetaData:Sourcetype
WRITE_META = false
FORMAT = sourcetype::iboss:dns

[iboss_kv]
REGEX = \"([a-zA-Z0-9_-]+)\":\"?([^\,\}\"]+)?\"?
FORMAT = $1::$2
WRITE_META = false
MV_ADD = true
