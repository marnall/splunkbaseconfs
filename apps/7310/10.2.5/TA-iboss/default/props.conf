[iboss]
category = Network & Security
description = iboss platform
pulldown_type = 1
TRUNCATE = 0
TIMESTAMP_FIELDS = PROXY_TRANSACTION_START_TIME, DATE, timestamp
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%QZ
CHARSET=AUTO
TZ = UTC
AUTO_KV_JSON = true
KV_MODE = auto
SHOULD_LINEMERGE = true
sourcetype = iboss

REPORT-iboss_ids_direction = iboss_ids_direction
LOOKUP-iboss_ids_direction = iboss_ids_direction DIR as DIR OUTPUTNEW direction
REPORT-iboss_ids_severity = iboss_ids_severity
LOOKUP-iboss_ids_severity = iboss_ids_severity severity_id as SIGNATURE_PRIORITY OUTPUTNEW severity
REPORT-iboss_auth_methods = iboss_auth_methods
LOOKUP-iboss_auth_methods = iboss_auth_methods ZT_CONTEXT.am as ZT_CONTEXT.am OUTPUTNEW authentication_method

TRANSFORMS-iboss_agentReg_events = iboss_agentReg_events
TRANSFORMS-iboss_agent_registration = iboss_agent_registration
TRANSFORMS-iboss_audit_events = iboss_audit_events
TRANSFORMS-iboss_authentication_events = iboss_authentication_events
TRANSFORMS-iboss_dlp_events = iboss_dlp_events
TRANSFORMS-iboss_dns_events = iboss_dns_events
TRANSFORMS-iboss_ids_events = iboss_ids_events
TRANSFORMS-iboss_malware_events = iboss_malware_events
TRANSFORMS-iboss_phishing_events = iboss_phishing_events
TRANSFORMS-iboss_web_log_events = iboss_web_log_events

SEDCMD-0 = s/\\\////g
SEDCMD-1 = s/DNS\:(\\)?\/(\\)?\///g
SEDCMD-2 = s/\\\"/"/g
SEDCMD-3 = s/\,\"answers":\"\[\{\s/,"answers":[{ /g
SEDCMD-4 = s/}\]\"/}]/g

EVAL-timestamp = coalesce(PROXY_TRANSACTION_START_TIME,DATE,ZT_CONTEXT.rt)
FIELDALIAS-date = DATE as date
FIELDALIAS-time = TIME as time

##
# iboss Vendor Mappings
##
EVAL-dlp_type = "network"
EVAL-ids_type = "network"
EVAL-product = "Zero Trust Security Service Edge"
EVAL-vendor = "iboss"
EVAL-vendor_app = "Zero Trust Security Service Edge"
EVAL-vendor_product = "Zero Trust Security Service Edge"
EVAL-vendor_log_id = coalesce(URL_LOG_ID,IPS_LOG_ID)

FIELDALIAS-asset_uuid = ZT_CONTEXT.aid as asset_uuid
FIELDALIAS-dvc = IBOSS as dvc
FIELDALIAS-dvc_ip = IBOSS_IP_ADDRESS as dvc_ip
FIELDALIAS-dvc_zone = IBOSS_GATEWAY_ZONE as dvc_zone
FIELDALIAS-iboss_cloud_account = VENDOR_ACCOUNT_ID as iboss_cloud_account
FIELDALIAS-iboss_reporter = LOG_FORWARDER_HOST as iboss_reporter
FIELDALIAS-iboss_reporter_ip = LOG_FORWARDER_IP as iboss_reporter_ip
FIELDALIAS-vendor_account = IDENTITY_PROVIDER_UUID as vendor_account
FIELDALIAS-vendor_action = S_ACTION as vendor_action
FIELDALIAS-vendor_log:audit = AUDIT as vendor_log:audit
FIELDALIAS-vendor_log:c2 = CNC_FLAG as vendor_log:c2
FIELDALIAS-vendor_log:ips = IPS_LOG_ENTRY as vendor_log:ips
FIELDALIAS-vendor_log:malware = MALWARE as vendor_log:malware
FIELDALIAS-vendor_log:url = URL_LOG_ENTRY as vendor_log:url
FIELDALIAS-vendor_log_type = LOG_TYPE as vendor_log_type
FIELDALIAS-vendor_report_group = REPORT_GROUP as vendor_report_group
FIELDALIAS-vendor_risk_score = HEURISTIC_SCORE as vendor_risk_score
FIELDALIAS-vendor_version = PRODUCT_VERSION as vendor_version
FIELDALIAS-zero_trust_policy_id = ZT_CONTEXT.resourcePolicyId as zero_trust_policy_id
FIELDALIAS-zero_trust_policy_name = ZT_POLICY_NAME as zero_trust_policy_name
FIELDALIAS-zero_trust_policy_score = ZT_SCORE as zero_trust_policy_score

##
# Field Evals
##
EVAL-app = coalesce(PROTOCOL,"tcp")
EVAL-protocol = coalesce(PROTOCOL,"tcp")
EVAL-transport = coalesce(PROTOCOL,"tcp")
EVAL-vendor_action = coalesce(CNC_METADATA.ASSET_ACTION,S_ACTION)
EVAL-category = mvindex(split(replace(CATEGORIES_NAMES,";",","),","),0,-1)
EVAL-dest = coalesce(HOST,IPADDR)
EVAL-dest_ip = coalesce(IPADDR,DEST_IPADDR)
EVAL-dest_port = coalesce(R_PORT,DEST_PORT,PORT)
EVAL-error_code = coalesce(RESPONSE_CODE,response_code,responseCode)
EVAL-http_content_type = mvindex(split(CONTENT_TYPE_HEADER,";",0,-1))
EVAL-http_referrer_domain = coalesce(REFERER_HOST,REFERER_DOMAIN)
EVAL-http_user_agent_length = len(USER_AGENT)
EVAL-location = coalesce(LOCATION,LOC)
EVAL-mac = coalesce(MAC_ADDRESS,COMP_MAC)
EVAL-mac_address = coalesce(MAC_ADDRESS,COMP_MAC)
EVAL-path = replace(PATH,"\\\\(.)","%\1")
EVAL-policy_layers = mvappend(split(replace(POLICY_LAYERS,"|"," "),"\n"))
EVAL-policy_trace = mvindex(split(urldecode(replace(replace(policy_trace, "([A-Fa-f0-9][\d\w])", "%\1"), "%[\D0-18-9]\w", " ")),"|"),-1)
EVAL-sandbox_result = urldecode(replace(replace(sandboxResult, "([A-Fa-f0-9][\d\w])", "%\1"), "%[\D0-18-9]\w", " "))
EVAL-signature = coalesce(MDE,CNC_METADATA.CNC_SIGNATURE,SIGNATURE,SIGNATURE_META,SIGNATURE_NAME)
EVAL-signature_id = coalesce(GENERATOR_ID,SIGNATURE_ID)
EVAL-src_mac = coalesce(MAC_ADDRESS,COMP_MAC)
EVAL-status = coalesce(RESPONSE_CODE,response_code,responseCode)
EVAL-url = replace(URL,"\\\\(.)","%\1")
EVAL-url_length = len(URL)
EVAL-user_group = coalesce(FILTERING_GROUP_NAME,FILTER_GROUP_NAME)
EVAL-user = coalesce(USER,SUBJECT_ID)
EVAL-src_user = coalesce(USER,SUBJECT_ID)
EVAL-src_user_name = coalesce(USER,SUBJECT_ID)
EVAL-src_user_id = coalesce(USER,SUBJECT_ID)
EVAL-user_id = coalesce(USER,SUBJECT_ID)
EVAL-user_name = coalesce(USER,SUBJECT_ID)

##
# Field Renaming
