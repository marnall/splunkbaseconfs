[cisco_cybervision_cef_syslog]
REGEX = ([^\|\s=]+)=((?:{.*?})|(?:[^=]+)|(?:\[?\S*))(?:\s+|$)
FORMAT = $1::$2

[cisco_cybervision_syslog_message]
REGEX = (\s|^)msg=(?<message>.*?)(\s*\S+=[^"]|$)
SOURCE_KEY = _raw

[cisco_cybervision_syslog_header]
REGEX = CEF:\d\|(?<vendor>[^\|]+)\|(?<product>[^\|]+)\|(?<version>[^\|]+)\|(?<event_class_id>[^\|]+)\|(?<event_name>[^\|]+)\|(?<severity_id>[^\|]+)\|
SOURCE_KEY = _raw

[cisco_cybervision_severity_lookup]
filename = cisco_cybervision_severity_lookup.csv

[cv_asset_site_system_mapping]
batch_index_query = 0
case_sensitive_match = 1
filename = asset_site_system_mappings.csv
match_type = WILDCARD(host)
max_matches = 1