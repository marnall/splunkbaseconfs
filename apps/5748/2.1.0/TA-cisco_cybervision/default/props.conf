[cisco:cybervision:events]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE=9999999
KV_MODE=json
DATETIME_CONFIG = NONE
# Field Extractions
EVAL-vendor_product = "Cisco Cyber Vision"
# CIM Mapping
FIELDALIAS-message = message AS body

[cisco:cybervision:devices]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE=9999999
KV_MODE=json
DATETIME_CONFIG = NONE
# Field Extractions
EVAL-vendor_product = "Cisco Cyber Vision"
# OT mapping
EVAL-asset_id = case(id=="null","", true(), id)
EVAL-ip = if(isnull('ip{}'), "", 'ip{}')
EVAL-mac = case(mac=="null","", true(), mac)
EXTRACT-asset_version =  \"key\": \"fw-version\", \"value\": \"(?<asset_version>[\w+|[,|.|\s]*]*)\"}
EXTRACT-asset_model =  \"key\": \"model-ref\", \"value\": \"(?<asset_model>[\w+|[,|.|\-|\/|\s]*]*)\"}
EXTRACT-asset_vendor =  \"key\": \"vendor-name\", \"value\": \"(?<asset_vendor>[\w+|[,|.|\s]*]*)\"}
EVAL-asset_type =  deviceType
EVAL-priority = case('group.criticalness' ==0, "informational", 'group.criticalness'==1, "low", 'group.criticalness'==2,"medium", 'group.criticalness'==3, "high", 'group.criticalness'==4, "critical" )
EVAL-zone = replace(case(match( 'tags{}.category.label', "Device - (?<asset_version>.*)"),"perdue:"+replace('tags{}.category.label',"Device - ","")), "\-\d", "")
EVAL-category = replace("ot"+"|"+customLabel+"|"+mvjoin('tags{}.label',",")+"|"+mvjoin('group.label',","), "\|\|", "|")
# CIM mapping
EVAL-cve = case('vulnerabilities{}.cve'=="null","",true(),'vulnerabilities{}.cve')
EVAL-cvss = case('vulnerabilities{}.cvss'=="null","",true(),'vulnerabilities{}.CVSS')
EVAL-dest = case('vulnerabilitiesCount'>0,'ip{}')
FIELDALIAS-links_link = vulnerabilities{}.links{}.link AS url
FIELDALIAS-signature = vulnerabilities{}.title AS signature
FIELDALIAS-src = ip{} AS src
FIELDALIAS-src_ip = ip{} AS src_ip
REPORT-cv_asset_site_system_mapping = cv_asset_site_system_mapping
LOOKUP-cv_asset_site_system_mapping = cv_asset_site_system_mapping host OUTPUTNEW asset_system site_id


[cisco:cybervision:components]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE=9999999
KV_MODE=json
DATETIME_CONFIG = NONE
# Field Extractions
EVAL-vendor_product = "Cisco Cyber Vision"
# OT mapping
EVAL-asset_id = case(id=="null","", true(), id)
EVAL-ip = case(ip=="null","", true(), ip)
EVAL-mac = case(mac=="null","", true(), mac)
EXTRACT-asset_version =  \"key\": \"fw-version\", \"value\": \"(?<asset_version>[\w+|[,|.|\s]*]*)\"}
EXTRACT-asset_model =  \"key\": \"model-ref\", \"value\": \"(?<asset_model>[\w+|[,|.|\-|\/|\s]*]*)\"}
EXTRACT-asset_vendor =  \"key\": \"vendor-name\", \"value\": \"(?<asset_vendor>[\w+|[,|.|\s]*]*)\"}
EVAL-asset_type =  case('tags{}.category.label'=="null","", true(), 'tags{}.category.label')
EVAL-priority = case('group.criticalness' ==0, "informational", 'group.criticalness'==1, "low", 'group.criticalness'==2,"medium", 'group.criticalness'==3, "high", 'group.criticalness'==4, "critical" )
EVAL-zone = case(match( 'tags{}.category.label', "Device - (?<asset_version>.*)"),"perdue:"+replace('tags{}.category.label',"Device - ",""))
EVAL-category = "ot"+"|"+customLabel+"|"+mvjoin('tags{}.label',",")+"|"+mvjoin('group.label',",")

