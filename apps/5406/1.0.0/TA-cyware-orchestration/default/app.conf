# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 1

[launcher]
author = Cyware Labs
version = 1.0.0
description = This action will send Alert Event to Cyware Orchestration Add-on for Splunk

[ui]
is_visible = 1
label = Cyware Orchestration Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-cyware-orchestration

[triggers]
reload.addon_builder = simple
reload.ta_cyware_orchestration_account = simple
reload.ta_cyware_orchestration_settings = simple
reload.passwords = simple