#This sourcetype is critical for parsing events containing multiple JSON records
[appstack_json_multi_record]
description = Multiple JSON records separated by 1E
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\x1E])
TRUNCATE = 0
CHARSET = UTF-8
INDEXED_EXTRACTIONS = json
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
TIME_PREFIX = \"time\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 30
NO_BINARY_CHECK = true
pulldown_type = true
category = Structured