[auditsearch]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = ta-mulesoft
request.ui_dispatch_view = search
search = sourcetype=mulesoft:audit\
|spath output=action path="{}.action"\
|spath output=clientIP path="{}.clientIP"\
|spath output=clientId path="{}.clientId"\
|spath output=clientName path="{}.clientName"\
|spath output=failed path="{}.failed"\
|spath output=faliedCause path="{}.failedCause"\
|spath output=payload path="{}.payload"\
|spath output=platform path="{}.platform"\
|spath output=timestamp path="{}.timestamp"\
|spath output=userId path="{}.userId"\
|spath output=userName path="{}.userName"\
|spath output=environmentId path="{}.objects{}.environmentId"\
|spath output=environmentName path="{}.objects{}.environmentName"\
|spath output=objectId path="{}.objects{}.objectId"\
|spath output=objectName path="{}.objects{}.objectName"\
|spath output=objectType path="{}.objects{}.objectType"\
|spath output=parentId path="{}.objects{}.parentId"\
|spath output=parentType path="{}.objects{}.parentType"\
|table _time,action,clientIP,clientId,clientName,failed,faliedCause,payload,platform,timestamp,userId,userName,environmentId,environmentName,objectId,objectName,objectType,parentId,parentType
