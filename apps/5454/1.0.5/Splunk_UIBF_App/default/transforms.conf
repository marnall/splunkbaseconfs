[clm_phone]
REGEX = (?<clm_phone_area>\d+)\-
SOURCE_KEY = clm_phone

[clm_email]
REGEX = (?<clm_email_usr>[^@]+)@(?<clm_email_domain>.+?\.(?<clm_email_tld>[A-z][A-z0-9\-]*[^\-]))$
SOURCE_KEY = clm_email
[us_zip_codes]
batch_index_query = 0
case_sensitive_match = 0
default_match = none
filename = us-zip-code-latitude-and-longitude.csv
max_matches = 1
min_matches = 0

[email_tld_blacklist]
batch_index_query = 0
case_sensitive_match = 1
filename = email-tld-blacklist.csv

[email_domain_blacklist]
batch_index_query = 0
case_sensitive_match = 1
filename = email-domain-blacklist.csv
