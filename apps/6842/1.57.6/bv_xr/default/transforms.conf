filename = scm-framework-default.properties

# 
# force index-time field extractions for terrain events ingested via collect (source::xmacquire)
#
[indextime_extraction]
REGEX = =eventActorId=(.*?)=actorId=(.*?)=action=(.*?)=process=(.*?)=field=(.*?)=src=(.*?)=dest=(.*?)=value=(.*?)=eventTimeEpoch=([^=]+)=terrainType=([^=]+)=key=(.*?)=modelName=(.*?)=guid=(.*?)=referenceKey=(.*?)=dataDefinition=(.*?)=fieldDefinition=(.*?)=information=(.*?)=
FORMAT = eventActorId::$1 actorId::$2 action::$3 process::$4 field::$5 src::$6 dest::$7 value::$8 eventTimeEpoch::$9 terrainType::$10 key::$11 modelName::$12 guid::$13 referenceKey::$14 dataDefinition::$15 fieldDefinition::$16 information::$17
WRITE_META = true

[indextime_extraction_taxonomyId]
REGEX = =actorId=(.*?)=action=(.*?)=process=(.*?)=field=(.*?)=src=
FORMAT = taxonomyId::"$1~$2~$3~$4"
WRITE_META = true

#
# force index-time field extractions for relevancy graph records ingested via collect (source::relevancy_graph)
#
[relevancy_graph_indextime_extraction]
REGEX = =graph=(.*?)=instance=(.*?)=node=(.*?)=modelName=(.*?)=actorId=(.*?)=normalizedCIX=(.*?)=absoluteCIX=(.*?)=instanceTime=([^=]+)=generationTime=([^=]+)=
FORMAT = graph::$1 instance::$2 node::$3 modelName::$4 actorId::$5 normalizedCIX::$6 absoluteCIX::$7 instanceTime::$8 generationTime::$9
WRITE_META = true

#
# force index-time field extractions for transaction graph records ingested via collect (source::transaction_graph)
#
[transaction_graph_indextime_extraction]
REGEX = \tguid:(.*?)\ttransactionGuid:(.*?)\ttransactionName:(.*?)\tsequenceGuid:(.*?)\tsequenceName:(.*?)\tsequenceId:(.*?)\tmodelName:(.*?)\tactorId:(.*?)\treferenceKey:(.*?)\tactionGuids:(.*?)\tcorrelationId:(.*?)\tsrc:(.*?)\tdest:(.*?)\tanomalyCix:(.*?)\tbeginTime:(.*?)\tendTime:(.*?)\tgenerationTime:(.*?)\tstate:(.*?)\ttransactionData:(.*?)\ttotalTransitionTime:(.*?)\tnodeTransitionTimes:(.*?)\t
FORMAT = guid::$1 transactionGuid::$2 transactionName::$3 sequenceGuid::$4 sequenceName::$5 sequenceId::$6 modelName::$7 actorId::$8 referenceKey::$9 actionGuids::$10 correlationId::$11 src::$12 dest::$13 anomalyCix::$14 beginTime::$15 endTime::$16 generationTime::$17 state::$18 transactionData::$19 totalTransitionTime::$20 nodeTransitionTimes::$21
WRITE_META = true

[set_source]
REGEX=\|source_override=([^\|]+)
WRITE_META=true
DEST_KEY = MetaData:Source
FORMAT = source::$1
