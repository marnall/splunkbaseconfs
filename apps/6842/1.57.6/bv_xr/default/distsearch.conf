[replicationWhitelist]
scmLib = apps/bv_xr/lib/**
configProperties = apps/bv_xr/config/scm-framework.properties

[replicationBlacklist]
scmPython = apps/bv_xr/bin/xm*
#scmPythonBson = apps/bv_xr/bin/bson/**
scmPythonGridfs = apps/bv_xr/bin/gridfs/**
#scmPythonMongo = apps/bv_xr/bin/pymongo/**
#scmPythonDBUtils = apps/bv_xr/bin/saDbUtils*
scmExe = apps/bv_xr/bin/Linux/64bit/xm*
scmMongo = apps/bv_xr/bin/Linux/64bit/mongo*
