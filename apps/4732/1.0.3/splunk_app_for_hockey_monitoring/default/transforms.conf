[hockeymon_teams]
external_type = kvstore
case_sensitive_match = true
collection = hockeymon_teams
fields_list = _key,ID,NAME,TEAM_NAME,TEAM_SHORT_NAME,TEAM_ABBR,LOCATION_NAME,FIRST_YEAR,SITE_URL,VENUE_NAME,VENUE_CITY,VENUE_TZ,DIVISION_ID,DIVISION_NAME,DIVISION_SHORT_NAME,DIVISION_ABBR,DIVISION_LINK,CONFERENCE_ID,CONFERENCE_NAME,CONFERENCE_LINK,FRANCHISE_ID,FRANCHISE_NAME,FRANCHISE_LINK

[hockeymon_players]
external_type = kvstore
case_sensitive_match = true
collection = hockeymon_players
fields_list = _key,PLAYER_ID,PLAYER_NAME
