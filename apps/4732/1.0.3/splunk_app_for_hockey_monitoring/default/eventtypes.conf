search = sourcetype=hockey:event EVENT_TYPE="BlockedShot" OR EVENT_TYPE="BLOCKED_SHOT"

# tags shot net
[hm_event_net_shot]
search = sourcetype=hockey:event EVENT_TYPE="Shot" OR EVENT_TYPE="SHOT"

# tags faceoff
[hm_event_faceoff]
search = sourcetype=hockey:event EVENT_TYPE="Faceoff" OR EVENT_TYPE="FACEOFF"

# tags hit
[hm_event_hit]
