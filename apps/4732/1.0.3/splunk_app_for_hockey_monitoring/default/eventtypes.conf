# tags hockey game
[hm_game]
search = sourcetype=hockey:score

# tags regular
[hm_game_regular]
search = sourcetype=hockey:score GAME_TYPE="R"

# tags preseason
[hm_game_preseason]
search = sourcetype=hockey:score GAME_TYPE="PR"

# tags playoff
[hm_game_playoff]
search = sourcetype=hockey:score GAME_TYPE="P"

# tags hockey event
[hm_event]
search = sourcetype=hockey:event

# tags goal
[hm_event_goal]
search = sourcetype=hockey:event EVENT_TYPE="Goal" OR EVENT_TYPE="GOAL"

# tags penalty
[hm_event_penalty]
search = sourcetype=hockey:event EVENT_TYPE="Penalty" OR EVENT_TYPE="PENALTY"

# tags shot missed
[hm_event_missed_shot]
