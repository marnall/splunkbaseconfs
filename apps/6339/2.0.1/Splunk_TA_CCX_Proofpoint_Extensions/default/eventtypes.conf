[ccx_pps_email]
search = (sourcetype=pps_messagelog)
# tags = content delivery email filter

[ccx_pps_maillog_email_phase]
search = sourcetype="pps_maillog"

[ccx_pps_messagelog_malware_attack]
search = (sourcetype=pps_messagelog) (signature_extra=av OR signature_extra=sandbox) filter.actions.rule="*notcleaned" OR "*malicious*"
# tags = attack malware

[ccx_proofpoint_track_hash]
search = (sourcetype="pps_messagelog") file_hash=*
# tags = operations malware

[ccx_proofpoint_tap_messages_delivered]
search = (sourcetype="proofpoint_tap_siem") action="delivered"
# tags = email

[ccx_proofpoint_tap_email_filter]
search = (sourcetype="proofpoint_tap_siem") quarantineRule IN("inbound_phish","inbound_spam","inbound_spam_definite") OR classification IN("phish") OR quarantineFolder="null" NOT severity IN("medium","high","critical")
# tags = email filter

[ccx_proofpoint_tap_malware_attack]
search = (sourcetype="proofpoint_tap_siem") NOT quarantineFolder IN("Recipient Verification","Spam*","Phish","null","Bulk","Impostor") AND NOT (quarantineFolder="Quarantine" AND (quarantineRule="inbound_spam" OR quarantineRule="inbound_phish*")) file_hash="*"
# tags = malware attack

[ccx_proofpoint_tap_malware_operations_file_detection]
search = (sourcetype="proofpoint_tap_siem") NOT eventtype IN("ccx_proofpoint_tap_malware_attack") NOT "threatsInfoMap{}.threatStatus" IN("falsePositive") hash_match="*"
# tags = operations malware

[ccx_proofpoint_tap_detections]
search = (sourcetype="proofpoint_tap_siem") NOT eventtype IN("ccx_proofpoint_tap_malware_attack","ccx_proofpoint_tap_malware_operations_file_detection","ccx_proofpoint_tap_email_filter","ccx_proofpoint_tap_messages_delivered")
# tags = ids attack

