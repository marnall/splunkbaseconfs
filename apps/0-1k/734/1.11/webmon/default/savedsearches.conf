[top source realtime]
dispatch.earliest_time = rt-1m
dispatch.latest_time = rt
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = * | top source
vsid = gbo2fncu

[Avg Time by URL]
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = sourcetype="webmon" | timechart avg(time_in_sec) by ping_url
vsid = *:gc6mp0te

[Max Time by URL]
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = sourcetype="webmon" | timechart max(time_in_sec) by ping_url
vsid = *:gc6mqrun

[Stats by URL Last 60 minuters]
dispatch.earliest_time = -60m@m
