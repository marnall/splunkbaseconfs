[cube_rxd_cdn]
SOURCE_KEY = gw_rxd_cdn
REGEX  = ^(?:(?:ton:(\d+),npi:(\d+),)?(?:pi:(\d+),si:(\d+),)?#:)?(\w+)
FORMAT = gw_rxd_cdn_ton::$1 gw_rxd_cdn_npi::$2 gw_rxd_cdn_pi::$3 gw_rxd_cdn_si::$4 gw_rxd_cdn_number::$5

[cube_rxd_cgn]
SOURCE_KEY = gw_rxd_cgn
REGEX  = ^(?:(?:ton:(\d+),npi:(\d+),)?(?:pi:(\d+),si:(\d+),)?#:)?(\w+)
FORMAT = gw_rxd_cgn_ton::$1 gw_rxd_cgn_npi::$2 gw_rxd_cgn_pi::$3 gw_rxd_cgn_si::$4 gw_rxd_cgn_number::$5


[cube_call_reference_id]
SOURCE_KEY = h323_conf_id
REGEX = ^(?:[^\s]{8})?([^\s]{8})\s
FORMAT = call_reference_id::$1

# Adds parsing to SYSLOG version of CUCM audit trails.
[cucm_audit_all]
REGEX = \[\s*([^|\]]*?)\s*=\s*([^|\]]*)\]
FORMAT = $1::$2

[cucm_audit_detail]
REGEX = \[\s*(AuditDetails.*?)\]\s*\[
FORMAT = AuditDetails::$1

[cucm_audit_detail_details]
REGEX = \s*([^= ]*)\s*=\s*([^\|]*)\s*\|
FORMAT = $1::$2
SOURCE_KEY = AuditDetails

[cucm_audit_detail_simple_records]
REGEX = Application user (\S*) (\S*) to (.*)
FORMAT = object::$1 action::$2 object_category::$3 status::"success"
SOURCE_KEY = AuditDetails

[cucm_audit_user]
REGEX = (.*)
FORMAT = user::$1
SOURCE_KEY = UserID

[cucm_audit_detail_record]
REGEX = record in (.*) with key field name = (\S*) (.*)
FORMAT = action::$3 object_category::$1 object::$2 status::"success"
SOURCE_KEY = AuditDetails

[cucm_audit_detail_success1]
REGEX = Successfully Timed out of (.*)
FORMAT = action::"timeout" object::$1 status::"success"
SOURCE_KEY = AuditDetails

[cucm_audit_detail_success2]
REGEX = Successfully Logged into (.*)
FORMAT = action::"login" object::$1 status::"success"
SOURCE_KEY = AuditDetails

[cucm_audit_detail_failure]
REGEX = Failed to Log into (.*)
FORMAT = action::"login" object::$1 status::"failure"
SOURCE_KEY = AuditDetails

[cucm_audit_detail_success3]
REGEX = Successfully Logged out (.*)
FORMAT = action::"logout" object::$1 status::"success"
SOURCE_KEY = AuditDetails

[cucm_audit_detail_success4]
REGEX = (\w*) Authentication Successful
FORMAT = action::"login" status::"success"
SOURCE_KEY = AuditDetails

[cucm_audit_detail_access_component]
REGEX = Attempt to access data was successful.\s*User is authorized to access (.*)
FORMAT = action::"access" status::"success" ComponentSetting::$1
SOURCE_KEY = AuditDetails



# CUCM syslog of registration information and alarms
[cucm-syslog-codes]
REGEX = %(UC[A-Za-z0-9_]+)-(?:[A-Za-z0-9_]+-)?([0-7])-([A-Za-z0-9_]+):
FORMAT = product::$1 code::$2 cucm_eventname::$3

# this is the same regex as default syslog extractions, but appinspect flags it as a failure to
# depend on a core transform forcing us to ship our own copy of it.  Also it's considered by some
# not best practice to rely on the core syslog-extractions transform even though here it works fine.
[kiwi-syslog-extractions]
REGEX = \s([^\s\[]+)(?:\[(\d+)\])?:\s
FORMAT = process::$1 pid::$2

[cucm-syslog-bracket-kv]
REGEX = \[\s*([^=]+)\s*=\s*([^\]]+)\s*]
FORMAT = $1::$2

[cucm-syslog-event-description]
REGEX = ^.*:\s*([^:]+)\s*$
FORMAT = cucm_eventdescription::$1





