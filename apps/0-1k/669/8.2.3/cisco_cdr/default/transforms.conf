
# As of version 8, we now use dateTimeConnect as the primary timestamp.
# the reason we do this is that it minimizes the need for sorts at search time,
# because the legs go into the index in the same order that we'll want them displayed
# to the user.
[custom_timestamp_extraction]
INGEST_EVAL = _time = case(isnotnull(dateTimeConnect) AND dateTimeConnect!="0", dateTimeConnect, isnotnull(dateTimeDisconnect) AND dateTimeDisconnect!="0", dateTimeDisconnect, true(),dateTimeOrigination)

[no_column_headers]
REGEX = ^INTEGER\,INTEGER\,INTEGER.*$
DEST_KEY = queue
FORMAT = nullQueue

[remove_lines_without_data]
REGEX = ^\d+$
DEST_KEY = queue
FORMAT = nullQueue

[cucm_server_name]
REGEX = c(?:d|m)r_(.+)_\d+_\d+$
FORMAT = server_name::$1
WRITE_META = true
SOURCE_KEY = MetaData:Source

[cube_server_name]
REGEX = (cube_)?(?<server_name>[^\/\\\.]*)\.\d{2}_\d{2}_\d{4}_\d{2}_\d{2}_\d{2}.\d{3}$
FORMAT = server_name::$2
WRITE_META = true
SOURCE_KEY = MetaData:Source

[multivalue_device_name]
INGEST_EVAL = device_name = mvappend(origDeviceName,destDeviceName)

[make_called_party_number_index_time]
INGEST_EVAL = calledPartyNumber = finalCalledPartyNumber

[make_hpdn_index_time]
INGEST_EVAL = huntPilotDN = if(isnull(huntPilotDN) AND calledPartyPatternUsage="7",finalCalledPartyNumber,huntPilotDN)

[make_cucm_call_id_index_time]
INGEST_EVAL = call_id = globalCallId_ClusterID + "." + globalCallID_callManagerId + "." + globalCallID_callId

#index=cisco_cdr origIpAddr!=0
#| table origIpAddr
#| streamstats count
#``` introducing some artificial testcase numbers with less than full digits ```
#| eval origIpAddr=case(count==1,"4294967295", count==2, "0", count==3, "1", count=="4", "16", count=="5", "256", count=="6", "4096", count=="7", "65536", count=="8", "1048576", count=="9", "16777216", count=="10", "268435456", true(), origIpAddr)
#| eval legacy=origIpAddr
#| `convert_ip_address(legacy)`
#| eval orig_reverse_hex = case(tonumber(origIpAddr)<0,"",tonumber(origIpAddr)<16, "0000000", tonumber(origIpAddr)<256, "000000", tonumber(origIpAddr)<4096, "00000", tonumber(origIpAddr)<65536, "0000", tonumber(origIpAddr)<1048576, "000", tonumber(origIpAddr)<16777216, "00", tonumber(origIpAddr)<268435456,"0",true(),"") . substr(if (tostring(origIpAddr,"hex")!="0xFFFFFFFF", replace(tostring(origIpAddr,"hex"), "0xFFFFFFFF", "0x"), tostring(origIpAddr,"hex")), 3, 8)
#| eval src_ip=tonumber(substr(orig_reverse_hex,7,2),16) . ".". tonumber(substr(orig_reverse_hex,5,2),16).".".tonumber(substr(orig_reverse_hex,3,2),16).".".tonumber(substr(orig_reverse_hex,1,2),16)

[make_src_ip_addr_index_time]
# the first part with all the numerical comparison is basically just zeropadding for the hex integer we make.
# the hex integer we make is 8chars (zeropadded), and is the bytes in reverse order.
# in the last step we simply reverse them and make them into a dotted quad of decimal integers.
# Note that if the origIpAddr is 0,  and origIpv4v6Addr is populated, we use origIpv4v6Addr (which is NOT
# logged as a signed long integer).
INGEST_EVAL = orig_reverse_hex=if(origIpAddr=="0" AND isnotnull(origIpv4v6Addr),null(),case(tonumber(origIpAddr)<0,"",tonumber(origIpAddr)<16, "0000000", tonumber(origIpAddr)<256, "000000", tonumber(origIpAddr)<4096, "00000", tonumber(origIpAddr)<65536, "0000", tonumber(origIpAddr)<1048576, "000", tonumber(origIpAddr)<16777216, "00", tonumber(origIpAddr)<268435456,"0",true(),"") . substr(if (tostring(origIpAddr,"hex")!="0xFFFFFFFF", replace(tostring(origIpAddr,"hex"), "0xFFFFFFFF", "0x"), tostring(origIpAddr,"hex")), 3, 8)), src_ip=if(origIpAddr=="0" AND isnotnull(origIpv4v6Addr), origIpv4v6Addr,tonumber(substr(orig_reverse_hex,7,2),16) . ".". tonumber(substr(orig_reverse_hex,5,2),16).".".tonumber(substr(orig_reverse_hex,3,2),16).".".tonumber(substr(orig_reverse_hex,1,2),16))

[make_dest_ip_addr_index_time]
# see comments on make_src_ip_addr_index_time
INGEST_EVAL = dest_reverse_hex=if(destIpAddr=="0" AND isnotnull(destIpv4v6Addr),null(),case(tonumber(destIpAddr)<0,"",tonumber(destIpAddr)<16, "0000000", tonumber(destIpAddr)<256, "000000", tonumber(destIpAddr)<4096, "00000", tonumber(destIpAddr)<65536, "0000", tonumber(destIpAddr)<1048576, "000", tonumber(destIpAddr)<16777216, "00", tonumber(destIpAddr)<268435456,"0",true(),"") . substr(if (tostring(destIpAddr,"hex")!="0xFFFFFFFF", replace(tostring(destIpAddr,"hex"), "0xFFFFFFFF", "0x"), tostring(destIpAddr,"hex")), 3, 8)), dest_ip=if(destIpAddr=="0" AND isnotnull(destIpv4v6Addr), destIpv4v6Addr,tonumber(substr(dest_reverse_hex,7,2),16) . ".". tonumber(substr(dest_reverse_hex,5,2),16).".".tonumber(substr(dest_reverse_hex,3,2),16).".".tonumber(substr(dest_reverse_hex,1,2),16))

[build_call_guid_words]
INGEST_EVAL = incomingGuidWord1=substr(IncomingProtocolCallRef,0,8), incomingGuidWord2=substr(IncomingProtocolCallRef,9,8), incomingGuidWord3=substr(IncomingProtocolCallRef,17,8), incomingGuidWord4=substr(IncomingProtocolCallRef,25,8), outgoingGuidWord1=substr(OutgoingProtocolCallRef,0,8), outgoingGuidWord2=substr(OutgoingProtocolCallRef,9,8), outgoingGuidWord3=substr(OutgoingProtocolCallRef,17,8), outgoingGuidWord4=substr(OutgoingProtocolCallRef,25,8)

[cube_calling_party_number]
INGEST_EVAL = callingPartyNumber = clid

[cube_called_party_number]
INGEST_EVAL = calledPartyNumber = dnis

[cube_duration]
INGEST_EVAL = duration = round(if(isnotnull(tx_duration) AND tx_duration!="",tonumber(substr(tx_duration,0,len(tx_duration)-3))/1000,tonumber(strptime(h323_disconnect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y")) - tonumber(strptime(h323_connect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y"))),3)


