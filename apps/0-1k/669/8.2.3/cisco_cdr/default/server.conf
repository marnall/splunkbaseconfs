
# See README/sideview_license.conf for more details.

[shclustering]
# When an admin posts new contents for sideview_license.conf to one of the SHC members,
# this key governs whether that change is replicated to the other members.
# Since our customers typically just post things into SHC instances we want this to
# replicate and push the license to all of SHC instances, so this should be set to true.
# If this is somehow set to false, then a) it will cause some havoc as far as usability,
# and b) then the only reliable way to update the license will be to set it on the deployer and
# redeploy.
# TL;DR do not set to false.
conf_replication_include.sideview_license = true

# I'm not sure why anyone would ever post new content for a sideview_data_type
# to an SHC member, but if that ever happens, it should be replicated.
# (seems academic because this conf should only be changed when an SA is added/removed)
conf_replication_include.sideview_data_types = true