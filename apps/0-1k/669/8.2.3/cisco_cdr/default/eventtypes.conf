


# Call Types
# these are deprecated as of version 8.2.2 and will be removed in a future release of this app.
[incoming_call]
search = type=incoming

[outgoing_call]
search = type=outgoing

[tandem_call]
search = type=tandem

[internal_call]
search = type=internal



[leg_type_left_voicemail]
search = duration>4 (dest_device_type=unityvm OR gateway=Unity*) on_hook_party=*

[leg_type_hung_up_at_voicemail]
search = duration<=4 (dest_device_type=unityvm OR gateway=Unity*) on_hook_party=*

[leg_type_transfer_from_uccx]
search = dest_device_type="uccx" cause_description="Call Split"
disabled = 1

[leg_type_transferred]
search = (dest_device_type=hardphone OR dest_device_type=jabber_*) cause_description="Call split"
disabled = 1

[leg_type_transfer_from_voicemail]
search = (dest_device_type=unityvm OR gateway=Unity*) cause_description="Call split" NOT on_hook_party=*
disabled = 1

[leg_type_handled]
search = (dest_device_type=hardphone OR dest_device_type=jabber_*) huntPilotDN=* cause_description="Normal call clearing"
disabled = 1
