# DEPRECATED.  Now that CUBE is an equal citizen to cucm_cdr and cucm_cmr,
# this was a very cucm specific optimization so it's no longer used.
[shutdown_stream_when_both_sourcetypes_present]
definition = | streamstats count as thisSourcetypesCount by sourcetype \
| streamstats dc(sourcetype) as sourcetypeCount count as totalEventCount \
| eval bothSidesHaveData=if(sourcetypeCount<2,0,1) \
| streamstats sum(bothSidesHaveData) as eventsAfterBothSidesHaveData \
| head (totalEventCount<6000 AND eventsAfterBothSidesHaveData<3000) \
| fields - totalEventCount eventsAfterBothSidesHaveData thisSourcetypesCount bothSidesHaveData sourcetypeCount


