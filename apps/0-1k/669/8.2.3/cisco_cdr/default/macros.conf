[get_sites]
definition = lookup cidr subnet as `customizable_orig_site_ip` output site_name as origSite lat as callingPartyLat_cidr long as callingPartyLong_cidr subnet as origCidr country as tempOrigSiteCountry \
| lookup cidr subnet as `customizable_dest_site_ip` output site_name as destSite lat as finalCalledPartyLat_cidr long as finalCalledPartyLong_cidr subnet as destCidr country as tempDestSiteCountry \
| eval cidr=mvdedup(mvappend(origCidr,destCidr)) \
| eval callingPartyLat=if(isnull(callingPartyLat),callingPartyLat_cidr,callingPartyLat) \
| eval callingPartyLong=if(isnull(callingPartyLong),callingPartyLong_cidr,callingPartyLong) \
| eval finalCalledPartyLat=if(isnull(finalCalledPartyLat),finalCalledPartyLat_cidr,finalCalledPartyLat) \
| eval finalCalledPartyLong=if(isnull(finalCalledPartyLong),finalCalledPartyLong_cidr,finalCalledPartyLong) \
| eval callingPartyCountry=if(type=="outgoing" OR type="internal",tempOrigSiteCountry,callingPartyCountry) \
| eval finalCalledPartyCountry=if(type=="incoming" OR type="internal",tempDestSiteCountry,finalCalledPartyCountry) \
| eval origSite=if(type=="outgoing" OR type="internal", origSite, null()) \
| eval destSite=if(type=="incoming" OR type="internal", destSite, null()) \
| eval site=case(isnull(origSite) AND isnotnull(destSite),destSite,isnull(destSite) AND isnotnull(origSite),origSite,isnull(origSite) AND isnull(destSite),null(),origSite!=destSite,mvappend(origSite,destSite),true(),origSite) \
| fields - *_cidr tempOrigSiteCountry tempDestSiteCountry

