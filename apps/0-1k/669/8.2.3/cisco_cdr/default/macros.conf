[check_lookup_has_correct_fields(1)]
args = lookup_name
definition = inputlookup $lookup_name$ | fieldsummary | fields - values | stats list(field) as we_have | appendcols [| inputlookup $lookup_name$_default | fieldsummary | fields - values | stats list(field) as should_have  | fields should_have] | mvexpand should_have | foreach should_have [eval missing_fields=if(in(<<FIELD>>, we_have),missing_fields,mvappend(<<FIELD>>,missing_fields)) ] | stats values(we_have) as we_have values(should_have) as should_have values(missing_fields) as missing_fields | mvexpand we_have | foreach we_have [eval extra_fields=if(in(<<FIELD>>, should_have),extra_fields,mvappend(<<FIELD>>,extra_fields)) ] \
| stats values(we_have) as we_have values(should_have) as should_have values(missing_fields) as missing_fields values(extra_fields) as extra_fields | eval we_have=mvjoin(we_have,",") | eval should_have=mvjoin(should_have,",")  \
| eval missing_fields=mvjoin(missing_fields,",")  \
| eval extra_fields=mvjoin(extra_fields,",") \
| fillnull missing_fields extra_fields value="" \
| eval are_we_ok=if(len(extra_fields)==0 AND len(missing_fields)==0,1,0) \
| eval severity_level=if(are_we_ok=="0",3,0) \
| eval metric=case(are_we_ok=="1","OK - your $lookup_name$ lookup has the right columns.", len(extra_fields)>0, "your $lookup_name$ lookup seems to have extra column(s) of " + extra_fields, len(missing_fields)>0, "your $lookup_name$ lookup is missing these column(s):  ". missing_fields.".") \
| table missing_fields extra_fields are_we_ok severity_level metric *

[get_groups_lookup_fields_with_output_field_names(1)]
args = outputFieldPrefixes
definition = rest splunk_server=local /servicesNS/-/cisco_cdr/data/props/lookups \
| search attribute="LOOKUP-groups-*" NOT lookup.field.input.number="dnis" NOT lookup.field.input.number="clid" NOT lookup.field.input.number="huntPilotDN" \
| fields "lookup.field.output.*" \
| transpose \
| rename "row 1" as field1 "row 2" as field2 "row 3" as field3 "row 4" as field4 \
| where isnotnull(field1) or isnotnull(field2) or isnotnull(field3) or isnotnull(field4) \
| eval lookup_field=replace(column,"lookup.field.output.","") \
| untable lookup_field field output_field \
| where field!="column" \
| eval output_field=replace(output_field,"$outputFieldPrefixes$","") \
| eval output_field=lower(substr(output_field,1,1)) . substr(output_field,2) \
| stats values(output_field) as output_field by lookup_field \
| eval f=lookup_field \
| eval sort_order=case(f=="name",1,f=="group",2,f=="subgroup",3,f=="subgroup2",4,f=="subgroup3",5,f=="subgroup3",6,f=="subgroup4",7) \
| sort + sort_order \
| stats list(lookup_field) as lookup_field list(output_field) as output_field \
| eval lookup_fields=mvjoin(lookup_field," ") \
| eval output_fields=mvjoin(output_field," ")


# an earlier rough attempt,  at looking at the raw IP Addresses and trying to infer from them a
# covering set of subnets in CIDR notation.
# sample usage would be:
# `custom_index` sourcetype=cucm_cdr | head 1000000 | `generate_rough_cidr_expressions` | outputcsv temp_cidr.csv
# However for a more recent take on the same problem there is get_possible_subnets.py
# unfortunately we don't ship it anymore.
[generate_rough_cidr_expressions]
definition = eval ip_addr=mvappend(destIpAddr,origIpAddr) | fields ip_addr | mvexpand ip_addr | `convert_ip_address(ip_addr)` | fields ip_addr | sort 0 - ip_addr | eval split=split(ip_addr,".") | eval three=mvjoin(mvindex(split,0,2),".") | stats dc(ip_addr) as IPs by three | reverse | streamstats current=f last(three) as previousThree | eval threeSplit=split(three,".") | eval previousThreeSplit=split(previousThree,".") | eval matchesPrevious=if(mvindex(threeSplit,0)==mvindex(previousThreeSplit,0) AND mvindex(threeSplit,1)==mvindex(previousThreeSplit,1) AND tonumber(mvindex(threeSplit,2))+1==tonumber(mvindex(previousThreeSplit,2)),1,0) | reverse | streamstats current=f window=1 last(matchesPrevious) as matchesNext | eval CIDR=case(matchesNext=="1",null(),matchesPrevious=="1",three.".0/23",true(),three.".0/24") | filldown CIDR | dedup CIDR | rename CIDR as subnet | streamstats count as site_name | eval site_name="Location " + site_name | eval lat="39.50" | eval long="-98.35" | fields subnet site_name country subnet_description lat long




