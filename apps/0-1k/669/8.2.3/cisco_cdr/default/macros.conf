[get_internal_party_numbers]
definition = eval internal_party_number = mvdedup(case(type=="incoming", mvappend(originalCalledPartyNumber, finalCalledPartyNumber), type="outgoing", callingPartyNumber, type=="internal", mvappend(callingPartyNumber, originalCalledPartyNumber, finalCalledPartyNumber)))

[get_internal_login_user_ids]
definition = eval loginUserId = mvdedup(case(type=="incoming", mvappend(originalCalledPartyUnicodeLoginUserID, finalCalledPartyUnicodeLoginUserID), type="outgoing", callingPartyUnicodeLoginUserID, type=="internal",mvappend(callingPartyUnicodeLoginUserID, originalCalledPartyUnicodeLoginUserID, finalCalledPartyUnicodeLoginUserID)))

[get_internal_sites]
definition = eval site = mvdedup(case(type=="incoming", destSite, type="outgoing", origSite, type=="internal", mvappend(origSite, destSite)))


[get_time_window_for_detail_views]
definition = eval detailLatest=if(isnull(detailLatest),_time + durationInSeconds + 1, detailLatest) \
| eval detailEarliest=round(relative_time(_time,"-3h@h")) \
| eval detailLatest=round(relative_time(detailLatest,"+4h@h"))

[y_axis_fields]
