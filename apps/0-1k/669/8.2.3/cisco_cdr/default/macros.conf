[custom_index]
definition = index="cisco_cdr"


[custom_syslog_index]
definition = index="cisco_cdr_syslog"

# this index does NOT have to exist.  This is a part of an optional method
# whereby rows destined for one of the app's lookups (eg groups or devices) can
# come in as indexed events on one Splunk instance (eg an onprem instance),
# get forwarded to another splunk indexer, and then get reformulated by a separate
# scheduled search on a SH (eg a cloud instance) and have the latest run worth of rows
# get pushed into the csv lookup there on the SH.
[custom_lookup_index]
definition = index="cisco_cdr_app_lookups"


# calculates a temporary field ucm_call_id that exists only on the cucm side.
# then uses eventstats to copy it over to the cube side,  onto any cube events that have
# the same value of call_reference_id AND day.
# then.. on the other side they CHANGE the call_id field to be the CUCM field.
# which means when the Sideview stats command comes along, the cube record will be rolled
# into the cucm record.
[customizable_cube_streaming_extractions]
definition = eval day=strftime(_time,"%m_%d_%Y") | eval ucm_call_id=if(data_type=="cucm",call_id,null()) \
| eventstats values(ucm_call_id) as ucm_call_id by call_reference_id day \
| eval call_id=if(data_type=="cube" AND isnotnull(ucm_call_id),ucm_call_id,call_id) \
| fields - day ucm_call_id

[customizable_filter_for_deployment_stats]
# eg:
# definition = origDeviceName!="myVoiceRecorder-*" destDeviceName!="myVoiceRecorder-*" could be used to
# exclude calls that might (in some configurations) potentially double call counts and inflate device counts.
definition = *

# this macro is used in some parts of the app that DELIBERATELY look for data
# in unexpected places.  In all cases the SPL is careful to put a "| head N" command
# so as to not create an extremely expensive runaway search.
# however some large environments have Workflow Management rules that block these
# searches from even running.   So we make this macro available so that admins can set it to
# index="telecom" OR index="network" OR index="telecom_app_logs"
# so it holds a bit of a superset of indexes where unexpectedly-related data might plausibly be.
[customizable_other_notable_indexes]
definition = index=*

[cucm_sourcetypes]
definition = ( sourcetype=cucm_cdr OR sourcetype=cucm_cmr )

[cube_sourcetypes]
definition = ( sourcetype=cube_cdr OR sourcetype=cube_cdr_compact )






[get_clusters]
definition = inputlookup clusters | eval label=if((name=="" OR isnull(name)),clusterId,name)

[get_data_types]
definition = inputlookup data_types | eval sourcetype=split(sourcetypes," ") \
| mvexpand sourcetype \
| eval sourcetype="sourcetype=\"" + sourcetype + "\"" \
| stats values(*) as * by data_type \
| eval sourcetype=mvjoin(sourcetype, " OR ")

[id_fields]
definition = globalCallID_callId globalCallID_callManagerId globalCallId_ClusterID

# CUCM is weird, and uses the 3 globalCallId fields, which are index-time courtesy of INDEXED_EXTRACTIONS=csv
# other sourcetypes right now are presumed to use a single field "call_id"
[get_appropriate_call_ids]
definition = fillnull `id_fields` value="null" | stats count by call_id sourcetype `id_fields` | fields - count | eval call_id=if(match(sourcetype,"cucm_"),null(),call_id) | eval globalCallId_ClusterID=if(!match(sourcetype,"cucm_"),null(),globalCallId_ClusterID) | eval globalCallID_callManagerId=if(!match(sourcetype,"cucm_"),null(),globalCallID_callManagerId) | eval globalCallID_callId=if(!match(sourcetype,"cucm_"),null(),globalCallID_callId) | eval sourcetype=if(match(sourcetype,"cucm_"),null(),sourcetype)

# Note - fields can be added here, and several can be removed.  However do not remove the `id_fields` macro.
# Those three fields are needed to link correctly to the call detail view.
[fields_for_call_detail]
definition = fields type duration callingPartyNumber originalCalledPartyNumber finalCalledPartyNumber call_id detailEarliest detailLatest `id_fields`

[strip_emptystring_values]
definition = streamstats count as rowId | stats values(*) as * by rowId | fields - rowId

[fields_for_cmr]
definition = `get_quality` | rename _indextime as indextime | `strip_emptystring_values` | eval time=if(isnotnull(dateTimeStamp),strftime(dateTimeStamp,"%m/%d/%Y %H:%M:%S"),strftime(indextime,"%m/%d/%Y %H:%M:%S \n(indexed at this time)")) | fields - indextime date_* callId call_id clusterLocale qos cdrRecordType data_type timestartpos timeendpos splunk_server eventtype linecount punct index sourcetype source host clusterGroup clusterName _raw varVQMetrics globalCallID_callId globalCallID_callManagerId globalCallId_ClusterID | fields time quality *

[sort_call_legs]
# as per the "custom_timestamp_extraction" transform, we now use dateTimeConnect as the primary timestamp,
# falling back to dateTimeDisconnect and dateTimeOrigination in appropriate cases.
# meaning here we can just sort.
# the - transfers is a little cheat as CUCM often has transfer legs and one or more "real" legs start and end concurrently.
# with this sort we just sneakily push the transfer legs to the starrt of that block
definition = sort 0 + _time - transfers


[convert_duration_to_string(1)]
args = name
definition = eval $name$_duration=if($name$>0,tostring($name$_duration,"duration"),null())

[make_null_if_zero(1)]
args = name
definition = eval $name$=if($name$==0,null(),$name$)



[get_durations_for_internal_parties]
definition = eval total_duration_min = round(total_duration/60,1) \
| eval incoming_duration_min = round(incoming_duration/60,1) \
| eval outgoing_duration_min = round(outgoing_duration/60,1) \
| eval internal_duration_min = round(internal_duration/60,1) \
| eval tandem_duration_min = round(tandem_duration/60,1) \
| `convert_duration_to_string("incoming")` \
| `convert_duration_to_string("outgoing")` \
| `convert_duration_to_string("internal")` \
| `convert_duration_to_string("tandem")` \
| `convert_duration_to_string("business_hours")` \
| `convert_duration_to_string("off_hours")` \
| `convert_duration_to_string("audio")` \
| `convert_duration_to_string("video")` \
| eval total_duration=if(calls>0 OR total>0,tostring(total_duration,"duration"),null())

[replace_zeros_with_nulls]
definition = `make_null_if_zero("incoming")` \
| `make_null_if_zero("outgoing")` \
| `make_null_if_zero("internal")` \
| `make_null_if_zero("tandem")` \
| `make_null_if_zero("business_hours")` \
| `make_null_if_zero("off_hours")` \
| `make_null_if_zero("audio")` \
| `make_null_if_zero("video")` \
| `make_null_if_zero("outside_parties")` \
| `make_null_if_zero("transferred_away")` \
| `make_null_if_zero("failed")`

[fields_for_internal_parties]
definition = fields number loginUserID huntPilotDN name group subgroup site calls failed pct_failed incoming outgoing internal partition outside_parties transferred_away business_hours off_hours audio video  incoming_duration outgoing_duration internal_duration business_hours_duration off_hours_duration audio_duration video_duration total_duration \
| `get_durations_for_internal_parties` \
| `replace_zeros_with_nulls` \
| eval name=if(name="",null(),name) \
| eval group=if(group="",null(),group) \
| eval subgroup=if(subgroup="",null(),subgroup) \
| fillnull total \
| fillnull name group subgroup partition value="(none)" \
| sort 0 number



[get_call_type(1)]
args = field
definition = eval type=if(match("::::$field$::::", "::::" + callingParty + "::::"),"callerCell","recipientCell")

# as of this writing, toll_type is not checked into the field_gallery so it wont be in the field
# picker so this code will never run.  However the rest ships so therefore we can add it to the
# field_gallery and it will all suddenly run.
# It will only make sense for customers whose party numbers are perfectly normalized inside and out.
[get_toll_type]
definition = eval toll_type=if(type="incoming" OR type="outgoing",case(isnotnull(callingPartyZIP) AND isnotnull(finalCalledPartyZip) AND callingPartyZip==finalCalledPartyZip, "local", isnotnull(callingPartyLATA) AND isnotnull(finalCalledPartyLATA) AND callingPartyLATA==finalCalledPartyLATA, "intraLATA", isnotnull(callingPartyLATA) AND isnotnull(finalCalledPartyLATA) AND callingPartyLATA!=finalCalledPartyLATA, "interLATA", isnotnull(callingPartyCountryCode) AND isnotnull(finalCalledPartyCountryCode) AND callingPartyCountryCode!=finalCalledPartyCountryCode, "international", true(), null()),null())

[location_lookup(1)]
args = which
definition =lookup north_american_area_codes npa AS $which$AreaCode nxx AS $which$Exchange OUTPUT lata as $which$LATA clli as $which$CLLI ocn as $which$OCN companytype as $which$CompanyType state AS $which$StateAbbr city AS $which$City zip AS $which$Zip lat AS $which$Lat lon AS $which$Long companyname AS $which$CompanyName

[na_states_lookup(1)]
args = which
definition =lookup na_states stateAbbr AS $which$StateAbbr OUTPUT state AS $which$State


#WE CAN'T MAKE IT AN AUTOMATIC EXTRACTION BECAUSE -  If we can make it invoke just once for both callingParty* and finalCalledParty*, then we'll be subject to the bug where either being null kills the other. Otoh if invoke twice then we pay twice the invocation cost.  Both are dealbreakers.
[get_locations]
# if either callingPartyNumber or finalCalledPartyNumber is null, the way
# scripted lookups work,  splunk will skip the row entirely.
# this fillnull nonsense is to minimize lookup invocations, but still get
# all DN's extracted even when the other side happens to be null.
# (note we have confirmed that the performance of an equivalent custom search
#   command is worse)
definition = fillnull callingPartyNumber finalCalledPartyNumber value="workaround" \
| `set_failsafe_cluster_locale` \
| lookup parse_phone_numbers callingPartyNumber finalCalledPartyNumber clusterLocale \
| eval callingPartyNumber=if(callingPartyNumber=="workaround",null(),callingPartyNumber) \
| eval finalCalledPartyNumber=if(finalCalledPartyNumber=="workaround",null(),finalCalledPartyNumber) \
| `location_lookup(callingParty)` \
| `location_lookup(finalCalledParty)` \
| `na_states_lookup(callingParty)` \
| `na_states_lookup(finalCalledParty)`

# clusterLocale is one of the 3 inputfields to the `get_locations` external lookup
# with those lookups if ANY fields are null, the whole lookup is skipped for that row.
[set_failsafe_cluster_locale]
definition = eval clusterLocale=if(isnull(clusterLocale) OR clusterLocale=="", "US", clusterLocale)

[get_to_and_from]
definition = eval to=case(isnotnull(finalCalledPartyCity) AND isnotnull(finalCalledPartyState),finalCalledPartyCity + ", " + finalCalledPartyState,isnotnull(finalCalledPartyState),finalCalledPartyState,isnotnull(finalCalledPartyCity) AND isnotnull(finalCalledPartyCountry),finalCalledPartyCity+", "+finalCalledPartyCountry,isnotnull(finalCalledPartyState),finalCalledPartyState,isnotnull(finalCalledPartyCountry),finalCalledPartyCountry,isnull(dest_gateway),destSite) | eval from=case(isnotnull(callingPartyCity) AND isnotnull(callingPartyState),callingPartyCity + ", " + callingPartyState,isnotnull(callingPartyCity) AND isnotnull(callingPartyCountry),callingPartyCity+", "+callingPartyCountry,isnotnull(callingPartyState),callingPartyState,isnotnull(callingPartyCountry),callingPartyCountry,isnull(orig_gateway),origSite)


[get_field_list(1)]
args = data_type
definition = `get_field_list("$data_type$","")`


#a bit of a catch 22.
# if the internals of the append also filter on pulldown_type="explicitSPL",  then it's clever,
# cause the field list will only have the fields that are actually extracted FROM the live data.
# but it's also NOT clever cause the head 6000 is dumb and with any uneven timestamping it'll
# be missing an entire sourcetype... so therefore you want to have field gallery's fields all
# just dumbly dropped in here.
# for now I am going with dumb.
[get_field_list(2)]
args = data_type, advancedSearchLanguage
definition = `custom_index` $data_type$ \
| head 6000  $advancedSearchLanguage$ \
| fields - date_* timeendpos timestartpos splunk_server* index eventtype host linecount cdrRecordType varVQMetrics destdeviceName origdeviceName \
| fieldsummary \
| where count>0 \
| fields field \
| append [ \
  | inputlookup field_gallery \
  | eval sourcetype=split(sourcetype,",") \
  | search field!="time" ( sourcetype="ALL" OR ($data_type$) ) \
] \
| stats count by field \
| eval fieldLower=lower(field) \
| sort fieldLower \
| fields - fieldLower \
| lookup field_gallery field OUTPUT pulldown_type \
| search NOT pulldown_type="deprecated" \

[get_gateways_from_tstats(1)]
args = which
definition = `get_gateways_from_tstats($which$,"")`

[get_gateways_from_tstats(2)]
args = which, clustersClause
definition = tstats count WHERE `custom_index` sourcetype=cucm_cdr $clustersClause$ GROUPBY $which$DeviceName $which$Span $which$ConversationId \
| extract cisco-cdr-$which$hardphone \
| extract cisco-cdr-$which$cfb \
| extract cisco-cdr-$which$-mgcp-gateway \
| where ($which$Span!=0 AND $which$Span!=$which$ConversationId AND isnull($which$_device_type)) OR $which$_device_type="gateway" \
| eval gateway=coalesce($which$_mgcp_gateway,$which$DeviceName) \
| stats count by gateway


[get_custom_type_fields]
#Note that this will grab the FIRST leg_type.  So the priority flags on the eventtype do matter.
# and also note that the admin user isn't supposed to ever make multiple ones match.
definition = eval leg_type=split(replace(mvjoin(mvindex(mvfilter(match(eventtype,".+_type_.+")),0),","),"leg_type_",""),",")
#2) a version that complains loudly if there are two or more leg types on a call leg
#eval leg_type=if(mvcount(mvfilter(match(eventtype,".+_type_.+")))>1,"more than one leg_type matched",split(replace(mvjoin(mvfilter(match(eventtype,".+_type_.+")),","),"leg_type_",""),","))
#3) a version that doesn't care and lets multiple ones match
#eval leg_type=split(replace(mvjoin(mvfilter(match(eventtype,".+_type_.+")),","),"leg_type_",""),",")

# it's not a "get_*" macro because it does more than just add fields to existing rows.
# Granted, it doesn't totally transform the rows but note that it does mvexpand them
[calculate_all_internal_parties_old]
definition = fillnull callingPartyUnicodeLoginUserID originalCalledPartyUnicodeLoginUserID finalCalledPartyUnicodeLoginUserID origSite destSite callingPartyNumberPartition \
originalCalledPartyNumberPartition  finalCalledPartyNumberPartition value="(none)" \
| eval callingParty=callingPartyNumber + "::" + callingPartyUnicodeLoginUserID + "::" + origSite  + "::" + callingPartyNumberPartition \
| eval originalCalledParty=originalCalledPartyNumber + "::" + originalCalledPartyUnicodeLoginUserID  + "::" + origSite  + "::" + originalCalledPartyNumberPartition \
| eval finalCalledParty=finalCalledPartyNumber + "::" + finalCalledPartyUnicodeLoginUserID  + "::" + destSite  + "::" + finalCalledPartyNumberPartition \
| eval originalEqualsFinal = if(replace(originalCalledPartyNumber,"\+","++")==replace(finalCalledPartyNumber,"\+","++"),1,0) \
| eval callerEqualsOriginal = if(replace(callingPartyNumber,"\+","++")==replace(originalCalledPartyNumber,"\+","++"),1,0) \
| eval callerEqualsFinal = if(replace(callingPartyNumber,"\+","++")==replace(finalCalledPartyNumber,"\+","++"),1,0) \
| eval party=case(\
  type=="internal" AND callerEqualsFinal=0 AND originalEqualsFinal=0 AND callerEqualsOriginal=0,mvappend(callingParty,originalCalledParty,finalCalledParty), \
  type=="internal" AND callerEqualsFinal=1 AND originalEqualsFinal =0,mvappend(callingParty,originalCalledParty), \
  type=="internal" AND callerEqualsFinal=0 AND originalEqualsFinal =1,mvappend(callingParty,finalCalledParty), \
  type=="internal" AND callerEqualsFinal=0 AND callerEqualsOriginal=1,mvappend(callingParty,finalCalledParty), \
  type=="internal" AND callerEqualsFinal=1 AND originalEqualsFinal =1,callingParty, \
  type=="incoming" AND originalEqualsFinal=0,mvappend(originalCalledParty,finalCalledParty), \
  type=="incoming" AND originalEqualsFinal=1,finalCalledParty, \
  type=="outgoing",callingParty) \
| fields - originalEqualsFinal \
| where isnotnull(party) \
| mvexpand party  \
| eval party=split(party,"::") \
| eval number=mvindex(party,0) \
| eval loginUserID=split(mvindex(party,1),"::") \
| eval site=split(mvindex(party,2),"::") \
| eval partition=split(mvindex(party,3),"::") \
| search number!="" \
| fields - party

# improved version that uses some mvmap to avoid the mvexpand
# and uses some mvdedup to avoid the clunky 'callerEqualsOriginal' logical maze.
[calculate_all_internal_parties]
definition = fillnull callingPartyUnicodeLoginUserID originalCalledPartyUnicodeLoginUserID finalCalledPartyUnicodeLoginUserID origSite destSite callingPartyNumberPartition \
originalCalledPartyNumberPartition finalCalledPartyNumberPartition value="(none)" \
| eval callingParty=callingPartyNumber + "::" + callingPartyUnicodeLoginUserID + "::" + origSite  + "::" + callingPartyNumberPartition \
| eval originalCalledParty=originalCalledPartyNumber + "::" + originalCalledPartyUnicodeLoginUserID  + "::" + origSite  + "::" + originalCalledPartyNumberPartition \
| eval finalCalledParty=finalCalledPartyNumber + "::" + finalCalledPartyUnicodeLoginUserID  + "::" + destSite  + "::" + finalCalledPartyNumberPartition \
| eval party=mvdedup(case(type=="outgoing", callingParty, type="incoming", mvappend(originalCalledParty, finalCalledParty), type=="internal", mvappend(callingParty, originalCalledParty, finalCalledParty))) \
| where isnotnull(party) \
| eval number=mvmap(party, mvindex(split(party,"::"), 0)) \
| eval loginUserID=mvmap(party, mvindex(split(party,"::"),1)) \
| eval site=mvmap(party, mvindex(split(party,"::"),2)) \
| eval partition=mvmap(party, mvindex(split(party,"::"),3)) \
``` carrying through the mv values will bring some (none) values. ``` \
| eval site=mvfilter(site!="(none)") \
| eval loginUserID=mvfilter(loginUserID!="(none)") \
| eval partition=mvfilter(partition!="(none)") \
| search number!="" \
| fields - party


