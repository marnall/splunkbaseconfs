# NOTE - remember to also edit the one that takes an argument.
[get_call_concurrency]
definition = eval conc_duration=if(isnotnull(duration) AND mvcount(duration)==1,duration,duration_elapsed) \
| eval increment = if(conc_duration>0,mvappend("1","-1"),"0") \
| mvexpand increment \
| eval _time = if(increment==1, _time, _time + conc_duration) \
| sort 0 + _time | streamstats sum(increment) as post_concurrency \
| eval concurrency = if(increment==-1, post_concurrency+1, post_concurrency)

# NOTE - remember to also edit the other one that takes (brooks?) no argument.
[get_call_concurrency(1)]
# Look this isn't an argument
# Yes it is.
args = split_by
definition = eval conc_duration=if(isnotnull(duration) AND mvcount(duration)==1,duration,duration_elapsed) \
| eval increment = if(conc_duration>0,mvappend("1","-1"),"0") \
| mvexpand $split_by$ \
| eval $split_by$=if($split_by$=="",null(),$split_by$) \
| mvexpand increment \
| eval _time = if(increment==1, _time, _time + conc_duration) \
| sort 0 + _time | fillnull $split_by$ value="NULL" \
| streamstats sum(increment) as post_concurrency by $split_by$ \
| eval concurrency = if(increment==-1, post_concurrency+1, post_concurrency)

[timechart_for_concurrency]
# use of last(post_concurrency) is OK here ASSUMING that we always have "| sort 0 + _time" earlier in the pipeline.
definition = timechart fixedrange=false bins=400 max(concurrency) as max_concurrency last(post_concurrency) as last_concurrency \
| filldown last_concurrency* \
| eval concurrency=coalesce(max_concurrency,last_concurrency) \
| fields - last_concurrency max_concurrency

[timechart_for_concurrency_with_bins(1)]
args = bins
# use of last(post_concurrency) is OK here ASSUMING that we always have "| sort 0 + _time" earlier in the pipeline.
definition = timechart fixedrange=false bins=$bins$ max(concurrency) as max_concurrency last(post_concurrency) as last_concurrency \
| filldown last_concurrency* \
| eval concurrency=coalesce(max_concurrency,last_concurrency) \
| fields - last_concurrency max_concurrency

[timechart_for_concurrency(1)]
args = split_by
definition = `timechart_for_concurrency($split_by$,400)`

[timechart_for_concurrency(2)]
args = split_by, bins
definition = `timechart_for_concurrency($split_by$,$bins$,60)`

[timechart_for_concurrency(3)]
args = split_by, bins, split_by_limit
# use of last(post_concurrency) is OK here ASSUMING that we always have "| sort 0 + _time" earlier in the pipeline.
definition = timechart fixedrange=false bins=$bins$ max(concurrency) as max_concurrency last(post_concurrency) as last_concurrency by $split_by$ limit=$split_by_limit$ \
| filldown last_concurrency* \
| foreach "max_concurrency:*" [eval <<MATCHSTR>>=coalesce('max_concurrency:<<MATCHSTR>>','last_concurrency:<<MATCHSTR>>')] \
| fields - last_concurrency* max_concurrency* \
| fillnull




[convert_ip_address(1)]
args = ip_field
definition = eval $ip_field$=tostring($ip_field$,"hex") \
| eval $ip_field$=if ($ip_field$!="0xFFFFFFFF",replace(replace($ip_field$, "0xFFFFFFFF", ""),"0x",""),$ip_field$) \
| eval initialLength=len(tostring($ip_field$)) \
| eval $ip_field$=substr("00000000".tostring($ip_field$),initialLength+1,8) \
| eval $ip_field$=tonumber(substr($ip_field$,7,2),16) . ".". tonumber(substr($ip_field$,5,2),16).".".tonumber(substr($ip_field$,3,2),16).".".tonumber(substr($ip_field$,1,2),16) \
| fields - initialLength

