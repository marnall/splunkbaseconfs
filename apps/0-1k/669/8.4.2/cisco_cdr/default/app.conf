[id]
name = cisco_cdr
version = 8.4.2
#splunkbase_id = 669

[ui]
is_visible = 1
label = Cisco CDR Reporting and Analytics
supported_themes = light, dark

[launcher]
author = Sideview, LLC
description = Sideview's Cisco CDR Reporting and Analytics app presents a powerful and intuitive user interface to investigate as well as report on the data generated by Cisco Unified Communications Manager (CUCM aka CallManager).  It allows users to freely switch between investigating a set of calls, to running practically any high-level chart and statistical report they can think of. They can furthermore drilldown into any of those generated charts to investigate further. This is a commercial (paid) app but it is available under a free 60-day trial license.  Take it for a test drive and please contact Sideview with any and all questions or feedback, and feel free to email support@sideviewapps.com during your trial with any questions or issues.
version = 8.4.2

[package]
id = cisco_cdr
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 285

[shclustering]
deployer_lookups_push_mode = always_preserve

[dependency:app:canary]
requiredVersion = 2.1.3

[dependency:splunk]
requiredVersion = 9.0

[triggers]
reload.sideview_license = access_endpoints /admin/conf-sideview_license
reload.sideview_data_types = access_endpoints /admin/conf-sideview_data_types


# it is an open question whether this is still needed.  Although it's not formally deprecated, it does
# seem redundant with other newer keys and I don't think appinspect checks for it.
[author=sideview]
email = info@sideviewapps.com
company = Sideview, LLC
