[script:cisco_cdr_license]
match                 = /cisco_cdr_license
script                = licensing/cisco_cdr_license.py
scripttype            = persist
handler               = cisco_cdr_license.CiscoCdrLicenseInfoHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
passSystemAuth        = true
python.version        = python3
python.required       = 3.9, 3.13

# not very field-tested as of this writing.  However it returns a simple JSON dict with
# the capabilities
# the license type of Enterprise | Trial | Free  (and maybe Cloud, not sure what Cloud says)
# for each of the *Quota keys in the roles entities for all their roles, the largest value.
# NOTE that it makes an assumption that if you have srchJobsQuota of 100 from one role, and
# srchJobsQuota of 10000 from another role, that you effectively have 10000
[script:cisco_cdr_splunk_license]
match                 = /cisco_cdr_splunk_license
script                = splunk_licensing/cisco_cdr_splunk_license.py
scripttype            = persist
handler               = cisco_cdr_splunk_license.CiscoCdrSplunkLicenseInfoHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
passSystemAuth        = false
python.version        = python3
python.required       = 3.9, 3.13


[script:cisco_cdr_replace_lookup]
match                 = /cisco_cdr_replace_lookup
script                = replace_lookup/cisco_cdr_replace_lookup.py
scripttype            = persist
handler               = cisco_cdr_replace_lookup.CiscoCdrReplaceLookupHandler
requireAuthentication = true
# you need xml even if you think you don't, because sometimes splunk decides on its own to try
# and switch to XML, and if its not an allowed output mode then errors get swallowed which will
# cost you some time which you wont get back
# Splunk: I’ve just sucked one year of your life away. I might one day go as high as five, but I
# really don’t know what that would do to you, so let’s just start with what we have. What did
# this do to you? Tell me. And remember, this is for posterity, so... be honest. How do you feel?
output_modes          = json, xml
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
python.version        = python3
python.required       = 3.9, 3.13


# see comments on the handler class in the python file in the shunt subdirectory.

