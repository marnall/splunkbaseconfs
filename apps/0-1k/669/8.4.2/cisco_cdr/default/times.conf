[other]
label = other
is_sub_menu = True
order = 200


#
# snapped range, current
#

[today]
label = today
earliest_time = @d
latest_time = now
order = 100
sub_menu = other

[week_to_date]
label = week to date
header_label = this week to date
earliest_time = @w0
latest_time = now
order = 110
sub_menu = other

# starts from the previous monday @ midnight to now
[business_week_to_date]
label = business week to date
header_label = this business week to date
earliest_time = @w1
latest_time = now
order = 120
sub_menu = other

[month_to_date]
label = month to date
header_label = this month to date
earliest_time = @mon
latest_time = now
order = 130
sub_menu = other

[year_to_date]
label = year to date
header_label = this year to date
earliest_time = @y
latest_time = now
order = 140
sub_menu = other

[last_6_months]
label = last 6 months
header_label = in the last 6 months
earliest_time = -6mon@mon
latest_time = now
order = 143
sub_menu = other


#
# snapped range, previous
#

[yesterday]
label = yesterday
header_label = yesterday
earliest_time = -1d@d
latest_time = @d
order = 200
sub_menu = other

[yesterday_and_today]
label = yesterday and today
header_label = yesterday and today
earliest_time = -1d@d
latest_time = now
order = 205
sub_menu = other

[previous_week]
label = previous week
header_label = in the previous week
earliest_time = -7d@w0
latest_time = @w0
order = 210
sub_menu = other

# If you run a search with this time range on a Sunday, the earliest time value
# will be the most recent Monday. If you run this time range on a Saturday,
# however, the earliest time will be two Mondays ago.
[previous_business_week]
label = previous business week
header_label = in the previous business week
earliest_time = -6d@w1
latest_time = -1d@w6
order = 220
sub_menu = other

[previous_month]
label = previous month
header_label = in the previous month
earliest_time = -1mon@mon
latest_time = @mon
order = 230
sub_menu = other

[previous_year]
label = previous year
header_label = in the previous year
earliest_time = -1y@y
latest_time = @y
order = 240
sub_menu = other


