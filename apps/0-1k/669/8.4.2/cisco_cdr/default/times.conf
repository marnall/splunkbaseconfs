
#
# continuous range, current
#

[last_15_mins]
label = last 15 minutes
header_label = in the last 15 minutes
earliest_time = -15m
latest_time = now
order = 10

[last_60_mins]
label = last 60 minutes
header_label = in the last 60 minutes
earliest_time = -60m@m
latest_time = now
order = 20

[last_4_hours]
label = last 4 hours
header_label = in the last 4 hours
