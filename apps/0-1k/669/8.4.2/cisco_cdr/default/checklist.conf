[info_check_release_not_too_ancient]
title = Check that the Cisco CDR app has been updated at least in the past six months.
category = Splunk Miscellaneous
tags = configuration
description = The Cisco CDR app is updated about once a month, and it is a very strong recommendation for customers to not fall too far behind. This checklist simply parses the release notes file within the app itself to determine the timestamp of the version's release date.
failure_text = This version of the Cisco CDR app is unusually old.  You should check on Splunkbase or sideviewapps.com to see if a more recently maintenance release is available.
suggested_action = Check Splunkbase or Sideviewapps.com to see if a newer version of the Cisco CDR and Canary apps are available.

search = | rest /servicesNS/-/cisco_cdr/data/ui/views/release_notes splunk_server=local | rename eai:data as xml | table xml | rex field=xml "(?s)<strong>Version (?<version>[\S]+)\s+\((?<date>[^\)]+)\)" \
| table version date \
| eval date=replace(date,"th,","") | eval date=replace(date,"st,","") | eval date=replace(date,"nd,","") | eval date=replace(date,"rd,","") \
| eval epoch=strptime(date,"%B %d %Y") \
| eval days_ago = round((now() - epoch) / 86400) \
| where days_ago>180 \
| stats count last(version) as version last(date) as date \
| eval severity_level=if(count==1,2,0), instance="all" | eval metric=if(count==1,"WARNING - version " . version . ") of this app is currently installed which was released in ". date . ".  We recommend checking for newer versions of Cisco CDR and Canary on Splunkbase as there are almost certainly newer ones available with important fixes and compatibility improvements.",  "OK - The currently installed version of the Cisco CDR app is a relatively recent version.")


[info_check_devices_lookup_for_nonexistent_or_wildcarded_clusters]
title = Checks devices lookup for appropriate clusterId values
category = Splunk Miscellaneous
tags = configuration
description = The devices lookup matches on both name and clusterId, and although clusterId can be "*" in the lookup, this is only a partial solution and has known issues for example in Investigate Devices.
failure_text = The Devices lookup seems to have one or more devices listed on a clusterId that doesnt' exist or is "*"
suggested_action = Run the troubleshooting search to see the problematic rows in the devices lookup

search = | inputlookup devices \
| search name!="PLACEHOLDER_DEVICE" \
| table name description clusterId \
| lookup clusters clusterId OUTPUT clusterId as matched_cluster \
| search NOT matched_cluster=* \
| stats count as devices_with_bad_clusters \
| eval severity_level=if(devices_with_bad_clusters>0,2,0), instance="all" \
| eval metric=if(devices_with_bad_clusters>0,"WARNING - The devices lookup contains some devices where the clusterId is not an explicit cluster in the clusters lookup",  "OK - All rows in the devices lookup specify explicit clusterId values")
drilldown = | inputlookup devices \
| search name!="PLACEHOLDER_DEVICE" \
| table name description clusterId \
| lookup clusters clusterId OUTPUT clusterId as matched_cluster \
| search NOT matched_cluster=*


[info_check_devices_lookup_for_differences_between_sh_and_idx]
title = Checks for has discrepancies in the devices lookup between the SH and IDX tiers
category = Splunk Miscellaneous
tags = configuration
description = Checks for a condition where different versions of the devices lookup exist on the SH and IDX tiers.
failure_text = The SH and IDX tiers seem to have two different copies of the devices lookup.
suggested_action = Run the troubleshooting search to see the problematic rows in the devices lookup

search = `cdr_events` origDeviceName=* \
| head 1000 \
| table origDeviceName origProductName origUserDepartment origDeviceDescription origDevicePool globalCallId_ClusterID \
``` the values from the IDX tier are blank. but lets rename them for clarity``` \
| rename origDeviceName AS name origProductName AS indexerProductName origUserDepartment AS indexerDepartment origDeviceDescription AS indexerDescription  origDevicePool AS indexerDevicePool \
| table name globalCallId_ClusterID indexer* \
``` now we grab the copy of the lookup from the SH tier ``` \
| lookup devices name name clusterId AS globalCallId_ClusterID OUTPUTNEW productName AS searchHeadProductName department as searchHeadDepartment description AS searchHeadDescription devicePool as searchHeadDevicePool \
| eval values = "name" \
| foreach * \
    [eval values=mvappend(values, if(isnotnull(<<FIELD>>),"<<FIELD>>",null()))] \
| foreach searchHead* \
    [eval sh_values=mvappend(sh_values, if(isnotnull(<<FIELD>>),replace("<<FIELD>>", "searchHead",""),null()))] \
| foreach indexer* \
    [eval idx_values=mvappend(idx_values, if(isnotnull(<<FIELD>>),replace("<<FIELD>>", "indexer",""),null()))] \
``` take the 'name' field out because it will always be populated ``` \
| eval values=mvfilter(NOT values IN ("name", "globalCallId_ClusterID", "values") ) \
| eval values=mvjoin(values,","), searchHeadValues=mvjoin(sh_values,","), indexerValues=mvjoin(idx_values,",") \
| eval type=case(isnull(values),"OK - no entry at all", isnotnull(indexerValues) AND isnull(searchHeadValues), "ERROR - device(s) found with no entry on SH but entry exists on IDX", isnull(indexerValues) AND isnotnull(searchHeadValues), "ERROR - device(s) found with no entry on IDX but entry exists on SH", searchHeadValues!=indexerValues, "ERROR - device(s) found with entries on both SH and IDX tiers but they don't match", searchHeadValues==indexerValues, "OK - matching entry on both SH and IDX tiers", true(), "ERROR - unexpected case" ) \
``` and for each device, lets see what the lookup yielded on both SH and IDX tier ``` \
| table name type searchHead* indexer* \
``` just the facts please ``` \
| stats count by type \
| eval severity_level=if(match(type,"^ERROR"),3,0) \
| stats values(type) as type by severity_level \
| eval metric=mvjoin(type," ")\
| sort - severity_level \
|  eval metric=if(severity_level==0,"OK - Devices lookup seems consistent between SH and IDX tiers",metric)\
| head 1 \
| eval instance="all"


drilldown = `cdr_events` origDeviceName=* \
| head 1000 \
| table origDeviceName origProductName origUserDepartment origDeviceDescription origDevicePool globalCallId_ClusterID \
``` the values from the IDX tier are blank. but lets rename them for clarity``` \
| rename origDeviceName AS name origProductName AS indexerProductName origUserDepartment AS indexerDepartment origDeviceDescription AS indexerDescription  origDevicePool AS indexerDevicePool \
| table name globalCallId_ClusterID indexer* \
``` now we grab the copy of the lookup from the SH tier ``` \
| lookup devices name name clusterId AS globalCallId_ClusterID OUTPUTNEW productName AS searchHeadProductName department as searchHeadDepartment description AS searchHeadDescription devicePool as searchHeadDevicePool \
| eval values=mvfilter(NOT values IN ("name", "globalCallId_ClusterID", "values") ) \
| foreach * \
    [eval values=mvappend(values, if(isnotnull(<<FIELD>>),"<<FIELD>>",null()))] \
| foreach searchHead* \
    [eval sh_values=mvappend(sh_values, if(isnotnull(<<FIELD>>),replace("<<FIELD>>", "searchHead",""),null()))] \
| foreach indexer* \
    [eval idx_values=mvappend(idx_values, if(isnotnull(<<FIELD>>),replace("<<FIELD>>", "indexer",""),null()))] \
``` take the 'name' field out because it will always be populated ``` \
| eval values=mvfilter(NOT values IN ("name", "globalCallId_ClusterID", "values") )\
| eval values=mvjoin(values,","), searchHeadValues=mvjoin(sh_values,","), indexerValues=mvjoin(idx_values,",")\
| eval type=case(isnull(values),"OK - no entry at all", isnotnull(indexerValues) AND isnull(searchHeadValues), "ERROR - device(s) found with no entry on SH but entry exists on IDX", isnull(indexerValues) AND isnotnull(searchHeadValues), "ERROR - device(s) found with no entry on IDX but entry exists on SH", searchHeadValues!=indexerValues, "ERROR - device(s) found with entries on both SH and IDX tiers but they don't match", searchHeadValues==indexerValues, "OK - matching entry on both SH and IDX tiers", true(), "ERROR - unexpected case" ) \
``` and for each device, lets see what the lookup yielded on both SH and IDX tier ``` \
