| appendcols \
    [| rest /services/server/info splunk_server=local | search activeLicenseGroup="Free" |  stats count as is_free_license ]\
| eval effective_srchDiskQuota = case(is_free_license = 1, 0, imported_srchDiskQuota = 0 OR isnull(imported_srchDiskQuota), srchDiskQuota, true(), min(imported_srchDiskQuota, srchDiskQuota))\
| stats values(is_free_license) as is_free_license, max(effective_srchDiskQuota) AS effective_srchDiskQuota, max(srchDiskQuota) as srchDiskQuota, max(imported_srchDiskQuota) as imported_srchDiskQuota, values(imported_roles) as imported_roles, values(roles) as roles\
| fields is_free_license effective_srchDiskQuota imported_srchDiskQuota srchDiskQuota imported_roles roles\
| eval severity_level=case(\
    is_free_license = 1, 2,\
    effective_srchDiskQuota <= 100, 3, \
    effective_srchDiskQuota < 300, 2, \
    effective_srchDiskQuota < 500, 1, \
    true(), 0) \
| eval metric=case( \
    is_free_license = 1, "WARNING - Splunk Free is not a supported platform for production data.",\
    severity_level=3, "ERROR - The disk quota for your user account is too low.  You will encounter errors or some jobs may silently return *incorrect information*. (Effective srchDiskQuota is " . effective_srchDiskQuota . ", recommendation is 500.  Please contact your Splunk administrators.)", \
    severity_level=2, "WARNING - The disk quota for your user account is marginal.  You may encounter errors or some jobs may silently return *incorrect information*.  (Effective srchDiskQuota is " . effective_srchDiskQuota . ", recommendation is 500.  Please contact your Splunk administrators.)", \
    severity_level=1, "INFO - The disk quota for your user account is marginal.  You might encounter errors, and some jobs may silently return *incorrect information*, but those are unlikely.  (Effective srchDiskQuota is " . effective_srchDiskQuota . ", recommendation is 500.)", \
    severity_level=0, "OK - Your user account has a large enough disk quota.  (Effective srchDiskQuota is " . effective_srchDiskQuota . ", recommendation is 500.)")



[info_check_911_call_macro]
title = Check if any calls are found by the 911/Emergency Services macro in the past 30 days.
category = Knowledge Objects
tags = configuration
description = There is a macro that is adjustable, found at "Investigate > Emergency Calls", which will identify emergency services numbers.  This test checks that the criteria supplied actually matches one or more calls in the past 90 days.
failure_text = See Browse/911_calls for more information on checking if your macro is set up.  If your installation is new or if you are fairly sure there haven't been any calls that this search should match, then you can safely ignore this warning.

search = `custom_index` sourcetype=cucm_cdr `911_numbers` earliest=-90d \
| stats count as emergency_calls_found \
| eval severity_level=if(emergency_calls_found = 0, 2, 0) \
| eval metric=if(severity_level=2, \
    "WARNING - No calls to Emergency Services found in previous 90 days.  Please check the macro (at \"Investigate > Emergency Calls\") for more information on setting it up.", \
	"OK - one or more calls to Emergency Services found in previous 90 days.") \
| eval instance="all" \
| table instance, metric, severity_level


[info_check_orphaned_device_extractions]
title = Check if any device extractions are orphaned
category = Knowledge Objects
tags = configuration
description = If a custom extraction was created and was referenced in an overridden default copy of REPORT-phone_types, during an upgrade these will be lost.  This searches for where a transform exists for a device extraction yet where there is no corresponding entry in props.
failure_text = You have one or more transforms for device_type extractions that are no longer referenced.

search = | rest "/servicesNS/-/cisco_cdr/data/props/extractions" splunk_server=local \
| search value="cisco-cdr*" NOT (value="cisco-cdr-*" value="*-mgcp-gateway")\
| rename value AS title \
| makemv title delim="," \
| mvexpand title \
| eval title=trim(title), from="props" \
| append \
    [| rest "/servicesNS/-/cisco_cdr/data/transforms/extractions" splunk_server=local \
    | search title="cisco-cdr-*" NOT (title="cisco-cdr-*" title="*mgcp*") \
    | fields title \
    | eval from="transforms"] \
| stats values(from) as "derived" count as entries by title \
| stats count(entries) BY entries \
| eval severity_level = case(entries==2, 0, entries==1, 2, true(), 1) \
| stats max(severity_level) AS severity_level \
| eval metric=if(severity_level==2, \
    "WARNING - There is one or more orphaned device_type extractions with a transform but no props entry.  Please run the troubleshooting search (below) for more information.", \
	"OK - All device_type extractions are referenced in both props and transforms.") \
| eval instance="all" \
| table instance, metric, severity_level

drilldown = | rest "/servicesNS/-/cisco_cdr/data/props/extractions" splunk_server=local \
| search value="cisco-cdr*" NOT (value="cisco-cdr-*" value="*-mgcp-gateway")  \
| rename value AS title  \
| makemv title delim=","  \
| mvexpand title  \
| eval title=trim(title), from="props"  \
| append  \
    [| rest "/servicesNS/-/cisco_cdr/data/transforms/extractions" splunk_server=local   \
    | search title="cisco-cdr-*" NOT (title="cisco-cdr-*" title="*mgcp*")  \
    | fields title  \
    | eval from="transforms"]  \
| stats values(from) as "derived" count as entries by title \
| stats count(entries) values(title) as title BY entries \
| eval severity_level = case(entries=2, 0, entries=1, 2, true(), 1) \
| eventstats max(severity_level) AS max_severity_level \
| where severity_level = max_severity_level \
| eval title=mvjoin(title,",") \
| eval metric=if(severity_level==2,  \
    "WARNING - Some transform(s) are not referenced anywhere we can find in props, so they won't run automatically.  Check settings/fields/field extractions for a corresponding entry. The transforms stanzas are " . title,  \
    "OK - These device extractions are referenced in props.")  \
| table metric, severity_level title


