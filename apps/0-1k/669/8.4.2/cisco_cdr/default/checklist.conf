[critical_missing_lookups]
title = Check that critical lookups are populated.
category = Knowledge Objects
tags  = configuration
description = Occasionally during an upgrade, splunkd loses a bunch of static files from the app, or certain lookups that should be generated by the app on install, fail to get generated.
failure_text  = Some critical lookups are empty.  Reload the Cisco CDR Reporting and Analytics app's "Home" page, and retest.

search = | inputlookup country_codes | stats count | eval lookup="country_codes" \
| append [| inputlookup field_gallery | stats count | eval lookup="field_gallery" ] \
| append [| inputlookup cidr | stats count | eval lookup="sites (cidr)" ] \
| append [| inputlookup call_release_cause_codes | stats count | eval lookup="call_release_cause_codes.csv" ] \
| search count=0 \
| stats values(lookup) AS lookups_affected count \
| eval severity_level=if(count>0, 3, 0) \
| eval metric=if(severity_level=3, \
    "ERROR - Your required lookups need attention: one or more are empty (" . lookups_affected . ").  Please contact support.", \
    "OK - Your required lookups appear to be in order." ) \
| eval instance="All" | table instance, metric, severity_level

drilldown = | inputlookup country_codes | stats count | eval lookup="country_codes" \
| append [| inputlookup field_gallery | stats count | eval lookup="field_gallery" ] \
| append [| inputlookup cidr | stats count | eval lookup="sites (cidr)" ] \
| append [| inputlookup call_release_cause_codes | stats count | eval lookup="call_release_cause_codes" ] \
| eval Status = if(count>0,"OK", "EMPTY!") \
| sort + count



[critical_required_version_of_app_dependency]
title = Check whether a new enough version of Canary is installed.
category = Splunk Miscellaneous
tags = configuration, installation
description = This checks the [dependency:app:canary] stanza in app.conf against the current installed version of Canary and fails if the installed version is too old.
failure_text=This app required the Canary app but the installed version of that app is too old.
suggested_action = Upgrade the Canary app to the latest version available on Splunkbase.
search = | rest /servicesNS/nobody/cisco_cdr/properties/app/dependency%3Aapp%3Acanary/requiredVersion splunk_server=local \
| rename value as requiredVersion \
| appendcols [ | rest /services/apps/local/canary splunk_server=local | table version | rename version as hasVersion ] \
| table requiredVersion hasVersion \
| eval app="Canary" \
| eval has=split(hasVersion,".")  \
| eval req=split(requiredVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted, \
    "ERROR - App dependency not fullfilled:   the Cisco CDR app needs at least version " + requiredVersion + " of " + app + " installed.", \
    "OK - " + app + " version " + hasVersion + " is new enough for the Cisco CDR app") \
| eval severity_level=if(has_weighted<req_weighted,3,0) \
| sort - requiredVersion severity_level \
| fields instance_name metric severity_level app requiredVersion hasVersion


[critical_check_devices_lookup_has_right_columns]
title = Check whether the devices lookup is being generated with missing or incorrect column names.
category = Splunk Miscellaneous
tags = configuration
description = this checks that the column names in the devices lookup are correct. Although devices.csv is actually migrated when the app is upgraded and Splunk is restarted, sometimes there are automated/scheduled processes that are regenerating this csv regularly.  It is easy to forget to update those other scheduled searches or processes,  and as such the devices.csv can get mysteriously reverted to having older fields from before the upgrade, and this can break things and produce a lot of errors that come out during search.
failure_text = the columns in the devices lookup do not seem to be correct.
suggested_action = look for a scheduled search that is regenerating devices.csv on a schedule. It may need to be updated to also add the newer axlHost and axlPort fields.
search = | `check_lookup_has_correct_fields("devices")` \
| appendcols [ \
    | rest /services/apps/local splunk_server=local | search disabled=0 title="sa_cisco_cdr_axl" | table title label version \
    | eval has_axl=1 \
    | fields has_axl \
] \
| eval metric=if(missing_fields=="clusterId,lastUpdated" AND has_axl=1, "ERROR - Your devices lookup is missing the 'clusterId' and 'lastUpdated' columns.  If you are using a scheduled search to regenerate the lookup from AXL, contact Sideview for assistance updating the SPL syntax.", metric)


[info_timestamp_index_time_ordering]
title = Check that the index-time config is extracting timestamps the way that Sideview specifies.
category = Splunk Miscellaneous
tags = configuration, installation
description = A particular bit of logic must in place for call legs to get sorted into a reasonable order for users.
failure_text = it looks like an older version of Sideview's TA_cisco_cdr is in place on the forwarder, or no TA_cisco_cdr at all.
suggested_action = Update the copy of the TA_cisco_cdr on the forwarder that is sending the CDR data, to the latest version available. Contact Sideview if you have questions.
search = `custom_index` sourcetype=cucm_cdr | head 3000 \
| eval correct_extracted_time_value = case(isnotnull(dateTimeConnect) AND dateTimeConnect!="0", dateTimeConnect, isnotnull(dateTimeDisconnect) AND dateTimeDisconnect!="0", dateTimeDisconnect, true(),dateTimeOrigination) \
| eval extraction_type=if(_time==correct_extracted_time_value,"correct_events","broken_events") \
| eval foo=1 \
| chart count over foo by extraction_type \
| fields - foo \
| fillnull correct_events broken_events \
| eval broken_ratio=broken_events / (correct_events + broken_events) \
| eval severity_level=case(broken_ratio>0.1,3,broken_ratio>0,2, broken_ratio==0,0) \
| eval generic_bad_message = "The most likely cause is an older version of Sideview's TA_cisco_cdr app is in place on your forwarder" \
| eval metric=case(severity_level==3,"ERROR - Many events are not being timestamped correctly. " + generic_bad_message, severity_level==2, "WARNING - Some events are not being timestamped correctly. " + generic_bad_message, severity_level==0,"OK - events are being timestamped correctly at index time.") \
| fields - generic_bad_message \
| eval instance="All" \
| fields metric severity_level instance


[info_low_disk_space]
title = Check that this Splunk instance isn't running out of disk space.
category = Splunk Miscellaneous
tags = configuration, installation
description = This uses server status endpoints in Splunk itself to check available disk space.
failure_text = it looks like this Splunk server is running out of disk space.
suggested_action = Contact Sideview if you have questions,  and your admins if you need to add disk or change retention policies etc.
search = | rest splunk_server=local /services/server/status/partitions-space \
| join type=outer splunk_server, mount_point [ \
  | rest splunk_server=local /services/server/status/resource-usage/iostats \
  | eval iops = round(reads_ps + writes_ps) \
  | fields splunk_server, mount_point, iops, cpu_pct] \
| eval free = if(isnotnull(available), available, free) \
| eval usage = round((capacity - free) / 1024, 2) \
| eval capacity = round(capacity / 1024, 2) \
| eval compare_usage = usage." / ".capacity \
| eval compare_ratio = round(usage/capacity,2) \
| eval pct_usage = round(usage / capacity * 100, 2)  \
| fields fs_type compare_usage pct_usage iops cpu_pct mount_point capacity free \
| stats first(*) as * last(capacity) as capacity last(free) as free by mount_point \
| eval freeGB = round(free/1024,2) \
| eval severity_level=case(compare_ratio>0.95, 2,free<5,3,cpu_pct>90,2,true(),0) \
| eval metric=case(compare_ratio>0.95, "you have less than 5% of your disk space available",freeGB<5,"you have less than 5GB free disk space remaining",cpu_pct>90,"your Storage I/O Saturation is exceeding 90%",true(),"OK - you still have " + freeGB + "GB of disk space left") \
| eval instance="All" \
| rename mount_point as "Mount Point", fs_type as "File System Type", compare_usage as "Disk Usage (GB)", capacity as "Capacity (GB)", pct_usage as "Disk Usage (%)", iops as "I/O operations per second", cpu_pct as "Storage I/O Saturation(%)"

[info_check_splunk_expiration]
title = Check that your Splunk license is not expiring imminently.
category = Splunk Miscellaneous
tags = configuration, installation
description = on Splunk Enterprise this will hit the licensing endpoints to get your expiration date and check how far out it is.
failure_text = It looks like your Splunk Enterprise license or support is close to expiration.
suggested_action = Contact your Splunk Reseller, and/or Contact Sideview for help.
search = | `get_splunk_license_status_and_expiration` \
| eval severity_level=case(expires_in_days<30,2,  expires_in_days<14,3,true(),0) \
| eval instance="All"  \
| eval metric=if(severity_level>0,"WARNING - " + message, "OK - " + message) \
| table severity_level metric instance  *

[info_lookups_in_wrong_place]
title = Check that there aren't naming collisions around the app's four main lookup files.
category = Splunk Miscellaneous
tags = configuration, installation
description = This checks that the names of the Cisco CDR app's 4 main user-editable lookups don't collide with any other system-level file-based lookups.
failure_text = The name of one or more of the Cisco CDR's app's main lookups collide with one or more other system-level lookup files.
suggested_action = Contact Sideview for assistance.
search = | rest /servicesNS/-/-/data/lookup-table-files \
| search title=cidr.csv OR title="groups.csv" OR title="devices.csv" OR title="clusters.csv"  \
| rename eai:data as location eai:acl.owner as owner eai:acl.app as app  \
| table title owner location app  \
| eval metric=case(app!="cisco_cdr", "ERROR - Another installed app (" + app + ") has a lookup whose filename happens to match that of a lookup in the CIDR app (" + title + "). This will cause problems. Contact Sideview for assistance.", !like(location, "%/etc/apps/cisco_cdr/lookups/%") AND !like(location, "%\\etc\\apps\\cisco_cdr\\lookups\\%"),   "ERROR - the " + title + " lookup is in an unexpected location (" + location + ") and not in the cisco_cdr app's lookup directory. This will cause problems. Contact Sideview for help.") \
| stats count last(metric) as metric \
| eval severity_level=if(isnotnull(metric),3,0)  \
| fillnull metric value="OK - the names of the app's main file-based lookups do not conflict with other system-level lookups in other apps" \
| eval instance="All"  \
| table instance, metric, severity_level
drilldown = | rest /servicesNS/-/-/data/lookup-table-files \
| search title=cidr.csv OR title="groups.csv" OR title="devices.csv" OR title="clusters.csv" \
| rename eai:data as location eai:acl.owner as owner eai:acl.app as app \
| table title owner location app \
| eval error=case(app!="cisco_cdr", "ERROR - Another installed app (" + app + ") has a lookup whose filename happens to match that of a lookup in the CIDR app (" + title + "). This will cause problems. Contact Sideview for assistance.", !like(location, "%/etc/apps/cisco_cdr/lookups/%") AND !like(location, "%\\etc\\apps\\cisco_cdr\\lookups\\%"),   "ERROR - the " + title + " lookup is in an unexpected location (" + location + ") and not in the cisco_cdr app's lookup directory. This will cause problems. Contact Sideview for help.") \
| where isnotnull(error)

[info_migration_errors]
title = Check whether the most recent run of the app's migration completed successfully
category = Splunk Miscellaneous
tags = configuration, installation
description = This checks whether the most recent run of the Cisco CDR app's migration actually finished.
failure_text = The most recent run of the Cisco CDR app's migration encountered unexpected errors.
suggested_action = Contact Sideview for assistance.
search = index=_internal source=*cisco_cdr.log filename=app_setup_functions sourcetype=cisco_cdr_log \
| append [| makeresults | eval runid=0 | eval _raw="nonexistent" | eval log_level="zero_means_no_internal_access"] \
| fillnull log_level value="NULL"   \
| eval finished=if(searchmatch("completed app_setup script"),1,0)   \
| eventstats max(runid) as most_recent_runid max(finished) as finished   \
| where runid==most_recent_runid    \
| chart values(runid)  over finished by log_level  \
| eval metric="the most recent run of the Cisco CDR app's migration script "   \
| eval metric=case(zero_means_no_internal_access==0, "It seems that your user account is unable to search the _internal index", finished=0, metric + "did not successfully complete.", ERROR>0, metric + "ran into an error", true(), metric + "completed successfully")  \
| eval severity_level=case(zero_means_no_internal_access==0,1,finished=0 OR ERROR>0, 3, true(),0)  \
| eval metric=case(severity_level==3, "ERROR " + metric, severity_level==1, "(INCONCLUSIVE) " + metric, severity_level==0,"OK " + metric)  \
| eval instance="all"  \
| search metric=*

drilldown = index=_internal source=*cisco_cdr.log filename=app_setup_functions sourcetype=cisco_cdr_log \
| fillnull log_level value="NULL" \
| eval finished=if(searchmatch("completed app_setup script"),1,0) \
| eventstats max(runid) as most_recent_runid max(finished) as finished \
| where runid==most_recent_runid

[info_check_lookup_index_has_rows_if_it_is_being_used]
title = Check that if a lookup index is being used, that it is coming in correctly and actually has recent rows in it.
category = Splunk Miscellaneous
tags = installation
failure_text = you appear to be using a lookup index, however the data in it is more than one day old which is not good, or some data is coming in without the lookup_name field populated.
search = `custom_lookup_index` | head 10000 \
| stats count max(info_max_time) as info_max_time by lookup_name \
| append [| makeresults | fields - _time | eval lookup_name="lookup_name_not_specified", count="0"] \
| stats sum(count) as count max(info_max_time) as most_recent_run by lookup_name \
| eval yesterday=relative_time(now(),"-24h") \
| eval severity_level=case(count=="0",0, lookup_name=="lookup_name_not_specified",2, most_recent_run<yesterday,2, true(),0) \
| eval metric=case(count=="0","OK - You are not using a lookup index at all which is fine", lookup_name=="lookup_name_not_specified","data is flowing in without the lookup_name field being populated", most_recent_run<yesterday, "WARNING - You are using a lookup index but the most recent events in it are over a day old", true(), "OK - You are using a lookup index for " . lookup_name . " and new rows seem to be flowing in every day which is good") \
| eval instance="All"



