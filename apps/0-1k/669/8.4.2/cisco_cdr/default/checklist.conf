[critical_cross_check_index_recency]
title = Check that the data that is coming in, is still coming in.
category = Data Indexing
tags = configuration, indexing
description = This checks the age of the data going into the indexes specified in the custom_index macro.  It should tell you if there are ingestion delays or timestamp problems.  Note there are other checklist items to tell you if your data is even going into these indexes or not.
failure_text=Either data is going into the wrong index, or the custom_index macro is set wrong.  Click for more details.
suggested_action = See the test results for more details.

search = | tstats max(_time) as max_time values(sourcetype) as sourcetypes WHERE `custom_index` (sourcetype="cucm_cdr" OR sourcetype="cube_cdr" OR sourcetype="cube_cdr_compact") earliest=-14d \
| eval index_exists=1 \
| append [ \
  | eventcount summarize=false [ \
    | rest "/servicesNS/-/cisco_cdr/admin/macros" splunk_server=local \
    | search title="custom_index" \
    | rex field="definition" mode=sed "s/[\r\n]//g" \
    | rex max_match=0 field="definition" "index\s*=\s*\"?(?<macro_index>[^\"]+)\"?" \
    | rename macro_index as index \
    | mvexpand index \
    | fields index \
  ] \
  | stats count as rows sum(count) as events \
  | fillnull events \
  | eval index_exists=if(rows>0, 1, 0) \
  | eval index_has_data=if(events>0, 1, 0) \
] \
| stats max(max_time) as max_time max(index_has_data) as index_has_data max(index_exists) as index_exists values(sourcetypes) as sourcetypes \
| eval has_cube_but_no_cucm=if((in(sourcetypes,"cube_cdr") OR in(sourcetypes,"cube_cdr_compact")) AND NOT in(sourcetypes,"cucm_cdr"),1,0) \
| eval _time = max_time \
| reltime \
| eval severity_level = case( \
    index_exists==0, 5, \
    index_has_data==0, 4, \
    isnull(max_time), 3, \
    max_time < relative_time(now(), "-3h"), 2, \
    max_time < relative_time(now(), "-10m"), 1, \
    max_time < now(), 0, \
    max_time > relative_time(now(), "+2m"), -1, \
    true(), 0 ) \
| eval metric = case( \
    severity_level = 5, "ERROR - the index specified in the 'custom_index' macro does not appear to exist.",  \
    severity_level = 4, "ERROR - the index specified in the 'custom_index' macro exists but contains no data.",  \
    severity_level = 3, "ERROR - There is no CDR data indexed in at least the previous 2 weeks.", \
    severity_level = 2, "WARNING - Recent CDR data is MISSING, the most recent timestamp is from " . reltime . ".", \
    severity_level = 1, "INFO - CDR data is somewhat delayed, the most recent timestamp is from " . reltime . ".", \
    severity_level = 0, "OK - CDR data is being currently ingested.", \
    severity_level = -1, "INFO - some CDR data seems to be coming from more than 2 minutes in the future." \
) \
| eval extra_information=case( \
    severity_level = 5, "Return to the step in the setup docs that concerns creating the index in Splunk.  The most likely cause is that you or the admins accidentally skipped this step during setup. Note that the index name must match the index specified in the 'custom_index' macro and that the macro defaults to an index name of 'cisco_cdr'",  \
    severity_level >= 3, "Your forwarder may be stopped, your SFTP server may have been stopped accidentally, your CallManager may have hit a problem where the CDR Repository Service needs to be restarted, or something else may be wrong.",  \
    severity_level = 2, " \
  * CUCM may be set to only sending in data once per day (we recommend once per minute), \
  * your Splunk forwarder service or the SFTP server may be stopped or turned off, \
  * your callmanager may have glitched and needs the CDR Repository Service restarted, \
or something else may be wrong.  Please email us at support@sideviewapps.com if you can't find any obvious causes.", \
    severity_level = 1, " \
  * CUCM may be set to only sending in data once per hour (we recommend once per minute, but once per hour works if you don't mind slow data), \
  * or perhaps your forwarder doesn't have enough resources and is struggling to keep up. \
Please keep your eye on this situation - if you cannot resolve it by checking on the above or if it happens intermittently and you can't figure out why, please email us at support@sideviewapps.com", \
    severity_level = 0, "", \
    severity_level = -1, "", \
    true(), "ERROR - Recent CDR data was not found in any indexes in at least the last 7 days. Please run the troubleshooting search to see more information." ) \
| eval severity_level = case(severity_level = -1, 1, severity_level>3, 3, true(), severity_level) \
| eval instance="All"\
| fields metric severity_level instance

