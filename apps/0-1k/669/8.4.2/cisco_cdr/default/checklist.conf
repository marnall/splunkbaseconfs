[info_check_search_quota]
title = Check if the user account currently logged in has a large enough search quota to not have issues.
category = Permissions
tags = configuration
description = Queued up searches should not cause report integrity issues, but having a large percentage of queued up or canceled searches due to too low of search quota can make for a miserable search experience.
failure_text = Adjusting the srchJobsQuota for this user/role as mentioned in the text.

search = | rest /services/authentication/current-context splunk_server=local \
| mvexpand roles\
| map search="rest /services/authorization/roles/$roles$ splunk_server=local | eval roles=\"$roles$\"" \
| appendcols \
    [| rest /services/server/info splunk_server=local | search activeLicenseGroup="Free" |  stats count as is_free_license ]\
| eval effective_srchJobsQuota = case(is_free_license = 1, 0, imported_srchJobsQuota = 0 OR isnull(imported_srchJobsQuota), srchJobsQuota, true(), max(imported_srchJobsQuota, srchJobsQuota))\
| stats values(is_free_license) as is_free_license, max(effective_srchJobsQuota) AS effective_srchJobsQuota, max(srchJobsQuota) as srchJobsQuota, max(imported_srchJobsQuota) as imported_srchJobsQuota, values(imported_roles) as imported_roles, values(roles) as roles\
| fields is_free_license effective_srchJobsQuota imported_srchJobsQuota srchJobsQuota imported_roles roles\
| eval severity_level=case(is_free_license = 1, 2, effective_srchJobsQuota < 3, 2, effective_srchJobsQuota < 5, 1, true(), 0) \
| eval metric=case( \
    is_free_license = 1, "WARNING - Splunk Free is not a supported platform for production data.",\
    severity_level=2, "WARNING - The number of concurrent jobs your user account can run is marginal.  This will cause several pages of our to queue significantly.  (Effective srchJobsQuota is " . effective_srchJobsQuota . ", recommendation  is 5.  Please contact your Splunk administrators.)", \
    severity_level=1, "INFO - The number of concurrent jobs your user account can run is probably adequate, but you might notice some pages will queue at times. (Effective srchJobsQuota is " . effective_srchJobsQuota . ", recommendation is 5 or higher.)", \
    severity_level=0, "OK - Your user account has a large enough search job quota to rarely, if ever, have searches queue up.  (Effective srchJobsQuota is " . effective_srchJobsQuota . ", recommendation is 5 or higher.)") \
| eval instance="All" | table instance, metric, severity_level

drilldown = | rest /services/authentication/current-context splunk_server=local \
| mvexpand roles\
| map search="rest /services/authorization/roles/$roles$ splunk_server=local | eval roles=\"$roles$\"" \
| appendcols \
    [| rest /services/server/info splunk_server=local | search activeLicenseGroup="Free" |  stats count as is_free_license ]\
| eval effective_srchJobsQuota = case(is_free_license = 1, 0, imported_srchJobsQuota = 0 OR isnull(imported_srchJobsQuota), srchJobsQuota, true(), min(imported_srchJobsQuota, srchJobsQuota))\
| stats values(is_free_license) as is_free_license, max(effective_srchJobsQuota) AS effective_srchJobsQuota, max(srchJobsQuota) as srchJobsQuota, max(imported_srchJobsQuota) as imported_srchJobsQuota, values(imported_roles) as imported_roles, values(roles) as roles\
| fields is_free_license, imported_roles, imported_srchJobsQuota srchJobsQuota, effective_srchJobsQuota \
| eval severity_level=case(is_free_license = 1, 2, effective_srchJobsQuota < 3, 2, effective_srchJobsQuota < 5, 1, true(), 0) \
| eval metric=case( \
    is_free_license = 1, "WARNING - Splunk Free is not a supported platform for production data.",\
    severity_level=2, "WARNING - The number of concurrent jobs your user account can run is marginal.  This will cause several pages of our to queue significantly.  (Effective srchJobsQuota is " . effective_srchJobsQuota . ", recommendation  is 5.  Please contact your Splunk administrators.)", \
    severity_level=1, "INFO - The number of concurrent jobs your user account can run is probably adequate, but you might notice some pages will queue at times. (Effective srchJobsQuota is " . effective_srchJobsQuota . ", recommendation  is 5.)", \
    severity_level=0, "OK - Your user account has a large enough search job quota to rarely, if ever, have searches queue up.  (Effective srchJobsQuota is " . effective_srchJobsQuota . ", recommendation  is 5.)")



