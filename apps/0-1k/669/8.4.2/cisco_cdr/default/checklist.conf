[info_cross_check_data_in_right_indexes]
title = Check that the data is going into the right indexes.
category = Data Indexing
tags = configuration, indexing
description = This checks into which indexes the CDR data has gone for the last 14 days.  It will generate error if there is no data found at all, or if there is data going into an index that isn't listed in the macro 'custom_index'.  It will also generate a warning if there are indexes specified in the macro that actually have no recent CDR data.
failure_text=Correct the macro "custom_index" to include all indexes where CDR data is, correct the "index=..." item in the forwarder's TA, or remove the extraneous index from the "custom_index" macro.
suggested_action = See the test results for more details.

search = | tstats max(_time) as max_time WHERE `customizable_all_indexes` sourcetype="cucm_cdr" earliest=-14d BY index \
| stats last(max_time) as last_contact by index \
| fillnull index value="no_data_found" \
| fillnull last_contact value=0  \
| appendcols  \
    [| rest "/servicesNS/-/cisco_cdr/admin/macros" splunk_server=local  \
    | search title="custom_index"  \
    | rex field="definition" mode=sed "s/[\r\n]//g"  \
    | rex max_match=0 field="definition" "index=\"?(?<macro_index>[^\"]+)\"?"  \
    | fillnull macro_index value="main"  \
    | rename definition as macro_definition  \
    | fields macro_index]  \
| filldown macro_definition macro_index  \
| eval likified_macro = replace(macro_index, "\\*", "%") \
| eval is_in_macro_index = case(index = macro_index, 1, like(index, likified_macro), 1, true(), 0)  \
| eval count_of_indexes_in_macro = mvcount(macro_index)  \
| eventstats dc(eval(if(index="no_data_found", null(), index))) as total_indexes_found_with_cdr_data, sum(is_in_macro_index) as correctly_specified_indexes  \
| eval keep_row = if(total_indexes_found_with_cdr_data>0 AND index="no_data_found", 0, 1)  \
| search keep_row = 1  \
| eval metric = case( \
    total_indexes_found_with_cdr_data == 0, "ERROR - No CDR data found in any index searchable by this user.  This failure makes all other successes or failures invalid.",  \
    total_indexes_found_with_cdr_data - correctly_specified_indexes > 0, "ERROR - There is CDR data in an index not specified in the macro \"custom_index\".",  \
    count_of_indexes_in_macro - total_indexes_found_with_cdr_data > 0, "WARNING - Indexes are specified in the macro \"custom_index\" that have no CDR Data.",  \
    total_indexes_found_with_cdr_data - correctly_specified_indexes == 0, "OK - All CDR data is contained within indexes specified in the macro \"custom_index\"." )  \
| eval severity_level = case(  \
    total_indexes_found_with_cdr_data == 0, "3",  \
    total_indexes_found_with_cdr_data - correctly_specified_indexes > 0, "3",  \
    count_of_indexes_in_macro - total_indexes_found_with_cdr_data > 0, "2",  \
    total_indexes_found_with_cdr_data - correctly_specified_indexes == 0, "0" )  \
| sort + severity_level | head 1 | eval instance="All"  \
| table instance, metric, severity_level

drilldown = | tstats max(_time) as max_time WHERE `customizable_all_indexes` sourcetype="cucm_cdr" earliest=-14d BY index\
| stats last(max_time) as last_contact by index\
| fillnull index value="no_data_found"\
| fillnull last_contact value=0 \
| appendcols \
    [| rest "/servicesNS/-/cisco_cdr/admin/macros" splunk_server=local \
    | search title="custom_index" \
    | rex field="definition" mode=sed "s/[\r\n]//g" \
    | rex max_match=0 field="definition" "index=\"?(?<macro_index>[^\"]+)\"?" \
    | fillnull macro_index value="main" \
    | rename definition as macro_definition \
    | fields macro_index] \
| filldown macro_definition macro_index \
| eval is_in_macro_index = if('index' = 'macro_index', 1, 0) \
| eval count_of_indexes_in_macro = mvcount(macro_index) \
| eventstats dc(eval(if('index'="no_data_found", null(), 'index'))) as total_indexes_found_with_cdr_data, sum(is_in_macro_index) as correctly_specified_indexes \
| eval Reason = case( \
    'index' == "no_data_found", "Placeholder - if this is the only line you see it is an ERROR and there's no CDR data found anywhere in your indexes.", \
    'is_in_macro_index' == 1, "OK - This index is both found in the 'custom_index' macro, and also has CDR data.", \
    'is_in_macro_index' == 0, "ERROR - This index is not listed in the 'custom_index' macro, but has CDR data." ) \
| rename index as "Index", macro_indexes_list AS "Indexes listed in macro" \
| table Reason, "Index", "Indexes listed in macro"


[info_has_pre_sed_data]
title = Confirms data as ingested has no headers or lines indicating data types.
category = Data Indexing
tags = configuration, indexing
description = Data should contain no header lines nor lines indicating field data types (INTEGER...).
failure_text = Check for local overrides of the SEDCMD in transforms.conf.  If none exist, contact us for more troubleshooting.
suggested_action = See the test results for more details.

search = `custom_index` earliest=-7d@d INTEGER OR globalCallID_callId sourcetype=cucm_cdr | stats count | eval instance="all" \
| eval metric = if(count>0, "ERROR - Count of header and data-type lines greater than zero.", \
    "OK - Count of header and data-type lines is zero; they are being removed properly.") \
| eval severity_level = if(count>0, 3, 0) \
| table instance, metric, severity_level


[info_check_clusters_lookup_populated]
title = Check whether the clusters lookup has been populated yet.
category = Splunk Miscellaneous
tags = configuration, installation
description = To make the Cluster pulldowns load faster, the app loads them from a static lookup, which the admin user creates during setup. It seems like that setup step has not yet been completed on this instance.
failure_text = The Cluster lookup has not been populated yet.
suggested_action = Visit "App Settings > Clusters and locales" in the app navigation bar.

search = | inputlookup clusters.csv \
| eval isPlaceholder=if(name=="PLACEHOLDER_NAME",1,0) \
| stats sum(isPlaceholder) as isPlaceholder \
| eval severity_level=if(isPlaceholder>0,2,0) \
| eval metric=if(isPlaceholder>0,"ERROR - The Clusters lookup has not yet been generated. Visit \"App Settings > Clusters and locales\" in the app menu and follow the instructions there to complete this setup step", \
    "OK - The Clusters pulldown has been generated") \
| eval instance="all" | table instance, metric, severity_level


[info_check_clusters_lookup_against_data]
title = Compare the clusters lookup with the clusters as they are in recent data and report any discrepancies.
category = Knowledge Objects
tags = configuration, lookups
description = The clusters lookup is responsible for locale information and for properly parsing phone numbers.  It's very easy to regenerate this list when things change, but knowing that things have changed is a challenge.  This check looks through the last 24 hours of data, and compares the list of clusters it retrieves from data with the list in the lookup and reports any discrepancies and what to do about them.
failure_text = Something with the Clusters lookup isn't right, please drill down for more detail, and follow the instructions there.
suggested_action = Visit "App Settings > clusters and locales" in the app navigation bar.

search = | tstats dc(globalCallId_ClusterID) AS in_data WHERE `custom_index`  earliest=-24h latest=now() \
| appendcols [|inputlookup clusters.csv | search NOT clusterId="*PLACEHOLDER*" NOT group="PLACEHOLDER_GROUP" | stats dc(clusterId) as in_clusters_lookup, values(clusterId) as in_clusters_lookup_list ] \
| eval result=case(in_data==0, "none_in_data", in_data<in_clusters_lookup, "missing", in_data>in_clusters_lookup, "needs_lookup_regenerated", true(), "OK") \
| eval severity_level = case(result=="none_in_data", 3, result=="missing", 2, result=="needs_lookup_regenerated", 2, true(), 0) \
| eval metric = case( \
    result=="none_in_data", "ERROR - there is no cluster in any recent data!", \
    result=="missing", "WARNING - There are more clusters listed in the clusters lookup than there are ones that exist in the past 24 hours of data.  This may mean there are some clusters that have been offline for the last 24 hours.", \
    result=="needs_lookup_regenerated", "WARNING - Please regenerate your clusters lookup via \"App Settings > Clusters and locales\".  It is currently out of date and new clusters are reporting in where the cluster has not been entered in the lookup.", \
    true(), "OK - Your clusters lookup count matches what we found in the last 24 hours of data.") \
| eval instance="All" \
| table severity_level, metric, instance

drilldown = | tstats dc(globalCallId_ClusterID) AS in_data, values(globalCallId_ClusterID) AS in_data_list WHERE `custom_index`  earliest=-24h latest=now() \
| appendcols [|inputlookup clusters.csv | search clusterId != "*PLACEHOLDER*" | stats dc(clusterId) as in_clusters_lookup, values(clusterId) as in_clusters_lookup_list ] \
| eval cluster_names_lookup_str=mvjoin(in_clusters_lookup_list,",") \
| eval cluster_names_data_str=mvjoin(in_data_list,",") \
| eval result=case(in_data==0, "none_in_data", cluster_names_lookup_str==cluster_names_data_str, "OK",true(), "mismatch")  \
| eval severity_level = case(result=="none_in_data", 3, result=="mismatch", 2, true(), 0) \
| eval metric = case(  \
    result=="none_in_data", "ERROR - There is no cluster in any recent data, so check that data is still coming in.  It's also possible the TA was removed from the data ingestion node.", \
    result=="mismatch", "WARNING - Please regenerate your clusters lookup via \"App Settings > Clusters and locales\".  It is currently out of date and does not match the clusters sending in recent data. See troubleshooting search for more specifics.", \
    true(), "OK - Your clusters lookup matches the clusters that are searchable in the last 24 hours of data.") \
| table in_data, in_data_list, in_clusters_lookup, in_clusters_lookup_list, metric \
| rename in_data AS "Cluster count (data)", in_data_list AS "Cluster names (data)", in_clusters_lookup AS "Cluster count (lookup)", in_clusters_lookup_list AS "Cluster names  (lookup)", metric AS "What should I do?"


[info_sites_lookup_bad_sort_order]
title = Check whether the Sites lookup lists its subnets in order of increasing network size.
category = Knowledge Objects
tags = configuration, lookups
description = The Sites lookup is a CIDR lookup but it will return only the first subnet in the csv that matches, meaning that since they might overlap they must be stored in order of increasing network size. This checks whether any subnets are in the wrong sort order in the file.
failure_text = The Sites lookup (aka cidr.csv) contains some sites that are not in increasing order of network size. This will cause problems where larger catchall subnets will be associated with the IP, rather than more specific subnets that also match.

search = | inputlookup cidr \
| eval network_bits=mvindex(split(subnet,"/"),1) \
| delta network_bits as network_bits_delta \
| search network_bits_delta>0 \
| stats count \
| eval severity_level=if(count>0,2,0) \
| eval metric=if(count>0,"WARNING - The Sites lookup (cidr.csv) is stored in the wrong sort order. Visit \"App Settings > Sites\" in the Cisco CDR app", \
    "OK - The Sites lookup (cidr.csv) is stored in the correct order") \
| eval instance_name="all"


[info_groups_lookup_bad_sort_order]
title = Check whether the Groups lookup lists its numbers/extensions in order of decreasing specificity.
category = Knowledge Objects
tags = configuration, lookups
description = The Groups lookup is a lookup that supports wildcarded numbers, with the wildcards being a various locations in the number.  It will return only the first number in the csv that matches, meaning that since they might overlap they must be stored in order of decreasing number length.  This checks whether any numbers are in the wrong sort order in the file.
failure_text = The Groups lookup contains some numbers that are not in decreasing number-length order. This will cause problems where larger catchall numbers will be associated with the number intstead of the more specific number.

search = | inputlookup groups.csv \
| streamstats count as order \
| eval has_wildcard = if(match(number, "\*"), 1, 0) \
| eval number_len = len(number) \
| eval order = if(has_wildcard=1, (order) + tonumber((99 - 'number_len') . "000000"), order) \
| delta order AS orderdiff \
| search orderdiff < 0 \
| stats count \
| eval severity_level=if(count>0,2,0) \
| eval metric=if(count>0,"WARNING - The Groups lookup is stored in the wrong sort order. Visit \"App Settings > Groups and extensions\" in the Cisco CDR app", \
    "OK - The Groups lookup is stored in the correct order") \
| eval instance_name="all"


[info_check_cluster_locales]
title = Check whether the clusters in the lookup have been given locales.
category = Splunk Miscellaneous
tags = configuration, installation
description = Within the Clusters lookup there is a field for each Cluster called "locale". This is required for all clusters and governs how locale-specific rules should be applied like IDD prefixes.  This checks whether all clusters in the lookup have been given locales.

search = | inputlookup clusters.csv \
| eval isPlaceholder=if(name=="PLACEHOLDER_NAME",1,0) \
| eval hasNoLocale=if(locale=="UNSET" OR locale=="" OR len(locale)<2 OR len(locale)>3,1,0) \
| search isPlaceholder=0 hasNoLocale=1 \
| stats count as clustersWithNoLocale \
| eval severity_level=if(clustersWithNoLocale>0,2,0) \
| eval metric=if(clustersWithNoLocale>0,"ERROR - The Clusters lookup has " + clustersWithNoLocale + " Cluster(s) that have no valid locale set. Visit \"App Settings > Clusters and locales\" to set them.", \
    "OK - All Clusters in the Clusters lookup have been given explicit locales.")\
| eval instance="all" | table instance, metric, severity_level


[info_check_capabilities]
title = Check if required and recommended capabilities are present for this user.
category = Permissions
tags = permissions
description = Certain permissions are required for maintenance and upkeep if you are the application owner, and are highly recommended even if not.  This checks for the current user to have those capabilities.
failure_text = Some important permissions are not held by this user, certain functionality in the Cisco CDR app will not work properly.

# TODO - these appendcols could be replaced with this eval() technique instead.
#  | rest /services/authentication/current-context splunk_server=local  | stats count(eval(capabilities="schedule_search")) as found_schedule_search count(eval(capabilities="schedule_rtsearch")) as found_schedule_rtsearch count(eval(capabilities="input_file")) as found_input_file
search = | makeresults \
| appendcols [| rest /services/authentication/current-context splunk_server=local | search capabilities=schedule_search | stats count AS found_schedule_search ] \
| appendcols [| rest /services/authentication/current-context splunk_server=local | search capabilities=schedule_rtsearch | stats count AS found_schedule_rtsearch ] \
| appendcols [| rest /services/authentication/current-context splunk_server=local | search capabilities=input_file | stats count AS found_input_file ] \
| appendcols [| rest /services/authentication/current-context splunk_server=local | search capabilities=output_file | stats count AS found_output_file ] \
| appendcols [|  rest /services/server/info | search activeLicenseGroup="Free" |  stats count as is_free_license] \
| eval severity_level = case (\
    is_free_license==1, 0, \
    found_input_file==0, 1, \
    found_output_file==0, 1, \
    found_schedule_search==0, 1, \
    found_schedule_rtsearch==0, 1, \
    true(), 0 ) \
| eval metric = case ( \
        is_free_license==1, "INFO - you're running the Splunk Free license, so we're skipping capability checks", \
    found_input_file==0 OR found_output_file==0, "INFO - Missing either or both capabilities input_file and output_file, used to maintain lookups. If you are the application owner, you will not be able to properly maintain the app without at least those capabilities.", \
    found_schedule_search==0, "INFO - Missing schedule_search capability, required for scheduling cron-style alerts (like the 911 alert).", \
    found_schedule_rtsearch==0, "INFO - Missing schedule_rtsearch capability, optional real-time search scheduling for alerts.  Use cron-style with time '*/5 * * * *' instead.", \
    true(), "OK - You have all required and recommended capabilities.") \
| eval instance="all" | table instance, metric, severity_level

drilldown = | rest /services/authentication/current-context splunk_server=local | fields capabilities \
| eval "Required Capabilities" = "get_metadata rest_apps_view rest_properties_get search" | makemv "Required Capabilities" \
| eval "Recommended Capabilities" = "input_file output_file schedule_search" | makemv "Recommended Capabilities" \
| rename capabilities AS "Your Existing Capabilities" \
| table "Required Capabilities", "Recommended Capabilities", "Your Existing Capabilities"




[info_check_indexing_lag]
title = Check for abnormal indexing lag.
category = Data Indexing
tags = indexing
description = Check that data is appearing in the app relatively quickly after the calls terminate.
failure_text = It's taking an unusually long time after the calls terminate before the data gets indexed in Splunk.  This probably means that you are using a "monitor" input to index the data and that the directory has become very very large.  (Splunk's monitor inputs stop working reliably when there are more than about 20,000 files to monitor.)
suggested_action = Contact Sideview Support.  It can be tricky to get out of this state.

search = `custom_index` (sourcetype=cucm_cdr OR sourcetype=cucm_cmr) | head 5000 | append [ | makeresults | eval now = now() | eval _indextime = now, _time = now] \
| fillnull value=0 duration \
| eval indexing_lag = (_indextime-_time-duration) \
| stats max(indexing_lag) AS max_lag perc95(indexing_lag) as perc95_lag \
| eval severity_level=if(max_lag>120 OR perc95_lag>90, 2, 0 ) \
| eval metric=if(severity_level>0, "WARNING - Records are not appearing within a minute of call termination (95th percentile of lag is currently " . round(perc95_lag,2) . " seconds ).", \
     "OK - Records are appearing within a minute of call termination." )\
| eval instance="all" | table instance, metric, severity_level

drilldown = `custom_index` (sourcetype=cucm_cdr OR sourcetype=cucm_cmr) | head 5000 | append [ | makeresults | eval now = now() | eval _indextime = now, _time = now] \
| fillnull value=0 duration \
| eval indexing_lag = (_indextime-_time-duration) \
| stats max(indexing_lag) as max_lag perc95(indexing_lag) as perc95_lag \
| eval perc95_lag=round(perc95_lag) \
| eval severity_level=if( max_lag>120 OR perc95_lag>90,2,0) \
| eval metric=if(severity_level>0, "WARNING", "OK") \
| eval instance="all" | table instance, metric, severity_level, max_lag, perc95_lag


[info_check_groups_lookup_for_duplicates]
title = Check the groups lookup for numbers with more than one row.
category = Knowledge Objects
tags = configuration
description = The groups lookup has max_matches set to 1,  which means that if any given number has more than one matching row in the groups.csv file, only the first one will be used.   This health check just makes sure there aren't other rows in the lookup being ignored.
failure_text = There are numbers that have been entered on two or more rows in the groups lookup.
suggested_action = Determine which of the rows is correct and delete the others from the lookup.

search = | inputlookup groups | stats count by number | where count>1 \
| stats count \
| eval severity_level=if (count>0,2,0)  \
| eval metric=if (count>0, \
    "WARNING - There Groups lookup has numbers that have been entered on two or more rows.", \
    "OK - The Groups lookup has no numbers entered on multiple rows." )  \
| eval instance_name="all"

drilldown= | inputlookup groups | stats count by number | where count>1 | sort 0 - count | rename count as "number of matching rows in the groups lookup"


[info_check_groups_lookup_for_null_entries]
title = Check the groups lookup for rows where the number field is empty.
category = Knowledge Objects
tags = configuration
description = For the groups lookup to work each row has to have a number.  If any rows don't have a number they should simply be deleted.
failure_text = There are rows in the groups lookup that have no number entered at all.
suggested_action = remove all rows from the groups lookup that have no number entered.

search = | inputlookup groups | where isnull(number) OR number="" \
| stats count \
| eval severity_level=if (count>0,2,0)  \
| eval metric=if (count>0, \
    "WARNING - There are rows in the Groups lookup where no number has been entered at all", \
    "OK - All rows in the Groups lookup have numbers entered.")  \
| eval instance_name="all"

drilldown= | inputlookup groups | where isnull(number) OR number=""


[info_check_fields_marked_as_single_value]
title = Check that all Cisco CDR fields that are designated as always single-valued are never multi-valued.
category = cisco_cdr, Splunk Miscellaneous
tags = configuration, search, field_extraction
description = The Cisco CDR app has a mechanism (setting check_single_value to 1 in the field_gallery csv) whereby fields can be marked as always single-valued.  This health check looks at the last 5000 events indexed and fails if that becomes false for any of those fields.
failure_text = This app has a setting indicating that the given fieldname(s) must be always single value on events, and some are showing multiple extracted values.
suggested_action = Look in the "Admin > Run health checks" section of the Cisco CDR app.

search = `custom_index` sourcetype=cucm_cdr | head 5000 | `customizable_sites_extractions` | `get_sites` | eval leg_type=split(replace(mvjoin(mvfilter(match(eventtype,".+_type_.+")),","),"leg_type_",""),",") | append [| makeresults | eval callingPartyGroup="a"] \
| fields call_id [ | rest /servicesNS/-/-/configs/conf-fields splunk_server=local | search check_single_value=1 | fields title | rename title as search | format "" "" "" "" "" "" ] \
| foreach * [eval <<FIELD>>=if("<<FIELD>>"!="call_id",mvcount(<<FIELD>>),<<FIELD>>)] \
| fillnull [ | rest /servicesNS/-/-/configs/conf-fields splunk_server=local | search check_single_value=1 | fields title | rename title as search | format "" "" "" "" "" "" ] \
| untable call_id field mvcount \
| eval globalCallId_ClusterID=mvindex(split(call_id,"."),0) \
| eval globalCallID_callManagerId=mvindex(split(call_id,"."),1) \
| eval globalCallID_callId=mvindex(split(call_id,"."),2) \
| eval severity_level=if(mvcount>1,2,0) | stats dc(call_id) as calls by field severity_level \
| eval metric=if(severity_level==2, \
    "WARNING - Multi-valued values found for the field \"" + field + "\" in " + calls + " out of the last 5000 call leg events", \
    "OK - Multi-valued fields not found in any field marked with check_single_value in the last 5,000 call leg events.") \
| mvcombine delim="," field | nomv field \
| sort - severity_level | head 1 \
| fields - field, calls | eval instance="all"

drilldown = `custom_index` sourcetype=cucm_cdr | head 5000 | `customizable_sites_extractions` | `get_sites` | eval leg_type=split(replace(mvjoin(mvfilter(match(eventtype,".+_type_.+")),","),"leg_type_",""),",") | head 10000 \
| table _time call_id callingPartyNumber finalCalledPartyNumber [ | rest /servicesNS/-/-/configs/conf-fields splunk_server=local | search check_single_value=1 | fields title | rename title as search | format "" "" "" "" "" "" ] \
| foreach * [eval <<FIELD>>_count=if("<<FIELD>>"!="call_id",mvcount(<<FIELD>>),<<FIELD>>)] \
| where [ | rest /servicesNS/-/-/configs/conf-fields splunk_server=local | search check_single_value=1 | fields title | fields - _* | eval title=title+"_count" | rename title as search | format "(" "" "" "> 1" "OR" ")"] \
| table _time call_id callingPartyNumber finalCalledPartyNumber [ | rest /servicesNS/-/-/configs/conf-fields splunk_server=local | search check_single_value=1 | fields title | rename title as search | format "" "" "" "" "" "" ]



[critical_required_splunk_version]
title = Check whether the app requires a newer version of Splunk.
category = Splunk Miscellaneous
tags = configuration, installation
description = This checks the "dependency:splunk" stanza in app.conf.  This is a Sideview convention. If that stanza has a key called "requiredVersion" then it checks that the installed canary is at least this version.
failure_text = The Cisco CDR app requires a newer version of Splunk Enterprise.
suggested_action = Upgrade Splunk to the given version or newer.

search = | rest /servicesNS/nobody/cisco_cdr/properties/app/dependency%3Asplunk/requiredVersion splunk_server=local \
| table value \
| rename value as requiredSplunkVersion \
| appendcols [ | rest /services/server/info splunk_server=local | table version | table version | rename version as hasSplunkVersion] \
| eval has=split(hasSplunkVersion,".") \
| eval req=split(requiredSplunkVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted,"WARNING - Splunk version " + hasSplunkVersion + " is too old for the Cisco CDR app, which requires at least version " + requiredSplunkVersion + " to work correctly.", \
    "OK - Splunk version " + hasSplunkVersion + " is new enough for the Cisco CDR app.") \
| eval severity_level=if(has_weighted<req_weighted,3 ,0) \
| fields instance_name metric severity_level *


[info_check_duplicated_events]
title = Checks for duplication in the _raw events.
category = Data Indexing
tags = configuration, indexing
description = There should be no duplication (or worse) of events.  This checks for that issue in the last 1000 events and reports if it found any duplicated events.
failure_text = Duplication exists for at least some of the most recent 1000 events.  This should be fixed.
suggested_action = It's possible you are somehow ingesting data twice (one monitor input, one batch input on the same folder?).  It's also possible your Search Head is misconfigured and searching multiple peers when it shouldn't.  Also contact Sideview Support.

search = `custom_index` (sourcetype=cucm_cdr OR sourcetype=cucm_cmr)| head 1000 | append [| makeresults | eval _raw="unique_string"] \
| stats count as count_of_raws by _raw \
| stats max(count_of_raws) as max_duplication_level \
| eval severity_level=case( \
    max_duplication_level>2, 2, \
    max_duplication_level>1, 2, \
    true(), 0 ) \
| eval metric = case( \
    max_duplication_level>2, "ERROR - There are three or more copies of some events.  See the drill down searches for more information.", \
    max_duplication_level>1, "ERROR - At least some events are duplicated.  See the drill down searches for more information.", \
    true(), "OK - No duplication found in the most recent 1000 events." )

drilldown = `custom_index` sourcetype=cucm_cdr | head 1000 | append [| makeresults | eval _raw="unique_string"] \
| stats values(_time) as "Time Of Event", values(_indextime) as "Time Of Indexing", values(splunk_server) as "Splunk Servers Involved" count as "Event Count", values(source) as "Source Files" by _raw \
| fields - _raw | where 'Event Count'>1 | foreach Time* [ eval <<FIELD>> = strftime('<<FIELD>>', "%Y-%m-%d %H:%M:%S")]


[info_check_cdr_timestamp_extraction]
title = Check that we are extracting timestamps correctly from Callmanager CDR.
category = Data Indexing
tags = configuration, indexing, timestamp_extraction
description = The cucm_cdr sourcetype should always extract its timestamp from dateTimeOrigination.
failure_text = The cucm_cdr sourcetype should always extract its timestamp from dateTimeOrigination.
suggested_action = Look for and remove any local config in props.conf that is disrupting the app's timestamp extraction.  Also contact Sideview Support.

search = `custom_index` sourcetype=cucm_cdr | head 3000 | append [| makeresults | eval now = now() | eval dateTimeOrigination = now, _time = now] \
| eval severity_level=case(_time==dateTimeOrigination,0,_time==dateTimeConnect,0,_time==dateTimeDisconnect,0,true(),2) \
| stats values(index) as index count by severity_level | sort - severity_level | head 1 \
| eval index=mvjoin(index,",") \
| eval metric=if(severity_level>0,  \
    "WARNING - CDR events are incorrectly timestamped in one or more indexes (" . index . ").  They are not using the dateTimeOrigination/dateTimeConnect fields.", \
    "OK - CDR events are timestamped correctly according to the values in the CDR's dateTime* fields.") \
| eval instance="all" | table instance, metric, severity_level

drilldown = `custom_index` sourcetype=cucm_cdr | head 10000 | where _time!=dateTimeOrigination AND _time!=dateTimeConnect AND _time!=dateTimeDisconnect | eval extractedTime=_time \
| table _time extractedTime dateTimeOrigination dateTimeConnect dateTimeDisconnect callingPartyNumber originalCalledPartyNumber finalCalledPartyNumber duration \
| foreach *Time* [ eval <<FIELD>> = strftime('<<FIELD>>', "%Y-%m-%d %H:%M:%S")]


[info_check_host_going_dark]
title = Check that last hour's number of calls are reasonable.
category = Data Indexing
tags = configuration, syslog, indexing, ingest
description = If the call volume from the previous full hour is not between the min and max of the same hour over the past X days, warn as appropriate.
failure_text = Call volume for the most recent full hour is outside of normal bounds.

search=| tstats count WHERE `custom_index` sourcetype="cucm_*" earliest="-54d" latest="@h" BY host, _time span=1h \
| append [| makeresults] \
| timechart span=1h max(count) as count \
| fillnull value=0 count \
| eval last_hour = strftime(relative_time(now(), "-1h@h"), "%H") \
| eval last_day = strftime(relative_time(now(), "-1h@h"), "%w") \
| eval event_hour = strftime(_time, "%H") \
| eval event_day = strftime(_time, "%w") \
| where event_hour = last_hour AND event_day = last_day \
| appendpipe \
    [ tail 1 | stats avg(count) as recent_count | eval instance="All" ] \
| appendpipe \
    [ head 7 | stats avg(count) as history_avg, min(count) as history_min, max(count) as history_max | eval instance="All" ] \
| where instance="All" \
| stats avg(history_avg) as history_avg, max(history_max) as history_max, min(history_min) as history_min, avg(recent_count) as recent_count BY instance \
| eval metric = case( \
    recent_count == 0 AND history_min == 0, "WARNING - There were 0 calls during the last full hour.  This is not the first time, perhaps this is even normal.", \
    recent_count == 0 AND history_min > 0, "ERROR - There were 0 calls during the last full hour.  Is your forwarder still forwarding?", \
    recent_count > history_max, "INFO - Record high call count for the last full hour, " . recent_count . " beats previous high (7 weeks) of " . history_max . ".", \
    recent_count < history_min, "WARNING - Call count for the last full hour, " . recent_count . " is non-zero but still lower than your previous low of " . history_min . "!", \
    true(), "OK - Your recent calls, " . recent_count . ", is within the bounds of your 28-day average (which is from " . history_min . " to " . history_max . ")." ) \
| eval severity_level = case( \
    recent_count == 0 AND history_min == 0, 2, \
    recent_count == 0 AND history_min > 0, 3, \
    recent_count > history_max, 1, \
    recent_count < history_min, 2, \
    true(), 0 ) \
| table instance, metric, severity_level

drilldown = | tstats count WHERE `custom_index` sourcetype="cucm_*" earliest="-54d" latest="@h" BY host, _time span=1h \
| timechart span=1h max(count) as count \
| fillnull value=0 count \
| eval last_hour = strftime(relative_time(now(), "-1h@h"), "%H") \
| eval last_day = strftime(relative_time(now(), "-1h@h"), "%w") \
| eval event_hour = strftime(_time, "%H") \
| eval event_day = strftime(_time, "%w") \
| where event_hour = last_hour AND event_day = last_day \
| appendpipe \
    [ tail 1 | stats avg(count) as recent_count | eval instance="All" ] \
| appendpipe \
    [ head 7 | stats avg(count) as history_avg, min(count) as history_min, max(count) as history_max | eval instance="All" ] \
| where instance="All" \
| stats avg(history_avg) as history_avg, max(history_max) as history_max, min(history_min) as history_min, avg(recent_count) as recent_count BY instance \
| eval metric = case( \
    recent_count == 0 AND history_min == 0, "WARNING - There were 0 calls during the last full hour.  This is not the first time, perhaps this is even normal.", \
    recent_count == 0 AND history_min > 0, "ERROR - There were 0 calls during the last full hour.  Is your forwarder still forwarding?", \
    recent_count > history_max, "INFO - Record high call count for the last full hour, " . recent_count . " beats previous high (7 weeks) of " . history_max . ".", \
    recent_count < history_min, "WARNING - Call count for the last full hour, " . recent_count . " is non-zero but still lower than your previous low of " . history_min . "!", \
    true(), "OK - Your recent calls, " . recent_count . ", is within the bounds of your 28-day average (which is from " . history_min . " to " . history_max . ")." ) \
| eval severity_level = case( \
    recent_count == 0 AND history_min == 0, 2, \
    recent_count == 0 AND history_min > 0, 3, \
    recent_count > history_max, 1, \
    recent_count < history_min, 2, \
    true(), 0 )

[info_check_groups_trimmed]
title = Check if groups lookup has leading or trailing spaces.
category = Knowledge Objects
tags = configuration
description = This checks for the presence of leading or trailing spaces in the groups lookup fields, the existence of which will cause all sorts of data anomalies and should be corrected.
