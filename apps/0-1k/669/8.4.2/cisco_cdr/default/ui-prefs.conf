

## NOTE - this is special functionality used by the Sideview App UI ONLY,   whereby a local admin on the deployment can change
## this stanza in etc/apps/cisco_cdr/local/ui-prefs.conf   so as to override the field list that gets set when all end-users click
## "reset to default" in the Investigate Calls page's Field Picker.
##
## Also if you're reading this because you work for Splunk and you're concerned that Splunk itself ignores this file now completely.
## we (Sideview) don't care.  We don't use the Splunk UI and the Sideview UI definitely does not ignore this file.
## we use conf-* to get the file, and get the on-disk state, and we use conf-* to write the file, and we set the on-disk state.
## everyone is thus happy.
[calls]
display.results.Fields_0.currentFields = duration type callingPartyNumber originalCalledPartyNumber calledPartyNumber cause_description origDeviceName destDeviceName
display.results.Fields_0.defaultFields = duration type callingPartyNumber originalCalledPartyNumber calledPartyNumber cause_description origDeviceName destDeviceName

[call_detail]
display.results.Fields_0.currentFields = duration seconds_until_answered type callingPartyNumber originalCalledPartyNumber calledPartyNumber cause_description origDeviceName destDeviceName
display.results.Fields_0.defaultFields = duration seconds_until_answered type callingPartyNumber originalCalledPartyNumber calledPartyNumber cause_description origDeviceName destDeviceName

display.results.Fields_1.currentFields = orig_gateway dest_gateway origIpAddr destIpAddr quality MLQK jitter latency numberPacketsLost seconds_until_answered
display.results.Fields_1.defaultFields = orig_gateway dest_gateway origIpAddr destIpAddr quality MLQK jitter latency numberPacketsLost seconds_until_answered
