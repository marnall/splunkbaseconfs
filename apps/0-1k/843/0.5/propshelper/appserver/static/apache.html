<p>
  Generate a Splunk extraction from an Apache LogFormat directive, as specified in the <a href="http://httpd.apache.org/docs/2.0/mod/mod_log_config.html" target="_blank">Apache Module mod_log_config</a> documentation.  Note that these field names don't necessarily align with any other Splunk applications and should be adjusted accordingly.
</p>
  <br/>

<form>
  <h2>LogFormat</h2>
  <input size="100" value="foo" name="LogFormat" />
  <hr/>
  <br/>

  <h2>Sample entry</h2>
  <div id="sample" style="padding-left:16px;" class="apache_value"></div>
  <hr/>
  <br/>

  <h2>Extract</h2>
  <div id="config" style="padding-left:16px;" class="apache_value"></div>

</form>

<script>
$(document).ready(function() {

		function buildSample(format){
		  return replacekeys(unquote(format),sampleValues);
		}
		
		function buildConfig(format){
//		  format = replaceWithFunctionResult( unquote(format),extractPatternFunctions );
		  return escapeHTML( "EXTRACT-customapache = " + replacekeys(unquote(format),extractPatterns) );
		}
		
		function buildExamples(){
		  formatval = $("input[name=LogFormat]").val();
		  $("#sample").html( buildSample(formatval) );
		  $("#config").html( buildConfig(formatval) );
		}
	
		
		sampleValues = new Array();
		sampleValues.push( ["%\{([^\}]+)\}t" , function() { return buildDateExampleFromDateFormat(arguments[0]); }] );
		sampleValues.push( ["%%" , '%'] );
		sampleValues.push( ["%a" , '192.168.3.2'] );
		sampleValues.push( ["%A" , '12.33.23.24'] );
		sampleValues.push( ["%B" , '12599'] );
		sampleValues.push( ["%b" , '12599'] );
		sampleValues.push( ["%\{([^\}]+)\}C" , 'cookie_$1_value'] );
		sampleValues.push( ["%D" , '1234567'] );
		sampleValues.push( ["%\{([^\}]+)\}e" , "env_$1_value"] );
		sampleValues.push( ["%f" , "clear.gif"] );
		sampleValues.push( ["%h" , 'server1'] );
		sampleValues.push( ["%H" , 'http'] );
		sampleValues.push( ["%\{([^\}]+)\}i" , 'request_header_$1_value'] );
		sampleValues.push( ["%l" , '-'] );
		sampleValues.push( ["%m" , 'GET'] );
		sampleValues.push( ["%\{([^\}]+)\}n" , 'note_$1_value'] );
		sampleValues.push( ["%\{([^\}]+)\}o" , 'reply_header_$1_value'] );
		sampleValues.push( ["%p" , '80'] );
		sampleValues.push( ["%P" , '1414'] );
		sampleValues.push( ["%\{([^\}]+)\}P" , '1414'] );
		sampleValues.push( ["%q" , 'x=42.232'] );
		sampleValues.push( ["%r" , 'GET /clear.gif?x=42.232'] );
		sampleValues.push( ["%>?s" , '200'] );
		sampleValues.push( ["%t" , '13/Oct/2011:13:55:36 -0700'] );
		sampleValues.push( ["%T" , '1'] );
		sampleValues.push( ["%u" , 'user1'] );
		sampleValues.push( ["%U" , '/clear.gif'] );
		sampleValues.push( ["%v" , 'www.mydomain.com'] );
		sampleValues.push( ["%V" , 'internalname.mydomain.com'] );
		sampleValues.push( ["%X" , '+'] );
		sampleValues.push( ["%I" , '123'] );
		sampleValues.push( ["%O" , '14224'] );
		
		extractPatterns = new Array();
		extractPatterns.push( ["%\{([^\}]+)\}t" , function() { return buildRegexFromDateFormat(arguments[0]); }] );
		extractPatterns.push( ["%\{([^\}]+)\}n" , '(?<note_$1>.*?)'] );
		extractPatterns.push( ["%.\{([^\}]+)\}o" , '(?<reply_header_$1>.*?)'] );
		extractPatterns.push( ["%\{([^\}]+)\}C" , '(?<cookie_$1>.*?)'] );
		extractPatterns.push( ["%.\{([^\}]+)\}e" , '(?<env_$1>.*?)'] );
		extractPatterns.push( ["%\{([^\}]+)\}i" , '(?<request_header_$1>.*?)'] );
		extractPatterns.push( ["%f" , '(?<filename>.*?)'] );
		extractPatterns.push( ["%D" , '(?<response_microseconds>.*?)'] );
		extractPatterns.push( ["%a" , '(?<remote_ip>.*?)'] );
		extractPatterns.push( ["%A" , '(?<local_ip>.*?)'] );
		extractPatterns.push( ["%B" , '(?<response_bytes>.*?)'] );
		extractPatterns.push( ["%b" , '(?<response_bytes>.*?)'] );
		extractPatterns.push( ["%h" , '(?<remote_host>.*?)'] );
		extractPatterns.push( ["%H" , '(?<request_protocol>.*?)'] );
		extractPatterns.push( ["%l" , '(?<remote_logname>.*?)'] );
		extractPatterns.push( ["%m" , '(?<request_method>.*?)'] );
		extractPatterns.push( ["%p" , '(?<request_port>.*?)'] );
		extractPatterns.push( ["%P" , '(?<pid>.*?)'] );
		extractPatterns.push( ["%\{.*?\}P" , '(?<pid>.*?)'] );
		extractPatterns.push( ["%q" , '(?<query_string>.*?)'] );
		extractPatterns.push( ["%r" , '(?<request_method>.*?) (?<request_full_url>.*?(?<request_url>.*?)(\\?(?<query_string>.*?))?)'] );
		extractPatterns.push( ["%>?s" , '(?<response_code>.*?)'] );
		extractPatterns.push( ["%T" , '(?<response_seconds>.*?)'] );
		extractPatterns.push( ["%u" , '(?<remote_user>.*?)'] );
		extractPatterns.push( ["%U" , '(?<request_url>.*?)'] );
		extractPatterns.push( ["%v" , '(?<servername>.*?)'] );
		extractPatterns.push( ["%V" , '(?<servername_usecanonical>.*?)'] );
		extractPatterns.push( ["%X" , '(?<connection_status_after_completion>.*?)'] );
		extractPatterns.push( ["%I" , '(?<bytes_received>.*?)'] );
		extractPatterns.push( ["%O" , '(?<bytes_sent_w_header>.*?)'] );
		extractPatterns.push( ["%t" , buildRegexFromDateFormat('%d/%b/%Y:%H:%M:%S %z')] );
		
		// %%	The percent sign (Apache 2.0.44 and later)
		// %a	Remote IP-address
		// %A	Local IP-address
		// %B	Size of response in bytes, excluding HTTP headers.
		// %b	Size of response in bytes, excluding HTTP headers. In CLF format, i.e. a '-' rather than a 0 when no bytes are sent.
		// %{Foobar}C	The contents of cookie Foobar in the request sent to the server.
		// %D	The time taken to serve the request, in microseconds.
		// %{FOOBAR}e	The contents of the environment variable FOOBAR
		// %f	Filename
		// %h	Remote host
		// %H	The request protocol
		// %{Foobar}i	The contents of Foobar: header line(s) in the request sent to the server. Changes made by other modules (e.g. mod_headers) affect this.
		// %l	Remote logname (from identd, if supplied). This will return a dash unless IdentityCheck is set On.
		// %m	The request method
		// %{Foobar}n	The contents of note Foobar from another module.
		// %.{Foobar}o	The contents of Foobar: header line(s) in the reply.
		// %p	The canonical port of the server serving the request
		// %P	The process ID of the child that serviced the request.
		// %{format}P	The process ID or thread id of the child that serviced the request. Valid formats are pid and tid. (Apache 2.0.46 and later)
		// %q	The query string (prepended with a ? if a query string exists, otherwise an empty string)
		// %r	First line of request
		// %s	Status. For requests that got internally redirected, this is the status of the *original* request --- %...>s for the last.
		// %t	Time the request was received (standard english format)
		// %{format}t	The time, in the form given by format, which should be in strftime(3) format. (potentially localized)
		// %T	The time taken to serve the request, in seconds.
		// %u	Remote user (from auth; may be bogus if return status (%s) is 401)
		// %U	The URL path requested, not including any query string.
		// %v	The canonical ServerName of the server serving the request.
		// %V	The server name according to the UseCanonicalName setting.
		// %X	Connection status when response is completed:
		//  X =	connection aborted before the response completed.
		//  + =	connection may be kept alive after the response is sent.
		//  - =	connection will be closed after the response is sent.
		//  (This directive was %...c in late versions of Apache 1.3, but this conflicted with the historical ssl %...{var}c syntax.)
		// %I	Bytes received, including request and headers, cannot be zero. You need to enable mod_logio to use this.
		// %O   Bytes sent, including headers
		
		
		default_apache_format = '"%h %l %u %t \\"%r\\" %>s %b \\"%{Referer}i\\" \\"%{User-agent}i\\""'

		  $("input[name=LogFormat]").bind("change",buildExamples);
		  $("input[name=LogFormat]").bind("keyup",buildExamples);
		  $("input[name=LogFormat]").val(default_apache_format);
		  buildExamples();

});
</script>
