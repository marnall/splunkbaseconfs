[source::...*smaccess*]
EXTRACT-sm_eventid = (?i)^(?P<sm_eventid>[^ ]+)
EXTRACT-sm_userid = AuthAccept.*\]\ \"\d*.\d*.\d*.\d*.(?<sm_userid>.*)\" \"
EXTRACT-sm_clientip = (?i)^[^"]*"(?P<sm_clientip>[^ ]+)

[source::...*smps*]
EXTRACT-sm_ps = .*(?P<sm_psmsg>\[ERROR\]|\[INFO\]|\[WARN\])\s(?P<sm_psmsg1>[a-zA-Z ]+[.]|[a-zA-Z \(\)_-]+[:]|.*$)(?P<sm_psmsg2>.*[.]\s|.*$)(?P<sm_psmsg3>.*$)
