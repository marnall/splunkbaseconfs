# extraction for: tcpdump -ieth1 -eq 'tcp port not 22' 
[tcpdump_eq]
REGEX = ([^ ]+) ([^ ]+) [^>]+ > ([^ ,]+)[^,]*, ([^,]+), ([^>]+ > ([^:]+)\.([^:]+):)?
FORMAT = timestamp::$1 src_mac::$2 dest_mac::$3 net_layer::$4 dest_host::$6 protocol::$7

# setup lookup table that maps MAC prefixes to registered OUI
# extracted from: http://standards.ieee.org/develop/regauth/oui/oui.txt
[oui_lookup]
filename = oui.csv

