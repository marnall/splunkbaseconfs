#
# tcpdump data streams
#

# this can easily consume a ton of indexing volume; beware!
# SETUP: replace 'eth1' with your network interface name
[script://./bin/capture_tcpdump.sh eth1]
disabled = true
interval = -1
sourcetype = tcpdump-simple
source = tcpdump


#
# Twitter streaming API inputs
#

# streaming sample firehose
# SETUP: provide Twitter OAuth credentials in tweepy.conf
[script://./bin/capture_twitter.sh]
disabled = true
interval = -1
sourcetype = twitter
source = twitter-sample
host = stream.twitter.com

# streaming keyword search for 'awesome'
# SETUP: provide Twitter OAuth credentials in tweepy.conf
[script://./bin/capture_twitter.sh awesome]
disabled = true
interval = -1
sourcetype = twitter
source = twitter-awesome
host = stream.twitter.com

