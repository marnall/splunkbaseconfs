[module]
# The JavaScript name of the module
className = Splunk.Module.FlashParticlesBeta

# The module class to subclass from
superClass = Splunk.Module.FlashWrapper

description = This module contains a Flash object that renders real-time events as a stream of particles.

[param:swfFile]
required = False
label =  This is the path that specifies the swf to load. The swf must conform to a very strict and thus-far undocumented spec that is not for external consumption.
default = /static/app/SplunkViz/flash/particles_beta.swf

[param:width]
required = False
label = This specifies the width of the module. It can be a percentage or a number of pixels. Typically this is set to "100%" meaning it should fill all available space. It can also be set to a number of pixels by using a value like "500px".
default = 100%

[param:height]
required = False
label = This specifies the height of the module. It can be a percentage or a number of pixels.
default = 400px
sticky = true
persistable = true

[param:particles*]
required = False

[param:controls*]
required = False
sticky = true
persistable = true
