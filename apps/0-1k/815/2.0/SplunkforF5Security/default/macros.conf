definition = unit_hostname = $unit_hostname$ | stats max(dos_dropped_requests_count) as max_drop by client_request_uri dos_attack_id |stats sum(max_drop) as dropped_requests by client_request_uri

[Anomalies_ip_to_country(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | stats max(dos_dropped_requests_count) as dropped_requests by source_ip country

[Anomalies_ip_count_time_distribution(1)]
