[f5_get_indexes]
definition = index=*
###########################################
##ASM General Enforcement Macros
###########################################

### BRute Force Macros ###

[BF_Anomalies_ip_count_time_distribution(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | makemv delim="," ip_list  | mvexpand ip_list  | rex field=ip_list "(?<ip>[\d+.\d+.\d+.\d+]+):(?<country>[^:]+):(?<drop_count>\d+)"|chart sum(drop_count) over _time by attack_id

[BF_Anomalies_attacking_countries_total(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | makemv delim="," ip_list | mvexpand ip_list | rex field=ip_list "(?<ip>[\d+.\d+.\d+.\d+]+):(?<country>[^:]+):(?<drop_count>\d+)"|stats max(drop_count) as max_drop by ip country | stats sum(max_drop) as dropped_requests by country

[BF_Anomalies_attacking_countries_per_attack_id(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | makemv delim="," ip_list  | mvexpand ip_list  | rex field=ip_list "(?<ip>[\d+.\d+.\d+.\d+]+):(?<country>[^:]+):(?<drop_count>\d+)" | stats max(drop_count) as max_drop by ip country attack_id | chart sum(max_drop) as dropped_requests over attack_id by country

[BF_Anomalies_attacking_IPs_per_attack_id(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | makemv delim="," ip_list | mvexpand ip_list | rex field=ip_list "(?<ip>[\d+.\d+.\d+.\d+]+):(?<country>[^:]+):(?<drop_count>\d+)"|chart max(drop_count) as dropped_requests over attack_id by ip

[BF_Anomalies_attacking_IPs_total(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | makemv delim="," ip_list | mvexpand ip_list | rex field=ip_list "(?<ip>[\d+.\d+.\d+.\d+]+):(?<country>[^:]+):(?<drop_count>\d+)"|stats max(drop_count) as max_drop by attack_id ip | stats sum(max_drop) as dropped_requests by ip

[BF_Anomalies_ip_to_country(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | makemv delim="," ip_list  | mvexpand ip_list  | rex field=ip_list "(?<ip>[\d+.\d+.\d+.\d+]+):(?<country>[^:]+):(?<drop_count>\d+)" | stats max(drop_count) as dropped_requests by ip country


### ASM Macros ###
[Request_Status_over_time_by_webapp(1)]
args = unit_hostname
definition = violations unit_hostname = $unit_hostname$ | timechart count by request_status

[Violations_distribution_over_time_by_webapp(1)]
args = unit_hostname
definition = violations unit_hostname = $unit_hostname$ | timechart count by violations 

[Attack_type_distribution_over_time_by_webapp(1)]
args = unit_hostname
definition = violations unit_hostname = $unit_hostname$ | timechart count by attack_type

[Top_HTTP_methods(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | top method limit=20

[Top_HTTP_response_codes(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | where response_code>0 | top response_code limit=20

[Top_violations_count_ip_to_country(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | stats count by ip_client geo_location | sort -count

[Top_violations_by_webapp_and_device(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | top http_security_violation limit=20

[Top_violations_blocked(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status="blocked"| top http_security_violation limit=20

[Top_violations_alarmed(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status="alerted"| top http_security_violation limit=20

[Top_attack_types(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | top attack_type limit=20

[Top_severities(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | top severity limit=20


[Top_attacking_countries(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | top geo_location limit=20

[Top_attacking_IPs(1)]
args = unit_hostname
definition = unit_hostname= $unit_hostname$ | top ip_client limit=20

[Top_attacking_IPs_alarmed(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status=alerted| top client_ip limit=20

[Top_attacking_IPs_blocked(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status=blocked| top client_ip limit=20

[Top_signatures(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | top http_security_description limit=20

[Violations_count_by_URIs(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | stats count(violations) as violation_count by uri | sort -violation_count

[Events_distribution_by_web_app(1)]
args = unit_hostname
definition = violations unit_hostname = $unit_hostname$ | timechart count by web_application_name limit=20

[Top_attacked_web_apps_alarmed(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status=alerted | top web_application_name limit=20

[Top_attacked_web_apps_blocked(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status=blocked | top web_application_name limit=20

#### PSM Macros ####

[Top_attacked_vs_alarmed(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status=alerted| top context_name limit=20

[Top_attacked_vs_blocked(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ request_status=blocked| top context_name limit=20

[Events_distribution_by_vs(1)]
args = unit_hostname
definition = unit_hostname = $unit_hostname$ | timechart count by context_name

#### Anomaly Detection Features Macros ####

[Anomalies_attacking_countries_total(1)]
