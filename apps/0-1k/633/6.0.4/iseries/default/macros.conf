
[isr_get_type]
definition = eval type=jrn_type + if(isnull(jrn_subtype), " ", "-" + jrn_subtype) + if(isnull(jrn_type_desc), " ", ": " + jrn_type_desc)
iseval = 0

[isr_get_defprof]
definition = lookup user_profile_lookup user_profile OUTPUT\
default_profile_desc as default_profile
iseval = 0

[isr_get_time]
definition = eval time=strftime(_time, "%m-%d-%y %T")
iseval = 0

[isr_fix_ESD]
definition = eval ESD=substr(ESD, 2)
iseval = 0
