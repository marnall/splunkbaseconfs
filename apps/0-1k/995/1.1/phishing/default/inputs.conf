[script://./bin/getphishlist.sh]
interval=84600
sourcetype=phishlist
disabled=false

# This does nothing, but it may be required for Linux to invoke all scripts
# in this inputs.conf. Set disabled=true on other platforms.
[script://./bin/get_no_data.sh]
interval=5
sourcetype=none
disabled=false

#Sample data. Use to test by setting disabled=false; Restart Splunk.
[monitor://$SPLUNK_HOME/etc/apps/phishing/logs/squidaccess.log]
disabled=true
sourcetype=squidaccess


# Windows only
[script://.\bin\getphishlist.bat]
interval=84600
sourcetype=phishlist
disabled =false
