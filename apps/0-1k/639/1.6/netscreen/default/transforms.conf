[netscreen1]
REGEX = .*NetScreen\s+device_id=([^ ]+)\s+\[[^\]]+\](.*?)\:\s+start_time=\"([^ ]+\s+[^ ]+)\"\s+duration=([^ ]+)\s+policy_id=([^ ]+)\s+service=(.+)\s+proto=([^ ]+)\s+src\s+zone=([^ ]+)\s+dst\s+zone=([^ ]+)\s+action=([^ ]+)\s+sent=([^ ]+)\s+rcvd=([^ ]+)\s+src=([^ ]+)\s+dst=([^ ]+)
FORMAT = dvc_host::$1 event_id::$2 start_time::$3 duration::$4 rule_number::$5 app::$6 proto::$7 inbound_interface::$8 outbound_interface::$9 action::$10 bytes_out::$11 bytes_in::$12 src_ip::$13 dest_ip::$14

[netscreen2]
REGEX = .*\s+dst=[^ ]+\s+src_port=(\d+)\s+dst_port=(\d+).*\s+reason=([^(\n|\r)]+)
FORMAT = src_port::$1 dest_port::$2 reason::$3

[netscreen3]
REGEX = .*\s+dst=[^ ]+\s+src_port=(\d+)\s+dst_port=(\d+)\s+src-xlated\s+ip=([^ ]+)\s+port=(\d+)\s+dst-xlated\s+ip=([^ ]+)\s+port=(\d+).*\s+reason=([^(\n|\r)]+)
FORMAT = src_port::$1 dest_port::$2 src_translated_ip::$3 src_translated_port::$4 dest_translated_ip::$5 dest_translated_port::$6 reason::$7

[netscreen4]
REGEX = .*\s+dst=[^ ]+\s+icmp\s+type=8\s+src-xlated\s+ip=([^ ]+)\s+dst-xlated\s+ip=([^ ]+).*\s+reason=([^(\n|\r)]+)
FORMAT = src_translated_ip::$1 dest_translated_ip::$2 reason::$3

[netscreen5]
REGEX = .*\s+dst=[^ ]+\s+src_port=(\d+)\s+dst_port=(\d+)
FORMAT = src_port::$1 dest_port::$2

[netscreen6]
REGEX = .*\s+dst=[^ ]+\s+icmp\s+type=(\d+)
FORMAT = icmp_type::$1

[netscreen7]
REGEX = .*NetScreen\s+device_id=([^ ]+)\s+\[[^\]]+\]([^:]+).*?From\s+([^:]+):([^ ]+)\s+to\s+([^:]+):([^,]+),\s+proto\s+([^ ]+)\s+\(zone\s+([^,]+)
FORMAT  = dvc_host::$1 event_id::$2 src_ip::$3 src_port::$4 dest_ip::$5 dest_port::$6 proto::$7 inbound_interface::$8

[netscreen8]
REGEX = .*NetScreen\s+device_id=([^ ]+)\s+\[[^\]]+\]([^:]+):\s+([^:]+):.*from\s+([^:]+):(\d+)
FORMAT =  dvc_host:$1 event_id::$2 proto::$3 src_ip::$4 src_port::$5

[netscreen9]
REGEX = .*NetScreen\s+device_id=([^ ]+)\s+\[[^\]]+\](.*?)\:\s+([^ ]+)\s+was\s+(\w+)\s+to\s+policy\s+(\d+)\s+(.+)\s+by\s+(\w+)\s+via\s+([^ ]+)\s+from\s+host\s+([^ ]+).+\r
FORMAT = dvc_host::$1 event_id::$2 object_name::$3 action::$4 rule_number::$5 object_type::$6 user_subject::$7 user_subject_id::$8 src_ip::$9

[netscreen10]
REGEX = .*NetScreen\s+device_id=([^ ]+)\s+\[[^\]]+\](.*?)\:\s+Policy\s+\((\d+).+\)\s+was\s+(\w+)\s+by\s+(\w+)\s+via\s+([^ ]+)\s+from\s+host\s+([^ ]+).+
FORMAT = dvc_host::$1 event_id::$2 rule_number::$3 action::$4 user_subject::$5 user_subject_id::$6 src_ip::$7

[netscreen11]
REGEX = .*NetScreen\s+device_id=([^ ]+)\s+\[[^\]]+\](.*?)\:\s+.+
FORMAT = dvc_host::$1 event_id::$2
