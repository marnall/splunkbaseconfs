[create_lookup_contact]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
enableSched = 0
quantity = 1
relation = less than
search = index="sfdc" sourcetype="sfdc_contact" | dedup Id sortby - _time | fields - _* | outputlookup createinapp=true sfdc_contact.csv

