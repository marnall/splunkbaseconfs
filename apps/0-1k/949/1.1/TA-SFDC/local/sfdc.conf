[sfdc]
username = <YOUR_SFDC_USERNAME>
password = <YOUR_SFDC_PASSWORD>
token = <YOUR_SFDC_SECURITY_TOKEN>
wsdl = sfdc.enterprise.wsdl
log_path = /var/log/sfdc
timestamp = SystemModstamp

sfdc_object.0 = Account
sfdc_object.1 = Case
sfdc_object.2 = Contact
sfdc_object.3 = Lead
sfdc_object.4 = Opportunity
sfdc_object.5 = User

sfdc_types.0 = xsd:boolean
sfdc_types.1 = xsd:string
sfdc_types.2 = xsd:double
sfdc_types.3 = tns:ID
sfdc_types.4 = xsd:dateTime
sfdc_types.5 = xsd:date
sfdc_types.6 = xsd:time
