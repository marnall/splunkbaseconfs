<HTML>
    <HEAD>
        <SCRIPT LANGUAGE="JavaScript">
            //music_count =0;
            var flag;
            function play() {
                if (flag == 0) {
                    window.document.embeds[0].Play();
                }
                if (flag == 1) {
                    window.document.embeds[1].Play();
                }
                if (flag == 2) {
                    window.document.embeds[2].Play();
                }
            }
            function stop() {
                if (window.document.embeds[0]) {
                    window.document.embeds[0].Stop();
                    flag = 0;
                }
                if (window.document.embeds[1]) {
                    window.document.embeds[1].Stop();
                    flag = 1;
                }
                if (window.document.embeds[2]) {
                    window.document.embeds[2].Stop();
                    flag == 2;
                }
            }
            function playNext() {
                stop();
                index = Math.floor(Math.random() * window.document.embeds.length);
                window.document.embeds[index].Play();
            }
            function ContactUs(){
                window.location.href = "mailto:hchin@splunk.com?subject=Users's feedback";
            }
        </SCRIPT>
    </HEAD>
    <BODY onLoad="start()">
        <EMBED src="/static/app/moneyexchange/queen_aria.mp3" loop="1" hidden="true" autostart="true">
        <EMBED src="/static/app/moneyexchange/mario_loop.wav" loop="1" hidden="true" autostart="false">
        <EMBED src="/static/app/moneyexchange/we wish you a merry christmas.mp3" loop="1" hidden="true" autostart="false">
        <FORM>
            <INPUT TYPE="BUTTON" VALUE="Play" onClick="play()">
            <INPUT TYPE="BUTTON" VALUE="Pause" onClick="stop()">
            <INPUT TYPE="BUTTON" VALUE="Next" onClick="playNext()">
        </FORM>
        <a href="javascript:ContactUs();">Please Feedback Us!</a>
    </BODY>
</HTML>
