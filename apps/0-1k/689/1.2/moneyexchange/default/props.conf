[usd]
EXTRACT-TWD = (?i)^(?P<TWD>[^ ]+)
EXTRACT-CNY = (?i)^[^ ]* (?P<CNY>[^ ]+)
EXTRACT-HKD = (?i)^(?:[^ ]* ){2}(?P<HKD>[^ ]+)
EXTRACT-DX  = (?i)^(?:[^ ]* ){3}(?P<DX>[^ ]+)
EXTRACT-EUR = (?i)^(?:[^ ]* ){4}(?P<EUR>[^ ]+)
EXTRACT-JPY = (?i)^(?:[^ ]* ){5}(?P<JPY>[^ ]+)
EXTRACT-GBP = (?i)^(?:[^ ]* ){6}(?P<GBP>[^ ]+)
EXTRACT-CHF = (?i)^(?:[^ ]* ){7}(?P<CHF>[^ ]+)
EXTRACT-AUD = (?i)^(?:[^ ]* ){8}(?P<AUD>[^ ]+)
EXTRACT-CAD = (?i)^(?:[^ ]* ){9}(?P<CAD>.+)

EVAL-TWDAUD = AUD * TWD
EVAL-TWDEUR = EUR * TWD
EVAL-TWDGBP = GBP * TWD
EVAL-TWDCAD = TWD/CAD
EVAL-TWDJPY = JPY/TWD
EVAL-TWDCNY = TWD/CNY 

EVAL-JPYAUD = AUD * JPY
EVAL-JPYEUR = EUR * JPY
EVAL-JPYGBP = GBP * JPY
EVAL-JPYCAD = JPY/CAD
EVAL-JPYTWD = JPY/TWD
EVAL-JPYCNY = JPY/CNY

EVAL-AUDTWD = AUD * TWD
EVAL-AUDEUR = EUR/AUD
EVAL-AUDGBP = GBP/AUD
EVAL-AUDCAD = AUD * CAD
EVAL-AUDJPY = JPY * AUD
EVAL-AUDCNY = AUD * CNY 

EVAL-EURTWD = EUR * TWD
EVAL-EURAUD = EUR/AUD
EVAL-EURGBP = GBP/EUR
EVAL-EURCAD = EUR * CAD
EVAL-EURJPY = EUR * JPY
EVAL-EURCNY = EUR * CNY

EVAL-GBPTWD = GBP * TWD
EVAL-GBPAUD = GBP/AUD
EVAL-GBPEUR = GBP/EUR
EVAL-GBPCAD = GBP * CAD
EVAL-GBPJPY = GBP * JPY
EVAL-GBPCNY = GBP * CNY

EVAL-CADTWD = TWD/CAD
EVAL-CADAUD = CAD * AUD
EVAL-CADEUR = CAD * EUR
EVAL-CADGBP = CAD * GBP
EVAL-CADJPY = JPY/CAD
EVAL-CADCNY = CNY/CAD

EVAL-CNYTWD = TWD/CNY
EVAL-CNYAUD = CNY * AUD
EVAL-CNYEUR = CNY * EUR
EVAL-CNYGBP = CNY * GBP
EVAL-CNYJPY = JPY/CNY
EVAL-CNYCAD = CNY/CAD










