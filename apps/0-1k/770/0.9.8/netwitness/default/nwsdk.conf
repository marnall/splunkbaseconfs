[rest]
# URL for NetWitness Concentrator/Broker REST interface, including username and password
# On older versions the REST API is not enabled by default please see NetWitness support portal for instructions on how to enable it 
top_level_url=http://192.168.160.33:50105/
username=admin
password=netwitness
# File containing the last sessionid processed, to avoid generating duplicates
last_sid_file=/var/tmp/.last_sessionid
# If LAST_SID_FILE doesn't exist use NO_SID_FILE_OPTION
# -2 to start <no_sid_seconds_back> seconds ago
# -1 to start from highest sessionid in NW DB
#  0 to start read all available data
# <any positive integer> to start from that value sessionid
no_sid_file=-2
# Number of seconds to go back from now to import new data on first run (default: 5 minutes)
# Common options: 300 = 5 minutes; 3600 = 1 hour; 86400 = 1 day; 604800 = 1 week ; 2678400 = 31 days
no_sid_seconds_back=300

# -- Advanced Configuration Settings -- 
# Maximum number of meta to pull 
max_meta=50000
# How often should LAST_SID_FILE be written to. Can be increased on faster systems. It will be written on completion regardless
write_to_file_every_x=500

# Additional mappings should be added below in the form of <nw meta name>=<splunk field name>
#[mappings]
#crypto=cipher
# -- Configuration Settings end --
