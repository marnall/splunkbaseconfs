############################################################
#
# IAS/MS-RADIUS Log Format
#
# Field names that are not lower-case are modifed to match 
# the name used by Microsoft IAS Server in Windows event
# logs.
#
############################################################

[ias-header]
REGEX  = ^(?:.{1,30}MWFileMonitor.*\]: )?([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),(.*)
#FORMAT = nas_ip_address::$1 user::$2 process::$5 dvc_host::$6, ias_message::$7
FORMAT = NAS-IP-Address::$1 user::$2 process::$5 dvc_host::$6, ias_message::$7

[ias-header-2]
REGEX = ^([\d\.]+),([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),(.*)
FORMAT = NAS-IP-Address::$1 user::$2 process::$5 dvc_host::$6, ias_message::$7

#[ias-attr-generic]
#REGEX = ^(([^,]+),){6}(([^,]+),([^,]+),)*([^,]+),([^,]+)
#FORMAT = attr-num::$6 attr-val::$7

[ias-attr-25]
SOURCE_KEY = ias_message
REGEX = ^(([^,]+),){6}(([^,]+),([^,]+),)*(25),([^,]+)
FORMAT = class::$7

[ias-attr-5]
