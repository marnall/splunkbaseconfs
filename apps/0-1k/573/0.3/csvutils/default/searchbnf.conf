[emailcsvs-command]
syntax = emailcsvs
shortdesc = Emails csvs from $SPLUNK_HOME/var/run/splunk/
description = Emails csvs handed into the csvs attribute. Files are expected to be in var/run/splunk/ , as created by outputcsv.
default = emailcsvs
example1 = ... | emailcsvs csvs="foo.csv,bar.csv"
example2 = ... | emailcsvs csvs="foo.csv,bar.csv" to="foo@bar.com" server="localhost" from="splunk@here.com" subject="Your CSVs" delete_on_send="true"
commentcheat = Emails csvs from $SPLUNK_HOME/var/run/splunk/
examplecheat = emailcsvs
category = email
maintainer = vbumgarner
usage = public
appears-in=4.1
tags = email csv
related = outputcsv sendemail

