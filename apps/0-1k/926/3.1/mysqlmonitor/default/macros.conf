[util_delta_per_host(2)]
args = in,out
definition = streamstats window=1 current=f global=f first($in$) as first_in by host | eval $out$=first_in-$in$

[innodb_buffer_pool_pages_dirty_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | timechart bins=300 avg(INNODB_BUFFER_POOL_PAGES_DIRTY) by host

[innodb_buffer_pool_pages_flushed_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | streamstats window=1 current=f global=f first(INNODB_BUFFER_POOL_PAGES_FLUSHED) as flushed by host | eval diff=flushed-INNODB_BUFFER_POOL_PAGES_FLUSHED | timechart bins=300 sum(diff) by host

[innodb_buffer_pool_miss_rate_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | streamstats window=1 current=f global=f first(INNODB_BUFFER_POOL_READS) as reads by host | streamstats window=1 current=f global=f first(INNODB_BUFFER_POOL_READ_REQUESTS) as requests by host | eval reads_diff=reads-INNODB_BUFFER_POOL_READS | eval requests_diff=requests-INNODB_BUFFER_POOL_READ_REQUESTS | eval ratio=100*(reads_diff/requests_diff) | timechart bins=300 avg(ratio) by host

[selects_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(COM_SELECT, diff)` | timechart bins=300 per_second(diff) by host

[writes_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval writes=COM_UPDATE+COM_DELETE+COM_INSERT | `util_delta_per_host(writes, diff)` | timechart bins=300 per_second(diff) by host

[slow_queries_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(SLOW_QUERIES, diff)` | timechart bins=300 sum(diff) by host

[commits_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(COM_COMMIT, diff)` | timechart bins=300 per_second(diff) by host

[rollbacks_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(COM_ROLLBACK, diff)` | timechart bins=300 per_second(diff) by host

[thread_saturation_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval saturation=(THREADS_CONNECTED/MAX_CONNECTIONS)*100 | timechart bins=300 avg(saturation) by host

[threads_running_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | timechart bins=300 avg(THREADS_RUNNING) by host

[aborted_clients_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(ABORTED_CLIENTS, diff)` | timechart bins=300 per_second(diff) by host

[aborted_connects_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(ABORTED_CONNECTS, diff)` | timechart bins=300 per_second(diff) by host

[connections_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(CONNECTIONS, diff)` | timechart bins=300 per_second(diff) by host

[replication_delay_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-slavestatus" host="$host$" | timechart bins=300 max(Seconds_Behind_Master) by host

[queries_overview_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qtype="reads" | `util_delta_per_host(COM_SELECT, diff)` | append [search index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qtype="writes" | eval writes=COM_UPDATE+COM_DELETE+COM_INSERT | `util_delta_per_host(writes, diff)`] | timechart bins=300 per_second(diff) by qtype

[transactions_overview_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qtype="commits" | `util_delta_per_host(COM_COMMIT, diff)` | append [search index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qtype="rollbacks" | `util_delta_per_host(COM_ROLLBACK, diff)`] | timechart bins=300 per_second(diff) by qtype

[buffer_pool_overview_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qtype="pages dirty" | eval val=INNODB_BUFFER_POOL_PAGES_DIRTY | append  [search index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qtype="pages flushed" | `util_delta_per_host(INNODB_BUFFER_POOL_PAGES_FLUSHED, val)`] | timechart bins=300 per_second(val) by qtype

[temporary_tables_to_disk_ratio_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(CREATED_TMP_DISK_TABLES, ctdt)` | `util_delta_per_host(CREATED_TMP_TABLES, ctt)` | eval tttd_ratio=ctdt/ctt | timechart bins=300 avg(tttd_ratio) by host

[created_temporary_tables_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(CREATED_TMP_TABLES, ctt)` | timechart bins=300 per_second(ctt) by host

[myisam_key_buffer_reads_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(KEY_READS, diff)` | timechart bins=300 per_second(diff) by host

[myisam_key_buffer_read_ratio_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(KEY_READ_REQUESTS, krr)` | `util_delta_per_host(KEY_READS, kr)` | eval krrr=kr/krr | timechart bins=300 avg(krrr) by host

[query_cache_hit_ratio_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(COM_SELECT, selects)` | `util_delta_per_host(QCACHE_HITS, cache_hits)` | eval qcache_ratio=cache_hits/(cache_hits+selects) | timechart bins=300 avg(qcache_ratio) by host

[query_cache_total_hits_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(QCACHE_HITS, diff)` | timechart bins=300 per_second(diff) by host

[query_cache_free_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | eval qcache_free_mb=QCACHE_FREE_MEMORY/(1024*1024) | timechart bins=300 per_second(qcache_free_mb) by host

[query_cache_lowmem_prunes_by_host(1)]
args = host
definition = index="mysql" sourcetype="mysql-statusvars" host="$host$" | `util_delta_per_host(QCACHE_LOWMEM_PRUNES, diff)` | timechart bins=300 per_second(diff) by host
