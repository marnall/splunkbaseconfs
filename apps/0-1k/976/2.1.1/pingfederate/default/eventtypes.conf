## PingFederate EVENTS
## some events have role ignored to account for the fact these events has role=SP



### ACCOUNT MANAGEMENT EVENTS START ###


## ACCOUNT REGISTER EVENTS

[am.account.accountregister.success]
search = source=*audit.log event="REGISTER" AND role="IdP" AND status="success"

[am.account.accountregister.failure]
