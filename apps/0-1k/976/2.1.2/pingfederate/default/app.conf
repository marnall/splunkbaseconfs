[launcher]
author = Ping Identity
description = The PingFederate App for Splunk gathers and presents transaction metrics from PingFederate via a series of customized reports and graphical illustrations. The application enables identity and access management (IAM) administrators, architects, and security managers to easily obtain custom reporting for all PingFederate log data, view each authentication event per app and authentication source, and analyze that event data over time. The customized reports display key events across the categories of: Account Management, Identity Provider, Service Provider and OAuth Server.
version = 2.1.2

[package]
id = pingfederate

[install]
build = 65

[ui]
is_visible = 1
label = PingFederate App for Splunk