[IP address assignment]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = is assigned
vsid = gmrpqj1l

[MAC and manuf]
action.email.inline = 1
alert.suppress = 0
alert.track = 0
dispatch.earliest_time = -24h@h
search = NOT G4 NOT static NOT vendor NOT ath5k NOT Daves-MacBook MAC OR Manuf | timechart count by host

[MAC Radial gauge]
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */30 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = sourcetype=kismet_nettxt MAC* NOT MacBook |dedup MAC | stats count as myCount | gauge myCount 0 100 200 300 400
vsid = *:h0bncw9t

