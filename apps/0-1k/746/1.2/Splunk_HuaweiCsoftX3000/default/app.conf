# Splunk app configuration file

[ui]
is_visible = 1
is_manageable = true
label = Splunk for Huawei CSOFTX3000

[launcher]
author = David Millis
description = This app supports binary-encoded logfiles from the Huawei CSOFTX3000 Mobile Switch.  The app is designed specifically to handle binary logfiles containing 350-byte records.\
\
Records are converted to Splunk-friendly ASCII key/value pairs via PERL script.  Dashboards and form searches are also included.
version = 1.2

[package]
id= Splunk_HuaweiCsoftX3000
