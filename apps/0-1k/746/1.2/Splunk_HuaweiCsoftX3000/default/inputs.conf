#
# inputs.conf for Splunk_HuaweiCsoftX3000
#
# Do not edit this file. Copy to ../local/inputs.conf, make changes there
#

#
# This inputs configuration assumes that the Huawei binary logfiles
# are available to Splunk when they are static (i.e., no longer
# being actively written to)
#
# After defining the data inputs here, you will need to modify local/props.conf
# The entries in props.conf specify how to preprocess the files, including
# whether the logfile is compressed or not.
#

#
# sourcetype must be set to "huawei_cdr"
# index and host settings are optional
#
#[monitor:///var/log/huawei]
#disabled = false
#followTail = 0
#sourcetype = huawei_cdr
#index = default
#host = huawei_switch
