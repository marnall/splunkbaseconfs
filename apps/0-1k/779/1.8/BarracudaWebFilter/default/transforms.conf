# Oct 22 18:20:39 proxy http_scan[10904]: 1382479874 1 192.168.101.167 74.122.143.31 image/gif 192.168.101.167
[barracuda_sourcetype]
DEST_KEY = MetaData:Sourcetype
REGEX = .*\S+\s+http\_scan\[\d+\]\:\s+\d+\s+\d+.*
FORMAT = sourcetype::barracuda

[nspaces]
# matches one or more NON space characters
REGEX = \S+

[alphas]
# matches a string containing only letters a-zA-Z
REGEX = [a-zA-Z]+

[alnums]
# matches a string containing letters + digits
REGEX = [a-zA-Z0-9]+

[qstring]
#matches a quoted "string" - extracts an unnamed variable - name MUST be provided as in [[qstring:name]]
REGEX = "(?<>[^"]*+)"

[digits]
REGEX = \d+

[barracuda_with_ldap]
REGEX = ^[[nspaces:d_mon]]\s++[[nspaces:d_day]]\s++[[nspaces:d_time]]\s++[[nspaces:host]]\s++[[nspaces:process_id]]\s++[[nspaces:epoch_time]]\s++[[nspaces:unknown_val]]\s++[[nspaces:src_ip]]\s++[[nspaces:dst_ip]]\s++[[nspaces:content_type]]\s++[[nspaces:source_ip]]\s++[[nspaces:dst_url]]\s++[[nspaces:request_size]]\s++[[nspaces:md5_anchor]]\s++[[nspaces:action]]\s++[[nspaces:reason]]\s++[[nspaces:format_version]]\s++[[nspaces:match_flag]]\s++[[nspaces:tq_flag]]\s++[[nspaces:action_type]]\s++[[nspaces:src_type]]\s++[[nspaces:src_detail]]\s++[[nspaces:dst_type]]\s++[[nspaces:dst_detail]]\s++[[nspaces:spy_type]]\s++[[nspaces:spy_id]]\s++[[nspaces:infection_score]]\s++[[nspaces:matched_part]]\s++[[nspaces:matched_category]]\s++\[ldap\d+\:[[nspaces:login_id]]\]\s++

