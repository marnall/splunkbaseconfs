[syslog]
TRANSFORMS-barracuda_rename = barracuda_sourcetype

[barracuda]
KV_MODE = none
SHOULD_LINEMERGE = False
REPORT-barracuda = barracuda_with_ldap, barracuda_with_ldap_two, barracuda_without_ldap, barracuda_without_ldap_two
LOOKUP-barracuda_action_type = barracuda_action_type action_type OUTPUT action_type_description
LOOKUP-barracuda_dst_type = barracuda_dst_type dst_type OUTPUT dst_type_description
LOOKUP-barracuda_spy_type = barracuda_spy_type spy_type OUTPUT spy_type_description
LOOKUP-barracuda_src_type = barracuda_src_type src_type OUTPUT src_type_description
