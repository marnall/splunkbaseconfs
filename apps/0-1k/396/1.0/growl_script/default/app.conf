[launcher]
label = Growl Notification Script
author = Siegfried Puchbauer
version = 1.0
description = This package includes a simple alert script that sends Splunk alerts as notifications to a Growl deamon over network (UDP). Please do not install this as an app in Splunk.

[package]
id = growl_script

[install]
state = disabled
state_change_requires_restart = false
is_configured = false
build=1

[ui]
is_visible = false
is_manageable = false
label = Growl Notification Script