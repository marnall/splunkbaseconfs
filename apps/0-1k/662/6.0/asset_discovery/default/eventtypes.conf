# eventtypes.conf

[ping_scan]
search = index=asset_discovery "Host:" "Status:"

[port_scan]
search = index=asset_discovery sourcetype=port_scan "Host:" "Ports:" "Ignored State:"

[nmap]
search = sourcetype=port_scan dest_port=*
#tags = os config report listening port

[nmap_system_version]
search = sourcetype=port_scan os_signature=*
#tags = system version
