# transforms.conf

[nmap_portinfo]
SOURCE_KEY = port_signature
MV_ADD = True
REGEX = (\d+)\/(\w+)\/(\w+)\/([^\/]*)\/([^\/]+)\/([^\/]*)\/([^\/]*)\/,?
FORMAT = dest_port::$1 dest_port_state::$2 transport::$3 owner::$4 app::$5 sunrpc_info::$6 app_version::$7

#Host: 127.0.0.1 (localhost) Ports: 22/open/tcp//ssh//OpenSSH 5.2 (protocol 2.0)/, 631/open/tcp//ipp//CUPS 1.4/, 8000/open/tcp//http//CherryPy httpd 3.1.2/, 8002/open/tcp//http//CherryPy httpd 3.1.2/, 8089/open/tcp//ssl|http//Splunkd httpd/ OS: Apple Mac OS X 10.5 - 10.6.3 (Leopard - Snow Leopard) (Darwin 9.0.0 - 10.3.0) Seq Index: 253  IP ID Seq: Randomized

[geoip_internal]
filename = geoip_internal.csv
match_type = CIDR(dest_ip)
