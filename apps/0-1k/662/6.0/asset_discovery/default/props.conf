# props.conf

[source::nmap]
SHOULD_LINEMERGE = False
EXTRACT-nmap_ping = (?i)^Host: (?<dest_ip>\S+)\s+\((?<dest_host>\S*)\)\s+Status: (?<status>(Up|Down))\s*$

[port_scan]
EXTRACT-nmap_full = (?i)^Host: (?<dest_ip>\S+)\s+\((?<dest_host>\S*)\)\s+Ports: (?<port_signature>.*?)(?:\s+Ignored State: \w+ \(\d*\))*(?:\s+OS:\s+(?<os_signature>.*?))*(?:\s+Seq Index:\s+(?<seq_index>\d+))*(?:\s+IP ID Seq: (?<ip_id>.*?))*(?:\s+Status:\s+(?<status>(Up|Down)))*$
REPORT-nmap_portinfo = nmap_portinfo
FIELDALIAS-os = os_signature as os
FIELDALIAS-dest = dest_ip as dest

#Host: 127.0.0.1 (localhost) Ports: 22/open/tcp//ssh//OpenSSH 5.2 (protocol 2.0)/, 631/open/tcp//ipp//CUPS 1.4/, 8000/open/tcp//http//CherryPy httpd 3.1.2/, 8002/open/tcp//http//CherryPy httpd 3.1.2/, 8089/open/tcp//ssl|http//Splunkd httpd/ OS: Apple Mac OS X 10.5 - 10.6.3 (Leopard - Snow Leopard) (Darwin 9.0.0 - 10.3.0) Seq Index: 253  IP ID Seq: Randomized
