[vimeo]
BREAK_ONLY_BEFORE=^channel=
TIME_PREFIX=<upload_date>
MAX_TIMESTAMP_LOOKAHEAD=1200
EXTRACT-dscription=(?m)<description>(?<description>.*?)</description>
EXTRACT-userurl=(?m)<user_url>(?<user_url>.*?)</user_url>
EXTRACT-username=(?m)<user_name>(?<user_name>.*?)</user_name>
EXTRACT-mobileurl=(?m)<mobile_url>(?<mobile_url>.*?)</mobile_url>
EXTRACT-url=(?m)<url>(?<url>.*?)</url>
EXTRACT-title=(?m)<title>(?<title>.*?)</title>
EXTRACT-tags=(?m)<tags>(?<tags>.*?)</tags>
EXTRACT-vimeoid=(?m)<id>(?<id>.*?)</id>

