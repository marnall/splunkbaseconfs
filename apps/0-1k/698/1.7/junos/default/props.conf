[junos]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^\w{3}\s\d+\s\d{2}:\d{2}:\d{2}\s[^\s]+\s(\w+\s)?
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
FIELDALIAS-zones = inbound_interface AS src_zone outbound_interface AS dest_zone
FIELDALIAS-policies = policy_name AS policy_id
REPORT-junos = junos1,junos2,junos3,junos4,junos5,junos6

[juniper_syslog]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^\w{3}\s\d+\s\d{2}:\d{2}:\d{2}\s[^\s]+\s(\w+\s)?
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
REPORT-juniper_syslog = junos1,junos2,junos3,junos4,junos5,junos6
