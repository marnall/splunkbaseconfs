[easylistfilter-command]
syntax = easylistfilter
shortdesc = Filters events based on the easylist ad server list, as used by Adblock.
description = Every 24 hours, a scripted input downloads the public easylist ad server list as used by Adblock. The easylistfilter command will remove results from a search that match this list.
default = easylistfilter
example1 = ... | easylistfilter
example2 = ... | easylistfilter field="url"
commentcheat = Filters out events that contain ad server urls.
examplecheat = easylistfilter
category = filter
maintainer = vbumgarner
usage = public
appears-in=4.1
tags = filter ads adblock easylist
related = regex

