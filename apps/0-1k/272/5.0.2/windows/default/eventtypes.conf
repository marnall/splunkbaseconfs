[windows_performance]
search = sourcetype="powershell" OR sourcetype="Perfmon:*" OR sourcetype="WMI:Perfmon*"

[windows_events]
search = sourcetype="WMI:WinEventLog*" OR sourcetype="WinEventLog*"

[Update_Successful]
search = sourcetype="WindowsUpdateLog" "Content Install" "Installation Successful"

[Update_Failed]
search = sourcetype="WindowsUpdateLog" Failure "Content Install" "Installation Failure"
