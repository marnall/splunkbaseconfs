search = NOT [ search source="*\windowsupdate.log" Success "Content Install" "Installation Successful" | dedup package | fields + host, package ] source="*\windowsupdate.log" Failure "Content Install" "Installation Failure" package=* | stats count, max(_time) as latest_failure_time by host,package | sort - latest_failure_time | convert ctime(latest_failure_time) | eval kb_details="KB".package." (Total Fails=".tostring(count).") (Last Failure at:".latest_failure_time.")" | stats sum(count) as total_fails, values(kb_details) as latest_fail_details by host

