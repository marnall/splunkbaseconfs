[module]
className = Splunk.Module.WindowsMonitoringPostProcess
superClass = Splunk.Module.DispatchingModule
description = Adds a post-process search into the data tree with WindowsMonitoring var substitution from variables in context. Otherwise this is the same as HiddenPostProcess. It requires that WindowsMonitoringCommon be present at the top of the view. 

[param:search]
required = True
label = Set a post processing query, declare substitutions with WindowsMonitoring var substitution style names, i.e. $displayName.valueName$.
