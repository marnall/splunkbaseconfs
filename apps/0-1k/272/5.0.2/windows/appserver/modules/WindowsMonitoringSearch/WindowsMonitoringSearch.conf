[module]
className = Splunk.Module.WindowsMonitoringSearch
superClass = Splunk.Module
description = Basically an easier version of HiddenSearch, modify the context using WindowsMonitoring style variable substitution, which is functionally like stringrep intentions. It requires that WindowsMonitoringCommon be present at the top of the view. 

[param:search]
required = True
label = The literal search string WindowsMonitoringSearch passes onto its child modules after performing WindowsMonitoring style variable substitution.
