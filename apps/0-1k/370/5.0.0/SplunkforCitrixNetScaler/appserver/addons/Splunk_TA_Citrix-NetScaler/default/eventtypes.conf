[netscaler]
search = index=netscaler 

[netscaler_appflow]
search = eventtype=netscaler sourcetype=appflow

[netscaler_syslog]
search = eventtype=netscaler sourcetype=ns_log

[netscaler_app_fw]
search = eventtype=netscaler_syslog log_type=APPFW

[netscaler_session]
search = eventtype=netscaler src_ip="*" dest_ip="*"