[setnull]
REGEX = echo\soff
DEST_KEY = queue
FORMAT = nullQueue

[get_temp]
REGEX = <Temperature>\s(\d+)\s
FORMAT = temp::$1

[get_dewpoint]
REGEX = <DewPoint>\s(\d+)\s
FORMAT = dew::$1

[get_relativehumidity]
REGEX = <RelativeHumidity>\s(\d+)\%
FORMAT = humidity::$1

[get_pressure]
REGEX = <Pressure>\s(\d+.\d+)\s
FORMAT = press::$1

[get_city]
REGEX = <Location>(\w+),\s
FORMAT = city::$1

[countrylookup]
external_cmd = countrylookup.py city country
external_type = python
fields_list = city, country