<div id='inspectPopup' style="display: none; padding:10px 16px 10px 16px; width: 400px;">
	<br>
	<table style='width: 100%;'>
		<tr>
			<td style='width: 33%; text-align: center;'>
				<input id='DeepSeeBtn' type='button' value='Go to DeepSee™' class='splButton-secondary' style='width: 100%;'>
			</td>
			<td style='width: 33%; text-align: center;'>
				<input id='PcapBtn' type='button' value='Download PCAP' class='splButton-secondary' style='width: 100%;'>
			</td>
			<td style='width: 33%; text-align: center;'>
				<input id='customDeepSeeBtn' type='button' value='Custom' class='splButton-secondary' style='width: 100%;'>
			</td>
		</tr>
	</table>
	<br>

	<div id='customDeepSee' style='display: none; padding: 10px;'>
		<hr style='color:#ccc; background-color:#ccc; height:1px; border:none;'>
		<br>
		<table style='width: 100%;'>
			<tr>
				<td style='width: 25%;'>
					Action:
				</td>
				<td style='width: 75%;'>
					<select name='SoleraAction' style='width: 270px'>
						<option value='deepsee'>Go to DeepSee™
						<option value='pcap'>Download PCAP
					</select>
				</td>
			</tr>
			<tr>
				<td style='width: 25%;'>
					Start Time:
				</td>
				<td style='width: 75%;'>
					<table style='width: 270px;'>
						<tr class='soleraTimeRange'>
							<td>
								<input type="text" style="width: 20px;" name="stt_month" id="start_month" value=''>&nbsp;
								<input type="text" style="width: 20px;" name="stt_day" id="start_day" value=''>&nbsp;
								<input type="text" style="width: 40px;" name="stt_year" id="start_year" value=''>
							</td>
							<td>
								<input type="text" style="width: 20px;" name="stt_hour" id="start_hour" value=''>&nbsp;
								<input type="text" style="width: 20px;" name="stt_minute" id="start_minute" value=''>&nbsp;
								<input type="text" style="width: 20px;" name="stt_second" id="start_second" value=''>
							</td>
						</tr>
					</table>
				</td>
			</tr>
			<tr>
				<td style='width: 25%;'>
					Stop Time:
				</td>
				<td style='width: 75%;'>
					<table style='width: 270px;'>
						<tr class='soleraTimeRange'>
							<td style='vertical-align: top;'>
								<input type="text" style="width: 20px;" name="stp_month" id="stop_month" value="">&nbsp;
								<input type="text" style="width: 20px;" name="stp_day" id="stop_day" value="">&nbsp;
								<input type="text" style="width: 40px;" name="stp_year" id="stop_year" value="">
							</td>
							<td>
								<input type="text" style="width: 20px;" name="stp_hour" id="stop_hour" value="">&nbsp;
								<input type="text" style="width: 20px;" name="stp_minute" id="stop_minute" value="">&nbsp;
								<input type="text" style="width: 20px;" name="stp_second" id="stop_second" value="">
							</td>
						</tr>
					</table>
				</td>
			</tr>
			<tr>
				<td style='width: 25%;'>
					IP Protocol:
				</td>
				<td style='width: 75%;'>
					<select name='SoleraProtocol' style='width: 270px;'>
						<option value='tcp'>TCP
						<option value='udp'>UDP
					</select>
				</td>
			</tr>
			<tr>
				<td style='width: 25%;'>
					Source:
				</td>
				<td style='width: 75%;'>
					<input type='text' id='SoleraSourceAddress' name='SoleraSourceAddress' style='width: 170px;'>
					:
					<input type='text' id='SoleraSourcePort' name='SoleraSourcePort' style='width: 60px;'>
				</td>
			</tr>
			<tr>
				<td style='width: 25%;'>
					Destination:
				</td>
				<td style='width: 75%;'>
					<input type='text' id='SoleraDestinationAddress' name='SoleraDestinationAddress' style='width: 170px;'>
					:
					<input type='text' id='SoleraDestinationPort' name='SoleraDestinationPort' style='width: 60px;'>
				</td>
			</tr>
		</table>
		<br>
	</div>
</div>
