# Custom log file extractions to deal with Zope log files

# TRACE.LOG

# Here we are extracting fields from trace logs
# B 24318960 2008-09-02T22:09:45 GET /myurl
# I 24318960 2008-09-02T22:09:45 0
# A 24318960 2008-09-02T22:10:11 503 841
# E 24318960 2008-09-02T22:10:11 
# 
# We only care about elapsed time for now

[tracelog-extractions]
REGEX = ([A-Z]{1})\s+(\d+)\s+\d+-\d+-\d+T\d+:\d+:\d+\s+(.*)$
FORMAT = entrytype::$1 req_id::$2 metric::$3 


# We are extracting the most important fields from a Zope trac.log after it has been handled by requestprofiler.py
# requestprofiler.py --detailed --verbose
# 
# We are naming the fields to be consistent with access_common: status, bytes, req_time
# Raw fields from requestprofiler: Start  WIn WOut WEnd Tot S   OSize Code  Act URL
