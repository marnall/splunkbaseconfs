[scom_input]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]---endofevent---[\r\n]+)
TRANSFORMS-FIELDS = scom-alert-host, scom-alert-source, scom-alert-sourcetype, scom-event-host, scom-event-source, scom-event-sourcetype

[source::SCOM...]
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD=30
LINE_BREAKER = ([\r\n](?=\d\d/\d\d/\d\d \d\d:\d\d:\d\d [aApPmM]{2}))
REPORT-MESSAGE = wel-message, wel-eq-kv, wel-col-kv
KV_MODE=none
