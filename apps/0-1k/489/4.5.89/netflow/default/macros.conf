[basesearch_20064(9)]
args = exp_ip,nfo_hostname,advanced_filter,exp_group,src_ip,dest_ip,dest_port,protocol_name,span_token
definition = `netflow_search_rule_20064` exp_ip="$exp_ip$" nfo_hostname="$nfo_hostname$"          \
              | `sampling(bytes)`                                                                 \
              | eventstats sum(bytes) as sum_by_exp by exp_ip nfo_hostname                        \
              | search $advanced_filter$                                                          \
              | lookup `is_local_lookup` exporters_devices_lookup nfo_hostname exp_ip OUTPUT device_group AS exp_group           \
              | search exp_group="$exp_group$"  (src_ip="$src_ip$" OR src_host="$src_ip$")        \
                 (dest_ip="$dest_ip$" OR dest_host="$dest_ip$") dest_port="$dest_port$"           \
              | fillnull value="" transport                                                       \
              | search transport="$protocol_name$"                                                \
              | bin _time $span_token$                                                            \
              | stats sum(bytes) as sum_bytes sum(bytes_in) as sum_bytes_in                       \
                  sum(bytes_out) as sum_bytes_out sum(packets_in) as sum_packets_in               \
                  sum(packets_out) as sum_packets_out sum(flow_count) as sum_flow_count           \
                  by nfo_hostname exp_ip src_ip src_host dest_ip dest_port dest_host transport    \
                      flow_smpl_id sum_by_exp _time                                               \
              | `sampling(sum_bytes_in)`                                                          \
              | `sampling(sum_bytes_out)`                                                         \
              | `sampling(sum_packets_in)`                                                        \
              | `sampling(sum_packets_out)`                                                       \
              | `sampling(sum_flow_count)`
iseval = 0

[traffic_by_host_pairs_table(2)]
args = span_int,range
definition =| `format_ip_column(src_ip,src_ip,src_host)`                                          \
            | `format_ip_column(dest_ip,dest_ip,dest_host)`                                       \
            | eval avgbits= sumbytes*8/($span_int$)                                               \
            | eval avgbits_in= sumbytesin*8/($span_int$)                                          \
            | eval avgbits_out= sumbytesout*8/($span_int$)                                        \
            | stats sum(sumbytes) as TrafficAmount                                                \
                    sum(sumbytesin) as TrafficAmountIn                                            \
                    sum(sumbytesout) as TrafficAmountOut                                          \
                    sum(sumpacketsin) as PacketsAmountIn                                          \
                    sum(sumpacketsout) as PacketsAmountOut                                        \
                    sum(sumflowcount) as Connections                                              \
                    max(avgbits) as MaxTraffic                                                    \
                    max(avgbits_in) as MaxTrafficIn                                               \
                    max(avgbits_out) as MaxTrafficOut                                             \
                        by  exp_ip nfo_hostname sum_by_exp  src_ip server_port dest_ip            \
            | sort 0 - TrafficAmount                                                              \
            | eval pct = TrafficAmount*100/sum_by_exp                                             \
            | `commas_formatting(pct, pct, 2)`                                                    \
            | head 100                                                                            \
            | eval AverageSpeed=(TrafficAmount)*8/$range$                                         \
            | eval AverageSpeedIn=(TrafficAmountIn)*8/$range$                                     \
            | eval AverageSpeedOut=(TrafficAmountOut)*8/$range$                                   \
            | eval PacketsSpeedIn=(PacketsAmountIn)/$range$                                       \
            | eval PacketsSpeedOut=(PacketsAmountOut)/$range$                                     \
            | eval TrafficSpeedIn=AverageSpeedIn/1000000                                          \
            | eval TrafficAmountIn=TrafficAmountIn/1024/1024                                      \
            | eval MaxTrafficIn=MaxTrafficIn/1000000                                              \
            | eval TrafficSpeedOut=AverageSpeedOut/1000000                                        \
            | eval TrafficAmountOut=TrafficAmountOut/1024/1024                                    \
            | eval MaxTrafficOut=MaxTrafficOut/1000000                                            \
            | `commas_formatting(Average Mbps received, TrafficSpeedIn, 2)`                       \
            | `commas_formatting(Max Mbps received, MaxTrafficIn, 2)`                             \
            | `commas_formatting(Total Traffic MB received, TrafficAmountIn, 2)`                  \
            | `commas_formatting(Average Mbps sent, TrafficSpeedOut, 2)`                          \
            | `commas_formatting(Max Mbps sent, MaxTrafficOut, 2)`                                \
            | `commas_formatting(Total Traffic MB sent, TrafficAmountOut, 2)`                     \
            | `commas_formatting(Average Packets/s received, PacketsSpeedIn, 2)`                  \
            | `commas_formatting(Total Packets received, PacketsAmountIn)`                        \
            | `commas_formatting(Average Packets/s sent, PacketsSpeedOut, 2)`                     \
            | `commas_formatting(Total Packets sent, PacketsAmountOut)`                           \
            | `commas_formatting(Total Connections, Connections)`                                 \
            | `get_exporter_name(exp_ip_name)`                                                    \
            | table nfo_hostname exp_ip_name dest_ip server_port src_ip "Max Mbps received"       \
                "Average Mbps received" "Total Traffic MB received" "Max Mbps sent"               \
                "Average Mbps sent" "Total Traffic MB sent" pct "Average Packets/s received"      \
                "Total Packets received" "Average Packets/s sent" "Total Packets sent"            \
                "Total Connections"                                                               \
            | rename nfo_hostname as "NFO"                                                        \
            | rename exp_ip_name as "Device"                                                      \
            | rename dest_ip as "Server"                                                          \
            | rename src_ip as "Client"                                                           \
            | rename server_port as "Server port"                                                 \
            | rename pct as "% of Total"
iseval = 0

[basesearch_20367(10)]
args = nfo_hostname,gcp_project_id,gcp_exp,advanced_filter,src_vm_name,src_port,dest_vm_name,dest_port,protocol_name,span_token
definition = `netflow_search_rule_20367` nfo_hostname="$nfo_hostname$" gcp_exp="$gcp_project_id$*" gcp_exp="$gcp_exp$"   \
              | fillnull value="" transport src_host src_vm_name dest_host dest_vm_name src_vm_zone dest_vm_zone src_vpc_name dest_vpc_name \
              | eventstats sum(bytes_in) as sum_by_subnet by nfo_hostname gcp_exp         \
              | search $advanced_filter$                                                       \
              | search (src_vm_name="$src_vm_name$" OR src_ip="$src_vm_name$")           \
                (dest_vm_name="$dest_vm_name$" OR dest_ip="$dest_vm_name$")              \
                src_port="$src_port$" dest_port="$dest_port$"                                  \
              | search transport="$protocol_name$"                                             \
              | bin _time $span_token$                                                         \
              | stats sum(bytes_in) as sum_bytes_in sum(packets_in) as sum_packets_in sum(flow_count) as sum_flow_count \
                  by nfo_hostname gcp_exp src_ip src_vm_name src_port src_host    \
                    dest_ip dest_vm_name dest_port dest_host src_vpc_name dest_vpc_name                     \
                    src_vm_zone dest_vm_zone transport protocol_id sum_by_subnet _time

[gcp_traffic_by_source_table(2)]
