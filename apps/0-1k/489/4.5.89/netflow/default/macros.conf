            | lookup `is_local_lookup`  ta_netflow_protocol_lookup protocol_id as protocol_ts OUTPUT  transport \
            | search transport="$protocol_name$"  \
            | strcat app_name " (" app_id "/" dest_port ")"  app_string
iseval = 0

[dedup_timechart_events]
definition =  fillnull value="" input_snmp \
            | dedup src_ip src_port dest_ip dest_port transport _time

[dedup_timechart_ts]
definition = dedup src_ip src_port dest_ip dest_port protocol_ts _time

[is_local_lookup]
definition = local=false

[show_unconnected(2)]
args = nfo_hostname,advanced_filter
definition =  append\
            [ search `netflow_search_rule_20701`   nfo_hostname="$nfo_hostname$"  $advanced_filter$ \
              | eventstats max(_time) as maxtime\
              | eval mintime=maxtime-10 \
              | where _time > mintime \
              | eval from=mgmt_ip\
              | eval type="customimage" \
              | eval group=if(isnotnull(device_group),device_group,group) \
              | lookup `is_local_lookup` topology_icons_lookup group OUTPUT icon as customurl \
            ]

[show_connected]
definition =  append \
    [ search `netflow_search_rule_20702` \
| eventstats max(_time) as maxtime \
| eval mintime=maxtime-10 \
| where _time > mintime \
| rename dest_ip as from \
    | eval type="customimage" \
    | lookup local=false topology_icons_lookup group OUTPUT icon as customurl ]