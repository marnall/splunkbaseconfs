[tstats_20062_traffic_complete(10)]
args = exp_ip,nfo_hostname,advanced_filter,exp_group,src_ip,src_port,dest_ip,dest_port,protocol_name,span_token
definition = tstats sum(PREFIX(bytes_in=)) as sum_bytes_in sum(PREFIX(bytes_out=)) as sum_bytes_out              \
                    sum(PREFIX(packets_in=)) as sum_packets_in sum(PREFIX(packets_out=)) as sum_packets_out      \
                    sum(PREFIX(flow_count=)) as sum_flow_count avg(PREFIX(duration=)) as avg_duration            \
             where `netflow_search_rule_20062` TERM(exp_ip=$exp_ip$)  nfo_hostname="$nfo_hostname$"              \
                (TERM(src_ip=$src_ip$) OR TERM(src_host=$src_ip$)) $advanced_filter$                             \
