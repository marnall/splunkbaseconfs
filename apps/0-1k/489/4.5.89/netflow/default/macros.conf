[basesearch_20867(10)]
args = exp_ip,nfo_hostname,advanced_filter,exp_group,src_ip,src_port,dest_ip,dest_port,protocol_name,span_token
definition = `netflow_search_rule_20867` exp_ip="$exp_ip$" nfo_hostname="$nfo_hostname$" \
                                | eval bytes = bytes_in + bytes_out \
                                | `sampling(bytes)` \
                                | eventstats sum(bytes) as sum_by_exp by exp_ip nfo_hostname \
                                | search $advanced_filter$ \
                                | lookup `is_local_lookup` exporters_devices_lookup exp_ip OUTPUT device_group AS exp_group \
                                | search exp_group="$exp_group$" (src_ip="$src_ip$" OR src_host="$src_ip$") \
                                (dest_ip="$dest_ip$" OR dest_host="$dest_ip$") \
                                src_port="$src_port$" dest_port="$dest_port$" \
                                | fillnull value="" transport \
                                | search transport="$protocol_name$" \
                                | bin _time $span_token$ \
                                | stats sum(bytes_in) as sum_bytes_in sum(packets_in) as sum_packets_in \
                                sum(bytes_out) as sum_bytes_out sum(packets_out) as sum_packets_out \
                                sum(flow_count) as sum_flow_count avg(tcp_duration) as avg_tcp_duration \
                                        by nfo_hostname exp_ip src_ip src_port src_host dest_ip dest_port dest_host transport \
                                flow_smpl_id sum_by_exp _time \
                                | `sampling(bytes_in)` \
                                | `sampling(sum_packets_in)` \
                                | `sampling(bytes_out)` \
                                | `sampling(sum_packets_out)` \
                                | `sampling(sum_flow_count)`

