            | rename pct as "% of Total"

[gcp_traffic_bubble_dest]
definition = | search dest_vm_name!=""                                                            \
            | eventstats latest(src_host) as l_src_host by nfo_hostname gcp_exp src_ip            \
            | eventstats latest(dest_host) as l_dest_host by nfo_hostname gcp_exp dest_ip         \
            | eval l_src_host = src_vm_name ."/". l_src_host                                      \
            | eval l_dest_host = dest_vm_name ."/". l_dest_host                                   \
            | `format_ip_column(src_ip_string, src_ip, l_src_host)`                               \
            | `format_ip_column(dest_ip_string, dest_ip, l_dest_host)`                            \
            | stats dc(src_ip_string) as "# of Source IPs"                                        \
                sum(sum_bytes_in) as "Total Bytes" sum(sum_flow_count) as "Flow Count"            \
                    by dest_ip_string                                                             \
            | sort - "Total Bytes"                                                                \
            | head 25                                                                             \
            | table dest_ip_string "# of Source IPs" "Flow Count" "Total Bytes"
            
[gcp_traffic_bubble_src]
definition = | search src_vm_name!=""                                                             \
            | eventstats latest(src_host) as l_src_host by nfo_hostname gcp_exp src_ip            \
            | eventstats latest(dest_host) as l_dest_host by nfo_hostname gcp_exp dest_ip         \
            | eval l_src_host = src_vm_name ."/". l_src_host                                      \
            | eval l_dest_host = dest_vm_name ."/". l_dest_host                                   \
            | `format_ip_column(src_ip_string, src_ip, l_src_host)`                               \
            | `format_ip_column(dest_ip_string, dest_ip, l_dest_host)`                            \
            | stats dc(dest_ip_string) as "# of Destination IPs"                                  \
                sum(sum_bytes_in) as "Total Bytes" sum(sum_flow_count) as "Flow Count"            \
                    by src_ip_string                                                              \
            | sort - "Total Bytes"                                                                \
            | head 25                                                                             \
            | table src_ip_string "# of Destination IPs" "Flow Count" "Total Bytes"
            
