[basesearch_20467(9)]
args = nfo_hostname,exp_ip,advanced_filter,src_vm,src_port,dest_vm,dest_port,protocol_name,span_token
definition = `netflow_search_rule_20467` nfo_hostname="$nfo_hostname$" exp_ip="$exp_ip$"                    \
            | eventstats sum(bytes) as sum_by_exp by nfo_hostname exp_ip                        \
            | search $advanced_filter$                                                          \
            | search src_port="$src_port$" (src_ip="$src_vm$" OR src_vm_name="$src_vm$")        \
             (dest_ip="$dest_vm$" OR dest_vm_name="$dest_vm$") dest_port="$dest_port$"          \
            | fillnull value="" transport src_vm_name dest_vm_name src_region dest_region src_service dest_service \
            | search transport="$protocol_name$"                                                \
            | eval vnet_name=case(direction == "inbound", dest_vnet_name, direction == "outbound", src_vnet_name) \
            | bin _time $span_token$                                                            \
            | stats sum(bytes) as sum_bytes sum(bytes_in) as sum_bytes_in                       \
              sum(bytes_out) as sum_bytes_out sum(packets) as sum_packets sum(packets_in) as sum_packets_in \
              sum(packets_out) as sum_packets_out sum(flow_count) as sum_flow_count             \
              by nfo_hostname exp_ip vnet_name src_ip src_port src_vm_name dest_ip dest_port dest_vm_name \
                 src_region dest_region src_service dest_service direction transport sum_by_exp _time      
iseval = 0

[set_span]
definition = head 1                                                                               \
            | addinfo                                                                             \
            | eval range = if(info_max_time="+Infinity",3600,info_max_time-info_min_time)         \
            | eval span = if(range<3600,"span=30s","span=" . round(range/120) . "s")              \
            | eval span_int=if(range<3600,30,round(range/120))                                    \
            | eval all_time_latest=if(info_max_time="+Infinity",_time,info_max_time)              \
            | eval all_time_earliest=if(info_max_time="+Infinity",_time-3600,info_min_time)       \
            | eval t_int_seconds = round(t_int/1000)

[traffic_bubble]
