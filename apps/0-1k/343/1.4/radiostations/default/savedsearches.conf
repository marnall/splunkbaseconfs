[radio - stats last song artist by name]
action.email.reportServerEnabled = 0
alert.track = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = sample_search
request.ui_dispatch_view = sample_search
search = sourcetype="radiostations_entry"|stats last(song) as Song last(artist) as Artist by name|rename name as Station
vsid = guzq8nlv

