[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/players]
sourcetype = players
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/Regular]
sourcetype = game_events_regular
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/Allstar]
sourcetype = game_events_allstar
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/SpringS]
sourcetype = game_events_spring
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/SpringE]
sourcetype = game_events_spring
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/LDS]
sourcetype = game_events_playoff
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/LCS]
sourcetype = game_events_playoff
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/datastore/game_events/WS]
sourcetype = game_events_playoff
index = mlb_stat

[monitor://$SPLUNK_HOME/etc/apps/MLB_stat/bin/RSS_log/RSS_MLB.log]
disabled = false
followTail = 0
sourcetype = RSS_MLB
index = mlb_stat

[script://$SPLUNK_HOME/etc/apps/MLB_stat/bin/getMLBRSS.sh]
interval = 300
sourcetype = RSS_MLB
index = mlb_stat

