[RSS_MLB_team_ratio_24hr]
action.email.reportServerEnabled = 0
alert.track = 1
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = index=MLB_stat sourcetype = RSS_MLB NOT content="" earliest=-24h@h | dedup title | stats count by team
vsid = *:gnjwy6lm

[RSS_MLB_team_ratio_alltime]
action.email.reportServerEnabled = 0
alert.track = 1
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = index=MLB_stat sourcetype = RSS_MLB NOT content="" | dedup title | stats count by team
vsid = *:gnjwzl59

[RSS_TITLE_LIST]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.track = 1
cron_schedule = */5 * * * *
displayview = flashtimeline
enableSched = 1
request.ui_dispatch_view = flashtimeline
search = [|search index=MLB_stat sourcetype = RSS_MLB NOT content="" earliest=-24h@h | script python tableRecentRSS] | search index=MLB_stat sourcetype = RSS_MLB NOT content="" earliest=-24h@h | dedup title | table _time, title, content
vsid = gnjx564a

[Fetch_gameday]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.suppress = 0
alert.track = 1
cron_schedule = 0 */12 * * *
description = Fetching players.xml and game_events.xml from MLB gameday database with update mode.
enableSched = 1
search = |script python fetch_MLB_player_gameevent -update
vsid = *:xnok5ydh

[get_atbat_event_category]
action.email.inline = 1
action.summary_index = 1
alert.suppress = 0
alert.track = 1
cron_schedule = 0 0 * * *
displayview = flashtimeline
enableSched = 1
realtime_schedule = 0
search = index=MLB_stat sourcetype=game_events_regular atbat | dedup event | sort event
vsid = *:yp9c8brq
