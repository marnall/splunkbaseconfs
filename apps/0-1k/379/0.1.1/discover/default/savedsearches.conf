[concurrent search report (assumes dual core)]
search =  index=_audit action=search ( info=granted OR info=completed) | eval user=if(user="n/a", null, user) | stats last(user) as user first(total_run_time) as run_time last(_time) as _time by search_id | concurrency duration=run_time | eval cpus=[search earliest=1 index=_internal sourcetype="splunkd"  log_level="INFO" component="loader" detected | head 1 | rex "(?i)Detected (?P<cpus>[^ ]+)" | rename cpus as search | fields - _* | fields search] | eval max_concurrent_searches=(cpus*2*4) + 4| timechart perc95(concurrency) max(concurrency) first(max_concurrent_searches) as "max concurrent searches"
earliest_time = -4h@h
earliest_time = now


[report suggester example search]
search =  | inputlookup suggested_reports | appendcols [search index=_internal source=*metrics.log group=per_sourcetype_thruput | head 10000 | `field_characteristics(series)`] | streamstats first(has_high_dc) as has_high_dc first(is_numeric) as is_numeric | eval numeric_score=if(is_numeric=1,numeric, categorical) | eval dc_score=if(has_high_dc=1, high_dc, low_dc)  | eval total_score=numeric_score+dc_score | search total_score>2 numeric_score>0 dc_score>0 | sort - total_score | fields search total_score is_numeric has_high_dc numeric categorical high_dc low_dc numeric_score dc_score 

