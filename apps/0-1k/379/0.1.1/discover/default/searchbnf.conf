##################
# tune
##################
[tune-command]
syntax = tune (EVENTTYPES | MACROS | REXES | SAVEDSEARCHES) (OWNER=<string:admin>)? (NAMESPACE=<string:none>)?
shortdesc = returns information useful to tuning-up an app.
description = returns information useful to tuning-up an app by looking at the search history.
comment1 = find searches that are run often but not saved
example1 = ... | tune savedsearches
comment2 = find frequent rex commands, possibly to be make into fields, for all apps
example2 = ... | tune rexes namespace=none
comment3 = find frequent search arguments as possible eventtypes, and get stats on the number of ORs, ANDs, and NOTs.
example3 = ... | tune eventtypes | searchstats
usage = public app
appears-in = 4.1
maintainer = david
tags = tuneup, clean, app, improve, discover
category = discovery
related = discover

##################
# discover
##################
[discover-command]
syntax = discover (FIELDS | TAGS) (OWNER=<string:admin>)? (NAMESPACE=<string:none>)?
shortdesc = returns information useful to discovering fields and tags.
description = returns information useful to discovering unextracted fields and tags (host and eventtype).
comment1 = find fields the app might want to extract as fields
example1 = ... | discover fields
comment2 = cluster hosts and eventtypes to find set of values that you might want to tag as the same, for all apps.
example2 = ... | discover tags namespace=none
usage = public app
appears-in = 4.1
maintainer = david
tags = tuneup, clean, app, improve, discover
category = discovery
related = tune


##################
# searchstats
##################
[searchstats-command]
syntax = searchstats (FIELD=<field:search>)?
shortdesc = returns statistical information about search strings
description = returns statistical information about search strings found in FIELD (defaults to "search").
comment1 = returns stats about saved searches
example1 = | entity saved/searches | searchstats
usage = public app
appears-in = 4.1
maintainer = david
tags = stats, search, discover, tuneup
category = discovery
related = entity


##################
# entity
##################
[entity-command]
syntax = entity <rest-endpoint> (OWNER=<string:admin>)? (NAMESPACE=<string:none>)?
shortdesc = returns values from rest endpoint provided
description = returns values from rest endpoint provided.
comment1 = returns stats about saved searches
example1 = | entity saved/searches | searchstats
usage = public app
appears-in = 4.1
maintainer = david
tags = stats, search, discover, tuneup, rest
category = discovery
related = searchstats
