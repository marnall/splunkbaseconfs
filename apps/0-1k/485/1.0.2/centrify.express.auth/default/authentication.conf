#
# This files needs to be installed in $SPLUNK_HOME/etc/system/local

[authentication]
authType = Scripted
authSettings = script

[script]
scriptPath = "$SPLUNK_HOME/bin/python" "$SPLUNK_HOME/etc/apps/centrify.express.auth/bin/cdcScripted.py"

[cacheTiming]
userLoginTTL    = 10s
getUserInfoTTL  = 1min
getUsersTTL     = 2mins
