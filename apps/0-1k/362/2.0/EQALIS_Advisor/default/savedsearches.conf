[EQADVISOR - New License Violation]
action.email = 1
action.email.sendpdf = 0
action.email.sendresults = 1
action.email.to = support@eqalis.com
is_visible = 1
counttype = number of events
cron_schedule = 20 0 * * *
dispatch.earliest_time =
displayview = flashtimeline
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_view = flashtimeline
search = index=_internal source=*license_audit.log LicenseManager-Audit earliest=-1d@d | eval lastExceedSecs=now() - lastExceedDate | where lastExceedSecs < 86400 | dedup splunk_server
vsid = gamh0km2

[EQADVISOR - table of hosts not forwarding for n time]
action.email.sendpdf = 0
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = | metadata type=hosts | eval host=lower(host) | eval age = now() - lastTime | dedup host sortby age | where age > (86400) | tags | search NOT tag::host="inactive" | sort age d | convert ctime(lastTime) | fields age,host,lastTime
vsid = gamh79pt

[EQADVISOR - count hosts not forwarding for n time]
action.email.sendpdf = 0
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = | metadata type=hosts | eval host=lower(host) | eval age = now() - lastTime | dedup host sortby age | where age > (86400) | tags | search NOT tag::host="inactive" | stats count | rangemap field=count low=0-0 elevated=1-2 high=3-3 severe=4-100 default=severe
vsid = gamha0ua

[EQADVISOR - count of current license violations]
action.email.sendpdf = 0
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = index=_internal source=*license_audit.log LicenseManager-Audit | stats first by splunk_server | rename first(quotaExceededCount) as Violations | sort Violations d | head 1 | rangemap field=Violations low=0-0 elevated=1-2 high=3-3 severe=4-100 default=severe
vsid = gamjs24b

[EQADVISOR - Chart Percentage License Used Last Week]
action.email.sendpdf = 0
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = index=_internal source=*license_audit.log LicenseManager-Audit todaysBytesIndexed | eval PercentageUsed=round((todaysBytesIndexed/(licenseSize * 1024 * 1024) * 100), 0) | timechart span=1d values(PercentageUsed) by splunk_server
vsid = *:gao4ibus

