#
# Splunk EQALIS_Advisor app configuration file
#

[ui]
is_visible = 1
is_manageable = 1
label = EQALIS Advisor for Monitoring Splunk

[launcher]
author=support@eqalis.com
description = A Collection of Useful and alerts to help maintain your Splunk implementation. 
version=2.0

[package]
id = EQALIS_Advisor

[install]
state_change_requires_restart = true
is_configured = false
build = 10110813

[config:SetupEmail] 
# From version 4.1.3 this is superseded by setup.xml but leaving in for older installs.
targetconf = savedsearches.conf
targetstanza = EQADVISOR - New License Violation
targetkey = action.email.to
targetkeydefault = support@eqalis.com

