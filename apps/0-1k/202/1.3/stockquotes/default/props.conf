[source::stockquote_xml]
TIME_PREFIX = <StockQuotes><Stock><Symbol>\w+</Symbol><Last>\d+.\d+</Last><Date>
TIME_FORMAT = %m/%d/%Y</Date><Time>%I:%M%p
TRANSFORMS-set = setnull
REPORT-attributes = get_absolute_change, get_market_cap, get_change, get_earns

[stockquote_entry]
BREAK_ONLY_BEFORE = <StockQuotes>
EXTRACT-Symbol = (?i)<Symbol>(?P<Symbol>\w+)(?=<)
EXTRACT-Volume = (?i)<Volume>(?P<Volume>\d+)(?=<)
EXTRACT-Last=(?i)<Last>(?P<Last>\d+\.\d+)(?=<)
EXTRACT-Open=(?i)<Open>(?P<Open>\d+\.\d+)(?=<)
EXTRACT-High=(?i)<High>(?P<High>\d+\.\d+)(?=<)
EXTRACT-Low=(?i)<Low>(?P<Low>\d+\.\d+)(?=<)
EXTRACT-PreviousClose=(?i)<PreviousClose>(?P<PreviousClose>\d+\.\d+)(?=<)
EXTRACT-Name=(?i)<Name>(?P<Name>.*?)<








