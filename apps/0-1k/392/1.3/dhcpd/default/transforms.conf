### INDEX-TIME TRANSFORMS
 
# if enabled, the below transform will find any dhcpd: events coming 
# in from syslog-type inputs and reclassify the sourcetype as "dhcpd"
[set-dhcpd-sourcetype]
REGEX=\sdhcpd\:\s
DEST_KEY=MetaData:Sourcetype
FORMAT=sourcetype::dhcpd

### LOOKUPS

# if enabled, the below lookup maps mac addresses to hostnames
[dhcpd_mac-hostname]
filename=dhcpd_mac-hostname.csv

# if enabled, the below lookup maps mac prefixes to vendor names
[dhcpd_mac-vendorname]
filename=dhcpd_mac-vendorname.csv

[dhcpd_cef-lookup]
filename=dhcpd_cef-lookup.csv

### SEARCH-TIME FIELD EXTRACTIONS

[dhcpack_type1]
REGEX=\s(dhcpd)\:\s(DHCPACK)\son\s(\S+)\sto\s(\S+)\s(?:\(([^\)]+)\)\s)?via\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 src_mac::$4 src_host::$5 dest_int::$6

[dhcpack_type2]
REGEX=\s(dhcpd)\:\s(DHCPACK)\sto\s(\S+)\s(?:\(([^\)]+)\)\s)?via\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 src_mac::$4 dest_int::$5

[dhcpnak]
REGEX=\s(dhcpd)\:\s(DHCPNAK)\son\s(\S+)\sto\s(\S+)\svia\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 src_mac::$4 dest_int::$6

[dhcprequest]
REGEX=\s(dhcpd)\:\s(DHCPREQUEST)\sfor\s(\S+)\s(?:\(([^\)]+)\)\s)?from\s(\S+)\s(?:\(([^\)]+)\)\s)?via\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 src_nat_ip::$4 src_mac::$5 src_host::$6 dest_int::$7

[dhcpdiscover]
REGEX=\s(dhcpd)\:\s(DHCPDISCOVER)\sfrom\s(\S+)\s(?:\(([^\)]+)\)\s)?via\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_mac::$3 src_host::$4 dest_int::$5

[dhcpoffer]
REGEX=\s(dhcpd)\:\s(DHCPOFFER)\son\s(\S+)\sto\s(\S+)\s(?:\(([^\)]+)\)\s)?via\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 src_mac::$4 src_host::$5 dest_int::$6

[dhcpinform]
REGEX=\s(dhcpd)\:\s(DHCPINFORM)\sfrom\s(\S+)\svia\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 dest_int::$4

[dhcprelease]
REGEX=\s(dhcpd)\:\s(DHCPRELEASE)\sof\s(\S+)\sfrom\s(\S+)\s(?:\(([^\)]+)\)\s)?via\s(\S+)
FORMAT=process::$1 dhcp_message::$2 src_ip::$3 src_mac::$4 src_host::$5 dest_int::$6

[dhcp_forward_map_failed]
REGEX=\s(dhcpd)\:\sForward\smap\sfrom\s(\S+)\sto\s(\S+)\sFAILED\:\s([^\n]+)
FORMAT=process::$1 src_host::$2 src_ip::$3 reason::$4

[dhcp_added_reverse_map]
REGEX=\s(dhcpd)\:\sadded\sreverse\smap\sfrom\s(\S+)\sto\s(\S+)
FORMAT=process::$1 src_ip::$2 src_host::$3

[dhcp_added_forward_map]
REGEX=\s(dhcpd)\:\sAdded\snew\sforward\smap\sfrom\s(\S+)\sto\s(\S+)
FORMAT=process::$1 src_host::$2 src_ip::$3

[dhcp_removed_reverse_map]
REGEX=\s(dhcpd)\:\sremoved\sreverse\smap\son\s(\S+)
FORMAT=process::$1 src_ip::$2

[dhcp_leases]
REGEX=\s(dhcpd)\:\sWrote\s(\d+)\sleases
FORMAT=process::$1 lease_count::$2

[dhcp_decls]
REGEX=\s(dhcpd)\:\sWrote\s(\d+)\snew\sdynamic\shost\sdecls
FORMAT=process::$1 decl_count::$2

[dhcp_deleted_decls]
REGEX=\s(dhcpd)\:\sWrote\s(\d+)\sdeleted\shost\sdecls
FORMAT=process::$1 decl_count::$2

[dhcp_dyn_plus_stat_line1]
REGEX=\s(dhcpd)\:\sDynamic\sand\sstatic\sleases\spresent\sfor\s(\S+)
FORMAT=process::$1 src_ip::$2

[dhcp_dyn_plus_stat_line2]
REGEX=\s(dhcpd)\:\sRemove\shost\sdeclaration\s(\S+)\sor\sremove\s(\S+)
FORMAT=process::$1 src_host::$2 src_ip::$3

[dhcp_dyn_plus_stat_line3]
REGEX=\s(dhcpd)\:\sfrom\sthe\sdynamic\saddress\spool\sfor\s(\S+)
FORMAT=process::$1 dhcp_pool::$2

[dhcp_rrset_no_exists]
REGEX=\s(dhcpd)\:\sif\s(\S+)\sIN\sA\srrset\sdoesn\'t\sexist\sdelete\s\S+\sIN\sTXT\s\"([^\"]+)\"\:\s(\S+)
FORMAT=process::$1 src_host::$2 dhcid::$3 status::$4

[dhcp_rrset_exists]
REGEX=\s(dhcpd)\:\sif\s(\S+)\sIN\sTXT\s\"([^\"]+)\"\srrset\sexists\sand\s\S+\sIN\sA\s(\S+)\srrset\sexists\sdelete\s\S+\sIN\sA\s(?:[^\:]+)\:\s(\S+)
FORMAT=process::$1 src_host::$2 dhcid::$3 src_ip::$4 status::$5

[dhcp_duplicate]
REGEX=\s(dhcpd)\:\suid\slease\s(\S+)\sfor\sclient\s(\S+)\sis\sduplicate\son\s(\S+)
FORMAT=process::$1 src_ip::$2 src_mac::$3 dhcp_pool::$4

[dhcp_abandon_ip]
REGEX=\s(dhcpd)\:\sAbandoning\sIP\saddress\s([^\:]+)\:\s([^\n]+)
FORMAT=process::$1 src_ip::$2 reason::$3

[dhcp_icmp_reply_lease_valid]
REGEX=\s(dhcpd)\:\sICMP\sEcho\sreply\swhile\slease\s(\S+)
FORMAT=process::$1 src_ip::$2

[dhcp_xing_on]
REGEX=\s(dhcpd)\:\s(?:Sending|Listening)\son[\s\t]+([^\/]+)\/([^\/]+)\/([^\/]+)\/([^\n]+)
FORMAT=process::$1 adapter::$2 src_int::$3 src_mac::$4 dhcp_pool::$5

[src_mac_prefix]
SOURCE_KEY=src_mac
REGEX=^([^\:]+\:[^\:]+\:[^\:]+)
FORMAT=src_mac_prefix::$1

