[snmptrap]
SHOULD_LINEMERGE = true
REPORT-rsa = rsa-snmptrap-runtime, rsa-snmptrap-system, rsa-snmptrap-system-excp, rsa-snmptrap-admin
# lookup_table = eventcodes event OUTPUT explanation AS event_explanation
TRANSFORMS-change_sourcetype = change_sourcetype_rsa_runtime, change_sourcetype_rsa_system, change_sourcetype_rsa_admin

[rsa_runtime]
SHOULD_LINEMERGE = true
REPORT-rsa_runtime = rsa-snmptrap-runtime-two

[rsa_system]
SHOULD_LINEMERGE = true
REPORT-rsa_system = rsa-snmptrap-system-two

[rsa_admin]
SHOULD_LINEMERGE = true
REPORT-rsa_admin = rsa-snmptrap-admin-two

[snmpget]
TRANSFORMS-extract = rsa-hostoverride
