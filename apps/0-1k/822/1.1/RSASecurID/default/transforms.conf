[rsa-snmptrap-runtime]
REGEX = .*Timeticks: \((\d+)\).* STRING: \"(\S+)\".* STRING: \"(\d+)\".* STRING: \"(\S+) event \{ID: (\S+),.* client: (\S+), user: (\S+) \[ID: (\S+), session ID: (\S+), login name: (\S+), first name: (\S+), last name: (\S+), security domain ID: (\S+), identity source ID: (\S+)\], action: (\S+), action id: (\d+), result: (\S+), reason: (\S+), agent: (\S+) \[ID: (\S+), name: (\S+), address: (\S+), type: (\d+), security domain ID: (\S+)\], policy: (\S+) \[method ID: (\S+), policy ID: (\S+), method name: (\S+), policy expression: (\S+)\], arguments: \[(\S+), (\S+), (\S+), (\S+), (\S+), (\S+), (\S+), (\S+), (\S+), (\S+)\].* STRING: \"(\S+)\"
FORMAT = uptime_timeticks::$1 log_level::$2 action_id::$3 event_type::$4 event_id::$5 client::$6 user::$7 user_id::$8 session_id::$9 login_name::$10 first_name::$11 last_name::$12 event_security_domain_id::$13 event_identity_source_id::$14 action::$15 action_id::$16 result::$17 reason::$18 agent::$19 agent_id::$20 agent_name::$21 agent_address::$22 agent_type::$23 agent_security_domain_id::$24 policy::$25 policy_method_id::$26 policy_id::$27 policy_method_name::$28 policy_expression::$29 argument1::$30 argument2::$31 argument3::$32 argument4::$33 argument5::$34 argument6::$35 argument7::$36 argument8::$37 token_serial_number::$38 argument10::$39 reason::$40

[rsa-snmptrap-runtime-two]
DELIMS = ","
FIELDS = datetime, field1, field2, method, log_level, event_id, user_id, rsa_ipaddress, rsa_ipaddress, action, action_id, result, reason, session_id, user_id, event_security_domain_id, event_identity_source_id, login_name, first_name, last_name, agent_id, agent_security_domain_id, agent_address, agent_address, agent_type, policy_method_id, policy_method_name, policy_id, policy_expression, argument1, argument2, argument3, argument4, argument5, argument6, argument7, argument8, token_serial_number, argument10
MV_ADD = true
KEEP_EMPTY_VALS = true

