[Successful Actions]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) result="SUCCESS" | top showperc=false limit=0 action host

[All Users]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) | top showperc=false limit=0 login_name host

[Top Connecting Hosts]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) | top showperc=false limit=0 agent_address host

[Failed Actions]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) result="FAIL" | top showperc=false limit=0 action host

[Successful Reasons]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) result="SUCCESS" | top showperc=false limit=0 reason host

[Failure Reasons]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) result="FAIL" | top showperc=false limit=0 reason host

[Login Failures by User]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) action=AUTHN_LOGIN_EVENT result="FAIL" | top showperc=false limit=0 login_name host

[System Actions]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) (event_type="System" OR method="system.com*") | `explain(systemevents)` | top showperc=false limit=0 explanation host

[Runtime Actions]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) (event_type="Runtime" OR method="audit.runtime*") | `explain(runtimeevents)` | top showperc=false limit=0 explanation host

[Admin Actions]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) (event_type="Admin" OR method="audit.admin*") | `explain(adminevents)` | top showperc=false limit=0 explain_event host

[Total Failed and Successful Logins]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) (action=AUTHN_LOGIN_EVENT OR action=AUTHN_LOGOUT_EVENT) | chart count(eval(result="FAIL")) AS "Failure", count(eval(result="SUCCESS")) AS "Success" by _time span=5m

[After Hours Admin Events]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) (event_type="Admin" OR method="audit.admin*") (date_hour>17 OR date_hour<9) | chart values(login_name) AS Login, values(action) AS Action, values(result) AS Result, values(client) AS "Source IP" by _time | convert ctime(_time) | rename _time AS "Date/Time"

[Received KBytes by Interface]
search = sourcetype=snmpget | eval in_1=(ifInOctets_1/1024) | eval in_2=(ifInOctets_2/1024) | eval in_3=(ifInOctets_1/1024) | chart max(in_1) AS "loopback",  max(in_2) AS "eth0", max(in_3) AS "eth1", by _time, host

[Transmitted KBytes by Interface]
search = sourcetype=snmpget | eval out_1=(ifOutOctets_1/1024) | eval out_2=(ifOutOctets_2/1024) | eval out_3=(ifOutOctets_3/1024) | chart max(out_1) AS "loopback",  max(out_2) AS "eth0", max(out_3) AS "eth1" by _time, host

[Inbound Packets by Interface]
search = sourcetype=snmpget | chart max(ifInUcastPkts_1) AS "loopback", max(ifInUcastPkts_2) AS "eth0", max(ifInUcastPkts_3) AS "eth1" by _time, host

[Outbound Packets by Interface]
search = sourcetype=snmpget | chart max(ifOutUcastPkts_1) AS "loopback", max(ifOutUcastPkts_2) AS "eth0", max(ifOutUcastPkts_3) AS "eth1" by _time, host

[TCP Current Established Connections]
search = sourcetype=snmpget | chart max(tcpCurrEstab_0) AS "Established Connections" by _time, host

[ICMP Messages]
search = sourcetype=snmpget | fillnull | timechart span=1m max(icmpOutMsgs_0) AS "Outbound", max(icmpInMsgs_0) AS "Inbound" by host

[ICMP Inbound Echos]
search = sourcetype=snmpget | fillnull | timechart span=1m max(icmpInEchos_0) AS "Inbound"

[ICMP Destination Unreachables]
search = sourcetype=snmpget | fillnull | timechart span=1m max(icmpOutDestUnreachs_0) AS "Outbound", max(icmpInDestUnreachs_0) AS "Inbound" by host

[TCP Segments]
search = sourcetype=snmpget | fillnull | chart max(tcpInSegs_0) AS "Inbound", max(tcpOutSegs_0) AS "Outbound", max(tcpRetransSegs_0) AS "Retransmitted" by _time, host

[TCP Connection Count]
search = sourcetype=snmpget | fillnull | chart max(tcpActiveOpens_0) AS "Active", max(tcpPassiveOpens_0) AS "Passive" by _time, host

[TCP and UDP Error Count]
search = sourcetype=snmpget | fillnull | chart max(tcpInErrs_0) AS "TCP In", max(udpNoPorts_0) AS "UDP No Port", max(udpInErrors_0) AS "UDP In" by _time, host

[UDP Datagrams]
search = sourcetype=snmpget | fillnull | chart max(udpOutDatagrams_0) AS "Outbound", max(udpInDatagrams_0) AS "Inbound" by _time, host

[Events Over Time]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) | fillnull | chart count by _time span=5m

[Top Ten Actions]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) | top showperc=false limit=10 action | rename action AS "Action ID"

[Top Ten Connecting Hosts]
search = (sourcetype=snmptrap OR sourcetype=rsa_runtime OR sourcetype=rsa_system OR sourcetype=rsa_admin) | top showperc=false limit=10 agent_address | rename agent_address AS "Agent Address"

