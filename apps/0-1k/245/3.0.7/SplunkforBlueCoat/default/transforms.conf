[nullPound]
REGEX = ^\#
DEST_KEY=queue
FORMAT=nullQueue

[bcoat_proxysg]
DEST_KEY = MetaData:Sourcetype
REGEX = .*
FORMAT = sourcetype::bcoat_proxysg

