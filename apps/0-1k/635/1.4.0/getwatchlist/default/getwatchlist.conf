;url=https://data.phishtank.com/data/online-valid.csv
;delimiter=','
;relevantFieldName=url
;relevantFieldCol=2
;referenceCol=3
;dateCol=4
;categoryCol=8
;ignoreFirstLine = True
;isbad=true

[bogons]
is_provided = 1
url = https://www.team-cymru.org/Services/Bogons/fullbogons-ipv4.txt
isbad=true

[emergingthreats]
is_provided = 1
url = https://rules.emergingthreats.net/fwrules/emerging-Block-IPs.txt
isbad=true


[csv]
is_provided = 1
filetype = csv
delimiter = ","
autoExtract = true

[xls]
is_provided = 1
filetype = xls
delimiter = ","
autoExtract = true

[xlsx]
is_provided = 1
filetype = xlsx
delimiter = ","
autoExtract = true

[txt]
is_provided = 1
filetype = txt

[json]
is_provided = 1
filetype = json
delimiter = ","
autoExtract = true

[archive]
is_provided = 1
filetype = archive
delimiter = ","
autoExtract = true

[gz]
is_provided = 1
filetype = gz
delimiter = ","
autoExtract = true

[raw]
is_provided = 1
filetype = raw
autoExtract = true
relevantFieldName = raw