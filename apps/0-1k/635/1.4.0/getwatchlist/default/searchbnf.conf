[getwatchlist-command]
syntax = getwatchlist <getwatchlist-profile> <getwatchlist-option>*
shortdesc = getwatchlist allows the download of watchlists into Splunk.
description = getwatchlist allows the download of watchlists into Splunk.
usage = public
example1 = getwatchlist <getwatchlist-profile> url=<url> <key>=<value>
comment1 = Queries for device information, returning only "last_internal_ip" field.

[getwatchlist-option]
# Autogen this string: cat searchbnf.conf| grep -e '^\[getwatchlist-option-' | tr  -d \\n | sed -e 's/\[/</g' | sed -e 's/\]/>\|/g'
syntax = <getwatchlist-option-expandObjects>|<getwatchlist-option-url>|<getwatchlist-option-delimiter>|<getwatchlist-option-fieldNames>|<getwatchlist-option-dictKeys>|<getwatchlist-option-dataKey>|<getwatchlist-option-ignoreFirstLine>|<getwatchlist-option-relevantFieldCol>|<getwatchlist-option-comment>|<getwatchlist-option-relevantFieldName>|<getwatchlist-option-autoExtract>|<getwatchlist-option-ignoreLines>
description = getwatchlist allows the download of watchlists into Splunk.

[getwatchlist-option-expandObjects]
syntax = expandObjects=<bool>
description = If the data is an object, and not a list, expand each key as if it were a row in a list, ignoring the key name
# default = "0"

[getwatchlist-profile]
syntax = <string>
# default = "default"
description = This is the profile name from the configuration files. Builtin types: csv, json, xlsx, txt

[getwatchlist-option-url]
syntax = url=<string>
# default = ""
description = This is the URL to download from.

[getwatchlist-option-delimiter]
syntax = delimiter=<string>
# default = ""
description = This is the Delimiter to split the row with.

[getwatchlist-option-fieldNames]
syntax = fieldNames=<semi-colon delimited string>
# default = ""
description = A Semi-colon delimited string with the field names for the data. This will override anything auto-extracted from the data.

[getwatchlist-option-dictKeys]
syntax = dictKeys=<comma-separated strings>
# default = ""
description = Specifies the fields from the raw source to convert to table fields

[getwatchlist-option-dataKey]
syntax = dataKey=<string>
# default = ""
description = Allows the data to be returned to be pulled from a JSON response key.
# 'categoryCol': -1,
# 'filetype': "txt",
# 'sheetIndex': 0,
# 'referenceCol': -1,
# 'dateCol': -1,
# 'authUser': '',
# 'authPass': '',
# 'ignoreFirstLine': False,
# 'autoExtract': False,
# 'proxyHost': '',
# 'proxyPort': '8080',
# 'customFields': {},
# 'addCols': {}}

[getwatchlist-option-ignoreFirstLine]
syntax = ignoreFirstLine=<1|0>
# default = 0
description = Some watchlists contain a header which is not commented out. If this is set to ``0`` this line will be ignored.

[getwatchlist-option-relevantFieldCol]
syntax = relevantFieldCol=<integer>
# default = 1
description = The column number (starting at 1) which contains the key value you would like to use.

[getwatchlist-option-comment]
syntax = comment=<string>
# default = "#"
description = The command will automatically strip lines from the returned data that start with this character.

[getwatchlist-option-relevantFieldName]
syntax = relevantFieldName=<string>
# default = "ip_address"
description = What you would like the field to be named in the CSV output (not the name in the fetched CSV)

[getwatchlist-option-autoExtract]
syntax = autoExtract=<1|0>
# default = 0
description = If possible, auto extract the watchlist.

[getwatchlist-option-ignoreLines]
syntax = ignoreLines=<integer>
# default = 0
description = Skip this many lines at the beginning of the file.

