#[script://./bin/pyip.sh]

[script://$SPLUNK_HOME/etc/apps/splunkipwatchlist/bin/pyip.py]
interval=84600
sourcetype=ip_watchlist
python.version = python3
disabled =false

# Windows only turned off by default
[script://.\bin\pyip.bat]
interval=84600
sourcetype=ip_watchlist
python.version = python3
disabled =true
