[vdi:xendesktop:50:desktop]
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
BREAK_ONLY_BEFORE=\d+\/\d+\/\d+\s+\d+\:\d+
REPORT-vm_name = getVMname
SHOULD_LINEMERGE = false
FIELDALIAS-vmware = HostedMachineName AS moname

[vdi:xendesktop:50:session]
REPORT-0 = getDesktopName
EXTRACT-2 = (?i) UserName=\S+\\(?P<user>[^"]+)
FIELDALIAS-vm_name = HostedMachineName AS moname
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
BREAK_ONLY_BEFORE=\d+\/\d+\/\d+\s+\d+\:\d+
SHOULD_LINEMERGE = false

[vdi:xendesktop:50:icasession]
FIELDALIAS-user = UserName AS user
FIELDALIAS-vmname = host AS vm_name 
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
BREAK_ONLY_BEFORE=\d+\/\d+\/\d+\s+\d+\:\d+
SHOULD_LINEMERGE = false

[vdi:xendesktop:40:session]
REPORT-vm_name = getSessionStateChangeTime,getSessionBrokeringTime,getClientAddress,getHardwareID
EXTRACT-1 = (?i) DesktopName=\S+\\(?P<vm_name>[^"]+)
EXTRACT-2 = (?i) UserName=\S+\\(?P<user>[^"]+)
SHOULD_LINEMERGE=false
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
BREAK_ONLY_BEFORE=\d+\/\d+\/\d+\s+\d+\:\d+
SHOULD_LINEMERGE = false

[vdi:xendesktop:40:desktop]
REPORT-vm_name = getVMname
FIELDALIAS-controller = Controller AS ControllerDNSName 
SHOULD_LINEMERGE=false
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
BREAK_ONLY_BEFORE=\d+\/\d+\/\d+\s+\d+\:\d+
SHOULD_LINEMERGE = false

[vdi:xendesktop:40:desktopgroup]
SHOULD_LINEMERGE=false
SHOULD_LINEMERGE=false
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
BREAK_ONLY_BEFORE=\d+\/\d+\/\d+\s+\d+\:\d+
SHOULD_LINEMERGE = false

