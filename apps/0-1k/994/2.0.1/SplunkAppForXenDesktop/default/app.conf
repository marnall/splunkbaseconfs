[package]
id = SplunkAppForXenDesktop

[install]
state = enabled
is_configured = true
build = 1

[ui]
is_visible = true
label = Splunk for Citrix XenDesktop

[launcher]
author = Splunk-BD
description = The Splunk for Citrix XenDesktop app allows administrators to very easily correlate data across all components of your XD4 and XD5 deployment.  When a performance issues arises, this 360 degree view provides a concise and detailed snapshot of any point in time, allowing administrators to quickly pinpoint and resolve any issues, whether they are inside or outside the VM.  
version = 2.0.1
