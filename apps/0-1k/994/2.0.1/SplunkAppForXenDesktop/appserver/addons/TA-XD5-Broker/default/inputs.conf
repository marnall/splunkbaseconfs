###############################################################################
#
# The following scripts use the Citrix XD5 Powershell functions and need to run in XD5 environments
# 
###############################################################################

[script://.\bin\GetXD50Desktop.path]
source     = vdi:xendesktop:powershell:getxd50desktop.ps1
sourcetype = vdi:xendesktop:50:desktop
index      = xendesktop
interval   = 60
disabled   = 0

[script://.\bin\GetXD50Session.path]
source     = vdi:xendesktop:powershell:getxd50session.ps1
sourcetype = vdi:xendesktop:50:session
index      = xendesktop
interval   = 60
disabled   = 0

[script://.\bin\GetXD50DesktopGroup.path]
source     = vdi:xendesktop:powershell:getxd50desktopgroup.ps1
sourcetype = vdi:xendesktop:50:desktopgroup
index      = xendesktop
interval   = 60
disabled   = 0

###############################################################################
#
# WMI and Perfmon Inputs
# 
###############################################################################

[script://$SPLUNK_HOME\bin\scripts\splunk-perfmon.path]
disabled = 0
index = xendesktop_perfmon

[script://$SPLUNK_HOME\bin\scripts\splunk-wmi.path]
disabled = 0
index = xendesktop_winevents

###############################################################################
#
# Windows Event Logs
# 
###############################################################################

[WinEventLog:Application]
disabled = 0
index = xendesktop_winevents

[WinEventLog:System]
disabled = 0
index = xendesktop_winevents

[WinEventLog:Security]
disabled = 0
index = xendesktop_winevents

[WinEventLog:Setup]
disabled = 0
index = xendesktop_winevents

