### Server Classes ###

### Splunk Indexer ###
[serverClass:indexer]
filterType = whitelist 
whitelist.0 = indexer
continueMatching = true
restartSplunkd = true
####################

### Splunk Search Head ###
[serverClass:search]
filterType = whitelist 
whitelist.0 = search
continueMatching = true
restartSplunkd = true
####################

### Citrix License ###
[serverClass:ctxlic]
filterType = whitelist
whitelist.0 = ctxlic
continueMatching = true
restartSplunkd = true
##################

### XenDesktop 40 ###
[serverClass:xd40broker]
filterType = whitelist
whitelist.0 = xd40broker
continueMatching = true
restartSplunkd = true
#####################

### XenDesktop 50 ###
[serverClass:xd50broker]
filterType = whitelist
whitelist.0 = xd50broker
continueMatching = true
restartSplunkd = true
#####################

### XenDesktop VDA ###
[serverClass:vda55]
filterType = whitelist
whitelist.0 = xdvda
continueMatching = true
restartSplunkd = true
#####################

### All Hosts ###
[serverClass:allhosts]
filterType = whitelist
blacklist.0 = indexer
blacklist.1 = searcher
whitelist.0 = *
continueMatching = true
restartSplunkd = true
#####################

#############################
### Application Assignments ###
#############################

# Splunk Indexer
[serverClass:indexer:app:SplunkAppForXenDesktop]

# Splunk Search
[serverClass:search:app:SplunkAppForXenDesktop]

# Everyone (except Indexer and Search Head)
[serverClass:allhosts:app:TA-ForwardServer]

# Citrix License Server
[serverClass:ctxlic:app:TA-CitrixLicensing-1]

# XenDesktop 40
[serverClass:xd40broker:app:TA-XD4-Broker]

# XenDesktop 5x
[serverClass:xd50broker:app:TA-XD5-Broker]

# VDA 40,50,55,56
[serverClass:xdvda:app:TA-XD-VDA]





