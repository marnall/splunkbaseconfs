###############################################################################
#
# WMI and Perfmon Inputs
# 
###############################################################################

[script://$SPLUNK_HOME\bin\scripts\splunk-perfmon.path]
disabled = 0
index = xendesktop_perfmon

[script://$SPLUNK_HOME\bin\scripts\splunk-wmi.path]
disabled = 0
index = xendesktop_winevents

###############################################################################
#
# Windows Event Logs
# 
###############################################################################

[WinEventLog:Application]
disabled = 0
index = xendesktop_winevents

[WinEventLog:System]
disabled = 0
index = xendesktop_winevents

[WinEventLog:Security]
disabled = 0
index = xendesktop_winevents

[WinEventLog:Setup]
disabled = 0
index = xendesktop_winevents

###############################################################################
#
# The following Logs Windows Update Info
# 
###############################################################################

[monitor://$WINDIR\WindowsUpdate.log]
sourcetype = WindowsUpdateLog
disabled = 1
index = xendesktop_winevents

###############################################################################
#
# The following scripts use to collect Installed Software and Process Info
# 
###############################################################################

[script://.\bin\GetInstalledSoftware.path]
source=Windows:PowerShell:getinstalledsoftware.ps1
sourcetype=WMI:InstalledSoftware
index=xendesktop_winevents
interval=21600
disabled=0

[script://.\bin\GetProcess.path]
source=Windows:PowerShell:getprocess.ps1
sourcetype=WMI:ProcessDetails
index=xendesktop_winevents
interval=180
disabled=0

###############################################################################
#
# The following scripts use the Citrix XD5 Powershell functions and need to run in XD5 environments
# 
###############################################################################

[script://.\bin\GetICASessionStat.path]
source=vdi:xendesktop:powershell:geticasessionstat.ps1
sourcetype=vdi:xendesktop:50:icasession
index=xendesktop
interval=180
disabled=0

[script://.\bin\GetClientDetails.path]
source=Windows:PowerShell:getclientdetails.ps1
sourcetype=vdi:xendesktop:50:clientdetail
index=xendesktop
interval=180
disabled=0

