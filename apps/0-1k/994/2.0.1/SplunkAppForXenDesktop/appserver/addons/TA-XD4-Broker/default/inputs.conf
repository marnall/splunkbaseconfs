###############################################################################
#
# WMI and Perfmon Inputs
# 
###############################################################################

[script://$SPLUNK_HOME\bin\scripts\splunk-perfmon.path]
disabled = 0
index = xendesktop_perfmon

[script://$SPLUNK_HOME\bin\scripts\splunk-wmi.path]
disabled = 0
index = xendesktop_winevents

###############################################################################
#
# Windows Event Logs
# 
###############################################################################

[WinEventLog:Application]
disabled = 0
index = xendesktop_winevents

[WinEventLog:System]
disabled = 0
index = xendesktop_winevents

[WinEventLog:Security]
disabled = 0
index = xendesktop_winevents

[WinEventLog:Setup]
disabled = 0
index = xendesktop_winevents

###############################################################################
#
# The following scripts use the Citrix XD4 Powershell functions and need to run in XD4 environments
# 
###############################################################################
[script://.\bin\GetXD40Desktop.path]
source=vdi:xendesktop:powershell:getxd40desktop.ps1
sourcetype=vdi:xendesktop:40:desktop
index=xendesktop
interval=60
disabled=0

[script://.\bin\GetXD40Session.path]
source=vdi:xendesktop:powershell:getxd40session.ps1
sourcetype=vdi:xendesktop:40:session
index=xendesktop
interval=60
disabled=0

[script://.\bin\GetXD40DesktopGroup.path]
source=vdi:xendesktop:powershell:getxd40desktopgroup.ps1
sourcetype=vdi:xendesktop:40:desktopgroup
index=xendesktop
interval=60
disabled=0

###############################################################################
#
# Citrix XD4 Log files. 
# 
###############################################################################
[monitor:///C:\logs\cds_log.log]
source=vdi:xendesktop:powershell:cds_log.log
disabled = true
sourcetype = vdi:xendesktop:40:cdslog
index=xendesktop

[monitor:///C:\logs\pool_log.log]
source=vdi:xendesktop:powershell:pool_log.log
disabled = true
sourcetype = vdi:xendesktop:40:poollog
index=xendesktop



