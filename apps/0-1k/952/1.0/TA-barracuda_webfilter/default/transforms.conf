[bwf_spy_type_msg]
filename=bwf_spy_type_msg.csv

[bwf_src_type_msg]
filename=bwf_src_type_msg.csv

[bwf_action_type_msg]
filename=bwf_action_type_msg.csv

[bwf_dest_type_msg]
filename=bwf_dest_type_msg.csv

#########################
##  Field extractions  ##
#########################
[bwf_proc_and_pid]
REGEX = \s(?<process>h[^\[]+)\[(?<pid>\d+)\]:

[bwf_dvc_time]
REGEX = \]:\s(?<dvc_time>\d{10,})\s1

[bwf_src_and_dest]
REGEX = 1\s(?<src_ip>(\d{1,3}\.){3}\d{1,3})\s(?<dest_ip>(\d{1,3}\.){3}\d{1,3})

[bwf_http_content_type]
REGEX = \s(?<http_content_type>[a-zA-Z]+/[a-zA-Z\.\-]+)\s

[bwf_url]
REGEX = \s(?<url>(ht|f)tps?://[^\s]+)[^\n$]

[bwf_bytes]
REGEX = \s(?<bytes_in>\d+)\sBYF\s

[bwf_action]
REGEX = \s(?<action_text>ALLOWED|BLOCKED|DETECTED)\s

[bwf_reason]
REGEX = \s(?<reason>CLEAN|VIRUS|SPYWARE)\s

[bwf_flags]
REGEX = \s(?<format_version>\d)\s(?<match_flag>\d)\s(?<tq_flag>\d)\s(?<action_type>\d)\s(?<src_type>\d)\s

[bwf_src_detail]
REGEX = \((?<src_detail>[^\)]+)\)\s

[bwf_dest_detail_spy_detail]
REGEX = \)\s(?<dest_type>[0-8])\s(?<dest_detail>[^\s]+)\s(?<spy_type>[0-2])\s(?<signature>[^\s]+)\s(?<infection_score>\d+)

[bwf_match_category_user]
REGEX = (?<match_part>[^\s]+)\s(?<category>[^\s]+)\s\[(?<user>[^\]]+)\]\s+(h|f)t

#########################
##  Sourcetype forcing  #
#########################
[force_sourcetype_barracuda]
DEST_KEY = MetaData:Sourcetype
REGEX = \shttp_scan\[(\d+)\]:\s\d+\s1\s
FORMAT = sourcetype::barracuda:web_filter
