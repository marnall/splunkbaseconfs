[indextimesearch(2)]
args = earliest_indextime,latest_indextime
definition = [|indextimessubsearch earliest_indextime=$earliest_indextime$ latest_indextime=$latest_indextime$] | eval et=relative_time(now(),"$earliest_indextime$") | eval lt=coalesce( relative_time(now(),"$latest_indextime$") , relative_time(now(),"-0s") ) | where _indextime>=et | where _indextime<lt
iseval = 0
