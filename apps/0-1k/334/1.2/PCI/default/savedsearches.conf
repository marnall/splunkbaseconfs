######################################
# Firewall - IPTables Module Searches
#
# Field Values:
# 

[Firewall-Denied_Sources_Top]
search = eventtype="firewall_deny" SRC!=192.168.0.0/16 | top SRC limit=1 | fields SRC

[Firewall-Denied_Ports_Top]
search = eventtype="firewall_deny" DST!=192.168.0.0/16 AND DST!=224.0.0.1 AND DST!=10.0.0.0/8 AND DST!=172.16.0.0/12  | top DPT limit="1" | table DPT

[Firewall--Protocol_Usage_Table]
search = eventtype="firewall_deny" | table  SRC SPT DPT 

[Firewall-Protocol_Usage_Denied_Chart]
search = eventtype="firewall_deny" | chart count(DPT) by DPT

[Firewall-Protocol_Usage_Global_Chart]
search = eventtype="firewall_deny" OR eventtype="firewall_accept" | chart count(DPT) by DPT

[Firewall-Denied_Packet_Count]
search = eventtype="firewall_deny" DST!=192.168.0.0/16 AND DST!=224.0.0.1 AND DST!=10.0.0.0/8 AND DST!=172.16.0.0/12  | stats count

[Firewall-Denied_Packet_Count_RangeMap]
search = eventtype="firewall_deny" DST!=192.168.0.0/16 AND DST!=224.0.0.1 AND DST!=10.0.0.0/8 AND DST!=172.16.0.0/12  | stats count | rangemap field=count low=0-1000 elevated=1001-10000 default=severe

[Firewall-Denied_Traffic]
search = eventtype="firewall_deny" SRC!=192.168.0.0/16 AND SRC!=224.0.0.1 AND SRC!=10.0.0.0/8 AND SRC!=172.16.0.0/12 | timechart count(SRC) by SRC limit=5

[Firewall-Denied_Traffic_Country]
search = eventtype="firewall_deny" SRC!=192.168.0.0/16 AND SRC!=224.0.0.1 AND SRC!=10.0.0.0/8 AND SRC!=172.16.0.0/12 | top SRC limit=1 | lookup geoip clientip as SRC | fields client_country

[Firewall-Average_Denied_Traffic_Average_Chart]
search = eventtype="firewall_deny" SRC!=192.168.0.0/16 AND SRC!=224.0.0.1 AND SRC!=10.0.0.0/8 AND SRC!=172.16.0.0/12 | timechart count(SRC) by avg(count)

[Firewall-Average_Denied_Traffic_Chart]
search = eventtype="firewall_deny" SRC!=192.168.0.0/16 AND SRC!=224.0.0.1 AND SRC!=10.0.0.0/8 AND SRC!=172.16.0.0/12 | timechart count by SRC

########################
# Risk Module Searches 
#
# Field Values:
# Risk Position,Risk Ref,Description,Primary Threat,Risk Owner,Business Impact Score,Probility Score,Total Risk Score,ISO:27000 Control Requirement,Actions,Owner,Due Date,Remediation Impact Score,Remediation Probability Score,Overall Status,Forecast for Next 6 Months

[Risk_Average_Risk_Range_7Day]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" | sort Risk_Position limit=10 | stats avg(Total_Risk_Score) | rangemap field="avg(Total_Risk_Score)" low=0-8 elevated=8-16 default=severe

[Risk_High_Range_7Day]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" | sort Risk_Position limit=1 | stats avg(Total_Risk_Score) | rangemap field="avg(Total_Risk_Score)" low=0-8 elevated=8-16 default=severe

[Risk_Events_List_7Day]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" | stats count | rangemap field=count low=10-1000 elevated=2-9 severe=0-1 default=low

[Risk_Register_List_7Day]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" | table Description Total_Risk_Score | sort -Total_Risk_Score | table Description Total_Risk_Score | rename Description as "Risk Description", Total_Risk_Score as "Risk Score"

[Risk_Category_Summary]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" | chart count(ISO_27000_Control_Requirement) by ISO_27000_Control_Requirement

[Risk_Owner_Summary]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" | chart count(Owner) by Owner

[Risk_Trend_7Day]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" |  timechart max(Total_Risk_Score),min(Total_Risk_Score),avg(Total_Risk_Score) | rename max(Total_Risk_Score) AS "High Risk Score", min(Total_Risk_Score) AS "Low Risk Score", avg(Total_Risk_Score) AS "Average Risk Score"

[Risk_Trend_30Day]
action.email.sendresults = 0
cron_schedule = No value selected
dispatch.earliest_time = -30d@d
dispatch.latest_time = +0s
search = eventtype="register-risk-global" |  timechart max(Total_Risk_Score),min(Total_Risk_Score),avg(Total_Risk_Score)  | rename max(Total_Risk_Score) AS "High Risk Score", min(Total_Risk_Score) AS "Low Risk Score", avg(Total_Risk_Score) AS "Average Risk Score"



####################################
# Data Destruction Module Eventtypes
#
# Field Values:
# Date,Media,Serial,Classification,Apect,Aspect Date,Destruction Method

[Destruction_Summary]
dispatch.earliest_time = -7d@d
dispatch.latest_time = +0s
search = eventtype="register-data-destruction-global" | table Date Media Serial Classification Apect Aspect_Date Destruction_Method

#############################
# OpenVPNAS Module Eventtypes
#
# Field Values:
# 

[VPN-OpenVPNAS_User_Chart]
search = eventtype="vpn-openvpnas" "PAM auth succeeded" | rex field=_raw "'common_name': '(?<UNAME>[a-z.]*)" | chart count by UNAME

[VPN-OpenVPNAS_IP_Access]
search = eventtype="vpn-openvpnas" "client protocol" | rex field=_raw "\s(?<IPAddr>[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*)[:]"| top IPAddr | lookup geoip clientip as IPAddr | table IPAddr client_country

#############################
# ClamAV Module Eventtypes
#
# Field Values:
#

[ClamAV-signatures]
search = eventtype="Antivirus-ClamAV-Signatures" | rex field=_raw "\((?<Signatures>[0-9]*)\s" | head limit=1 | table Signatures

[ClamAV-Update_Date]
search = eventtype="Antivirus-ClamAV-Signatures" | rex field=_raw "(?<Updated>[A-Z]{1}[a-z]{2}\s[A-Z]{1}[a-z]{2}\s[0-9]+)\s" | head limit=1 | table Updated

[ClamAV-Updated_24hours-old]
search = eventtype="Antivirus-ClamAV-Signatures" | rex field=_raw "(?<Updated>[A-Z]{1}[a-z]{2}\s[A-Z]{1}[a-z]{2}\s[0-9]+)\s" | stats count | rangemap field=count low=1-2000 default=severe

[ClamAV-Updated_24hours]
search = eventtype="Antivirus-ClamAV-Signatures" | stats count | rangemap field=count low=1-2000 default=severe
dispatch.earliest_time = -24h@h
dispatch.latest_time = +0s


#############################
# Flashtimeline Views
#
# Field Values:
#

[Card Data]
action.email.sendresults = 0
dispatch.earliest_time = - 30d@d
dispatch.latest_time = +0s
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = sourcetype="syslog" | regex _raw="(?<CCNUM>4[0-9]{3}[0-9]{8}[0-9]{4}|5[0-9]{3}[0-9]{11}[0-9]{4})"

[C2V Data]
action.email.sendresults = 0
dispatch.earliest_time = -30d@d
dispatch.latest_time = +0s
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = sourcetype="syslog" | regex _raw="(?<C2V>C2V\s[0-9]{3})"
