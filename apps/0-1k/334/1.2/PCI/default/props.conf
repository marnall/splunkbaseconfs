[linux_secure]
REPORT-useradddel = useradd userdel
REPORT-ssh = ssh-login-events ssh-session-close ssh-invalid ssh-disconnect
REPORT-ipfw = ipfw ipfw-stealth ipfw-icmp
REPORT-iptables	= iptables
REPORT-pf = pf

[syslog]
REPORT-useradddel = useradd userdel
REPORT-ssh = ssh-login-events ssh-session-close ssh-invalid ssh-disconnect
REPORT-ipfw = ipfw ipfw-stealth ipfw-icmp
REPORT-iptables	= iptables
REPORT-pf = pf
pulldown_type = true 
maxDist = 3
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 32
TRANSFORMS = syslog-host
REPORT-syslog = syslog-extractions
SHOULD_LINEMERGE = False

[nmap]
TRANSFORMS = scanner_nmap
SHOULD_LINEMERGE = False

[vmstat]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
REPORTS-vmstat = vmstat_osx vmstat_linux

[df]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[iostat]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[ps]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[top]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[lsof]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[time]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[netstat]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[protocol]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[openPorts]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[package]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[hardware]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
EXTRACT-RealMemoryMB = (?i)MEMORY_REAL\s+(?P<RealMemoryMB>[^ ]*)[ ]
EXTRACT-SwapMemoryMB = (?i)MEMORY_SWAP\s+(?P<SwapMemoryMB>[^ ]*)[ ]

[cpu]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[interfaces]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[who]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[lastlog]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[usersWithLoginPrivs]
SHOULD_LINEMERGE=false
LINE_BREAKER=^()$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT

[wtmp]
invalid_cause = binary
LEARN_MODEL = false

[linux_messages_syslog]
pulldown_type = true 
maxDist = 100
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_FORMAT = %b %d %H:%M:%S
TRANSFORMS = syslog-host
REPORT-syslog = syslog-extractions
SHOULD_LINEMERGE = False

[linux_secure]
pulldown_type = true 
maxDist = 110
REPORT-syslog = syslog-extractions
SHOULD_LINEMERGE = False

[linux_audit]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 

[linux_bootlog]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 

[anaconda]
pulldown_type = true 
BREAK_ONLY_BEFORE = ^\* 

[anaconda_syslog]
pulldown_type = true 
REPORT-syslog = syslog-extractions
SHOULD_LINEMERGE = False
TIME_FORMAT = %b %d %H:%M:%S

[osx_asl]
BREAK_ONLY_BEFORE_DATE = False
REPORT-asl = bracket-space
pulldown_type = true 

[osx_crashreporter]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 

[osx_crash_log]
BREAK_ONLY_BEFORE = gooblygook
MAX_EVENTS = 200000
pulldown_type = true 

[osx_install]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 

[osx_secure]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 

[osx_daily]       
pulldown_type = true 
BREAK_ONLY_BEFORE = ^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)

[osx_weekly]
pulldown_type = true 
BREAK_ONLY_BEFORE = ^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)

[osx_monthly]
pulldown_type = true 
BREAK_ONLY_BEFORE = ^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)

[osx_window_server]
pulldown_type = true 
SHOULD_LINEMERGE = False

[dmesg]
BREAK_ONLY_BEFORE = ^\S
DATETIME_CONFIG = NONE
pulldown_type = true 

[ftp]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 

[ssl_error]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 


[sar]
; break on blanklines, clock-resets, or common headers attributes (/s, %, or alpha-)
BREAK_ONLY_BEFORE = (?:^\s*$)|00:00:0|/s|%|[a-z]-
pulldown_type = true 
MAX_EVENTS = 1000

[rpmpkgs]
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true 
LEARN_MODEL = false

######### SOURCES #############

[source::.../var/log/asl.log(.\d+)?]
sourcetype = osx_asl 

[source::.../var/log/crashreporter.log(.\d+)?]
sourcetype = osx_crashreporter 

[source::....crash.log(.\d+)?]
sourcetype = osx_crash_log

[source::.../var/log/install.log(.\d+)?]
sourcetype = osx_install 

[source::.../var/log/secure.log(.\d+)?]
sourcetype = osx_secure 

[source::.../var/log/daily.out(.\d+)?]
sourcetype = osx_daily 

[source::.../var/log/weekly.out(.\d+)?]
sourcetype = osx_weekly 

[source::.../var/log/monthly.out(.\d+)?]
sourcetype = osx_monthly

[source::.../private/var/log/windowserver.log(.\d+)?]
sourcetype = osx_window_server

[source::.../var/log/cups/access_log(.\d+)?]
sourcetype = cups_access 

[source::.../var/log/cups/error_log(.\d+)?]
sourcetype = cups_error 

[source::.../var/log/dmesg(.\d+)?]
sourcetype = dmesg 

[source::.../var/log/ftp.log(.\d+)?]
sourcetype = ftp 

[source::.../(ex|in|nc)(\d{4,8}).log]
sourcetype = iis

[source::.../var/log/lastlog(.\d+)?]
sourcetype = lastlog 

[source::.../var/log/audit/audit.log(.\d+)?]
sourcetype = linux_audit 

[source::.../var/log/boot.log(.\d+)?]
sourcetype = linux_bootlog 

[source::.../var/log/secure(.\d+)?]
sourcetype = linux_secure 

[source::.../man/man\d+/*.\d+]
sourcetype = manpage

[source::.../var/log/wtmp(.\d+)?]
sourcetype = wtmp 

[source::.../messages(.\d+)?]
sourcetype = syslog 

[source::.../syslog(.\d+)?]
sourcetype = syslog 

[source::.../var/log/spooler(.\d+)?]
sourcetype = spooler 

[source::.../var/log/sa/sar\d+]
sourcetype = sar

[source::.../var/log/rpmpkgs(.\d+)?]
sourcetype = rpmpkgs 


[config_file]
LINE_BREAKER = ^()$
TRUNCATE = 1000000
SHOULD_LINEMERGE = false
DATETIME_CONFIG = NONE
CHECK_METHOD = modtime
KV_MODE = none
pulldown_type = true
SEGMENTATION-all      = whitespace-only
SEGMENTATION-inner    = whitespace-only
SEGMENTATION-outer    = whitespace-only
SEGMENTATION-standard = whitespace-only
LEARN_MODEL = false

[source::(.../etc/...|....(config|conf|cfg|inii|cfg|emacs|ini|license|lng|plist|presets|properties|props|vim|wsdl))]
sourcetype=config_file
CHECK_METHOD = modtime

[source::/etc/passwd*]
sourcetype = ignored_type

[source::/etc/shadow*]
sourcetype = ignored_type


