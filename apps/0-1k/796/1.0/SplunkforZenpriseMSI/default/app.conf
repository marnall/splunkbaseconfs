# Splunk app configuration file

[ui]
is_visible = 1
label = Splunk for Zenprise Mobile Security Intelligence 

[launcher]
author = Zenprise
description = Zenprise Mobile Security Intelligence provides visibility into mobile users and mobile device traffic.  When used in conjunction with Zenprise, it provides a dashboard view of users and mobile devices along with rogue device connections to the environment.  The available dashboard panel includes -- top users and devices accessing email via active sync as well as rogue devices and their user information (username and ip address) trying to do the same. 
version = 1.0

[package]
id = SplunkforZenpriseMSI
