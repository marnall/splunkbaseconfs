##
## ProxySG Overview Searches
##
[Overview - Requests over Time]
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = +0s
displayview = flashtimeline
enableSched = 1
request.ui_dispatch_view = flashtimeline
search = sourcetype="bcoat_proxysg" | timechart count by host 
vsid = fx3mgenj

[Overview - Top Websites]
