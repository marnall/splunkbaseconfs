[CacheFlow - Update Category Lookup]
cron_schedule = 0 3 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = +0s
displayview = flashtimeline
enableSched = 1
request.ui_dispatch_view = flashtimeline
search = eventtype="bc_cf_access*" | inputlookup cs_categories.csv append=true | dedup cs_categories  |  table cs_categories | outputlookup cs_categories.csv
vsid = fx3mgenj

[BlueCoat - DataCube]
search = eventtype=bcoat_request  |  bin _time span=5m | makemv delim=";" allowempty=t category |  fillnull src_ip cs_bytes category  dest_host rs_bytes sc_bytes sc_status sr_bytes  | eval client_bytes=sc_bytes+cs_bytes | eval server_bytes=rs_bytes+sr_bytes | eval savings_bytes=client_bytes-server_bytes | eval savings_bytes=if(server_bytes==0,0,savings_bytes) |  eval savings_perc = (1/client_bytes)  * savings_bytes * 100  | stats count by host src_ip sourcetype category dest_host server_bytes client_bytes savings_bytes savings_perc _time
is_visible = false

[BlueCoat - DataCube - Summary Index]
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = +0s
enableSched = 1
action.summary_index = 1
action.summary_index.marker = bcoat
realtime_schedule = 0
search = eventtype=bcoat_request  |  bin _time span=5m | makemv delim=";" allowempty=t category |  fillnull src_ip cs_bytes category  dest_host rs_bytes sc_bytes sc_status sr_bytes  | eval client_bytes=sc_bytes+cs_bytes | eval server_bytes=rs_bytes+sr_bytes | eval savings_bytes=client_bytes-server_bytes | eval savings_bytes=if(server_bytes==0,0,savings_bytes) |  eval savings_perc = (1/client_bytes)  * savings_bytes * 100  | sistats count by host src_ip sourcetype category dest_host server_bytes client_bytes savings_bytes savings_perc _time
is_visible = false

