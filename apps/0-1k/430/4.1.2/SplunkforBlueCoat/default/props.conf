REPORT-main= accessExtractions,category_extract
SHOULD_LINEMERGE=false
TIME_FORMAT=%Y-%m-%d %T
MAX_TIMESTAMP_LOOKAHEAD=19
KV_MODE = none
FIELDALIAS-srcip = c_ip AS src_ip
FIELDALIAS-dest_host = cs_host AS dest_host

[packetshaper_log]
