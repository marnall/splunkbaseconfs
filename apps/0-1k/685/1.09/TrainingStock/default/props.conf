[trainingstock]
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = False
MAX_TIMESTAMP_LOOKAHEAD = 0
TIME_PREFIX = ([^,]*,){1}
TIME_FORMAT = %Y-%m-%d
MAX_DAYS_AGO = 10000

EXTRACT-symbol = (?i)^(?P<symbol>[^,]+)
EXTRACT-open = (?i)^(?:[^,]*,){2}(?P<open>[^,]+)
EXTRACT-high = (?i)^(?:[^,]*,){3}(?P<high>[^,]+)
EXTRACT-low = (?i)^(?:[^,]*,){4}(?P<low>[^,]+)
EXTRACT-close = (?i)^(?:[^,]*,){5}(?P<close>[^,]+)
EXTRACT-volume = (?i)^(?:[^,]*,){6}(?P<volume>[^,]+)
EXTRACT-adjclose = (?i)^(?:[^,]*,){7}(?P<adjclose>[^,]+)

LOOKUP-symbol = symbol_lookup stock_symbol AS symbol OUTPUT stock_symbol_name AS symbol_name

[stockrss]
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = False
MAX_TIMESTAMP_LOOKAHEAD = 0
MAX_DAYS_AGO = 10000

EXTRACT-rss = (?i)^([^,]*,){2}(?P<rss>[^,]+)
EXTRACT-title = (?i)^([^,]*,){3}(?P<title>[^,]+)
EXTRACT-link = (?i)^([^,]*,){4}(?P<link>[^,]+)
EXTRACT-description = (?i)^([^,]*,){5}(?P<description>[^,]+)

