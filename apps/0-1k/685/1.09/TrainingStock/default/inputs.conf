#===========================================================
# historical stock quotes
#===========================================================
#--------------
#| windows    |
#--------------
[script://C:\Program Files\Splunk\etc\apps\TrainingStock\bin\stockreader-historical.py]
disabled = false
interval = 86400

[monitor://C:\Program Files\Splunk\etc\apps\TrainingStock\logs\stock*]
disabled = false
followTail = 0
sourcetype = trainingstock

#--------------
#| unix/linux |
#--------------
[script://$SPLUNK_HOME/etc/apps/TrainingStock/bin/stockreader-historical.py]
disabled = false
interval = 86400

[monitor://$SPLUNK_HOME/etc/apps/TrainingStock/logs/stock*]
disabled = false
followTail = 0
sourcetype = trainingstock

#===========================================================
# rss news feed
# "stockrss.py" will pull rss news feed from the web and write them to "rss.csv" file
# we will then montior the rss.csv file
#===========================================================
#--------------
#| windows    |
#--------------
[script://C:\Program Files\Splunk\etc\apps\TrainingStock\bin\stockrss.py]
disabled = false
interval = 600

[monitor://C:\Program Files\Splunk\etc\apps\TrainingStock\logs\rss.csv]
disabled = false
followTail = 0
sourcetype = stockrss

