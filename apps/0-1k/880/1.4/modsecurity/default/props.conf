#################################################
##  ModSec props
#################################################

### Install this conf on your indexing servers

[modsec_audit]
SHOULD_LINEMERGE = False
TRUNCATE = 0
LINE_BREAKER = -Z--([\r\n]+)--[a-f0-9]+-A--
EXTRACT-score = (?ms)--[0-9a-f]+-H--\n.*\(score\ (?P<score>[0-9]+)\)
EXTRACT-message = (?ms)--[0-9a-f]+-H--\n.*Message: (?P<message>[\w\s\d\/.\(\)\"\:]+)\n
EXTRACT-unique_id = (?im)^[^\+\n]*\+\d+\]\s+(?P<unique_id>[^ ]+)
EXTRACT-xforwardedfor = (?ms)--[0-9a-f]+-B--\n.*X-Forwarded-For: (?P<xforwardedfor>[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)\n.*--[0-9a-f]+-F--
EXTRACT-srcip = (?ms)--[0-9a-f]+-A--\n.*\ (?P<srcip>[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)\ [0-9]{1,5}\ .*\n--[0-9a-f]+-B--
EXTRACT-srcport = (?ms)--[0-9a-f]+-A--\n.*\ [0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\ (?P<srcport>[0-9]{1,5})\ .*\n
EXTRACT-action = (?msU)--[0-9a-f]+-H--.*Action\:\ (?P<action>.*\))
EXTRACT-url = (?s)--[0-9a-f]+-B--\n(?P<method>[a-zA-Z]+) (?P<url>[\w\s\d\/.\(\)\=\.\-\_\:\;]+) HTTP\/[0-9]\.[0-9]
EXTRACT-msg = (?s)--[0-9a-f]+-H--\n.*\[msg \"(?P<msg>[\w\s\/.]+)\"\]
EXTRACT-date = (?im)^\[(?P<date>[^ ]+)
EXTRACT-id = (?s)--[0-9a-f]+-H--\n.*\[id \"(?P<id>[\w\s\/.]+)\"\]
FIELDALIAS-xforwardedfor = xforwardedfor AS clientip
FIELDALIAS-srcip = srcip AS clientip
LOOKUP-check = checkip clientip OUTPUT ip_classification status
