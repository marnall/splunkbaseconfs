##############################################################################
####### ADDS REASONABLY GOOD SUPPORT FOR C++ AND JAVA BY BREAKING FUNCTIONS,
####### CLASSES, STRUCTS INTO SEPARATE EVENTS
#######         -- david@splunk.com
##############################################################################

[c++]
# -- break at end of functions, classes, and structs
MUST_BREAK_AFTER = ^}
BREAK_ONLY_BEFORE = gooblygook
MAX_EVENTS=4000
DATETIME_CONFIG = NONE
CHECK_METHOD = modtime
pulldown_type = true
category = Development
LEARN_MODEL = false


[java]
BREAK_ONLY_BEFORE = gooblygook
# -- break at end of classes or methods on level deep in class,
# --assuming indented one tab or 4 spaces
MUST_BREAK_AFTER = ^(?:\t| {0,4})}
# -- allow insanely long functions
MAX_EVENTS=4000
# -- ignore datetime
DATETIME_CONFIG = NONE
CHECK_METHOD = modtime
pulldown_type = true
category = Development
LEARN_MODEL = false

[source::....(c|cc|cpp|cs|cxx|h|hh|hpp|hxx)]
sourcetype = c++

[source::....(java)]
sourcetype = java

