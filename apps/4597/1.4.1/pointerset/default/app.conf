#
# Splunk app configuration file
#

[install]
is_configured = 0
build = 100

[ui]
is_visible = 0
label = pointerset streaming search command 

[package]
id = pointerset

[launcher]
author = Scott Barr
description = This command allows you to use the value of a field as a column name to set a target field with.  Similar to pointers in other programming languages.  Splunk supports the syntax of {fieldName} = to create dynamically named fields however you can not use this syntax on the right hand of the set.
version = 1.4.1
