[source::...ta-fastly-waf*.log*]
SHOULD_LINEMERGE = true
sourcetype = tafastlywaf:log

[source::...ta_fastly_waf*.log*]
SHOULD_LINEMERGE = true
sourcetype = tafastlywaf:log

[fastly-requests]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = timestamp":
TZ = UTC
category = Fastly WAF
pulldown_type = 1

[fastly-site-events]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = created":
TZ = UTC
category = Fastly WAF
pulldown_type = 1

[fastly-corp-events]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = created":
TZ = UTC
category = Fastly WAF
pulldown_type = 1
