[ccx_extend_description_extraction]
CLEAN_KEYS = 0
REGEX = \"(?<_KEY_1>[^\"]+)\": \"?(?<_VAL_1>(?:(?!\"?, \"?|\"\}).)*)(?=\"|\"\})?
SOURCE_KEY = description

[ccx_extend_duo_cisco_security_description_extraction]
