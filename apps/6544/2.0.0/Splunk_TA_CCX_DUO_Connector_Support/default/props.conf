EVAL-src_user = if(isnotnull(email) AND email!="null",'email', 'username')
EVAL-status = if(isnotnull(status), case(match(status,"^SUCCESS.*|Success.*|success.*|Active.*"),"success",match(status,"^.*FAIL.*|.*Fail.*|.*fail.*|.*DENY.*|.*Deny.*|.*deny.*|.*denied.*|.*Denied.*|.*ERROR.*|.*Error.*|.*error.*|.*Rejected.*|.*rejected.*"),"failure"),if(isnotnull(actionlabel), case(match(actionlabel,"^.*completed.*|.*Completed.*|.*added.*|.*Added.*|.*Created.*|.*created.*|.*deleted.*|.*Deleted.*|.*modified.*|.*Modified.*|.*stopped.*|.*Stopped.*|.*locked.*|.*Locked.*|.*lockout.*|.*Lockout.*|.*unlocked.*|.*Unlocked.*|.*updated.*|.*Updated.*|.*cleared.*|.*Cleared.*|.*started.*|.*Started.*|.*Restarted.*|.*restarted.*"),"success",1=1,"unknown"),coalesce('status',"unknown")))
