EVAL-signature = if(signature="null" AND new_enrollment="true","New Enrollment", if(isnotnull(signature) AND signature!="null",'signature', if(extracted_eventtype="administrator" AND (isnotnull(factor) OR isnotnull(primary_auth_method) OR isnotnull(error) OR isnotnull(Errors) OR isnotnull(actionlabel)),coalesce('error','actionlabel','Errors',tostring('primary_auth_method')." - ".tostring('factor').""),null())))
