EVAL-object_attrs = if(extracted_eventtype="administrator",'type_action',null())
EVAL-object_category = case(extracted_eventtype=="administrator" AND (like(type_action, "%user%") AND NOT like(type_action, "%login%")),"user", extracted_eventtype=="administrator" AND (like(type_action, "%phone_delete%")),"user", extracted_eventtype=="administrator" AND (like(type_action, "%group%")),"group", extracted_eventtype=="administrator" AND (like(type_action, "%policy%")),"policy", extracted_eventtype=="administrator" AND (like(type_action, "%token%")),"token", extracted_eventtype=="administrator" AND (like(type_action, "%hardtoken%")),"hardtoken", extracted_eventtype=="administrator" AND (like(type_action, "%directory%")),"directory", extracted_eventtype=="administrator" AND (like(type_action, "%link%")),"link", extracted_eventtype=="administrator" AND (like(type_action, "%integration%")),"application",true(),null())
