EVAL-action = if(isnotnull(result), case(match(result,"^SUCCESS.*|Success.*|success.*"),"success",match(result,"^FAIL.*|Fail.*|fail.*|DENY.*|Deny.*|deny.*|denied.*|ERROR.*|Error.*|error.*"),"failure"),if(isnotnull(actionlabel), case(match(actionlabel,"^Log.*in.*|log.*in.*|.*IN.*"),"success",match(actionlabel,"^Access denied"),"failure",match(actionlabel,"^.*completed"),"updated",match(actionlabel,"^.*start.*"),"started",match(actionlabel,"^.*added.*|.*Added.*"),"created",match(actionlabel,"^.*delet.*|.*Delet.*"),"deleted",match(actionlabel,"^.*modifi.*|.*Modifi.*"),"modified",match(actionlabel,"^.*lock.*|.*Lock.*"),"lockout",match(actionlabel,"^.*unlock.*|.*Unlock.*"),"unlocked",1=1,"unknown"),'type_action'))
