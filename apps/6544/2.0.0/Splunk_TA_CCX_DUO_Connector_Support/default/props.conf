EVAL-authentication_method = if(factor="n/a",'integration',coalesce('primary_auth_method','authentication_method'))
EVAL-authentication_service = if(extracted_eventtype=="account", null(), if(extracted_eventtype="administrator" AND (isnotnull('factor') OR isnotnull('primary_auth_method') OR isnotnull('error')),"Duo",null()))
EVAL-body = trim(description, "{|}|/\"|")
EVAL-change_type = case(extracted_eventtype=="administrator" AND (like(type_action, "%user%") AND NOT like(type_action, "%login%")),"user", extracted_eventtype=="administrator" AND (like(type_action, "%phone_delete%")),"user", extracted_eventtype=="administrator" AND (like(type_action, "%group%")),"group", extracted_eventtype=="administrator" AND (like(type_action, "%policy%")),"policy", extracted_eventtype=="administrator" AND (like(type_action, "%token%")),"token", extracted_eventtype=="administrator" AND (like(type_action, "%hardtoken%")),"hardtoken", extracted_eventtype=="administrator" AND (like(type_action, "%directory%")),"directory", extracted_eventtype=="administrator" AND (like(type_action, "%link%")),"link", extracted_eventtype=="administrator" AND (like(type_action, "%integration%")),"application",true(),null())
