[ccx_duo_account_report]
search = (sourcetype=duo) extracted_eventtype=account

[ccx_duo_alerts]
search = (sourcetype=duo) (extracted_eventtype=administrator NOT change_type="*") AND NOT eventtype IN("ccx_duo_authentication_logs","ccx_duo_changes")
#tags = alert

[ccx_duo_authentication_insecure]
search = (sourcetype=duo) (extracted_eventtype=authentication OR (extracted_eventtype=administrator AND authentication_service="*") AND ood_software!="null")
#tags = insecure

[ccx_duo_authentication_logs]
search = (sourcetype=duo) (extracted_eventtype=authentication OR (extracted_eventtype=administrator AND authentication_service="*"))
#tags = authentication

[ccx_duo_changes]
search = (sourcetype=duo) (extracted_eventtype=administrator AND change_type="*")
#tags = change

[ccx_duo_enrollment]
search = (sourcetype=duo) extracted_eventtype=enrollment

[ccx_duo_fraud_alarm]
search = (sourcerype=duo) result="fraud"
#tags = alert

[ccx_duo_telephony_events]
search = (sourcetype=duo) extracted_eventtype=telephony

[ccx_cisco_duo_account_report]
search = (sourcetype="cisco:duo:account") extracted_eventtype=account

[ccx_cisco_duo_alerts]
search = (sourcetype="cisco:duo:*") (extracted_eventtype=administrator NOT change_type="*") AND NOT eventtype IN("ccx_cisco_duo_authentication_logs","ccx_cisco_duo_changes")
#tags = alert

[ccx_cisco_duo_authentication_insecure]
search = (sourcetype="cisco:duo:*") (extracted_eventtype=authentication OR (extracted_eventtype=administrator AND authentication_service="*") OR (extracted_eventtype="activity" AND "action.name"="admin_login") AND ood_software!="null")
#tags = authentication insecure

[ccx_cisco_duo_authentication_logs]
search = (sourcetype="cisco:duo:*") extracted_eventtype=authentication OR (extracted_eventtype=administrator AND authentication_service="*") OR (extracted_eventtype="activity" AND "action.name"="admin_login")
#tags = authentication

[ccx_cisco_duo_changes]
search = (sourcetype="cisco:duo:*") (extracted_eventtype IN("administrator","activity") AND change_type="*")
#tags = change

[ccx_cisco_duo_enrollment]
search = (sourcetype="cisco:duo:*") extracted_eventtype=enrollment

[ccx_cisco_duo_fraud_alarm]
search = (sourcetype="cisco:duo:*") "fraud"
#tags = alert

[ccx_cisco_duo_telephony_events]
search = (sourcetype="cisco:duo:*") extracted_eventtype=telephony

[ccx_cisco_duo_sync_activity]
search = (sourcetype="cisco:duo:activity") actionlabel IN("*sync_begin","*sync_finish")

