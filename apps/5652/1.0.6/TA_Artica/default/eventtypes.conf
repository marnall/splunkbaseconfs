##
## Splunk Add-on for Artica
##
##

[artica_squid_access]
search = sourcetype=artica:squid:access
#tags = web proxy

[artica_nginx_access]
search = sourcetype=nginx:plus:access OR sourcetype="artica:nginx:access"
#tags = web inventory activity

[artica_nginx_error]
search = sourcetype=artica:nginx:error
#tag = error

[artica_ssh]
search = sourcetype=artica:ssh
#tag = ssh

[artica_auth]
search = sourcetype=artica:auth
#tag = auth

[artica_suricata_alert]
search = sourcetype=artica:suricata:alert NOT classification="Not Suspicious Traffic"

[artica_suricata_dns]
search = sourcetype=artica:suricata:dns

[artica_suricata_http]
search = sourcetype=artica:suricata:http

[artica_suricata_tls]
search = sourcetype=artica:suricata:tls

[artica_suricata_flow]
search = sourcetype=artica:suricata:flow

[artica_suricata_dhcp]
search = sourcetype=artica:suricata:dhcp

[artica_haproxy_default]
search= sourcetype=artica:haproxy:default

[artica_haproxy_http]
search = sourcetype=artica:haproxy:http

[artica_haproxy_tcp]
search = sourcetype=artica:haproxy:tcp

[artica_haproxy_clf_http]
search = sourcetype=artica:haproxy:clf:http

[artica_haproxy_splunk_http]
search = sourcetype=artica:haproxy:splunk:http
#tags = web proxy inventory loadbalancer network performance loadbalancer_web

[artica_hacluster_default]
search= sourcetype=artica:hacluster:default

[artica_hacluster_http]
search = sourcetype=artica:hacluster:http

[artica_hacluster_tcp]
search = sourcetype=artica:hacluster:tcp

[artica_hacluster_clf_http]
search = sourcetype=artica:hacluster:clf:http

[artica_hacluster_splunk_http]
search = sourcetype=artica:hacluster:splunk:http
#tags = web proxy inventory loadbalancer network performance loadbalancer_web

[artica_firewall]
search = sourcetype=artica:firewall*