[csgo_server]
EXTRACT-player = (?i)^(?:[^ ]* ){4}"(?P<player>[^<]+)
EXTRACT-steam_id = (?i)<*><(?P<steam_id>[^>]+)
EXTRACT-csgo_event = (?i) triggered "(?P<csgo_event>[^"]+)
EXTRACT-playerteam = (?i)<.*?>(?P<playerteam><\w+>)(?=
EXTRACT-weapon = ] with "(?P<weapon>[^"]+)
EXTRACT-purchased_weapon = (?i) purchased "(?P<purchased_weapon>[^"]+)
EXTRACT-killed_player = killed "(?P<killed_player>[^<]+)
EXTRACT-headshot = (?i)^(?:[^"]*"){6}\s+\((?P<headshot>[^\)]+)
