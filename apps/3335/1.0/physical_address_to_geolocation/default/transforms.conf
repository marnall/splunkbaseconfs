#
# Splunk app KV Store transforms file
#

[kvstore_lookup]
external_type = kvstore
collection = mycollection
fields_list = _key, CustID, CustName, CustStreet, CustState, CustCity, CustZip, CustLat, CustLon

[geolocation_lookup]
external_type = kvstore
collection = geolocation
fields_list = _key, cust_id, cust_name, cust_street, cust_city, cust_state, cust_zip, cust_lat, cust_lon, location_type, in_reconciliation

[reconcile_lookup]
external_type = kvstore
collection = reconcile
fields_list = _key, cust_id, cust_name, cust_street, cust_city, cust_state, cust_zip, cust_lat, cust_lon, location_type, kv_key, formatted_address

[state_abbr]
filename = states_abbr.csv
