[default]

[Update Geolocation]
action.script = 1
alert.suppress = 0
counttype = number of events
auto_summarize.dispatch.earliest_time = -1d@h
alert.track = 0
cron_schedule = */15 * * * *
search = | inputlookup geolocation_lookup\
| eval  key_id = _key\
| search (cust_lat=DNE OR cust_lon=DNE OR location_type=DNE) in_reconciliation=no
alert.digest_mode = True
enableSched = 1
action.script.filename = address_to_lat_lon.pl
quantity = 0
relation = greater than

