[jamf:protect:web]
# Identify and split data to specific sourcetypes
TRANSFORMS-set_sourcetypes = set_jamf_protect_web_threat,set_jamf_protect_web_traffic
description = Jamf Security Cloud Streams

[jamf:protect:web:threat]
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 24
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%QZ
TIME_PREFIX = \,\"timestamp\":\"
category = Custom
description = Jamf Protect Web Threat Stream
pulldown_type = true
KV_MODE=json

FIELDALIAS-app = event.app.name AS app
FIELDALIAS-category = event.eventType.name AS category
FIELDALIAS-dest_ip = event.destination.ip AS dest_ip
FIELDALIAS-dest_port = event.destination.port AS dest_port
FIELDALIAS-dvc = event.device.userDeviceName AS dvc
FIELDALIAS-dvc_ip = event.source.ip AS dvc_ip
FIELDALIAS-file_name = event.app.name AS file_name
FIELDALIAS-product = event.metadata.product AS product
FIELDALIAS-severity_id = event.severity AS severity_id
FIELDALIAS-signature = event.eventType.description AS signature
FIELDALIAS-signature_id = event.eventType.id AS signature_id
FIELDALIAS-src_ip = event.source.ip AS src_ip
FIELDALIAS-src_port = event.source.port AS src_port
FIELDALIAS-src_user = event.user.email AS src_user
FIELDALIAS-url = event.eventUrl AS url
FIELDALIAS-user_mail = event.user.email AS user_mail
FIELDALIAS-vendor = event.metadata.vendor AS vendor
FIELDALIAS-vendor_account = event.account.customerId AS vendor_account

EVAL-action = if('event.action'=="Detected" OR 'event.action'=="Resolved","allowed","blocked")
EVAL-date = strftime(strptime('event.timestamp', "%Y-%m-%dT%H:%M:%S.%QZ"), "%Y-%m-%d")
EVAL-dest = if(isnull('event.destination.name'),'event.device.userDeviceName','event.destination.name')
EVAL-dest_name = if(isnull('event.destination.name'),'event.device.userDeviceName','event.destination.name')
EVAL-dest_port = case(isnotnull('event.destination.port'),'event.destination.port')
EVAL-dvcType = case(match('event.device.os',"MAC_OS"),"Computer", match('event.device.os',"IOS"),"Mobile Device", match('event.device.os',"WINDOWS"),"Computer", match('event.device.os',"ANDROID"),"Mobile Device", match('event.device.os',"UNKNOWN"),"Unknown")
EVAL-file_hash = coalesce('event.app.sha256','event.app.sha1')
EVAL-ids_type = "network"
EVAL-os = case(match('event.device.os',"MAC_OS"),"macOS", match('event.device.os',"IOS"),"iOS", match('event.device.os',"WINDOWS"),"WINDOWS", match('event.device.os',"ANDROID"),"Android", match('event.device.os',"UNKNOWN"),"Unknown")
EVAL-receiptTime = strftime(strptime('event.timestamp', "%Y-%m-%dT%H:%M:%S.%3NZ"), "%s%3N")
EVAL-severity = case('event.severity'==10,"critical",'event.severity'==8,"high",'event.severity'==6,"medium",'event.severity'==4,"low",'event.severity'==2,"informational")
EVAL-src = if(isnotnull('event.source.ip'),'event.source.ip','event.device.userDeviceName')
EVAL-transport = "tcp"
EVAL-user = coalesce('event.user.name','event.user.email')
EVAL-vendor_product = 'event.metadata.vendor'+" Protect"+":"+'event.metadata.product'

[jamf:protect:web:traffic]
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 13
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = \,\"receiptTime\"\:
category = Custom
description = Jamf Protect Web Traffic Stream
disabled = false
pulldown_type = true

FIELDALIAS-dest_ip = event.destination.ips{} AS dest_ip
FIELDALIAS-dvc = event.device.deviceId AS dvc
FIELDALIAS-product = event.metadata.product AS product
FIELDALIAS-query = event.domain AS query
FIELDALIAS-record_type = event.dns.recordType AS record_type
FIELDALIAS-reply_code = event.dns.responseStatus AS reply_code
FIELDALIAS-rule = event.signatureId.name AS rule
FIELDALIAS-rule_id = event.signatureId.id AS rule_id
FIELDALIAS-src_interface = event.networkInterface AS src_interface
FIELDALIAS-src_ip = event.source.ip AS src_ip
FIELDALIAS-src_port = event.source.port AS src_port
FIELDALIAS-threat_result = event.threat.result AS threat_result
FIELDALIAS-tld = event.tld AS tld
FIELDALIAS-ttl = event.dns.ttl AS ttl
FIELDALIAS-user_mail = event.user.email AS user_mail
FIELDALIAS-vendor = event.metadata.vendor AS vendor
FIELDALIAS-vendor_account = event.account.customerId AS vendor_account

EVAL-action = if('event.blocked'=="false","allowed","blocked")
EVAL-date = strftime(strptime('event.timestamp', "%Y-%m-%dT%H:%M:%S.%QZ"), "%Y-%m-%d")
EVAL-dest = if(isnotnull('event.hostName'),'event.hostName','event.device.deviceId')
EVAL-dvcType = case(match('event.device.osType',"MAC_OS"),"Computer", match('event.device.osType',"IOS"),"Mobile Device", match('event.device.osType',"WINDOWS"),"Computer", match('event.device.osType',"ANDROID"),"Mobile Device", match('event.device.osType',"UNKNOWN"),"Unknown")
EVAL-src = if(isnotnull('event.source.ip'),'event.source.ip','event.device.deviceId')
EVAL-user = coalesce('event.user.name','event.user.email')
EVAL-vendor_product = 'event.metadata.vendor'+" Protect"+":"+'event.metadata.product'
