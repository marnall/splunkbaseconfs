####################################
# Jamf Protect Alerts Sourcetype
####################################
[jamf:protect:alerts]
CHARSET=UTF-8
MAX_TIMESTAMP_LOOKAHEAD=18
SHOULD_LINEMERGE=false
category=Custom
description=Jamf Protect Alert Logs
disabled=false
pulldown_type=true
KV_MODE=json
LINE_BREAKER=([\r\n]+)
TIME_FORMAT=%s.%7Q
TIME_PREFIX="timestamp":
###Truncate limit increased for long events such as credential dumps. Default is only 10000
TRUNCATE=99999
TRANSFORMS-set_sourcetype = set_sourcetype_jamf_protect_alerts

FIELDALIAS-args = "input.related.processes{}.args{}" AS args
FIELDALIAS-category = "input.match.facts{}.tags{}" AS category
FIELDALIAS-description = "input.match.facts{}.human" AS description
FIELDALIAS-dest = "input.host.hostname" AS dest
FIELDALIAS-dest_ip = "input.host.ips{}" AS dest_ip
FIELDALIAS-detection_name = "input.match.facts{}.name" AS detection_name
FIELDALIAS-downloaded_from = "input.related.files{}.downloadedFrom{}" ASNEW downloaded_from
FIELDALIAS-dvc = "input.host.hostname" AS dvc
FIELDALIAS-event_name = "input.eventType" AS event_name
FIELDALIAS-file_access_time = "input.related.files{}.accessed" AS file_access_time
FIELDALIAS-file_create_time = "input.related.files{}.created" AS file_create_time
FIELDALIAS-file_hash = "input.related.binaries{}.sha1hex" AS file_hash
FIELDALIAS-file_modify_time = "input.related.files{}.modified" AS file_modify_time
FIELDALIAS-file_size = "input.related.files{}.size" AS file_size
FIELDALIAS-id = "input.match.uuid" AS id
FIELDALIAS-os = "input.host.os" AS os
FIELDALIAS-path = "input.match.event.path" AS path
FIELDALIAS-product_version = "input.host.protectVersion" AS product_version
FIELDALIAS-severity_id = "input.match.severity" AS severity_id
FIELDALIAS-sha1 = "input.related.binaries{}.sha1hex" AS sha1
FIELDALIAS-sha256 = "input.related.binaries{}.sha256hex" AS sha256
FIELDALIAS-url = "input.related.files{}.downloadedFrom{}" AS url
### Use ASNEW with the field alias below so that it only uses the alias if the field <user> does not already exist
FIELDALIAS-user = "input.related.users{}.name" ASNEW user
FIELDALIAS-user_ids = user_uid ASNEW user_id
FIELDALIAS-user_name = "input.related.users{}.name" ASNEW user_name
FIELDALIAS-user_role = "input.related.groups{}.name" AS user_role
FIELDALIAS-vendor_account = caid AS vendor_account
FIELDALIAS-vendor_action = "input.match.facts{}.actions{}.name" AS vendor_action
EVAL-action = case(match('input.match.actions{}.name',"Prevented") OR match('input.match.facts{}.name',"XProtectDetection|GatekeeperBlocked"), "blocked", true(), "allowed")
EVAL-app = coalesce(case('input.eventType'=="GPGatekeeperEvent","Gatekeeper"),case('input.match.facts{}.name'=="XProtectDetection","XProtect"),"Jamf Protect")
EVAL-args = mvdedup(args)
EVAL-date = strftime(strptime('input.match.event.timestamp', "%s.%6N"), "%Y-%m-%d")
EVAL-duration = timeendpos-timestartpos
EVAL-durationstr = tostring(timeendpos-timestartpos,"duration")
EVAL-file_path = replace(file_path, "\\\\","")
EVAL-file_isAppBunlde = case('input.related.files{}.isAppBundle'=="true","true",'input.related.files{}.isAppBundle'=="false","false")
EVAL-file_isDirectory = case('input.related.files{}.isDirectory'=="true","true",'input.related.files{}.isDirectory'=="false","false")
EVAL-file_isDownload = case('input.related.files{}.isDownload'=="true","true",'input.related.files{}.isDownload'=="false","false")
EVAL-file_isScreenShot = case('input.related.files{}.isScreenShot'=="true","true",'input.related.files{}.isScreenShot'=="false","false")
EVAL-ids_type = "host"
EVAL-ItemBinary = mvdedup(ItemBinary)
EVAL-ItemName = mvdedup(ItemName)
EVAL-Label = mvdedup(Label)
EVAL-lastProcessName = mvindex('input.related.processes{}.name', -1)
EVAL-lastResponsiblePID = mvindex('input.related.processes{}.responsiblePID', -1)
EVAL-Name = mvdedup(Name)
EVAL-parent_process_args = replace(parent_process_args, "\\\\","")
EVAL-parent_process_id = coalesce('input.match.event.process.ppid', mvindex('input.related.processes{}.ppid', 0))
EVAL-parent_process_path = replace(parent_process_path, "\\\\","")
EVAL-process_args = replace(process_args, "\\\\","")
EVAL-process_event_subType = case('input.match.event.subType'=="7","Exec", 'input.match.event.subType'=="1","Fork",'input.match.event.subType'=="23","Execve",'input.match.event.subType'=="43190","Posix Spawn")
EVAL-process_event_type = case('input.match.event.type'=="0","None",'input.match.event.type'=="1","Create",'input.match.event.type'=="2","Exit")
EVAL-process_guid = coalesce('input.match.event.process.uuid', mvindex('input.related.processes{}.uuid', 0))
EVAL-process_id = coalesce('input.match.event.process.pid', mvindex('input.related.processes{}.pid', 0))
EVAL-process_name = coalesce('input.match.event.process.name',mvindex('input.related.processes{}.name', 0))
EVAL-process_path = replace(process_path, "\\\\","")
EVAL-process_responsible_pid= coalesce('input.match.event.process.responsiblePID', mvindex('input.related.processes{}.responsiblePID', 0))
EVAL-process_ruid = coalesce('input.match.event.process.ruid', mvindex('input.related.processes{}.ruid', 0))
EVAL-process_uid = coalesce('input.match.event.process.uid', mvindex('input.related.processes{}.uid', 0))
EVAL-reason = coalesce('input.match.event.matchType','input.match.facts{}.human')
EVAL-severity = case('input.match.facts{}.severity'=="3","high",'input.match.facts{}.severity'=="2","medium",'input.match.facts{}.severity'=="1","low",'input.match.facts{}.severity'=="0" OR isnull('input.match.facts{}.severity'),"informational")
EVAL-signature = coalesce('input.match.event.matchValue',mvdedup(XProtectSignatureName),'input.match.facts{}.name')
EVAL-signature_id = 'input.match.event.uuid'
EVAL-signature_version = if(match('input.match.facts{}.version', "^(?!\\d$)\\d+$"), 'input.match.facts{}.version', null())
EVAL-signerType = case(signerType==0,"apple",signerType==1,"app store", signerType==2,"developer", signerType==3,"adhoc", signerType==4,"unsigned")
EVAL-teamid = if(teamid == "", null(), teamid)
EVAL-vendor_action = 'input.match.facts{}.actions{}.name'
EVAL-vendor_product="Jamf Protect"
EVAL-XProtectSignatureName = mvdedup(XProtectSignatureName)
REPORT-jamf_protect_appid = jamf_protect_appid
REPORT-jamf_protect_cdhash = jamf_protect_cdhash
REPORT-jamf_protect_clean_contexts = jamf_protect_clean_contexts
REPORT-jamf_protect_file_info = jamf_protect_file_info
REPORT-jamf_protect_group_info = jamf_protect_group_info
REPORT-jamf_protect_mitre_technique_id = jamf_protect_mitre_technique_id
REPORT-jamf_protect_process_args = jamf_protect_process_args
REPORT-jamf_protect_process_path = jamf_protect_process_path
REPORT-jamf_protect_sha_info = jamf_protect_sha1, jamf_protect_sha256
REPORT-jamf_protect_short_usernames = jamf_protect_short_usernames
REPORT-jamf_protect_signertype = jamf_protect_signertype
REPORT-jamf_protect_signing_status = jamf_protect_signing_status
REPORT-jamf_protect_signing_status_message = jamf_protect_signing_status_message
REPORT-jamf_protect_teamid = jamf_protect_teamid
REPORT-jamf_protect_user_info = jamf_protect_user_info

