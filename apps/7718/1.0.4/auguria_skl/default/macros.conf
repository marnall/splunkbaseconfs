[auguria_index]
definition = index=main
iseval = 0

[number_to_shorthand(2)]
args = input_field_name, output_field_name
definition = eval temp_num = abs($input_field_name$)\
| eval magnitude = case(\
    temp_num >= 1000000000000, "T",\
    temp_num >= 1000000000, "B",\
    temp_num >= 1000000, "M",\
    temp_num >= 1000, "K",\
    1=1, ""\
)\
| eval divisor = case(\
    temp_num >= 1000000000000, 1000000000000,\
    temp_num >= 1000000000, 1000000000,\
    temp_num >= 1000000, 1000000,\
    temp_num >= 1000, 1000,\
    1=1, 1\
)\
| eval $output_field_name$ = case(\
    your_field_name < 0, "-",\
    1=1, ""\
) + tostring(round(temp_num/divisor, 1)) + magnitude\
| fields - temp_num, magnitude, divisor
iseval = 0
