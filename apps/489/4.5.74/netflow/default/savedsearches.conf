search = `netflow_search_rule_20103` oid_set=*mem mem_* exp_ip=* \
           | fillnull value="" mgmt_ip sysName \
           | eval device_sysname = (((mgmt_ip . " (") . sysName) . ")") \
           | fillnull value=NULL mem_free mem_used mem_total mem_used_percent \
           | eval mem_free=if(mem_free=="NULL",mem_total-mem_used,mem_free) \
           | eval mem_used=if(mem_used=="NULL",mem_total-mem_free,mem_used) \
           | eval mem_total=if(mem_total=="NULL",mem_used+mem_free,mem_total) \
           | eval mem_used_percent=if(mem_used_percent=="NULL",100*mem_used/mem_total,mem_used_percent) \
           | where mem_used_percent>80 \
           | table nfo_hostname device_sysname mem_used_percent \
           | rename nfo_hostname as "NFO" \
           | rename device_sysname as "Device (sysName)" \
           | rename mem_used_percent as "Memory utilization %"

[SNMP - Interface Relative Load > 85%]
action.email.inline = 1
