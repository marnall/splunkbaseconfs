search = `netflow_search_rule_20103` ifHCInOctets \
           | stats  max(ifHCInOctets) as maxinoctets min(ifHCInOctets) as mininoctets \
               max(ifHCOutOctets) as maxoutoctets min(ifHCOutOctets) as minoutoctets \
               avg(ifHighSpeed) as ifHighSpeed avg(ifSpeed) as ifSpeed \
             by interface_name  exp_ip ifIndex  sysName ifDescr nfo_hostname \
           | eval TotalTraffic = (maxinoctets-mininoctets)+(maxoutoctets-minoutoctets) \
           | fillnull value=NULL ifSpeed ifHighSpeed \
           | eval ifSpeed=if(ifHighSpeed==NULL,ifSpeed/1000000,ifHighSpeed) \
           | eval AverageSpeed=TotalTraffic*8/(300*1000000) \
           | eval percOfUsageBoth = round(AverageSpeed/(ifSpeed)*100, 2) \
           | where percOfUsageBoth>85 \
           | table interface_name percOfUsageBoth \
           | rename interface_name as "Interface Name" \
           | rename percOfUsageBoth as "Interface Usage"

