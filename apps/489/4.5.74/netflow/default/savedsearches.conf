[20067_summary_5min_subnet_groups]
action.summary_index = 1
action.summary_index._metric_dims = protocol_id
action.summary_index._name = summary_metrics
action.summary_index._type = metric
alert.track = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -5min@min
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
realtime_schedule = 0
schedule_priority = highest
schedule_window = auto
search = `netflow_search_rule_20067` \
    | lookup my_subnets_lookup subnet AS src_ip OUTPUT level_2 AS src_group level_1 as src_datacenter \
    | lookup my_subnets_lookup subnet AS dest_ip OUTPUT level_2 AS dest_group level_1 as dest_datacenter \
    | where src_group != dest_group  \
    | eval subnet_group_pair=src_group+" to "+dest_group    \
    | lookup sampling_lookup nfo_hostname exp_ip flow_smpl_id OUTPUT smpl_int \
    | eval bytes_in=if(isnull(smpl_int),bytes_in,(bytes_in * smpl_int)) \
    | eval packets_in=if(isnull(smpl_int),packets_in,(packets_in * smpl_int)) \
    | eval flow_count=if(isnull(smpl_int),flow_count,(flow_count * smpl_int)) \
    | fillnull value="" transport  \
    | stats sum(bytes_in) as sum_bytes_in \
      sum(packets_in) as sum_packets_in \
      sum(flow_count) as sum_flow_count \
        by nfo_hostname exp_ip  transport protocol_id dest_group dest_datacenter src_group src_datacenter\
    | table sum_bytes_in sum_packets_in sum_flow_count  nfo_hostname exp_ip  dest_group dest_datacenter src_group src_datacenter transport protocol_id
disabled = 1

