[ITOps - Hosts with most count of failed TCP connections]
action.email.inline = 1
action.email.message.alert = The alert condition for '$name$' was triggered. See details : $action.email.hostname$/en-US/app/netflow/tcp_health
action.email.sendresults = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `netflow_search_rule_20060` nfo_hostname="*"                          \
            | eventstats latest(src_host) as l_src_host by src_ip nfo_hostname \
            | stats sum(reset_count) as sumResetCount                          \
                    by  nfo_hostname src_ip l_src_host sum_total_by_nfo        \
            | search  sumResetCount > 100                                      \
            | sort - sumResetCount                                             \
            | `commas_formatting(Reset Count, sumResetCount)`                  \
            | table nfo_hostname src_ip l_src_host "Reset Count"               \
            | rename src_ip as "Source IP"                                     \
            | rename l_src_host as "Source Host"                               \
            | rename nfo_hostname as NFO


[ITOps - Hosts with largest share of failed TCP connections]
action.email.inline = 1
action.email.message.alert = The alert condition for '$name$' was triggered. See details : $action.email.hostname$/en-US/app/netflow/tcp_health
action.email.sendresults = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `netflow_search_rule_20060` nfo_hostname="*" \
            | eventstats latest(src_host) as l_src_host by src_ip nfo_hostname \
            | eval slice_total=ceil(100*reset_count/total_share) \
            | eval slice_local=ceil(100*reset_count/local_share) \
            | eventstats mode(slice_total) as total_by_nfo  by nfo_hostname _time \
            | eventstats mode(slice_local) as local_by_nfo  by nfo_hostname src_ip l_src_host _time \
            | eventstats sum(total_by_nfo) as sum_total_by_nfo  by nfo_hostname \
            | eventstats sum(local_by_nfo) as sum_local by src_ip l_src_host nfo_hostname \
            | stats sum(reset_count) as sumResetCount \
                  mode(sum_local) as sumLocalCount \
                    by  nfo_hostname src_ip l_src_host sum_total_by_nfo \
            | eval percTotal = sumResetCount/sum_total_by_nfo*100 \
            | eval percLocal = sumResetCount/sumLocalCount*100 \
            | search sumResetCount > 10 \
            | sort - percLocal sumResetCount \
            | `commas_formatting(Reset Count, sumResetCount)` \
            | table nfo_hostname src_ip l_src_host "Reset Count" \
            | rename src_ip as "Source IP" \
            | rename l_src_host as "Source Host" \
            | rename nfo_hostname as NFO


[ITOps - Interface Utilisation > 85%]
action.email.inline = 1
action.email.message.alert = The alert condition for '$name$' was triggered. See details : $action.email.hostname$/en-US/app/netflow/interfaces_traffic
action.email.sendresults = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `netflow_search_rule_20067` exp_ip="*" nfo_hostname="*" \
      | `sampling(bytes_in)` \
      | eventstats sum(bytes_in) as sum_by_exp by exp_ip nfo_hostname \
      | lookup exporters_devices_lookup nfo_hostname exp_ip OUTPUT device_group AS exp_group \
      | search exp_group="*" * (input_snmp="*" OR output_snmp="*") \
      | bin _time span=3s \
      | stats sum(bytes_in) as sum_bytes_in sum(packets_in) as sum_packets_in sum(flow_count) as sum_flow_count by nfo_hostname exp_ip src_ip src_port src_host dest_ip dest_port dest_host transport input_snmp output_snmp flow_smpl_id sum_by_exp _time \
      | eval snmps=input_snmp+","+output_snmp  \
      | eval snmps=split(snmps,",") \
      | `sampling(sum_packets_in)` \
      | `sampling(sum_flow_count)` \
      |  stats  sum(sum_bytes_in) as sumbytes \
                sum(sum_packets_in) as sumpacketsin \
                    by  exp_ip sum_by_exp snmps _time nfo_hostname \
      | eval avgbits= sumbytes*8/(3) \
      | stats sum(sumbytes) as TrafficAmount \
          sum(sumpacketsin) as PacketsAmount \
            by exp_ip sum_by_exp snmps nfo_hostname \
      | eval AverageSpeed=(TrafficAmount)*8/300.000 \
      | eval PacketsSpeed=(PacketsAmount)/300.000 \
      | `get_iface_name(snmp_name, snmps)` \
      | search snmp_name = "*" snmps = "*" \
      | `get_iface_speed(snmp_speed, snmps)` \
      | `get_exporter_name(exp_ip_name)` \
      | strcat exp_ip_name "/" snmp_name exp_snmp \
      | eval TrafficSpeedBoth=AverageSpeed/1000000 \
      | eval percOfUsageBoth = round(TrafficSpeedBoth/(snmp_speed)*100, 2) \
      | table nfo_hostname exp_snmp percOfUsageBoth \
      | search percOfUsageBoth>85 \
      | sort - percOfUsageBoth \
      | rename exp_snmp as "Device/Interface" \
      | rename percOfUsageBoth as "% of Usage Both" \
      | rename nfo_hostname as "NFO"

