[20067_summary_5min]
action.summary_index = 1
action.summary_index._metric_dims = src_port,dest_port,protocol_id,transport,input_snmp,output_snmp
action.summary_index._name = summary_metrics
action.summary_index._type = metric
alert.track = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -5min@min
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
realtime_schedule = 0
schedule_priority = highest
schedule_window = auto
search = `netflow_search_rule_20067`   \
  | lookup sampling_lookup nfo_hostname exp_ip flow_smpl_id OUTPUT smpl_int \
  | eval bytes_in=if(isnull(smpl_int),bytes_in,(bytes_in * smpl_int)) \
  | eval packets_in=if(isnull(smpl_int),packets_in,(packets_in * smpl_int)) \
  | eval flow_count=if(isnull(smpl_int),flow_count,(flow_count * smpl_int)) \
  | fillnull value="" transport  \
  | lookup port_lookup port as dest_port OUTPUT service as dest_service | lookup port_lookup port as src_port OUTPUT service as src_service\
  | eval src_port=if(src_service!="unknown",src_port,if((src_service=="unknown" AND dest_service=="unknown") AND src_port<dest_port,src_port,0)) \
  | eval dest_port=if(dest_service!="unknown",dest_port,if((src_service=="unknown" AND dest_service=="unknown") AND dest_port<src_port,dest_port,0)) \
  | stats sum(bytes_in) as sum_bytes_in \
    sum(packets_in) as sum_packets_in \
    sum(flow_count) as sum_flow_count \
      by nfo_hostname exp_ip  src_ip src_port src_host dest_ip dest_port dest_host  transport protocol_id input_snmp output_snmp  \
  | table sum_bytes_in sum_packets_in sum_flow_count nfo_hostname exp_ip  src_ip src_port src_host  dest_ip dest_port dest_host \
        transport protocol_id input_snmp output_snmp
disabled = 1

