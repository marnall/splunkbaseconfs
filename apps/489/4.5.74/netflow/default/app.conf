[package]
id = netflow

[install]
is_configured = 0
build = 26
state_change_requires_restart = true

[ui]
is_visible = 1
is_manageable = 1
label = NetFlow and SNMP Analytics for Splunk

[launcher]
author = NetFlow Logic
description = This app provides visibility into your network traffic. It allows you to view top talkers, top destinations, top applications, and search network conversations. The app also shows traffic going through your network devices, allowing drill down to interfaces, showing % of usage.
version = 4.5.74

