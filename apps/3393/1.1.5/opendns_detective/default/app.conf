[launcher]
version = 1.1.5
description = This app provides a useful SPL command for querying the OpenDNS Investigate API, along with examples and documentation.
author = rharrisssi

[package]
id = opendns_detective
check_for_updates = true

[install]
state = enabled
state_change_requires_restart = true
#is_configured = true
build = 1
allows_disable = true

[ui]
is_visible = true
show_in_nav = true
label = OpenDNS Detective
