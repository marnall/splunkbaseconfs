[rapid7:nexpose:vuln]

EVAL-category = split('category', ";")
EVAL-dest_ip = if(isnull(dest_ip) AND (cidrmatch("0.0.0.0/0",'dest') OR cidrmatch("::/0",'dest')),'dest','dest_ip')
EVAL-url = if(isnotnull(other_references) AND other_references like("%URL:%"), split(replace(replace('other_references', "URL:|;URL:","@@@@"), "@@@@(?<url>.*)$", "\1"),"@@@@"),null())
EVAL-vendor_product = vendor+":"+product
EVAL-xref = if(isnotnull(other_references) AND NOT other_references like("%URL:%"), split('other_references', ";"),null())

[rapid7:insightvm:asset]

EVAL-body = if('malware_kits'=="1", toString('host_name') + " - " + "vulnerable host" + " - " + "vulnerabilities detected " + toString('total_vulnerabilities'), null())
EVAL-description = if('malware_kits'=="1", toString('host_name') + " - " + "vulnerable host" + " - " + "vulnerabilities detected " + toString('total_vulnerabilities'), null())
EVAL-family = if(isnull('os_family') OR 'os_family'=="", null(), 'os_family')
EVAL-os = if(isnull(coalesce('os_description', 'os_name', 'os_system_name')) OR coalesce('os_description', 'os_name', 'os_system_name')=="", null(), coalesce('os_description', 'os_name', 'os_system_name'))
EVAL-severity = if('malware_kits'=="1", coalesce(severity, Severity, "unknown"), null())
EVAL-signature = if(isnull('os_family') OR 'os_family'=="", null(), 'os_family')
EVAL-type = if('malware_kits'=="1", "alarm", null())
EVAL-app = if('malware_kits'=="1", "InsightVM", null())
EVAL-dest = 'ip'
EVAL-status = if(isnull('status'), 'credential_assessments{}.status', 'status')
EVAL-vendor_product = if(isnull('vendor_product'), "Rapid7:InsightVM", 'vendor_product')

[rapid7:insightvm:asset:vulnerability_finding]

FIELDALIAS-signature_id = vulnerability_id AS signature_id
FIELDALIAS-dest_ip = asset_ip AS dest_ip
FIELDALIAS-signature = solution_summary AS signature

EVAL-cvss_v3_severity = if(isnotnull('cvss_v3_score'),case(('cvss_v3_score'==0.0),"informational",('cvss_v3_score'>=0.1 AND 'cvss_v3_score'<=3.9),"low",('cvss_v3_score'>=4.0 AND 'cvss_v3_score'<=6.9),"medium",('cvss_v3_score'>=7.0 AND 'cvss_v3_score'<=8.9),"high",('cvss_v3_score'>=9.0),"critical"),null())
EVAL-dest_port = if('port'=="null", null(), 'port')
EVAL-dvc = if(isnull('asset_hostname') OR 'asset_hostname'==" " OR 'asset_hostname'=="",null(), 'asset_hostname')
EVAL-os = if(like(key, "Microsoft%") OR like(key, "Ubuntu%") OR like(key, "%Linux%") OR like(key, "%Apple%"), key, null())
EVAL-severity = if(isnotnull('cvss_v3_score'),case(('cvss_v3_score'==0.0),"informational",('cvss_v3_score'>=0.1 AND 'cvss_v3_score'<=3.9),"low",('cvss_v3_score'>=4.0 AND 'cvss_v3_score'<=6.9),"medium",('cvss_v3_score'>=7.0 AND 'cvss_v3_score'<=8.9),"high",('cvss_v3_score'>=9.0),"critical"),lower('severity'))
EVAL-vendor_product = "Rapid7:InsightVM"

LOOKUP-ccx_rapid7_match_for_cve = ccx_rapid7_vulnerability_cve_lookup id AS vulnerability_id OUTPUTNEW category cve description severity title AS xref
LOOKUP-ccx_rapid7_match_vuln_id = ccx_rapid7_vulnerability_id_lookup vulnerability_id AS signature_id OUTPUTNEW category description severity title AS xref


[rapid7:insightvm:vulnerability_definition]

FIELDALIAS-ccx_rapid7_log_severity = severity AS log_severity
FIELDALIAS-aob_gen_rapid7:insightvm:vulnerability_definition_alias_1 = categories AS category
FIELDALIAS-aob_gen_rapid7:insightvm:vulnerability_definition_alias_2 = cves AS cve

EVAL-cvss_v3_severity = if(isnotnull('cvss_v3_score'),case(('cvss_v3_score'==0.0),"informational",('cvss_v3_score'>=0.1 AND 'cvss_v3_score'<=3.9),"low",('cvss_v3_score'>=4.0 AND 'cvss_v3_score'<=6.9),"medium",('cvss_v3_score'>=7.0 AND 'cvss_v3_score'<=8.9),"high",('cvss_v3_score'>=9.0),"critical"),null())
EVAL-severity = if(isnotnull('cvss_v3_score'),case(('cvss_v3_score'==0.0),"informational",('cvss_v3_score'>=0.1 AND 'cvss_v3_score'<=3.9),"low",('cvss_v3_score'>=4.0 AND 'cvss_v3_score'<=6.9),"medium",('cvss_v3_score'>=7.0 AND 'cvss_v3_score'<=8.9),"high",('cvss_v3_score'>=9.0),"critical"),lower('log_severity'))
