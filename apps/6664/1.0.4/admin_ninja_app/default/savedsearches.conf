[Splunk Users lookup gen]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 47 * * * *
description = This report automatically populates the lookup admin_ninja_users with the latest output of Splunk Users in the environment
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","index","content.tags{}","content.type"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = `ninja_index` sourcetype=ninja:authentication\
| eval UUID = name." @ ".host \
| stats values(content.roles{}) AS Roles values(content.capabilities{}) AS Capabilities latest(content.realname) AS "Real Name" latest(content.defaultApp) AS "Default App" latest(content.email) AS Email latest(content.locked-out) AS "Locked Out" latest(content.tz) AS Timezone latest(content.type) as auth_type BY UUID, name\
| eval "is Admin" = if(IN (Capabilities, "admin_all_objects"), "True", "False")\
| fields UUID, name, Roles, "is Admin", "Real Name", Email, "Default App", "Locked Out", Timezone, auth_type\
| replace "" WITH "Not set"\
| rename name as Username, auth_type as "Authentication Method"\
| eval modtime = now()\
| outputlookup admin_ninja_users.csv append=false

[Summary: App Management Events]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 42 3 * * *
description = This report summary indexes events where an app has been upgraded, uninstalled or installed - as well as who has done it (if done through the GUI)
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","index","content.tags{}","content.type"]
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = (index="_configtracker" data.path="*app.conf" data.changes{}.properties{}.name="version")\
OR\
(index=_audit sourcetype=audittrail action=install_app info=succeeded user=*)\
| rename data.changes{}.properties{}.* as *\
| eval old_version = mvfilter(match(old_value, "[\d\w]+\.[\d\w]+\.[\d\w]+"))\
| eval new_version = mvfilter(match(new_value, "[\d\w]+\.[\d\w]+\.[\d\w]+"))\
| eval event_type = case(new_version>old_version, ("This app/add-on has been upgraded from ".old_version." to ".new_version), new_version<old_version, ("This app/add-on has been downgraded from ".old_version." to ".new_version), isnotnull(new_version) AND isnull(old_version), ("This app/add-on has been recently installed, at version: ".new_version), isnull(new_version) AND isnotnull(old_version), ("This app/add-on has been recently removed, was version: ".old_version), true(), null())\
| rex field=data.path "(?<App>[\w\d\-\_\|]+)[\/\\\][\w\d\-\_\|]+[\/\\\]app.conf"\
| eval app = coalesce(App, app_name)\
| bin _time span=10s\
| stats list(event_type) as "App Event" values(user) as User by _time host app\
| fillnull value="unknown" User\
| rename host as Host, app as App\
| collect index=`ninja_summary` marker="ninja_summary=App Management Events"

[Summary: Changes to Deployment Apps]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 32 4 * * 0
description = This report summary indexes events where changes have been made (through the GUI) to Deployment Apps.
dispatch.earliest_time = -7d@w0
dispatch.latest_time = @w0
display.events.fields = ["host","source","sourcetype","index","content.tags{}","content.type"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunk*_access method=POST status=200 uri="*/splunkd/__raw/services/deployment/server/applications*"\
| table _time host user file\
| rename file as deployment_app\
| collect index=`ninja_summary` marker="ninja_summary=Changes to Deployment Apps"

