[Health : KV Store Failed!]
action.webhook.enable_allowlist = 0
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 43 */4 * * *
description = This alert is set to trigger whenever there's a KV store in the environment that has failed to start.
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","index","content.tags{}","content.type"]
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = `ninja_index` sourcetype="ninja:kvstore" content.current.disabled="false" NOT content.current.status IN("ready", "starting")\
| table _time host content.current.status content.current.port content.current.replicationStatus content.current.standalone content.members.*.hostAndPort content.members.*.uptime\
| rename content.current.* as *, content.members.*.hostAndPort as kvcluster-host-*-hostAndPort, content.members.*.uptime as kvcluster-host-*-uptime

[Health : Deployment Client(s) have stopped reporting!]
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 49 6 * * *
description = This alert fires on the condition that deployment clients have stopped phoning home to the deployment server.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","index","content.tags{}","content.type","content"]
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = `ninja_index` sourcetype="ninja:dsclients"\
| stats latest(content.lastPhoneHomeTime) as lastPhoneHome by content.hostname, host\
| eval _time = lastPhoneHome\
| convert timeformat="%Y-%m-%d %T" ctime(lastPhoneHome) as lastPhoneHome\
| sort _time\
| eval lastphoneEpoch = strptime(lastPhoneHome, "%Y-%m-%d %T")\
| where lastphoneEpoch < relative_time(now(), "-3d")\
| eval secsAgo = round((now() - lastphoneEpoch), 2)\
| eval time_ago = case(secsAgo>259200, round((secsAgo/60/60/24), 2)." days ago", \
    secsAgo>14400, round((secsAgo/60/60), 2)." hours ago", \
    secsAgo>1200, round((secsAgo/60), 2)." minutes ago",\
    true(), round(secsAgo, 2)." seconds ago")\
| table host content.hostname lastPhoneHome time_ago\
| rename host as deployment-server, content.hostname as deployment-client, lastPhoneHome as "last phone home", time_ago as "time since last phone"

[License: Splunk License is going to Expire soon!]
action.webhook.enable_allowlist = 0
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 43 9 * * *
description = This alert will fire when there are less than 20 days until the expiry of a license within your Splunk environment.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = `ninja_index` sourcetype=ninja:licenses\
| convert ctime(content.expiration_time) as expire_date\
| stats latest(content.expiration_time) as epoch_expire, latest(expire_date) as readable_expire by host content.label name\
| rename content.label as label, name as id\
| where now() >= relative_time(epoch_expire, "-20d")

[App Support lookup gen]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 59 * * * *
description = This report automatically populates the lookup admin_ninja_unique_apps with the latest output of Splunk Apps and their latest versions/compatabilities in the environment
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = admin_ninja_app
request.ui_dispatch_view = search
search = `ninja_index` (sourcetype=ninja:apps content.core=false `ninja_blacklist_apps` content.details=*) OR sourcetype=ninja:apps:support\
| spath input=_raw path=release_detail{}\
| eval app = coalesce(app, name)\
| eval releases_json = mvjoin('release_detail{}', "@@@@")\
| stats latest(content.label) as label latest(content.author) as author latest(content.description) as description latest(content.check_for_updates) as check_updates values(content.version) as installed_version latest(content.details) as splunkbase_url latest(content.build) as build latest(releases_json) as releases_json latest(app_id) as app_id latest(support_type) as support_type values(host) as hosts BY app\
| mvexpand installed_version\
| eval releases_json = split(releases_json, "@@@@")\
| eval current_release = mvmap(releases_json, if(spath(releases_json, "version")='installed_version', releases_json, null()))\
| eval latest_release = mvindex(releases_json, 0)\
| spath input=current_release \
| rename platform_support{} as current_ver_support, splunk_compatability{} as current_ver_versions\
| eval current_ver_versions = mvjoin(current_ver_versions, ";"), current_ver_support = mvjoin(current_ver_support, ";")\
| eval hosts = mvjoin(hosts, ";")\
| fields - version\
| spath input=latest_release \
| rename platform_support{} as latest_ver_support, splunk_compatability{} as latest_ver_versions, version as latest_ver\
| eval latest_ver_versions = mvjoin(latest_ver_versions, ";"), latest_ver_support = mvjoin(latest_ver_support, ";")\
| fields app app_id label author check_updates installed_version build hosts splunkbase_url description support_type current_ver_support current_ver_versions latest_ver latest_ver_support latest_ver_versions\
| where isnotnull(installed_version) AND installed_version!=""\
| outputlookup ninja_app_support append=false
