EXTRACT-protocol=^.+Protocol\: (?P<protocol>[^,]+)
EXTRACT-extract_access_control_rule_name=^.+AccessControlRuleName\:\ (?P<access_control_rule_name>.[^,]+)
EXTRACT-extract_ac_policy=^.+ACPolicy\: (?P<fw_policy>[^,]+)

