[duckYeahAddLocalIgnore]
action.email.useNSSubject = 1
alert.track = 0
search = | makeresults\
| eval\
    _key="$key$",\
    keymv=split(_key, "::dybr::"),\
    app=mvindex(keymv,0),\
    conf=mvindex(keymv,1),\
    stanza=mvindex(keymv,2),\
    stanza=replace(stanza, "::dysp::", " "),\
    stanza=replace(stanza, "::dypct::", "%"),\
    param=mvindex(keymv,3),\
    ignore=1\
| fields - keymv _time\
| outputlookup append=t duckyeah_ignore

[duckYeahGetDefaults]
action.email.useNSSubject = 1
alert.track = 0
search = | inputlookup duckyeah_user_default_settings\
| rex field=_key "(?<username>.*?)::dybr::(?<token>.*)"\
| search username="$username$"\
| fields token, value

[duckYeahMungedSettings]
action.email.useNSSubject = 1
alert.track = 0
search = | inputlookup duckyeah_settings\
| rename\
    _key AS id\
| eval\
    _time = now()\
| append [\
    inputlookup duckyeah_settings_default\
    | eval\
        _time = now()-86400,\
        default = value,\
        isDefault = 1\
]\
| stats\
    latest(label) AS label,\
    latest(value) AS value,\
    values(default) as default,\
    values(desired) as desired,\
    latest(description) AS description,\
    latest(isDefault) AS isDefault\
        BY id

[duckYeahRemoveDefault]
action.email.useNSSubject = 1
alert.track = 0
search = | inputlookup duckyeah_user_default_settings WHERE NOT _key="$key$"\
| outputlookup duckyeah_user_default_settings

[duckYeahRemoveFileIgnore]
action.email.useNSSubject = 1
alert.track = 0
search = | inputlookup duckyeah_file_ignore WHERE _key!="$key$"\
| outputlookup duckyeah_file_ignore

[duckYeahRemoveLocalIgnore]
action.email.useNSSubject = 1
alert.track = 0
search = | inputlookup duckyeah_ignore WHERE _key !="$key$"\
| outputlookup duckyeah_ignore

[duckYeahSaveDefaults]
action.email.useNSSubject = 1
alert.track = 0
search = | makeresults\
| eval\
    _key="$key$",\
    value="$value$"\
| fields _key, value\
| outputlookup append=t duckyeah_user_default_settings

[duckYeahUpdateFileIgnore]
action.email.useNSSubject = 1
alert.track = 0
search = | makeresults\
| eval\
    _key="$key$",\
    files="$files$"\
| outputlookup append=t duckyeah_file_ignore
