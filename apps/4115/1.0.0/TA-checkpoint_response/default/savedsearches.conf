[checkpoint_kvstore_update_search]
cron_schedule = 0 */12 * * *
description = Updates Check Point KV Stores to delete IOCs that have expired.
enableSched = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
search = | inputlookup checkpoint_ip_lookup | where _expiration_time > now() | outputlookup checkpoint_ip_lookup | append [inputlookup checkpoint_ip_range_lookup | where _expiration_time > now() | outputlookup checkpoint_ip_range_lookup] | append [inputlookup checkpoint_mail_from_lookup | where _expiration_time > now() | outputlookup checkpoint_mail_from_lookup] | append [inputlookup checkpoint_domain_lookup | where _expiration_time > now() | outputlookup checkpoint_domain_lookup] | append [inputlookup checkpoint_mail_cc_lookup | where _expiration_time > now() | outputlookup checkpoint_mail_cc_lookup] | append [inputlookup checkpoint_md5_lookup | where _expiration_time > now() | outputlookup checkpoint_md5_lookup] | append [inputlookup checkpoint_url_lookup | where _expiration_time > now() | outputlookup checkpoint_url_lookup] | append [inputlookup checkpoint_mail_reply_to_lookup | where _expiration_time > now() | outputlookup checkpoint_mail_reply_to_lookup] | append [inputlookup checkpoint_mail_subject_lookup | where _expiration_time > now() | outputlookup checkpoint_mail_subject_lookup] | append [inputlookup checkpoint_mail_to_lookup | where _expiration_time > now() | outputlookup checkpoint_mail_to_lookup]