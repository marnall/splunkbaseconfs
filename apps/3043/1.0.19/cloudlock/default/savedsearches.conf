#Saved Searches that are fed into the CloudLock Incident dashboard.  

[Incident.v3]
action.email.reportServerEnabled = 0
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */1 * * * *
dispatch.latest_time = 1438367700
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = cloudlock
request.ui_dispatch_view = search
search = index=cloudlock sourcetype=incident |dedup time_submitted|table time_submitted,ticket_id, status, severity, src_user|rename time_submitted AS "Time Submitted", ticket_id AS "Ticket ID", status AS Status, severity AS Severity, src_user AS "User"
